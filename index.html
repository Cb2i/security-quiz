{id:2125,cat:"Fondamentaux Sécurité",q:"Qu'est-ce que la 'Threat Modeling (STRIDE)' et comment l'appliquer à une architecture applicative ?",o:["Un modèle de menaces uniquement pour les militaires","STRIDE (Microsoft): Spoofing (usurpation d'identité), Tampering (falsification des données), Repudiation (déni d'action), Information Disclosure (fuite d'infos), Denial of Service, Elevation of Privilege. Processus: 1) Diagramme de flux de données (DFD), 2) Pour chaque élément: quelles menaces STRIDE s'appliquent?, 3) Prioriser selon DREAD ou CVSS, 4) Contrôles de mitigation pour chaque menace","Un framework de sécurité réseau","Un outil de scan de code"],a:1,e:"STRIDE example pour une API REST: Spoofing → OAuth authentication. Tampering → HTTPS + input validation + HMAC signature. Repudiation → Audit logging (qui a fait quoi, quand). Information Disclosure → Autorization checks (ABAC), data masking. DoS → Rate limiting, WAF. Elevation of Privilege → RBAC strict, principle of least privilege. Threat Modeling Tool Microsoft (gratuit) automatise la génération du rapport STRIDE depuis un diagramme DFD."},
{id:2126,cat:"Gestion des Risques",q:"Qu'est-ce que le 'Risk Register' et comment le maintenir en cybersécurité ?",o:["Un registre de tous les incidents passés","Un Risk Register = inventaire de tous les risques cyber identifiés avec pour chaque risque: Description, Vraisemblance (1-5), Impact (1-5), Criticité = V×I, Propriétaire, Statut (Accept/Mitigate/Transfer/Avoid), Date de revue, Traitement prévu. Maintenu par le RSSI et revu trimestriellement avec le management. Outil de priorisation des investissements sécurité et de communication avec le board","Un outil de ticketing IT","Un registre des utilisateurs"],a:1,e:"Risk Register workflow: identification (threat assessment, vulnérabilité scans, audits), évaluation (scoring V×I), traitement (Accept = documenter l'acceptation, Mitigate = implémenter des contrôles, Transfer = assurance, Avoid = supprimer l'activité risquée), et revue (le risque résiduel après traitement est-il acceptable?). Le board voit: Top 5 cyber risks et leur tendance (amelioration/degradation). Base pour justifier le budget sécurité."},
{id:2127,cat:"Ingénierie Sociale",q:"Qu'est-ce que 'OSINT (Open Source Intelligence)' et comment les attaquants l'utilisent contre votre organisation ?",o:["Un outil uniquement pour les gouvernements","OSINT = collecte d'informations depuis des sources publiques: LinkedIn (organigramme, technologies utilisées), job postings (technologies internes), GitHub (code source, secrets accidentels), Shodan/Censys (actifs exposés Internet), WHOIS, archives web. Les attaquants utilisent ces informations pour: cibler des employés spécifiques (phishing personnalisé), identifier les technologies pour exploiter des CVEs connues, et cartographier le réseau","Un outil de surveillance des concurrents uniquement","Un service payant uniquement"],a:1,e:"OSINT défensif (Red Team perspective côté défense): vérifier ce que les attaquants peuvent trouver sur votre organisation. Outils: Maltego (cartographie des relations), theHarvester (emails, domaines), Shodan (actifs exposés Internet: RDP ouvert sur 3389, interface d'admin exposée). Actions correctives: retirer les informations sensibles des job postings (versions logicielles), surveiller GitHub pour les secrets, et configurer des Google Alerts sur votre organisation."},
{id:2128,cat:"Sécurité Réseau",q:"Qu'est-ce que 'DNS Sinkholing' et comment l'utiliser pour bloquer les malwares ?",o:["Un outil de filtrage des emails","DNS Sinkholing: rediriger les requêtes DNS vers des domaines malveillants (C2, malware distribution) vers une IP contrôlée (le sinkhole) plutôt que vers la vraie IP malveillante. Résultat: le malware tente de contacter son C2 → DNS résout vers le sinkhole → connexion échouée (le malware ne peut pas recevoir de commandes). Bonus: les requêtes vers le sinkhole révèlent quels postes sont infectés","Un outil de performance DNS","Un VPN pour le DNS"],a:1,e:"DNS Sinkhole implementation: DNS Filtering solutions (Cisco Umbrella, Palo Alto DNS Security, Windows Defender DNS Protection) maintiennent des listes de domaines malveillants (mis à jour par threat intelligence). Quand un poste tente de résoudre un domaine C2 → le résolveur retourne une IP de sinkhole (ex: 127.0.0.1 ou une IP interne de votre honeypot). Monitoring: les requêtes vers le sinkhole = postes potentiellement infectés → investigation prioritaire."},
{id:2129,cat:"Concepts Avancés",q:"Qu'est-ce que 'eBPF (Extended Berkeley Packet Filter)' et son rôle dans la sécurité des conteneurs ?",o:["Un protocole réseau","eBPF = technologie Linux permettant d'exécuter des programmes sandboxés dans le kernel sans modifier le code kernel. Usage sécurité: intercepter les appels système (syscalls) pour détecter les comportements malveillants dans les containers (ex: container qui lance un reverse shell), monitoring réseau (flux entre pods), et application de politiques de sécurité. Falco et Cilium utilisent eBPF pour la sécurité Kubernetes","Un protocole de chiffrement réseau","Un outil de performance uniquement"],a:1,e:"eBPF security tools: Falco (Sysdig) = détecte les comportements anormaux dans les containers via eBPF (ex: 'container spawned a shell', 'file write below /etc' = indicateurs d'attaque). Cilium = réseau et sécurité Kubernetes via eBPF (Network Policies L7-aware, mTLS transparent). Tetragon (Isovalent) = enforcement et forensique eBPF. Azure utilise eBPF via Retina (observabilité réseau AKS) et Cilium pour AKS Overlay networking."},
{id:2130,cat:"Sécurité des Applications",q:"Qu'est-ce que 'CORS (Cross-Origin Resource Sharing)' et les risques d'une mauvaise configuration ?",o:["Un protocole de chiffrement web","CORS = mécanisme de sécurité des navigateurs qui contrôle quels domaines externes peuvent faire des requêtes AJAX vers votre API. Configuration risquée: 'Access-Control-Allow-Origin: *' = n'importe quel site web peut faire des requêtes à votre API avec les cookies de l'utilisateur. Configurations dangereuses: reflect origin (renvoyer l'origine de la requête sans validation), null origin allowed, credentials=true avec wildcard","Un outil de performance API","Un certificat TLS pour les APIs"],a:1,e:"CORS misconfiguration impact: si votre API permet 'Access-Control-Allow-Origin: [attacker.com], Access-Control-Allow-Credentials: true' → un site malveillant peut faire des requêtes à votre API avec les cookies de l'utilisateur connecté (CSRF-like via CORS). Fix: whitelist explicite des origines autorisées (uniquement votre frontend domain), ne jamais utiliser wildcard avec credentials, et valider l'origine côté serveur (pas juste se fier au header)."},
{id:2131,cat:"Cloud Security",q:"Qu est-ce que le Cloud Security Posture Management CSPM et pourquoi est-il essentiel ?",o:["Un antivirus pour le cloud","CSPM: surveillance continue de la configuration de la posture de securite cloud. Identifie les mauvaises configurations (buckets S3 publics, VMs sans MFA, ports ouverts, chiffrement absent) et les compare aux best practices (CIS, NIST, ISO 27001). Fournit un score de securite et des recommandations priorisees. Outils: Defender for Cloud (Azure), AWS Security Hub, Wiz, Prisma Cloud","Un scanner de vulnerabilites","Un outil de monitoring des performances"],a:1,e:"CSPM vs CWPP (Cloud Workload Protection Platform): CSPM = configuration et compliance (est-ce que votre cloud est bien configure?). CWPP = runtime protection (detecter les attaques en temps reel). Les deux sont complementaires. Metric CSPM: Secure Score = pourcentage de controles satisfaits. Configurations les plus critiques: acces public aux stockages, ports admin ouverts sur Internet (RDP/SSH), comptes sans MFA."},
{id:2132,cat:"Ingenierie Sociale",q:"Qu est-ce qu une attaque de Business Email Compromise BEC et comment s en proteger ?",o:["Un virus qui se propage par email","BEC: l attaquant se fait passer pour un dirigeant, un fournisseur, ou un partenaire pour manipuler les employes a effectuer des virements frauduleux ou divulguer des informations sensibles. Techniques: 1) Compromission du compte email reel (phishing), 2) Spoofing du domaine (homoglyphe: contoso.com vs c0ntoso.com). Pertes mondiales: milliards de dollars par an","Un spam ordinaire","Un virus bancaire"],a:1,e:"BEC defense: DMARC + DKIM + SPF (empeche le spoofing du domaine), formation des employes a verifier les demandes inhabituelles via un second canal (appel telephonique pour confirmer un virement), processus a 2 validations pour les virements importants, Conditional Access + MFA pour proteger les comptes email. Exemples: CEO Fraud (email du PDG qui demande un virement urgent), Supplier Fraud (fournisseur qui change son IBAN)."},
{id:2133,cat:"Endpoint Security",q:"Qu est-ce que le principe de Least Privilege sur les endpoints et comment l implementer ?",o:["Les administrateurs locaux sont necessaires","Least Privilege Endpoint: les utilisateurs standard n ont pas de droits administrateurs locaux sur leur machine. Benefices: un malware execute par l utilisateur ne peut pas installer de logiciels ou modifier les fichiers systeme. Implementation: 1) Supprimer les droits admin locaux (Intune ou Group Policy), 2) PAM: les utilisateurs peuvent demander des droits admin temporaires, 3) Application Allowlisting: seules les apps approuvees s executent","Les employes ont besoin des droits admin","Least Privilege uniquement pour les serveurs"],a:1,e:"Least Privilege Endpoint impact: 94% des vulnerabilites critiques Windows seraient non-exploitables si les utilisateurs n avaient pas de droits admin locaux selon Microsoft. Resistance interne: les equipes IT habituees a avoir les droits admin. Transition progressive: retirer les droits progressivement, commencer par les roles non-techniques, PAM tool pour les cas legitimes (installation logiciel approuve). Mesurer: nombre d infections malware avant/apres."},
{id:2134,cat:"Cryptographie",q:"Qu est-ce que le chiffrement homomorphe et quelles sont ses applications pratiques en securite ?",o:["Un type de chiffrement symetrique classique","Chiffrement homomorphe: permet d effectuer des calculs sur des donnees chiffrees sans les dechiffrer. Le resultat du calcul est l equivalent chiffre du resultat sur les donnees en clair. Applications: analyses de donnees confidentielles dans le cloud (le cloud provider calcule sans voir les donnees), voting electronique prive, collaboration sur des donnees medicales sensibles entre institutions. Limitation: tres lent (1000x plus lent que le calcul standard)","Un chiffrement pour les empreintes digitales","Un algorithme de hash"],a:1,e:"Homomorphic Encryption use case: un hopital veut que Google Analytics analyse ses donnees patient pour des insights sans exposer les donnees. Avec FHE: l hopital chiffre les donnees, Google calcule sur les donnees chiffrees, renvoie le resultat chiffre, l hopital dechiffre. Google n a jamais vu les donnees en clair. Microsoft SEAL: bibliotheque open-source de FHE. Adoption: encore experimental pour la plupart des usages (performance)."},
{id:2135,cat:"Gestion des Identites",q:"Qu est-ce que Decentralized Identity et comment Microsoft Entra Verified ID l implemente-t-il ?",o:["Un systeme d identite sans gouvernance","Decentralized Identity (DID): les individus possedent et controlent leurs propres credentials (pas Google, pas Microsoft). Utilise des Verifiable Credentials (VC) standardises par le W3C. Microsoft Entra Verified ID: 1) L organisation emet des Verified Credentials (ex: diplome, badge employe), 2) L utilisateur stocke dans son wallet (Authenticator), 3) Un verifieur demande la presentation du credential, 4) L utilisateur partage uniquement ce qui est necessaire","Un systeme d identite sans securite","Un remplacant des mots de passe"],a:1,e:"Verified ID use case: un employe quitte une entreprise et rejoint une autre. L ancienne entreprise emet un Verified Credential certifiant l experience. La nouvelle entreprise peut verifier ce credential cryptographiquement sans appeler l ancien employeur. Privacy: l utilisateur ne partage que le minimum necessaire (ex: prouver qu il est majeur sans donner sa date de naissance exacte)."},
{id:2136,cat:"Securite des Applications",q:"Qu est-ce que l OWASP API Security Top 10 et quelles sont les vulnerabilites les plus critiques ?",o:["Une liste de failles reseau","OWASP API Security Top 10 (2023): 1) Broken Object Level Authorization BOLA: acceder aux objets d autres utilisateurs, 2) Broken Authentication: tokens faibles ou gestion incorrecte des sessions, 3) Broken Object Property Level Authorization: exposer trop de proprietes dans la reponse API, 4) Unrestricted Resource Consumption: pas de rate limiting (DoS par epuisement), 5) Broken Function Level Authorization: acces a des endpoints admin non-autorises","Une liste de failles web classiques","Une liste de vulnerabilites reseau"],a:1,e:"API Security best practices: 1) BOLA: toujours verifier que l objet appartient a l utilisateur authentifie (autorisation au niveau de l objet, pas seulement de l endpoint), 2) Rate limiting: 100 req/min par token/IP pour prevenir l abus, 3) API Gateway: centralise l auth, le rate limiting, le logging, 4) Input validation + schema validation: rejeter tout ce qui ne correspond pas au schema attendu. Outils: OWASP ZAP, Burp Suite pour les tests."},
{id:2137,cat:"Fondamentaux",q:"Qu est-ce que le Security by Default et comment l appliquer dans le developpement ?",o:["Activer toutes les fonctionnalites de securite","Security by Default: les parametres par defaut d un systeme doivent etre les plus securises possibles. Les utilisateurs doivent deliberement activer des fonctionnalites moins securisees (pas l inverse). Exemples: HTTPS par defaut (pas HTTP), MFA requis par defaut pour les nouvelles applications, cookies HttpOnly et Secure par defaut, headers de securite HTTP (HSTS, CSP, X-Frame-Options) par defaut","Configurer manuellement chaque parametre de securite","Security by Default uniquement pour les applications militaires"],a:1,e:"Security by Default vs Security by Design: Design = architecture pensee pour la securite des le debut. Default = les configurations initiales sont securisees. Azure: les nouvelles fonctionnalites Azure sont deployees avec Security by Default (ex: Azure AD MFA requis par defaut pour les nouveaux tenants via Security Defaults). NIST 800-53: controle SC-7 = le trafic est refuse par defaut, seul le trafic autorise explicitement est permis."},
{id:2138,cat:"Securite Reseau",q:"Qu est-ce que DNS Security DNSSEC et DNS over HTTPS DoH et pourquoi sont-ils importants ?",o:["DNS est intrinsequement securise","DNSSEC: ajoute des signatures cryptographiques aux reponses DNS pour garantir leur authenticite (empeche le DNS spoofing/poisoning). DoH (DNS over HTTPS): chiffre les requetes DNS (empeche l espionnage et la manipulation du trafic DNS par un attaquant sur le reseau intermediaire). DNSSEC + DoH = DNS authentifie et chiffre","DNS est uniquement un service de nommage","DNSSEC uniquement pour les sites gouvernementaux"],a:1,e:"DNS Security enterprise: deployer un DNS recursif interne avec filtrage (blocage des domaines malveillants = DNS filtering). Solutions: Azure DNS Private Resolver, Cisco Umbrella (DNS cloud avec TI), Infoblox. DoH problematique enterprise: contourne les filtres DNS existants (le trafic DNS est dans HTTPS, le proxy ne peut pas l inspecter facilement). Via GPO: desactiver DoH ou le forcer vers votre resolver d entreprise."},
{id:2139,cat:"Incident Response",q:"Qu est-ce que le concept de Tabletop Exercise et comment le conduire pour tester votre reponse aux incidents ?",o:["Un exercice physique de l equipe securite","Tabletop Exercise: simulation theorique ou une equipe discute les etapes de reponse a un scenario d attaque. Le facilitateur presente un scenario (ex: ransomware detecte sur un serveur de production) -> l equipe discute: qui est notifie? quelles decisions? quelles actions techniques? quel message pour la direction? Identifie les lacunes dans le processus AVANT qu une vraie crise arrive","Un exercice de formation physique","Un outil de simulation de malware"],a:1,e:"Tabletop Exercise scenarios: ransomware (le plus courant), BEC avec virement frauduleux, fuite de donnees client, compromission d un compte admin, attaque supply chain. Participants: CISO, Legal, Comm/PR (communication de crise), IT Security, DBA, RH. Objectifs: tester le plan de communication (qui informe qui?), tester les decisions techniques (quand isoler quoi?), identifier les manques. Frequence: 2x par an minimum. Post-exercise: rapport des gaps -> action plan."},
{id:2140,cat:"Cloud Security",q:"Qu est-ce que l Infrastructure as Code Security et comment securiser les pipelines DevOps ?",o:["IaC n a pas de considerations de securite","IaC Security Shift-Left approach: 1) Secrets scanning: detecter les mots de passe et tokens dans le code IaC avant le commit (pre-commit hooks: gitleaks, TruffleHog), 2) Static Analysis SAST: analyser les templates Terraform/ARM/Bicep pour les mauvaises configurations (Checkov, terrascan), 3) Policy as Code: OPA (Open Policy Agent) ou Azure Policy pour enforcer les standards, 4) Signed commits","Les scripts IaC ne peuvent pas etre vulnerables","IaC Security uniquement pour les grandes entreprises"],a:1,e:"IaC Security pipeline: 1) Developer commits Terraform code -> 2) Pre-commit hook: secrets scan (bloque si token AWS trouve) -> 3) CI pipeline: Checkov scan (bloque si Storage Account public configure) -> 4) Peer review obligatoire -> 5) CD pipeline: Policy as Code (bloque si ressource dans une region non-approuvee) -> 6) Deploy. Resultat: les mauvaises configurations sont eliminees avant d arriver en production."},
{id:2141,cat:"Gestion des Identites",q:"Comment implementer une solution de PAM Privileged Access Management pour les comptes a hauts privileges ?",o:["Les comptes admin n ont pas besoin de protections speciales","PAM Enterprise solution: 1) Vault des credentials: stocker les mots de passe admin dans un vault chiffre (CyberArk, Delinea, Microsoft PIM), 2) Checkout system: les admins checkent un credential pour une session, il est automatiquement change apres usage, 3) Session recording: enregistrer les sessions privilegiees pour l audit, 4) Approval workflow: les acces critiques necessitent une approbation, 5) Zero Standing Privileges: tout est JIT (Just-In-Time)","Un simple gestionnaire de mots de passe","Uniquement pour les comptes de service"],a:1,e:"Zero Standing Privileges: aucun compte n a de droits admin permanents. Pour administrer un systeme: faire une demande dans le PAM -> approbation -> acces accorde pour 1-4 heures -> session enregistree -> acces revoque automatiquement. Avantage: meme si un credential est vole, l attaquant ne peut pas l utiliser (revoque ou expiree). Conformite: PCI DSS, SOX, HIPAA requierent la gestion et l audit des acces privilegies."},
{id:2142,cat:"Securite des Applications",q:"Qu est-ce que la gestion des secrets et comment eviter les secrets dans le code source ?",o:["Les secrets dans le code sont une bonne pratique car c est plus simple","Gestion des secrets: 1) Ne jamais mettre de secrets dans le code source (risque d exposition dans Git history), 2) Utiliser des solutions de vault: HashiCorp Vault, Azure Key Vault, AWS Secrets Manager, 3) Variables d environnement: secrets injectes au runtime, 4) Secrets managers dans les pipelines CI/CD (GitHub Secrets, Azure DevOps variable groups), 5) Rotation automatique des secrets sans intervention manuelle","Les secrets en dur dans le code sont plus fiables","Les secrets ne sont dangereux que dans les repos publics"],a:1,e:"Secrets management best practices: rotation automatique = Azure Key Vault + App Service peuvent faire la rotation des connection strings SQL automatiquement. Detection des secrets: outils pre-commit (gitleaks), GitHub Secret Scanning (alerte si un secret est detecte dans un repo). Principle: les applications ne devraient jamais voir les secrets directement (Managed Identity -> Azure Key Vault sans aucun credential)."},
{id:2143,cat:"Frameworks/Conformite",q:"Qu est-ce que ISO 27001 et comment Microsoft 365 aide-t-il a l obtenir ?",o:["ISO 27001 est uniquement pour les grandes entreprises","ISO 27001: norme internationale de securite de l information. Implique: 1) Etablir un ISMS (Information Security Management System), 2) Risk Assessment et treatment plan, 3) Controls techniques et organisationnels (Annexe A: 93 controles), 4) Audit interne, 5) Certification par un organisme accredite. Microsoft 365 aide: Compliance Manager ISO 27001 template (evaluation automatique des controles techniques), Azure ISO 27001 certifie","ISO 27001 uniquement pour les services financiers","Une certification optionnelle sans valeur"],a:1,e:"ISO 27001 + M365: Compliance Manager ISO 27001 assessment = voir quels controles sont deja satisfaits par les configurations M365 et quels controles sont a la charge du client. Les controls techniques M365 = environ 60% des controls Annex A satisfaits si bien configures. Les 40% restants = process et organisationnel (politique ISMS, audits internes, gestion des risques). L auditeur ISO 27001 voudra voir les preuves de conformite = exporter depuis Compliance Manager."},
{id:2144,cat:"Securite Reseau",q:"Qu est-ce que Network Detection and Response NDR et comment l integrer dans un SOC ?",o:["Un antivirus pour le reseau","NDR: analyse le trafic reseau (flow data, packet capture) avec du ML pour detecter les anomalies et les comportements malveillants. Detecte: lateral movement, exfiltration de donnees, communications C2, scanning interne, usage de protocoles non-standard. Solutions: Darktrace, ExtraHop, Cisco Stealthwatch, Microsoft NDR (dans Sentinel). Complementaire avec SIEM (Sentinel) et EDR (MDE)","Un type de pare-feu","Un moniteur de performances reseau"],a:1,e:"NDR vs IDS/IPS: IDS/IPS = detection basee sur des signatures (connait les attaques connues). NDR = detection basee sur les anomalies comportementales (detecte les attaques inconnues si elles devient du comportement normal). NDR use case: un attaquant qui utilise des outils legitimes (PowerShell, WMI) pour se deplacer lateralement ne declenche pas les signatures IDS. NDR voit que la machine A contacte soudainement 50 machines internes sur le port 445 (comportement de worm) -> alerte."},
{id:2145,cat:"Gestion des Risques",q:"Qu est-ce que la gestion des risques de la chaine d approvisionnement Supply Chain Risk Management ?",o:["Uniquement la securite des livraisons physiques","Supply Chain Risk Management: evaluer et gerer les risques lies aux fournisseurs de logiciels, services cloud, et composants tiers. Risques: un composant tiers vulnerable (Log4Shell = Log4j), un fournisseur compromis injecte du code malveillant (SolarWinds), des dependances open-source malveillantes (npm typosquatting). Controles: SBOM (Software Bill of Materials), analyse de composition logicielle SCA, audit des fournisseurs critiques","La securite de la chaine logistique uniquement","Uniquement pour les grandes entreprises"],a:1,e:"SBOM (Software Bill of Materials): inventaire complet de tous les composants d un logiciel (librairies, frameworks, versions). Permet de verifier rapidement si vous etes affecte par une nouvelle CVE (Log4Shell: toute organisation avec un SBOM savait en heures si elle etait exposee). Exigence reglementaire: Executive Order US 14028 impose les SBOM pour les logiciels vendus au gouvernement federal. NIST Cybersecurity Framework Supply Chain: evaluer les pratiques de securite de chaque fournisseur critique."},
{id:2146,cat:"Fondamentaux",q:"Qu est-ce que le principe de Defense in Depth et comment l implementer ?",o:["Mettre plusieurs pare-feux identiques en serie","Defense in Depth: strategie de securite par couches multiples et independantes. Si une couche est compromise, les autres continuent a proteger. Couches typiques: Perimetre (firewall, IPS), Reseau (segmentation, DMZ), Endpoint (EDR, patch management), Application (WAF, OWASP), Donnees (chiffrement, DLP), Identite (MFA, PAM). L attaquant doit contourner CHAQUE couche = cout d attaque eleve","Installer plusieurs antivirus","Defense in Depth uniquement pour les grandes organisations"],a:1,e:"Defense in Depth vs Defense in Breadth: Depth = couches independantes en profondeur. Breadth = controles sur tous les vecteurs d attaque. Exemple: un attaquant contourne le pare-feu via un email de phishing -> EDR sur l endpoint detecte l execution du malware -> DLP bloque l exfiltration des donnees -> MFA empeche l utilisation des credentials voles. Chaque couche a arrete ou detecte l attaquant independamment. ROI: pas besoin que chaque couche soit parfaite, juste suffisamment efficace pour que l attaque soit non rentable."},
{id:2147,cat:"Gestion des Identites",q:"Qu est-ce que la Federation des Identites et quand utiliser SAML vs OIDC vs OAuth 2.0 ?",o:["Des protocoles identiques","SAML 2.0 (Security Assertion Markup Language): federation XML pour les apps enterprise (SSO). Entre deux organisations ou un IdP et une app. Typiquement pour les apps legacy et SaaS enterprise (Salesforce, Workday). OIDC (OpenID Connect): extension d OAuth 2.0 pour l authentication. Standard moderne pour les apps web/mobile. JWT tokens. OAuth 2.0: uniquement pour l autorisation (deleguer l acces a une API), pas l authentication en soi","SAML est obsolete","OIDC uniquement pour les apps mobiles"],a:1,e:"Quand utiliser quoi: App enterprise legacy -> SAML. Nouvelle app web/mobile -> OIDC. API access delegation -> OAuth 2.0. Dans Azure AD: SAML = configure via Enterprise Applications (SSO SAML). OIDC = via App Registrations (modern apps). OAuth 2.0 = scopes et permissions API. Migration: les nouvelles apps devraient utiliser OIDC/OAuth 2.0 (plus simple, supporte les apps mobiles natives). SAML reste present pour la compatibilite avec les systemes legacy."},
{id:2148,cat:"Securite des Applications",q:"Qu est-ce que le Secure SDLC et quelles sont les etapes cles pour integrer la securite dans le developpement ?",o:["La securite est ajoutee uniquement a la fin","Secure SDLC (Software Development Lifecycle): integrer la securite a chaque phase: 1) Requirements: security requirements (auth, authz, logging), threat modeling, 2) Design: architecture review, 3) Development: secure coding guidelines, IDE plugins securite, 4) Testing: SAST (code), DAST (runtime), SCA (dependances), penetration testing, 5) Deployment: secure configuration, secrets management, 6) Maintenance: patch management, vulnerability monitoring. Resultat: securite native pas boltee","La securite est uniquement testee en production","La securite est la responsabilite de l equipe securite uniquement"],a:1,e:"Shift-Left metrics: le cout de correction d une vulnerabilite augmente exponentiellement plus on avance dans le SDLC. Correction en phase de design: 1x. En developpement: 6x. En test: 15x. En production: 100x. Training: former les developpeurs aux OWASP Top 10, secure coding, et utilisation des outils securite. Champion model: un Champion Securite par equipe de developpement = relais entre l equipe securite et les devs. DevSecOps: securite integree dans le pipeline CI/CD automatiquement."},
{id:2149,cat:"Incident Response",q:"Qu est-ce que la chaine de custody dans les investigations forensiques et pourquoi est-elle critique ?",o:["Un document de suivi administratif","Chaine de custody (chain of custody): documentation ininterrompue de la possession, du controle, du transfert, et de la disposition des preuves electroniques. Chaque transfert de preuve est documente (qui, quand, pourquoi). Si la chaine est brisee, les preuves peuvent etre inadmissibles en justice. Pratiques: hasher les preuves (MD5/SHA-256) avant/apres transfert, stocker dans des espaces inviolables, documenter chaque acces","Un fichier de log standard","Une procedure uniquement pour la police"],a:1,e:"Chaine de custody electronique: hash MD5/SHA-256 de chaque fichier de preuve (si le hash change = preuve altere = inadmissible). Write-blockers: bloquer les ecritures sur les disques originaux lors de la copie forensique. Copie forensique vs copie standard: forensique = bit-for-bit copy (inclut les espaces libres et fichiers supprimes). Documentation: screenshot date/heure de chaque action forensique. Les logs Purview eDiscovery incluent la chaine de custody automatiquement (hash des exports + signature)."},
{id:2150,cat:"Cloud Security",q:"Qu est-ce que le modele Zero Trust pour l acces aux workloads cloud (cloud-to-cloud et on-premises-to-cloud) ?",o:["Le cloud interne est de confiance par defaut","Zero Trust cloud-to-cloud: 1) Managed Identities: les workloads cloud s authentifient avec des identites Azure AD (pas de credentials hardcodes), 2) Private Endpoints: les services communiquent via des reseaux prives (pas par Internet), 3) Service Mesh (ex: Istio): mTLS entre microservices (chaque service verifie l identite de l autre), 4) Network Policies Kubernetes: restreindre le trafic entre pods. On-premises-to-cloud: Private Link / ExpressRoute (acces prive sans Internet)","Le cloud provider securise tout","Zero Trust uniquement pour les utilisateurs humains"],a:1,e:"Service-to-service Zero Trust: dans une architecture microservices, chaque service doit verifier l identite des services qui l appellent (pas juste verifier que la requete vient du bon reseau). mTLS: authentification mutuelle via certificats (les deux parties prouvent leur identite). SPIFFE/SPIRE: standard pour les identites de workloads cloud-native. Azure Container Apps et AKS supportent la gestion automatique des certificats mTLS (Dapr sidecar). Rotation automatique des certificats = zero downtime + securite maintenue."},
{id:2151,cat:"Securite Reseau",q:"Qu est-ce que le protocole TLS 1.3 et pourquoi migrer depuis TLS 1.2 ?",o:["TLS 1.3 et TLS 1.2 sont identiques","TLS 1.3 (2018): ameliorations majeures vs TLS 1.2: 1) Handshake plus rapide (1 Round-Trip vs 2 = latence reduite de ~30ms), 2) Forward Secrecy obligatoire (chaque session a une cle unique = compromission future ne dechiffre pas les sessions passees), 3) Suppression des algorithmes faibles (RSA key exchange, RC4, DES, SHA-1 supprimes), 4) Encrypted handshake (le certificat est chiffre = moins d informations sur le serveur). TLS 1.0 et 1.1: vulnerables (POODLE, BEAST) -> interdits par PCI DSS depuis 2022","TLS 1.3 est uniquement pour les nouvelles applications","TLS 1.2 est toujours recommande"],a:1,e:"TLS migration: auditer les serveurs qui acceptent encore TLS 1.0/1.1 (Azure Policy peut detecter les App Services et SQL Servers avec TLS < 1.2). Forcer TLS 1.2 minimum dans Azure: politique Azure Deny pour les ressources configurees avec TLS <1.2. TLS 1.3 adoption: supportee par tous les navigateurs modernes et la plupart des frameworks depuis 2019. Quelques cas edge: des clients legacy (systemes industriels) supportent uniquement TLS 1.0 -> plan de migration ou isolation reseau pour ces systemes specifiques."},
{id:2152,cat:"Gestion des Risques",q:"Comment calculer et presenter le cout d un incident de securite a la direction ?",o:["Les incidents de securite n ont pas de cout chiffrable","Calcul cout incident: 1) Couts directs: forensique et investigation (50-200K EUR), notification des personnes concernees (RGPD = envoyer une lettre a chaque personne = cout postal + redaction), sanctions regulatoires (CNIL: jusqu a 4% CA mondial), reparation systemes, 2) Couts indirects: interruption business (chiffre d affaires perdu), reputation (etude: -3.2% valeur boursiere en moyenne), perte de clients, couts juridiques. IBM Cost of Data Breach 2024: cout moyen mondial = 4.88M USD, France: 4.2M EUR en moyenne","Les incidents de securite sont uniquement des couts IT","Le cout des incidents ne peut pas etre estime"],a:1,e:"ROI securite presentation: votre investissement securite = X EUR/an. Un incident evite = economie potentielle de 4M EUR. Probabilite d incident sans controles (estimation sectorielle): 15-30% par an. Expected Loss = probabilite x cout moyen = 0.20 x 4M = 800K EUR/an. Si vos controles reduisent la probabilite a 5%: Expected Loss = 0.05 x 4M = 200K. Economie annuelle = 600K. Investissement = 200K. ROI = 3x. Assurance cyber: la prime est basee sur la posture securite (Secure Score eleve = prime reduite). Inclure le cout de la prime dans le calcul."},
{id:2153,cat:"Endpoint Security",q:"Qu est-ce que l Application Control (Allowlisting) et comment l implementer ?",o:["L Allowlisting bloque toutes les applications","Application Control: uniquement les applications approuvees peuvent s executer sur les endpoints. Zero Trust pour les executables. Implementations: 1) Windows Defender Application Control WDAC (integre Windows): politiques basees sur les editeurs de logiciels (confiance en la signature Microsoft + editeurs approuves), hash de fichier, ou chemin, 2) AppLocker: version precedente (moins granulaire), 3) Intune: deploiement des politiques WDAC a grande echelle. Resultats: les malwares non-signes ou non dans la liste ne s executent pas meme avec des droits admin","L Allowlisting est uniquement pour les serveurs","L Allowlisting bloque aussi les mises a jour Windows"],a:1,e:"WDAC deployment: commencer en mode Audit (log les applications qui seraient bloquees sans bloquer) pendant 2-4 semaines -> analyser les logs -> identifier les applications legitimes non-couvertes -> les ajouter dans la politique. Puis passer en mode Enforce progressivement (un departement a la fois). Managed Installer: SCCM/Intune peuvent etre designes comme Managed Installers -> toutes les applications deployees via eux sont automatiquement autorisees. Cas d usage ideal: les workstations des caissieres, operateurs de production, etc. (usage tres limite = liste blanche facile a definir)."},
{id:2154,cat:"Concepts Avances",q:"Qu est-ce que la detection et reponse aux menaces dans les environnements OT/ICS ?",o:["Les environnements OT ne peuvent pas etre monitores","OT/ICS Security Monitoring: les systemes OT (SCADA, DCS, PLCs) ne peuvent pas supporter les agents de securite classiques. Solutions: 1) Monitoring passif: analyser le trafic reseau OT (Modbus, DNP3, EtherNet/IP, Profinet) sans perturber les systemes. 2) Microsoft Defender for IoT: detection passive des anomalies dans le trafic OT. 3) Purdue Model segmentation: isoler les niveaux OT (L0-L2) du reseau IT. 4) Asset inventory automatique: Defender for IoT construit automatiquement l inventaire des actifs OT en analysant le trafic","Les systemes OT sont intrinsequement securises","OT Security uniquement pour les grandes usines"],a:1,e:"OT incident response: les playbooks IR pour l IT ne s appliquent pas directement a l OT (vous ne pouvez pas juste eteindre un PLC qui controle une chaine de production critique). Plans IR OT specifiques: coordonner avec les ingenieurs de process, procedures de fallback manuel, coordination avec les fournisseurs OT. Impact physique potentiel: une attaque sur un systeme OT peut causer des dommages physiques (surcharge d equipement, arret de systemes critiques). Stuxnet, Triton/TRISIS, Industroyer = attaques OT reelles avec impact physique."},
{id:2155,cat:"Fondamentaux",q:"Qu est-ce que la gestion de la surface d attaque et comment la reduire ?",o:["La surface d attaque est uniquement le reseau","Attack Surface Management: inventaire et reduction de tous les vecteurs que les attaquants pourraient exploiter. Composantes: 1) External Attack Surface: tout ce qui est visible depuis Internet (IPs publiques, domaines, services exposes, emails des employes, code source public), 2) Internal Attack Surface: nombre d acces privilegies, systemes non-patches, identites surpermissionnees, 3) Digital footprint: what attackers can find about you (OSINT). Reduction: fermer les ports inutiles, patcher, reduire les privileges, MFA","La surface d attaque est uniquement les serveurs","La surface d attaque ne peut pas etre reduite"],a:1,e:"EASM (External Attack Surface Management): outils comme Microsoft Defender EASM, Shodan, Censys scannent continuellement Internet pour trouver vos actifs exposes. Decouverte: des actifs oublies (vieux serveurs, sous-domaines abandonnes) qui ne sont plus geres mais toujours exposes. Un sous-domaine abandonne peut etre repris par un attaquant (subdomain takeover). Action: inventaire mensuel des actifs Internet, desactiver et depublier les actifs inutiles. Metric: nombre d actifs exposes sur Internet (tendance a la baisse = amelioration)."},
{id:2156,cat:"Cloud Security",q:"Qu est-ce que le Cloud Access Security Broker CASB et quels problemes resout-il ?",o:["Un antivirus specialise pour le cloud","CASB: proxy de securite entre les utilisateurs et les services cloud SaaS. Resout: 1) Shadow IT visibility: quelles apps cloud utilisent vos employes?, 2) Data security: empecher le telechargement de donnees sensibles vers des apps non-sanctionnees (Dropbox personnel), 3) Threat protection: detecter les comptes compromis (connexion depuis un pays inhabituel, acces massif de donnees), 4) Compliance: s assurer que les apps SaaS respectent vos exigences reglementaires (RGPD, PCI DSS). Produits: Microsoft Defender for Cloud Apps, Netskope, McAfee MVISION, Palo Alto Prisma SaaS","Un outil de monitoring des applications","Un VPN pour les apps cloud"],a:1,e:"CASB deployment modes: 1) API-based (out-of-band): se connecte directement aux APIs des apps SaaS (Office 365, Salesforce, Box) pour voir les activites et gouverner les donnees. Ne voit pas le trafic en temps reel. 2) Proxy (in-line): tout le trafic passe par le CASB (reverse proxy ou forward proxy). Voit tout en temps reel = protection et monitoring complets. 3) Combine: Microsoft MDCA utilise les deux. Avantage: meme les apps cloud officielles peuvent etre governees (ex: SharePoint = app sanctionnee mais un employe qui telecharge tout le site = anomalie detectee)."},
{id:2157,cat:"Gestion des Identites",q:"Qu est-ce que le concept de Identity Fabric et pourquoi est-il important dans les organisations hybrides ?",o:["Une technologie specifique Microsoft","Identity Fabric: architecture qui unifie la gestion des identites a travers tous les environnements (cloud, on-premises, multi-cloud, partenaires externes). Composantes: 1) Identity Provider central (Azure AD/Entra ID), 2) Federation avec les autres IdPs (SAML, OIDC), 3) Governance (Access Reviews, Entitlement Management), 4) Intelligence (Identity Protection, UEBA), 5) Zero Trust enforcement (Conditional Access). Objectif: une seule vue de TOUTES les identites de l organisation (employes, partenaires, workloads, appareils)","Un outil uniquement pour les grandes enterprises","Un remplacant de Active Directory"],a:1,e:"Identity Fabric vs Identity Silos: sans Identity Fabric, l organisation a: Azure AD pour le cloud, AD on-premises, un IdP pour les partenaires, un systeme separé pour les clients = 4 silos, 4 consoles, 4 politiques differentes = difficile a governer et a auditer. Avec Identity Fabric: un point de controle central (Azure AD) avec des connexions vers tous les autres systemes. Audit unifie: tous les acces de toutes les identites dans un seul log. Deprovisioning: un employe quitte -> une action dans Azure AD -> acces revoque partout (AD sync + SCIM vers SaaS)."},
{id:2158,cat:"Incident Response",q:"Comment organiser et documenter un plan de continuité d activite BCP apres un incident cybersécurite majeur ?",o:["La continuité n est pas du ressort de la securite","BCP Cyber-focused: 1) Identification des processus critiques: quels processus metier ne peuvent s arreter (paie, production, sante en direct), 2) RTO/RPO par processus: Paie = RTO 24h, RPO 24h. Production = RTO 4h, RPO 1h, 3) Scenarios de crise: ransomware (tout chiffre), compromission Admin, DDoS, 4) Procedures de basculement: procedures manuelles si les systemes IT sont indisponibles (workflow papier de secours), 5) Communication de crise: qui informe qui (clients, regulateurs, medias, employes), 6) Recovery procedures: ordre de priorite de remise en service","La BCP n est pas lie a la cybersecurite","Un plan IT de backup suffit"],a:1,e:"BCP Ransomware scenario: Jour 1 - Detection: isoler les systemes compromis. Activer les procedures manuelles pour les processus critiques. Notifier la direction et le Comite de crise. Jour 1-2 - Evaluation: etendue du ransomware, sauvegardes disponibles et intactes? Notifier les autorites (ANSSI en France, CNIL si donnees personnelles affectees). Jour 2-7 - Recovery: restaurer depuis les sauvegardes immutables. Reinstaurer les systemes par ordre de criticite. Post-incident: forensique et remediation complete avant de reconnecter les systemes isoles. La BCP transforme une catastrophe en incident gerable."},
{id:2159,cat:"Frameworks/Conformite",q:"Comment conduire une analyse d ecart de securite Gap Analysis par rapport a une norme comme NIST CSF ?",o:["Un ecart s analyse en comparant des checklists","Gap Analysis NIST CSF: 1) Scope: definir le perimetre de l analyse (toute l organisation ou un systeme specifique), 2) Current state: evaluer les controles existants (documentation, interviews, tests techniques), 3) Target state: choisir le profil cible NIST CSF (Tier 1 a Tier 4 selon les risques), 4) Gap identification: pour chaque fonction NIST (Identify, Protect, Detect, Respond, Recover), noter les controles absents ou insuffisants, 5) Prioritization: prioriser les gaps par risque et impact, 6) Roadmap: plan d action avec budget et calendrier","Un audit annuel suffit","Un Gap Analysis est uniquement pour les grandes organisations"],a:1,e:"NIST CSF 2.0 (2024): nouvelle version avec l ajout de la fonction Govern (gouvernance de la cybersecurite comme fondation). 6 fonctions: Govern, Identify, Protect, Detect, Respond, Recover. Gap Analysis output: tableau avec les 6 fonctions, les sous-categories, le niveau actuel (rouge/orange/vert), le niveau cible, et les actions pour combler le gap. Prioritisation: les gaps dans Govern et Identify sont souvent les plus critiques (si vous ne savez pas ce que vous avez, vous ne pouvez pas le proteger). Revue annuelle du Gap Analysis."},
{id:2160,cat:"Securite des Applications",q:"Qu est-ce que la securite des APIs REST et quelles sont les mesures essentielles ?",o:["Les APIs REST sont intrinsequement securisees","API REST Security essentials: 1) Authentification: OAuth 2.0 + OpenID Connect (tokens JWT), pas de Basic Auth. 2) Autorisation: RBAC sur chaque endpoint, verifier les permissions a chaque requete (BOLA prevention). 3) HTTPS uniquement (TLS 1.2 minimum). 4) Rate Limiting: 100-1000 requetes/minute par client selon le cas d usage. 5) Input Validation: rejeter les inputs invalides (schema validation avec JSON Schema). 6) Output Filtering: retourner uniquement les champs necessaires (pas tous les attributs de l objet). 7) API Gateway: centralise la securite","Les APIs n ont pas besoin de securite specifique","La securite API est uniquement pour les APIs publiques"],a:1,e:"JWT Security: les JWTs ne sont pas chiffres par defaut (juste base64 encoded) -> ne pas mettre de donnees sensibles dans le payload. Utiliser RS256 ou ES256 (asymetrique) plutot que HS256 (symetrique) pour les APIs publiques. Expiration courte: access token = 15 minutes, refresh token = 7 jours (balance securite/UX). API Gateway benefits: Azure API Management centralise: auth, rate limiting, logging, schema validation, transformation. Les microservices n ont plus a implementer chacun ces controles."}
];

const SC401_QUESTIONS = [
{id:3001,cat:"Sensitivity Labels",q:"Qu'est-ce qu'un 'Sensitivity Label' dans Microsoft Purview et comment fonctionne-t-il ?",o:["Un tag de classification sans effet","Un label appliqué aux documents/emails qui: 1) Classe la donnée (Confidential, Highly Confidential), 2) Applique une protection RMS (chiffrement, restrictions d'accès, expiration), 3) Applique des marquages visuels (en-tête, pied de page, filigrane), 4) Contrôle le comportement dans les apps Office et Teams. Le label voyage avec le document","Un outil de recherche de documents sensibles","Un système d'archivage"],a:1,e:"Sensitivity Labels (Purview): créés dans le Compliance Center, publiés via des politiques, appliqués manuellement ou automatiquement. Le label encode: chiffrement (qui peut ouvrir, avec quels droits), marquages visuels, et peut trigger des politiques DLP. Le label est stocké dans les métadonnées du fichier Office (custom XML part) ou dans les en-têtes email."},
{id:3002,cat:"Sensitivity Labels",q:"Quelle est la différence entre 'Label encryption' et 'Label visual markings' dans Purview ?",o:["Ils sont identiques","Label encryption: protège le contenu via Azure RMS (AES-256 + politique d'accès intégrée dans le fichier, qui peut lire/modifier/imprimer/copier). Visual markings: éléments visuels (en-tête 'CONFIDENTIEL', pied de page, filigrane) ajoutés au document sans protection technique - informatifs uniquement. Le chiffrement est la vraie protection, les marquages sont la sensibilisation","Le chiffrement remplace les marquages","Les marquages sont plus importants que le chiffrement"],a:1,e:"Marquages visuels (header/footer/watermark) informent l'utilisateur mais n'empêchent pas techniquement la copie ou l'envoi externe. Le chiffrement RMS protège réellement: même si le fichier est volé/exfiltré, l'attaquant ne peut pas l'ouvrir sans les droits. Les deux sont complémentaires mais le chiffrement est la protection technique effective."},
{id:3003,cat:"Sensitivity Labels",q:"Scénario: Un avocat doit envoyer un contrat 'Highly Confidential' à un client externe (domaine non Azure AD). Comment le chiffrement Purview gère-t-il ça ?",o:["Le label chiffrement ne peut pas être ouvert par des externes","Options: 1) Configurer le label pour 'Any authenticated users' (Azure AD, Google, Microsoft account), 2) Accès par email (OTP: le destinataire reçoit un code à usage unique), 3) Partage avec permissions explicites pour des domaines/emails spécifiques. Le RMS viewer (gratuit) ou Office 365 ouvre le document chiffré","Créer un compte externe pour chaque client","Supprimer le label pour l'envoi externe"],a:1,e:"Purview RMS pour externes: configurer le label pour accepter 'Any authenticated user' (le destinataire s'authentifie via son compte Google/Microsoft pour accéder). Pour les destinataires sans compte compatible: 'Authenticated email' mode (Azure AD Issues un OTP par email pour accéder une fois). Les destinataires ont l'expérience Office ou RMS Viewer (PDF, etc.)."},
{id:3004,cat:"Sensitivity Labels",q:"Qu'est-ce que l'auto-labeling dans Purview et ses deux modes ?",o:["L'assignation automatique de labels via une politique IT","Client-side auto-labeling: Office montre une recommandation ou applique automatiquement un label quand du contenu sensible est détecté dans le document ouvert. Service-side auto-labeling: politique sur SharePoint/OneDrive/Exchange qui scanne et label les fichiers existants et nouveaux sans intervention utilisateur","L'assignation manuelle par les utilisateurs","Un plugin pour les apps tierces"],a:1,e:"Deux modes auto-labeling: 1) Client-side (via la policy publiée dans Office/Teams): affiche une recommendation ou applique automatiquement quand l'utilisateur crée/modifie un document. 2) Service-side (dans Compliance Center → Auto-labeling policies): scanne SharePoint/OneDrive/Exchange au repos et en transit, labelize automatiquement sans que l'utilisateur ouvre le fichier. Service-side = scale massif."},
{id:3005,cat:"Sensitivity Labels",q:"Comment configurer les Sensitivity Labels pour Microsoft Teams (sites SharePoint, groupes) ?",o:["Les labels Teams ne sont pas encore disponibles","Labels avec scope 'Groups & sites': contrôlent les paramètres de confidentialité des Teams (Public/Private), l'accès des utilisateurs externes (inviter ou non), la conformité du stockage (SharePoint associé au Team), et le partage externe. Permettent d'appliquer des contrôles au niveau du conteneur (Team/Site) pas seulement des fichiers","Labels uniquement pour les fichiers","Uniquement via PowerShell"],a:1,e:"Labels 'Groups & Sites' scope: quand créé avec ce label → le Team/site hérite des settings: privacité (Public vs Private), accès externes (activer/désactiver les invités AAD B2B), partage externe SharePoint (Anyone, New & existing guests, Existing guests only, Only people in your org), et device access conditions. Gouvernance automatique des nouveaux Teams créés."},
{id:3006,cat:"Sensitivity Labels",q:"Scénario: Des utilisateurs appliquent des labels inférieurs à ce qui est requis pour éviter le chiffrement. Comment enforcer ?",o:["Former uniquement les utilisateurs","1) Mandatory labeling (politique: 'require users to apply a label' - pas de document sans label), 2) Default label (label par défaut attribué automatiquement si l'utilisateur n'en choisit pas), 3) Label justification (exiger une raison pour downgrade un label), 4) DLP policy (détecter les documents Confidential sans label approprié)","Bloquer toutes les pièces jointes","Surveiller manuellement"],a:1,e:"Enforcement des labels: Mandatory labeling = plus possible de sauvegarder sans label. Default label = au moins le label minimal est appliqué. Downgrade justification = l'utilisateur doit justifier pourquoi il réduit le niveau (loggé dans l'audit). DLP peut bloquer l'envoi si le label est insuffisant pour le contenu (ex: contenu PII sans label Confidential)."},
{id:3007,cat:"Sensitivity Labels",q:"Qu'est-ce que 'Double Key Encryption (DKE)' et quand l'utiliser ?",o:["Un chiffrement AES-256 amélioré","DKE utilise DEUX clés: une clé Microsoft (Key 1 dans Azure) + votre propre clé (Key 2 dans votre infrastructure on-premises). SEUL vous pouvez déchiffrer (car Microsoft n'a pas Key 2). Requis pour les données ultra-sensibles où même Microsoft ne doit pas pouvoir accéder. Cas: gouvernements, défense, secteurs hautement réglementés","Un chiffrement deux fois plus fort","Un standard de chiffrement international"],a:1,e:"DKE use case: quand Customer-Managed Key (CMK) ne suffit pas (Microsoft pourrait théoriquement accéder si forcé légalement). DKE: Microsoft + vous = déchiffrement impossible sans les deux. Déploiement: service DKE on-premises (votre infrastructure) + endpoint DKE service (labeling), configuration complexe. Limites: pas d'eDiscovery possible sur le contenu DKE (Microsoft ne peut pas indexer)."},
{id:3008,cat:"Sensitivity Labels",q:"Comment les Sensitivity Labels interagissent-ils avec Microsoft 365 Copilot ?",o:["Copilot ignore les labels","M365 Copilot respecte les Sensitivity Labels: 1) Copilot ne peut pas accéder aux documents qu'un utilisateur n'a pas le droit de voir, 2) Les réponses Copilot générées depuis des documents labellisés héritent du label le plus restrictif des sources, 3) Les prompts et réponses sont protégés par les labels de données de l'organisation","Copilot supprime les labels","Copilot ne supporte pas les labels pour les documents Word"],a:1,e:"Copilot + Labels: le Copilot opère avec les permissions de l'utilisateur (il ne peut pas accéder à des documents auxquels l'utilisateur n'a pas accès). Les réponses Copilot héritent du label le plus restrictif des sources utilisées (label inheritance). Microsoft Information Protection audit logs trackent les documents utilisés par Copilot dans ses réponses."},
{id:3009,cat:"DLP Policies",q:"Qu'est-ce que 'Microsoft Purview DLP' et ses workloads supportés ?",o:["Un outil uniquement pour les emails","Purview DLP protège les données dans: Exchange Online (email), SharePoint Online, OneDrive, Teams (messages et fichiers), Endpoint (Windows 10+ avec MDE intégré: copier-coller, print, upload, clipboard), Power BI, et Microsoft 365 Copilot. Une seule politique peut couvrir tous ces workloads simultanément","Uniquement SharePoint et OneDrive","Uniquement les emails Exchange"],a:1,e:"DLP multi-workload: une politique DLP peut cibler simultanément Exchange (email), SharePoint/OneDrive (fichiers), Teams (messages), Endpoint (actions locales sur les appareils), et des apps tierces via MDCA. Cela garantit une protection cohérente quelle que soit la façon dont les données sont manipulées."},
{id:3010,cat:"DLP Policies",q:"Comment configurer une politique DLP pour détecter les numéros de carte de crédit et bloquer leur partage externe ?",o:["Configurer un filtre email","Dans Purview Compliance Center: créer une DLP Policy → sélectionner locations (Exchange, SharePoint, Teams, Endpoint) → créer une règle avec condition 'Content contains Sensitive Information Type: Credit Card Number' (avec confidence level High et instance count) + exception (documents dans le site équipe Finance) → action: Block sending to external AND notify user AND alert admin","Configurer uniquement un NSG","Un filtre antispam"],a:1,e:"Config DLP pour PCI: condition = SIT 'Credit Card Number' avec count >1 ET confidence >85%. Exclusions: groupes de sécurité Finance autorisés. Actions: Email/Teams/SPO external sharing blocked, user notification with policy tip, admin email alert, audit log. Mode Simulation d'abord (voir les faux positifs avant d'activer Block)."},
{id:3011,cat:"DLP Policies",q:"Scénario: Votre politique DLP génère trop de faux positifs pour les numéros de facture (ressemblent à des numéros de CB). Comment affiner ?",o:["Désactiver le SIT Credit Card","1) Créer un SIT personnalisé avec exceptions (prefix/suffix: numéros commençant par 'FACT-'), 2) Modifier les règles du SIT Credit Card (ajuster le confidence level plus haut), 3) Ajouter des exclusions (certaines apps ou utilisateurs), 4) Utiliser l'EDM (Exact Data Match) pour matcher uniquement des numéros réels de la liste de cartes réelles","Supprimer la règle DLP","Augmenter le seuil à 100 occurrences"],a:1,e:"Réduction des faux positifs DLP: 1) Ajuster confidence level (95% plutôt que 75%), 2) Augmenter l'instance count minimum (>3 CC numbers), 3) Ajouter des exceptions (utilisateurs, groupes, domaines approuvés), 4) Créer un SIT personnalisé qui exclut les patterns de vos numéros de facture (regex negation), 5) Mode simulation pour mesurer l'impact avant enforcement."},
{id:3012,cat:"DLP Policies",q:"Qu'est-ce que 'Endpoint DLP' dans Purview et comment diffère-t-il du DLP cloud ?",o:["Une extension du DLP pour les emails","Endpoint DLP (Windows 10/11 + MDE) contrôle les actions sur les FICHIERS LOCAUX sur les appareils managés: copier-coller vers des apps non autorisées (Notepad→upload site web), imprimer, copier sur USB/réseau, upload vers des cloud apps non autorisées, screenshot, et accès par des apps non autorisées. DLP cloud = contenu partagé via les services cloud (SPO, Exchange)","Identique au DLP cloud","Un DLP pour les serveurs on-premises uniquement"],a:1,e:"Endpoint DLP étend la protection aux actions locales: bloquer copier-coller d'un document Confidential vers Chrome/Edge (vers un site non approuvé), bloquer l'impression de PII, bloquer la copie USB (ou autoriser seulement les clés chiffrées), alerter quand un fichier sensible est ouvert par une app non approuvée (ex: un viewer PDF tiers). Requiert l'agent MDE sur le poste."},
{id:3013,cat:"DLP Policies",q:"Scénario: Un employé copie des données clients dans une clé USB non chiffrée. Comment Endpoint DLP peut-il prévenir ça ?",o:["Désactiver tous les ports USB via GPO","Endpoint DLP policy: condition = 'Content contains SIT Customer PII' + Device action = 'Copy to USB' → Action = Block + Notify user + Alert admin. Option: Allow uniquement les clés USB chiffrées (Device control: allow removable storage class SEULEMENT si BitLocker encrypted). Log l'action dans le portail Compliance","Interdire tous les supports externes","Surveiller manuellement les logs Windows"],a:1,e:"Endpoint DLP + Device Control: créer une policy qui bloque la copie de fichiers labellisés Confidential sur USB (ou tous fichiers avec PII selon SIT). Option plus flexible: Device Control policy autoriser USB uniquement si chiffrés BitLocker (identifiés par le hardware ID). Les tentatives bloquées apparaissent dans le Compliance Activity Explorer pour investigation."},
{id:3014,cat:"DLP Policies",q:"Qu'est-ce que l'EDM (Exact Data Match) dans Purview DLP ?",o:["Une technologie de scan de documents","Un SIT qui fait correspondre des données exactes d'une base de données (ex: une table d'employés avec noms+SSN+DOB) avec le contenu scanné. Évite les faux positifs (numéros aléatoires ressemblant à des SSN) car seuls les vrais enregistrements de votre base de données correspondent. Plus précis pour les données structurées","Un outil d'identification des documents dupliqués","Une base de données de patterns de données sensibles"],a:1,e:"EDM est très précis: uploader votre table (ex: 10 000 lignes de clients avec SSN+prénom+DOB hachée de façon sécurisée), créer un SIT EDM qui cherche ces combinaisons exactes dans les documents scannés. Résultat: détecte 'Jean Dupont SSN 123-45-6789' uniquement si Jean Dupont est VRAIMENT dans votre base, pas tous les patterns SSN-like. Très peu de faux positifs."},
{id:3015,cat:"DLP Policies",q:"Comment auditer l'efficacité d'une politique DLP et quels KPIs suivre ?",o:["Uniquement le nombre d'alertes","Via le DLP Reports et Activity Explorer: Top rule violations, Top users with violations, False positive rate (overrides manuels), true positive (confirmed DLP incidents), blocked actions count, policy tips shown vs ignored. KPIs: FP rate (<5% cible), detection rate (combien de vraies violations détectées), user override rate (signal de faux positifs ou de contournement)","Uniquement les alertes admin","Rapport annuel uniquement"],a:1,e:"Mesurer l'efficacité DLP: Activity Explorer (toutes les activités DLP: matched, blocked, overridden), DLP Reports (violations par user/location/rule), Override Rate (si les users overrident fréquemment = FP ou rule trop agressive), False Positive investigation (examiner les incidents 'justified' pour affiner les règles), et Coverage (% de workloads couverts vs total)."},
{id:3016,cat:"Rétention et Records",q:"Quelle est la différence entre 'Retention Labels' et 'Sensitivity Labels' dans Purview ?",o:["Ils sont identiques","Sensitivity Labels: classification de la CONFIDENTIALITÉ (qui peut voir, avec quel niveau de sécurité). Retention Labels: politique de CONSERVATION du contenu (combien de temps garder/supprimer les données). Un document peut avoir les deux. Ex: 'Confidential' (sensibilité) + 'Financial-7years' (rétention)","Les deux servent à classer","Retention Labels remplacent Sensitivity Labels"],a:1,e:"Dual labeling: Sensitivity = protection (chiffrement, DLP), Retention = lifecycle (conserver 7 ans puis supprimer, ou conserver indéfiniment pour les records). Ils sont indépendants mais complémentaires. Un email peut être 'Confidential' (sensitivity) et 'HR-5years' (retention). Purview Records Management gère le cycle de vie via les Retention Labels."},
{id:3017,cat:"Rétention et Records",q:"Scénario: Une entreprise doit conserver les emails des traders financiers pendant 7 ans selon la réglementation (MiFID II). Comment implémenter ?",o:["Archive manuelle chaque année","1) Retention Label 'FinancialCommunication-7years' avec action 'Retain and then delete after 7 years', 2) Auto-apply policy sur Exchange pour les emails des traders (basée sur leur groupe AD), 3) Les emails sont conservés dans la Preservation Hold Library même si supprimés par l'utilisateur, 4) eDiscovery disponible pour les audits régulateurs","Backup Exchange tous les ans","Configurer un filtre anti-suppression"],a:1,e:"MiFID II compliance via Purview Retention: label avec 7 ans de rétention auto-appliqué aux boîtes des traders. Même si l'utilisateur supprime l'email, il reste dans la Preservation Hold Library (invisible pour l'utilisateur, disponible via eDiscovery). Litigation Hold peut aussi être utilisé. L'email est définitivement supprimé uniquement après 7 ans."},
{id:3018,cat:"Rétention et Records",q:"Qu'est-ce qu'un 'Record' dans Purview Records Management et comment diffère-t-il d'un contenu normal ?",o:["Tout document classifié","Un 'Record' est un document déclaré comme record légal via un Retention Label avec 'Mark items as a record'. Une fois déclaré: il ne peut plus être modifié ni supprimé par l'utilisateur (immutable), la suppression nécessite une approbation (disposition review), et l'audit trace toutes les activités sur le record. Essentiel pour la conformité légale","Un document chiffré","Un document dans SharePoint"],a:1,e:"Records Management: un document devient record via un label 'Mark as record' ou 'Mark as regulatory record' (encore plus strict: même les admins ne peuvent pas le supprimer). Workflow de disposition: à l'expiration de la rétention, un reviewer approuve la suppression définitive ou prolonge la rétention. Audit trail complet de toute la vie du record."},
{id:3019,cat:"Rétention et Records",q:"Comment gérer les conflits entre plusieurs Retention Policies s'appliquant au même contenu ?",o:["La plus récente gagne","Règles de priorité Purview: 1) Retention Label > Retention Policy (labels priment sur les policies), 2) Si plusieurs politiques, la plus longue durée de rétention gagne (principe de conservation maximale), 3) Delete prend moins de priorité que Retain (si une policy dit conserver et une autre dit supprimer: conservation gagne)","La première configurée gagne","Les deux s'appliquent et créent des conflits"],a:1,e:"Priorité des conflits Purview: Retention Label (appliqué sur un item spécifique) > Retention Policy (appliquée à un scope plus large). Entre policies: la plus longue période gagne (une policy 7 ans + une policy 3 ans = l'item est conservé 7 ans). Entre 'retain' et 'delete': toujours conserver gagne (protection légale maximale). Concevoir les policies sans conflits pour simplifier."},
{id:3020,cat:"Rétention et Records",q:"Qu'est-ce que 'Adaptive Scopes' dans les Retention Policies de Purview ?",o:["Des politiques qui s'adaptent automatiquement aux nouvelles menaces","Des portées de politique définies dynamiquement via des requêtes (ex: 'tous les utilisateurs du département Finance', ou 'tous les sites SharePoint créés après 2020'). Contrairement aux static scopes, les adaptive scopes se mettent à jour automatiquement quand des utilisateurs rejoignent/quittent le département - pas besoin de modifier manuellement la politique","Un type de label dynamique","Une fonctionnalité pour les admins avancés"],a:1,e:"Adaptive Scopes: définir un scope via une requête AAD (ex: Department = 'Finance') ou une requête SharePoint. Quand un nouvel employé rejoint Finance → automatiquement couvert par la retention policy Finance. Quand quelqu'un quitte Finance → retiré de la scope. Plus maintenable que les static scopes (listes manuelles à mettre à jour)."},
{id:3021,cat:"Communication Compliance",q:"Qu'est-ce que 'Communication Compliance' dans Purview et pour quels secteurs est-il critique ?",o:["Un outil de surveillance des emails pour HR","Un outil qui analyse les communications M365 (emails, Teams, Viva Engage) via le ML pour détecter: harcèlement/discrimination, informations financières privilégiées (insider trading), violations de politique interne. Critical: secteurs financiers (FINRA, MiFID II supervision), santé, et grandes entreprises pour la conformité HR","Un outil de spam","Un système de backup des communications"],a:1,e:"Communication Compliance (ex-Supervision) cible: Finance (supervision des communications des traders/conseillers financiers pour la conformité FINRA/AMF), Healthcare (HIPAA communications), Code of Conduct (détecter harcèlement via ML), et Regulatory compliance (MON IQ pour la surveillance). Les reviewers voient seulement les communications flagguées, pas tout."},
{id:3022,cat:"Communication Compliance",q:"Scénario: Un trader envoie des informations privilégiées par Teams à un ami extérieur. Comment Communication Compliance détecte-t-il ça ?",o:["Impossible via Teams","Politique CC sur Teams avec conditions: 1) Expéditeur = groupe 'Traders', 2) Domaine destinataire = externe, 3) Contenu matches = dictionnaire de termes financiers sensibles (ex: 'bénéfices non publiés', 'acquisition imminente', 'résultats Q3'). La communication est capturée pour review par le compliance officer","Via un log réseau uniquement","Uniquement si détecté par l'IA"],a:1,e:"Configuration CC pour insider trading: créer une policy avec Traders comme scope, conditions: communication externe (hors tenant) OU utilisation de termes financiers critiques (custom keyword dictionary: 'insider', 'acquisition', 'résultats non publiés', noms de codes d'acquisition). Les communications flagguées vont dans la review queue du Compliance Officer (avec anonymisation optionnelle)."},
{id:3023,cat:"Communication Compliance",q:"Quelles sont les protections de vie privée intégrées dans Communication Compliance ?",o:["Il n'y a pas de protection vie privée","1) Pseudonymisation: les noms peuvent être anonymisés pour les reviewers (voir 'User A' au lieu du vrai nom jusqu'à confirmation d'une violation), 2) RBAC séparé (les reviewers CC ne voient pas les communications non flagguées), 3) Audit des actions des reviewers eux-mêmes, 4) Notice aux employés recommandée dans la charte informatique, 5) Limiter à des scopes spécifiques (pas l'ensemble de l'organisation)","Les communications sont entièrement exposées aux admins","Les communications sont chiffrées et invisibles"],a:1,e:"Privacy in Communication Compliance: pseudonymisation (reviewer voit 'John D.' anonymisé jusqu'à investigation formelle), scope limité (pas toute l'org, cibler les rôles à risque réglementaire), notice préalable dans la Acceptable Use Policy, audit log des actions des reviewers (qui a vu quoi), et séparation des rôles (Compliance Admin ≠ reviewer, reviewer ≠ investigator)."},
{id:3024,cat:"Insider Risk Management",q:"Quels sont les signaux utilisés par Insider Risk Management dans Purview ?",o:["Uniquement les emails","Signaux M365: SharePoint/OneDrive (téléchargements massifs, partage externe anormal), Exchange (emails avec PJ vers extérieur), Teams (messages suspects), Azure AD (connexions risquées), MDE (activités sur devices), HR triggers (date de départ imminente de SIRH), Compliance (violations DLP répétées), Defender for Cloud Apps (activités SaaS anormales)","Uniquement les downloads","Uniquement les violations DLP"],a:1,e:"IRM combine des signaux de multiples sources: HR departure dates → augmente la sensibilité pour les departing employees, DLP violations fréquentes → signal d'exfiltration potentielle, downloads massifs SharePoint juste avant départ → pattern 'flight risk', downloads de nuit ou weekend anormaux → comportement déviant. Le score de risque combine tous ces signaux."},
{id:3025,cat:"Insider Risk Management",q:"Scénario: Comment configurer IRM pour détecter un employé qui part chez un concurrent et emmène des données ?",o:["Surveiller manuellement les logs de tous les employés","Policy IRM 'Data Theft by Departing Users': connecter le système HR (SCIM/API), quand la date de départ est saisie dans HR → IRM démarre une période de surveillance renforcée. Détecte: séquence Téléchargement massif OneDrive → Envoi par email externe → Usage d'applications de stockage cloud non autorisées dans les 30 jours avant le départ","Analyser les emails de cet employé uniquement","Désactiver l'accès immédiatement"],a:1,e:"IRM Data Theft Departing: trigger = date de départ HR importée. Indicateurs: téléchargements massifs SharePoint/OneDrive, copier vers USB (Endpoint DLP signal), email avec PJ vers email personnel ou concurrent connu, accès à des fichiers rarement consultés (gathering intelligence). Alert threshold = score cumulé. L'analyst voit une timeline des activités dans la case management interface."},
{id:3026,cat:"Insider Risk Management",q:"Quelles mesures de vie privée Purview IRM applique-t-il par défaut ?",o:["Aucune protection vie privée","Par défaut: les noms d'utilisateurs sont pseudonymisés dans les alertes IRM (investigateur voit 'User A' non-identifié), la pseudonymisation est levée uniquement quand l'investigation est confirmée et formellement ouverte (avec approbation), les activités d'investigation sont auditées, et le RGPD requiert de mentionner cette surveillance dans la politique RH","Les alertes montrent le nom complet","Les communications sont visibles sans restriction"],a:1,e:"Privacy IRM: pseudonymisation par défaut (pseudonymous user identifiers = 'User A'), opt-in pour voir les vrais noms (nécessite un rôle élevé et justification), notices dans la politique RH (informer les employés de la possibilité de surveillance), audit trail de qui a levé l'anonymisation, et data minimization (uniquement les activités flagguées sont visibles, pas tout l'historique)."},
{id:3027,cat:"Insider Risk Management",q:"Qu'est-ce que les 'Adaptive Protection' dans Purview IRM et comment s'intègre-t-il avec DLP ?",o:["Un mode de protection manuelle","Adaptive Protection intègre IRM et DLP: les utilisateurs avec un score de risque IRM élevé se voient automatiquement appliquer des politiques DLP plus strictes (ex: bloquer tous les envois externes jusqu'à que le risque baisse). Les utilisateurs à faible risque ont moins de restrictions. Ajustement dynamique des contrôles selon le comportement individuel","Une protection pour les équipes IT","Un type de politique DLP avancée"],a:1,e:"Adaptive Protection: IRM évalue le risque utilisateur (Low/Medium/High/Critical). DLP Adaptive Protection: si risque IRM = High → appliquer la politique DLP la plus stricte automatiquement (bloquer tout partage externe). Si risque baisse → revenir aux restrictions normales. Permet des contrôles proportionnels au risque sans surveiller tout le monde avec les mêmes restrictions."},
{id:3028,cat:"eDiscovery et Audit",q:"Qu'est-ce que 'Content Search' vs 'eDiscovery Standard' vs 'eDiscovery Premium' dans Purview ?",o:["Ce sont des fonctionnalités identiques","Content Search: recherche simple sans case management (pas de hold). Standard eDiscovery: + Legal Holds + export pour les petites investigations. Premium eDiscovery: + ML pour réduire le volume (predictive coding), custodian management, processing (OCR, email threading), review sets, et deep analysis. Chaque niveau ajoute des capacités pour les investigations plus complexes","Content Search est la version premium","eDiscovery Premium est pour les gouvernements uniquement"],a:1,e:"Progression eDiscovery: Content Search (chercher et exporter, pas de hold, pour admin) → Standard (cases, legal holds sur boîtes/SPO, export pour avocats) → Premium (custodians, Advanced Indexing, near-duplicate detection, email threading, predictive coding ML qui réduit le volume à reviewer de 90%, review sets pour collaboration avec avocats). Premium requis pour les grandes investigations."},
{id:3029,cat:"eDiscovery et Audit",q:"Scénario: Votre organisation reçoit une demande de découverte légale (legal hold) pour tous les emails et fichiers d'un employé pour une période de 3 ans. Que faire ?",o:["Exporter manuellement les emails","1) Créer un eDiscovery case (Standard ou Premium), 2) Ajouter le custodian (l'employé), 3) Créer un Legal Hold sur la boîte Exchange + OneDrive de l'employé pour la période concernée (empêche suppression), 4) Exécuter une Content Search dans le case avec les critères de date, 5) Exporter les résultats (PST pour emails, fichiers pour SPO/OD), 6) Remettre à l'équipe légale","Désactiver le compte de l'employé","Contacter Microsoft Support"],a:1,e:"eDiscovery standard workflow: Case creation → Place on Hold (custodian's mailbox + SPO/OneDrive → tous les items sont conservés indépendamment des policies de rétention) → Search (KQL query avec date range, keywords, sender/recipient) → Review (dans le portail ou exporter PST/ZIP) → Export for legal team. La mise sous Legal Hold préserve immédiatement les données."},
{id:3030,cat:"eDiscovery et Audit",q:"Qu'est-ce que 'Microsoft Purview Audit (Standard vs Premium)' ?",o:["Uniquement les logs de connexion","Audit Standard: journal des activités M365 (Exchange, SharePoint, Teams, Azure AD) conservé 90 jours, pour la plupart des organisations. Audit Premium (anciennement Advanced Audit): rétention 1 an (ou 10 ans avec add-on), plus d'événements critiques (MailItemsAccessed pour détecter les accès à des emails spécifiques), accès haute-valeur aux événements pour les investigations forensiques","Uniquement les logs de sécurité","Uniquement pour les grandes entreprises"],a:1,e:"Audit Premium avantages: MailItemsAccessed (crucial pour investiguer les BEC: quels emails l'attaquant a lus), SearchQueryInitiated (qui a cherché quoi dans Exchange/Teams), MessageSent (journalise tous les emails envoyés). Rétention 1 an (vs 90 jours Standard). Pour les investigations forensiques avancées (BEC, insider threat, account compromise), Audit Premium est essentiel."},
{id:3031,cat:"eDiscovery et Audit",q:"Scénario: Vous enquêtez sur un compte compromis M365. Comment utiliser Purview Audit pour reconstituer les actions de l'attaquant ?",o:["Impossible via Purview Audit","1) Identifier la fenêtre temporelle (depuis quand compromis via SigninLogs), 2) Rechercher dans Audit log: Exchange MailItemsAccessed (quels emails lus), FileAccessed (SharePoint), SearchQueryInitiated (ce qu'il a cherché), OutlookItemCreated (règles créées), 3) Corréler avec AAD SigninLogs pour les connexions, 4) Vérifier les règles inbox Exchange (InboxRuleCreated)","Contacter Microsoft pour les logs","Uniquement via les logs de connexion"],a:1,e:"Investigation BEC via Audit: chercher l'activité du compte compromis avec Audit Premium: MailItemsAccessed (a-t-il lu les emails financiers?), InboxRuleCreated (a-t-il créé des règles de redirection?), SearchQueryInitiated (a-t-il cherché des termes financiers?), FileDownloaded depuis SPO (exfiltration?). Timeline complète = reconstituer les actions de l'attaquant sur les données."},
{id:3032,cat:"Information Barriers",q:"Qu'est-ce que 'Information Barriers' dans Purview et quand l'utiliser ?",o:["Un système de filtrage email basique","Des politiques qui empêchent la communication ET la collaboration entre des groupes définis dans Teams, SharePoint, et OneDrive. Cas d'usage: conflits d'intérêts entre équipes (ex: empêcher l'équipe M&A de communiquer avec les traders), réglementation financière (muraille de Chine), et séparation des données entre filiales concurrentes","Un contrôle d'accès RBAC","Un filtre anti-spam avancé"],a:1,e:"Information Barriers (IB): segment users into 'segments' (Legal M&A, Traders, Investment Banking) et créez des policies (M&A ne peut pas communiquer avec Traders). Dans Teams: impossible de chercher les utilisateurs de l'autre segment, de les ajouter à une réunion, ou de partager des fichiers. Dans SharePoint: le site M&A ne peut pas être partagé avec les Traders. Requis par SEC, FINRA pour les barrières chinoises."},
{id:3033,cat:"Information Barriers",q:"Scénario: Une banque d'investissement doit implémenter une 'Chinese Wall' entre l'équipe M&A et les équipes de trading. Étapes IB ?",o:["Créer des tenants séparés","1) Identifier les segments (M&A_Segment, Trading_Segment), 2) Assigner des utilisateurs aux segments via leur groupe AAD, 3) Créer la policy IB: 'M&A_Segment Blocked with Trading_Segment', 4) Activer la policy, 5) Tester (les membres M&A ne peuvent plus chercher ou contacter les traders dans Teams), 6) Documenter pour conformité SEC/AMF","Utiliser des salles physiques séparées","Uniquement bloquer les emails entre les équipes"],a:1,e:"IB workflow: Segments AAD (attributs: Segment=MA ou Segment=Trading dans les attributs user AAD) → policies IB (Blocked = bi-directional block, Allow = toutes les communications ok) → Apply policy. Verification: IB compliance report, test de communication croisée. Scope: Teams, SharePoint Online, OneDrive Business (pas Exchange standalone, mais Exchange en mode IB Compatible)."},
{id:3034,cat:"Microsoft Priva",q:"Qu'est-ce que 'Microsoft Priva' et comment complète-t-il Purview ?",o:["Un concurrent de Purview","Microsoft Priva est spécifiquement focalisé sur la GESTION DE LA CONFIDENTIALITÉ: Privacy Risk Management (identifier les données personnelles à risque dans M365), Subject Rights Requests (automatiser les réponses aux demandes DSAR: droit d'accès, effacement, portabilité RGPD). Complète Purview Information Protection (sensibilité) et DLP (protection technique) avec la gouvernance vie privée","Un outil de conformité générale","Un remplaçant du RGPD"],a:1,e:"Priva = Privacy governance pour le RGPD: Privacy Risk Management identifie les accumulations de PII (ex: trop de données personnelles dans un site SharePoint accessible à tout le monde), les données surexposées, et les transferts de données internationaux. Subject Rights Requests automatise le traitement des DSARs (recherche automatique dans M365, workflow d'approbation, rapport exportable dans le délai légal)."},
{id:3035,cat:"Microsoft Priva",q:"Comment Priva Subject Rights Requests aide-t-il à répondre aux demandes RGPD dans les délais ?",o:["Uniquement des templates de réponse","Priva SRR automatise: 1) Réception de la demande (formulaire ou email), 2) Vérification de l'identité du demandeur, 3) Recherche automatique des données dans M365 (Exchange, SharePoint, Teams, OneDrive), 4) Review des résultats par l'équipe Privacy, 5) Génération du rapport de réponse (ou confirmation de suppression), 6) Respect du délai légal (30 jours RGPD tracké)","Un formulaire de contact uniquement","Un service payant de réponse juridique"],a:1,e:"DSAR (Data Subject Access Request) via Priva: délai RGPD = 30 jours calendaires. Priva automatise la phase la plus longue: recherche des données (sinon manuelle, plusieurs semaines). La recherche Priva couvre Exchange, SPO, OD, Teams. Les résultats sont présentés pour review (redaction des tiers), puis exportés pour le demandeur. Dashboard pour tracker les délais."},
{id:3036,cat:"Scénarios SC-401",q:"Scénario: Un CISO d'une banque doit implémenter une stratégie de protection des données complète pour Microsoft 365. Par où commencer ?",o:["Par le chiffrement de tous les emails","Roadmap: 1) Inventaire (Purview Data Map/Content Explorer), 2) Classification (SITs + Sensitivity Labels), 3) Protection (Labels + Chiffrement pour Confidential+), 4) DLP (empêcher exfiltration), 5) Retention (conformité réglementaire), 6) IRM (risques internes), 7) Communication Compliance (surveillance réglementaire), 8) eDiscovery ready","Par la formation utilisateurs","Par l'achat de licences premium"],a:1,e:"Roadmap MIP banque: Phase 1 - Discovery (Content Explorer pour voir les données sensibles non classifiées), Phase 2 - Classification (SITs bancaires: IBAN, numéros de compte, + labels), Phase 3 - Protection (chiffrement automatique pour les docs Confidential), Phase 4 - DLP (bloquer envois PCI/PII externes non autorisés), Phase 5 - Retention (conformité réglementaire), Phase 6 - Surveillance (IRM + CC pour MiFID II)."},
