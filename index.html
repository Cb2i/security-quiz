{id:3106,cat:"Insider Risk Management",q:"Comment configurer les 'Priority User Groups' et 'Priority Physical Assets' dans IRM ?",o:["IRM traite tous les utilisateurs de manière identique","Priority User Groups: groupes d'utilisateurs qui, s'ils ont une activité risquée, génèrent des alertes avec un score plus élevé (car leur accès est plus sensible). Ex: C-suite, équipe R&D, équipe Finance. Tout leur comportement risqué est plus 'amplifié'. Priority Physical Assets: connecter les données d'accès physique (badges) dans IRM. Si un utilisateur accède à une salle serveur physique en dehors des heures et télécharge ensuite massivement → corrélation physique+digital","IRM ne supporte pas les groupes prioritaires","Les groupes prioritaires reçoivent moins de surveillance"],a:1,e:"Priority Users IRM: un développeur junior qui télécharge 100 fichiers = score 30, un CTO qui télécharge 100 fichiers = score 80 (même action, score différent car le CTO a accès à des données plus sensibles et son départ serait plus impactant). Priority Physical Assets: requiert l'intégration d'un système de contrôle d'accès physique via les connecteurs HR (SFTP). Correlation physique+digital = indicateur fort d'exfiltration physique (accéder à une salle, puis exporter numériquement)."},
{id:3107,cat:"eDiscovery et Audit",q:"Qu'est-ce que 'Content Search' vs 'eDiscovery Hold' et quand utiliser chacun ?",o:["Identiques","Content Search: recherche dans M365 (Exchange, SPO, OD, Teams) sans placer de hold. Utilisé pour: trouver des données pour un audit, répondre à une SRR Priva, investigation ponctuelle. eDiscovery Hold: place une préservation sur les sources (mailboxes, sites) pour empêcher la suppression. Utilisé pour: litige formel, obligation légale de préserver les preuves. Un Hold peut être appliqué sans télécharger/exporter les données (la préservation suffit tant que le litige est en cours)","Content Search exporte les données, Hold les supprime","Hold uniquement pour les admins"],a:1,e:"Workflow typique: 1) Réception d'une notification de litige → créer un eDiscovery Case, 2) Identifier les custodians → placer des Holds sur leurs mailboxes et OneDrive, 3) Envoyer les notifications de Legal Hold aux custodians (eDiscovery Premium), 4) Quand les avocats ont besoin des données → Content Search dans le case pour trouver les éléments pertinents, 5) Export pour la revue légale. Content Search sans Hold = risque que les données soient supprimées entre la notification et l'export."},
{id:3108,cat:"Scénarios SC-401",q:"Comment préparer votre organisation pour un audit de conformité RGPD en utilisant Microsoft Purview ?",o:["Imprimer des documents et les stocker","Purview RGPD readiness: 1) Compliance Manager: utiliser le template 'GDPR' → voir le score actuel et les actions recommandées, 2) Data Map: cartographier où sont les données personnelles, 3) Sensitivity Labels: s'assurer que les données personnelles sont classifiées et protégées, 4) DLP: politiques pour empêcher la fuite de données personnelles, 5) Priva SRR: processus pour traiter les demandes d'accès, 6) Rétention: politiques conformes aux durées RGPD, 7) Audit logs: prouver qui a accédé à quoi","Uniquement des formations","Uniquement une politique de confidentialité"],a:1,e:"GDPR audit evidence package: l'auditeur CNIL/DPA voudra voir: la cartographie des traitements (Data Map), les mesures de sécurité (Labels, DLP, encryption), les processus de réponse aux droits (Priva SRR), les durées de conservation (Retention policies), et les preuves de tests (Activity Explorer). Compliance Manager GDPR score: améliorer les actions techniques (activer MFA, chiffrement, DLP) augmente le score et prouve une démarche proactive. Document tout dans Compliance Manager pour avoir une trace."},
{id:3109,cat:"Sensitivity Labels",q:"Qu'est-ce que l'option 'Encrypt-Only' dans les labels Sensitivity et dans quels cas l'utiliser ?",o:["Un label qui bloque tout accès","Encrypt-Only = label qui chiffre le document/email avec RMS sans restreindre les droits (lecture, modification, impression, etc. sont tous autorisés pour les destinataires autorisés). Utilisé pour les emails externes: l'email est chiffré en transit et à l'arrivée mais le destinataire externe (via le portail OME) peut le lire, répondre, et transférer. Cas: envoyer des documents RH sensibles à des prestataires externes, communications légales, factures confidentielles","Un label sans aucune protection","Un label qui bloque l'impression uniquement"],a:1,e:"Encrypt-Only vs Confidential (Do Not Forward): Encrypt-Only = chiffrement + tous les droits standard (peut transférer, imprimer, copier). Confidential No Forward = chiffrement + pas de transfert, pas de copie. Encrypt-Only pour les emails: le destinataire reçoit le message chiffré (OTP ou Microsoft Account pour déchiffrer), peut répondre normalement. Idéal pour les communications B2B où vous voulez la confidentialité mais pas bloquer la collaboration. Audit: l'ouverture du message chiffré est loguée."},
{id:3110,cat:"DLP Policies",q:"Comment DLP gère-t-il les 'False Positives' et comment les réduire dans une organisation ?",o:["Les faux positifs ne peuvent pas être réduits","Réduction des faux positifs DLP: 1) Affiner la confiance des SITs (High Confidence uniquement vs Any), 2) Augmenter le seuil d'instances (5+ occurrences au lieu de 1), 3) Ajouter des Not Contains pour exclure les formats internes connus (ex: exclure les numéros commençant par '0000' = test data), 4) Créer des exceptions pour les groupes légitimes (Finance peut partager les données financières), 5) Analyser les Activity Explorer → top faux positifs → ajuster les règles incriminées","Désactiver les règles DLP","Accepter tous les faux positifs"],a:1,e:"Tuning DLP: commencer en mode Simulation → analyser les violations → categoriser: vrai positif (bloqué légitimement), faux positif (bloqué à tort), faux négatif (devrait être bloqué mais ne l'est pas). Métriques cibles: faux positif rate <5% (au-delà, les utilisateurs commencent à ignorer les Policy Tips), override rate élevé = signal de faux positifs. Override justifications: analyser les raisons données par les utilisateurs → si une raison revient souvent = exception légitime à ajouter. Audit mensuel des métriques DLP."},
{id:3111,cat:"Rétention et Records",q:"Comment la rétention Purview s'applique-t-elle aux enregistrements de réunions Teams ?",o:["Les enregistrements Teams ne sont pas retenus","Les enregistrements de réunions Teams sont stockés dans OneDrive (enregistrements initiés par l'organisateur) ou SharePoint (enregistrements de canal). Les politiques de rétention Purview s'appliquent à ces locations comme pour tout fichier. Configurer: Retention Policy avec location OneDrive ET SharePoint. Si un utilisateur supprime l'enregistrement → la rétention le conserve dans la Preservation Hold Library. La transcription automatique (.vtt) est aussi couverte par la rétention","Les enregistrements Teams sont dans Azure Blob hors portée","Uniquement les admins peuvent supprimer les enregistrements"],a:1,e:"Teams recordings governance: avant Teams evolua, les enregistrements étaient dans Microsoft Stream (Azure Blob). Maintenant dans OD/SPO → couverts par Purview nativement. Politique recommandée: rétention enregistrements Teams = 90 jours (suffisant pour la plupart des besoins) avec suppression automatique (évite de remplir le stockage). Exception: réunions M&A ou board meetings → rétention plus longue avec label Record. Transcriptions: aussi soumises à la rétention et aux politiques DLP (texte searchable)."},
{id:3112,cat:"Communication Compliance",q:"Qu'est-ce que le 'Reviewer' workflow dans Communication Compliance et comment structurer l'équipe de review ?",o:["Un seul admin review tout","Structure de review CC: 1) Analyste CC (Tier 1): voit les messages flaggués pseudonymisés, peut marquer Resolved ou escalader, 2) Compliance Officer (Tier 2): voit les identités réelles, peut prendre des actions (notifier RH, Legal), 3) Admin CC: configure les policies. Séparation des rôles requise pour FINRA/SEC: le supervisor ne peut pas self-review ses propres équipes. Workload: estimer le volume d'alertes pour dimensionner l'équipe. SLA recommandé: review dans les 5 jours ouvrables","Un seul reviewer suffit","Uniquement les managers peuvent reviewer"],a:1,e:"CC reviewer workload: une policy trop large = flood d'alertes = reviewer burnout = manque de revue = non-conformité (pire que pas de CC). Calibrer: commencer avec un échantillonnage (10% des communications) plutôt que 100%. Analyser le taux de hits (% de messages flaggués qui sont de vrais risques). Si taux <1% = trop de bruit → affiner la policy. SLA de review: dans les secteurs réglementés (finance), les régulateurs vérifient que les alertes sont traitées dans un délai défini. Documenter le SLA dans la procédure."},
{id:3113,cat:"Scénarios SC-401",q:"Votre CISO demande un tableau de bord mensuel de la posture de conformité des données. Quels rapports Purview utiliser ?",o:["Uniquement un rapport manuel Excel","Tableau de bord mensuel depuis Purview: 1) Compliance Manager: score global + évolution mensuelle + actions recommandées, 2) Content Explorer: % de contenu classifié par label (évolution month-over-month), 3) Activity Explorer: top activités DLP (violations, overrides, policy tips), 4) DLP Reports: incidents par policy, par location, par utilisateur top violations, 5) IRM Dashboard: alertes IRM par sévérité, 6) Audit summary: anomalies détectées. Exporter en PDF ou PowerBI pour la présentation CISO","Pas de rapports disponibles","Uniquement via PowerShell"],a:1,e:"Reporting Purview pour CISO: KPIs recommandés: Compliance Score (objectif: >75%), % documents labellisés (objectif: >90% des nouveaux documents), DLP violation trend (objectif: diminution mensuelle), False positive rate (objectif: <5%), IRM high-risk alerts (objectif: tous traités <5 jours), SRR response time (objectif: 100% dans les 30 jours). Integration PowerBI: Purview offre des connecteurs pour extraire les données vers PowerBI pour des dashboards personnalisés. Présenter à la direction: simplifier en 5-6 métriques clés avec tendances."},
{id:3114,cat:"DLP Policies",q:"Comment configurer une politique DLP pour protéger les 'Sensitive Information Types' personnalisées (Custom SITs) ?",o:["Les Custom SITs ne fonctionnent pas avec DLP","Créer un Custom SIT: 1) Définir les patterns: regex (ex: format ID interne 'CL-[0-9]{6}'), keyword list (ex: 'CONFIDENTIEL', 'INTERNAL ONLY'), keyword proximity (le mot-clé doit être à proximité du pattern). 2) Définir les niveaux de confiance (High/Medium/Low). 3) Tester avec des documents réels. 4) Publier. 5) Utiliser dans les conditions DLP comme tout SIT Microsoft. Cas: ID client, références de projets secrets, codes produits non-publics","Custom SITs uniquement pour l'étiquetage","Uniquement les SITs Microsoft intégrés"],a:1,e:"Custom SIT examples: banque = numéro de compte interne format 'FR-XXXXXX-XX', pharma = numéro de molécule 'MOL-[A-Z]{3}-[0-9]{4}', défense = classification interne 'DOC-SECRET-[0-9]{5}'. Test du Custom SIT: uploader des documents de test dans le portail et vérifier que les instances sont détectées avec le bon niveau de confiance. Attention aux regex trop larges (trop de faux positifs) ou trop étroites (trop de faux négatifs). Tester avec 100+ documents avant production."},
{id:3115,cat:"Sensitivity Labels",q:"Comment utiliser les 'Label Analytics' dans Purview pour mesurer l'adoption des Sensitivity Labels ?",o:["Il n'y a pas d'analytics pour les labels","Analytics disponibles dans Purview pour les labels: 1) Content Explorer: combien de fichiers/emails par label, par location (Exchange/SPO/OD), par SIT détecté, 2) Activity Explorer: événements de labels (label applied, changed, removed, downgraded) avec qui, quand, quelle app, 3) DLP Reports: corrélation labels + violations DLP, 4) Audit logs: toutes les actions sur les labels. KPIs: % de contenu labellisé, distribution des labels (trop de 'General' = sous-labelling?), label downgrade rate (qui réduit le niveau de protection?)","Pas d'analytics disponibles","Uniquement les admins peuvent voir les analytics"],a:1,e:"Label adoption metrics: Content Explorer montre le % de fichiers sans label (objectif: <10% de contenu sans label pour les nouvelles créations). Activity Explorer montre les label downgrades (Confidential → General) = signal d'alerte (contournement intentionnel?). Corrélation: sites SharePoint avec le plus de fichiers non-labellisés = candidats pour la formation ciblée ou l'activation du Mandatory Label. Rapport mensuel: présenter l'évolution pour montrer la progression de l'adoption."},
{id:3116,cat:"Insider Risk Management",q:"Comment configurer les 'HR Connectors' dans IRM pour détecter les risques liés aux changements RH ?",o:["IRM ne se connecte pas aux systèmes RH","HR Connector dans Purview: importe des données RH depuis des systèmes SIRH (Workday, SuccessFactors, etc.) via un fichier CSV ou une API. Données importées: Date de démission/licenciement, Date de Performance Improvement Plan (PIP), Date de promotion/changement de rôle. Ces événements deviennent des déclencheurs dans IRM: un employé mis en PIP → IRM commence à monitorer ses activités, un employé qui démissionne → IRM active le template 'Departing Employee'","IRM fonctionne uniquement avec Azure AD","Les données RH ne peuvent pas alimenter IRM"],a:1,e:"HR Connector setup: créer une app Azure AD avec les permissions requises → configurer le connecteur dans Compliance Portal → uploader le CSV RH via SFTP ou Azure Blob. Format du CSV: UPN de l'employé, date de l'événement, type d'événement (Resignation, PIP, Termination). Considération légale: informer les représentants du personnel (CE en France) avant de connecter les données RH à un système de surveillance. Le HR Connector est un déclencheur, pas une surveillance permanente de tous les employés."},
{id:3117,cat:"Scénarios SC-401",q:"Un concurrent lance un produit identique au vôtre 2 semaines après votre lancement. L'équipe Legal soupçonne une fuite. Quelle investigation Purview mener ?",o:["Impossible d'investiguer","Investigation forensique Purview: 1) Identifier les personnes ayant eu accès aux données produit (SharePoint permissions review + Access logs), 2) IRM: vérifier si des alertes existent sur ces personnes, 3) eDiscovery: placer des Holds sur les mailboxes des suspects, 4) Content Search: emails vers des domaines externes + pièces jointes avec le nom du produit, 5) Endpoint DLP: vérifier les logs de copie USB ou upload cloud dans les 60 jours précédant le lancement concurrent, 6) Audit Premium: MailItemsAccessed et SearchQueryInitiated des suspects","Contacter directement le concurrent","Fermer tous les partages externes immédiatement"],a:1,e:"IP theft investigation: construire une timeline. Accès aux fichiers du produit (SharePoint audit) → qui a accédé au plan de lancement dans les 90 jours? DLP Endpoint: qui a copié des fichiers vers USB ou uploadé vers Google Drive? Emails: envoi de pièces jointes vers des domaines personnels ou concurrents? IRM: score de risque élevé sur quelqu'un avant le lancement? Assembler les preuves avec chaîne de custody (eDiscovery export avec hash MD5). Transmettre à Legal pour potentielle action judiciaire."},
{id:3118,cat:"DLP Policies",q:"Qu'est-ce que le 'Sensitive Information Type' GDPR de Microsoft et comment le configurer ?",o:["Un SIT uniquement pour les numéros SS","Microsoft fournit un bundle 'GDPR' de SITs couvrant les données personnelles des citoyens UE: numéros d'identité nationaux (NIR, NIF, DNI...), numéros de passeports, permis de conduire, numéros de sécurité sociale, et plus pour tous les pays UE. À compléter avec: les SITs de données santé (France: NIR = potentiellement lié à santé), données biométriques, données financières (IBANs). Configuration: créer une DLP policy avec location All M365, conditions = GDPR SIT bundle, action = Block external sharing + Alert DPO","Un SIT uniquement pour la France","Un SIT pour les données financières uniquement"],a:1,e:"GDPR DLP policy: utiliser le template DLP 'GDPR' (Modèles de politique) qui inclut automatiquement les SITs pertinents. Personnaliser pour votre contexte: ajouter des SITs custom pour vos données internes sensibles, affiner les seuils de confiance pour votre langue principale, et ajouter les domaines partenaires approuvés en exception. La DLP GDPR couvre le principe de minimisation (Article 5c): si les données ne peuvent pas sortir sans contrôle, vous réduisez le risque de fuite."},
{id:3119,cat:"Sensitivity Labels",q:"Comment les Sensitivity Labels fonctionnent-ils dans Outlook lors de l'envoi d'emails ?",o:["Labels uniquement pour les fichiers","Dans Outlook (desktop, web, mobile): 1) L'utilisateur peut appliquer un label à un email avant envoi, 2) Le label peut appliquer des protections OME (chiffrement) et des restrictions (No Forward, No Print), 3) La policy peut configurer un Default Label pour les emails, 4) Auto-labeling client-side: si l'email contient un SIT, un label est recommandé ou appliqué automatiquement, 5) Si un fichier labellisé est joint à un email, l'email peut hériter du label le plus élevé de ses pièces jointes","Labels Outlook uniquement pour les pièces jointes","Labels Outlook uniquement par les admins"],a:1,e:"Email labels workflow: utilisateur joint un fichier 'Highly Confidential' à un email → Outlook propose d'appliquer le label Highly Confidential à l'email → si l'email est envoyé avec ce label vers un destinataire externe → la protection OME s'applique (destinataire reçoit notification + OTP pour déchiffrer). Audit: label applied/changed sur les emails dans Activity Explorer. DLP corrélé: si email avec label Confidential est envoyé à des destinataires externes en masse → DLP peut bloquer et alerter."},
{id:3120,cat:"Scénarios SC-401",q:"Comment gérer une demande 'Right to be Forgotten' (Art. 17 RGPD) pour un ex-employé dans Microsoft 365 ?",o:["Impossible de supprimer les données M365","Processus Right to Be Forgotten via Purview: 1) Priva SRR: créer une demande d'effacement pour la personne, 2) Purview identifie toutes les données M365 de la personne (emails, fichiers OneDrive, Teams messages), 3) Reviewer: identifier les données légalement exemptées (données à conserver pour obligations fiscales, litiges), 4) Pour les données non-exemptées: utiliser Content Search + Purge pour supprimer les emails, supprimer les fichiers OneDrive, 5) Documenter la réponse et envoyer le certificat de suppression","Supprimer le compte suffira","RGPD ne s'applique pas aux ex-employés"],a:1,e:"Art. 17 exemptions légitimes: données comptables (6 ans en France), données de paye (5 ans), données liées à un litige potentiel (durée du litige). Ce qui doit être supprimé: emails personnels, messages Teams non-business, fichiers personnels OneDrive. Ce qui peut être conservé: contrats signés, factures, correspondances business légalement requises. Documenter: quelles données ont été supprimées, quelles données ont été conservées et pourquoi (base légale). Délai: 30 jours pour répondre, extension possible à 60 jours si complexe."},
{id:3121,cat:"Rétention et Records",q:"Qu'est-ce que 'Locked Record' vs 'Unlocked Record' dans Purview Records Management ?",o:["Identiques","Locked Record (Regulatory Record): une fois labellisé, ni l'utilisateur ni l'admin ne peuvent supprimer ou modifier le label avant la fin de la rétention. Immutable. Unlocked Record: peut être modifié (contenu ou label) par les admins, mais la suppression avant l'expiration est bloquée. Cas d'usage Locked: données réglementaires (MiFID II = broker ne peut pas modifier les enregistrements de transactions), données fiscales, communications SEC. Cas Unlocked: documents internes où une correction peut être nécessaire","Locked = chiffré, Unlocked = non-chiffré","Record = tout fichier SharePoint"],a:1,e:"Regulatory Records (Locked): configurer dans le Label → Retention settings → 'Mark items as a regulatory record'. Avertissement: irréversible. L'admin ne peut pas supprimer le label ou le fichier avant l'expiration. Même les admins M365 (Global Admin) ne peuvent pas contourner la Locked Record. Cas pratique: pour les institutions financières soumises à SEC Rule 17a-4 ou FINRA, les communications électroniques doivent être immutables → Locked Records. Pour les emails normaux: Unlocked Record (rétention appliquée mais correction possible)."},
{id:3122,cat:"Communication Compliance",q:"Comment Communication Compliance peut-il aider à détecter le 'Insider Trading' dans une institution financière ?",o:["CC ne peut pas détecter l'insider trading","CC pour Insider Trading: 1) Créer une policy ciblant les traders et les équipes corporates (Research, M&A), 2) Conditions: Financial Trainable Classifier + mots-clés (buy before, sell before, earnings, results, acquisition, merge, target price), 3) Scoper les canaux à risque: emails, Teams, Bloomberg chat si intégré, 4) Alerte: messages du Research desk vers les traders mentionnant une société avec des résultats imminents. Compliance review dans les 5 jours","CC uniquement pour le harcèlement","CC ne monitore pas les échanges financiers"],a:1,e:"Financial services CC: exigences réglementaires (FINRA, AMF): les institutions financières doivent surveiller les communications électroniques pour détecter les conflits d'intérêts et potentiels délits d'initié. CC avec Trainable Classifier 'Investment Recommendation': détecte les messages ressemblant à une recommandation d'investissement non autorisée. Séparation des reviewers: le reviewer CC ne doit pas être un trader (conflit d'intérêts). Archivage: les messages capturés par CC sont conservés pour les régulateurs."},
{id:3123,cat:"Microsoft Priva",q:"Qu'est-ce que 'Microsoft Priva Privacy Risk Management' et quels types de risques détecte-t-il ?",o:["Un outil de gestion des mots de passe","Priva Privacy Risk Management: détecte les risques liés à la vie privée des données M365. Politiques disponibles: 1) Data Overexposure: données personnelles trop accessibles (ex: fichier RH avec PII en accès 'Everyone'), 2) Data Transfers: transferts de données personnelles vers des régions géographiques non-approuvées ou des tiers non-approuvés, 3) Data Minimization: données personnelles conservées au-delà de leur utilité (vieux dossiers clients). Alerte les propriétaires de données pour action corrective","Un outil DLP standard","Un outil de conformité financière"],a:1,e:"Priva vs DLP: DLP = prévention en temps réel des transferts non-autorisés. Priva PRM = découverte proactive des risques existants (données déjà mal configurées). Exemple Overexposure: Priva détecte un fichier Excel RH avec 500 lignes de données employés stocké dans un site SharePoint accessible à toute l'entreprise. Alerte au propriétaire du site: 'Ce fichier contient des données personnelles et est accessible à 5000 employés. Veuillez réduire les accès.' Action proposée: changer les permissions ou déplacer le fichier."},
{id:3124,cat:"Scénarios SC-401",q:"Comment créer un programme de conformité M365 de zéro pour une PME de 500 employés avec M365 E3 ?",o:["Acheter M365 E5 uniquement","Programme E3 pragmatique: 1) Sensitivity Labels (inclus E3): créer 4 labels (Public/Interne/Confidentiel/Hautement Confidentiel), déployer sans chiffrement d'abord, 2) DLP de base (E3): protéger les données PII avec les SITs standards dans Exchange et SharePoint, 3) Politiques de rétention (E3): email 3 ans, contrats 7 ans, RH 5 ans après départ, 4) Audit Standard (E3): 90 jours, activer pour tous, 5) Formation utilisateurs: le ROI le plus élevé pour une PME, 6) Plan d'upgrade vers E5 pour IRM/eDiscovery Premium quand budget disponible","Tout faire manuellement","E3 est insuffisant pour toute conformité"],a:1,e:"E3 vs E5 capabilities: E3 inclut les fonctionnalités fondamentales (Labels, DLP de base, Rétention, Audit Standard, eDiscovery Standard). E5 ajoute: IRM, eDiscovery Premium, Audit Premium, CC avancée, Priva. Pour une PME: E3 + le bon processus manuel = bonne conformité de base. Priorité: 1) Ne pas exposer de données PII (DLP), 2) Conserver les données requises (Rétention), 3) Pouvoir répondre aux incidents (Audit). Avec 500 personnes, le plus grand risque est humain → formation > technologie."},
{id:3125,cat:"DLP Policies",q:"Qu'est-ce que le 'DLP Alert Management' dans le portail Compliance et comment l'utiliser efficacement ?",o:["Un outil de gestion des tickets","DLP Alert Management: hub centralisé pour gérer les incidents DLP. Fonctionnalités: 1) Vue de tous les incidents DLP actifs avec sévérité, 2) Détails de chaque incident: quel fichier, quel utilisateur, quelle règle, quel contenu sensible, 3) Actions: Assigner à un analyste, Ajouter des commentaires, Marquer comme résolu, Escalader, 4) Intégration avec Sentinel (les incidents DLP peuvent devenir des incidents Sentinel), 5) Metrics: temps moyen de résolution, incidents par type","Un simple log d'événements","Uniquement pour les administrateurs globaux"],a:1,e:"DLP Alert workflow: un incident DLP High Severity est créé → notifié à l'analyste CC (email + portail), analyste ouvre l'incident → voit le contexte complet (screenshot du contenu, action entreprise par l'utilisateur, historique de l'utilisateur), investigation: était-ce un faux positif? Y a-t-il d'autres incidents similaires cet utilisateur? Action: si vrai positif grave → escalader à Legal/HR avec documentation. SLA: incidents High traités <24h, Medium <72h, Low <7 jours. Documenter les résolutions pour les patterns."},
{id:3126,cat:"Sensitivity Labels",q:"Comment les Sensitivity Labels s'intègrent-ils avec Azure Information Protection (AIP) pour les fichiers non-Office ?",o:["AIP uniquement pour les fichiers Office","AIP Unified Labeling Client (UL): étend les labels aux fichiers non-Office sur Windows: PDF, images (JPEG, PNG avec classification), CAD files, text files. Le client AIP UL peut: labelliser depuis l'explorateur Windows (clic droit), labelliser via la classification automatique (scanner AIP), appliquer la protection RMS aux fichiers non-Office. AIP Scanner: scanne les serveurs de fichiers on-premises et SharePoint Server pour classer et labelliser les fichiers existants","AIP est obsolète et remplacé","AIP Scanner uniquement pour le cloud"],a:1,e:"AIP Scanner: pour les organisations avec des données on-premises (file servers Windows, SharePoint Server), l'AIP Scanner s'installe en local, scanne les partages réseau, détecte les SITs, applique les labels. Mode simulation d'abord. Transition: les organisations migrant vers M365 utilisent l'AIP Scanner pour labelliser les fichiers on-premises avant de les migrer vers SharePoint Online. Post-migration: les labels sont préservés dans SPO. AIP Client UL = client Windows pour l'expérience utilisateur (barre AIP dans Office, étiquetage depuis l'explorateur)."},
{id:3127,cat:"eDiscovery et Audit",q:"Comment utiliser les 'Audit Log Search' pour détecter une compromission de compte dans M365 ?",o:["Impossible de détecter une compromission via les logs","Indicators of Compromise dans l'Audit Log: 1) MailboxLogin depuis des pays inhabituels (UserLoginFailed puis succès), 2) InboxRuleCreated (attaquant crée une règle de redirection vers son email), 3) MessageSent depuis le compte compromis (BEC = Business Email Compromise), 4) FileDownloaded en masse depuis SharePoint (exfiltration), 5) New-ApplicationImpersonation (ajout de permissions pour maintenir l'accès). Rechercher: l'UPN compromis sur une fenêtre de 90 jours (E3) ou 1 an (E5)","Les logs M365 ne permettent pas la détection de compromission","Uniquement les admins peuvent être compromis"],a:1,e:"Audit log BEC investigation: 1) Identifier la fenêtre de compromission (premier login suspect dans AAD SigninLogs), 2) Dans l'Audit Log: rechercher InboxRuleCreated (présent dans 80% des BEC), 3) MailItemsAccessed (Audit Premium): quels emails sensibles ont été lus?, 4) NewMessage ou SendAs: des emails frauduleux ont-ils été envoyés?, 5) New OAuth App: l'attaquant a-t-il installé une app OAuth malveillante? Timeline complete = savoir l'étendue de la compromission pour notifier correctement (RGPD 72h notification)."},
{id:3128,cat:"Scénarios SC-401",q:"Comment déployer une stratégie de Data Lifecycle Management (DLM) complète dans une organisation internationale ?",o:["Uniquement pour les grandes entreprises","DLM international: 1) Inventaire des données: Purview Data Map pour cartographier toutes les données dans tous les pays, 2) Classification: Sensitivity Labels avec niveaux adaptés au contexte local (pays-spécifique), 3) Rétention: Multi-geo retention policies (politiques différentes par région selon les lois locales - RGPD EU, CCPA US, LGPD Brésil), 4) Protection: DLP avec règles adaptées par pays (NIF espagnol dans une policy dédiée), 5) Gouvernance: Compliance Manager avec assessments par réglementation (RGPD, CCPA, ISO 27001), 6) Reporting: tableau de bord unifié","Uniquement possible en un seul pays","Trop complexe pour implémenter"],a:1,e:"Multi-geo compliance challenges: la rétention des données en France (RGPD) peut différer des exigences US (HIPAA pour la santé, SOX pour la finance). Purview Multi-Geo: les politiques de rétention peuvent être scopées à des géographies Microsoft 365 spécifiques (données EU dans la geo EU uniquement). Sensitivity Labels: universels dans toute l'organisation mais les politiques qui déclenchent des actions peuvent varier par région. Compliance Manager: créer des assessments séparés pour RGPD, CCPA, LGPD et mesurer chaque réglementation indépendamment."},
{id:3129,cat:"DLP Policies",q:"Qu'est-ce que 'Microsoft Purview Compliance Portal' et comment est-il structuré ?",o:["Le portail Azure pour la conformité","Compliance Portal (compliance.microsoft.com): hub centralisé pour toutes les fonctionnalités de conformité Purview. Sections principales: 1) Overview: Compliance Score, risques actifs, actions recommandées, 2) Content Explorer: explorer le contenu classifié, 3) Activity Explorer: voir les activités sur les données sensibles, 4) DLP: gérer les politiques DLP, 5) Sensitivity Labels: créer et gérer les labels, 6) Retention: créer les politiques de rétention, 7) eDiscovery: cases, holds, searches, 8) IRM: alertes et cases, 9) Communication Compliance: policies et reviews","Un outil uniquement pour les audits","Le centre d'administration Exchange"],a:1,e:"Navigation Compliance Portal: les rôles déterminent ce que les utilisateurs voient. Compliance Administrator = accès complet. Compliance Data Administrator = données mais pas les paramètres système. eDiscovery Manager = uniquement les cases eDiscovery. Content Explorer List Viewer = voir les types de fichiers mais pas les contenus. Content Explorer Content Viewer = voir les contenus (plus sensible). Principe du moindre privilège: n'accorder que le rôle minimal nécessaire à chaque équipe (DPO, Legal, Security, HR)."},
{id:3130,cat:"Rétention et Records",q:"Comment les politiques de rétention Purview gèrent-elles les conflits entre plusieurs politiques applicables à un même contenu ?",o:["La dernière politique créée gagne","Règles de résolution de conflit Purview: 1) Conservation prime sur la suppression (si une politique dit 'conserver 3 ans' et une autre dit 'supprimer après 1 an' → conservé 3 ans), 2) Durée la plus longue prime (deux politiques de conservation: 3 ans vs 7 ans → 7 ans), 3) Suppression explicite plus tard (si après 7 ans, aucune autre politique active → supprimé selon la politique de suppression). Les Labels de rétention sur un item spécifique ont priorité sur les politiques globales (item-level > policy-level)","La politique la plus récente gagne","L'administrateur doit résoudre manuellement"],a:1,e:"Conflict resolution example: un email est couvert par: Policy A (Exchange, conserver 3 ans), Policy B (Exchange, supprimer après 1 an), un Retention Label 'Legal Hold' (conserver jusqu'à la levée du hold). Résultat: le Label 'Legal Hold' gagne (item-level > policy-level) → conservé jusqu'à la levée. Si pas de label: Policy A gagne sur Policy B (conservation > suppression). Après les 3 ans de A: si B est toujours active → supprimé. Tester les conflits dans un tenant de test avant déploiement."},
{id:3131,cat:"Sensitivity Labels",q:"Qu'est-ce que 'Microsoft Purview Information Protection SDK' et pour quels cas l'utiliser ?",o:["Un SDK uniquement pour les développeurs Microsoft","MIP SDK: permet aux développeurs d'intégrer la classification et protection MIP dans des applications tierces ou internes. Cas d'usage: 1) Application métier qui génère des rapports → labeliser automatiquement les PDFs générés selon leur contenu, 2) Application de messagerie non-M365 → appliquer la protection RMS aux pièces jointes, 3) Système ECM (Electronic Content Management) → intégrer les labels Purview, 4) Application mobile d'entreprise → étiquetage des documents créés sur mobile. Langages: C++, .NET, Python, Java","Un SDK uniquement pour Azure","Un SDK uniquement pour les grandes entreprises"],a:1,e:"MIP SDK use cases: une application SAP qui génère des bilans financiers → utiliser MIP SDK pour appliquer automatiquement le label 'Highly Confidential - Finance' aux PDFs générés. Une application de CAO (conception assistée par ordinateur) → les plans techniques générés reçoivent un label 'Confidentiel - Propriété Intellectuelle'. Le SDK utilise les mêmes labels configurés dans le portail Purview → cohérence de la classification dans toute l'organisation, y compris les applications non-Microsoft."},
{id:3132,cat:"Scénarios SC-401",q:"Suite à une cyberattaque, votre organisation doit notifier la CNIL sous 72h. Comment Purview accélère-t-il ce processus ?",o:["Purview ne peut pas aider pour une notification CNIL","Notification CNIL avec Purview: 1) Audit Logs: identifier rapidement quelles données ont été exposées (MailItemsAccessed, FileAccessed, FileDownloaded), 2) Content Explorer: combien de fichiers avec PII étaient dans les systèmes compromis? Quels types de données personnelles (NIR, IBAN, santé)?, 3) Sensitivity Labels: identifier les fichiers labellisés 'Confidentiel' ou 'Hautement Confidentiel' accédés, 4) IRM: des alertes existaient-elles avant la détection?, 5) DLP: des tentatives d'exfiltration avaient-elles été bloquées/loguées?","Contacter Microsoft directement","Attendre le rapport de l'équipe IT"],a:1,e:"RGPD Art. 33 (72h notification): la notification doit décrire: la nature de la violation (quoi), les catégories et nombre approximatif de personnes concernées (combien de personnes, quelles données PII), les mesures prises pour remédier. Purview permet de répondre rapidement: Content Explorer → combien de fichiers avec NIR/santé/financier dans les systèmes compromis. Audit → quels fichiers ont été accédés par l'attaquant. Cette information accélère la rédaction de la notification CNIL de semaines à heures."},
{id:3133,cat:"DLP Policies",q:"Comment configurer DLP pour les 'Sensitive Information Types' de données de santé en France (données SNDS, NIR) ?",o:["Pas de SIT pour les données de santé françaises","SITs santé France dans Purview: 1) 'France Social Security Number' (NIR = numéro de sécurité sociale qui identifie aussi le dossier santé en France), 2) Custom SIT pour les numéros RPPS (Répertoire Partagé des Professionnels de Santé), 3) Custom SIT pour les codes CIM-10 (diagnostics médicaux), 4) Keyword lists: noms de médicaments, termes médicaux spécifiques. DLP policy santé: bloquer tout partage externe de fichiers contenant NIR + terminologie médicale (combinaison = dossier médical probable)","Les données de santé ne peuvent pas être classifiées","Uniquement pour les hôpitaux publics"],a:1,e:"Données de santé RGPD: Art. 9 RGPD = données sensibles par nature, traitement interdit sauf exceptions (soins, recherche avec consentement). Pour les établissements de santé: DLP ultra-stricte sur les données santé (NIR + diagnostic + prescription), étiquetage obligatoire des dossiers patients, rétention selon les règles HDS (Hébergement Données de Santé: 20 ans minimum). Custom SIT pour les numéros FINESS (établissements de santé) et pour les identifiants patients spécifiques à chaque système. HDS certification requise pour héberger des données de santé."},
{id:3134,cat:"Sensitivity Labels",q:"Comment créer un label de sensibilité 'STRICTLY CONFIDENTIAL' avec des restrictions maximales ?",o:["Niveau maximum impossible à configurer","Configuration Strictly Confidential: 1) Chiffrement: Assign permissions now → ajouter uniquement les groupes autorisés (ex: C-Suite@company.com), permissions = Viewer uniquement (pas de modification, pas de copie, pas d'impression), expiration si nécessaire, 2) Content Marking: header rouge 'STRICTLY CONFIDENTIAL', filigrane visible, footer avec la date de classification, 3) Auto-labeling: désactiver (trop sensible pour être auto-appliqué), 4) Scope: exclure les apps qui ne respectent pas le chiffrement, 5) Mandatory override: si un utilisateur tente de passer sous un niveau inférieur, nécessite une justification + approbation admin","Impossible, le chiffrement n'est pas disponible","Utiliser Azure AD Conditional Access uniquement"],a:1,e:"Strictly Confidential use case: fusions-acquisitions (M&A), informations de brevets non-déposés, stratégie de prix, informations sur les personnes citées (plans de licenciement). Les fichiers avec ce label: ne peuvent être ouverts que par les personnes listées explicitement, s'ils sont envoyés à quelqu'un non-autorisé = ne peuvent pas être ouverts, toute tentative d'ouverture non-autorisée est loguée. Content Explorer: surveiller tout changement de label vers un niveau inférieur (downgrade = alerte automatique)."},
{id:3135,cat:"Scénarios SC-401",q:"Comment mesurer le ROI d'un programme Microsoft Purview pour le justifier auprès de la direction ?",o:["Le ROI de la conformité ne peut pas être mesuré","ROI Purview framework: 1) Réduction du risque: calculer le coût potentiel d'une amende RGPD (4% CA mondial) × probabilité d'un incident sans contrôles = risque évité, 2) Efficacité opérationnelle: temps économisé par les équipes Legal/Compliance (DLP automatisé vs manuel), 3) Réduction des incidents: avant vs après (nombre de fuites de données, incidents DLP), 4) Coût eDiscovery: eDiscovery Premium réduit le coût d'un litige de 60-80% (moins d'heures d'avocat pour la revue de documents), 5) Audit readiness: réduction du temps de préparation aux audits","La conformité est un coût pur sans ROI","Uniquement des métriques qualitatives"],a:1,e:"Business case Purview: pour la direction, traduire en euros. Exemple: organisation de 2000 employés. Risque RGPD: une violation exposant 10K dossiers clients = amende potentielle 500K€ (estimation). DLP cost: 30K€/an de licences E5 Compliance. ROI si DLP prévient 1 incident par an: 500K€ économisés - 30K€ coût = 470K€ net. eDiscovery Premium: un litige sans Premium = 400h avocat à 500€/h = 200K€. Avec Premium (near-dup detection): 100h = 50K€. Économie: 150K€ par litige. Ces chiffres parlent à la direction."},
{id:3136,cat:"Sensitivity Labels",q:"Comment les Sensitivity Labels interagissent-ils avec Microsoft Copilot pour Microsoft 365 ?",o:["Copilot ignore les Sensitivity Labels","Copilot respecte les Sensitivity Labels: 1) Copilot ne peut pas acceder a des contenus auxquels l utilisateur n a pas acces (respect des permissions existantes), 2) Quand Copilot genere une reponse basee sur des documents labellises Confidential, la reponse herite du label le plus eleve des sources utilisees, 3) Copilot mentionne le label dans sa reponse, 4) Les interactions Copilot (prompts + reponses) peuvent etre soumises aux politiques DLP","Copilot peut acceder a tout le tenant","Les labels ralentissent Copilot"],a:1,e:"Copilot + Labels governance: avant de deployer Copilot, auditer les permissions SharePoint (si des fichiers sensibles sont accessibles a tout le monde, Copilot va les utiliser dans ses reponses pour tout le monde). Data Security Posture Management dans Purview = outil d evaluation des risques Copilot. Action pre-Copilot: reduire l oversharing, s assurer que les fichiers sensibles ont des permissions appropriees et des labels corrects."},
{id:3137,cat:"DLP Policies",q:"Comment configurer DLP pour les agents M365 Copilot dans Purview ?",o:["DLP ne couvre pas les agents Copilot","DLP pour agents Copilot: 1) Les agents Copilot heritent des politiques DLP des sources de donnees qu ils utilisent (SharePoint, Exchange), 2) Configurer des politiques DLP specifiques pour les interactions d agents (prompts et reponses), 3) Microsoft Purview Data Security Posture Management pour evaluer les risques des agents, 4) Communication Compliance peut monitorer les interactions des agents Copilot","Les agents Copilot sont hors scope DLP","DLP uniquement pour les documents"],a:1,e:"Agent governance: les agents Copilot crees via Copilot Studio peuvent acceder a des sources de donnees SharePoint. DLP applique: si l agent tente de retourner des donnees PII dans sa reponse -> DLP peut bloquer. Principe: la gouvernance des agents AI doit etre planifiee avant le deploiement, pas apres."},
{id:3138,cat:"Rétention et Records",q:"Comment configurer la retention pour Microsoft Teams Meetings (enregistrements, transcriptions, notes) ?",o:["Les reunions Teams ne sont pas soumises a la retention","Retention Teams Meetings: 1) Enregistrements: stockes dans OneDrive (reunion 1:1) ou SharePoint (reunions de canal) -> politiques de retention OD/SPO s appliquent, 2) Transcriptions automatiques: fichiers .docx et .vtt dans OneDrive -> meme retention, 3) Notes de reunion (Loop/Wiki): stockees dans SharePoint -> retention SPO, 4) Chat des reunions: retention Teams Messages s applique","Uniquement les chats sont retenus","Les enregistrements Teams sont dans Azure Blob sans retention Purview"],a:1,e:"Teams Meetings retention strategy: combien de temps conserver les enregistrements? Recommandation: 1 an par defaut (suffisant pour la plupart des cas, evite d engorger le stockage). Exception: reunions de board ou M&A -> labelliser comme Records avec retention plus longue. Test: verifier que la retention fonctionne en supprimant un enregistrement test et en verifiant sa presence dans la Preservation Hold Library."},
{id:3139,cat:"Insider Risk Management",q:"Comment evaluer l efficacite d un programme IRM apres 6 mois de deployment ?",o:["Compter uniquement le nombre d alertes","Metriques d efficacite IRM: 1) Alert Quality Rate: % des alertes escaladees en cas confirmes (cible: >30%, si <10% = trop de bruit), 2) Case Resolution Time: temps moyen de resolution d un cas (cible: <15 jours), 3) True Positive Rate: % des cas confirmes comme vrais risques, 4) Coverage: % des employes couverts par les politiques IRM, 5) Training Completion: % des RH formes sur les procedures IRM","Compter uniquement le nombre de cas ouverts","Metriques non-disponibles pour IRM"],a:1,e:"IRM programme maturity assessment: Niveau 1 (Initial): politiques deployees, quelques alertes, equipe apprend. Niveau 2 (Developing): metriques de base suivies, taux de faux positifs reduit. Niveau 3 (Defined): integration avec RH et Legal, politiques ajustees. Niveau 4 (Managed): Adaptive Protection (DLP ajuste selon IRM). Evaluer honnetement le niveau actuel et definir un plan pour le niveau suivant."},
{id:3140,cat:"eDiscovery et Audit",q:"Comment utiliser eDiscovery pour une investigation de harcelement au travail impliquant Teams et Viva Engage ?",o:["Teams et Viva Engage ne sont pas couverts par eDiscovery","eDiscovery Teams et Viva Engage: 1) Teams est une location supportee dans eDiscovery (messages de chat 1:1, messages de canal, fichiers partages dans Teams), 2) Viva Engage (anciennement Yammer) est supporte dans eDiscovery Premium, 3) Dans le case eDiscovery: ajouter les custodians (accusateur et accuse), selectionner les locations Teams et Viva Engage, definir la plage de dates et les mots-cles, 4) Exporter les messages avec leur contexte pour preservation des preuves","Teams ne supporte pas eDiscovery","Uniquement les emails sont couverts par eDiscovery"],a:1,e:"Teams eDiscovery nuances: les messages Teams sont stockes dans les boites aux lettres Exchange. Les fichiers partages dans Teams sont dans SharePoint/OneDrive. Legal hold Teams: placer un hold sur les boites aux lettres Exchange des parties ET sur leurs sites OneDrive couvre la majorite des donnees Teams. Collaboration avec RH et Legal tout au long du processus."},
{id:3141,cat:"Sensitivity Labels",q:"Comment deployer les Sensitivity Labels dans des environnements multilingues ?",o:["Les labels ne supportent pas plusieurs langues","Labels multilingues: les Sensitivity Labels supportent la traduction des noms et descriptions. Configuration: dans le portail Purview -> Labels -> Edit Label -> Translations -> ajouter les traductions pour chaque langue. L interface utilisateur affiche le label dans la langue de l application de l utilisateur. Exemples: Confidentiel en francais, Confidential en anglais, Vertraulich en allemand = le meme label affiché differemment selon la langue","Creer des labels separes par langue","Les labels sont uniquement en anglais"],a:1,e:"Multilingual deployment considerations: les noms de labels doivent etre semantiquement equivalents dans toutes les langues. Validation: faire valider les traductions par des native speakers de chaque region. Politique coherente: un document label Confidentiel en France doit avoir le meme niveau de protection qu un document label Confidential en USA (meme label, meme configuration de chiffrement)."},
{id:3142,cat:"Communication Compliance",q:"Comment configurer Communication Compliance pour analyser les reunions Teams avec transcription automatique ?",o:["La transcription Teams ne peut pas etre soumise a CC","CC et transcriptions Teams: depuis 2023, Communication Compliance peut analyser les transcriptions des reunions Teams. Configuration: dans la politique CC, inclure Teams meetings as location. Les transcriptions generees automatiquement sont analysees par les classifiers CC. Use case: une reunion ou un manager dit quelque chose discriminatoire -> la transcription est analysee par le classifier CC -> alerte pour review. Important: informer les employes que les reunions peuvent etre analysees","CC uniquement pour les emails","La transcription Teams n est pas analysable"],a:1,e:"CC Teams Meetings governance: exigences legales (France): informer les employes de tout systeme de surveillance. La politique IT/charte informatique doit mentionner l analyse des communications Teams. Privacy Impact Assessment: documenter pourquoi la surveillance des reunions est necessaire et proportionnee avant d activer."},
{id:3143,cat:"DLP Policies",q:"Comment tester l efficacite des politiques DLP avant un audit de conformite ?",o:["Tester uniquement en production","Test DLP pre-audit: 1) Simulation mode: executer la politique en mode Test -> voir ce qui aurait ete bloque/alerte sans impact reel, 2) Test cases documentes: creer des documents test contenant des donnees sensibles synthetiques (faux numeros de CB, faux NIR), tenter de les partager et verifier que la DLP reagit correctement, 3) Content Explorer: verifier que le % de contenu classe correspond aux attentes, 4) Activity Explorer: verifier que les evenements DLP sont logues correctement","Tester uniquement avec de vraies donnees sensibles","Les tests DLP perturbent la production"],a:1,e:"Pre-audit DLP validation checklist: 1) Verifier que chaque politique couvre les locations correctes (Exchange + SharePoint + OD + Teams + Endpoint), 2) Tester la detection de chaque SIT principal (envoyer un email test avec un numero de CB en externe -> bloque?), 3) Verifier que les rapports DLP peuvent etre exportes pour l auditeur, 4) Verifier la retention des logs DLP. Documentation: conserver les resultats des tests comme preuves de conformite."},
{id:3144,cat:"Microsoft Priva",q:"Comment configurer Microsoft Priva pour gerer automatiquement les risques de surestimation des donnees ?",o:["Priva ne gere pas l overexposure automatiquement","Priva Privacy Risk Management Overexposure: 1) Creer une politique Data Overexposure dans Priva: conditions = fichier contient des donnees PII + accessible a Everyone ou All Company, 2) Priva detecte ces fichiers et alerte le proprietaire du site, 3) Actions disponibles: le proprietaire peut restreindre les permissions directement depuis l alerte Priva, 4) Configurer les notifs: email au proprietaire du site + alerte dans le portail Priva","Priva uniquement pour les demandes d acces","La surestimation des donnees ne peut pas etre detectee automatiquement"],a:1,e:"Data Overexposure workflow: Priva detecte un fichier Excel RH avec 500 lignes de donnees employes (NIR, salaires) accessible a l ensemble de l organisation (10000 employes). Alerte au proprietaire du site: Ce fichier contient des donnees personnelles et est accessible a 10000 utilisateurs. Action recommandee: restreindre les permissions. Metriques: nombre de fichiers overexposed par mois (tendance a la baisse = amelioration de la posture privacy)."},
{id:3145,cat:"Scénarios SC-401",q:"Comment implementer un programme complet de protection de l information pour une organisation du secteur de la sante ?",o:["Uniquement des formations suffisent pour la sante","Sante Information Protection: 1) Classification specifique sante: labels specifiques (Donnees Patient - Strictement Confidentiel, Donnees Medicales - Confidentiel), 2) SITs sante: NIR + termes medicaux + numeros RPPS + codes CIM-10, 3) DLP ultra-stricte: blocage absolu de tout partage externe de donnees patient sans approbation, 4) Retention HDS: 20 ans minimum pour les dossiers patients (code de sante publique francais), 5) eDiscovery: capacite d investigation rapide pour les incidents, 6) IRM: surveiller les acces aux systemes de donnees patient","Uniquement chiffrer les emails","Uniquement pour les grands hopitaux"],a:1,e:"HDS (Hebergement Donnees de Sante) France: si l organisation heberge des donnees de sante de patients, l hebergeur doit etre certifie HDS. Pour M365: Microsoft dispose d une certification HDS pour ses datacenters francais (Azure Region France Central). Configuration requise: choisir les regions France pour les donnees de sante (Data Residency), configurer les politiques de retention selon le code de sante publique. RGPD + HDS: double conformite requise pour les etablissements de sante en France."}
