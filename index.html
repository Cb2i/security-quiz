{id:378,cat:"Threat Intelligence",q:"Comment intégrer des flux TI tiers dans Microsoft Sentinel ?",o:["Sentinel ne supporte pas les flux tiers","1) TAXII Connector (standard STIX/TAXII: connecter des feeds comme Anomali, ThreatConnect), 2) Microsoft Graph Security API (connecter des produits TI tiers), 3) Sentinel TI Matching Analytics (matche automatiquement les IoC importés contre les logs), 4) Upload IoC via API (CSV ou JSON), 5) Workbook Threat Intelligence pour visualiser les hits","Uniquement Microsoft TI","Manuellement via des règles KQL"],a:1,e:"Sentinel TI workflow: connecteurs TAXII/STIX (connecter des sources TI: AlienVault OTX, MISP, Threatfox, commercial feeds) → IoC importés dans la table ThreatIntelligenceIndicator → Sentinel Fusion et règles analytiques matchent les IoC contre les logs (NetworkCommunicationWithMaliciousIp, DnsMatchesThreatIntel) → alertes générées automatiquement."},
{id:379,cat:"Threat Intelligence",q:"Scénario: Votre secteur est ciblé par un groupe APT utilisant des TTPs spécifiques. Comment ajuster vos défenses ?",o:["Acheter plus d'outils de sécurité","1) Identifier les TTPs du groupe dans MITRE ATT&CK, 2) ATT&CK Navigator: visualiser votre couverture de détection actuelle, 3) Gaps = créer des règles Sentinel spécifiques, 4) Atomic Red Team: simuler les techniques du groupe pour valider les détections, 5) Threat Intel Sharing: ISAC sectoriel pour les IoC spécifiques, 6) Table top exercise avec le scénario spécifique","Bloquer tous les IPs","Installer plus d'antivirus"],a:1,e:"Threat-informed defense: MITRE ATT&CK pour identifier les techniques du groupe APT (ex: APT29 = T1566 Phishing, T1078 Valid Accounts, T1021 Remote Services). ATT&CK Navigator pour voir quelles techniques vous détectez déjà. Atomic Red Team pour tester. Sigma rules ou Sentinel rules pour les techniques manquantes. ISAC (secteur financier = FS-ISAC) pour les IoC partagés par le secteur."},
{id:380,cat:"Sécurité des Identités",q:"Qu'est-ce que 'Microsoft Entra Permissions Management (CIEM)' ?",o:["Un gestionnaire de rôles Azure AD","Cloud Infrastructure Entitlement Management: découvre et gère les permissions dans Azure, AWS, et GCP. Identifie les permissions excessives (utilisateurs avec des droits qui n'ont jamais été utilisés), les 'Super Identities' (droits très larges), et les ressources inutilisées. Génère un 'Permission Creep Index (PCI)' par identité et fournit des recommandations de right-sizing","Un outil de gestion des licences","Un outil de gestion des mots de passe"],a:1,e:"Entra Permissions Management (ex-CloudKnox): analyse l'utilisation réelle des permissions vs les permissions accordées. Un utilisateur avec 500 permissions qui n'en utilise que 20 → recommendation de réduire à 20. PCI (Permission Creep Index): 0-100, score élevé = risque élevé. Supporte Azure, AWS, GCP. Aide à enforcer le least privilege à grande échelle."},
{id:381,cat:"Sécurité des Identités",q:"Comment sécuriser les 'Workload Identities' (Service Principals et Managed Identities) dans Azure AD ?",o:["Uniquement rotation des secrets","1) Préférer Managed Identity (pas de secret à gérer) vs SP avec client secret, 2) Pour les SP inévitables: utiliser des certificats (pas des secrets), Workload Identity Federation pour CI/CD, 3) Audit via Entra Workload Identity Insights (SP avec credentials expirés/non utilisés), 4) RBAC minimal sur les SPs, 5) Entra ID Protection pour les Workload Identities (alertes sur SP avec comportements anormaux)","Changer les secrets annuellement","Partager un SP entre plusieurs applications"],a:1,e:"Workload Identity hygiene: inventaire des SPs (nombreux orphelins dans les tenants legacy), rotation des secrets/certificats (Entra ID force expiration), Federated Credentials pour GitHub/AzDO (élimine les secrets), RBAC review (SPs avec Owner ou Contributor sur subscription = risque), alertes Entra ID Protection (SP with unfamiliar sign-in properties, newly created SP accessing critical resources)."},
{id:382,cat:"Architectures Zero Trust",q:"Qu'est-ce que 'SPIFFE/SPIRE' et son rôle dans Zero Trust pour les workloads ?",o:["Des standards de sécurité réseau","SPIFFE (Secure Production Identity Framework For Everyone): standard pour donner une identité cryptographique aux workloads (pods, services, VMs). SPIRE est l'implémentation de référence. Chaque workload reçoit un SVID (SPIFFE Verifiable Identity Document = certificat x.509) qui permet le mTLS automatique entre services sans gestion manuelle de certificats","Un protocole d'authentification utilisateur","Un framework de sécurité réseau"],a:1,e:"SPIFFE/SPIRE dans Kubernetes: SPIRE Server (CA) distribue des SVIDs aux SPIRE Agents sur chaque node, les agents injectent des SVIDs dans chaque pod via un Unix socket. Les pods utilisent leur SVID pour s'authentifier mutuellement via mTLS. Istio et Linkerd utilisent SPIFFE comme format de certificats. Permet le Zero Trust workload-to-workload natif."},
{id:383,cat:"Gestion des Risques",q:"Comment effectuer une 'Cyber Risk Quantification' selon le modèle FAIR (Factor Analysis of Information Risk) ?",o:["Évaluation subjective haute/moyen/bas","FAIR décompose le risque en: Threat Event Frequency (TEF) × Vulnerability × Loss Magnitude = Risk Exposure. Traduit en valeur monétaire (annualized loss expectancy). Ex: ransomware TEF = 2x/an, vuln = 70% de succès si tenté, pertes = 5M€ si réussi → ALE = 2 × 70% × 5M = 7M€/an. Permet de prioriser les investissements sécurité (ROI des contrôles)","Uniquement des scores CVSS","Un questionnaire annuel"],a:1,e:"FAIR quantification: permet de comparer les risques en euros (ALE) et le ROI des contrôles. Ex: investir 200K€ dans MFA réduit le risque de credential theft de 7M€/an → ROI = 35x. Les décisions sécurité deviennent business-justifiable. Outils: FAIR Institute resources, RiskLens platform. Adopté par COSO, NIST RMF."},
{id:384,cat:"Gestion des Risques",q:"Scénario: Votre CISO doit présenter la justification d'un budget de cybersécurité de 2M€ au board. Comment structurer l'argumentaire ?",o:["Montrer le nombre d'alertes du SIEM","Business case: 1) Cyber Risk Quantification (FAIR): quantifier les risques actuels en M€/an ALE, 2) Contrôles proposés et leur réduction de risque (ALE before vs after), 3) ROI = (Risk reduction - Cost) / Cost, 4) Benchmarks sectoriels (votre spend vs concurrents), 5) Incidents récents secteur (coût moyen d'une breach = X M€ selon Ponemon), 6) Exigences réglementaires (amendes RGPD/NIS2 si non conforme)","Des slides techniques","Uniquement le nombre de vulnérabilités"],a:1,e:"Board-level security communication: traduire la technique en risque business (éviter des pertes de X M€), montrer le ROI des investissements (investir 2M€ pour réduire un risque de 15M€/an), comparer aux benchmarks (secteur finance = 10-15% du budget IT en sécurité), et citer les conséquences réglementaires (amende RGPD max = 4% du CA global). IBM Ponemon Cost of Data Breach Report = référence pour les chiffres."},
{id:385,cat:"Sécurité Cloud Native",q:"Qu'est-ce qu'un 'CNAPP (Cloud Native Application Protection Platform)' et ses composants ?",o:["Un scanner de conteneurs","CNAPP intègre: CSPM (posture management), CWPP (workload protection), CIEM (permissions management), KSPM (Kubernetes posture), IaC security (scan Terraform/Bicep), et API security. Microsoft Defender for Cloud est un CNAPP. Approche holistique: la posture + la protection + les identités + la sécurité des apps dans une seule plateforme","Un firewall cloud natif","Un outil de monitoring de performance"],a:1,e:"CNAPP couvre tout le cycle de vie cloud-native: shift-left (IaC scan dans le pipeline, secrets detection), build security (container image scanning), deploy-time (admission control Kubernetes), runtime (Defender for Containers threat detection), et post-incident (forensics). MDC est le CNAPP Microsoft couvrant Azure + AWS + GCP."},
{id:386,cat:"Sécurité Cloud Native",q:"Comment sécuriser les 'Serverless functions' (Azure Functions) selon le modèle Zero Trust ?",o:["Les functions serverless n'ont pas de risque de sécurité","1) Managed Identity (pas de credentials dans le code), 2) RBAC minimal sur la MI (uniquement les ressources nécessaires), 3) VNet Integration + Private Endpoints pour les dépendances (SQL, KV), 4) App Service Authentication (EasyAuth) pour les functions HTTP-triggered, 5) Input validation (éviter injection), 6) Dependency scanning (Dependabot), 7) Defender for App Service (anomaly detection)","Uniquement HTTPS sur les triggers","Juste un API key statique"],a:1,e:"Azure Functions Zero Trust: MI system-assigned avec RBAC minimal (Key Vault Secrets User, Storage Blob Data Contributor uniquement sur les ressources nécessaires), VNet integration (trafic sortant via VNet → Firewall), Private Endpoints pour les dépendances (plus de trafic Internet pour accéder à Storage/SQL/KV), input validation (protéger contre injection si la function reçoit des données externes), et scan des dépendances NuGet/npm."},
{id:387,cat:"Métriques et Reporting",q:"Quels sont les KPIs de sécurité essentiels pour un CISO dans un rapport mensuel ?",o:["Uniquement le nombre d'alertes","MTTD (Mean Time to Detect), MTTR (Mean Time to Respond/Remediate), Patch cadence (% critiques corrigés <7j), MFA coverage (% utilisateurs), Phishing click rate (% employés cliquant), Secure Score (Azure/M365), Critical vulnerabilities open >30 days, SLA breach rate pour les incidents, et Budget vs. spend","Le nombre de firewalls déployés","La disponibilité des systèmes uniquement"],a:1,e:"KPIs CISO tier 1: MTTD/MTTR (mesure l'efficacité du SOC), Patch Compliance (% assets avec patches critiques <7j, objectif >95%), MFA Coverage (% comptes actifs avec MFA, objectif 100%), Phishing simulation click rate (trend mensuel, objectif <5%), MDC Secure Score (posture globale), et Critical vuln >30 days open (mesure le backlog de remédiation)."},
{id:388,cat:"Métriques et Reporting",q:"Comment créer un tableau de bord de sécurité dans Microsoft Sentinel pour le CISO ?",o:["Un rapport Word mensuel","Sentinel Workbooks (Azure Monitor Workbooks): créer des vues KQL visuelles: 1) Overview (incidents ouverts par sévérité, trend sur 30j), 2) Identity (risky users, MFA failures, impossible travel), 3) Threat (top alerts, MITRE heatmap), 4) Posture (MDC Secure Score trend), 5) Compliance (SLA de résolution par priorité). Partager via Azure Portal ou exporter en PDF","Copier-coller des alertes dans PowerPoint","Via un outil tiers uniquement"],a:1,e:"Sentinel Workbooks CISO: Workbook = requêtes KQL + visualisations (charts, grids, maps) sauvegardées dans Azure Portal. Workbooks prédéfinis: Microsoft Sentinel Workbook Gallery (30+ templates: SOC Efficiency, Identity & Access, Azure Activity). Custom: combiner MDC Secure Score (API), Sentinel incidents, Azure AD risky sign-ins dans un seul dashboard. Refresh automatique toutes les 5 min."},
{id:389,cat:"Architectures Zero Trust",q:"Comment implémenter 'Secure Score' dans Microsoft Defender for Cloud comme outil de gouvernance de sécurité ?",o:["Un score uniquement informatif","Secure Score comme outil de gouvernance: 1) Baseline le score actuel, 2) Assigner des recommandations à des owners via Governance Rules (MDC Defender CSPM), 3) Définir des SLAs de remédiation par sévérité (Critical=7j, High=30j), 4) Intégrer dans le processus de release (pas de déploiement si nouvelles recommandations Critical), 5) KPI mensuel CISO avec trend","Un outil de reporting uniquement","Ignorer les recommandations non critiques"],a:1,e:"MDC Governance: assigner les recommandations MDC à des owners via Governance Rules (ex: 'toute recommandation sur les VMs → owner = team Ops, SLA 30 jours'). Les owners reçoivent des notifications email avec les actions à mener. MDC trace les SLA et affiche les overdue remediations. Le score augmente automatiquement quand les remédiation sont complétées."},
{id:390,cat:"Sécurité des Identités",q:"Qu'est-ce que 'Microsoft Entra Internet Access' et comment améliore-t-il la sécurité de navigation ?",o:["Un proxy web classique","Entra Internet Access = Secure Web Gateway cloud (partie de Global Secure Access/SSE). Achemine le trafic Internet des endpoints via Microsoft via l'agent Global Secure Access. Fonctionnalités: Web Content Filtering (catégories URL), Microsoft 365 traffic optimization (bypass proxy pour M365), Conditional Access pour le trafic Internet (bloquer accès aux réseaux sociaux pour certains groupes), et TLS inspection future","Un VPN vers Internet","Un filtre antivirus web"],a:1,e:"Entra Internet Access (ZTNA for Internet): l'agent GSA sur le endpoint achemine le trafic selon des politiques: le trafic M365 va directement à Microsoft (optimisé), le trafic général passe par le SWG Microsoft (URL filtering, threat protection). Contrairement à un proxy traditionnel: basé sur l'identité (policies différentes par user/groupe), sans infrastructure on-premises."},
{id:391,cat:"Sécurité des Applications",q:"Comment protéger les APIs REST exposées dans Azure contre les attaques OWASP API Security Top 10 ?",o:["Uniquement l'authentification API key","Défense multi-couches: 1) Azure API Management (rate limiting, quota, JWT validation), 2) Azure WAF (règles OWASP API), 3) Authentication via Azure AD OAuth 2.0 (pas de keys statiques), 4) Defender for APIs (détection comportementale), 5) Input validation stricte (rejeter les entrées inattendues), 6) Least privilege sur les permissions des tokens (scopes API granulaires)","API key dans l'URL","Uniquement HTTPS"],a:1,e:"APIM + WAF + Defender for APIs = 3 couches: APIM gère l'authentification OAuth, la validation JWT, les rate limits (API1:2021 Broken Object Level Auth → ABAC dans APIM), WAF bloque les patterns d'injection (API3:2021), Defender for APIs détecte les comportements anormaux (shadow APIs, excessive data exposure API3). Authentification OAuth avec scopes granulaires implémente API1 et API5."},
{id:392,cat:"Sécurité des Réseaux",q:"Comment implémenter une architecture 'hub-and-spoke' sécurisée dans Azure pour une entreprise multi-régions ?",o:["Un VNet par région sans hub","Architecture: 1 Hub VNet par région (Azure Firewall Premium + Bastion + DNS Private Resolver + VPN/ExpressRoute Gateway), N Spoke VNets (workloads par équipe/env), VNet Peering spoke→hub, UDR 0.0.0.0/0 → Azure Firewall dans chaque spoke. Azure Virtual WAN pour les grandes architectures multi-régions (hub managé par Microsoft)","VPN entre chaque région","Peering direct entre tous les VNets"],a:1,e:"Hub-and-spoke multi-régions: 2 hubs régionaux (West Europe + North Europe), chaque hub avec Azure Firewall Premium (IDPS, TLS inspection), Bastion, DNS, et gateway. Les spokes se peerent vers le hub régional. Azure Firewall Policy partagée (policy parent) avec des politiques locales pour les spécificités. Traffic inter-régions via les hubs (pas direct). Virtual WAN simplifie encore cette architecture."},
{id:393,cat:"Sécurité des Réseaux",q:"Qu'est-ce qu'un 'Azure Private Resolver DNS' et pourquoi est-il essentiel pour les Private Endpoints ?",o:["Un serveur DNS Azure classique","DNS Private Resolver résout les noms DNS privés des Private Endpoints depuis les réseaux on-premises via ExpressRoute/VPN. Sans lui: les clients on-premises résolvent les FQDNs Azure Storage/SQL en IP publiques (bypasse le Private Endpoint). Private Resolver: forwarder conditionnel vers Azure DNS (168.63.129.16) depuis le réseau on-premises","Un service DNS payant","Un outil de sécurité DNS indépendant"],a:1,e:"Problème sans DNS Private Resolver: un client on-premises cherche myaccount.blob.core.windows.net → DNS public → IP publique Azure Storage (pas le Private Endpoint). Avec DNS Private Resolver: DNS on-premises forward les requêtes *.blob.core.windows.net vers le Private Resolver dans le hub VNet Azure → résolution via Private DNS Zone → IP privée 10.x.x.x (Private Endpoint). Le trafic ne passe jamais par Internet."},
{id:394,cat:"Sécurité Cloud Native",q:"Scénario: Un container dans AKS exécute un processus suspect (reverse shell). Comment le détecter et répondre ?",o:["Redémarrer le cluster","Détection: Defender for Containers (runtime alerts: 'Process with suspicious activity in container', 'Reverse shell in container'). Réponse: 1) kubectl cordon (empêcher nouveaux pods sur le node), 2) kubectl drain node-name (migrer les pods sains), 3) kubectl delete pod (supprimer le pod suspect), 4) Forensics: kubectl logs + kubectl exec pour investiguer avant suppression, 5) Analyser l'image du container","Ignorer si l'app fonctionne","Redémarrer le pod uniquement"],a:1,e:"Defender for Containers utilise les eBPF sensors sur les nodes AKS pour détecter les comportements anormaux (processus non attendus, connexions réseau suspectes, modifications de fichiers système). En cas d'alerte: cordon + drain pour isoler le node compromis, delete le pod, puis forensics offline (dump l'image, analyser avec des outils forensics container). Ne jamais 'exec' dans un container potentiellement hostile."},
{id:395,cat:"Conformité et Gouvernance",q:"Qu'est-ce que 'NIS2 (Network and Information Systems Directive 2)' et ses impacts pour les organisations UE ?",o:["Une version améliorée du RGPD","NIS2 (effective octobre 2024): directive UE sur la cybersécurité des entités essentielles et importantes (énergie, transport, santé, eau, digital, banque, etc.). Exigences: mesures de sécurité techniques et organisationnelles, notification d'incidents (24h pour alerte initiale, 72h pour rapport complet, 1 mois pour rapport final), responsabilité personnelle des dirigeants, et amendes (10M€ ou 2% CA global pour entités essentielles)","Une norme ISO","Un règlement sur la protection des données"],a:1,e:"NIS2 vs NIS1: périmètre élargi (18 secteurs vs 7), amendes augmentées, responsabilité des dirigeants (peuvent être sanctionnés personnellement), et exigences plus strictes (supply chain security, vulnérability disclosure). Pour se conformer: incident response plan, BC/DR testé, gestion des risques cyber documentée, formation des dirigeants, et audit de sécurité régulier. Transposition en droit national de chaque État membre UE."},
{id:396,cat:"Conformité et Gouvernance",q:"Comment Microsoft Azure aide-t-il à la conformité DORA (Digital Operational Resilience Act) pour les institutions financières ?",o:["DORA ne concerne pas le cloud","DORA (effective janvier 2025): résilience opérationnelle numérique pour les institutions financières UE. Azure aide: 1) SLA contractuels et rapports de disponibilité (ICT risk management), 2) Azure Service Health (gestion des incidents ICT), 3) Defender for Cloud (ICT risk assessment), 4) Business Continuity (Geo-redundant zones, backups), 5) TLPT support (test de pénétration basé sur les menaces via Microsoft's IRW process)","Azure n'est pas conforme DORA","Uniquement via des audits tiers"],a:1,e:"DORA ICT risk management: 5 piliers (Govern, Protect, Detect, Respond, Recover). Azure fournit: contractual SLA + Service Level Agreements (ICT contracts), Azure Resiliency Documentation, Penetration Testing program (Microsoft permet les pen tests client), Azure Compliance Manager DORA assessment, et les rapports d'audit tiers (SOC 2, ISO 27001) comme preuves pour les auditeurs DORA."},
{id:397,cat:"Sécurité des Identités",q:"Scénario: Vous devez sécuriser l'accès privilegié pour 50 administrateurs Azure dans une grande entreprise. Quelle architecture PAM ?",o:["Comptes admin partagés","Architecture PAW (Privileged Access Workstation): 1) Stations d'admin dédiées (Windows hardened, GPO strict, pas d'Internet), 2) Comptes admin cloud-only séparés des comptes quotidiens (admin@corp.onmicrosoft.com), 3) PIM pour l'activation JIT des rôles, 4) Conditional Access: accès Azure Portal uniquement depuis PAW compliant (IP whitelist + Compliant Device), 5) Sentinel alertes sur toute activation admin","Utiliser les comptes quotidiens avec MFA","Un seul compte admin partagé"],a:1,e:"Enterprise PAM: PAW (stations durcies, pas de navigation web ni email), comptes admin dédiés (jamais utilisés au quotidien), PIM JIT (activer seulement quand nécessaire), MFA phishing-resistant (FIDO2 sur PAW), Conditional Access restreignant Azure Portal aux PAW uniquement (Named Location = IP PAW + Compliant Device filter), et Sentinel alertes (activation hors PAW = alerte P1)."},
{id:398,cat:"Sécurité des Applications",q:"Qu'est-ce que 'DAST (Dynamic Application Security Testing)' et comment l'intégrer dans un pipeline Azure DevOps ?",o:["Un test de performance","Tests dynamiques sur l'application en cours d'exécution (black-box): OWASP ZAP ou Burp Suite dans le pipeline CI/CD sur un environnement staging. Azure DevOps pipeline: déployer en staging → trigger ZAP scan (docker run -t owasp/zap2docker-stable) → analyser les résultats (fail le pipeline si vulnérabilités High/Critical) → résultats dans un artifact pour review","Un scanner de code statique","Un outil de monitoring de performance"],a:1,e:"DAST dans ADO pipeline: stage 'Security-Tests' après deployment-to-staging. ZAP Docker image: ZAP Baseline Scan (passif, 2 min) ou ZAP Full Scan (actif, 15-30 min). Résultats en XML → PowerShell script pour parser et fail le pipeline si sévérité HIGH détectée. Artifact de rapport publié dans ADO. Configurer des règles d'exclusion pour réduire les faux positifs (formulaires de test connus)."},
{id:399,cat:"Gestion des Incidents",q:"Comment implémenter l'automatisation des réponses aux incidents dans Sentinel avec des Playbooks ?",o:["Réponse manuelle uniquement","Sentinel Playbooks (Logic Apps): 1) Trigger: when Sentinel Alert is triggered, 2) Actions: enrichir l'alerte (appel VirusTotal API pour le hash, GeoIP pour l'IP), 3) Si malveillant: appel API MDE pour isoler la machine, 4) Appel API AAD pour révoquer les sessions de l'utilisateur, 5) Créer un incident dans ServiceNow, 6) Notifier via Teams (adaptive card avec contexte + boutons Approve/Deny pour l'analyste)","Scripts PowerShell manuels","Emails uniquement"],a:1,e:"Playbook exemple anti-brute force: Trigger (alerte 'Multiple failed sign-ins') → Enrichir (appel AAD pour les détails du compte, VirusTotal pour l'IP source) → Conditional: si IP malveillante confirmed → Bloquer l'IP dans Named Locations AAD + révoquer les sessions + notifier le SOC via Teams. Réponse automatisée: T+30 secondes vs T+30 minutes manuellement."},
{id:400,cat:"Architectures Zero Trust",q:"Comment évaluer la maturité Zero Trust d'une organisation selon le Zero Trust Maturity Model de CISA ?",o:["Un questionnaire binaire oui/non","CISA ZT Maturity Model v2: 5 piliers (Identity, Devices, Networks, Applications & Workloads, Data) × 4 niveaux de maturité (Traditional, Initial, Advanced, Optimal). Évaluation: analyser les contrôles actuels dans chaque pilier, les situer sur les 4 niveaux, identifier les gaps, prioriser les améliorations vers le niveau Optimal. Objectif: Optimal dans les 5 piliers","Un score de conformité binaire","Un audit annuel suffisant"]
,a:1,e:"CISA ZTM v2 evaluation: chaque pilier (Identity, Devices, Networks, Apps, Data) est évalué sur 4 niveaux. Traditional = périmètre réseau classique, Initial = premiers contrôles ZT (MFA, quelques microsegments), Advanced = majorité des contrôles ZT automatisés, Optimal = ZT complet avec adaptation dynamique. L'évaluation révèle les gaps prioritaires pour le roadmap ZT."},
{id:400,category:"Zero Trust",question:"Comment implementer le Zero Trust pour les acces aux applications legacy qui ne supportent pas MFA ?",options:["Exclure les apps legacy du Zero Trust","Application Proxy Azure AD: publie les apps legacy (web apps on-premises) via Azure AD. L utilisateur s authentifie via Azure AD avec MFA -> Azure AD cree un token -> Application Proxy transmet le token a l app legacy (sans que l app supporte MFA nativement). Ainsi l app legacy beneficie du Zero Trust (MFA + Conditional Access + logs Azure AD) sans modification","Desactiver MFA pour ces apps","Creer des comptes de service partages"],answer:1,explanation:"Application Proxy scenarios: SharePoint 2016 on-premises, applications RH legacy, applications intranet sans SSO. Pre-requis: connecteur Application Proxy installe sur un serveur on-premises (communique avec Azure AD via HTTPS sortant = pas de port entrant a ouvrir). SSO: Kerberos Constrained Delegation (KCD) pour le SSO avec les apps Kerberos. Alternative pour les apps non-web: Azure AD App Proxy ne fonctionne pas -> envisager VPN Conditional Access ou migration vers une app cloud."},
{id:401,category:"Architecture",question:"Qu est-ce que la strategie Secure Access Service Edge SASE et comment Microsoft la supporte-t-elle ?",options:["Un produit Microsoft specifique","SASE = convergence du reseau (SD-WAN) et de la securite (ZTNA, CASB, FWaaS, SWG) en un seul service cloud. Microsoft Global Secure Access (Entra Internet Access + Entra Private Access): 1) Entra Private Access: remplace le VPN pour l acces aux ressources privees (Zero Trust Network Access ZTNA), 2) Entra Internet Access: Secure Web Gateway pour les acces internet et Microsoft 365. Complementaire a MDCA (CASB) pour la vision SASE complete","Un protocole reseau","Un type de pare-feu nouvelle generation"],answer:1,explanation:"SASE Microsoft: Entra Private Access = les utilisateurs accedent aux applications internes specifiques (pas tout le reseau = ZTNA vs VPN full tunnel). Entra Internet Access = filtre et securise le trafic internet des utilisateurs (SWG + acces conditionnel sur le web). Complement: MDCA comme CASB (controle des apps SaaS). Avantage SASE vs VPN traditionnel: moins de latence (trafic optimise via backbone Microsoft), granularite (acces par application pas par reseau), scalabilite cloud-native."},
{id:402,category:"Identity",question:"Qu est-ce que Privileged Access Workstations PAW et comment les integrer dans une architecture Zero Trust ?",options:["Des postes de travail pour les employes VIP","PAW = postes de travail dedies et durcis utilises uniquement pour les taches administratives. Caracteristiques: systeme d exploitation seure, pas de navigation internet ni d email, acces uniquement aux systemes de gestion (Azure Portal, DCs, VMware), MDE enrolled + Intune managed, Conditional Access Policy: acces aux portails d admin uniquement depuis des PAW (device filter dans la CA Policy)","Des ordinateurs portables premium","Des postes de travail virtuels"],answer:1,explanation:"PAW tiers: Tier 0 (acces AD/Azure AD = les plus critiques), Tier 1 (acces serveurs), Tier 2 (acces workstations et utilisateurs). PAW Tier 0: meme les admins ne peuvent gerer AD que depuis un PAW specifique. Conditional Access: exiger device compliance ET device in PAW group pour acceder au Azure Portal. Benefit: meme si l admin se fait phisher sur son poste normal, il ne peut pas acceder aux systemes critiques depuis ce poste compromis."},
{id:403,category:"Network",question:"Qu est-ce que la micro-segmentation reseau et comment l implementer dans Azure ?",options:["Un type de VLAN","Micro-segmentation: diviser le reseau en zones tres granulaires avec des controles d acces stricts entre chaque zone (limite le lateral movement). Dans Azure: 1) Network Security Groups NSG: regles par subnet ou par VM, 2) Azure Firewall Premium: inspection en profondeur du trafic (IDPS, TLS inspection), 3) Private Endpoints: les services Azure accessibles uniquement via le reseau prive, 4) Application Security Groups ASG: regrouper les VMs par role (WebServers, AppServers) pour des regles plus lisibles","Un type de bande passante","Un protocole de routage"],answer:1,explanation:"Micro-segmentation vs VLAN: VLAN = segmentation large (DMZ, LAN, Management). Micro-segmentation = par workload (WebServer peut parler a AppServer sur port 8080 uniquement, AppServer peut parler a DBServer sur port 1433 uniquement, rien d autre). Implementation Azure: NSG rules basees sur ASGs: Allow WebServers -> AppServers port 8080, Allow AppServers -> DBServers port 1433, Deny all other east-west traffic. Azure Firewall Premium pour l inspection du trafic inter-segments."},
{id:404,category:"Data Security",question:"Comment implémenter une strategie de Data Classification pour tout le patrimoine de donnees de l organisation ?",options:["Classer manuellement chaque fichier","Strategie en 4 phases: 1) Discover: utiliser Purview Data Map pour scanner toutes les sources (M365, Azure, AWS, on-premises), 2) Classify: appliquer les Sensitive Information Types (SITs) et les Trainable Classifiers pour categoriser automatiquement, 3) Label: appliquer les Sensitivity Labels bases sur la classification, 4) Protect: DLP policies, chiffrement, acces conditionnel base sur les labels. Gouvernance: Data Stewards responsables par domaine de donnees","Acheter un outil tiers","Uniquement pour les nouveaux documents"],answer:1,explanation:"Data Classification maturity: niveau 1 = inventaire manuel (feuille Excel), niveau 2 = outils de scan automatique (Purview Data Map), niveau 3 = classification automatique continue (ML + SITs), niveau 4 = protection automatique base sur la classification (DLP + encryption automatique), niveau 5 = gouvernance proactive (data stewards + disposition reviews). Pour commencer: identifier les joyaux de la couronne (IP, donnees client PII, donnees financieres) et les proteger en priorite."},
{id:405,category:"Zero Trust",question:"Qu est-ce que Continuous Access Evaluation CAE dans Azure AD et comment ameliore-t-il la securite ?",options:["Une fonctionnalite de surveillance continue","CAE: au lieu d attendre l expiration du token (60-90 min par defaut), les applications supportant CAE recoivent des evenements critiques en temps reel et peuvent invalider le token immediatement. Evenements: 1) compte desactive dans Azure AD -> token invalide immediatement dans Exchange, Teams, SharePoint, 2) mot de passe change -> invalidation immediate, 3) IP change drastique -> reevaluation. Sans CAE: si un compte compromis est desactive, l attaquant garde son acces pendant 60-90 min via le token valide","Un outil de surveillance des acces","Un systeme de rotation de mots de passe"],answer:1,explanation:"CAE use case: incident = compte compromis detecte, admin desactive le compte dans Azure AD. Sans CAE: l attaquant garde son acces aux emails pendant 60-90 min (token valide). Avec CAE: Exchange recoit l evenement de desactivation en quelques secondes -> token invalide -> acces revoque en moins d une minute. Prerequis: les applications doivent supporter CAE (Exchange, Teams, SharePoint, OneDrive supportent nativement). CAE est active par defaut pour les tenants M365."},
{id:406,category:"Architecture",question:"Comment concevoir une architecture de securite pour une application multi-tenant dans Azure ?",options:["Un seul tenant pour tous les clients","Isolation par client: 1) Subscription/Resource Group par client (isolation la plus forte), 2) Virtual Networks dedies avec Private Endpoints, 3) Managed Identities (pas de secrets = pas de fuite de credentials), 4) Azure Key Vault par client (secrets isoles), 5) RBAC granulaire: les operations du client A ne peuvent pas acceder aux ressources du client B, 6) Tenant-specific encryption keys (Customer Managed Keys). Logging: chaque client voit uniquement ses propres logs","Un seul Key Vault partage","Gestion des clients par mot de passe"],answer:1,explanation:"Multi-tenant security concerns: data leakage entre tenants (isolation insuffisante), privilege escalation (un client compromet le systeme et accede aux autres), noisy neighbor (un client surcharge les ressources). Azure solutions: Resource isolation = Resource Groups + RBAC + Network isolation. Data isolation = separate databases ou row-level security avec tenant ID. Key isolation = CMK par tenant = si un tenant revoque sa cle, ses donnees deviennent inaccessibles sans affecter les autres."},
{id:407,category:"Identity",question:"Qu est-ce que Federated Identity Management et comment Azure AD supporte-t-il la federation ?",options:["Un systeme de gestion des mots de passe","Federation: deux organisations (ou IdPs) etablissent une relation de confiance pour partager les identites sans dupliquer les comptes. Azure AD Federation: 1) SAML 2.0: federation avec des applications tierces (Salesforce, Box), 2) WS-Federation: federation avec AD FS on-premises, 3) OIDC/OAuth 2.0: standard moderne pour les apps web/mobile, 4) B2B Collaboration: inviter des utilisateurs d autres tenants Azure AD (no password sync, ils utilisent leur propre IdP)","Un protocole reseau","Un systeme de replication d Active Directory"],answer:1,explanation:"Federation use case: M&A - deux entreprises fusionnent. Au lieu de creer de nouveaux comptes pour tous les employes, etablir une federation SAML entre les deux tenants Azure AD -> chaque employe utilise son compte existant pour acceder aux applications des deux organisations. Azure AD B2C: pour les clients/partenaires externes (Google, Facebook, custom IdP). Azure AD External Identities: combine B2B (partenaires) et B2C (clients) dans une seule plateforme."},
{id:408,category:"Infrastructure",question:"Qu est-ce que Defender for SQL et comment protege-t-il les bases de donnees Azure ?",options:["Un antivirus pour les serveurs SQL","Defender for SQL: 1) SQL Vulnerability Assessment: scanne les configurations SQL pour les vulnerabilites (comptes SA actifs, permissions excessives, SQL Server non-patche), recommande des remediations, 2) Advanced Threat Protection: detecte les attaques SQL en temps reel (SQL Injection, anomalies d acces, brute force sur SQL accounts, exfiltration de donnees via SQL). Couvre: Azure SQL Database, SQL Managed Instance, SQL Server sur VMs Azure/on-premises (via Arc)","Un outil de sauvegarde SQL","Un pare-feu pour SQL Server"],answer:1,explanation:"Defender for SQL use case: SQL Injection detection = Defender detecte une requete SQL anormale qui tente de dumper la table users (SELECT * FROM users WHERE 1=1). Alerte avec la requete exacte, l IP source, le compte SQL utilise. Response: bloquer l IP, analyser les autres requetes de la meme source. Vulnerability Assessment: planifier un scan mensuel -> rapport des vulnerabilites -> suivre les remediations. Integration Sentinel: les alertes Defender for SQL alimentent les incidents Sentinel."},
{id:409,category:"Conformite",question:"Qu est-ce que le Shared Responsibility Model de Microsoft Azure et comment s y adapter ?",options:["Microsoft est responsable de toute la securite","Modele de responsabilite partagee: selon le type de service (IaaS, PaaS, SaaS), la frontiere de responsabilite change. IaaS (VMs): Microsoft = infrastructure physique + hyperviseur, Client = OS + applications + donnees + identites + acces. PaaS (App Service): Microsoft + OS + runtime, Client = applications + donnees + acces. SaaS (Microsoft 365): Microsoft = presque tout, Client = donnees + identites + acces + configurations. La securite du cloud est toujours partagee","Le client est responsable de tout","Cela depend du prix du service"],answer:1,explanation:"Shared Responsibility implications: pour les VMs Azure (IaaS), le client doit patcher l OS (Windows Update), configurer le pare-feu OS, gerer les comptes locaux. Microsoft ne patch pas les OS des VMs clients. Pour M365 (SaaS): Microsoft gere la disponibilite et la securite de la plateforme, mais si le client configure mal les permissions SharePoint -> Microsoft n est pas responsable de la fuite de donnees. Defender for Cloud aide a identifier les responsabilites client non respectees (recommandations de securite)."},
{id:410,category:"Zero Trust",question:"Qu est-ce que le principe Assume Breach dans Zero Trust et comment l appliquer concretement ?",options:["Partir du principe que tout est securise","Assume Breach = le 3eme principe Zero Trust: concevoir les systemes comme si des attaquants etaient deja dans le reseau. Applications concretes: 1) Segmentation: meme si un attaquant entre, il ne peut acceder qu a un segment limite, 2) Privilege minimal: meme un compte compromis a des droits limites, 3) Logging et detection: supposer que les attaques se produisent -> monitorer pour les detecter (SIEM, EDR, MDI), 4) Chiffrement interne: chiffrer les communications inter-services (TLS mutual authentication), 5) Drills d incident response reguliers","Suppose qu aucune attaque ne reussira","Installer plus de pare-feux"],answer:1,explanation:"Assume Breach practical implementation: segmentation network (si attaquant dans le segment web, il ne peut pas acceder au segment base de donnees). Lateral movement detection: MDI surveille les mouvements lateraux dans AD. Honeypots: deposer de faux fichiers etiquetes Top Secret pour detecter les attaquants qui les ouvrent. Purple team exercises: simuler des attaques reelles pour tester les detections. Tabletop exercises: simuler des scenarios d incident pour tester la reponse. L objectif est de reduire le rayon d explosion Impact radius en cas de compromission."},
{id:411,category:"Network",question:"Qu est-ce que Azure DDoS Protection et comment le configurer pour proteger les applications ?",options:["Un service qui bloque tous les acces externes","Azure DDoS Protection: 1) Basic (gratuit, inclus): protection automatique des services Azure (Layer 3/4), 2) Standard/Network (payant): protection avancee adaptee au trafic normal de l application, machine learning, mitigation automatique en quelques minutes, rapports et alertes detaillees, protection de Layer 3 a 7. Configuration: creer un DDoS Protection Plan -> l associer aux VNets a proteger -> alertes Azure Monitor. Cost protection: remboursement des couts Azure lies a une attaque DDoS documentee","Un type de pare-feu","Un service de monitoring reseau"],answer:1,explanation:"DDoS Standard capabilities: Adaptive tuning = apprend le trafic normal de votre application (baseline) et detecte les deviations (attaque). Types d attaques couvertes: volumetric (saturer la bande passante), protocol (exploiter les faiblesses TCP/IP), application layer (HTTP flood). Metrics: attaques detectees, trafic mitige, taux de mitigation. Pour les applications critiques exposees sur Internet (Load Balancer, Application Gateway, Public IPs): toujours activer DDoS Standard. ROI: le cout d une attaque DDoS non-mitigee (down time business) >> cout de la protection."},
{id:412,category:"Architecture",question:"Qu est-ce que le modele Hub-and-Spoke dans Azure et comment ameliore-t-il la securite reseau ?",options:["Un modele de management d equipe","Hub-and-Spoke: une VNet Hub centrale contient les services de securite partages (Azure Firewall, VPN Gateway, Azure Bastion, Jump Box). Les VNets Spoke (une par environnement: Prod, Dev, Test, ou par business unit) sont peeres avec le Hub. Avantages securite: 1) Tout le trafic passe par le Hub (Azure Firewall inspecte), 2) Les Spokes ne communiquent pas directement entre eux (lateral movement limite), 3) Gestion centralisee des regles de securite","Un type de topologie Wi-Fi","Un systeme de load balancing"],answer:1,explanation:"Hub-and-Spoke traffic flows: Spoke A (Production) -> Hub (Azure Firewall) -> Internet (trafic sortant inspecte). Spoke B (Dev) -> Hub (Azure Firewall) -> Spoke A (trafic inter-spokes inspecte). On-premises -> Hub (VPN Gateway) -> Spoke (acces controle). Alternative: Azure Virtual WAN pour les grandes organisations avec de nombreux sites. Comparaison: Flat network (tout peere avec tout) = lateral movement facile. Hub-and-Spoke = lateral movement bloque par le Firewall central."},
{id:413,category:"Identity",question:"Comment implémenter la securite des Service Principals et Managed Identities dans Azure ?",options:["Les Service Principals n ont pas besoin de securite","Service Principal (app registration): eviter d utiliser des secrets (client secrets) quand possible (secrets peuvent etre volees ou expirent). Privilegier: Managed Identities (pas de secrets du tout = zero credential management), Certificats (plus securises que les secrets), Federated Credentials (GitHub Actions, Kubernetes OIDC -> acces Azure sans secret). Managed Identity: l identite est geree par Azure (rotation automatique des credentials, pas de secret dans le code)","Les Managed Identities sont automatiquement securisees","Utiliser un compte admin partage"],answer:1,explanation:"Managed Identity use case: une VM Azure qui doit acceder a Key Vault. Sans MI: stocker le client secret de l app dans la VM (risque de vol). Avec MI: la VM a une identite Azure AD automatique -> elle peut s authentifier aupres de Key Vault sans aucun secret. Principle of least privilege: donner uniquement le role Key Vault Secrets User (lire les secrets) pas Key Vault Administrator. Audit: surveiller les acces Key Vault dans les logs Azure AD (qui a accede a quel secret, quand)."},
{id:414,category:"Infrastructure",question:"Qu est-ce que Defender for Containers et comment protege-t-il les workloads Kubernetes ?",options:["Un antivirus pour Docker","Defender for Containers: 1) Image Scanning: scanner les images de conteneurs dans les registres (ACR) pour les vulnerabilites CVE, 2) Runtime Threat Detection: detecter les comportements suspects dans les pods Kubernetes en execution (commandes inhabituelles, connexions reseau suspectes), 3) Kubernetes audit log analysis: surveiller les changements de configuration Kubernetes (creation de ClusterRole excessif), 4) Network policies recommendations: identifier les pods trop permissifs","Un outil de gestion Docker","Un pare-feu pour les conteneurs"],answer:1,explanation:"Defender for Containers use case: un developpeur push une image avec une vulnerabilite critique CVE-2024-XXXX dans ACR -> Defender detecte dans les minutes suivantes -> alerte -> bloque optionnellement le deploiement si Azure Policy est configure. Runtime: un pod exec inhabituel (attaquant qui execute /bin/bash dans un pod) -> alerte. Kubernetes escape: tentative de montage du socket Docker depuis un conteneur -> alerte haute severite. Best practice: scanner les images dans la pipeline CI/CD avant meme qu elles arrivent dans ACR."},
{id:415,category:"Conformite",question:"Qu est-ce que Secure Score dans Microsoft 365 Defender et comment l utiliser pour prioriser les ameliorations ?",options:["Un score de credit de l organisation","Secure Score M365: mesure la posture de securite de l organisation (0-100%) basee sur les configurations et actions implementees. Actions groupees par: Identite (MFA, CA policies), Appareils (MDE enrollment, compliance policies), Applications (MDCA, app protection policies), Donnees (DLP, labels), Infrastructure (Defender for Cloud). Chaque action a un score de points et une categorie de difficulte. Prioriser: haut impact + facile a implementer en premier","Un score de satisfaction employe","Un outil de benchmark concurrentiel"],answer:1,explanation:"Secure Score strategy: ne pas viser 100% (certaines actions peuvent impacter la productivite). Viser les actions avec le meilleur ratio securite/impact utilisateur. Comparer avec le benchmark sectoriel (votre score vs moyenne industrie). Suivre l evolution mensuelle: Secure Score qui augmente = amelioration de la posture. Avertissement: Secure Score mesure les configurations Microsoft, pas la securite reelle (on peut avoir un score eleve et etre quand meme compromis si les attaquants exploitent des vecteurs non-mesures)."},
{id:416,category:"Zero Trust",question:"Comment implémenter Network Access Control NAC dans une architecture Zero Trust avec Microsoft ?",options:["NAC et Zero Trust sont incompatibles","Integration NAC avec Zero Trust: 1) Microsoft Intune (MDM): definir des politiques de conformite des appareils (OS patche, antivirus actif, chiffrement active) -> les appareils non-conformes ne peuvent acceder qu a un reseau de remediation, 2) Conditional Access: exiger Device Compliance dans la CA Policy = seuls les appareils inscrits et conformes dans Intune peuvent acceder aux apps cloud, 3) Network Policy Server NPS: pour les appareils on-premises (802.1X avec Azure AD)","NAC uniquement pour les appareils on-premises","NAC uniquement avec des solutions tiers"],answer:1,explanation:"Zero Trust NAC workflow: utilisateur apporte son laptop -> tente d acceder a un app M365 -> Azure AD CA verifie: MFA OK? Appareil Intune-enrolled? Appareil compliant (OS patche, Defender actif)? Si non-compliant -> acces refuse, message Enroll your device -> utilisateur enrolle dans Intune -> politiques deployees -> appareil devient compliant -> acces accorde. Network segmentation: appareil non-enrolled -> VLAN remediation -> uniquement acces internet pour la mise a jour et l enrollment."},
{id:417,category:"Architecture",question:"Qu est-ce que Microsoft Entra External ID et quand l utiliser vs Azure AD B2C ?",options:["Des produits identiques","Entra External ID: unite les deux produits (Azure AD B2B et Azure AD B2C) sous une seule plateforme. Azure AD B2B (Entra B2B): pour les partenaires/fournisseurs (workforce external). L invite utilise son propre compte Microsoft/Azure AD/Google. Azure AD B2C (Entra Customers): pour les clients finaux de vos applications consommateur. Personnalisation complete de l UX (page de connexion), supporte 300M+ utilisateurs, social login (Facebook, Google, Apple)","Entra External ID uniquement pour les grandes entreprises","Remplace Azure AD completement"],answer:1,explanation:"Quand utiliser quoi: Partenaire commercial qui accede a votre SharePoint = Entra B2B (il utilise son compte existant). Client de votre app mobile banking = Entra B2C/Customers (compte dedie, UX personnalisee avec votre marque). Entra External ID convergence: les nouvelles fonctionnalites sont developpees dans Entra External ID. Azure AD B2C reste supporte mais les nouvelles organisations devraient utiliser Entra External ID. Pricing: B2B = inclus avec M365, Customers = facturation par MAU (Monthly Active Users)."},
{id:418,category:"Network",question:"Qu est-ce que Private Link et Private Endpoints dans Azure et comment eliminent-ils l exposition Internet des services ?",options:["Un type de VPN Azure","Private Endpoint: une interface reseau dans votre VNet qui se connecte a un service Azure (Storage, SQL, Key Vault, etc.) via une adresse IP privee. Le trafic ne passe jamais par Internet (passe par le backbone Microsoft). Private Link Service: permet de publier vos propres services Azure via Private Link. Avantages: 1) Elimine l exposition Internet du service, 2) Les donnees ne transitent pas sur Internet, 3) Network policies NSG applicables au Private Endpoint, 4) DNS resolution via Private DNS Zone","Un service de messagerie prive","Un type de pare-feu"],answer:1,explanation:"Private Endpoint use case: Azure SQL Database expose normalement une IP publique. Avec Private Endpoint: le SQL Database n est accessible que via l IP privee dans votre VNet (ex: 10.0.1.5). Depuis Internet = acces refuse. Configuration: creer le Private Endpoint -> une interface reseau est creee dans votre subnet -> configurer le DNS pour resoudre server.database.windows.net vers l IP privee. Exiger: Azure Policy pour s assurer que tous les nouveaux services Azure sont crees avec Private Endpoints (pas d IP publique)."},
{id:419,category:"Conformite",question:"Comment Microsoft 365 supporte-t-il la conformite HIPAA pour les organisations de sante ?",options:["M365 n est pas conforme HIPAA","HIPAA sur M365: 1) BAA (Business Associate Agreement): Microsoft signe un BAA pour les services M365 (Exchange, SharePoint, Teams, etc.) -> Microsoft devient un Business Associate au sens HIPAA, 2) Chiffrement en transit et au repos inclus par defaut, 3) Audit logs HIPAA: tous les acces aux donnees sont loggues, 4) Controles d acces RBAC pour limiter l acces aux ePHI, 5) Retention policies conformes HIPAA (6 ans), 6) Purview pour la protection des donnees de sante. M365 GCC/GCC High pour les organisations gouvernementales de sante","HIPAA uniquement pour les hopitaux","M365 n est pas certifie pour la sante"],answer:1,explanation:"HIPAA compliance M365: le BAA est disponible via le Microsoft Online Services Terms (OST) - accepte automatiquement pour les services couverts. Technical safeguards HIPAA: chiffrement (MIP, OME), controles d acces (MFA + RBAC), audit controls (Purview Audit), transmission security (TLS). Administrative safeguards: formation (Microsoft offre des ressources), politiques internes (a creer par l organisation). Physical safeguards: geres par Microsoft (data centers certifies). L organisation reste responsable de ses propres configurations et politiques."},
{id:420,category:"Scenarios",question:"Scenario: Votre organisation veut migrer de AD FS (federation on-premises) vers Azure AD Authentication. Quelle est la strategie recommandee ?",options:["Migration immediate sans preparation","Migration AD FS vers Azure AD: 1) Audit des applications federeees sur AD FS (elles doivent etre migrees vers Azure AD SAML/OIDC), 2) Utiliser l outil AD FS Application Activity Report pour identifier les applications, 3) Migration par phases: d abord les apps low-risk (moins critiques), 4) Tester avec un groupe pilote, 5) PHS ou PTA comme methode d auth (plus simple) ou SSPR/MFA direct via Azure AD, 6) Desactiver AD FS seulement apres validation complete. Benefices: cout reduit, moins de maintenance, meilleur MFA et CA","Supprimer AD FS immediatement","Garder AD FS indefiniment"],answer:1,explanation:"AD FS decommission considerations: les applications qui utilisent des claims AD FS personnalises peuvent necessiter des adaptations. Azure AD Connect: si PHS est active -> les hash de mots de passe sont synchronises -> AD FS n est plus necessaire pour l authentication. Staged Rollout: activer PHS/PTA pour un groupe de test d abord -> valider -> etendre progressivement. Benefit post-migration: Conditional Access plus puissant (Azure AD CA > AD FS CA), Identity Protection (risque detecte = action immediate), SSPR (reduction tickets helpdesk)."},
{id:421,category:"Zero Trust",question:"Comment implementer l acces conditionnel basé sur le risque d identite dans Azure AD ?",options:["L acces conditionnel ne supporte pas le risque","Risk-based Conditional Access: utiliser les signaux d Azure AD Identity Protection pour des decisions en temps reel. 1) Sign-in Risk Policy: si risque de connexion = Medium/High -> exiger MFA ou bloquer. 2) User Risk Policy: si risque utilisateur = High (credentials compromis detectes par MSFT) -> forcer le changement de mot de passe. 3) Dans CA Policy: conditions -> User risk -> select risk levels -> actions -> require MFA or block. Integration: Identity Protection + CA = Zero Trust adaptatif","L acces conditionnel utilise uniquement la localisation","Identity Protection est un produit separe de CA"],answer:1,explanation:"Risk-based CA example: Alice se connecte depuis un cafe avec une IP Tor (risque de connexion = High) -> CA Policy bloque l acces. Le lendemain, ses credentials apparaissent sur le dark web (risque utilisateur = High) -> prochaine connexion requiert un changement de mot de passe immediat meme si elle est sur un reseau de confiance. Self-remediation: quand les utilisateurs peuvent remedier eux-memes (MFA challenge, password reset via SSPR), le SOC n a pas besoin d intervenir manuellement."},
{id:422,category:"Architecture",question:"Qu est-ce que le modele de securite 'Zero Standing Privileges' ZSP et comment Microsoft PIM le supporte-t-il ?",options:["Les admins doivent toujours avoir leurs droits actifs","ZSP: aucun compte n a de privileges administratifs permanents actifs. Tout acces privilegie est: demande (request), justifie (business reason), limite dans le temps (1-8 heures), approuve si necessaire (approbation par un second admin), et revoque automatiquement a l expiration. Privileged Identity Management (PIM) dans Azure AD: role assignments Eligible (peut activer) vs Active (actif en permanence). ZSP = uniquement des roles Eligible, jamais Active permanent","ZSP est uniquement pour les comptes de service","PIM est un outil de monitoring uniquement"],answer:1,explanation:"ZSP in practice: un Global Admin avec ZSP via PIM: il n a PAS le role Global Admin actif en permanence. Pour une tache critique, il active le role dans PIM (justification: 'Configuration du CA pour le projet X') -> role actif 2 heures -> tache accomplie -> role desactive automatiquement. Avantage: si son compte est compromis, l attaquant ne trouve pas de GA actif (doit activer via PIM = MFA requis + approbation). PIM Alerts: notifie si un role est active sans justification ou en dehors des horaires habituels."},
{id:423,category:"Network",question:"Qu est-ce que Azure Virtual WAN et comment ameliore-t-il la securite des connexions distantes ?",options:["Virtual WAN est un VPN classique","Azure Virtual WAN: infrastructure reseau cloud-native qui unifie: 1) Connexions site-to-site (branches via VPN ou ExpressRoute), 2) Point-to-site (utilisateurs distants via Azure VPN Client), 3) ExpressRoute (connexions privees). Securite integree: Virtual Hub avec Azure Firewall (Secured Virtual Hub) = inspection de tout le trafic branches vers cloud et internet. SD-WAN integration: connecteurs natifs pour Barracuda, Check Point, Fortinet, Palo Alto","Virtual WAN remplace tous les firewalls","Virtual WAN est uniquement pour les tres grandes entreprises"],answer:1,explanation:"Virtual WAN Secured Hub: au lieu d avoir un pare-feu dans chaque bureau regional, l Azure Firewall Premium dans le Virtual Hub inspecte tout le trafic centralement. Avantage: mises a jour des regles de securite en un seul endroit (pas 20 firewalls a gerer). Performance: Microsoft backbone global = latence reduite vs VPN internet-based. Cost: remplacement des appliances MPLS couteux + firewalls de succursales. Use case: organisation internationale avec 50 bureaux -> Virtual WAN Secured Hub = securite centralisee + performances ameliorees."},
{id:424,category:"Identity",question:"Qu est-ce que la protection des comptes 'Break Glass' d urgence et comment les configurer ?",options:["Les Break Glass accounts ne sont pas necessaires","Break Glass Accounts (Emergency Access): 2 comptes admin de dernier recours, en dehors du systeme IAM normal. Caracteristiques: 1) Exclus des politiques CA (MFA, compliance, location) pour eviter d etre locks out, 2) Mots de passe tres complexes (30+ caracteres) stockes physiquement (coffre-fort, pas numerique), 3) Non federés (pas d AD sync, uniquement cloud), 4) MFA via authenticator app avec device dedié (pas un smartphone d employe), 5) Monitores: toute utilisation declenche une alerte critique immediat","Les Break Glass accounts sont un risque de securite","Un seul Break Glass account suffit"],answer:1,explanation:"Break Glass scenario: les politiques Conditional Access ont ete mal configurees et bloquent maintenant tous les admins (lock-out complet). Sans break glass = contacter Microsoft Support (heures/jours). Avec break glass = connexion immediate pour corriger. Monitoring: creer une regle Sentinel ou une alerte Azure Monitor sur les connexions des Break Glass accounts -> si une connexion est deteclee, c est soit une urgence (legitime) soit une compromission (tres grave). Test annuel: tester que les Break Glass accounts fonctionnent effectivement (mot de passe pas expire, MFA device actif)."},
{id:425,category:"Data Security",question:"Comment implementer le chiffrement 'at rest' et 'in transit' pour les donnees Azure ?",options:["Le chiffrement est uniquement pour les donnees sensibles","Chiffrement at rest Azure: toutes les donnees dans Azure Storage, SQL Database, Cosmos DB, etc. sont chiffrées par defaut avec des cles gerees par Microsoft (SSE - Storage Service Encryption avec AES-256). Pour plus de controle: Customer Managed Keys (CMK) via Azure Key Vault. Chiffrement in transit: TLS 1.2 minimum requis pour toutes les communications. HTTPS obligatoire via Azure Policy. ExpressRoute + VPN pour les connexions privees. mTLS entre microservices","Le chiffrement est automatique et ne necessite pas de configuration","Chiffrement uniquement pour les donnees PII"],answer:1,explanation:"CMK vs Microsoft Managed Keys: Microsoft Managed = Microsoft controle la rotation des cles (pratique, secure pour la plupart). CMK = vous controlez les cles dans Key Vault (rotation manuelle ou automatique, vous pouvez revoquer). Choix CMK: regles reglementaires qui imposent le controle des cles, besoin de revoquer l acces aux donnees en cas de litige. TLS enforcement: Azure Policy Deny pour les connexions HTTP non-chiffrees. Azure App Service: forcer HTTPS Only dans la configuration. SQL Server: forcer Encrypted Connections = True."},
{id:426,category:"Zero Trust",question:"Comment concevoir une architecture Zero Trust pour les applications mobile (BYOD) ?",options:["Les appareils mobiles sont exclus du Zero Trust","BYOD Zero Trust mobile: 1) Intune App Protection Policies (MAM sans MDM): proteger les donnees des apps M365 sur des appareils non-enroles (copier/coller bloque vers d autres apps, screenshots bloques, PIN requis), 2) Conditional Access: appareil non-geré -> MAM required -> acces Exchange et SharePoint accordé mais avec restrictions, 3) Mobile Threat Defense (MTD): integration Defender for Endpoint iOS/Android -> alerte si malware ou OS non-patche, 4) Seamless SSO: MSAL library dans les apps d entreprise","BYOD doit etre interdit pour Zero Trust","Zero Trust mobile necessite MDM complet"],answer:1,explanation:"MAM without MDM (App Protection Policies): l employe ne veut pas enroller son smartphone perso dans Intune (vie privee). Solution: uniquement les apps M365 sont gerees (pas l appareil). Les donnees d entreprise dans Outlook, Teams, OneDrive sont protegees (ne peuvent pas etre copiees vers Gmail ou Photos personnelles). L appareil personnel reste prive et non-gere. MTD integration: Defender for Endpoint sur iOS/Android analyse les menaces mobiles (SMS phishing, malware, network MITM) et signale a Intune -> si risque eleve -> acces M365 revoque automatiquement."},
{id:427,category:"Architecture",question:"Qu est-ce que la 'Cloud Security Reference Architecture' de Microsoft et ses composants principaux ?",options:["Une architecture uniquement pour Azure","Microsoft Cybersecurity Reference Architectures (MCRA): ensemble de diagrammes et recommandations pour implementer la securite Microsoft end-to-end. Composants: 1) Identity (Azure AD, PIM, SSPR), 2) Endpoint Security (MDE, Intune), 3) Email Security (MDO), 4) Cloud Security (MDC, CSPM), 5) SIEM/SOAR (Sentinel), 6) Network Security (Azure Firewall, DDoS, WAF), 7) Information Protection (Purview), 8) Threat Intelligence (MDTI). Disponible publiquement sur docs.microsoft.com/en-us/security/cybersecurity-reference-architecture","Une architecture uniquement pour les grandes entreprises","Un document uniquement pour les consultants Microsoft"],answer:1,explanation:"MCRA usage: utiliser les diagrammes MCRA pour: 1) planifier les investissements securite (quels produits adressent quels risques), 2) presenter la strategie securite au board (vue d ensemble comprehensible), 3) identifier les gaps (quels domaines ne sont pas couverts par les solutions actuelles), 4) roadmap de deploiement. Le MCRA integre aussi des architectures specifiques: ransomware protection, SAP security, OT/IoT security. Mise a jour: Microsoft met a jour le MCRA regulierement avec les nouveaux produits et recommandations."},
{id:428,category:"Conformite",question:"Qu est-ce que le Shared Responsibility Model de Microsoft Azure et comment s y adapter ?",options:["Microsoft est responsable de toute la securite","Modele de responsabilite partagee: selon le type de service (IaaS, PaaS, SaaS), la frontiere de responsabilite change. IaaS (VMs): Microsoft = infrastructure physique + hyperviseur, Client = OS + applications + donnees + identites. PaaS (App Service): Microsoft + OS + runtime, Client = applications + donnees + acces. SaaS (Microsoft 365): Microsoft = presque tout, Client = donnees + identites + acces + configurations. La securite du cloud est toujours partagee","Le client est responsable de tout","Cela depend du prix du service"],answer:1,explanation:"Shared Responsibility implications: pour les VMs Azure (IaaS), le client doit patcher l OS, configurer le pare-feu OS, gerer les comptes locaux. Microsoft ne patch pas les OS des VMs clients. Pour M365 (SaaS): Microsoft gere la disponibilite et la securite de la plateforme, mais si le client configure mal les permissions SharePoint -> Microsoft n est pas responsable de la fuite de donnees. Defender for Cloud aide a identifier les responsabilites client non respectees (recommandations de securite)."},
{id:429,category:"Infrastructure",question:"Comment securiser Azure App Service pour les applications web de production ?",options:["App Service est securise par defaut","App Service Security hardening: 1) Authentification integree (Easy Auth): configurer Azure AD comme IdP -> MFA automatique, 2) HTTPS Only + Minimum TLS 1.2, 3) IP Restrictions: restreindre l acces aux IPs connues ou via Private Endpoint, 4) Managed Identity: acces a Key Vault et Storage sans credentials, 5) App Service Environment (ASE): deploiement dans un VNet prive pour l isolation maximale, 6) WAF (Application Gateway ou Azure Front Door): protection contre OWASP Top 10, 7) Diagnostic Logs vers Log Analytics","App Service ne supporte pas les configurations de securite","HTTPS est optionnel pour App Service"],answer:1,explanation:"App Service WAF: Azure Application Gateway avec WAF v2 (OWASP 3.2 ruleset) devant l App Service bloque: SQL injection, XSS, command injection, etc. avant que la requete atteigne l application. Mode detection d abord -> analyser les logs WAF -> desactiver les fausses regles -> passer en mode prevention. App Service Authentication: activer avec Token Store -> l App Service gere les tokens OAuth pour l application (l application n a pas besoin de gerer les tokens elle-meme). Defender for App Service: detecte les attaques web en temps reel."},
{id:430,category:"Scenarios",question:"Scenario: Votre organisation adopte une strategie Cloud-First. Comment prioriser les projets de securite ?",options:["Implementer la securite une fois la migration terminee","Cloud-First Security Roadmap: Phase 1 (Fondations): Azure AD + MFA pour tous + Security Defaults ou Conditional Access de base + Defender for Cloud (free tier). Phase 2 (Identite et Acces): PIM + Conditional Access complet + SSPR + Identity Protection. Phase 3 (Protection des postes et emails): Intune + MDE + Defender for Office 365. Phase 4 (Detection et Reponse): Sentinel + Playbooks. Phase 5 (Protection avancee): Purview + MDCA + Defender CSPM Premium. Chaque phase base sur la precedente","Implementer tout simultanement","Commencer par la securite reseau uniquement"],answer:1,explanation:"Prioritisation rationale: Phase 1 = stopper les compromissions les plus communes (99% des attaques utilisent des mots de passe voles -> MFA stoppe 99.9% de ces attaques). Phase 2 = limiter le rayon d explosion (PIM = meme si un compte est compromis, pas de droits admin permanents). Phase 3 = proteger les vecteurs d entree communs (email = 80%+ des acces initiaux). Phase 4 = voir ce qui passe quand meme. Phase 5 = protection avancee des donnees et comportements. Ne pas commencer par Phase 5 sans avoir les fondations (Phase 1-2)."},
{id:431,category:"Network",question:"Qu est-ce que Azure DDoS Protection Standard et quand l activer ?",options:["DDoS Protection est uniquement pour les grands sites","Azure DDoS Protection Standard: protection adaptee au profil de trafic de l application (apprentissage automatique). Fonctionnalites: 1) Mitigation automatique en quelques minutes, 2) Rapports et alertes detailles, 3) Protection de Layer 3 a Layer 7, 4) Cost protection (Azure rembourse les couts supplementaires dus a une attaque documentee), 5) DDoS Rapid Response (acces 24/7 a des experts DDoS Microsoft). Activer pour: toutes les IPs publiques d applications critiques exposees sur Internet","DDoS Standard est inclus gratuitement","DDoS Protection n est necessaire que pour les applications tres visitees"],answer:1,explanation:"DDoS Standard vs Basic: Basic (gratuit) = protection automatique de l infrastructure Azure (pas de l application specifique). Standard = protection adaptive apprenant le trafic normal de votre application specifique (ex: votre app recoit normalement 1000 req/s -> seuil d alerte a 5000 req/s). Cost: 2944 USD/mois par plan (couvre jusqu a 100 IPs publiques). ROI: une attaque DDoS non-mitigee sur une application e-commerce peut couter des centaines de milliers d euros en downtime. Pour les applications non-critiques: DDoS Basic suffit."},
{id:432,category:"Identity",question:"Comment implementer Single Sign-On SSO pour des applications tierces avec Azure AD ?",options:["SSO uniquement avec les applications Microsoft","SSO Azure AD pour apps tierces: 1) SAML 2.0: configurer dans Enterprise Applications -> New Application -> Gallery (Salesforce, ServiceNow, Workday, etc.) ou Non-gallery. Configurer Entity ID, ACS URL, et les claims a envoyer. 2) OIDC/OAuth 2.0: pour les apps modernes, creer une App Registration. 3) Password-based SSO: pour les apps qui ne supportent pas federation (vault des credentials dans Azure AD), 4) Linked SSO: lien direct vers l app sans auth. 3500+ applications dans la galerie Azure AD avec configuration guidee","SSO necessite un serveur AD FS on-premises","SSO uniquement pour les applications custom"],answer:1,explanation:"SSO benefits: 1 seul login pour toutes les applications (productivite), MFA applique une fois pour toutes les apps (securite), provisioning/deprovisioning automatique via SCIM (quand l employe quitte -> desactive dans Azure AD -> automatiquement desactive dans Salesforce, ServiceNow, etc.), logs d acces centralises dans Azure AD. App Proxy: pour les apps on-premises qui ne supportent pas la federation -> Azure AD Application Proxy publie l app et gere l auth Azure AD."},
{id:433,category:"Conformite",question:"Qu est-ce que NIS2 et comment Microsoft 365 aide-t-il les organisations europeennes a se conformer ?",options:["NIS2 ne concerne pas les technologies cloud","NIS2 (Network and Information Security Directive 2, UE 2023): renforce NIS1 avec obligations etendues a plus de secteurs (energie, transport, banque, sante, infrastructure numerique, MSPs). Exigences: 1) Risk management et gouvernance securite, 2) Gestion des incidents (notification 24h-72h), 3) Continuite des activites et gestion des crises, 4) Securite des chaines d approvisionnement, 5) Chiffrement. Microsoft aide via: Compliance Manager template NIS2, Sentinel pour la detection, Purview pour la protection des donnees, Defender for Cloud pour la posture","NIS2 uniquement pour les operateurs d importances vitale OIV","NIS2 uniquement pour les gouvernements"],answer:1,explanation:"NIS2 scope: beaucoup plus large que NIS1. Affecte: MSPs/IT service providers (si vos clients sont en UE), fournisseurs de cloud, services DNS, TLD registries, etc. Obligations: signalement des incidents significatifs a l autorite nationale competente dans les 24h (alerte initiale) et 72h (rapport complet). Sanctions: jusqu a 10M EUR ou 2% du CA mondial. Compliance Manager NIS2: evaluation des controles techniques (chiffrement, MFA, monitoring) et des controles organisationnels (politiques, formation, gouvernance)."},
{id:434,category:"Architecture",question:"Comment concevoir une architecture de securite pour un systeme IoT/OT connecte a Azure ?",options:["Les systemes IoT sont hors scope de la securite IT","IoT/OT Security Architecture: 1) Azure Defender for IoT (maintenant Microsoft Defender for IoT): detection passive des appareils OT et IoT (scan non-intrusif qui n affecte pas les systemes de controle), 2) Segmentation: reseau OT isole du reseau IT (DMZ industrielle - Purdue Model), 3) Secure gateway: Azure IoT Hub avec authentification par certificat pour chaque appareil, 4) Monitoring: les logs IoT Hub vers Sentinel. 5) OPC-UA Broker: protocole securise pour les systemes SCADA","Les appareils IoT ne peuvent pas etre securises","IoT Security uniquement pour l industrie"],answer:1,explanation:"OT Security challenges: les systemes OT (SCADA, ICS, PLCs) ont souvent 10-20+ ans d age et ne peuvent pas etre patches (la mise a jour peut arreter une chaine de production). Solution: defense en profondeur autour de ces systemes (segmentation, monitoring passif, detection d anomalies sans modification des systemes existants). Defender for IoT: analyse le trafic OT (Modbus, DNP3, EtherNet/IP) pour detecter les anomalies sans perturber les operations. Criticalite: une attaque sur un systeme OT peut avoir des consequences physiques (arret de production, securite des personnes)."},
{id:435,category:"Zero Trust",question:"Qu est-ce que l evaluation de l acces continu CAE et comment ameliore-t-il la revocation des tokens ?",options:["Les tokens ne peuvent pas etre revoques avant expiration","CAE (Continuous Access Evaluation): les applications supportant CAE (Exchange, Teams, SharePoint, OneDrive) recoivent des evenements critiques en temps reel depuis Azure AD et peuvent invalider les tokens immediatement. Evenements CAE: compte desactive, mot de passe change, session revoquee par admin, changement d IP drastique. Sans CAE: token valide 60-90 min -> attaquant avec token vole a 60-90 min d acces. Avec CAE: compte desactive -> token invalide en secondes","CAE necessite une configuration complexe","CAE uniquement pour les apps Azure uniquement"],answer:1,explanation:"CAE real-world scenario: 09h00 - Compromission detectee, 09h01 - Admin desactive le compte, 09h01 - Azure AD emet un evenement CAE, 09h01 (quelques secondes apres) - Exchange/Teams/SharePoint recoivent l evenement et invalident le token -> acces revoque. Sans CAE: admin desactive le compte a 09h01, mais le token Exchange existant reste valide jusqu a 10h30 (90 minutes plus tard). L attaquant continue a lire les emails pendant 89 minutes supplementaires. CAE limitations: uniquement les apps supportant CAE nativement; les apps tierces sans support CAE ne beneficient pas de la revocation immediate."},
{id:436,category:"Scenarios",question:"Comment implementer une strategie de Zero Trust pour une acquisition recente (nouveau tenant Azure AD a integrer) ?",options:["Fusionner immediatement les deux tenants","Integration M&A Zero Trust: 1) Phase 1 (Decouverte): auditer la posture securite du tenant acquis (Secure Score, configuration MFA, politiques CA), 2) Phase 2 (Federation temporaire): B2B collaboration pour permettre la collaboration immediate sans merger les tenants, 3) Phase 3 (Alignement des standards): deployer les memes politiques de securite dans les deux tenants (MFA, CA, MDE), 4) Phase 4 (Decision): migrer vers un seul tenant ou maintenir la federation permanente, 5) Phase 5 (Monitoring unifie): Sentinel multi-workspace pour voir les deux tenants","Donner immediatement un acces complet aux employes du tenant acquis","Bloquer tout acces en attendant la migration"],answer:1,explanation:"M&A security risks: le tenant acquis peut avoir une posture securite significativement plus faible (moins de MFA, plus de privileges excessifs, pas de EDR). Connecter les deux tenants sans audit = attaquant dans le tenant acquis -> acces au tenant principal. Due Diligence securite M&A: evaluer la posture securite avant la transaction (valeur cachee = les incidents en cours ou les vulnerabilites existantes representent un passif). Minimum avant federation: exiger le meme niveau de MFA et de conformite endpoint dans les deux tenants via des politiques de Conditional Access tenant-to-tenant."}
];

const AZ500_QUESTIONS = [
{id:1001,cat:"Azure AD / Entra ID",q:"Qu'est-ce que 'Privileged Identity Management (PIM)' dans Azure AD ?",o:["Un outil de monitoring des privilèges","Un service qui gère l'activation JIT (Just-In-Time) des rôles privilégiés avec approbation, MFA, durée limitée et audit complet","Un annuaire des utilisateurs privilégiés","Un scanner de permissions RBAC"],a:1,e:"PIM permet l'activation JIT des rôles Azure AD et Azure Resource: l'utilisateur demande l'activation (durée max 8h par défaut), approuvée par un responsable, avec MFA, audit complet. Élimine les comptes 'standing admin' permanents."},
{id:1002,cat:"Azure AD / Entra ID",q:"Scénario: Un utilisateur doit administrer des VMs Azure pendant 4 heures le weekend. Comment gérer ça avec PIM ?",o:["Lui donner le rôle permanent","Configurer PIM: rôle Contributor eligible sur le Resource Group des VMs. L'utilisateur active le rôle en précisant la durée (max 4h), avec justification business. Activation expire automatiquement après 4h","Créer un compte admin temporaire","Lui donner le mot de passe du Global Admin"],a:1,e:"PIM JIT: rôle 'eligible' (pas actif en permanence) → l'utilisateur active pour 4h max avec raison documentée → approval workflow si configuré → audit log de l'activation. Après 4h, le rôle se désactive automatiquement."},
{id:1003,cat:"Azure AD / Entra ID",q:"Quelle est la différence entre 'Authentication Methods Policy' et 'Legacy MFA Policy' dans Azure AD ?",o:["Elles sont identiques","Authentication Methods Policy est la nouvelle politique unifiée gérant toutes les méthodes auth (passkeys, Authenticator, FIDO2, SMS). Legacy MFA Policy est l'ancienne per-user MFA à migrer vers la nouvelle","Legacy est plus sécurisée","Authentication Methods Policy est uniquement pour passwordless"],a:1,e:"Microsoft migre vers l'Authentication Methods Policy centralisée. L'ancienne MFA per-user (legacy) sera dépréciée. La nouvelle politique gère toutes les méthodes: FIDO2, Microsoft Authenticator (push+passwordless), OATH TOTP, SMS, voice call, Temporary Access Pass."},
{id:1004,cat:"Azure AD / Entra ID",q:"Qu'est-ce que 'Azure AD Identity Protection' et ses deux types de politiques ?",o:["Un scanner de l'annuaire AD","Un service qui détecte les risques utilisateur et de connexion. Sign-in Risk Policy (bloquer/exiger MFA sur connexions risquées) et User Risk Policy (forcer reset MDP sur comptes compromis). Alimente les Conditional Access policies","Un outil de gestion des comptes","Un service de backup de l'AD"],a:1,e:"Identity Protection calcule des scores de risque via ML (IP anonymes, credential leak, impossible travel, etc.). Sign-in Risk Policy = réagir sur chaque connexion risquée. User Risk Policy = agir quand un compte est considéré compromis. Intégré nativement dans Conditional Access."},
{id:1005,cat:"Azure AD / Entra ID",q:"Scénario: Vous détectez que des credentials Azure AD de votre organisation sont en vente sur le dark web. Comment Azure AD vous aide-t-il ?",o:["Azure AD ne peut pas détecter ça","Identity Protection 'Leaked Credentials' detection: Microsoft surveille le dark web et corrèle avec les comptes Azure AD. Si un couple email/password est trouvé, le compte est flaggué 'High Risk' et la User Risk Policy peut forcer un reset de mot de passe","Uniquement via notification email","Désactiver tous les comptes"],a:1,e:"Le signal 'Leaked Credentials' dans Identity Protection provient d'une collaboration Microsoft avec des chercheurs en sécurité qui surveillent les forums dark web, les breaches publiques (HaveIBeenPwned-style). Quand un match est trouvé avec vos comptes, le risque utilisateur passe à High."},
{id:1006,cat:"Azure AD / Entra ID",q:"Quelle est la différence entre 'Conditional Access Grant controls' et 'Session controls' ?",o:["Ils sont identiques","Grant controls déterminent si l'accès est accordé (exiger MFA, appareil conforme, app approuvée, etc.). Session controls modifient le comportement pendant la session (durée du token, inspection MDCA, fréquence de connexion)","Grant controls sont plus stricts","Session controls remplacent les Grant controls"],a:1,e:"Grant controls = décision binaire d'accès: accorder conditionnellement (exiger MFA ET appareil conforme) ou bloquer. Session controls = comportement post-grant: sign-in frequency (forcer re-auth), persistent browser session, Conditional Access App Control (MDCA proxy), app enforced restrictions."},
{id:1007,cat:"Azure AD / Entra ID",q:"Qu'est-ce que 'Microsoft Entra External ID' (anciennement Azure AD B2C) ?",o:["Un outil de gestion des identités internes","Une plateforme CIAM (Customer Identity and Access Management) permettant de construire des expériences d'authentification personnalisées pour les clients externes d'applications (B2C), avec support des réseaux sociaux, MFA, flows d'inscription personnalisables","Un VPN pour les clients externes","Un proxy d'authentification"],a:1,e:"Entra External ID/B2C est la solution Microsoft pour les apps customer-facing: inscription/connexion avec email, réseaux sociaux (Google, Facebook, Apple), politiques de flows personnalisables (signup, signin, password reset), MFA, branding personnalisé, et scale pour des millions d'utilisateurs."},
{id:1008,cat:"Azure AD / Entra ID",q:"Comment fonctionne 'Azure AD Access Reviews' et quand les déclencher ?",o:["Uniquement lors d'audits annuels","Access Reviews permettent aux owners/managers de certifier périodiquement que les accès (groupes, apps, rôles) sont toujours nécessaires. Déclencher: trimestriellement pour les groupes sensibles, mensuellement pour les rôles PIM, lors d'arrivées/départs","Uniquement pour les comptes externes","Uniquement manuellement"],a:1,e:"Access Reviews peuvent être déclenchées automatiquement (planning périodique) ou manuellement. Les reviewers (managers, owners, auto-review) certifient chaque accès: Approve/Deny. Les accès refusés sont automatiquement révoqués. Essentiels pour la conformité et le principe du moindre privilège."},
{id:1009,cat:"Azure AD / Entra ID",q:"Scénario: Un utilisateur Tier-2 dans votre helpdesk doit pouvoir réinitialiser les mots de passe des utilisateurs standard mais PAS des admins. Quel rôle Azure AD ?",o:["Helpdesk Administrator","Password Administrator - peut réinitialiser les mots de passe des non-admins et des Helpdesk Admins uniquement. Authentication Administrator peut aussi gérer les méthodes d'auth des non-admins","User Administrator","Global Administrator"],a:1,e:"Le rôle 'Password Administrator' dans Azure AD peut réinitialiser les mots de passe des utilisateurs non-admins. Il ne peut pas gérer les admins. 'Authentication Administrator' peut gérer les méthodes d'authentification + reset MDP pour les non-admins. Tous deux appliquent le moindre privilège."},
{id:1010,cat:"Azure AD / Entra ID",q:"Qu'est-ce que 'Workload Identity Federation' dans Azure AD et son avantage sécurité ?",o:["Une fédération d'identités pour les apps web","Permet aux workflows externes (GitHub Actions, Kubernetes pods, AWS) de s'authentifier auprès d'Azure AD sans credentials secrets, en utilisant des tokens OIDC émis par leur plateforme. Élimine les secrets à gérer/rotater","Une intégration avec des IdP tiers","Un service de signature de code"],a:1,e:"Workload Identity Federation: GitHub Actions peut s'authentifier à Azure AD en présentant son token OIDC (émis par GitHub). Azure AD valide l'identité du workflow (repo, branch, environment) et émet un token Azure. Aucun secret client Azure ne stocké dans GitHub - révolutionne la sécurité CI/CD."},
