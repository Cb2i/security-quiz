{id:1077,cat:"Gouvernance Azure",q:"Comment implémenter une stratégie de 'Landing Zones' sécurisées dans Azure pour les nouvelles équipes ?",o:["Créer manuellement chaque abonnement","Azure Landing Zones (CAF): template prescriptif pour créer des abonnements 'prêts pour la production': Management Group hierarchy, Azure Policy (guardrails), Budget alerts, Defender for Cloud activé, Log Analytics centralisé, Network topology (hub-and-spoke), RBAC par défaut. Nouvelles équipes reçoivent un abonnement Landing Zone pré-configuré et sécurisé","Un VNet partagé pour toutes les équipes","Des VMs partagées"],a:1,e:"Azure Landing Zones (ALZ): Accelerator (bicep ou Terraform) déploie automatiquement: Management Groups (Platform, Landing Zones, Sandbox), Azure Policies héritées (chiffrement requis, logs requis, regions autorisées), Defender for Cloud activé, Connectivity (hub VNet), et Identity (AD Connect). Chaque nouvelle équipe reçoit un spoke abonnement pré-configuré avec les guardrails activés."},
{id:1078,cat:"Conteneurs et AKS",q:"Comment implémenter 'GitOps' sécurisé pour les déploiements AKS avec Azure Arc et Flux ?",o:["Kubectl apply directement en production","GitOps avec Flux (ArgoCD): 1) Dépôt Git = source de vérité (manifests K8s signés), 2) Flux contrôleur dans AKS surveille le dépôt Git, 3) Toute modification validée dans Git (PR review, signé) est automatiquement déployée, 4) Pas d'accès kubectl direct à la production, 5) Azure Arc pour étendre GitOps aux clusters on-premises, 6) RBAC Git (branche protection, required reviewers)","Déploiement FTP des fichiers YAML","Un accès root au cluster"],a:1,e:"GitOps security: séparation des duties (développeur soumet PR, reviewer approuve, Flux déploie automatiquement = pas de déploiement manuel en prod), signed commits (GPG verification), Policy as Code dans le repo (OPA policies validées en CI), et audit trail complet via Git history. Azure Arc enabled AKS = même modèle GitOps pour les clusters on-premises et multi-cloud."},
{id:1079,cat:"Conteneurs et AKS",q:"Scénario: Votre registre de conteneurs ACR doit être accessible uniquement depuis AKS et votre pipeline CI/CD, pas depuis Internet. Comment configurer ?",o:["ACR est public par défaut, impossible de restreindre","1) Désactiver l'accès réseau public ACR (Public network access: Disabled), 2) Créer un Private Endpoint ACR dans le VNet AKS, 3) Private DNS Zone pour *.azurecr.io → IP privée, 4) Pour le pipeline CI/CD (Azure DevOps): hosted agents dans un VNet avec accès au Private Endpoint, ou utiliser un Azure Container Registry managed agent","ACR a un mot de passe suffisant","NSG sur le port 443 uniquement"],a:1,e:"ACR sécurisé: Private Endpoint (l'IP ACR est une IP privée dans votre VNet), public access disabled (plus accessible depuis Internet), authentication via Managed Identity d'AKS (imagePullSecrets éliminés, AKS utilise kubelet MI pour pull les images). Pipeline CI/CD: self-hosted agents dans le VNet (accès Private Endpoint) ou utiliser Microsoft-hosted agents avec Service Endpoint (moins préférable)."},
{id:1080,cat:"Stockage Sécurisé",q:"Qu'est-ce que 'Azure Storage Account Network Rules' et comment les configurer pour une sécurité maximale ?",o:["Des règles NSG sur le stockage","1) Mettre le firewall Storage en mode 'Deny all' (désactiver l'accès public), 2) Ajouter des règles pour les VNets autorisés (Service Endpoints ou Private Endpoints), 3) Ajouter des exceptions pour les services Azure de confiance (Azure Backup, Azure Monitor, Azure Site Recovery), 4) Optionnel: autoriser des IPs spécifiques (offices)","Uniquement chiffrer le stockage","Pas de configuration réseau nécessaire"],a:1,e:"Storage Account Firewall: par défaut 'Allow all networks' (mauvaise pratique). Configurer: Default action → Deny. Ajouter: Virtual Networks (Service Endpoints dans les VNets autorisés), Individual IPs (bureaux connus), et cocher 'Allow trusted Microsoft services' (pour Backup, Monitoring, etc.). Private Endpoint = l'approche la plus sécurisée (IP privée uniquement, pas de Service Endpoint traversant Internet)."},
{id:1081,cat:"Scénarios Avancés",q:"Scénario: Vous devez répondre à un incident où un Service Principal Azure AD a été utilisé pour créer des ressources non autorisées dans votre abonnement. Steps ?",o:["Supprimer le Service Principal","1) Identifier le SP compromis (AuditLogs, ActivityLogs), 2) Révoquer immédiatement: supprimer tous les credentials du SP (secrets + certificats dans AAD), 3) Révoquer les tokens actifs (la révocation des credentials invalide les nouveaux tokens, les tokens actifs expirent selon leur durée), 4) Inventorier les ressources créées (Resource Graph: created by this SP), 5) Supprimer les ressources non autorisées, 6) Analyser comment le SP a été compromis (code source? pipeline? partagé?)","Changer le mot de passe du SP","Désactiver l'abonnement"],a:1,e:"Incident SP compromis: priorité = révoquer l'accès (supprimer les secrets/certs du SP dans AAD → plus de nouveaux tokens). Ensuite: inventaire des dommages (Resource Graph: resourceChanges where changedByPrincipalId == SP-ID), supprimer les ressources non autorisées, identifier le mode de compromission (secret dans GitHub, dans un script partagé, dans des logs), et mettre en place Workload Identity Federation pour éviter les secrets SP."},
{id:1082,cat:"Scénarios Avancés",q:"Comment implémenter 'Microsoft Entra Private Access' pour sécuriser l'accès aux applications on-premises ?",o:["VPN traditionnel uniquement","Entra Private Access (ZTNA): 1) Installer le GSA (Global Secure Access) client sur les endpoints, 2) Installer le Network Access Connector on-premises (remplace le VPN gateway), 3) Créer des App Segments (FQDN:port ou IP:port des apps on-prem dans AAD), 4) Créer une Private Access Policy (qui peut accéder à quoi, avec quelles conditions CA), 5) Les utilisateurs accèdent à l'app sans VPN, via l'identité AAD","Ouvrir les ports sur le firewall on-premises","Créer un proxy web"],a:1,e:"Entra Private Access vs VPN: VPN = accès réseau large (entrer dans le VPN = accéder à tout le réseau on-prem). Private Access = ZTNA app-par-app (l'utilisateur accède uniquement aux App Segments configurés, pas à l'ensemble du réseau). Conditional Access s'applique (MFA, appareil conforme). Le connector est un agent sortant (pas de port entrant ouvert sur le firewall). Logs dans Entra pour l'audit."},
{id:1083,cat:"Azure AD / Entra ID",q:"Scénario: Vous devez auditer toutes les modifications de permissions RBAC dans vos abonnements Azure au cours des 30 derniers jours. Comment ?",o:["Vérifier manuellement chaque abonnement","Azure Activity Log: filtrer sur 'Operation name: Create role assignment' et 'Delete role assignment', plage de 30 jours. Ou via KQL dans Sentinel/Log Analytics: AzureActivity | where OperationNameValue contains 'roleAssignment' | project TimeGenerated, Caller, ResourceGroup, Properties. Exporter en CSV pour l'auditeur","Uniquement via PowerShell","Azure Policy reports"],a:1,e:"Audit RBAC: AzureActivity logs (disponibles par défaut, rétention 90 jours) filtré sur MICROSOFT.AUTHORIZATION/ROLEASSIGNMENTS/WRITE et DELETE. KQL: AzureActivity | where OperationNameValue in ('MICROSOFT.AUTHORIZATION/ROLEASSIGNMENTS/WRITE', 'MICROSOFT.AUTHORIZATION/ROLEASSIGNMENTS/DELETE') | where TimeGenerated > ago(30d) | project TimeGenerated, Caller, ActivityStatusValue, Properties. Configurer une alerte sur les WRITE par des non-PIM."},
{id:1084,cat:"Gouvernance Azure",q:"Qu'est-ce que l'initiative 'Microsoft Cloud Security Benchmark (MCSB)' et comment l'appliquer ?",o:["Un outil de mesure de performance cloud","Le successeur de l'Azure Security Benchmark, étendu au multi-cloud: contrôles de sécurité applicables à Azure ET AWS/GCP. Remplace l'Azure Security Benchmark v3. Dans MDC: l'initiative MCSB est l'assessment par défaut. S'applique automatiquement sur tous les abonnements onboardés dans MDC. Fournit les recommandations de sécurité cross-cloud alignées avec CIS, NIST, PCI DSS","Une certification cloud","Un outil de performance réseau"],a:1,e:"MCSB (remplace ASB v3): 14 domaines de contrôles applicables à Azure ET AWS ET GCP. Dans MDC, c'est l'assessment par défaut qui génère les recommandations du Secure Score. Chaque contrôle MCSB est mappé à des ressources cloud spécifiques (ex: NS-1 'Implement segmentation' → NSG recommendations sur Azure, Security Groups sur AWS). Cross-cloud coverage."},
{id:1085,cat:"Scénarios Avancés",q:"Comment configurer la 'Diagnostic Settings' complète pour un abonnement Azure pour la conformité et la sécurité ?",o:["Uniquement les logs des VMs","Pour chaque ressource Azure: Diagnostic Settings → envoyer vers Log Analytics Workspace (toutes les catégories: Administrative, Security, ServiceHealth, Alert, Recommendation, Policy, Autoscale). Resource-level: activer les Diagnostic Logs (ex: Key Vault logs, Storage logs, Firewall logs). Subscription-level: Activity Logs → Log Analytics. Créer une Azure Policy 'DeployIfNotExists' pour forcer les Diagnostic Settings sur toutes nouvelles ressources","Uniquement Azure Monitor","Uniquement les alertes email"],a:1,e:"Diagnostic Settings exhaustif: Subscription Activity Logs (toutes catégories) → Log Analytics centralisé. Pour chaque type de resource: AuditLog + AllMetrics. Azure Policy built-in 'Deploy-Diagnostics': initiative qui déploie automatiquement les Diagnostic Settings sur toutes les ressources dans tous les abonnements du Management Group. Log Analytics workspace avec rétention configurée (90 jours standard, 1-7 ans avec Archive tier)."},
{id:1086,cat:"Stockage Sécurisé",q:"Qu'est-ce que 'Azure Blob Storage Lifecycle Management' et son impact sur la sécurité des données ?",o:["Uniquement pour réduire les coûts","Lifecycle Management politique: déplacer automatiquement les blobs entre tiers (Hot→Cool→Archive→Delete) selon l'âge ou la dernière modification. Impact sécurité: 1) Supprimer automatiquement les données après leur durée de rétention légale, 2) Archiver les données sensibles (Archive tier = offline, lecture différée, réduit la surface d'attaque), 3) Réduire les coûts tout en respectant la politique de rétention des données","Uniquement pour la performance","Un système de backup automatique"],a:1,e:"Lifecycle Management sécurité: créer une règle 'Supprimer les blobs après 7 ans' (conformité data retention), 'Archiver les blobs > 90 jours' (données froides moins accessibles = moindre surface d'attaque pour exfiltration). Combiné avec Immutable Storage (WORM): les données sont protégées contre suppression/modification pendant la rétention légale, puis supprimées automatiquement à l'expiration."},
{id:1087,cat:"Azure AD / Entra ID",q:"Scénario: Comment détecter et investiguer une attaque de 'Password Spray' contre votre tenant Azure AD ?",o:["Uniquement via les alertes email","Détection: Azure AD Sign-in logs → filtrer UserType=Member, ResultCode=50126 (invalid credentials) de nombreux usernames différents depuis la même IP ou plage d'IPs. Ou Identity Protection alerte 'Password Spray'. KQL: SigninLogs | where ResultType != '0' | summarize FailureCount=count(), UsersAttempted=dcount(UserPrincipalName) by IPAddress | where FailureCount > 100 and UsersAttempted > 10 | order by FailureCount desc","Compter les emails reçus","Uniquement après la compromission"],a:1,e:"Password Spray signature: beaucoup d'échecs (50126) depuis peu d'IPs, contre de nombreux usernames (essayant des passwords courants un par un pour éviter le lockout). Identity Protection alerte 'Password spray attack'. Réponse: bloquer les IPs sources dans Named Locations CA, activer Smart Lockout, activer MFA (rend le spray inutile), vérifier les comptes qui ont réussi l'auth depuis ces IPs (potentiellement compromis)."},
{id:1088,cat:"Azure AD / Entra ID",q:"Comment implémenter 'Entra ID Protection's User Risk Remediation' automatiquement ?",o:["Investigation manuelle uniquement","1) User Risk Policy dans Identity Protection (ou Conditional Access avec User Risk): when User Risk = High → require password change with MFA. 2) L'utilisateur est bloqué jusqu'à la réinitialisation du mot de passe via SSPR avec MFA. 3) Post-remediation: le risque est automatiquement abaissé. 4) Pour les comptes avec risque non auto-remédié: admin peut dismiss le risque manuellement","Désactiver le compte","Réinitialiser manuellement tous les comptes"],a:1,e:"User Risk auto-remediation: configurer une CA policy (User Risk = High → Grant: Require password change). L'utilisateur tente de se connecter → CA détecte le risque élevé → forcé vers SSPR avec son 2e facteur enregistré → reçoit un nouveau password → risque réinitialisé. Entièrement automatique sans intervention admin. Pour les comptes sans SSPR: escalade vers le helpdesk."},
{id:1089,cat:"Scénarios Avancés",q:"Comment déployer 'Defender for SQL' et interpréter ses alertes ?",o:["Un antivirus pour SQL Server","Defender for SQL (Azure SQL + SQL sur VMs + Arc SQL): détecter les menaces sur les bases de données: SQL injection attempts, anomalous access (utilisateur qui accède rarement à une table commence à la dumper), brute force attempts, vulnerable configurations. Activer via MDC → Defender plans → SQL servers. Alertes dans MDC + Sentinel","Un outil de monitoring de performance SQL","Un scanner de backup SQL"],a:1,e:"Defender for SQL alertes: 'Suspected SQL injection attack' (payload malveillant détecté dans une requête), 'Unusual application access' (app qui n'accède pas normalement à cette DB), 'Potential data exfiltration' (volume de données sorti anormalement élevé), 'Logon from unusual location' (connexion depuis un nouveau pays). Investigation: vérifier la requête suspecte dans les logs d'audit SQL (SQLSecurityAuditEvents)."},
{id:1090,cat:"Gouvernance Azure",q:"Comment configurer 'Azure Cost Management' comme outil de sécurité pour détecter les abus de ressources ?",o:["Cost Management est uniquement pour la facturation","Créer des alertes de budget par resource group ou tag de service: si les coûts dépassent un seuil, alerter. Cela peut détecter: crypto-mining (coûts CPU anormaux), création massive de ressources (coûts de storage explosent), et ressources non autorisées (coûts dans des resource groups inconnus). Combiner avec Azure Policy pour limiter les types de ressources et les régions","Uniquement le département Finance","Un outil de performance uniquement"],a:1,e:"Cost anomaly detection: Azure Cost Management Anomaly Detection (ML-based: alerter si les coûts dévient anormalement de la baseline). Budget alerts: si les GPU VMs (coûteuses) apparaissent soudainement = potentiellement du crypto-mining. Combiner avec Resource Graph pour voir quels types de ressources ont été créés récemment. Azure Policy: interdire les VM sizes coûteuses (Standard_NC = GPU) sauf sur des abonnements spécifiques."},
{id:1091,cat:"Azure AD / Entra ID",q:"Qu'est-ce que 'Microsoft Entra Domain Services (AADDS)' et quand l'utiliser ?",o:["Un remplacement de l'Active Directory on-premises","Un service PaaS qui fournit des services de domaine managés (LDAP, Kerberos, NTLM, Group Policy) dans Azure sans déployer des Domain Controllers. Utile pour: apps legacy qui nécessitent l'authentification Kerberos/NTLM mais pas de DC à gérer. Synchronisé depuis Azure AD (one-way). Microsoft gère les DCs, les patches, la réplication","Un Active Directory on-premises dans le cloud","Un outil de fédération SSO"],a:1,e:"Entra Domain Services use case: apps legacy (Java EE sur LDAP, applications utilisant Kerberos) qui ne peuvent pas utiliser l'authentification moderne (OIDC/OAuth). Sans AADDS: ces apps nécessitent un DC on-premises ou des VMs DC dans Azure. Avec AADDS: managed DCs dans un subnet dédié, synchronisation depuis Azure AD. Ne pas confondre avec la migration AD → AAD Native (AADDS = coexistence)."},
{id:1092,cat:"Réseau Azure",q:"Comment sécuriser les communications entre microservices dans une architecture event-driven sur Azure Service Bus ?",o:["Communication non sécurisée entre services internes","1) Managed Identity pour l'authentification Azure Service Bus (pas de connectionString avec clé), 2) RBAC Service Bus: Data Sender pour les producteurs, Data Receiver pour les consommateurs, 3) Private Endpoint pour Service Bus (accès via IP privée), 4) Message-level encryption si les messages contiennent des données sensibles (chiffrement avant publication), 5) Dead Letter Queue monitoring pour détecter les erreurs anormales","Clé partagée dans le code","Connexion publique avec TLS"],a:1,e:"Service Bus sécurisé: Managed Identity (pas de SAS token dans le code), RBAC granulaire (producteur = Azure Service Bus Data Sender, consommateur = Data Receiver - rôles distincts), Private Endpoint (Service Bus accessible uniquement depuis le VNet), et chiffrement at-rest (CMK si données sensibles). TLS 1.2 minimum pour le transport."},
{id:1093,cat:"Scénarios Avancés",q:"Comment réaliser une 'Attack Path Analysis' avec Microsoft Defender for Cloud ?",o:["Uniquement un scan de vulnérabilités","MDC CSPM Premium: Attack Path Analysis identifie automatiquement les chemins d'attaque visuels: ressource exposée à Internet (VM avec IP publique) + vulnérabilité non patchée + Managed Identity avec accès à des données sensibles = chemin d'attaque. MDC affiche le graphe avec chaque étape. Permet de prioriser les remédiation qui coupent le plus de chemins d'attaque","Un rapport de conformité","Un outil de pen test"],a:1,e:"Attack Path Analysis (Defender CSPM Premium): ingère les données de tous les MDC plans (posture + workload) et construit un graphe de sécurité cloud. Chaque nœud = une ressource Azure. Les arêtes = relations (VM a accès à DB via MI, VM exposée à Internet via NSG permissif). Les chemins qui vont d'une ressource exposée à des 'crown jewels' (données sensibles, KV) sont les Attack Paths prioritaires."},
{id:1094,cat:"Gouvernance Azure",q:"Comment utiliser 'Azure Resource Graph' pour l'inventaire et l'audit de sécurité à grande échelle ?",o:["Uniquement pour les ressources d'un seul abonnement","Azure Resource Graph (ARG): moteur de requête KQL sur toutes les ressources Azure de tous les abonnements et Management Groups. Utilisation sécurité: inventaire des VMs sans Defender for Endpoint (Resources | where type == 'microsoft.compute/virtualmachines' | join ... MDE status), trouver tous les Storage Accounts avec accès public, tous les NSG avec règles ouvertes sur Internet. Real-time, scalable à des milliers d'abonnements","Uniquement le portail Azure","Uniquement PowerShell"],a:1,e:"ARG requêtes sécurité: Resources | where type=='microsoft.storage/storageaccounts' | where properties.allowBlobPublicAccess==true → tous les storage accounts avec blobs publics. Resources | where type=='microsoft.network/networksecuritygroups' | mv-expand rule=properties.securityRules | where rule.properties.access=='Allow' and rule.properties.sourceAddressPrefix=='*' and rule.properties.destinationPortRange=='3389' → NSGs permettant RDP depuis Internet. Cross-subscription visibility."},
{id:1095,cat:"Azure AD / Entra ID",q:"Comment implémenter 'Lifecycle Workflows' dans Microsoft Entra pour automatiser le joiner/mover/leaver ?",o:["Processus manuel via des tickets IT","Entra Lifecycle Workflows: 1) Joiner: quand un employé est créé dans HR (SCIM), auto-add aux groupes, envoyer email de bienvenue, générer TAP (Temporary Access Pass) pour la première connexion. 2) Mover: quand un changement de département, modifier les groupes/droits automatiquement. 3) Leaver: quand la date de départ est dans HR, désactiver le compte, révoquer les sessions, transférer la boîte email","Scripts PowerShell planifiés","Ticketing manuel IT"],a:1,e:"Lifecycle Workflows (Entra): créer des workflows associés à des triggers (attribut HR: EmployeeHireDate, EmployeeLeaveDate, Department change). Actions disponibles: Add user to group, Remove user from group, Send email, Disable user account, Revoke sign-in sessions, Remove licenses, Generate TAP. Intégration native avec Workday/SuccessFactors/SAP via provisioning SCIM. Tout automatisé, audit complet."},
{id:1096,cat:"Réseau Azure",q:"Scénario: Des VMs dans Azure doivent accéder à des ressources dans un VNet on-premises via ExpressRoute. Comment sécuriser ce trafic avec des politiques NSG ?",o:["Le trafic ExpressRoute est sécurisé automatiquement","NSG sur les subnets Azure: règles entrantes depuis le range d'IPs on-premises (Service Tag 'VirtualNetwork' ou les préfixes spécifiques on-prem) vers les ports nécessaires uniquement. UDR optionnel: forcer le trafic vers Azure Firewall (inspection entre on-prem et Azure). Monitoring: NSG Flow Logs + Traffic Analytics pour auditer tous les flux ExpressRoute","Aucune politique supplémentaire nécessaire","Uniquement un VPN en plus d'ExpressRoute"],a:1,e:"Sécurité trafic ExpressRoute: le circuit est privé mais la sécurité réseau s'applique toujours. NSG allow: uniquement les plages IP on-premises sur les ports nécessaires (ex: Allow TCP 1433 from 192.168.0.0/16 = SQL on-prem vers Azure SQL). UDR + Azure Firewall: inspecter le trafic entre on-prem et Azure (détection latérale). Forcer l'inspection = visibilité sur ce qui traverse ExpressRoute."},
{id:1097,cat:"Conteneurs et AKS",q:"Qu'est-ce que 'Azure Confidential Containers' et son utilité dans AKS ?",o:["Des containers avec plus de RAM","Des containers s'exécutant dans un TEE (Trusted Execution Environment - AMD SEV-SNP): le nœud AKS est protégé contre l'hyperviseur et l'administrateur Azure. Les données et le code dans le container sont chiffrés même en cours d'exécution. Utile: traitement de données médicales ou financières ultra-sensibles dans un cloud partagé","Des containers avec chiffrement réseau uniquement","Des containers avec accès root restreint"],a:1,e:"AKS Confidential Nodes (DCasv5 SKU avec AMD SEV-SNP): les pods dans ces nœuds s'exécutent dans un hardware TEE. L'administrateur Azure (et vous) ne peut pas voir le contenu de la mémoire des pods. Les workloads peuvent faire l'attestation (prouver qu'ils s'exécutent dans un vrai TEE avant de recevoir des secrets). Use case: traitement ML sur données patients entre hôpitaux concurrents."},
{id:1098,cat:"Gouvernance Azure",q:"Comment implémenter des 'Budgets' et des 'Cost Anomaly Alerts' comme contrôles de sécurité dans Azure ?",o:["Uniquement pour la finance","Security perspective: des ressources coûteuses créées soudainement = potentiellement un incident de sécurité (crypto-mining, credential compromise créant des VMs dans des régions inconnues). Configurer: 1) Budget par subscription et resource group avec alertes à 80% et 100%, 2) Cost Anomaly Detection (MDC ou Azure Cost Management): alerte ML si les coûts dévient >X% de la baseline, 3) Azure Policy: interdire les types de VMs coûteux sauf sur des abonnements spécifiques","Aucun lien avec la sécurité","Uniquement pour les alertes de dépassement"],a:1,e:"Cost anomaly = security signal: une VM GPU NC series apparaissant dans un abonnement de développement = potentiellement du crypto-mining par un compte compromis ou un insider. Azure Cost Management Anomaly Detection + Budget Alert → notification → investigation. Combiner avec Azure Activity Log (qui a créé la VM?) pour identifier rapidement si c'est un incident."},
{id:1099,cat:"Azure AD / Entra ID",q:"Qu'est-ce que 'Microsoft Entra ID Governance' et ses capacités principales ?",o:["Un outil de reporting AAD","La plateforme de gouvernance des identités: Access Reviews (certifier les accès périodiquement), Entitlement Management (packages d'accès avec approbation, durée, révision), Lifecycle Workflows (automatiser joiner/mover/leaver), PIM (accès JIT privilegié), et Terms of Use (faire accepter des CGU avant l'accès). Gouvernance complète du cycle de vie des identités et des accès","Un outil de provisioning uniquement","Un outil de monitoring des connexions"],a:1,e:"Entra ID Governance vs Azure AD basic: ID Governance ajoute Entitlement Management (catalog d'accès, packages, approval workflows multi-étapes, self-service access request), Access Reviews avancées (avec IA recommendation), Lifecycle Workflows avancés, et Terms of Use granulaires. Licence P2 ou Governance add-on requis. Essentiel pour les organisations ayant des besoins de conformité IGA (Identity Governance and Administration)."},
{id:1100,cat:"Scénarios Avancés",q:"Comment configurer 'Microsoft Sentinel' pour couvrir une architecture Azure hybride (Azure + on-premises + Microsoft 365) ?",o:["Sentinel ne couvre que Azure","Connecteurs Sentinel multi-source: 1) Azure: Activity Logs, Defender for Cloud (MDC), Azure AD (SigninLogs, AuditLogs), 2) Microsoft 365: Defender for M365, Defender for Office 365, Teams, Exchange, 3) On-premises: Windows Event Collector (AMA agent sur Windows servers), Linux Syslog (AMA agent), Active Directory (Security Events via AMA), Fortinet/Cisco/Palo Alto via Syslog CEF, 4) Threat Intelligence: TAXII, Microsoft TI","Sentinel ne supporte pas les environnements hybrides","Un SIEM on-premises uniquement"],a:1,e:"Sentinel architecture hybride: Log Analytics Workspace central. Connecteurs data: Microsoft 365 Defender (un seul connecteur pour tout l'eccsystème Defender), Azure Activity (natif), Azure Monitor Agent (AMA) sur les serveurs Windows/Linux on-prem pour Windows Security Events et Syslog, CEF connector (firewalls, appliances on-prem). Total: 300+ connecteurs disponibles. Le Data Collection Rules (DCR) contrôle quels events sont collectés."},
{id:1101,cat:"Réseau Azure",q:"Qu'est-ce que 'Azure Web Application Firewall (WAF) Policy' et comment la gérer à l'échelle ?",o:["Des règles WAF par application uniquement","WAF Policy (resource ARM indépendante): créer une politique WAF réutilisable (mode de détection/prévention, CRS version, exclusions, custom rules) et l'associer à plusieurs Application Gateways ou Front Door instances. Permet une gestion centralisée des règles WAF: modifier la politique une fois → propagée sur tous les sites protégés. Hierarchie: Global → Per-site overrides","Un WAF par Application Gateway","Un outil de monitoring web uniquement"],a:1,e:"WAF Policy centralisée: créer une politique WAF parente (OWASP CRS 3.2, custom rules communes, exclusions communes) et l'associer à plusieurs Application Gateways ou à Azure Front Door. Per-site policies peuvent surcharger la politique parente pour des exceptions spécifiques à une app. Gestion à l'échelle: modifier la règle WAF une fois dans la politique → tous les sites protégés sont mis à jour."},
{id:1102,cat:"Stockage Sécurisé",q:"Comment protéger Azure SQL Database contre les injections SQL via les configurations Azure ?",o:["Uniquement le pare-feu SQL","1) Advanced Threat Protection / Defender for SQL (détecte les injections), 2) Azure AD Authentication uniquement (pas de SQL auth), 3) Always Encrypted (données chiffrées côté client, SQL ne voit jamais les données en clair), 4) Dynamic Data Masking (masquer les colonnes sensibles pour les utilisateurs non-privilégiés), 5) Row Level Security (filtrage des données selon l'identité), 6) Audit SQL (journaliser toutes les requêtes)","Uniquement changer le mot de passe SQL admin","NSG sur le port 1433 uniquement"],a:1,e:"Protection SQL multi-couches: Always Encrypted (données chiffrées avant d'entrer dans SQL - même si SQL est compromis, les données sont illisibles), Dynamic Data Masking (masquer les SSN comme XXX-XX-1234 pour les app users non-privilégiés), Row Level Security (chaque utilisateur voit seulement SES données), Defender for SQL (alertes sur SQLi), et Azure AD auth (pas de SQL usernames/passwords classiques)."},
{id:1103,cat:"Azure AD / Entra ID",q:"Scénario: Comment détecter que des tokens d'accès OAuth sont utilisés depuis des emplacements géographiquement impossibles ?",o:["Impossible à détecter","Identity Protection: alerte 'Impossible Travel' dans les SigninLogs. KQL: SigninLogs | where TimeGenerated > ago(24h) | summarize LoginLocations = make_set(Location) by UserPrincipalName, IPAddress | where array_length(LoginLocations) > 1 → détecter les connexions depuis deux pays dans un délai impossible à parcourir physiquement. Identity Protection le fait automatiquement et génère un risque utilisateur","Uniquement via les logs physiques","Bloquer tous les accès internationaux"],a:1,e:"Impossible Travel detection: Identity Protection compare les connexions d'un même utilisateur dans le temps. Si user se connecte depuis Paris à 8h et depuis Tokyo à 11h (impossible de voyager en 3h) → risque élevé. SigninLogs contient IPAddress et Location. Combiner avec Sentinel: MDE pour détecter si le poste physique est en France pendant qu'une connexion arrive du Japon = token volé."},
{id:1104,cat:"Scénarios Avancés",q:"Comment mettre en place un 'Red Team Exercise' ciblant l'infrastructure Azure d'une organisation ?",o:["Interdire tout test de pénétration sur Azure","Microsoft permet les tests de pénétration sur les ressources Azure des clients (Penetration Testing Rules of Engagement). Scope: VMs, App Services, Storage, Azure AD (tests limités). Process: 1) Notifier Microsoft via le portail Penetration Testing (pour les tests qui nécessitent une notification), 2) Tester via des outils standard (Metasploit, BloodHound pour AAD, ROADtools), 3) Prohibitions: tests sur les services Azure partagés, DDoS, etc.","Les tests de pénétration sont interdits sur Azure","Uniquement avec l'accord de Microsoft payant"],a:1,e:"Azure Pen Test Rules: Microsoft autorise les pen tests sur les ressources Azure sans notification préalable pour la plupart des tests. Prohibitions: ne pas tester les services Azure mutualisés, pas de DDoS, pas de phishing des employés Microsoft. Outils courants pour Azure red team: BloodHound/AzureHound (cartographie AAD), ROADtools (enumération AAD), PowerZure (exploitation Azure), ScoutSuite (audit multi-cloud). Results: rapport aux équipes défense pour améliorer les détections."},
{id:1105,cat:"Azure AD / Entra ID",q:"Comment sécuriser les 'External Identities' (B2B guests) dans Azure AD avec les bonnes pratiques ?",o:["Accès total pour les invités comme les membres","1) External Collaboration Settings: restreindre qui peut inviter (admins uniquement), 2) Guest User Access Restrictions: limiter ce que les guests peuvent voir dans l'annuaire (pas de liste des autres utilisateurs), 3) Entitlement Management: Access Packages pour les guests (accès spécifique avec durée et sponsor), 4) Access Reviews mensuels sur les comptes guests, 5) Cross-Tenant Access Settings: configurer la confiance MFA/device per-tenant partenaire","Accès complet aux guests","Désactiver complètement B2B"],a:1,e:"Guest hygiene: External Collaboration → 'Only users in my org can invite' (pas de viral invitations), Guest Access Restrictions → 'Most restrictive' (guests ne voient pas l'annuaire), Entitlement Management → packages d'accès avec expiration automatique (30/90 jours), Access Reviews mensuels sur tous les guests inactifs (>90 jours sans connexion → révocation auto), et Cross-Tenant Trust Settings par organisation partenaire."},
{id:1106,cat:"Réseau Azure",q:"Comment implémenter 'Just-In-Time (JIT) VM Access' dans Azure pour les administrateurs système ?",o:["Ouvrir le port RDP/SSH en permanence","MDC Just-In-Time Access: MDC configure un NSG pour bloquer par défaut les ports de management (RDP 3389, SSH 22, WinRM 5985). Quand un admin a besoin d'accéder: demande l'accès via MDC (durée: 1-8h, IP source: son IP actuelle uniquement) → MDC ouvre une règle NSG temporaire pour cette IP/port/durée → accès possible → règle automatiquement révoquée à expiration","Laisser RDP ouvert sur Internet","VPN permanent obligatoire"],a:1,e:"JIT VM Access: le port RDP/SSH est fermé par défaut (NSG DenyAll). Accès: depuis MDC ou l'API, l'admin demande l'accès → MDC crée une règle NSG Allow RDP/SSH source=admin's IP duration=3h → admin travaille → après 3h la règle est révoquée automatiquement. Logs complets de chaque accès. Plus sécurisé que le port ouvert en permanence ou un VPN permanent."},
{id:1107,cat:"Azure AD / Entra ID",q:"Qu'est-ce que 'Temporary Access Pass (TAP)' dans Azure AD et ses cas d'usage ?",o:["Un mot de passe temporaire classique","Un code d'accès temporaire limité dans le temps (1h à 8j), à usage unique ou multiple, qui permet à un utilisateur de configurer des méthodes d'authentification forte (FIDO2, Authenticator) sans nécessiter un credential existant. Cas: onboarding d'un nouvel employé (configure son Authenticator avec le TAP), récupération de compte (perdu son téléphone), et bootstrap pour les comptes Break Glass","Un VPN temporaire","Un mot de passe à usage unique pour email"],a:1,e:"TAP use cases: 1) Onboarding: un nouvel employé reçoit un TAP de 8 jours → configure Microsoft Authenticator + FIDO2 key sans avoir besoin d'un mot de passe préalable. 2) Recovery: un utilisateur perd son téléphone (plus d'Authenticator) → admin génère un TAP → l'utilisateur configure un nouvel Authenticator. 3) Passwordless bootstrap: permettre de s'inscrire à FIDO2 pour la première fois. Le TAP peut être configuré en 'one-time use' uniquement."},
{id:1108,cat:"Gouvernance Azure",q:"Comment utiliser les 'Azure Resource Locks' pour protéger les ressources critiques ?",o:["Les locks empêchent toutes les opérations","Resource Locks: CanNotDelete (peut modifier, pas supprimer) ou ReadOnly (peut lire uniquement, pas modifier ni supprimer). Appliquer sur des ressources critiques: Key Vault (CanNotDelete), Production VNet + subnets (CanNotDelete), Log Analytics Workspace (CanNotDelete). Héritage: lock sur le RG → appliqué à toutes les ressources du RG. Requis: Owner ou User Access Administrator pour modifier les locks","Un système de backup uniquement","Un outil d'audit uniquement"],a:1,e:"Resource Locks use case: CanNotDelete sur le Key Vault de production (empêcher la suppression accidentelle d'une clé CMK = base de données inaccessible). ReadOnly sur les resources réseau critiques (VNet hub, Azure Firewall = empêcher les modifications accidentelles qui casseraient la connectivité). Les locks ne remplacent pas RBAC mais ajoutent une protection contre les opérations destructives même par des Owner."},
{id:1109,cat:"Scénarios Avancés",q:"Scénario: Vous devez implémenter un processus de 'Vulnerability Management' pour toutes les VMs Azure. Quelle architecture ?",o:["Scans manuels mensuels uniquement","1) Activer Defender for Servers Plan 2 (inclut vulnerability assessment via Qualys ou Defender TVAM), 2) Scans automatiques sur toutes les VMs, 3) Résultats dans MDC recommendations (priorisés par sévérité CVSS + exposure), 4) Governance Rules MDC: assigner les remédiation aux owners avec SLA (Critical=7j, High=30j), 5) Intégration ServiceNow (créer des tickets de remédiation automatiquement), 6) Dashboard MDC Vulnerability Management pour le tracking","Antivirus uniquement","Scans de ports réseau uniquement"],a:1,e:"Vulnerability Management Azure: MDC Defender for Servers P2 = TVAM (threat and vulnerability assessment) intégré. Scan agentless (pas de software à installer) pour Azure VMs. Résultats: CVE avec CVSS score + contexte (cette VM est exposée à Internet = risque plus élevé). Governance Rules MDC: auto-assign recommendations aux owners. Intégration ITSM: MDC → Logic App → ServiceNow ticket pour chaque vuln Critical."},
{id:1110,cat:"Conteneurs et AKS",q:"Comment configurer 'Azure Policy for Kubernetes (Gatekeeper)' pour enforcer les standards de sécurité des pods ?",o:["Kubernetes Policy ne fonctionne pas dans AKS","Azure Policy AKS addon (OPA/Gatekeeper): déployer le addon dans AKS, associer des initiatives Azure Policy: 1) 'Kubernetes cluster should not allow privileged containers', 2) 'Containers should only use allowed images' (uniquement depuis votre ACR), 3) 'Pods should use read-only root filesystem', 4) 'CPU and memory resource limits should be set'. Gatekeeper bloque les déploiements non conformes via admission control","kubectl uniquement","RBAC Kubernetes uniquement"],a:1,e:"AKS + Azure Policy + Gatekeeper: Gatekeeper est déployé automatiquement quand l'addon Azure Policy AKS est activé. Les policies Azure Policy pour Kubernetes se traduisent en ConstraintTemplates et Constraints Gatekeeper. En mode Deny: tout déploiement qui viole une contrainte est bloqué. En mode Audit: violation loguée dans MDC comme recommandation. Idéal pour enforcer les Pod Security Standards (Restricted)."},
{id:1111,cat:"Azure AD / Entra ID",q:"Qu'est-ce que 'Microsoft Entra Verified ID' et son cas d'usage principal ?",o:["Un outil de vérification de mots de passe","Un système d'identité décentralisée (DID - Decentralized Identity): les utilisateurs stockent leurs credentials vérifiés dans leur wallet (Microsoft Authenticator). Les organisations peuvent émettre des Verifiable Credentials (ex: diplôme, badge employé) et d'autres organisations peuvent les vérifier cryptographiquement sans contacter l'émetteur. Basé sur les standards W3C DID/VC","Un PKI classique","Un certificat numérique SSL"],a:1,e:"Entra Verified ID use case: onboarding B2B - un partenaire peut prouver l'appartenance de son employé via un Verifiable Credential émis par son employeur, sans que votre organisation ait besoin de contacter directement l'employeur. Autres cas: vérification d'identité pour l'accès aux services gouvernementaux, vérification de diplômes universitaires, accès zéro friction pour les contractors."},
{id:1112,cat:"Azure AD / Entra ID",q:"Comment protéger un tenant Azure AD contre une attaque de 'Token Theft' (vol de tokens OAuth) ?",o:["Changer les mots de passe régulièrement","1) Conditional Access: Require Compliant Device (un token volé depuis un appareil non-managé ne peut pas être utilisé depuis un autre appareil non-managé, car la policy vérifie la conformité de l'appareil), 2) Continuous Access Evaluation (CAE): révocation near-real-time des tokens, 3) Token Binding (preview): lier le token à l'appareil physique, 4) Sign-in frequency: forcer la ré-authentification fréquente","Uniquement MFA","Expiration des tokens réduite à 5 min"],a:1,e:"Token Theft mitigation: le vol d'un token OAuth (via malware, phishing AiTM) permet à l'attaquant d'accéder aux ressources sans re-authentification. Device Compliance dans CA = le token n'est pas seul suffisant, l'appareil doit aussi être conforme. CAE = si l'admin révoque les sessions → token invalidé en <1min. Token Protection (preview) = token lié cryptographiquement à l'appareil."},
{id:1113,cat:"Réseau Azure",q:"Scénario: Vous devez inspecter le trafic TLS chiffré entre vos VMs et Internet pour détecter les C2 malveillants. Quelle solution Azure ?",o:["Impossible d'inspecter le TLS","Azure Firewall Premium: TLS Inspection activée. Le Firewall agit comme un Man-in-the-Middle légal (MITM): intercepte le TLS, déchiffre, inspecte avec IDPS (détecte les C2 dans le contenu), rechiffre vers la destination. Nécessite: un certificat CA intermédiaire dans Key Vault que Azure Firewall utilise pour signer les certificats rechiffrés, et les clients doivent faire confiance à ce CA","NSG pour bloquer TLS","Packet capture seulement"],a:1,e:"Azure Firewall Premium TLS Inspection: Certificate Authority dans Key Vault → Firewall Policy → enable TLS Inspection. Les clients dans le VNet doivent avoir le CA certificate dans leur trust store (GPO ou Intune). Le trafic HTTPS est déchiffré, inspecté (IDPS + URL categorization), rechiffré. Exemptions: sites bancaires, sites médicaux (confidentialité). Performance: impact ~30% de throughput."},
{id:1114,cat:"Gouvernance Azure",q:"Comment implémenter 'Microsoft Defender for DevOps' pour sécuriser la chaîne CI/CD Azure DevOps ?",o:["Uniquement des tests manuels dans le pipeline","1) Connecter ADO à MDC (Connector dans MDC → Environment Settings → Azure DevOps), 2) MDC analyse automatiquement les repos: secrets exposés (GitHub-style scanning), vulnérabilités IaC (Checkov sur Terraform/Bicep), permissions repo, 3) Pull Request annotations: les vulnérabilités SAST/IaC apparaissent directement dans la PR, 4) Dashboard MDC pour la posture DevOps globale","Uniquement pour GitHub","Un scanner externe uniquement"],a:1,e:"Defender for DevOps ADO setup: dans MDC → Environment Settings → Add environment → Azure DevOps → OAuth authorization → sélectionner les organisations/projets. MDC scan: secrets (API keys, passwords dans le code), IaC misconfigurations (Terraform avec des Security Groups ouverts), et dépendances vulnérables. Les findings apparaissent dans MDC Recommendations ET dans les PR annotations (bloquer le merge si Critical)."},
{id:1115,cat:"Stockage Sécurisé",q:"Qu'est-ce que 'Azure Defender for Storage' et quelles menaces détecte-t-il ?",o:["Un antivirus pour les fichiers stockés","Defender for Storage: 1) Malware Scanning (scan antivirus des blobs uploadés en temps réel via Microsoft Defender Antivirus engine), 2) Sensitive Data Threat Detection (alertes si accès anormal à des fichiers contenant des PII), 3) Activity Anomalies (accès depuis une IP Tor, accès excessif au storage en peu de temps = potentielle exfiltration), 4) Configuration alerts (anonymous blob access activated)","Un chiffrement de stockage","Un outil de backup"],a:1,e:"Defender for Storage détections: 'Malware uploaded to Storage Account' (scan à l'upload, résultat en tag blob: malware verdict), 'Unusual data exfiltration from Storage' (volume anormal téléchargé depuis un seul compte), 'Access from Tor exit node' (anonymisation = suspicion), 'Publicly accessible storage containing sensitive data' (combiné avec Purview classification). Activer via MDC Plan Storage."},
{id:1116,cat:"Azure AD / Entra ID",q:"Comment configurer des 'Named Locations' dans Azure AD Conditional Access pour les politiques géographiques ?",o:["Bloquer tous les pays étrangers","Named Locations: 1) IP-based (liste de CIDRs: bureaux, partenaires connus → marquer comme 'Trusted'), 2) Country-based (sélectionner les pays → bloquer les connexions depuis des pays sans activité business légitime). CA policy: Allow uniquement depuis Trusted Locations pour des apps critiques, ou MFA supplémentaire pour les connexions hors Trusted Locations. Balance: ne pas bloquer les voyageurs d'affaires légitimes","Uniquement un VPN forcé","Politique identique partout"],a:1,e:"Named Locations best practice: Trusted Named Locations = plages IP des bureaux connus (marquer comme Trusted Locations). CA policy: si connexion depuis l'extérieur des Trusted Locations → MFA obligatoire (même si l'appareil est conforme). Country block: bloquer les pays sans activité business (ex: bloquer TOUS sauf FR, BE, US → mais attention aux employés en déplacement → exclure les comptes Break Glass et les admins)."},
{id:1117,cat:"Conteneurs et AKS",q:"Comment implémenter 'Pod Security Admission' dans AKS et quelle différence avec PodSecurityPolicy (déprécié) ?",o:["Les politiques de pods sont identiques dans toutes les versions","Pod Security Admission (PSA, Kubernetes 1.25+): remplace PodSecurityPolicy (déprécié). Trois profils: Privileged (tout autorisé), Baseline (restreint les configurations dangereuses: pas de hostNetwork, pas de privileged), Restricted (politique la plus stricte: read-only filesystem, non-root user, no capabilities). S'applique au niveau namespace via labels. Combiné avec Azure Policy AKS pour un enforcement managé","PodSecurityPolicy est encore recommandé","Uniquement des NetworkPolicies"],a:1,e:"PSA vs PSP: PSP était une admission controller global configuré par resource. PSA = labels sur les namespaces: enforce.policy/restricted (bloque les pods non conformes), warn.policy/baseline (warning seulement), audit.policy/restricted (log seulement). Migration: PSA labels sur les namespaces production, Baseline pour les namespaces standards, Restricted pour les namespaces critiques. Azure Policy AKS enforce PSA automatiquement."},
{id:1118,cat:"Scénarios Avancés",q:"Scénario: Votre organisation doit se conformer au standard PCI DSS pour les données de cartes de paiement dans Azure. Quels contrôles Azure sont essentiels ?",o:["Uniquement le chiffrement des données","PCI DSS dans Azure: 1) Network segmentation (CDE = Cardholder Data Environment dans des VNets isolés avec NSG strict), 2) WAF sur toutes les apps qui traitent des cartes (OWASP CRS 3.2), 3) Azure SQL Always Encrypted pour les numéros de cartes, 4) Key Vault pour les clés de chiffrement, 5) MFA pour tous les accès au CDE, 6) Log Analytics + Sentinel pour les 12 mois de rétention de logs, 7) Vulnerability scanning mensuel (Defender for Cloud), 8) PCI DSS assessment dans Compliance Manager","Uniquement un firewall","Certification Azure PCI automatique"],a:1,e:"PCI DSS Azure architecture: CDE = subnet isolé (NSG allowlist strict), WAF (bloque injection, XSS = PCI Req 6.4), SQL Always Encrypted (numéro de carte jamais en clair dans SQL = Req 3.5), Key Vault HSM (Req 3.6), MFA (Req 8.3), Audit logs 12 mois (Req 10), Quarterly vulnerability scans (Req 11.3). Azure est PCI DSS Level 1 Service Provider (QSA-certified) - vous pouvez utiliser les rapports Azure pour votre audit PCI."},
{id:1119,cat:"Azure AD / Entra ID",q:"Qu'est-ce que 'Microsoft Entra Global Secure Access' et ses deux composants principaux ?",o:["Un VPN Azure classique","Global Secure Access (GSA) = Security Service Edge (SSE) Microsoft: 1) Entra Private Access (ZTNA): accès privé sécurisé aux applications on-premises et cloud privées sans VPN (remplace le VPN d'accès aux apps internes), 2) Entra Internet Access (SWG): filtrage sécurisé du trafic Internet et M365 (Secure Web Gateway cloud-based). L'agent GSA sur le poste Windows route le trafic selon les politiques","Un outil de monitoring réseau","Un proxy web classique"],a:1,e:"GSA architecture: l'agent Global Secure Access (installé sur Windows via Intune) intercepte le trafic réseau et le route: trafic vers les Private Access destinations → tunnel ZTNA vers le connector on-premises (pas de VPN global), trafic Internet → SWG Microsoft (filtrage URL, threat protection), trafic M365 → optimisé directement vers les datacenters Microsoft. Tout conditionné par Conditional Access (MFA + device compliance)."},
{id:1120,cat:"Gouvernance Azure",q:"Comment implémenter des 'Subscription Vending' automatisé et sécurisé pour les nouvelles équipes ?",o:["Créer manuellement chaque abonnement","Subscription Vending = processus automatisé (pipeline IaC) qui crée un nouvel abonnement Azure pré-configuré avec tous les guardrails: 1) Bicep/Terraform templates (ALZ Landing Zone), 2) Azure Policy héritée (MDC activé, Diagnostic Settings, Allowed regions), 3) RBAC par défaut (Owner de l'équipe, Read pour l'audit), 4) Budget alert, 5) Network topology (spoke peéré au hub). Déclenché via un processus d'approbation (GitHub PR ou ServiceNow)","Uniquement PowerShell manuel","Un template ARM par email"],a:1,e:"Subscription Vending pipeline: GitHub/ADO pipeline triggered by PR (équipe remplit un fichier YAML avec: team name, budget, environment). Pipeline: crée l'abonnement (New-AzSubscription API), le met sous le bon Management Group, déploie la Landing Zone Bicep (Policies, RBAC, Budget, Networking), et notifie l'équipe avec les détails. 100% self-service, 100% compliant dès le départ."},
{id:1121,cat:"Azure AD / Entra ID",q:"Scénario: Vous devez bloquer l'accès à Azure Portal pour les utilisateurs non-admins tout en permettant l'accès aux applications M365. Comment ?",o:["Bloquer l'accès Internet des utilisateurs","Conditional Access policy: Target App = 'Microsoft Azure Management' (Application ID spécifique du portail Azure + Azure CLI + PowerShell), Assignments = All Users EXCEPT des groupes d'admins autorisés, Grant = Block. Cette policy bloque uniquement l'accès au plan de management Azure sans impacter M365 (Exchange, Teams, SharePoint ont des App IDs différents)","Désactiver les comptes non-admins","NSG sur le portail Azure"],a:1,e:"Azure Management blocking: l'App ID 'Windows Azure Service Management API' couvre: Azure Portal, Azure CLI, Azure PowerShell, ARM REST API. CA Policy: All Users (exclure: Break Glass, Azure Admins group) → Block pour Azure Management. Les utilisateurs standards ne peuvent plus ouvrir portal.azure.com mais peuvent toujours utiliser Teams, Outlook, SharePoint. Réduire la surface d'attaque: si un compte utilisateur est compromis, l'attaquant ne peut pas accéder au portail Azure."},
{id:1122,cat:"Réseau Azure",q:"Qu'est-ce que 'Azure DDoS Protection Standard' et comment diffère du plan Basic ?",o:["Azure DDoS Basic est insuffisant, toujours utiliser Standard","Basic: protection automatique (incluse gratuitement dans Azure) contre les attaques volumétriques de niveau réseau communes. Standard (payant, ~2940€/mois): 1) Protection adaptative (ML-based, profile de trafic normal de vos ressources), 2) Mitigation automatique plus rapide, 3) Attack metrics en temps réel (Azure Monitor), 4) Post-attack reports forensiques, 5) DDoS Rapid Response (accès direct aux experts Microsoft DDoS), 6) SLA cost protection (crédits si sur-provision pendant attaque)","Identiques","DDoS Standard protège uniquement les VMs"],a:1,e:"DDoS Standard use case: si vous exposez des IPs publiques critiques (Application Gateway, Load Balancer), Standard offre une protection adaptative ML (le profil de trafic normal est appris → les déviations sont détectées plus rapidement). Pour les applications à haute disponibilité avec des SLA business stricts. Basic est suffisant pour la plupart des workloads non-critiques. DDoS Rapid Response = équipe Microsoft disponible pendant une attaque active."},
{id:1123,cat:"Stockage Sécurisé",q:"Comment sécuriser un Azure SQL Database avec 'Always Encrypted with Secure Enclaves' ?",o:["Always Encrypted standard est identique","Always Encrypted with Secure Enclaves: améliore l'Always Encrypted classique. AE classique = chiffrement côté client, SQL ne peut pas opérer sur les données chiffrées (pas de LIKE, pas de JOIN sur colonnes chiffrées). AE Secure Enclaves: le calcul se fait dans un TEE (Intel SGX ou AMD SNP) dans SQL Server → SQL peut faire des opérations sur les colonnes chiffrées (LIKE, range queries) sans voir les données en clair","SQL peut toujours voir les données","Une configuration supplémentaire du firewall"],a:1,e:"AE with Secure Enclaves: le moteur SQL s'exécute partiellement dans un enclave sécurisé matériel. La clé de chiffrement entre temporairement dans l'enclave pour effectuer les opérations, mais n'est jamais accessible au processus SQL normal ni aux admins SQL. Permet: LIKE '%Smith%' sur une colonne SSN chiffrée, JOINs sur colonnes chiffrées, comparaisons de range. SQL Azure avec l'option DC-series pour l'Intel SGX."},
{id:1124,cat:"Réseau Azure",q:"Comment configurer 'Azure Firewall Manager' pour gérer des politiques de firewall centralisées multi-hub ?",o:["Un firewall par région géré séparément","Azure Firewall Manager: console centralisée pour gérer les Azure Firewalls dans plusieurs hubs (Azure Virtual WAN hubs ou VNet hubs). Hiérarchie de politiques: Base Policy (règles communes à tous les hubs: règles DNS, règles de blocage globales) → Policies locales par hub (règles spécifiques à la région). Les changements à la Base Policy se propagent automatiquement à tous les firewalls associés","Copier les règles manuellement","Via ARM templates uniquement"],a:1,e:"Firewall Manager architecture: Base Policy (partagée: règles DNS → 168.63.129.16, règles de blocage malware globales, règles d'application communes) → Local Policy West Europe (hérite de Base + règles spécifiques WE) → Local Policy North Europe (hérite de Base + règles NE). 1 modification dans Base Policy → propagée aux 2 hubs automatiquement. Idéal pour les grandes organisations multi-régions."},
{id:1125,cat:"Azure AD / Entra ID",q:"Qu'est-ce que l'option 'Require authentication strength' dans Conditional Access et ses usages ?",o:["Un niveau de MFA identique pour tous","Authentication Strength = définir la qualité minimale d'authentification requise. Niveaux prédéfinis: MFA (any MFA: Authenticator, SMS, Voice), Passwordless MFA (Authenticator Push, FIDO2, Windows Hello), Phishing-resistant MFA (FIDO2 ou Windows Hello uniquement). Cas d'usage: accès aux ressources critiques → exiger Phishing-resistant (éliminer le risque d'AiTM phishing qui bypass le MFA classique)","Uniquement le nombre de facteurs","Identique à 'Require MFA'"],a:1,e:"Authentication Strength granularity: Admin Roles → Phishing-resistant MFA (FIDO2/WHfB uniquement = l'attaquant ne peut pas capturer le one-time code pour l'utiliser). Apps financières critiques → Passwordless MFA. Apps générales → MFA standard. Créer des Authentication Strengths personnalisées: ex: 'Allow Authenticator + FIDO2 only, exclude SMS/Voice'. SMS est considéré faible (SIM swapping)."},
{id:1126,cat:"Scénarios Avancés",q:"Comment implémenter un 'Purple Team Exercise' pour améliorer la détection dans Sentinel ?",o:["Un Red Team et un Blue Team travaillant séparément","Purple Team = collaboration Red (attaque) + Blue (défense) en temps réel: 1) Red Team exécute une technique ATT&CK (ex: T1003 OS Credential Dumping avec Mimikatz), 2) Blue Team vérifie si Sentinel a généré une alerte, 3) Si pas d'alerte: le Blue crée la règle analytique manquante, 4) Re-test: Red rejoue la technique → alerte générée?, 5) Itération jusqu'à couverture complète. Résultat: amélioration mesurable des détections","Un test de performance","Un audit de conformité uniquement"],a:1,e:"Purple Team benefits: contrairement au Red Team séparé (rapport livré après), le Purple Team améliore la détection en temps réel. Process: choisir 5-10 techniques ATT&CK non couvertes → Red execute → Blue vérifie l'alerte → si manquante, créer la règle KQL Sentinel ensemble → documenter le résultat. Mesurer: avant = X% des techniques ATT&CK couvertes, après = Y%. Outil: Atomic Red Team (tests standardisés par technique ATT&CK)."},
{id:1127,cat:"Réseau Azure",q:"Comment sécuriser les connexions PaaS Azure (App Service, Functions) vers une base de données SQL sans exposer la BD sur Internet ?",o:["Ouvrir le firewall SQL pour l'App Service IP","Architecture zero-exposure: 1) SQL Private Endpoint dans le VNet (l'IP SQL est une IP privée), 2) App Service VNet Integration (le trafic sortant de l'App Service passe par le VNet), 3) Route le trafic SQL vers le Private Endpoint (via la Private DNS Zone), 4) Firewall SQL: 'Deny all public access', uniquement les connexions via Private Endpoint acceptées. App Service → VNet → Private Endpoint SQL → plus d'exposition Internet","Ajouter l'IP dynamique de l'App Service","Utiliser SSL uniquement"],a:1,e:"App Service → SQL Private architecture: App Service Regional VNet Integration (subnet délégué à Microsoft.Web/serverFarms) → UDR optionnel → Private Endpoint SQL dans le même VNet. DNS: Private DNS Zone privatelink.database.windows.net → IP privée 10.x.x.x. Result: la connexion App Service → SQL ne passe JAMAIS par Internet. SQL Firewall = Deny all + Allow Azure Services = OFF. Seul le trafic Private Endpoint est accepté."},
{id:1128,cat:"Azure AD / Entra ID",q:"Comment configurer 'Microsoft Entra ID Protection' pour générer des rapports de risque pour les comptes de service ?",o:["ID Protection ne couvre pas les comptes de service","Entra ID Protection supporte les Workload Identity Risk (preview): surveille les Service Principals pour des comportements anormaux. Configurer: Identity Protection → Workload Identity Risk → Create Policy. Risques détectés: SP with unfamiliar sign-in properties, anomalous credential additions, suspicious sign-in activity. Actions: alerter les admins, désactiver le SP si High Risk confirmé","Les SPs n'ont pas de risque","Manuel uniquement"],a:1,e:"Workload Identity Risk: des SPs compromis sont critiques (ils ont souvent des droits élevés sur les ressources Azure). ID Protection Workload Identities: détecte les SPs qui se connectent depuis de nouvelles IPs, qui ajoutent soudainement des credentials, ou qui ont un comportement de sign-in anormal. Intégrer avec Sentinel: les Workload Identity Risk events dans Sentinel pour une réponse automatisée (désactiver le SP + alerter l'équipe sécurité)."},
{id:1129,cat:"Gouvernance Azure",q:"Qu'est-ce que 'Azure Arc' et comment étend-il la gouvernance Azure aux environnements non-Azure ?",o:["Un service uniquement pour les VMs Azure","Azure Arc: projette des ressources non-Azure dans le plan de management Azure. Types: Arc-enabled Servers (Windows/Linux on-premises, AWS EC2, GCP VMs → gérés comme des Azure VMs: Azure Policy, Defender for Servers, Update Manager, Extensions), Arc-enabled Kubernetes (clusters K8s non-Azure → GitOps, Azure Policy, Defender for Containers), Arc-enabled SQL Server (SQL on-premises dans Azure Security Center)","Une solution de VPN uniquement","Un outil de monitoring à distance"],a:1,e:"Azure Arc use case: organisation hybride avec des serveurs on-premises et des VMs dans plusieurs clouds. Arc-enabled Servers: installer l'agent Arc sur chaque serveur → il apparaît dans le portail Azure comme une resource ARM → Azure Policy s'applique (ex: 'Log Analytics agent must be installed'), Defender for Servers surveille les menaces, Update Manager gère les patches. Gouvernance unifiée sans migrer vers Azure."},
{id:1130,cat:"Scénarios Avancés",q:"Comment détecter et répondre à un 'Golden SAML Attack' ciblant Azure AD ?",o:["Une attaque sur les cookies web","Golden SAML: l'attaquant vole ou génère le certificat de signature SAML d'un Identity Provider (ex: ADFS, Okta) pour créer des tokens SAML légitimes arbitraires pour n'importe quel utilisateur. Dans Azure AD: si ADFS est le IdP → compromettre le Token Signing Certificate d'ADFS → forge des tokens AAD. Détection: SigninLogs avec des anomalies SAML (utilisateur en déplacement impossible, SPN non reconnu), audit des accès ADFS","Une attaque Kerberos uniquement","Un phishing classique"],a:1,e:"Golden SAML mitigation: 1) Migrer vers Azure AD Native (éliminer ADFS = pas de Token Signing Certificate à voler), 2) Si ADFS obligatoire: surveiller l'accès au Token Signing Certificate (HSM dédié, alertes sur toute exportation), 3) ADFS Extranet Lockout, 4) AAD Sign-in logs: détecter les tokens SAML avec des attributs inhabituels (MFA claim absent, UPN non standard). CISA Alert AA21-321A donne les IoCs Golden SAML (attaque SolarWinds utilisait cette technique)."},
{id:1151,cat:"Azure AD/Entra ID",q:"Qu est-ce que Azure AD Cross-Tenant Synchronization et quand l utiliser ?",o:["Un outil de migration AD","Cross-Tenant Sync: synchronise les utilisateurs entre plusieurs tenants Azure AD de la meme organisation (ex: apres une fusion/acquisition). Les utilisateurs du tenant source apparaissent comme des membres B2B dans le tenant cible. Configuration: activer dans Entra ID -> Manage -> Cross-tenant synchronization. Avantages: les utilisateurs voient les ressources de l autre tenant comme s ils etaient des membres internes","Un type de VPN","Un protocole de replication"],a:1,e:"Cross-tenant sync use case: fusion Contoso + Fabrikam. Au lieu de creer des comptes Fabrikam dans Contoso (gestion double), Cross-Tenant Sync synchronise les comptes Fabrikam vers le tenant Contoso. Les employes Fabrikam gardent leur propre compte mais apparaissent dans Contoso. Limitations: les politiques Conditional Access du tenant cible s appliquent. Decommission: si les tenants fusionnent completement, une migration AD connect sera necessaire."},
{id:1152,cat:"Reseau Azure",q:"Comment securiser Azure Kubernetes Service AKS en production ?",o:["Les clusters AKS sont securises par defaut","AKS Security best practices: 1) Private Cluster: l API server Kubernetes est accessible uniquement via IP privee (pas d exposition Internet), 2) Azure AD Integration: authentication des admins via Azure AD (pas de certificats manuels), 3) Kubernetes RBAC + Azure RBAC: permissions granulaires, 4) Network Policies (Calico ou Azure): restreindre le trafic entre pods, 5) Defender for Containers: surveillance des menaces runtime, 6) Node hardening: images OS minimales, mises a jour automatiques, 7) Pod Security Standards: prevenir les conteneurs privilegies","Uniquement proteger le reseau externe","Uniquement les mises a jour OS suffisent"],a:1,e:"AKS security hardening checklist: Private cluster (pas de API server public), RBAC granulaire (pas de cluster-admin pour tous), Network policies (deny all ingress/egress sauf necessaire), secrets dans Azure Key Vault (pas dans les ConfigMaps), images signees et scannees (Defender for Containers), node auto-upgrade (patches automatiques), workload identity (Managed Identity pour les pods = pas de secrets dans les pods). Audit: Kubernetes audit logs -> Sentinel pour la detection des activites suspectes."},
{id:1153,cat:"Gouvernance",q:"Qu est-ce que Azure Blueprints et comment l utiliser pour la conformite a grande echelle ?",o:["Un outil de creation de diagrammes","Azure Blueprints: package de gouvernance qui regroupe: Policies (Azure Policy), Role Assignments (RBAC), Resource Groups, et ARM/Bicep Templates. Deploie tous ces elements ensemble sur un abonnement ou groupe d abonnements. Use case: imposer une configuration de securite standard pour tous les nouveaux abonnements (ex: activer Defender for Cloud, deployer le Log Analytics workspace, configurer les alertes budgetaires). Les blueprints sont versiones (Blueprint version 1.0 -> 1.1)","Un outil de documentation","Un service de backup Azure"],a:1,e:"Blueprints vs Policy: Azure Policy = guardrails (empeche la creation de ressources non-conformes). Blueprints = scaffolding (deploie les ressources necessaires + applique les policies). Utiliser les deux ensemble: Blueprint deploie les ressources de securite obligatoires + Policy empeche les deviations. Landing Zone: Microsoft Cloud Adoption Framework definit des Landing Zones (blueprints preconfigures pour les entreprises) avec les bonnes pratiques de securite integrees."},
{id:1154,cat:"Stockage Securise",q:"Comment securiser les Azure Storage Accounts contre les acces non-authorises ?",o:["Les Storage Accounts sont securises par defaut","Securite Storage Account: 1) Desactiver l acces public aux blobs (pas de containers publics), 2) Exiger HTTPS uniquement (minimum TLS 1.2), 3) Private Endpoints (acces uniquement via VNet, pas via Internet), 4) Azure AD authentication (pas de cles de compte = moins de risque de fuite), 5) Soft Delete (protection contre la suppression accidentelle ou malveillante: les donnees sont recoverables pendant X jours), 6) Customer-Managed Keys (CMK via Azure Key Vault), 7) Storage Firewall: restreindre l acces par IP ou VNet","La cle de compte suffit","HTTPS est optionnel"],a:1,e:"SAS Token security: les SAS tokens accordent un acces temporaire mais peuvent etre voles et utilises. Bonnes pratiques SAS: expiration courte, permissions minimales, stocker dans Key Vault pas en dur dans le code, surveiller l utilisation avec Storage Analytics logs. Defender for Storage: detecte les acces anormaux (acces depuis un pays inhabituel, enumeration de containers, tentative de force brute sur les SAS). Rotation des cles: les cles de compte Storage devraient etre rotees regulierement (ou utiliser Azure AD auth pour eviter les cles)."},
{id:1155,cat:"Conteneurs/AKS",q:"Qu est-ce que Workload Identity dans Azure et comment remplace-t-il les solutions precedentes ?",o:["Une identite pour les machines virtuelles uniquement","Workload Identity (Azure AD Workload Identity): permet aux pods Kubernetes d utiliser une Managed Identity Azure AD pour s authentifier aux services Azure (Key Vault, Storage, SQL) sans stocker de secrets dans le pod. Utilise OpenID Connect (OIDC): le cluster AKS emet un token OIDC pour le pod -> Azure AD verifie le token -> accorde un acces Azure AD token. Remplace: AAD Pod Identity (solution precedente plus complexe a gerer)","Un type de service account Kubernetes","Une fonctionnalite Azure AD B2B"],a:1,e:"Workload Identity workflow: 1) Activer OIDC issuer sur le cluster AKS, 2) Creer une Managed Identity Azure, 3) Configurer la federated credential (associer le service account Kubernetes a la Managed Identity), 4) Dans le pod: utiliser le SDK Azure (qui lit automatiquement le token OIDC) pour s authentifier a Key Vault. Avantage: aucun secret dans le pod, rotation automatique des credentials, audit complet des acces. Securite: les tokens OIDC expirent rapidement (par defaut 1h)."},
{id:1156,cat:"Scénarios Avancés",q:"Comment detecter et repondre a une compromission d un Service Principal Azure AD ?",o:["Impossible de detecter une compromission de Service Principal","Detection: 1) Activites suspectes du SP dans Azure AD Audit Logs (ajout de credentials, changement de role), 2) Sentinel: alertes sur les nouveaux Role Assignments effectues par un SP non-attendu, 3) Microsoft Defender for Cloud: SP avec des permissions excessives, 4) Azure AD Identity Protection: risque de Service Principal. Response: 1) Invalider tous les credentials du SP (secrets + certificats), 2) Auditer les actions effectuees (Azure Activity Log), 3) Reduire les permissions au minimum, 4) Implementer Conditional Access pour les workload identities (preview)","Les SP ne peuvent pas etre compromis","Uniquement supprimer le Service Principal"],a:1,e:"SP compromise indicators: nouveau secret ou certificat ajoute a un SP que vous n avez pas cree (backdoor), SP qui effectue des actions inhabituelles (creer des VM, modifier des RBAC assignments), SP actif depuis une IP geographiquement distante. Prevention: principe du moindre privilege (pas de Owner ou Global Admin pour les SP), rotation reguliere des secrets (ou utiliser des certificats avec expiration courte), Conditional Access pour les workload identities (restriction par IP ou claims federes)."},
{id:1157,cat:"Azure AD/Entra ID",q:"Qu est-ce que Entitlement Management dans Azure AD et comment gere-t-il les acces externes ?",o:["Un outil de facturation Azure","Entitlement Management: systeme de gouvernance des acces dans Azure AD. Access Packages: bundle de ressources (groupes, apps, sites SharePoint) avec des politiques d acces (qui peut demander, approbateurs, duree de l acces, revues periodiques). Use cases: 1) Employes qui rejoignent un nouveau projet -> demandent un Access Package -> approbation manager -> acces automatiquement accordes, 2) Invites externes -> lien d invitation -> acces temporaire et limite. Connected Organizations: gerer les organisations externes autorisees","Un outil de reporting sur les licences","Un systeme de gestion des tickets"],a:1,e:"Entitlement Management use case: un partenaire externe a besoin d acces a SharePoint pour un projet de 3 mois. Sans EM: l admin cree manuellement le compte, donne les acces, oublie de supprimer a la fin. Avec EM: un Access Package 'Project X Partner Access' est cree avec: ressources = SharePoint site + Teams channel, politique = expiration 3 mois, revue d acces mensuelle, l externe demande via un lien d invitation -> approbation manager -> acces accorde -> expiration automatique. Moins de risques de comptes fantomes."},
{id:1158,cat:"Reseau Azure",q:"Comment configurer Azure Firewall Premium pour l inspection TLS (HTTPS) ?",o:["Azure Firewall ne peut pas inspecter TLS","Azure Firewall Premium TLS Inspection: intercepte le trafic TLS sortant (MITM), le dechiffre pour inspection IDPS, puis re-chiffre vers la destination. Configuration: 1) Generer ou importer un certificat CA dans Azure Key Vault, 2) Associer le certificat CA a Azure Firewall Premium, 3) Activer TLS Inspection dans les Application Rules, 4) Deployer le certificat CA sur les appareils clients (pour eviter les alertes cert invalid). L inspection permet de detecter les malwares dans le trafic HTTPS sortant","HTTPS ne peut pas etre inspecte","Uniquement pour le trafic interne"],a:1,e:"TLS Inspection use case: un malware communique avec son C2 via HTTPS (chiffre). Sans TLS inspection, le firewall voit uniquement une connexion HTTPS vers une IP externe (pourrait etre legitime). Avec TLS inspection: le firewall dechiffre, voit le contenu (payload malveillant ou communication C2), applique les regles IDPS (Suricata engine), bloque si menace detectee. Exceptions TLS: ne pas inspecter les sites bancaires ou de sante (raisons de confidentialite) -> whitelist dans les regles."},
{id:1159,cat:"Gouvernance",q:"Qu est-ce que Azure Resource Graph et comment l utiliser pour l audit de securite a grande echelle ?",o:["Un outil de creation de graphiques","Azure Resource Graph: service de requetes sur les ressources Azure de tous les abonnements en temps reel. Utilise un langage de requete similaire a KQL (Kusto). Use cases securite: 1) Trouver toutes les VMs sans Defender for Endpoint: Resources | where type == 'microsoft.compute/virtualmachines' | where properties.securityProfile.securityType != 'TrustedLaunch', 2) Trouver tous les Storage Accounts avec acces public, 3) Lister tous les groupes de securite NSG sans restriction entrante sur le port 22","Un outil de documentation de l infrastructure","Un service de monitoring des performances"],a:1,e:"Resource Graph use cases: audit mensuel de securite = executer des requetes Resource Graph pour: compter les ressources sans tags, trouver les ressources dans des regions non-approuvees, identifier les services sans Private Endpoints, lister les comptes de stockage avec HTTP autorise. Automatisation: Azure Automation Runbook qui execute des requetes Resource Graph -> compare avec la baseline -> alerte si deviation. Integration: les resultats peuvent alimenter un rapport PowerBI pour le CISO."},
{id:1160,cat:"Scénarios Avancés",q:"Comment implementer une strategie de Backup and Recovery conforme pour les donnees Azure ?",o:["Les sauvegardes ne font pas partie de la securite","Backup securite Azure: 1) Azure Backup: sauvegarde les VMs, SQL, SAP HANA, Azure Files, Blobs. Vault avec Immutable storage (les sauvegardes ne peuvent pas etre modifiees ou supprimees pendant la periode de retention = protection contre le ransomware), 2) Soft Delete: les sauvegardes supprimees sont conservees 14 jours supplementaires, 3) Multi-user Authorization MUA: toute action critique sur les sauvegardes necessite l approbation d un second admin, 4) Tester les restaurations regulierement (backup non-teste = pas de backup)","Les sauvegardes Cloud sont automatiques","Uniquement pour les VMs"],a:1,e:"Ransomware protection pour les backups: Immutable Vault = meme un admin Azure compromis ne peut pas supprimer les sauvegardes (protection contre les attaquants qui cherchent a effacer les backups avant de lancer le ransomware). Multi-user Authorization: chaque operation de suppression de backup necessite l accord de deux personnes (4-eyes principle). Cross-region replication: si la region primaire est affectee (sinistre), les backups dans la region secondaire sont disponibles. RTO/RPO: definir les objectifs de recuperation et tester que les sauvegardes y repondent."},
{id:1161,cat:"Azure AD/Entra ID",q:"Comment configurer Azure AD Password Protection pour bloquer les mots de passe faibles ?",o:["Azure AD bloque automatiquement tous les mots de passe faibles","Azure AD Password Protection: 1) Liste de mots de passe globaux interdits (Microsoft): 500+ mots de passe courants et compromis (Password1, Summer2024!, etc.), 2) Liste personnalisee: ajouter les mots specifiques a votre organisation (nom de l entreprise, ville, produits), 3) Smart lockout: bloque les tentatives de force brute (lockout progressif), 4) On-premises extension: deployer l agent sur les DCs pour appliquer la liste interdite pour les comptes AD on-premises","Password Protection n existe pas dans Azure AD","Uniquement pour les comptes cloud"],a:1,e:"Password Protection deployment: pour les organisations avec AD on-premises, l agent Password Protection DC doit etre installe sur chaque DC. En mode Audit d abord: les mots de passe faibles sont acceptes mais logues -> analyser la prevalence des mots de passe faibles. Puis activer Enforce mode. Personnalisation: interdire le nom de l entreprise, les projets internes, les villes, les produits, les marques. Impact: reduit significativement les risques de Password Spray (attaque qui teste les mots de passe communs sur de nombreux comptes)."},
{id:1162,cat:"Reseau Azure",q:"Qu est-ce que Azure Bastion et pourquoi remplace-t-il les solutions RDP/SSH traditionnelles ?",o:["Un pare-feu pour les VMs","Azure Bastion: service de jump box managee par Microsoft qui fournit un acces RDP/SSH securise aux VMs Azure directement depuis le navigateur (Azure Portal) sans exposer les VMs sur Internet (pas de port RDP/SSH public). Avantages: 1) Pas d IP publique sur les VMs = surface d attaque reduite, 2) Acces via HTTPS (port 443 uniquement), 3) Session enregistree + logs, 4) Integration avec Azure AD (MFA requis), 5) Shared Bastion: une instance Bastion peut servir plusieurs VNets (VNet peering)","Un VPN pour les developpeurs","Un service de monitoring des VMs"],a:1,e:"Bastion vs VPN vs JIT: JIT = ouvrir temporairement le port RDP sur le NSG (moins securise, expose quand meme le port). Bastion = pas de port RDP du tout (uniquement HTTPS 443). Bastion Basic vs Standard: Basic = RDP/SSH simple. Standard = ajout du file transfer, shareable link, IP-based connection, session recording (preview). ROI: le cout d Azure Bastion ($0.19/heure) vs le risque d exposer RDP sur Internet (attaques brute force massives = compromissions frequentes). Recommandation: Bastion pour toutes les VMs de production."},
{id:1163,cat:"Gouvernance",q:"Comment utiliser Azure Monitor et Log Analytics pour la securite operationnelle ?",o:["Azure Monitor est uniquement pour les performances","Azure Monitor securite: 1) Diagnostics Settings: activer les logs de diagnostic pour toutes les ressources (Azure AD, NSG flow logs, Azure Firewall, Key Vault access logs) -> envoyer vers Log Analytics, 2) Alertes: creer des alertes sur des evenements critiques (suppression de ressource, changement de role admin, connexion depuis pays bloque), 3) Log Analytics queries: KQL pour investiguer les incidents, 4) Workbooks: dashboards securite visuels, 5) Integration Sentinel: envoyer les logs vers Sentinel pour la correlation SIEM","Azure Monitor uniquement pour les administrateurs","Azure Monitor ne collecte pas les logs de securite"],a:1,e:"Log Analytics workspace design: workspace centralise vs workspace par environnement (security consideration). Centralise = meilleure correlation mais cross-tenant risk. Par environnement = isolation mais moins de correlation. RBAC sur le workspace: donner l acces uniquement aux tables necessaires (un developpeur n a pas besoin de voir les logs de securite). Retention: 90 jours hot (requetes rapides), puis Archive (requetes plus lentes, moins cher) pour les besoins reglementaires long terme."},
{id:1164,cat:"Scénarios Avancés",q:"Scenario: Un attaquant a compromis un compte Azure AD avec des droits de Global Admin. Quelles sont les etapes de remediation immediate ?",o:["Changer le mot de passe et continuer","Remediation immediate compromission GA: 1) Revoquer toutes les sessions actives (Azure AD -> utilisateur -> Revoke sessions + Revoke MFA), 2) Reinitialiser le mot de passe (hors bande = SMS ou appel, pas email si l email est aussi compromis), 3) Auditer les actions du compte compromis (Azure AD Audit Logs + Azure Activity Log des 30-90 derniers jours), 4) Identifier et remedier les actions malveillantes (nouveaux GA crees, nouveau SP crees, permissions modifiees), 5) Activer les Break Glass accounts pour continuer a administrer, 6) Post-incident: pourquoi le GA n avait pas Privileged Identity Management?","Supprimer le compte uniquement","Attendre que l attaquant parte"],a:1,e:"Post-compromise Azure audit: Azure AD Audit Logs: quels nouveaux comptes ont ete crees, quels roles ont ete assignes, quels applications ont ete creees (backdoor SP). Azure Activity Log: quelles ressources ont ete creees ou modifiees. Rechercher: nouveaux Global Admins, nouveaux Service Principals avec des roles eleves, modifications de Conditional Access Policies (exclusions de MFA). Remediation: supprimer les backdoors crees, reconstituer les Conditional Access policies, activer PIM si pas deja fait."},
{id:1165,cat:"Stockage Securise",q:"Comment proteger Azure Key Vault contre la suppression et l acces non-autorise ?",o:["Key Vault est securise par defaut","Protection Key Vault: 1) Soft Delete (actif par defaut): Key Vault et ses secrets supprimés sont recuperables pendant 7-90 jours, 2) Purge Protection: empeche la suppression definitive avant la fin de la periode de retention (meme les admins ne peuvent pas purger), 3) Private Endpoint: acces uniquement via VNet, 4) Azure RBAC ou Key Vault Access Policies: principe du moindre privilege, 5) Diagnostics: activer les logs d acces (qui a accede a quel secret, quand) -> Log Analytics -> alertes, 6) Certificates auto-renew: eviter les expirations","Key Vault est accessible uniquement par les admins","Uniquement le chiffrement suffit"],a:1,e:"Key Vault access control: eviter l utilisation des Access Policies (moins granulaires) au profit du Azure RBAC (Key Vault Secrets Officer vs Key Vault Secrets User). Monitorer: Azure Monitor + Log Analytics pour les acces anormaux (secret accede depuis une IP inhabituelle, secret consulte des centaines de fois en peu de temps = scan). Purge Protection: absolument activer pour les Key Vault de production. Sans Purge Protection, un attaquant GA peut supprimer definitivement les cles et rendre toutes les donnees chiffrees inaccessibles."},
{id:1166,cat:"Azure AD/Entra ID",q:"Comment configurer et securiser Azure AD Conditional Access pour les applications sensibles ?",o:["CA ne peut pas etre configure par application","CA par application: dans la politique CA, la condition Application = selectionner les applications specifiques (ex: Azure Portal, Exchange, Salesforce). Configurations avancees par app: 1) Exiger des appareils conformes (Intune) pour acceder au portail Azure, 2) Exiger un appareil joint Azure AD pour Exchange, 3) Exiger MFA + appareil conforme pour les apps critiques. Named Locations: autoriser uniquement les IPs de confiance pour les apps admin","CA s applique uniquement a toutes les apps","CA par application necessite Azure AD P2"],a:1,e:"CA Named Applications workflow: pour les applications ultra-sensibles (portail Azure, Key Vault, outils RH): exiger MFA + appareil conforme + IP de confiance (ou PAW). Pour les apps standard (Teams, Outlook): exiger MFA uniquement. Pour les apps legacy (Basic Auth): bloquer completement (Basic Auth = pas de MFA = vecteur d attaque). Monitoring: Sign-in Logs -> filtrer par Application -> voir les tentatives bloquees. Report-only mode: tester la politique sans impacter les utilisateurs."},
