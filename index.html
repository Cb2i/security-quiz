{id:131,category:"Defender for Office 365",question:"Scénario: Un email avec une pièce jointe malveillante passe les filtres spam mais est détecté par Safe Attachments. Que se passe-t-il ?",options:["L'email est envoyé normalement","Safe Attachments détoné la pièce jointe dans un sandbox, bloque la livraison si malveillante, et remplace la pièce jointe par un avertissement","L'email est supprimé sans notification","L'utilisateur reçoit l'email avec un avertissement"],answer:1,explanation:"Safe Attachments dans Defender for Office 365 soumet les pièces jointes à un sandbox cloud, attend l'analyse (ou livre en avance selon la politique), et si malveillant: bloque la livraison, déplace l'email en quarantaine, et notifie l'admin."},
{id:132,category:"Defender for Office 365",question:"Qu'est-ce que 'Zero-Hour Auto Purge (ZAP)' dans Defender for Office 365 ?",options:["Un délai avant traitement des emails","Une technologie qui rétroactivement supprime des messages déjà livrés dans les boîtes mail quand de nouvelles informations indiquent qu'ils sont malveillants (spam, phishing, malware)","Une politique de rétention des emails","Un système de backup des emails"],answer:1,explanation:"ZAP (Zero-Hour Auto Purge) dans Defender for O365 surveille les emails déjà livrés en boîte de réception. Si un email est ultérieurement identifié comme malveillant (nouvelles signatures, feed TI), ZAP le déplace automatiquement vers le dossier Junk ou le quarantaine."},
{id:133,category:"Defender for Office 365",question:"Qu'est-ce que 'Safe Links' dans Defender for Office 365 ?",options:["Un système de vérification d'URL dans les emails et documents Office qui redirige les clics via un proxy Microsoft, bloquant les URLs malveillantes au moment du clic","Un filtre anti-spam","Une liste blanche d'URLs approuvées","Un service DNS sécurisé"],answer:0,explanation:"Safe Links réécrit les URLs dans les emails et documents Office/Teams. Quand l'utilisateur clique, la requête passe par les serveurs Microsoft qui vérifient en temps réel si l'URL est malveillante au moment du clic (pas au moment de la réception), bloquant les menaces time-of-click."},
{id:134,category:"Defender for Office 365",question:"Scénario: Des utilisateurs reçoivent des emails de phishing qui usurpent l'identité du PDG de l'entreprise (CEO fraud / BEC). Quelle fonctionnalité Defender for O365 aide à détecter ça ?",options:["Safe Links uniquement","Anti-phishing policy avec protection contre l'usurpation (anti-spoofing) et protection anti-impersonation pour les utilisateurs et domaines protégés","Safe Attachments uniquement","Filtre anti-spam standard"],answer:1,explanation:"Les politiques anti-phishing dans Defender for O365 incluent: protection anti-impersonation (surveiller quand le display name ressemble à un user protégé), anti-spoofing (SPF/DKIM/DMARC), et DKIM intelligence pour bloquer les BEC/CEO fraud."},
{id:135,category:"Defender for Office 365",question:"Qu'est-ce que 'Attack Simulator' dans Defender for Office 365 ?",options:["Un outil de test de charge des serveurs mail","Une plateforme de simulation d'attaques de phishing et de malwares pour tester et former les utilisateurs à reconnaître les menaces","Un simulateur de politique de sécurité","Un outil de test des règles anti-spam"],answer:1,explanation:"Attack Simulation Training dans Microsoft 365 Defender permet de lancer des campagnes de phishing simulées réalistes contre les utilisateurs, mesurer les taux de click, et automatiquement inscrire les utilisateurs qui cliquent à des formations de sensibilisation."},
{id:136,category:"Defender for Office 365",question:"Qu'est-ce que la 'Threat Explorer' dans Defender for Office 365 ?",options:["Un explorateur de fichiers sécurisé","Un outil de threat hunting en temps réel qui permet d'analyser les emails malveillants, les campagnes de phishing et les menaces détectées dans votre tenant Microsoft 365","Un outil de monitoring des performances Exchange","Un système de recherche d'emails pour la conformité"],answer:1,explanation:"Threat Explorer (dans Defender for O365 Plan 2) est un outil d'investigation qui permet d'analyser les menaces email en temps réel: rechercher des campagnes de phishing, analyser les emails malveillants, identifier les utilisateurs ciblés et prendre des actions de remédiation."},
{id:137,category:"Defender for Office 365",question:"Scénario: Un utilisateur a cliqué sur un lien de phishing et potentiellement compromis son compte. Quelle action d'investigation dans Defender for O365 ?",options:["Réinitialiser le mot de passe uniquement","Utiliser Threat Explorer pour identifier tous les emails similaires, AIR pour l'investigation automatique, révoquer les sessions, chercher les règles de redirection créées dans la boîte mail","Supprimer le compte utilisateur","Bloquer l'adresse email de l'expéditeur"],answer:1,explanation:"Investigation BEC/Account Compromise: 1) Threat Explorer pour identifier la campagne, 2) Vérifier les règles inbox créées (redirection vers attaquant), 3) Chercher des logins suspects dans SigninLogs, 4) Révoquer sessions via AAD, 5) Activer MFA, 6) AIR pour investigation automatique."},
{id:138,category:"Defender for Office 365",question:"Qu'est-ce que DMARC et comment Defender for Office 365 l'utilise-t-il ?",options:["Un protocole de chiffrement email","Domain-based Message Authentication, Reporting and Conformance - un standard qui spécifie comment les emails non authentifiés (SPF/DKIM) doivent être traités, utilisé par Defender pour filtrer les spoofing","Un standard de backup email","Un protocole de chiffrement des pièces jointes"],answer:1,explanation:"DMARC spécifie la politique d'un domaine (none/quarantine/reject) pour les emails échouant SPF et DKIM. Defender for O365 respecte les politiques DMARC des domaines expéditeurs pour filtrer les emails usurpant des domaines légitimes."},
{id:139,category:"Defender for Office 365",question:"Quelle est la table KQL dans Sentinel qui contient les emails bloqués par Defender for Office 365 ?",options:["ExchangeLogs","EmailEvents (Advanced Hunting) ou OfficeActivity avec opération EmailBlocked","OutlookLogs","O365SecurityLogs"],answer:1,explanation:"Dans Sentinel avec le connecteur M365 Defender, la table EmailEvents (schéma Advanced Hunting) contient les détails des emails: envoyeur, destinataire, verdict (phishing, malware, spam), action (livré, bloqué, quarantaine)."},
{id:140,category:"Defender for Office 365",question:"Qu'est-ce que 'Preset security policies' dans Defender for Office 365 ?",options:["Des politiques créées par défaut par Microsoft","Des profils de sécurité préconfigurés (Standard Protection, Strict Protection) qui appliquent automatiquement les meilleures pratiques recommandées par Microsoft pour EOP et Defender for O365","Des politiques de compliance email","Des règles de routage email sécurisées"],answer:1,explanation:"Les Preset Security Policies (Standard et Strict) dans Defender for O365 appliquent automatiquement les configurations recommandées par Microsoft pour toutes les fonctionnalités de protection (anti-spam, anti-phishing, Safe Links, Safe Attachments) sans configuration manuelle."},
{id:141,category:"Defender for Cloud Apps",question:"Qu'est-ce que la 'Cloud Discovery' dans Microsoft Defender for Cloud Apps ?",options:["La découverte des ressources Azure","L'identification et l'évaluation du Shadow IT - les applications SaaS non approuvées utilisées par les employés - à partir des logs proxy/firewall","La surveillance des APIs Azure","La découverte des conteneurs cloud"],answer:1,explanation:"Cloud Discovery dans MDCA analyse les logs de trafic réseau (proxy, firewall, Zscaler, etc.) pour identifier toutes les applications cloud utilisées (Shadow IT), évaluer leur risque (score 0-10), et vous donner une visibilité sur votre empreinte cloud réelle."},
{id:142,category:"Defender for Cloud Apps",question:"Qu'est-ce qu'une 'Session Policy' dans MDCA et quand l'utiliser ?",options:["Une politique de durée de session utilisateur","Une politique de contrôle de session en temps réel (via le proxy MDCA) qui peut surveiller, bloquer ou inspecter le contenu des sessions utilisateurs dans des applications SaaS approuvées","Une politique de timeout de connexion","Une politique de gestion des cookies"],answer:1,explanation:"Les Session Policies dans MDCA utilisent le proxy d'accès conditionnel pour intercepter les sessions en temps réel dans des apps SaaS (SharePoint, Salesforce, etc.): bloquer le téléchargement depuis des appareils non gérés, watermarker les documents, bloquer le copier-coller de données sensibles."},
{id:143,category:"Defender for Cloud Apps",question:"Scénario: Un employé utilise Dropbox (non approuvé) pour partager des fichiers confidentiels. Comment MDCA peut-il aider ?",options:["Bloquer uniquement par DNS","MDCA peut: 1) Identifier Dropbox via Cloud Discovery, 2) Marquer Dropbox comme 'Unsanctioned', 3) Créer une App Policy pour alerter/bloquer l'upload de fichiers sensibles, 4) Bloquer via l'intégration firewall/proxy","Envoyer un email à l'utilisateur","Supprimer le compte Dropbox"],answer:1,explanation:"Workflow MDCA pour Shadow IT: Cloud Discovery identifie l'usage Dropbox, on le marque Unsanctioned (ce qui peut le bloquer via intégration firewall), puis si possible via Conditional Access App Control, inspecter/bloquer le contenu sensible."},
{id:144,category:"Defender for Cloud Apps",question:"Qu'est-ce que 'Anomaly Detection' dans MDCA ?",options:["Un scan de vulnérabilités des apps SaaS","Des politiques ML qui détectent des comportements anormaux dans les apps SaaS: activités depuis pays inhabituels, impossible travel, activités en masse (téléchargements, suppressions), accès depuis TOR","Un système d'alertes email","Une analyse de la performance des apps SaaS"],answer:1,explanation:"Les politiques de détection d'anomalie dans MDCA analysent les activités utilisateur dans les apps SaaS connectées (M365, Salesforce, Box, etc.) et détectent automatiquement: impossible travel, activités en masse, accès anonymes, nouveaux appareils, pays inhabituels."},
{id:145,category:"Defender for Cloud Apps",question:"Comment MDCA s'intègre-t-il avec Azure AD Conditional Access pour les contrôles de session ?",options:["Ils s'intègrent via des webhooks","Via le Conditional Access App Control: AAD redirige les sessions d'apps SaaS vers le proxy MDCA en configurant des politiques CA avec 'Use Conditional Access App Control' comme contrôle de session","Via Azure AD B2C uniquement","Via un certificat partagé"],answer:1,explanation:"L'intégration: 1) AAD Conditional Access identifie la session (user/app/device), 2) Si la politique CA inclut 'Use Conditional Access App Control', la session est redirigée via le proxy cloud MDCA, 3) MDCA applique les session/access policies en temps réel."},
{id:146,category:"Defender for Cloud Apps",question:"Qu'est-ce que le 'App Connector' dans MDCA et comment diffère-t-il du Conditional Access App Control ?",options:["Ils sont identiques","App Connector utilise les APIs natives des apps SaaS pour visibilité et gouvernance des données au repos (auditer activités, scan DLP, gouvernance des fichiers partagés). CAAC contrôle les sessions en temps réel","App Connector est plus récent","CAAC est pour les apps Microsoft uniquement"],answer:1,explanation:"App Connectors utilisent les APIs admin des apps (Office 365, Salesforce, Box, AWS...) pour accéder aux activités passées, fichiers, utilisateurs et appliquer des politiques DLP sur les données au repos. CAAC (proxy) contrôle les sessions utilisateurs en temps réel."},
{id:147,category:"Defender for Cloud Apps",question:"Scénario: Un compte compromis dans Salesforce télécharge 10 000 enregistrements. Comment MDCA détecte et répond-il ?",options:["MDCA ne supervise pas Salesforce","Via l'App Connector Salesforce, MDCA détecte le téléchargement massif (activité anormale par ML), génère une alerte, et peut suspendre automatiquement l'utilisateur Salesforce via une action gouvernance","Via des règles manuelles uniquement","Via Azure Sentinel uniquement"],answer:1,explanation:"Avec l'App Connector Salesforce, MDCA ingère toutes les activités. La politique d'anomalie détecte le téléchargement massif. Une Action de Gouvernance peut automatiquement suspendre l'utilisateur dans Salesforce, révoquer les sessions, ou envoyer une alerte à l'admin Salesforce."},
{id:148,category:"Defender for Cloud Apps",question:"Qu'est-ce que le score de risque des applications dans MDCA Cloud Discovery ?",options:["La note des utilisateurs de l'app","Un score 0-10 calculé par Microsoft basé sur plus de 80 critères de sécurité (chiffrement, conformité RGPD, SOC 2, certifications, pratiques de sécurité) pour évaluer le risque d'une app cloud","La performance de l'app","Le coût de l'app"],answer:1,explanation:"Le Cloud App Catalog de MDCA contient plus de 31 000 applications évaluées sur 80+ critères de sécurité et conformité (RGPD, HIPAA, SOC 2, chiffrement, politique de confidentialité, partage de données avec tiers). Le score 0-10 aide à décider d'approuver ou bloquer une app."},
{id:149,category:"Defender for Cloud Apps",question:"Comment MDCA aide-t-il à se conformer au RGPD pour les applications SaaS ?",options:["En supprimant automatiquement les données personnelles","En identifiant les données sensibles (PII) dans les apps SaaS via DLP, en cartographiant les flux de données cross-frontières, en identifiant les apps non conformes, et en générant des rapports de conformité","En chiffrant automatiquement les données","Via des certifications automatiques"],answer:1,explanation:"Pour le RGPD, MDCA aide: Cloud Discovery identifie les apps traitant des données UE, DLP scanne le contenu pour PII (RGPD categories), les App Risk Scores incluent des critères RGPD, les policies peuvent bloquer le partage de PII vers des pays non-adéquats."},
{id:150,category:"Defender for Cloud Apps",question:"Qu'est-ce que 'Information Protection' dans MDCA ?",options:["Un système de chiffrement des emails","L'intégration avec Microsoft Purview pour scanner les fichiers dans les apps SaaS avec les politiques DLP d'entreprise et appliquer des sensitivity labels aux fichiers sensibles trouvés dans le cloud","Un outil de classification manuelle","Un système de gestion des droits numériques"],answer:1,explanation:"Information Protection dans MDCA utilise les moteurs DLP Microsoft Purview pour scanner les fichiers dans les apps SaaS connectées, détecter le contenu sensible (PII, PCI, credentials), générer des alertes et gouvernance, et appliquer automatiquement des sensitivity labels."},
{id:151,category:"Threat Intelligence",question:"Qu'est-ce que TAXII (Trusted Automated eXchange of Intelligence Information) ?",options:["Un standard de chiffrement","Un protocole de transport pour partager des indicateurs STIX entre organisations et plateformes TI via des flux de données structurés","Un outil d'analyse de malwares","Un format de rapport de sécurité"],answer:1,explanation:"TAXII est le protocole de transport standard pour la distribution de Threat Intelligence en format STIX. TAXII 2.1 utilise HTTPS pour échanger des objets STIX (indicateurs, acteurs, TTPs) entre serveurs TAXII et clients via des 'collections'."},
{id:152,category:"Threat Intelligence",question:"Scénario: Vous recevez un rapport TI mentionnant un IoC (hash SHA256 de malware). Comment l'intégrer rapidement dans Sentinel ?",options:["Créer manuellement une règle KQL pour chaque hash","Importer le hash dans la section Threat Intelligence de Sentinel (ou via l'API), créer une règle analytique qui joint DeviceFileEvents avec ThreatIntelligenceIndicator sur le hash","Configurer uniquement dans MDE","Créer un workbook dédié"],answer:1,explanation:"Workflow TI dans Sentinel: 1) Importer l'IoC dans ThreatIntelligenceIndicator (UI, API, ou connecteur TAXII), 2) La règle analytique 'TI map File Hash to...' (règle built-in) ou une règle Scheduled custom joint les logs avec les IoC pour déclencher des alertes."},
{id:153,category:"Threat Intelligence",question:"Quelle est la différence entre TTP (Tactics, Techniques, Procedures) et IoC (Indicators of Compromise) en TI ?",options:["Ce sont des termes identiques","Les IoC sont des artefacts observables (IP, hash, domaine) spécifiques à un incident. Les TTPs décrivent les méthodes d'attaque (comportements) de l'adversaire, plus durables et moins susceptibles de changer","Les TTPs sont plus précis que les IoC","Les IoC sont uniquement pour les malwares"],answer:1,explanation:"Les IoC sont spécifiques et éphémères (un hash change si le malware est recompilé). Les TTPs (basés sur MITRE ATT&CK) décrivent les comportements d'un acteur (ex: 'utilise PowerShell pour exécution', 'exfiltre via DNS'). Détecter les TTPs offre une défense plus robuste."},
{id:154,category:"Threat Intelligence",question:"Qu'est-ce qu'un 'Diamond Model' en Threat Intelligence ?",options:["Un modèle de pricing TI","Un cadre d'analyse qui modélise les incidents avec 4 composants: Adversaire, Infrastructure, Capacités, Victime, et leurs relations pour comprendre et attribuer les attaques","Un framework de conformité","Un outil de visualisation de réseau"],answer:1,explanation:"Le Diamond Model est un framework d'analyse TI qui structure chaque événement d'intrusion autour de 4 composants: Adversaire (qui), Infrastructure (comment - IPs, domaines), Capacités (outils/malwares), Victime (cible). Les relations entre ces éléments permettent l'attribution et la prédiction."},
{id:155,category:"Threat Intelligence",question:"Comment Sentinel utilise-t-il Microsoft Threat Intelligence Center (MSTIC) ?",options:["Via un abonnement payant séparé","Les IoC de MSTIC sont automatiquement intégrés dans les règles analytiques Fusion et les politiques de blocage, enrichissant la détection sans configuration manuelle","Via un connecteur manuel uniquement","Via Azure Advisor"],answer:1,explanation:"Microsoft Threat Intelligence Center (MSTIC) fournit automatiquement des IoC et des modèles de détection qui alimentent: la détection Fusion dans Sentinel, Azure Firewall Threat Intelligence, Defender for Cloud, et les autres produits Microsoft Defender."},
{id:156,category:"Threat Intelligence",question:"Qu'est-ce que la 'Pyramid of Pain' en cybersécurité ?",options:["Un modèle de hiérarchie des incidents","Un framework qui classe les IoC par niveau de difficulté pour l'attaquant à changer (Hash facile à changer → IP → Domaine → Artefacts réseau → Outils → TTPs difficiles à changer)","Un modèle de coût des attaques","Une classification des acteurs de menace"],answer:1,explanation:"La Pyramid of Pain (David Bianco) montre la 'douleur' causée à l'attaquant quand on bloque différents types d'IoC: Hashes (trivial à changer), IPs (facile), Domains (simple), Network/Host artifacts (ennuyeux), Tools (difficile), TTPs (très difficile). Cibler les TTPs est plus efficace."},
{id:157,category:"Threat Intelligence",question:"Scénario: Vous détectez que votre infrastructure communique avec un domaine connu C2 (Command & Control). Quelle est la chaîne de réponse recommandée ?",options:["Ignorer si le trafic est chiffré","Bloquer le domaine C2 immédiatement au firewall, identifier la machine source, isoler la machine compromise, analyser le malware, rechercher d'autres IoC liés à ce C2 dans les logs historiques","Attendre confirmation de compromission avant d'agir","Uniquement notifier l'équipe IT"],answer:1,explanation:"Réponse C2: 1) Blocage immédiat du domaine/IP C2 (firewall, DNS sinkhole), 2) Identifier toutes les machines ayant communiqué avec le C2, 3) Isoler les machines compromises, 4) Analyse forensique du malware, 5) Threat hunting pour IoC liés (domaines similaires, hashes associés)."},
{id:158,category:"Threat Intelligence",question:"Qu'est-ce que 'VirusTotal' et comment s'intègre-t-il avec l'écosystème Microsoft ?",options:["Un outil Microsoft natif","Un service d'analyse multi-antivirus de fichiers/URLs/IPs/domaines (propriété Google). Des intégrations Sentinel permettent d'enrichir automatiquement les alertes avec les résultats VirusTotal","Un concurrent de MDE","Un service de backup de fichiers"],answer:1,explanation:"VirusTotal analyse les fichiers/URLs avec 70+ moteurs antivirus. Dans Sentinel, des playbooks peuvent automatiquement enrichir les alertes en interrogeant l'API VirusTotal pour les hashes de fichiers suspects, ajoutant le nombre de détections AV aux incidents."},
{id:159,category:"Threat Intelligence",question:"Qu'est-ce que le 'MISP (Malware Information Sharing Platform)' et comment s'intègre-t-il avec Sentinel ?",options:["Un scanner de malwares","Une plateforme open-source de partage TI. Le connecteur MISP pour Sentinel permet d'importer automatiquement les IoC de MISP dans ThreatIntelligenceIndicator","Un antivirus","Une plateforme de forensics"],answer:1,explanation:"MISP est une plateforme open-source pour le partage de Threat Intelligence entre organisations. Le connecteur Sentinel (via playbooks ou connecteur natif) peut synchroniser automatiquement les IoC de MISP vers ThreatIntelligenceIndicator pour enrichir les détections."},
{id:160,category:"Threat Intelligence",question:"Qu'est-ce que la 'Kill Chain' (Lockheed Martin Cyber Kill Chain) et comment aide-t-elle les défenseurs ?",options:["Le coût d'une cyberattaque","Un framework décrivant les 7 étapes d'une cyberattaque: Reconnaissance, Weaponization, Delivery, Exploitation, Installation, Command & Control, Actions on Objectives. Interrompre n'importe quelle étape arrête l'attaque","Un modèle de gestion des incidents","Une classification des malwares"],answer:1,explanation:"La Kill Chain de Lockheed Martin modélise les 7 phases d'une APT. Les défenseurs utilisent ce framework pour positionner leurs contrôles à chaque phase: filtres email (Delivery), EDR (Exploitation/Installation), SIEM (C2/Actions). Bloquer une phase suffit à stopper l'attaque."},
{id:161,category:"Réponse aux Incidents",question:"Scénario: Vous découvrez une compromission de credentials d'un compte admin. Quelles sont les 5 premières actions à prendre ?",options:["Attendre la fin du jour ouvrable","1) Réinitialiser le mot de passe, 2) Révoquer toutes les sessions actives, 3) Désactiver temporairement le compte, 4) Activer MFA d'urgence, 5) Analyser les activités récentes du compte dans les logs","Supprimer le compte définitivement","Notifier uniquement les médias"],answer:1,explanation:"Plan de réponse compte compromis: 1) Reset password immédiat, 2) Révoquer tokens (Revoke-AzureADUserAllRefreshToken), 3) Désactiver compte si suspect, 4) Forcer MFA, 5) Audit des activités: connexions, fichiers accédés, emails envoyés, règles créées dans 72h précédentes."},
{id:162,category:"Réponse aux Incidents",question:"Qu'est-ce que le 'Dwell Time' en sécurité et pourquoi est-il important ?",options:["Le temps de résolution d'un ticket","Le temps entre la compromission initiale et sa détection. Un dwell time élevé signifie que l'attaquant a plus de temps pour exfiltrer des données et établir la persistance. Réduire le dwell time réduit l'impact","La durée de rétention des logs","Le temps de déploiement d'un agent de sécurité"],answer:1,explanation:"Le dwell time (temps de présence non détectée) est une métrique clé: l'industrie rapporte en moyenne 20+ jours selon Mandiant. Pendant ce temps, l'attaquant établit des backdoors, exfiltre, et se déplace latéralement. Réduire le dwell time via la détection rapide limite l'impact."},
{id:163,category:"Réponse aux Incidents",question:"Quelle est la différence entre 'Remediation' et 'Recovery' dans la réponse aux incidents ?",options:["Termes identiques","Remediation = éliminer la cause (supprimer malware, boucher vulnérabilité, révoquer accès); Recovery = restaurer les systèmes et services à leur état opérationnel normal","Remediation est technique, Recovery est administrative","Recovery précède Remediation"],answer:1,explanation:"Remediation élimine la menace (éradiquer le malware, patcher la vulnérabilité, révoquer les credentials compromis). Recovery restaure les opérations: restaurer depuis backup, reconfigurer les systèmes, revérifier l'intégrité, reprendre la production."},
{id:164,category:"Réponse aux Incidents",question:"Scénario: Ransomware détecté sur 3 machines d'un réseau de 500. Quelle est la décision d'isolation critique et pourquoi ?",options:["Ne rien faire, attendre l'éradication","Isoler immédiatement les 3 machines (et potentiellement segmenter le réseau) pour stopper la propagation latérale, même si ça interrompt des services. La priorité est de contenir avant investigation complète","Sauvegarder les données d'abord","Payer la rançon immédiatement"],answer:1,explanation:"Lors d'une infection ransomware active, la priorité absolue est le CONFINEMENT immédiat: isoler les machines infectées (réseau/logique), vérifier les backups (sont-ils atteints?), identifier le vecteur d'infection, évaluer la propagation. La rapidité d'isolation détermine l'étendue des dégâts."},
{id:165,category:"Réponse aux Incidents",question:"Qu'est-ce qu'un 'Forensic Image' et pourquoi est-il crucial lors d'une investigation ?",options:["Une capture d'écran du poste compromis","Une copie bit-à-bit exacte (byte pour byte) d'un disque dur ou de la mémoire vive d'un système compromis, préservant toutes les preuves pour analyse ultérieure sans modifier l'original","Un backup normal des données","Un export des logs de sécurité"],answer:1,explanation:"Une forensic image (via dd, FTK Imager, etc.) crée une copie exacte incluant l'espace non alloué, les fichiers supprimés, et les artefacts système. Elle préserve la chaîne de custody et permet l'analyse répétée sans altérer les preuves. Essentielle pour les procédures judiciaires."},
{id:166,category:"Réponse aux Incidents",question:"Quelle est la différence entre un 'Post-Incident Review' et un 'Root Cause Analysis' ?",options:["Termes identiques","Root Cause Analysis identifie LA cause technique fondamentale de l'incident. Post-Incident Review est un processus plus large incluant: timeline, impact, response efficacy, lessons learned et recommandations d'amélioration","RCA est obligatoire, PIR est optionnel","PIR est pour les managers, RCA pour les techniciens"],answer:1,explanation:"La RCA (Root Cause Analysis) se concentre sur pourquoi techniquement l'incident s'est produit (vulnérabilité exploitée, mauvaise configuration). La PIR (ou Post-Mortem) est plus large: évaluer la réponse, mesurer l'impact, identifier les améliorations processuelles et techniques."},
{id:167,category:"Réponse aux Incidents",question:"Scénario: Vous devez notifier une violation de données personnelles selon le RGPD. Quel délai de notification s'applique ?",options:["7 jours","72 heures après la découverte de la violation pour notifier l'autorité de contrôle (CNIL en France), et dans les meilleurs délais pour les personnes concernées si risque élevé","30 jours","Pas de délai précis"],answer:1,explanation:"Le RGPD impose une notification à l'autorité de contrôle (CNIL) dans les 72 heures suivant la prise de connaissance d'une violation de données personnelles présentant un risque pour les droits et libertés. Les personnes concernées sont notifiées si le risque est élevé."},
{id:168,category:"Réponse aux Incidents",question:"Qu'est-ce que le 'Containment' (confinement) dans le cycle NIST SP 800-61 ?",options:["La phase finale de l'incident","La phase qui vise à limiter l'étendue et l'impact de l'incident en empêchant sa propagation, en préservant les preuves, et en maintenant les services critiques autant que possible","La phase de communication avec les stakeholders","La phase d'éradication du malware"],answer:1,explanation:"Le confinement dans NIST 800-61 vise à: stopper la propagation (isolation réseau, désactivation comptes), préserver les preuves forensiques (avant remédiation), et maintenir les services critiques si possible. On distingue confinement à court terme (rapide) et long terme (plus complet)."},
{id:169,category:"Réponse aux Incidents",question:"Quelle est la valeur d'un 'Runbook' (ou Playbook de réponse) pour un SOC ?",options:["Un document purement administratif","Un guide procédural détaillant les étapes précises de réponse pour des types d'incidents spécifiques, assurant cohérence, rapidité et qualité de la réponse même pour des analystes moins expérimentés","Un rapport d'incident","Un plan de disaster recovery"],answer:1,explanation:"Les Runbooks/Playbooks de réponse documentent les étapes précises pour chaque type d'incident (phishing, ransomware, compromission compte): qui fait quoi, dans quel ordre, avec quels outils. Ils réduisent le temps de réponse, assurent la cohérence et permettent l'automatisation."},
{id:170,category:"Réponse aux Incidents",question:"Scénario: Vous détectez une exfiltration de données via HTTPS vers un service cloud légitime (Google Drive). Pourquoi est-ce difficile à détecter et comment y remédier ?",options:["Ce n'est pas un risque réel","Difficile car HTTPS est chiffré et Google Drive est un domaine légitime (pas bloqué). Remédiation: DLP cloud (MDCA/Purview) pour inspecter le contenu, surveillance des volumes anormaux uploadés, blocage ou surveillance de Google Drive selon politique","Bloquer tout HTTPS","Désactiver Google Drive sur tous les postes"],answer:1,explanation:"L'exfiltration via services légitimes (Google Drive, Dropbox, OneDrive personnel, Pastebin) contourne les blocages par domaine. Contre-mesures: DLP pour inspecter les uploads, surveillance des volumes (alerter si >1GB uploadé vers Google Drive/heure), CASB pour contrôler les apps non managées."},
{id:171,category:"Réponse aux Incidents",question:"Qu'est-ce que la 'Chain of Custody' (chaîne de custody) dans la forensique numérique ?",options:["La chaîne d'escalade d'un incident","La documentation traçable de chaque personne qui a eu accès à une preuve numérique, de sa collecte à sa présentation en cour, garantissant son intégrité et admissibilité légale","La liste des outils forensiques utilisés","La timeline d'un incident"],answer:1,explanation:"La chaîne de custody documente: qui a collecté la preuve, quand, comment (outils, méthode), où elle a été stockée, qui y a accédé et quand. Cette documentation est essentielle pour l'admissibilité des preuves numériques dans des procédures judiciaires."},
{id:172,category:"Réponse aux Incidents",question:"Quelle action dans Microsoft Sentinel peut être automatisée via des Automation Rules sans playbook ?",options:["Isoler une machine","Changer le statut d'un incident, assigner à un owner, ajouter un tag, déclencher un playbook - sans nécessiter de Logic App pour les actions simples","Exécuter des requêtes KQL","Créer des règles analytiques"],answer:1,explanation:"Les Automation Rules dans Sentinel permettent des actions simples sans Logic Apps: changer le statut (Nouveau→Actif), assigner à un owner, ajouter des tags, changer la sévérité, ou déclencher un playbook. C'est l'automatisation légère pour les workflows SOC courants."},
{id:173,category:"Réponse aux Incidents",question:"Scénario: Un incident Sentinel implique 15 alertes de différentes sources sur le même utilisateur sur 2 heures. Comment analyser efficacement ?",options:["Analyser les 15 alertes séparément","Utiliser l'Investigation Graph pour voir la timeline unifiée et les relations entre entités, UEBA pour le contexte comportemental de l'utilisateur, et corréler les alertes via les tables SecurityAlert et SecurityIncident en KQL","Fermer les alertes les moins importantes","Escalader sans analyse"],answer:1,explanation:"Pour un incident multi-alertes: 1) Investigation Graph pour la vue graphique et timeline, 2) UEBA (BehaviorAnalytics) pour le contexte risque utilisateur, 3) KQL sur SecurityAlert pour voir toutes les alertes liées à l'utilisateur, 4) Corréler les timestamps pour reconstituer la kill chain."},
{id:174,category:"Réponse aux Incidents",question:"Qu'est-ce que le 'Mean Time to Respond (MTTR)' dans un SOC et comment le réduire ?",options:["Le temps moyen de formation des analystes","Le temps moyen entre la détection d'un incident et la résolution complète. Réduire via: automatisation (playbooks), runbooks clairs, outils SOC intégrés (SOAR), formation et exercices réguliers","Le temps moyen de déploiement des agents","Le temps moyen d'uptime des systèmes"],answer:1,explanation:"MTTR mesure l'efficacité de la réponse aux incidents. Pour le réduire: automatiser les tâches répétitives (enrichissement, confinement) via SOAR/playbooks, créer des runbooks précis, intégrer les outils (Sentinel+MDE+Entra), former les analystes, et organiser des exercises réguliers."},
{id:175,category:"Réponse aux Incidents",question:"Quelle est la valeur du 'Threat Modeling' dans la préparation à la réponse aux incidents ?",options:["Aucune valeur pratique","Identifier proactivement les scénarios d'attaque probables permet de préparer des playbooks de réponse spécifiques, de tester les détections, et de former les équipes AVANT qu'un incident ne se produise","Uniquement pour les nouvelles applications","Remplace la réponse aux incidents"],answer:1,explanation:"Le Threat Modeling prépare la réponse: en identifiant les scénarios d'attaque probables pour l'organisation, on peut créer des playbooks adaptés, tester les capacités de détection (purple team), former sur des scénarios réalistes, et identifier les gaps de détection."},
{id:176,category:"Microsoft Sentinel",question:"Qu'est-ce que la table 'DeviceRegistrationInfo' dans Sentinel/Azure AD ?",options:["Les informations d'enregistrement des appareils mobiles uniquement","Les données d'enregistrement et de conformité de tous les appareils Azure AD joints (Entra joined, registered, hybrid joined), utilisables pour corréler les connexions avec la conformité des appareils","Les métadonnées des VMs Azure","Les logs d'enregistrement des applications"],answer:1,explanation:"DeviceRegistrationInfo dans AAD contient les détails des appareils: type de jointure (AAD joined, Hybrid, Registered), conformité Intune, OS, dernier login. Utilisée dans Sentinel pour corréler SigninLogs (DeviceDetail.deviceId) avec la conformité de l'appareil lors d'une connexion suspecte."},
{id:177,category:"Defender for Endpoint",question:"Scénario: MDE alerte sur 'Suspicious remote scheduled task creation'. Quelle technique d'attaque et investigation ?",options:["Maintenance planifiée normale","T1053 Scheduled Task/Job: création de tâche planifiée sur une machine distante (via at.exe, schtasks /s:remotePC). Indicateur de mouvement latéral ou persistance. Investigation: vérifier qui a créé la tâche, depuis quelle machine, quel exécutable est planifié","Erreur de configuration Windows","Un outil de monitoring légitime"],answer:1,explanation:"Scheduled Task Remote (T1053.005) est une technique courante pour la persistance et l'exécution latérale. Investigation: DeviceProcessEvents (qui a créé la tâche), DeviceEvents (TaskScheduled), connexion réseau précédente vers la machine cible, compte utilisé (compromis?)."},
{id:178,category:"KQL Avancé",question:"Comment utiliser 'externaldata()' dans KQL pour enrichir les alertes avec une liste d'IPs malveillantes stockée dans un Blob ?",options:["Ce n'est pas possible dans KQL","externaldata(IP:string)[@'https://storage.blob.core.windows.net/container/malicious_ips.csv'] with (format='csv') - charge les données depuis le blob pour les joindre avec vos logs","Uniquement via des watchlists","Via des tables temporaires"],answer:1,explanation:"externaldata() permet de charger des fichiers CSV/JSON/TSV depuis Azure Blob Storage ou HTTP directement dans une requête KQL. Utile pour enrichir avec des listes de référence volumineuses qui seraient trop grandes pour une watchlist Sentinel."},
{id:179,category:"Réponse aux Incidents",question:"Scénario: Vous soupçonnez une compromission via un supply chain attack sur un package npm. Quelles investigations dans Sentinel/MDE ?",options:["Uniquement scanner les endpoints","1) DeviceProcessEvents: identifier tous les processus enfants de node.exe/npm.exe, 2) DeviceNetworkEvents: connexions réseau initiées par ces processus, 3) DeviceFileEvents: fichiers créés par ces processus, 4) Corréler avec les hashes VirusTotal, 5) Identifier tous les postes ayant installé le package","Désinstaller npm","Bloquer Internet uniquement"],answer:1,explanation:"Supply chain npm: le package malveillant peut s'exécuter lors de l'installation (postinstall scripts). Investigation MDE: processus spawn de npm, connexions réseau sortantes lors de l'install, fichiers créés/modifiés. Identifier tous les postes ayant le package installé (DeviceTvmSoftwareInventory ou DeviceFileEvents)."},
{id:180,category:"Threat Intelligence",question:"Qu'est-ce que 'STIX 2.1' et comment Sentinel l'utilise-t-il ?",options:["Un format de rapport de sécurité","Structured Threat Information Expression: format JSON standardisé pour la TI, définissant des objets (Indicator, Threat Actor, Malware, Campaign, etc.) et leurs relations. Sentinel importe des bundles STIX 2.1 via le connecteur TAXII pour peupler ThreatIntelligenceIndicator","Un standard de chiffrement","Un protocole de partage des incidents"],answer:1,explanation:"STIX 2.1 est le format standard pour la Threat Intelligence: Indicators (IP, hash, domaine), Threat Actors (attributions), Malware (descriptions), Campaign (associations), Relations entre objets. Le connecteur TAXII de Sentinel importe des bundles STIX 2.1 depuis des serveurs TAXII (MISP, OpenCTI, Anomali)."},
{id:181,category:"Microsoft Sentinel",question:"Comment configurer des 'Watchlists' dans Sentinel et les utiliser dans les règles analytiques ?",options:["Les watchlists sont des tables fixes non utilisables dans KQL","Créer une watchlist (CSV upload dans Sentinel), puis dans KQL: _GetWatchlist('WatchlistAlias') | lookup ou join avec les tables de logs. Ex: join SigninLogs with (_GetWatchlist('VIPUsers')) on UserPrincipalName pour alerter sur les connexions suspectes des VIPs","Les watchlists ne supportent que 100 entrées","Les watchlists nécessitent un plan Sentinel spécial"],answer:1,explanation:"Watchlists dans Sentinel: créer via portal (CSV, jusqu'à 10M lignes) ou API. Dans KQL: _GetWatchlist('WatchlistName') retourne une table. Utiliser join/lookup pour enrichir les requêtes: listes d'actifs critiques, utilisateurs VIPs, plages IP de confiance, domaines blacklistés customisés."},
{id:182,category:"Defender for Cloud",question:"Scénario: Defender for Cloud alerte 'Azure Resource Manager detected suspicious activity'. Quelle est la signification ?",options:["Une erreur de déploiement normale","Un acteur potentiellement malveillant utilise Azure Resource Manager pour effectuer des opérations suspectes: création de ressources dans des régions inhabituelles, tentatives d'escalade de privilèges via des assignations de rôles, ou énumération des ressources à grande échelle","Une maintenance Azure","Un problème de quota Azure"],answer:1,explanation:"Les alertes ARM suspicious activity dans MDC détectent: création de ressources dans des régions non utilisées habituellement (crypto-mining), tentatives d'assignation de rôles privilégiés (privilege escalation), énumération massive des ressources, et modifications de politiques de sécurité - signes d'un compte Azure compromis."},
{id:183,category:"Microsoft Sentinel",question:"Qu'est-ce que 'Sentinel Content Hub' et pourquoi est-il important pour un SOC ?",options:["Un magasin d'applications","Une galerie centralisée de contenu prêt à l'emploi: Solutions (pack complet), Standalone détections, Playbooks, Workbooks, Queries, Parsers ASIM pour des centaines de sources de données. Réduit le temps de déploiement d'une nouvelle source de données de semaines à minutes","Un service de formation Microsoft","Un outil de développement de règles"],answer:1,explanation:"Content Hub est le marketplace de Sentinel: chaque Solution contient connecteurs, règles analytiques, workbooks, playbooks, et hunting queries pour une source spécifique (Palo Alto, Okta, AWS, Cisco ISE, etc.). Installer une Solution en quelques clics vs développement from scratch."},
{id:184,category:"Réponse aux Incidents",question:"Scénario: Vous découvrez qu'une boîte mail Exchange Online a une règle de redirection vers un email externe inconnu (Business Email Compromise). Actions immédiates ?",options:["Attendre pour confirmer","1) Supprimer la règle de redirection suspecte, 2) Révoquer toutes les sessions AAD (Revoke-AzureADUserAllRefreshToken), 3) Reset MDP + forcer MFA, 4) Analyser les emails récents envoyés (Threat Explorer), 5) Vérifier les consentements OAuth suspects (MSO 365 admin), 6) Rechercher d'autres boîtes compromises avec règles similaires","Surveiller quelques jours avant d'agir","Supprimer la boîte mail"],answer:1,explanation:"BEC/règle de redirection: action immédiate = supprimer la règle + révoquer sessions. Investigation: quels emails ont été redirigés (période de compromission), autres règles créées, consentements OAuth suspects (app malveillante ayant accès Mail.Read), autres utilisateurs avec des règles similaires (propagation latérale via email)."},
{id:185,category:"KQL Avancé",question:"Comment détecter les 'living-off-the-land binaries' (LOLBins) suspectes dans Defender/Sentinel ?",options:["Les LOLBins sont impossibles à détecter","DeviceProcessEvents | where FileName in~ ('certutil.exe','regsvr32.exe','mshta.exe','rundll32.exe','cscript.exe','wscript.exe','powershell.exe') | where ProcessCommandLine has_any ('http','ftp','\\\\','pastebin','base64') | where InitiatingProcessFileName !in~ ('explorer.exe','services.exe')","SecurityEvent | EventID==4688","Uniquement avec des règles YARA"],answer:1,explanation:"LOLBins detection: filtrer les binaires Windows légitimes souvent abusés (certutil, regsvr32, mshta, rundll32, etc.) qui ont des arguments suspects (URLs, UNC paths, base64) et un processus parent inhabituel (pas explorer.exe, services.exe pour les services légitimes)."},
{id:186,category:"Defender for Endpoint",question:"Qu'est-ce que 'Microsoft Defender for Business' comparé à MDE P1 et P2 ?",options:["MDB est identique à MDE P1","MDE P1: protection Next-gen AV + EDR manual (pas AIR), accès API limité. MDE P2: + AIR automatique, Threat Experts, Threat & Vulnerability Management complet, sandbox deep analysis, APIs complètes. MDB: version PME simplifiée (inclut essentiellement MDE P2 pour <=300 utilisateurs avec interface simplifiée)","MDE P2 est moins cher que MDB","MDB est pour les serveurs uniquement"],answer:1,explanation:"Tableau comparatif: MDE P1 (Next-gen AV, EDR basique, attack surface reduction, conditional access). MDE P2 (+ AIR, Threat Experts, TVM avancé, API avancées, sandbox). MDB (MDE P2 simplifié, jusqu'à 300 users, interface streamlinée pour PME sans équipe sécurité dédiée)."},
{id:187,category:"Microsoft Sentinel",question:"Scénario: Vous devez intégrer des logs de pare-feu Fortinet dans Sentinel. Quelle est la procédure ?",options:["Import manuel de CSV","1) Fortigate supporte CEF syslog, 2) Déployer un Linux proxy (syslog forwarder) avec l'agent Azure Monitor Agent (AMA), 3) Configurer Fortinet pour envoyer les logs en CEF vers l'agent, 4) L'agent les envoie vers Log Analytics table CommonSecurityLog, 5) Installer la Solution Fortinet FortiGate depuis le Content Hub pour les règles/workbooks","Via API REST directement","Ce n'est pas possible sans agent CEF"],answer:1,explanation:"Intégration CEF Fortinet: l'architecture standard est Fortinet→Syslog CEF→Linux Forwarder (avec AMA)→Log Analytics CommonSecurityLog. Le Content Hub propose la Solution Fortinet FortiGate qui inclut le parseur ASIM, les règles analytiques et les workbooks pour cette source."},
{id:188,category:"Microsoft Sentinel",question:"Comment implémenter la détection d'abus de Conditional Access (CA bypass) dans Sentinel ?",options:["Le CA bypass est indétectable","SigninLogs | where ConditionalAccessStatus == 'notApplied' | where ResultType == 0 | join avec la liste des politiques CA attendues sur cette app | alerter si une connexion réussie ne montre aucune politique CA appliquée (indique potentiellement un bypass ou un accès Legacy Auth)","Uniquement via les logs CA","Via des règles Fusion"],answer:1,explanation:"CA bypass detection: les connexions sans politiques CA appliquées peuvent indiquer l'utilisation de l'authentification Legacy (IMAP, POP3, SMTP - qui bypasse CA) ou un bug de configuration CA. Corréler avec le champ ClientAppUsed (si pas 'Browser' ou 'Mobile Apps and Desktop clients' → Legacy Auth)."},
{id:189,category:"Threat Intelligence",question:"Qu'est-ce que 'Microsoft Sentinel Threat Intelligence Upload Indicators API' ?",options:["Une interface pour visualiser la TI","Une API REST qui permet d'importer programmatiquement des indicateurs de compromission (IoCs) dans le workspace Sentinel depuis des sources internes ou personnalisées (JSON format STIX-like), sans passer par un connecteur TAXII","Un outil de recherche TI","Un service de scoring TI"],answer:1,explanation:"L'Upload Indicators API de Sentinel permet d'automatiser l'import d'IoCs depuis n'importe quelle source via HTTP POST JSON: votre propre threat intel, des feeds propriétaires, ou des automatisations (ex: quand un analyste ajoute un IoC dans un ticket ServiceNow, il est automatiquement importé dans Sentinel via cette API)."},
{id:190,category:"Réponse aux Incidents",question:"Scénario: Une investigation Sentinel révèle qu'un attaquant a créé un nouveau compte Azure AD et lui a assigné le rôle Global Administrator. Comment détecter et répondre ?",options:["Uniquement monitorer","Détection KQL: AuditLogs | where OperationName in ('Add user', 'Add member to role') | where TargetResources has 'Global Administrator'. Réponse: 1) Désactiver le compte immédiatement, 2) Révoquer les sessions, 3) Analyser quel compte compromis a créé ce compte admin, 4) Audit de toutes les actions effectuées depuis ce compte admin avant détection","Accepter le compte si les emails sont vérifiés","Désactiver tous les comptes récemment créés"],answer:1,explanation:"Account creation + privilege escalation: AuditLogs filtrés sur 'Add user' et 'Add member to role' pour Global Administrator. Réponse: isolation immédiate du compte frauduleux, audit des activités depuis sa création (AzureActivity, AuditLogs), identifier le compte source compromis ayant créé ce compte admin, et review de toutes les modifications effectuées."},
{id:191,category:"Microsoft Sentinel",question:"Qu'est-ce que le 'Hunting Bookmarks' dans Sentinel ?",options:["Des favoris de navigation web","Des artefacts créés lors du threat hunting qui préservent les résultats de requêtes KQL intéressants avec des notes d'investigation, permettant de les lier à des incidents existants ou de créer de nouveaux incidents à partir des découvertes","Des raccourcis vers les règles analytiques","Des notifications de chasse planifiées"],answer:1,explanation:"Les Hunting Bookmarks dans Sentinel permettent aux hunters de sauvegarder des lignes de résultats KQL intéressants avec des annotations (notes, MITRE ATT&CK mappings) pendant leur investigation. Ces bookmarks peuvent être convertis en incidents ou liés à des incidents existants pour enrichir l'investigation."},
{id:192,category:"Defender for Cloud",question:"Scénario: Defender for Cloud détecte 'Unusual number of resource access permissions denied'. Qu'est-ce que cela indique ?",options:["Un problème de quota Azure","Potentiellement un attaquant (ayant compromis un compte Azure) qui explore les ressources Azure et rencontre des refus d'accès (RBAC), indiquant une tentative de reconnaissance ou d'escalade de privilèges horizontale dans Azure","Une erreur de configuration RBAC normale","Un problème de facturation"],answer:1,explanation:"Cette alerte MDC détecte quand une identité (utilisateur ou service principal) reçoit un nombre anormalement élevé de refus d'autorisation Azure RBAC sur de nombreuses ressources, indiquant une reconnaissance automatisée ou manuelle de l'environnement Azure par un acteur ayant compromis un compte."},
{id:193,category:"KQL Avancé",question:"Comment écrire une requête KQL qui corrèle des événements dans une fenêtre glissante (sliding window) pour détecter des patterns temporels ?",options:["Ce n'est pas possible dans KQL","Utiliser 'join kind=inner' avec 'bin(TimeGenerated, 5m)' pour regrouper par fenêtre de 5 minutes, ou utiliser la technique 'prev()' sur les données triées. Ex: T | sort by UserName, TimeGenerated | extend PrevTime=prev(TimeGenerated,1,datetime(null)) by UserName | where (TimeGenerated-PrevTime) < 10m","Uniquement via des règles Anomaly","Via des procédures stockées"],answer:1,explanation:"Sliding window KQL: pour détecter des patterns comme 'N tentatives en X minutes', utiliser summarize count() par bin(TimeGenerated, interval) + having count > N. Pour des patterns plus complexes (ex: 5 events dans 3 minutes glissantes): jointure avec décalage temporel ou row_window_session()."},
{id:194,category:"Defender for Endpoint",question:"Qu'est-ce que 'Microsoft Defender for Endpoint on Linux' et ses limitations comparées à Windows ?",options:["Pas de MDE pour Linux","MDE Linux: protège les serveurs Linux (Ubuntu, RHEL, CentOS, Debian, Suse, Fedora, Oracle). Inclut: AV temps réel, EDR, command line scanning, faible impact perf. Limitations vs Windows: pas d'EDR Block mode complet, moins de règles ASR, GUI moins riche","MDE Linux est identique à Windows","MDE Linux ne supporte pas EDR"],answer:1,explanation:"MDE sur Linux: déployé via le package mdatp, inclut Real-time Protection (AV), EDR (détection comportementale), et Command Line scans. Limitations: pas de Windows Hello, pas d'ASR rules (Windows-only), interface management via CLI + portail. Déploiement via Ansible/Puppet/Chef pour scale."},
{id:195,category:"Microsoft Sentinel",question:"Comment Sentinel gère-t-il les logs de sources non structurées (format propriétaire) ?",options:["Sentinel ne supporte que les formats standard","Via des Custom Log Tables (_CL) pour ingérer des logs au format JSON personnalisé via l'API Data Collector, et des Parsers ASIM/custom KQL functions pour normaliser les logs au moment de la requête","Via syslog uniquement","En convertissant tous les formats en CEF"],answer:1,explanation:"Sources non structurées dans Sentinel: 1) Custom Logs (_CL) pour les logs JSON envoyés via API ou agent, 2) Function Parsers KQL pour normaliser les champs (ex: extraire IP/user depuis un format propriétaire) via des fonctions sauvegardées, 3) ASIM parsers pour normaliser vers les schémas standards."},
{id:196,category:"Defender for Cloud",question:"Scénario: MDC génère des centaines de recommandations. Comment établir un programme de remédiation structuré pour votre organisation ?",options:["Traiter toutes les recommandations en même temps","1) Catégoriser par Secure Score Impact, 2) Filtrer par Quick Fix disponible, 3) Grouper par équipe responsable (infra, IAM, data), 4) Créer des Governance Rules avec propriétaires et délais, 5) Suivi hebdomadaire du score, 6) Exemptions pour les faux positifs documentés","Ignorer les recommandations de faible score","Désactiver les recommandations non applicables sans justification"],answer:1,explanation:"Programme de remédiation MDC: prioritiser par impact score + criticité actifs, utiliser les Governance Rules pour assigner propriétaires/délais, créer des vagues de remédiation (sprints sécurité), suivre l'évolution du Secure Score, et documenter les exemptions légitimes (avec business justification)."},
{id:197,category:"Threat Intelligence",question:"Comment intégrer Microsoft Defender Threat Intelligence (MDTI) dans un workflow SOC ?",options:["MDTI n'est pas intégrable au workflow SOC","MDTI fournit: profils d'acteurs menaçants, rapports analytiques APT, IoC enrichis (réputation IP/domaine), articles CVE avec contexte d'exploitation. Intégration: recherche d'IPs/domaines/hashes lors d'investigations, enrichissement automatique via playbooks Sentinel, et corrélation avec les incidents","MDTI est uniquement pour la recherche","MDTI est un produit distinct sans intégration"],answer:1,explanation:"Microsoft Defender Threat Intelligence (anciennement RiskIQ): base de données d'IoCs enrichie, profils d'acteurs (lié à MSTIC), articles CVE avec exploitation context. Dans le SOC: enrichissement des alertes Sentinel (playbook appelle l'API MDTI pour contexte d'une IP malveillante), hunting queries basées sur les TTPs des acteurs identifiés, et rapports proactifs."},
{id:198,category:"Microsoft Sentinel",question:"Qu'est-ce que 'Sentinel Notebooks' et dans quel cas les utiliser ?",options:["Des notes de documentation","Des Jupyter Notebooks hébergés dans Azure ML ou dans Sentinel, permettant des analyses de sécurité avancées combinant KQL, Python (pandas, scikit-learn, MSTICPY), et visualisations riches pour le threat hunting avancé et la forensique","Des workbooks Sentinel améliorés","Des scripts PowerShell avancés"],answer:1,explanation:"Sentinel Notebooks = Jupyter + Azure ML + MSTICPY (Microsoft Security Tools for Intelligent Python). Cas d'usage: threat hunting avancé nécessitant ML, analyse de graphes (qui connaît qui), forensique enrichie, visualisations complexes, et analyse de campagnes d'attaque. Plus puissant que KQL pour les analyses ad-hoc complexes."},
{id:199,category:"Réponse aux Incidents",question:"Scénario: Une investigation révèle qu'un attaquant a utilisé 'Azure Cloud Shell' pour exécuter des commandes malveillantes. Comment détecter dans les logs ?",options:["Cloud Shell ne laisse pas de traces","AzureActivity (Category: Administrative) filtrée sur l'IP source de Cloud Shell (52.x.x.x pour la région) avec des opérations ARM (Create/Delete/Modify). SigninLogs montrent la connexion interactive. Les commandes CLI Azure dans Cloud Shell exécutent des appels ARM enregistrés dans AzureActivity","Impossible à détecter","Désactiver Cloud Shell"],answer:1,explanation:"Cloud Shell traces: les commandes az cli/PowerShell Az dans Cloud Shell génèrent des appels ARM enregistrés dans AzureActivity (qui a fait quoi sur quelles ressources). La connexion Azure AD au portail/Cloud Shell est dans SigninLogs. Les fichiers créés dans le storage Cloud Shell peuvent être forensiqués."},
{id:200,category:"Microsoft Sentinel",question:"Comment tester les règles analytiques Sentinel sans attendre un vrai incident ?",options:["Impossiblede tester","1) Simulation via KQL: exécuter manuellement la requête avec des données historiques qui devraient déclencher l'alerte, 2) Atomic Red Team / MITRE Caldera pour simuler les TTPs correspondants, 3) Créer des données de test dans le workspace (log injection via Data Collector API), 4) Feature 'Test Rule' pour les règles NRT","Créer un vrai incident en production","Attendre les incidents réels"],answer:1,explanation:"Tests de règles Sentinel: 1) Exécuter la requête KQL manuellement (vérifier qu'elle retourne les bons résultats), 2) Attack simulation (Atomic Red Team) pour déclencher réellement la règle sur un endpoint de test, 3) Injecter des données de test via HTTP Data Collector API, 4) Tableau de bord 'Analytics Health' pour surveiller les règles qui ne se déclenchent jamais."},
{id:200,category:"Microsoft Sentinel",question:"Qu'est-ce que 'UEBA' dans Microsoft Sentinel et quels types d anomalies detecte-t-il ?",options:["Un outil de gestion des utilisateurs","UEBA dans Sentinel analyse les comportements des utilisateurs et entites pour detecter les anomalies: connexions a des heures inhabituelles, acces a des ressources inhabituelles, deplacements impossibles, volume de donnees exfiltre anormal. Correle les signaux pour identifier les comptes compromis ou les insiders malveillants","Un outil de surveillance reseau","Un systeme de gestion des identites"],answer:1,explanation:"UEBA Sentinel: cree une baseline de comportement pour chaque utilisateur/entite sur 7-14 jours. Toute deviation significative genere un score d anomalie. Exemple: un utilisateur qui se connecte a 3h du matin depuis un pays etranger et telecharge 5GB de donnees = score d anomalie eleve. Integration avec Azure AD Identity Protection pour enrichir les signaux."},
{id:201,category:"Threat Intelligence",question:"Comment integrer des flux de Threat Intelligence externes dans Microsoft Sentinel ?",options:["Impossible d integrer des sources externes","Via TAXII/STIX connectors: Sentinel supporte l ingestion de TI depuis: 1) TAXII servers (feeds commerciaux comme Recorded Future, Crowdstrike), 2) Microsoft TI (built-in), 3) MISP (open-source), 4) Custom indicators via API ThreatIntelligenceIndicator. Les IOCs (IP, domaines, hashes, URLs) sont stockes dans la table ThreatIntelligenceIndicator et utilises dans les regles analytiques","Uniquement via PowerShell","Uniquement les feeds Microsoft"],answer:1,explanation:"TI integration workflow: configurer le connecteur TAXII (URL du server, collection ID, credentials) -> Sentinel ingere les IOCs -> les IOCs apparaissent dans la table ThreatIntelligenceIndicator -> creer une regle analytique: join SigninLogs avec ThreatIntelligenceIndicator sur l IP -> si une connexion provient d un IP malconnu -> incident."},
{id:202,category:"Incident Response",question:"Qu est-ce qu un Playbook dans Microsoft Sentinel et comment automatiser la reponse aux incidents ?",options:["Un livre de procedures manuel","Un Playbook Sentinel = Logic App Azure qui s execute automatiquement en reponse a une alerte ou un incident. Peut: envoyer un email d alerte au SOC, creer un ticket Jira/ServiceNow, bloquer un IP dans Azure Firewall, desactiver un compte Azure AD, envoyer une notification Teams, appeler une API externe","Un script PowerShell","Un outil de documentation"],answer:1,explanation:"Playbook Sentinel use case: alerte Suspicious Login -> Playbook declenche automatiquement -> 1) appel API Azure AD pour obtenir les details du compte, 2) si risque eleve: bloquer le sign-in + requerir MFA reset, 3) creer ticket ServiceNow P1, 4) notifier Teams SOC avec tous les details. Ce qui prendrait 20min manuellement = 30 secondes automatiquement."},
{id:203,category:"Microsoft Sentinel",question:"Comment creer une regle Fusion dans Microsoft Sentinel pour detecter les attaques multi-etapes ?",options:["Les regles Fusion ne sont pas configurables","Fusion = technologie ML de Sentinel qui correle automatiquement les alertes de basse fidelite de multiples sources pour detecter les attaques multi-etapes. Active via le connecteur Advanced Multistage Attack Detection. Fusion combine: Azure AD alerts + MDE alerts + Azure alerts pour detecter des patterns comme Credential Access puis Lateral Movement puis Exfiltration","La Fusion necessite un code personnalise","Fusion uniquement pour les grandes organisations"],answer:1,explanation:"Fusion use case: 1 alert de connexion suspecte (basse fidelite) + 1 alert MDE de modification registre + 1 alert DLP d exfiltration = Fusion les correle sur le meme utilisateur dans la meme fenetre temporelle -> incident haute fidelite Compromised Account - Credential Theft and Exfiltration. Sans Fusion: 3 alertes non-correlees. Avec Fusion: 1 incident contextuel."},
{id:204,category:"Microsoft Sentinel",question:"Comment utiliser les Hunting Queries dans Microsoft Sentinel pour la chasse proactive aux menaces ?",options:["Les hunting queries sont des alertes automatiques","Hunting Queries = requetes KQL sauvegardees pour la chasse proactive quand il n y a pas d alerte. L analyste execute des queries sur des periodes passees pour chercher des patterns suspects pas encore detectes par les regles d alerte. Sentinel inclut 200+ queries de chasse pre-construites basees sur MITRE ATT&CK. Workflow: selectionner des techniques ATT&CK -> executer les queries -> investiguer les resultats","Des alertes temps reel","Des scans de vulnerabilites"],answer:1,explanation:"Hunting workflow: Threat Hunter selectione Initial Access dans ATT&CK -> execute les hunting queries correspondantes sur 30 jours -> trouve 5 connexions suspectes -> ajoute des bookmarks pour les investiguer -> si confirme: cree un incident, partage la query comme nouvelle regle analytique. La chasse proactive detecte ce que les regles automatiques ratent."},
{id:205,category:"Microsoft Defender for Endpoint",question:"Qu est-ce que Advanced Hunting dans MDE/Microsoft 365 Defender et comment l utiliser ?",options:["Une fonctionnalite de chasse aux virus","Advanced Hunting = interface KQL pour interroger les donnees brutes MDE (DeviceEvents, DeviceProcessEvents, DeviceNetworkEvents, DeviceFileEvents) sur 30 jours. Permet aux threat hunters de creer des requetes personnalisees pour: chercher des IOCs specifiques, investiguer des incidents, creer des detections personnalisees Custom Detection Rules","Un antivirus avance","Un outil de gestion des appareils"],answer:1,explanation:"Advanced Hunting tables principales: DeviceProcessEvents (processus crees), DeviceNetworkEvents (connexions reseau), DeviceFileEvents (fichiers crees/modifies), DeviceRegistryEvents (modif registre), DeviceLogonEvents (connexions locales). Exemple: chercher tous les appareils qui ont execute mimikatz.exe dans les 30 derniers jours: DeviceProcessEvents | where FileName =~ 'mimikatz.exe' | project DeviceName, InitiatingProcessFileName, Timestamp."},
{id:206,category:"Microsoft Defender for Identity",question:"Comment Microsoft Defender for Identity detecte-t-il les attaques Pass-the-Ticket ?",options:["Il ne detecte pas Pass-the-Ticket","MDI surveille le trafic Kerberos depuis les Domain Controllers. Pour Pass-the-Ticket: MDI detecte l utilisation d un ticket Kerberos depuis une machine differente de celle ou il a ete emis. Signature: meme ticket utilise depuis deux IPs differentes quasi-simultanement = impossible sans vol de ticket","MDI ne surveille pas Kerberos","Uniquement via les logs Windows"],answer:1,explanation:"Pass-the-Ticket vs Pass-the-Hash: PtT = vol du ticket Kerberos en memoire via Mimikatz, PtH = vol du hash NTLM. MDI detecte les deux. Contre-mesures: Credential Guard protege les tickets en memoire, Protected Users security group force Kerberos pas NTLM. MDI alert Pass-the-ticket activity = haute fidelite peu de faux positifs."},
{id:207,category:"Microsoft Defender for Cloud",question:"Qu est-ce que Defender CSPM (Cloud Security Posture Management) et comment ameliore-t-il le score de securite ?",options:["Un produit de securite pour les VMs uniquement","Defender CSPM plan avance: va au-dela des recommandations de base pour offrir: Attack Path Analysis (visualise les chemins d attaque possibles), Cloud Security Graph (graphe des relations entre ressources), Data-aware security posture (decouverte des donnees sensibles), Risk-based prioritization (prioriser les remediations par risque reel). Le score de securite evolue au fur et a mesure des implementations","Un outil d audit uniquement","Un produit pour le reseau uniquement"],answer:1,explanation:"Attack Path Analysis: Defender CSPM identifie les chemins que les attaquants pourraient suivre pour atteindre des donnees critiques. Exemple: VM Internet-facing -> VM a une vulnerabilite critique -> VM a acces a Key Vault -> Key Vault contient des credentials de base de donnees -> Database contient PII. Chaque noeud du chemin peut etre coupe pour eliminer le chemin d attaque."},
{id:208,category:"MDCA",question:"Qu est-ce que Shadow IT Discovery dans Microsoft Defender for Cloud Apps ?",options:["La decouverte de VMs non-autorisees","Shadow IT Discovery: analyse les logs de proxy/firewall pour identifier les apps SaaS utilisees par les employes sans approbation IT. MDCA catalogue 31000+ apps cloud avec leur score de risque. Actions: sanctionner les apps securisees, unsanctionner les apps risquees (blocage via proxy/firewall integre)","La decouverte des appareils non-geres","Un audit des applications installees"],answer:1,explanation:"Shadow IT workflow: integrer les logs du proxy (Zscaler, Blue Coat) dans MDCA -> Cloud Discovery Dashboard -> voir top apps non-sanctionnees. Si Dropbox est populaire mais risque: unsanctionner -> MDCA genere un script de blocage pour le proxy/firewall. Alternative: creer une session policy dans MDCA pour surveiller/controler l usage de Dropbox sans le bloquer completement."},
{id:209,category:"KQL",question:"Quelle requete KQL permet de detecter une exfiltration de donnees via des volumes anormaux de telechargements ?",options:["SharePoint | count","OfficeActivity | where Operation == 'FileDownloaded' | summarize DownloadCount = count() by UserId, bin(TimeGenerated, 1h) | where DownloadCount > 100 | order by DownloadCount desc","Get-AzureADSignIn | volume","FileAudit | count downloads"],answer:1,explanation:"Cette requete KQL analyse les activites SharePoint/OneDrive: filtre les telechargements de fichiers, groupe par utilisateur et par heure, alerte si plus de 100 fichiers telecharges en 1 heure. Enrichir: ajouter un join avec les informations utilisateur (departement, anciennete) pour le contexte. Creer comme regle analytique Sentinel avec severite Haute."},
{id:210,category:"Incident Response",question:"Quelles sont les etapes du processus d investigation d un incident dans Microsoft Sentinel ?",options:["Alerter puis Ignorer puis Documenter","1) Triage: evaluer la severite et l assignation, 2) Investigation: utiliser le graphe d investigation (entites, timeline, alertes liees), 3) Enrichissement: ajouter du contexte TI et UEBA, 4) Correlation: identifier d autres incidents lies, 5) Reponse: playbooks automatises ou actions manuelles, 6) Containment: isolation et blocage, 7) Remediation: corriger la cause racine, 8) Documentation: fermer l incident avec les details","Alerter puis Bloquer puis Fermer","Detecter puis Ignorer les faux positifs puis Escalader"],answer:1,explanation:"Investigation graph Sentinel: visualise les entites (utilisateur, IP, machine, URL) et leurs relations dans le contexte de l incident. Bookmarks: pendant l investigation, marquer les resultats KQL importants comme bookmarks lies a l incident. MITRE ATT&CK mapping: chaque alerte est mappee a une ou plusieurs techniques ATT&CK pour comprendre le stade de l attaque."},
{id:211,category:"Microsoft Defender for Endpoint",question:"Comment fonctionne l isolation d appareil Device Isolation dans MDE et quand l utiliser ?",options:["L isolation supprime les donnees de l appareil","Device Isolation dans MDE: coupe toutes les connexions reseau de l appareil sauf le canal de communication MDE (l appareil reste gerable mais isole du reseau). Types: 1) Full Isolation (toutes connexions coupees sauf MDE), 2) Selective Isolation (seulement certains processus bloques). Quand utiliser: compromission confirmee, ransomware detecte, besoin d investigation forensique sans risque de propagation","L isolation efface le disque dur","L isolation est irreversible"],answer:1,explanation:"Device Isolation workflow: incident MDE detecte Mimikatz sur machine -> analyste clique Isolate Device dans le portail MDE -> machine coupee du reseau immediatement -> l analyste peut toujours collecter un forensic package via MDE -> investigation -> si compromis confirme: wipe et reimaging. L isolation empeche le lateral movement et l exfiltration pendant l investigation."},
{id:212,category:"KQL",question:"Comment ecrire une requete KQL pour detecter les creations de comptes administrateurs locaux suspects sur les endpoints ?",options:["Get-LocalUser | admin","SecurityEvent | where EventID == 4732 and TargetSid == 'S-1-5-32-544' | summarize count() by Computer, SubjectUserName, TargetUserName, TimeGenerated | order by TimeGenerated desc","AuditLogs | admin creation","DeviceEvents | user admin"],answer:1,explanation:"EventID 4732 = A member was added to a security-enabled local group. S-1-5-32-544 = SID du groupe Administrators local. Cette requete detecte quand quelqu un est ajoute au groupe Administrators local sur n importe quelle machine. Enrichir: joindre avec DeviceInfo pour avoir les details de la machine. Attacker technique: T1136.001 Create Account Local Account dans MITRE ATT&CK."},
{id:213,category:"Microsoft Sentinel",question:"Qu est-ce que Sentinel Workbooks et comment les utiliser pour le reporting SOC ?",options:["Des notebooks Jupyter uniquement","Sentinel Workbooks = tableaux de bord visuels bases sur Azure Monitor Workbooks. Permettent de creer des rapports interactifs avec: graphiques de tendances des incidents, heatmaps des alertes par heure/jour, geographic maps des connexions suspectes, top entities (IPs, users, machines), metrics SOC (MTTD, MTTR). Des dizaines de templates pre-construits disponibles","Des rapports Word automatiques","Des outils de ticketing"],answer:1,explanation:"Workbook SOC examples: Cybersecurity Status workbook = vue d ensemble des incidents/alertes/tendances. Azure AD Authentication Analysis = visualiser les tendances de connexion. Creer un workbook custom pour votre CISO: nombre d incidents par mois (tendance), MTTD/MTTR en amelioration, top attaques detectees, geographic origin des attaques."},
{id:214,category:"Threat Intelligence",question:"Qu est-ce que MITRE ATT&CK et comment est-il integre dans Microsoft Sentinel ?",options:["Un framework de developpement logiciel","MITRE ATT&CK = base de connaissances des tactiques, techniques et procedures des adversaires reels. 14 tactiques avec 100+ techniques. Integration Sentinel: chaque regle analytique peut etre mappee a des techniques ATT&CK. Le MITRE ATT&CK coverage dashboard montre quelles techniques vous detectez et lesquelles sont des angles morts","Un outil de gestion de vulnerabilites","Un systeme de notation des risques"],answer:1,explanation:"ATT&CK coverage analysis: dans Sentinel, ouvrir le MITRE ATT&CK dashboard -> voir les techniques couvertes (vert) vs non-couvertes (blanc). Les angles morts sont des priorites pour ajouter de nouvelles regles analytiques. Exemple: si T1003 OS Credential Dumping est non-couvert -> ajouter une regle qui detecte l utilisation de lsass.exe dump ou Mimikatz."},
{id:215,category:"Incident Response",question:"Qu est-ce que la Live Response dans Microsoft Defender for Endpoint et comment l utiliser lors d un incident ?",options:["Un chat en direct avec l utilisateur","Live Response = shell distant dans MDE qui permet aux analystes SOC d acceder a un appareil compromis en temps reel sans connexion VPN: executer des scripts PowerShell, collecter des fichiers pour analyse forensique, executer des commandes (netstat, tasklist), uploader des outils d investigation, demarrer/arreter des services. Tout est audite et enregistre","Un acces Bureau a distance","Un outil de patch a distance"],answer:1,explanation:"Live Response workflow: machine suspecte -> analyste ouvre Live Response -> commandes utiles: processes (liste les processus), fileinfo malware.exe (info sur un fichier), getfile suspicious.dll (telecharger pour analyse), run cleanup-script.ps1 (executer un script de remediation). Ne necessite pas que l appareil soit sur le reseau d entreprise (via le canal MDE cloud)."},
{id:216,category:"Microsoft Sentinel",question:"Comment configurer le Cost Management dans Microsoft Sentinel pour eviter des factures surprises ?",options:["Il n y a pas de moyen de gerer les couts","Gestion des couts Sentinel: 1) Choisir le bon pricing tier (Pay-as-you-go vs Commitment tiers - economies importantes a partir de 100GB/jour), 2) Data Collection Rules DCR: filtrer les donnees a la source, 3) Basic Logs: pour les tables a haute volumetrie peu consultees, 4) Archive Tier: pour les donnees apres 90 jours, 5) Alerts de budget Azure Cost Management si le cout depasse un seuil","Sentinel a un cout fixe mensuel","Uniquement via PowerShell"],answer:1,explanation:"Cost optimization Sentinel: audit des tables ingereees -> identifier les tables volumineuses mais peu utiles. Filtres DCR: au lieu d ingerer tous les SecurityEvent, n ingerer que les EventIDs critiques (4624, 4625, 4688, 4732, etc.). Basic vs Analytics logs: les logs DeviceEvents MDE sont volumineuses -> Basic Logs si la query est rare. Commitment tiers: si plus de 100GB/jour -> Commitment 100 peut economiser 50%."},
{id:217,category:"Microsoft Defender for Cloud",question:"Comment configurer Just-In-Time VM Access dans Defender for Cloud et pourquoi est-ce important ?",options:["JIT ouvre des ports permanents","JIT VM Access: au lieu d avoir RDP/SSH (ports 3389/22) ouverts en permanence sur les VMs Azure, JIT permet d ouvrir le port temporairement (ex: 3 heures) uniquement pour l IP source demandee. Workflow: analyste demande l acces depuis Defender for Cloud -> approbation automatique ou manuelle -> NSG rule creee temporairement -> acces accorde -> regle supprimee automatiquement","JIT est uniquement pour les developpeurs","JIT remplace les VPNs"],answer:1,explanation:"JIT metrics: les VMs avec RDP ouvert recoivent en moyenne 1500 tentatives d attaque par heure. JIT reduit la surface d attaque a zero hors des fenetres d acces. Configuration: Defender for Cloud -> Workload protections -> Just-in-time VM access -> Configurer les VMs. Audit: toutes les demandes JIT sont loguees (qui a demande, pour combien de temps, depuis quelle IP)."},
{id:218,category:"MDCA",question:"Comment creer une Session Policy dans Microsoft Defender for Cloud Apps pour surveiller les applications SaaS ?",options:["Impossible de surveiller les sessions SaaS","Session Policy MDCA (avec Azure AD Conditional Access App Control): intercepte la session de l utilisateur via un reverse proxy. Capabilities: 1) Monitor (log toutes les activites), 2) Block uploads (bloquer l upload de fichiers sensibles vers Salesforce), 3) Block downloads (empecher le telechargement depuis Box sur un appareil non-gere), 4) Protect downloads (appliquer un label MIP au fichier telecharge), 5) Block clipboard/print","Les sessions SaaS ne peuvent pas etre controlees","Uniquement pour Microsoft Teams"],answer:1,explanation:"Session Policy use case: fournisseur externe accede a SharePoint via MDCA session policy -> peut lire les documents (necessaire) mais ne peut pas les telecharger ou copier le contenu. Si tentative de download -> MDCA bloque + log. Real-time protection sans changer l experience utilisateur (ils voient le meme SharePoint, transparence du proxy)."},
{id:219,category:"Microsoft Defender for Endpoint",question:"Qu est-ce que EDR vs Next-Gen Antivirus NGAV dans MDE ?",options:["Ce sont des termes identiques","NGAV (Defender Antivirus dans MDE): prevention basee sur les signatures + ML pour bloquer les malwares connus et inconnus, en temps reel avant execution. EDR: detection et investigation des menaces qui ont passe l AV. EDR analyse les comportements post-execution: processus crees, connexions reseau, modifications de registre. L EDR peut detecter un attaquant qui utilise des outils legitimes (PowerShell, WMI) de maniere malveillante = Living-off-the-land","NGAV est plus puissant qu EDR","EDR remplace completement l antivirus"],answer:1,explanation:"Complementarite NGAV + EDR: NGAV bloque la grande majorite des malwares avant execution. EDR catch ce qui passe (attaquants sophistiques qui utilisent des outils legitimes, malwares sans fichiers/fileless). Fileless attacks: un script PowerShell malveillant n est pas detecte par l AV (pas de fichier) mais l EDR voit PowerShell spawner cmd.exe qui contact un C2 -> suspicious chain -> alert."},
{id:220,category:"Microsoft Sentinel",question:"Comment ingerer des logs de sources non-Microsoft (Linux, Cisco, Palo Alto) dans Microsoft Sentinel ?",options:["Seuls les logs Microsoft sont supportes","Via plusieurs methodes: 1) CEF (Common Event Format): agent syslog -> MMA ou AMA Agent -> Sentinel (Cisco, Palo Alto, F5 supportent CEF), 2) Syslog: via l agent Log Analytics sur un serveur Linux proxy, 3) REST API: connecteurs personnalises via la Data Collector API, 4) Data connectors de la galerie Sentinel: 300+ connecteurs pre-construits (Okta, CrowdStrike, AWS, GCP)","Uniquement via Azure Event Hub","Uniquement les logs Windows"],answer:1,explanation:"Architecture d ingestion: pour les appliances reseau (Cisco ASA, Palo Alto NGFW), configurer syslog vers un serveur Linux proxy avec l agent MMA/AMA, qui forward vers Sentinel. Le proxy evite d installer des agents sur les appliances. Pour les sources cloud (AWS CloudTrail, GCP): connecteurs natifs Sentinel. Normaliser les logs avec ASIM (Advanced SIEM Information Model) = tables normalisees qui permettent des requetes multi-sources."},
{id:221,category:"Microsoft Defender for Cloud",question:"Qu est-ce que Defender for DevOps et comment securise-t-il les pipelines CI/CD ?",options:["Un outil de gestion des developpeurs","Defender for DevOps: securise les pipelines DevOps (Azure DevOps, GitHub, GitLab). Fonctionnalites: 1) Secrets scanning: detecter les mots de passe, tokens, cles API dans le code source et l historique Git, 2) Infrastructure as Code scanning: detecter les mauvaises configurations dans les templates Terraform et ARM avant deploiement, 3) Code scanning: vulnerabilites dans le code (SAST), 4) Dependencies: SCA vulnerabilites dans les librairies tiers","Un outil de deploiement de code","Un gestionnaire de versions"],answer:1,explanation:"DevOps security shift-left: detecter les problemes de securite tot dans le cycle de developpement (cout de correction 100x moins cher que post-production). Secrets in code: GitHub scan a detecte des millions de secrets exposes publiquement. Defender for DevOps scanne les repos prives: si un token AWS est dans le code -> alerte + optionnellement bloquer le merge. IaC: un template Terraform qui cree un Storage Account public -> Defender alerte avant deploiement."},
{id:222,category:"KQL",question:"Comment utiliser les operateurs let et materialize en KQL pour optimiser des requetes complexes ?",options:["let et materialize n existent pas en KQL","let: definit une variable ou sous-requete reutilisable. Syntax: let suspiciousIPs = externaldata... ou let myTable = (query...). materialize(): evalue une sous-requete une seule fois meme si elle est referencee plusieurs fois (optimisation performance). Exemple: let alert_users = materialize(SecurityAlert | project UserName); puis utiliser alert_users dans plusieurs joins sans re-executer la requete","KQL n a pas de variables","materialize est uniquement pour les rapports"],answer:1,explanation:"Exemple pratique KQL: let highRiskUsers = materialize(SigninLogs | where RiskLevelDuringSignIn == 'high' | project UserPrincipalName, TimeGenerated); SecurityAlert | join kind=leftouter highRiskUsers on left.UserName == right.UserPrincipalName. Sans materialize, highRiskUsers serait execute deux fois si reference deux fois. Let avec externaldata: charger une liste d IOCs depuis un fichier CSV dans un Storage Account."},
