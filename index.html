{id:1011,cat:"Azure AD / Entra ID",q:"Quelle est la différence entre 'Application Registration' et 'Service Principal' dans Azure AD ?",o:["Ils sont identiques","App Registration = la définition globale d'une app (multi-tenant). Service Principal = la représentation locale de l'app dans un tenant spécifique. Une App Registration crée un Service Principal dans son tenant home, et des SPs supplémentaires dans chaque tenant qui consent à l'app","Service Principal est pour les apps web uniquement","App Registration est obsolète"],a:1,e:"App Registration est l'objet global (tenant home) qui définit l'app. Service Principal est l'instance locale dans chaque tenant: c'est le SP qui reçoit les permissions, les rôles RBAC, et qui apparaît dans les logs d'audit. Multi-tenant apps ont un SP dans chaque tenant client."},
{id:1012,cat:"Azure AD / Entra ID",q:"Scénario: Comment détecter via Azure AD les connexions PowerShell/scripting suspectes sur votre tenant ?",o:["Impossible à détecter","SigninLogs | where AppDisplayName has 'Azure Active Directory PowerShell' or ClientAppUsed == 'ADAL' | where UserType == 'Member' | summarize count() by UserPrincipalName - les authentifications via les apps legacy ou PowerShell sont trackées dans SigninLogs","Uniquement via les alertes email","Via les logs d'Exchange"],a:1,e:"SigninLogs dans Azure AD enregistre chaque connexion avec le champ ClientAppUsed (PowerShell, Browser, Mobile, IMAP, etc.) et AppDisplayName. Les connexions PowerShell admin anormales (depuis un nouveau pays, à des heures inhabituelles) peuvent être détectées et alertées via Sentinel."},
{id:1013,cat:"Azure AD / Entra ID",q:"Qu'est-ce qu'un 'Managed Identity' System-Assigned vs User-Assigned ?",o:["Ils sont identiques","System-Assigned: liée au cycle de vie de la ressource (créée/supprimée avec la ressource), un-to-one. User-Assigned: identité indépendante réutilisable sur plusieurs ressources (many-to-many). User-Assigned préféré pour le partage et la gestion du cycle de vie séparé","System-Assigned est plus sécurisée","User-Assigned est uniquement pour les VMs"],a:1,e:"System-Assigned: automatique, supprimée quand la ressource est supprimée, une seule ressource. User-Assigned: créée séparément, assignable à N ressources simultanément, ne disparaît pas si une ressource est supprimée. Utile pour les app groups partageant les mêmes permissions ou les migrations."},
{id:1014,cat:"Azure AD / Entra ID",q:"Comment configurer Azure AD pour bloquer l'authentification legacy (SMTP, IMAP, POP) qui contourne MFA ?",o:["Impossible de bloquer l'authentification legacy","Conditional Access: créer une politique avec condition 'Client apps: Exchange ActiveSync Clients et Other clients' + action Block. Ou utiliser Security Defaults qui bloque l'auth legacy automatiquement","Configurer Exchange uniquement","Désactiver les protocoles au niveau DNS"],a:1,e:"L'authentification legacy (SMTP AUTH, IMAP, POP, Exchange ActiveSync legacy, etc.) ne supporte pas MFA et est ciblée par les attaques de spray de mots de passe. La bloquer via CA (condition: Legacy Auth Client Apps → Grant: Block) est critique. Security Defaults le fait automatiquement pour les tenants sans CA."},
{id:1015,cat:"Azure AD / Entra ID",q:"Qu'est-ce que 'Microsoft Entra Verified ID' et son cas d'usage ?",o:["Un outil de vérification de licences","Une solution d'identité décentralisée (DID) permettant aux organisations d'émettre et vérifier des attestations cryptographiques (ex: diplômes, certifications, accréditations) sans base de données centrale, sous contrôle de l'utilisateur","Un 2FA basé sur document d'identité","Un service de vérification de carte d'identité pour la conformité"],a:1,e:"Entra Verified ID implémente les W3C Verifiable Credentials: une université émet un diplôme numérique signé cryptographiquement, l'étudiant le stocke dans son wallet (Authenticator), et peut le présenter à un employeur qui le vérifie sans contacter l'université. Idéal pour l'onboarding B2B et la vérification d'identité."},
{id:1016,cat:"Azure AD / Entra ID",q:"Scénario: Votre entreprise fusionne avec une autre et vous devez permettre aux 500 employés de l'entreprise acquise d'accéder aux ressources Azure pendant la transition. Quelle solution scalable ?",o:["Créer 500 comptes manuellement","Azure AD B2B + Entitlement Management: créer un Access Package avec les ressources de transition, policy d'assignation pour le domaine externe, invitation en masse via PowerShell ou CSV upload. Les utilisateurs accèdent avec leurs credentials existants","Partager un compte générique","Fusionner les tenants immédiatement"],a:1,e:"B2B scale pour acquisition: bulk invite via API/PowerShell ou CSV dans le portail AAD (max 400/batch). Entitlement Management package avec les ressources nécessaires (SharePoint, Teams, apps). Cross-tenant access settings pour la confiance MFA/device compliance. Expiration automatique à la fin de la transition."},
{id:1017,cat:"Azure AD / Entra ID",q:"Qu'est-ce que 'Authentication Strength' dans Conditional Access ?",o:["La force du mot de passe","Un contrôle CA qui spécifie le niveau minimum de méthode d'authentification requis pour l'accès: Multifactor Authentication (any MFA), Passwordless MFA, ou Phishing-resistant MFA (FIDO2, Windows Hello, CBA)","Un paramètre de complexité de mot de passe","Un niveau de licence Azure AD"],a:1,e:"Authentication Strength permet de requérir des méthodes MFA spécifiques selon la sensibilité de la ressource: accès normal → any MFA, apps financières → Passwordless MFA (Authenticator), ressources gouvernementales → Phishing-resistant uniquement (FIDO2, WHfB). Plus granulaire que 'Require MFA'."},
{id:1018,cat:"Azure AD / Entra ID",q:"Comment implémenter l'accès aux applications on-premises depuis Internet sans VPN en utilisant Azure AD ?",o:["VPN obligatoire pour les apps on-premises","Azure AD Application Proxy: installer un connector on-premises (léger agent sortant), publier l'app interne comme Enterprise Application dans Azure AD. Les utilisateurs accèdent via le portail myapps.microsoft.com avec Azure AD auth (SSO, MFA, CA). Aucun port entrant à ouvrir","Ouvrir l'app directement sur Internet","Via Azure ExpressRoute uniquement"],a:1,e:"Application Proxy publie des apps internes sécurisées: connector on-premises fait des connexions sortantes vers Azure AD (port 443 sortant uniquement), pas de DMZ complex. L'utilisateur s'authentifie sur Azure AD (MFA, Conditional Access), puis App Proxy pré-authentifie vers l'app interne (Kerberos Constrained Delegation pour SSO)."},
{id:1019,cat:"Azure AD / Entra ID",q:"Quelle est la best practice pour les comptes 'Global Administrator' Azure AD ?",o:["Un seul Global Admin est suffisant","2-4 Global Admins maximum (Microsoft recommande min 2, max 4), cloud-only (pas synchronisés depuis AD), MFA résistant au phishing (FIDO2/WHfB), monitorés via Sentinel, utilisés uniquement pour les tâches nécessitant ce rôle. Au quotidien: rôles moindre privilège via PIM","Plus il y a d'admins, plus c'est sécurisé","Le Global Admin peut être un compte partagé"],a:1,e:"Best practices Global Admin: 2-4 comptes max (trop peu = lockout risk, trop = surface d'attaque), cloud-only (pas vulnérable à une compromission AD on-prem), pas d'email/MFA SMS (FIDO2 uniquement), PIM pour activation JIT, alertes sur chaque activation, séparation des comptes quotidiens/admin."},
{id:1020,cat:"Azure AD / Entra ID",q:"Qu'est-ce que 'SSPR (Self-Service Password Reset)' et pourquoi est-il important pour la sécurité ?",o:["Uniquement pour réduire les appels helpdesk","SSPR réduit les appels helpdesk ET améliore la sécurité: les utilisateurs prouvent leur identité via des méthodes MFA (Authenticator app, code email, questions de sécurité) avant de reset. Évite le social engineering du helpdesk (attaquant se faisant passer pour un employé)","SSPR est moins sécurisé que le helpdesk","SSPR ne s'applique pas aux comptes admin"],a:1,e:"SSPR avec méthodes sécurisées (Authenticator app, code email) est plus résistant au social engineering que le helpdesk. Un attaquant peut appeler le helpdesk en se faisant passer pour un employé. SSPR avec authenticator app + notification email est plus difficile à tromper. Requis pour SSPR admin: 2 méthodes minimum."},
{id:1021,cat:"Azure Key Vault",q:"Scénario: Une application Azure Functions doit accéder à une clé API tierce stockée dans Key Vault. Quelle est la méthode la plus sécurisée ?",o:["Coder la clé API en dur dans le code","Managed Identity pour la Function App + RBAC Key Vault Secrets User sur le Key Vault. Le code appelle l'SDK Azure.KeyVault en utilisant DefaultAzureCredential (utilise automatiquement la Managed Identity). Aucun credential dans le code ou les paramètres","Stocker dans les app settings en clair","Partager la clé via une variable d'environnement"],a:1,e:"Workflow sécurisé: Function App reçoit une Managed Identity (system-assigned), on assigne le rôle 'Key Vault Secrets User' sur le KV, le code utilise DefaultAzureCredential de l'Azure SDK qui utilise automatiquement la MI pour s'authentifier et récupérer le secret. Aucun secret dans le code."},
{id:1022,cat:"Azure Key Vault",q:"Quelle est la différence entre les tiers 'Standard' et 'Premium' d'Azure Key Vault ?",o:["Uniquement le prix","Standard: clés logicielles (protégées par software). Premium: ajoute la protection matérielle (HSM - Hardware Security Module) pour les clés et le stockage HSM dédié (Managed HSM). Premium requis pour les clés RSA/EC dans un vrai HSM FIPS 140-2 Level 3","Premium est uniquement pour les secrets","Standard est deprecated"],a:1,e:"Key Vault Standard: clés RSA/EC/Oct protégées par logiciel (FIPS 140-2 Level 1). Premium: clés protégées par HSM Azure (FIPS 140-2 Level 2). Managed HSM: HSM dédié à votre organisation (FIPS 140-2 Level 3), clés jamais partagées avec d'autres clients. Requis pour les réglementations strictes (ANSSI, secteur défense)."},
{id:1023,cat:"Azure Key Vault",q:"Comment Key Vault gère-t-il la rotation des secrets ?",o:["Rotation manuelle uniquement","Key Vault Event Grid notifications + Azure Functions ou Logic Apps pour la rotation automatique. Key Vault génère un event à J-30 de l'expiration, déclenche une Function qui génère un nouveau secret et le met à jour. Certains services (Azure SQL, Storage) ont une rotation native intégrée","Rotation uniquement à l'expiration","Impossible d'automatiser la rotation"],a:1,e:"Rotation automatique: Key Vault émet un event via Event Grid 30 jours avant l'expiration → une Azure Function est déclenchée → génère le nouveau credential chez le service tiers → met à jour le secret dans Key Vault. Azure SQL Database et Azure Storage Account ont une rotation intégrée dans Key Vault."},
{id:1024,cat:"Azure Key Vault",q:"Scénario: Un développeur a accidentellement supprimé une clé de chiffrement critique dans Key Vault. Comment récupérer ?",o:["La clé est perdue définitivement","Key Vault Soft Delete: la clé est dans l'état 'deleted' mais récupérable pendant la période de rétention (90 jours par défaut). Récupérer via 'Recover' dans le portail ou az keyvault key recover. Purge Protection empêche la suppression définitive pendant la rétention","Restaurer depuis un backup","Recréer une nouvelle clé"],a:1,e:"Soft Delete dans Key Vault est activé par défaut (et non désactivable depuis 2021). La période de rétention est 7-90 jours configurables. Pendant cette période, la clé peut être récupérée. Purge Protection (fortement recommandé) empêche la suppression définitive même par un admin pendant la rétention."},
{id:1025,cat:"Azure Key Vault",q:"Comment implémenter 'Customer-Managed Keys (CMK)' pour Azure SQL Database ?",o:["Impossible avec Azure SQL","1) Créer une clé RSA dans Key Vault (ou BYOK), 2) Donner au Managed Identity du serveur SQL le rôle 'Key Vault Crypto Service Encryption User' sur le KV, 3) Configurer le serveur SQL pour utiliser TDE avec cette clé CMK. La clé chiffre la Data Encryption Key (DEK)","Uniquement avec Azure SQL Managed Instance","Via une extension SQL Server uniquement"],a:1,e:"CMK pour Azure SQL TDE: Azure SQL génère une DEK qui chiffre les données. La DEK est chiffrée avec votre clé CMK dans Key Vault. Si vous révoquez l'accès Key Vault ou supprimez la clé, la base de données devient inaccessible. Vous contrôlez le chiffrement des données SQL via le Key Vault."},
{id:1026,cat:"Azure Key Vault",q:"Qu'est-ce que 'Azure Key Vault Firewall and Virtual Network' et comment l'utiliser ?",o:["Un pare-feu pour protéger Key Vault contre les DDoS","Restreindre l'accès réseau à Key Vault: autoriser uniquement des VNets spécifiques (Private Endpoints recommandé) ou des IPs publiques connues. Combined avec Private Endpoint, le KV n'est accessible que depuis votre réseau privé, pas depuis Internet public","Un NSG pour Key Vault","Une politique d'expiration des clés"],a:1,e:"Key Vault Network Firewall: par défaut accessible depuis Internet. Bonne pratique: créer un Private Endpoint (accès via IP privée dans votre VNet), activer le firewall KV pour bloquer les accès publics ('Allow public access: Disabled'), et autoriser uniquement les trusted Microsoft Services pour les cas d'usage intégrés (ex: Azure Backup, Azure Disk Encryption)."},
{id:1027,cat:"Azure Key Vault",q:"Scénario: Vous devez stocker des certificats TLS pour vos applications Azure dans Key Vault. Quel est le workflow recommandé ?",o:["Stocker les certificats en fichier local","Key Vault Certificate: stocker le certificat (avec clé privée) dans KV, configurer l'auto-renewal (via DigiCert ou Let's Encrypt intégré), les services Azure (App Service, Application Gateway) récupèrent le certificat directement depuis KV via Managed Identity. Rotation transparente sans downtime","Certificats directement dans App Service","Certificats en SharePoint"],a:1,e:"Key Vault Certificates gère le cycle de vie complet: achat/renouvellement via CA intégrée (DigiCert, GlobalSign), stockage sécurisé de la clé privée (HSM si Premium), intégration native avec App Service, App Gateway, Front Door pour rotation transparente. Les Managed Identities permettent l'accès sans credentials."},
{id:1028,cat:"Azure Key Vault",q:"Qu'est-ce que 'Key Vault Access Policy' vs 'Azure RBAC' pour Key Vault ?",o:["Ils sont identiques","Access Policy: modèle legacy Key Vault spécifique (granularité: get/list/create/delete par type: key/secret/certificate). Azure RBAC: modèle moderne ARM unifié (rôles Key Vault Secrets Officer, User, Reader etc.), intégration PIM, meilleures pratiques. Microsoft recommande RBAC","Access Policy est plus sécurisée","RBAC ne supporte pas Key Vault"],a:1,e:"Migration vers RBAC recommandée: Azure RBAC offre une gestion unifiée, intégration PIM (JIT pour les ops KV), Conditional Access, audit dans Azure Activity Logs, et des rôles standardisés. Access Policy legacy reste supporté mais RBAC est la voie future (et permet l'intégration PIM pour accès temporaire aux secrets)."},
{id:1029,cat:"Azure Key Vault",q:"Comment auditer et monitorer les accès à Azure Key Vault ?",o:["Uniquement via les alertes email","Activer les Diagnostic Settings de Key Vault vers Log Analytics: table AzureDiagnostics ou KeyVaultLogs. Monitorer: accès aux secrets (opérations Get), échecs d'authentification, modifications de politique. Créer des alertes Sentinel sur les accès anormaux (hors horaires, nouvelles IPs)","Via les logs Windows uniquement","Audit impossible sur Key Vault"],a:1,e:"Diagnostic Settings KV → Log Analytics: AzureKeyVaultLogs table. Requête KQL pour auditer: AzureDiagnostics | where ResourceProvider == 'MICROSOFT.KEYVAULT'. Surveiller: SecretGet (accès secrets), Authentication failures (tentatives avec credentials invalides), permission changes. Défenseur Cloud génère des alertes sur les activités suspectes KV."},
{id:1030,cat:"Azure Key Vault",q:"Scénario: Une application web doit accéder à 20 secrets différents dans Key Vault lors du démarrage. Comment optimiser pour la performance ET la sécurité ?",o:["20 appels séquentiels au démarrage","Utiliser Key Vault References dans App Service/Functions (les secrets sont injectés comme variables d'environnement sans appel explicite), ou cache côté application (Azure.Security.KeyVault.Secrets avec SecretClientOptions CacheOptions), ou Azure App Configuration avec Key Vault references","Stocker les secrets en cache disque","Copier les secrets dans les paramètres d'application en clair"],a:1,e:"Key Vault References dans App Service: déclarer les secrets comme @Microsoft.KeyVault(SecretUri=...) dans les App Settings - App Service les résout automatiquement au démarrage sans code. Ou Azure App Configuration (service cache distribué) avec Key Vault references pour centraliser la configuration et réduire les appels KV."},
{id:1031,cat:"Réseau Azure",q:"Scénario: Des VMs dans un subnet Azure doivent accéder à Internet pour les mises à jour mais PAS autoriser les connexions entrantes depuis Internet. Comment ?",o:["Impossible de différencier entrant/sortant","NSG: règle sortante 'Allow' port 80/443 vers Internet. Pas de règle entrante publique. Azure NAT Gateway pour les sorties (IP sortante statique). Par défaut Azure bloque tout entrant public sans IP publique ou Load Balancer. NAT Gateway donne une IP sortante dédiée pour l'allowlisting","Ouvrir le port 80/443 bidirectionnel","VPN pour toutes les sorties Internet"],a:1,e:"Architecture sortie sécurisée: NAT Gateway associé au subnet fournit une IP sortante statique (utile pour allowlisting chez des partenaires). NSG: règle sortante Allow HTTP/HTTPS (ou via Azure Firewall pour logging/filtering). Pas d'IP publique sur les VMs = aucun accès entrant direct possible."},
{id:1032,cat:"Réseau Azure",q:"Qu'est-ce que 'Azure DDoS Protection Standard' comparé à 'Basic' ?",o:["Uniquement différence de prix","Basic: protection L3/L4 intégrée automatiquement pour toutes les ressources Azure (gratuit). Standard: protection avancée dédiée à vos ressources (mitigation adaptative basée sur votre profil de trafic, alertes en temps réel, rapports, crédits de coût si attaque, support DDoS Rapid Response)","Basic est plus puissant","Standard est uniquement pour les apps critiques"],a:1,e:"DDoS Basic: Microsoft absorbe les attaques massives sur son infrastructure (protège Azure, pas spécifiquement vos ressources). DDoS Standard: politique de mitigation adaptée à votre profil de trafic (votre baseline apprise sur 30 jours), alertes en temps réel, logs détaillés, accès à l'équipe DDoS Rapid Response (DRR) Microsoft."},
{id:1033,cat:"Réseau Azure",q:"Comment sécuriser les connexions sortantes d'AKS (Azure Kubernetes Service) vers Internet ?",o:["Laisser le trafic sortir librement","Configurer AKS avec un Load Balancer outbound ou NAT Gateway + Azure Firewall avec UDR (User Defined Routes) pour forcer tout le trafic sortant AKS via Azure Firewall (FQDN rules pour permettre les destinations légitimes seulement)","VPN pour chaque pod","NSG uniquement sur les nodes"],a:1,e:"Sécurité sortante AKS: NAT Gateway ou Azure Firewall (UDR 0.0.0.0/0 → Azure Firewall). Azure Firewall permet/bloque par FQDN (mcr.microsoft.com pour images, *.azurecr.io pour votre ACR, specific API endpoints). Réduit la surface d'exfiltration et permet l'audit des connexions sortantes des conteneurs."},
{id:1034,cat:"Réseau Azure",q:"Qu'est-ce que 'Azure Private Link Service' (vs Azure Private Endpoint) ?",o:["Ils sont identiques","Private Endpoint = consommateur (accéder à un service PaaS Azure via IP privée depuis votre VNet). Private Link Service = fournisseur (exposer VOTRE service Azure à d'autres VNets/clients de façon privée, sans peering, via le réseau backbone Microsoft)","Private Link Service est pour les gouvernements","Private Endpoint est deprecated"],a:1,e:"Private Endpoint: accède à Azure PaaS (Storage, SQL, KV) via IP privée dans votre VNet. Private Link Service: exposez votre propre service (ex: Load Balancer devant vos APIs) à d'autres clients Azure de façon privée. Client crée un Private Endpoint vers votre Private Link Service. Trafic ne traverse jamais Internet."},
{id:1035,cat:"Réseau Azure",q:"Scénario: Vous voulez inspecter tout le trafic entre spokes dans une architecture hub-and-spoke. Comment forcer le routage via Azure Firewall ?",o:["C'est automatique dans hub-and-spoke","User Defined Routes (UDR) dans chaque spoke VNet: route 0.0.0.0/0 → Azure Firewall Private IP (dans le hub). Azure Firewall Network Rules et Application Rules inspectent et filtrent le trafic est-ouest entre spokes. Activer DNS Proxy pour logging DNS complet","Via NSG uniquement","Via Azure Traffic Manager"],a:1,e:"Inspection est-ouest: UDR dans chaque spoke subnet avec next-hop = Azure Firewall IP dans le hub. Azure Firewall (avec Threat Intel + IDPS si Premium) inspecte tous les flux inter-spokes. Désactiver le transit gateway par défaut entre VNet peerings et forcer via UDR. Azure Firewall logs dans Log Analytics pour l'audit."},
{id:1036,cat:"Réseau Azure",q:"Qu'est-ce que 'Azure Bastion' et pourquoi remplace-t-il les jump servers classiques ?",o:["Un service VPN Azure","Un service PaaS managed qui fournit un accès RDP/SSH sécurisé aux VMs Azure directement depuis le portail Azure via HTTPS/WebSocket, sans IP publique sur les VMs, sans agent à gérer, avec protection contre les attaques sur les ports RDP/SSH publics","Un firewall pour les accès admin","Un VPN dédié aux admins"],a:1,e:"Azure Bastion: accès RDP/SSH via navigateur HTTPS (pas d'ouverture de port RDP/SSH sur les NSGs des VMs), pas d'IP publique sur les VMs cibles, managed service (Microsoft gère les patches, HA), logs dans Azure Monitor. Vs jump server: pas de VM à gérer, pas de port RDP public exposé, intégration Azure AD (si AAD-joined VMs)."},
{id:1037,cat:"Réseau Azure",q:"Comment implémenter une protection contre le mouvement latéral réseau dans Azure via les NSGs ?",o:["NSG uniquement sur le subnet externe","NSG avec règles: 1) Bloquer les VMs du même subnet de se communiquer directement (sauf exceptions nécessaires), 2) Bloquer les ports dangereux entre subnets (SMB 445, RDP 3389, WinRM 5985 sauf depuis Bastion), 3) Application Security Groups pour micro-segmentation, 4) Azure Firewall pour inspection L7","Un seul NSG sur le VNet","NSG sur le Load Balancer uniquement"],a:1,e:"Micro-segmentation réseau dans Azure: NSG niveau subnet ET niveau NIC pour les VMs critiques. ASG (Application Security Groups) pour grouper WebServers, AppServers, DBServers. Règles NSG: WebServers→AppServers OK sur port app, AppServers→DBServers OK sur SQL, mais interdire WebServers→DBServers direct. Bloquer SMB/RDP entre tiers."},
{id:1038,cat:"Réseau Azure",q:"Scénario: Une application dans Azure VNet doit appeler une API externe (Twilio, Stripe). Comment sécuriser ces appels sortants ?",o:["Appel direct depuis l'app","Via Azure Firewall (FQDN rule: autoriser api.twilio.com sur 443 uniquement) + NAT Gateway (IP sortante fixe pour allowlisting chez Twilio/Stripe) + API Management comme proxy (logging, rate limiting, retry). L'app n'a pas d'accès Internet direct, seulement via Firewall","Via un proxy tiers","Pas de sécurité nécessaire pour les appels sortants"],a:1,e:"Sorties sécurisées vers APIs tierces: Azure Firewall FQDN rules (whitelist des seuls FQDNs nécessaires), NAT Gateway IP fixe (Twilio/Stripe font de l'IP whitelisting), APIM comme gateway de sortie optionnel (retry, circuit breaker, logging des appels), Managed Identity + API key dans Key Vault (pas de credentials en dur)."},
{id:1039,cat:"Réseau Azure",q:"Qu'est-ce que 'Service Tags' dans les NSG Azure et leur avantage ?",o:["Des étiquettes pour les ressources Azure","Des groupes d'IPs prédéfinis représentant des services Azure ou Microsoft (AzureCloud, Storage, SQL, AppService, etc.). Les NSG peuvent référencer ces tags (ex: Allow de AzureMonitor sur 443) au lieu de gérer des listes d'IPs qui changent. Microsoft maintient les plages IP automatiquement","Des tags ARM pour la facturation","Des règles NSG prédéfinies"],a:1,e:"Service Tags simplifient les règles NSG: 'Allow Azure Monitor outbound' = un Service Tag 'AzureMonitor' qui représente toutes les IPs Azure Monitor actuelles et futures. Microsoft met à jour automatiquement les plages IP des Service Tags. Évite les règles NSG cassées quand Azure change ses IPs."},
{id:1040,cat:"Réseau Azure",q:"Comment protéger une application web dans Azure contre les attaques OWASP Top 10 ?",o:["Uniquement TLS/HTTPS","Azure WAF (Web Application Firewall) sur Azure Application Gateway ou Azure Front Door: règles OWASP Core Rule Set (CRS 3.2), bot protection, custom rules (rate limiting, geo-filtering), mode Detection puis Prevention. Compléter avec: Azure DDoS, Defender for App Service, HTTPS enforcement, Security Headers (HSTS, CSP)","NSG sur le port 443","Antivirus sur le serveur web"],a:1,e:"Protection app web complète: Front Door + WAF OWASP CRS 3.2 (SQL injection, XSS, LFI/RFI, command injection), DDoS Protection Standard, Defender for App Service (anomaly detection), HTTPS-only avec TLS 1.2+, Security Headers configurés (HSTS, X-Frame-Options, CSP), Managed Identity (pas de credentials exposés)."},
{id:1041,cat:"Stockage Sécurisé",q:"Scénario: Un Storage Account Azure contient des données sensibles. Quels 5 contrôles de sécurité activer en priorité ?",o:["Uniquement le mot de passe du compte","1) Désactiver l'accès public aux blobs, 2) Activer le Secure Transfer Required (HTTPS only), 3) Private Endpoint (accès depuis VNet uniquement), 4) Customer-Managed Keys (CMK) pour le chiffrement, 5) Enable Blob Soft Delete + versioning pour l'anti-ransomware","Uniquement HTTPS","Uniquement les logs d'accès"],a:1,e:"Sécurité Storage Account: Public blob access → Disabled, Secure transfer required → Enabled (HTTPS only), Private Endpoint (pas d'accès Internet), CMK via Key Vault (vous contrôlez le chiffrement), Soft Delete (blobs et containers, 7-30 jours), versioning (protection ransomware), defender for Storage (alertes anomalies), RBAC granulaire (Storage Blob Data Reader vs Contributor)."},
{id:1042,cat:"Stockage Sécurisé",q:"Qu'est-ce que 'Shared Access Signature (SAS)' et quelles sont ses vulnérabilités ?",o:["Une signature d'app Azure","Un token URL qui donne accès délégué à des ressources Storage avec des permissions et une expiration définies. Vulnérabilités: SAS non expirés, SAS trop permissifs, SAS dans les logs (si loggés), fuites dans le code source. Best practice: User Delegation SAS (basé sur AAD, révocable)","Un certificat TLS Storage","Un token d'API Azure"],a:1,e:"SAS vulnérabilités: Account SAS (comme la clé de compte) = très dangereux. Service SAS sans expiration courte = clé permanente. SAS dans les URLs = journalisés dans les logs web. Best practices: User Delegation SAS (émis avec votre AAD token, révocable via révocation de credential AAD), expiration courte, permissions minimales, Stored Access Policies (révocables sans changer le SAS)."},
{id:1043,cat:"Stockage Sécurisé",q:"Comment Microsoft Defender for Storage protège-t-il contre les ransomwares ciblant Azure Blob Storage ?",o:["Defender for Storage ne couvre pas les ransomwares","Defender for Storage détecte: upload massif de fichiers chiffrés (extension anormale), accès depuis TOR/Anonymizers, activité d'accès depuis un nouveau pays, activité anormalement élevée (exfiltration). Couplé avec Blob Soft Delete + versioning, les fichiers chiffrés peuvent être restaurés","Via antivirus sur les blobs","Via backup automatique uniquement"],a:1,e:"Protection Storage anti-ransomware: Defender for Storage (alertes sur comportements suspects: upload massif de nouveaux types de fichiers, activité anormale), Soft Delete (récupérer les blobs supprimés/écrasés), Versioning (restaurer la version précédente d'un blob si chiffré/écrasé), Immutable Storage (WORM: Write Once Read Many, blobs non modifiables/supprimables)."},
{id:1044,cat:"Stockage Sécurisé",q:"Qu'est-ce que 'Azure Blob Storage Immutable Storage (WORM)' et ses cas d'usage réglementaires ?",o:["Un système de backup read-only","Stockage immuable où les blobs ne peuvent pas être modifiés ou supprimés pendant une période définie (Time-based retention) ou jusqu'à libération (Legal Hold). Conforme SEC 17a-4, FINRA, MAS pour la rétention légale des données financières","Un chiffrement supplémentaire","Un tier de stockage archive"],a:1,e:"WORM (Write Once Read Many) dans Azure Blob: Time-based Retention Policy (ex: 7 ans pour données financières = règle SEC) ou Legal Hold (pendant litigation). Une fois locké, même les admins ou Microsoft ne peuvent pas supprimer les blobs avant l'expiration. Conforme à de nombreuses réglementations (SEC Rule 17a-4, CFTC, FINRA)."},
{id:1045,cat:"Stockage Sécurisé",q:"Scénario: Votre équipe DevOps utilise des clés de compte Storage Account dans des scripts automatisés. Comment améliorer la sécurité ?",o:["Changer les clés périodiquement","Migrer vers Managed Identity + Azure RBAC (Storage Blob Data Contributor rôle sur le compte ou conteneur spécifique). Les scripts s'authentifient via az login --identity (dans les pipelines CI/CD via Workload Identity Federation). Révoquer les clés de compte si non nécessaires","Stocker les clés dans un fichier protégé","Rotation automatique des clés via Key Vault"],a:1,e:"Éliminer les clés Storage Account des scripts: Managed Identity pour les resources Azure (VM, Function App) qui accèdent au Storage. Pour CI/CD (GitHub Actions), Workload Identity Federation → Azure AD → RBAC Storage. Les Service Principals avec clés peuvent aussi être utilisés comme étape intermédiaire avant Managed Identity."},
{id:1046,cat:"Conteneurs et AKS",q:"Quelles sont les meilleures pratiques de sécurité pour les images de conteneurs dans Azure ?",o:["Utiliser n'importe quelle image publique","1) Images de base minimales (distroless ou scratch), 2) Scan CVE avant push (Defender for Containers/Trivy), 3) Images signées (Notation/cosign), 4) ACR avec Private Endpoint, 5) Politique d'admission Kubernetes (OPA/Gatekeeper) pour n'accepter que les images signées de votre ACR","Image Ubuntu par défaut","Aucune pratique particulière pour les conteneurs"],a:1,e:"Chaîne de confiance des images: Images base minimales (réduire la surface), scanner CVE (Trivy ou Defender for Containers dans les pipelines), signer les images (Notation avec Azure Key Vault), ACR avec geo-replication et Private Endpoint, OPA Gatekeeper constraint pour n'accepter que les images de votre ACR signées. Pas d'images 'latest' tag en production."},
{id:1047,cat:"Conteneurs et AKS",q:"Scénario: Des pods AKS communiquent entre eux via des connexions non chiffrées. Comment implémenter mTLS entre les microservices ?",o:["Ce n'est pas nécessaire dans AKS","Service Mesh (Istio, Linkerd, OSM/Open Service Mesh): injecter des sidecars proxy dans chaque pod qui gèrent le mTLS transparent pour les applications. Ou Azure Container Apps (mTLS built-in). Istio Peer Authentication = mTLS STRICT entre namespaces","Configurer TLS dans chaque application manuellement","VPN entre pods"],a:1,e:"mTLS dans AKS: Istio (le plus complet), Linkerd (plus simple), ou Azure Container Apps (mTLS natif sans service mesh). Istio: PeerAuthentication + DestinationRule pour STRICT mTLS dans les namespaces critiques. STRICT mode = tout le trafic inter-pods doit être mutuellement authentifié via certificats x.509 gérés automatiquement."},
{id:1048,cat:"Conteneurs et AKS",q:"Qu'est-ce que 'Pod Security Standards' dans Kubernetes et pourquoi remplace-t-il PodSecurityPolicy ?",o:["Une amélioration mineure","Pod Security Standards (Privileged/Baseline/Restricted) remplace PodSecurityPolicy (déprécié K8s 1.21, supprimé 1.25). Restricted = le plus sécurisé (no root, no privilege escalation, drop ALL capabilities, seccomp). Implémenté via l'Admission Controller built-in ou OPA Gatekeeper","Un outil de monitoring des pods","Une politique de réseau Kubernetes"],a:1,e:"Pod Security Standards: Privileged (pas de restrictions), Baseline (empêche escalade de privilèges évidente), Restricted (best practice sécurité: RunAsNonRoot, AllowPrivilegeEscalation=false, drop ALL capabilities, seccompProfile RuntimeDefault). Dans AKS, enforcer via Azure Policy (enforce Restricted sur les namespaces applicatifs)."},
{id:1049,cat:"Conteneurs et AKS",q:"Comment sécuriser les secrets dans AKS (ne pas les stocker dans etcd en clair) ?",o:["Variables d'environnement en clair","Azure Key Vault Provider for Secrets Store CSI Driver: les secrets KV sont montés comme volumes dans les pods (ou comme env vars), sans les stocker dans les Kubernetes Secrets (qui sont stockés en base64 non chiffré dans etcd). Option: External Secrets Operator (même principe)","Kubernetes Secrets nativement","Encoder en Base64 dans les YAML manifests"],a:1,e:"Kubernetes Secrets = Base64 dans etcd (pas chiffré par défaut). Alternatives: AKS Secret Store CSI Driver avec Azure Key Vault (secrets KV montés directement dans les pods via Managed Identity, jamais dans etcd), Sealed Secrets (chiffrés dans Git), External Secrets Operator. AKS supporte aussi etcd encryption at rest (chiffrement des Secrets dans etcd via une clé client)."},
{id:1050,cat:"Conteneurs et AKS",q:"Scénario: Defender for Containers détecte 'Anomalous network activity in a container'. Qu'est-ce que cela indique et comment répondre ?",o:["Un problème de réseau normal","Potentiellement: reverse shell, C2 communication, crypto-mining, exfiltration. Réponse: 1) Identifier le pod/container (node, namespace), 2) Capturer les logs du container, 3) Inspecter les connexions réseau actives (kubectl exec ou netstat), 4) Isoler en supprimant le pod, 5) Analyser l'image avec forensics offline","Ignorer si l'app fonctionne","Redémarrer le cluster"],a:1,e:"Détection réseau anormale dans un container: Defender for Containers utilise les profils comportementaux appris. Réponse: kubectl describe pod pour l'identité, kubectl logs pour les logs app, Network Policies pour isoler rapidement (modifier la NP pour bloquer tout trafic sortant du pod suspect), puis forensique sur l'image et les volumes."},
{id:1051,cat:"Gouvernance Azure",q:"Scénario: Votre organisation veut enforcer que TOUTES les ressources Azure soient chiffrées au repos. Comment faire à l'échelle ?",o:["Vérifier manuellement chaque ressource","Azure Policy avec effet 'Audit' puis 'Deny': créer des policies (ou utiliser les built-in initiatives) qui auditent/bloquent la création de ressources sans chiffrement (VMs sans Disk Encryption, Storage sans HTTPS, SQL sans TDE). Appliquer via l'initiative 'Azure Security Benchmark' au niveau Management Group","Envoyer un email à toutes les équipes","Formation annuelle uniquement"],a:1,e:"Gouvernance du chiffrement à grande échelle: Azure Policy 'Deny' effet pour bloquer toute création sans chiffrement, 'DeployIfNotExists' pour remédier les ressources existantes non conformes, initiatives groupant plusieurs policies (ASB initiative inclut les controls de chiffrement). Appliquer au Management Group pour couvrir tous les abonnements fils."},
{id:1052,cat:"Gouvernance Azure",q:"Qu'est-ce que 'Microsoft Defender for Cloud's Security Posture Management' à l'échelle enterprise ?",o:["Un outil de monitoring de performance","MDC CSPM évalue la posture de sécurité sur tous les abonnements Azure connectés, les ressources AWS/GCP (via connecteurs), et les serveurs Arc. Secure Score agrégé par Management Group, recommandations priorisées, Attack Path Analysis, et Cloud Security Explorer pour requêtes cross-cloud","Un outil de facturation","Un audit de conformité annuel"],a:1,e:"MDC CSPM enterprise: Secure Score par abonnement et agrégé par Management Group (vue executive), recommandations avec impact sur le score, Attack Path Analysis (chemins d'attaque visuels), Governance Rules (assigner les remédiation aux propriétaires), connecteurs AWS/GCP pour une vue multi-cloud unifiée, et Cloud Security Explorer pour requêtes de posture."},
{id:1053,cat:"Gouvernance Azure",q:"Comment implémenter des 'Guardrails' pour empêcher les équipes de créer des ressources dans des régions non approuvées ?",o:["Formation des équipes uniquement","Azure Policy 'Allowed locations' avec effet 'Deny' appliquée au niveau Management Group: toute tentative de créer une ressource dans une région non autorisée est bloquée au niveau ARM (Resource Manager). Combiné avec 'Allowed locations for resource groups' pour les resource groups","NSG par région","Surveillance manuelle"],a:1,e:"Policy Guardrails: 'Allowed locations' (list des régions approuvées, effet Deny) appliquée au niveau MG racine. Toute ressource tentant d'être créée dans une région non listée est bloquée avec un message d'erreur clair. Essentiel pour la souveraineté des données (ex: données UE uniquement dans régions FR/EU)."},
{id:1054,cat:"Gouvernance Azure",q:"Scénario: Un audit révèle que 30% des ressources Azure n'ont pas de tags de classification des données. Comment remédier ?",o:["Envoyer un rappel par email","Azure Policy 'Require a tag and its value on resources' avec effet 'Deny' pour les nouvelles ressources + 'Modify' pour ajouter automatiquement les tags manquants sur les existantes. Azure Cost Management + Tagging peut aussi forcer les tags. Rapport de conformité via Policy Compliance","Tags manuels uniquement","Supprimer les ressources non taguées"],a:1,e:"Enforcement des tags via Policy: 'Require tag' avec Deny (nouvelles ressources sans tag bloquées), 'Inherit a tag from the resource group' avec Modify (héritent les tags du RG automatiquement). Pour les ressources existantes non conformes: 'DeployIfNotExists'/'Modify' effect avec remediation task pour rétroactivement ajouter les tags."},
{id:1055,cat:"Scénarios Avancés",q:"Scénario: Un attaquant compromet une Function App Azure via une injection de code dans une dépendance npm. Quelle est la surface d'attaque et comment la limiter ?",o:["Uniquement le code de la Function App","Surface: la Managed Identity de la Function (accès RBAC), les connexions réseau sortantes, les secrets dans les App Settings, les autres ressources dans le même plan. Limiter: Managed Identity avec RBAC minimal, Private Endpoints pour les dépendances, variables d'env sensibles dans KV References, scan SCA des dépendances, isolation réseau (VNet integration)","Aucune surface d'attaque dans les Functions","Uniquement les données de l'app"],a:1,e:"Si une Function App est compromise: l'attaquant hérite de la Managed Identity (accès RBAC), peut appeler les endpoints des connexions configurées, lire les App Settings. Mitigation: RBAC minimal sur la MI, intégration VNet + outbound via Firewall, secrets dans Key Vault (pas App Settings), scan Defender for App Service, Dependency scanning dans le pipeline CI/CD."},
{id:1056,cat:"Scénarios Avancés",q:"Scénario: Vous devez faire une revue de sécurité d'un abonnement Azure hérité avec 500 ressources inconnues. Par où commencer ?",o:["Tout supprimer et recommencer","1) Defender for Cloud Secure Score (vue globale des risques), 2) Azure Resource Graph Explorer (inventaire de toutes les ressources), 3) Identity Inventory (Service Principals, Managed Identities, leurs permissions), 4) Network exposure analysis (NSG avec ports ouverts, IPs publiques), 5) Defender for Cloud recommendations triées par sévérité","Audit manuel ressource par ressource","Fermer l'abonnement"],a:1,e:"Revue d'abonnement legacy: 1) Inventaire via Resource Graph (az graph query), 2) Secure Score + recommandations Defender for Cloud, 3) IAM audit (qui a quels rôles, SPs orphelins), 4) Network exposure (IPs publiques, NSG permissifs), 5) Key Vault audit (clés expirées), 6) Storage Account exposure (blobs publics). Prioriser par risque."},
{id:1057,cat:"Scénarios Avancés",q:"Qu'est-ce que l'attaque 'SSRF (Server-Side Request Forgery)' dans Azure et comment se défendre ?",o:["Une attaque uniquement sur les serveurs web","Une attaque où l'attaquant force une application Azure à faire des requêtes HTTP vers l'instance metadata service (IMDS: 169.254.169.254) pour récupérer les tokens de la Managed Identity. Defense: IMDSv2 (token requis), Network access restriction, WAF rules bloquant les requêtes SSRF","Une attaque sur les DNS","Une attaque sur les Storage Accounts"],a:1,e:"SSRF dans Azure: une app vulnérable au SSRF peut être forcée à appeler http://169.254.169.254/metadata/identity/oauth2/token pour voler le token de la Managed Identity. IMDSv2 (Azure IMDS v2) requiert un token préliminaire (PUT request) rendant le SSRF plus difficile. WAF OWASP rules détectent certains patterns SSRF."},
{id:1058,cat:"Scénarios Avancés",q:"Scénario: Comment détecter et prévenir l'exfiltration de données depuis une VM Azure compromise ?",o:["Uniquement monitoring réseau","Prévention: Firewall Azure (bloquer les destinations inconnues), DLP (Purview pour les données classifiées), Network Watcher Flow Logs (audit trafic). Détection: Azure Monitor/Sentinel alertes sur volume sortant anormal, Defender for Servers (communication C2 détectée), Defender for Cloud alerts 'Unusual network activity'","Bloquer tout trafic sortant","Uniquement antivirus sur la VM"],a:1,e:"Anti-exfiltration VM: Azure Firewall + FQDN allowlist (seules destinations légitimes autorisées), Network Watcher Flow Logs dans Sentinel (détecter volumes anormaux sortants), Defender for Servers (détecte communications vers IPs malveillantes via TI), NSG Flow Logs + Traffic Analytics, et isolation réseau (pas d'accès Internet direct depuis les VMs de production)."},
{id:1059,cat:"Scénarios Avancés",q:"Comment Azure Security Center (Defender for Cloud) évalue-t-il les VMs pour la conformité aux benchmarks CIS ?",o:["Via un scan réseau","Via le Guest Configuration Agent (ou Azure Monitor Agent): évalue les paramètres de sécurité in-guest (politiques d'audit, paramètres de sécurité Windows/Linux, applications installées) et compare au CIS benchmark. Résultats dans Defender for Cloud comme recommandations","Via des scripts PowerShell manuels","Via des agents tiers uniquement"],a:1,e:"Guest Configuration dans Azure Policy évalue les configurations in-guest des VMs contre les CIS benchmarks (Windows Server 2019 CIS L1, Ubuntu CIS L1). Les résultats apparaissent comme recommandations dans Defender for Cloud avec le détail des paramètres non conformes et des remédiations suggérées."},
{id:1060,cat:"Scénarios Avancés",q:"Scénario: Votre SOC reçoit une alerte Defender for Cloud 'Suspicious SQL activity - Possible SQL injection attempt'. Comment investiguer ?",o:["Ignorer si l'app fonctionne","1) Consulter l'alerte Defender for SQL pour la requête suspecte, 2) Vérifier les logs d'audit SQL (SQLSecurityAuditEvents dans Sentinel), 3) Identifier l'utilisateur/IP source, 4) Analyser si données sensibles ont été accédées (SQLAssessment), 5) Bloquer l'IP si attaque confirmée, 6) Corriger la vulnérabilité applicative","Redémarrer la base de données","Changer le mot de passe SQL admin"],a:1,e:"Investigation SQL injection: Alerte Defender for SQL (contient la requête suspecte, IP source, user DB), puis SQLSecurityAuditEvents dans Log Analytics (historique des requêtes), puis analyse du code applicatif (requêtes paramétrées vs concaténation), puis vérification des accès aux données sensibles, et correction (parameterized queries, WAF rule)."},
{id:1061,cat:"Scénarios Avancés",q:"Qu'est-ce que 'Microsoft Defender for APIs' et quels types d'attaques détecte-t-il ?",o:["Uniquement pour Azure API Management","Defender for APIs (intégré avec APIM) détecte: attaques OWASP API Security Top 10 (broken object-level auth, excessive data exposure, injection), abus de volumétrie, scraping, accès anonymes anormaux, appels à des endpoints inactifs, et communication depuis IPs malveillantes","Un scanner de code d'API","Un outil de performance d'API"],a:1,e:"Defender for APIs utilise des baselines ML sur les patterns d'usage normaux (endpoints appelés, volumes, clients) et détecte les déviations: appels vers des endpoints non-documentés (shadow API), volumétrie anormale (scraping), patterns d'authentification cassée (broken auth OWASP API2), et exfiltration de données excessive."},
{id:1062,cat:"Scénarios Avancés",q:"Comment sécuriser Azure DevOps pipelines contre les supply chain attacks ?",o:["Revue manuelle de chaque pipeline","1) Pipeline permissions (branch protection, required reviewers), 2) Scan SAST/SCA dans le pipeline (CodeQL, Dependabot), 3) Defender for DevOps (IaC scan, secret detection), 4) Signed commits obligatoires, 5) Environments avec approval gates pour production, 6) Least privilege pour les Service Connections","Aucune mesure spéciale","Uniquement des tests d'intégration"],a:1,e:"Supply chain security in Azure DevOps: Branch protection (pull request reviews required), pipeline permissions restreints, Service Connections avec Managed Identity (pas de credentials partagés), Workload Identity Federation, scan des dépendances (Dependabot/Renovate), Defender for DevOps pour secrets/IaC, SBOM generation, et signed releases (notation)."},
{id:1063,cat:"Scénarios Avancés",q:"Scénario: Une app sur Azure App Service est compromise via une dépendance vulnérable. Quelles sont les actions de containment et forensique ?",o:["Supprimer le service","Containment: 1) Swap vers un slot sain (swap staging→production avec version propre), 2) Activer Access Restriction (bloquer IPs suspectes), 3) Rotate les Managed Identity si suspicion d'utilisation. Forensique: 4) Logs Kudu/Streaming (App Service logs), 5) Defender for App Service alertes, 6) Network Watcher pour connexions établies","Redémarrer uniquement","Réinstaller Azure App Service"],a:1,e:"Réponse App Service compromis: Deployment Slot swap (rollback rapide vers version connue saine), IP restrictions (bloquer les IPs d'attaquant via Access Restriction), examiner App Service logs (Kudu console), diagnostic logs dans Log Analytics, Defender for App Service alertes (techniques OWASP détectées), vérifier les connexions sortantes suspectes."},
{id:1064,cat:"Scénarios Avancés",q:"Qu'est-ce que 'Azure Security Benchmark (ASB) v3' et ses domaines principaux ?",o:["Un outil de scoring de performance","Le cadre de référence Microsoft pour la sécurité Azure: 12 domaines (Network Security, Identity, Privileged Access, Data Protection, Asset Management, Logging & Threat Detection, Incident Response, Posture & Vuln Management, Endpoint Security, Backup & Recovery, DevOps Security, Governance) mappés avec CIS, NIST, PCI","Un benchmark de performance réseau","Une certification Azure"],a:1,e:"ASB v3 est le framework de sécurité Microsoft pour Azure (conforme CIS Azure Foundations). 12 domaines de contrôles, chacun avec des contrôles spécifiques Azure. Utilisé dans Defender for Cloud pour les recommandations. Mappé avec NIST SP 800-53, CIS Benchmarks, PCI DSS, ISO 27001. C'est le baseline de sécurité recommandé pour tout déploiement Azure."},
{id:1065,cat:"Scénarios Avancés",q:"Comment implémenter une rotation automatique des clés SSH pour les VMs Linux dans Azure ?",o:["Rotation manuelle annuelle","Azure Key Vault pour stocker les clés SSH (paires RSA), Azure Policy ou scripts d'automatisation pour la rotation, Azure Automation Runbooks pour générer/distribuer les nouvelles clés, ou utiliser AAD-based SSH (SSH avec token AAD via az ssh vm) qui élimine la gestion des clés SSH","Ne pas rotater les clés SSH","SSH par mot de passe uniquement"],a:1,e:"Meilleure approche: AAD-based SSH pour les VMs Linux Azure (az ssh vm - s'authentifie via Azure AD, MFA supportée, pas de clé SSH à gérer). Sinon: Key Vault pour stocker les private keys des admins, Automation Runbooks pour la rotation périodique, Just-In-Time VM Access pour les accès ponctuels. Bastion aussi élimine le besoin de clés SSH locales."},
{id:1066,cat:"Scénarios Avancés",q:"Scénario: Vous devez prouver à un auditeur que les accès privilégiés à votre infrastructure Azure sont contrôlés et audités. Quels éléments de preuve fournir ?",o:["Un tableau Excel des admins","1) PIM logs (activations de rôles avec justifications, approbations), 2) Azure Activity Logs (toutes les opérations privilegiées dans les abonnements), 3) Access Reviews results (certifications périodiques des accès), 4) Conditional Access logs (MFA enforced pour les admins), 5) PAW documentation (stations d'administration dédiées)","Mot de passe fort","Liste des administrateurs uniquement"],a:1,e:"Preuves d'audit des accès privilégiés: PIM Audit History (qui a activé quel rôle, quand, pourquoi, qui a approuvé), Azure Activity Logs (opérations privilegiées tracées), CA Sign-in logs (MFA enforced sur les admins), Access Reviews Results (certifications d'accès), et la documentation de votre Privileged Access Management strategy."},
{id:1067,cat:"Scénarios Avancés",q:"Qu'est-ce que 'Azure Firewall Threat Intelligence' et comment fonctionne-t-il ?",o:["Un service d'intelligence artificielle pour les firewall rules","Un mode de filtrage qui utilise les flux TI Microsoft pour alerter/bloquer automatiquement le trafic vers/depuis des IPs et domaines connus malveillants. Mode Alert (log uniquement) ou Alert + Deny (bloquer). Mis à jour en temps réel par Microsoft","Un outil d'analyse des logs de firewall","Un service de géolocalisation des IPs"],a:1,e:"Azure Firewall Threat Intelligence: Microsoft maintient une liste d'IPs/domaines malveillants (botnet C2, malware distribution, etc.) mise à jour en temps réel. En mode 'Alert and Deny', tout trafic Azure Firewall vers ces destinations est automatiquement bloqué et journalisé. Complémentaire aux règles réseau/application explicites."},
{id:1068,cat:"Scénarios Avancés",q:"Scénario: Des pods AKS accèdent à une Azure SQL Database. Comment sécuriser cette connexion end-to-end ?",o:["Connectionstring avec username/password","1) Workload Identity dans AKS (pod reçoit une AAD identity), 2) Azure AD authentication pour SQL (Service Principal ou Managed Identity comme SQL user), 3) Private Endpoint pour SQL (accès depuis le VNet AKS uniquement), 4) Network Policy K8s (seuls les pods applicatifs peuvent sortir vers le SQL private endpoint), 5) Advanced Threat Protection SQL","Username/password dans Secret KV","Connexion ODBC via VPN"],a:1,e:"Connexion sécurisée AKS→SQL: Workload Identity (pod=identité AAD), Azure AD auth SQL (ADD l'identity comme SQL user avec permissions minimales), Private Endpoint SQL (accès via IP privée uniquement), Network Policy K8s (micro-segmentation: seuls les pods qui ont besoin peuvent accéder à l'IP du private endpoint SQL), Defender for SQL (anomaly detection)."},
{id:1069,cat:"Scénarios Avancés",q:"Comment implémenter un 'Break Glass' procedure sécurisée pour Azure AD en cas de panne de l'MFA ?",o:["Désactiver MFA temporairement pour tous","2 comptes Break Glass: cloud-only, exclus de TOUTES les CA policies (y compris MFA), FIDO2 Security Key stockée dans 2 coffres physiques séparés, long random password dans enveloppe scellée, alertes strictes sur utilisation, test trimestriel sans utilisation réelle, monitorer via Sentinel (alert immédiate sur login)","Un compte admin sans MFA pour urgences","Contacter Microsoft Support"],a:1,e:"Break Glass AZ-500 best practice: 2 comptes minimum exclus explicitement de toutes les CA policies. FIDO2 Keys (résistant phishing) dans coffres physiques séparés géographiquement. Pas de licence (pas d'email, pas de MFA app enregistrée). Sentinel alert: ANY activity on these accounts = P1 incident. Test mensuel: verify account exists and can sign in (without full use)."},
{id:1070,cat:"Scénarios Avancés",q:"Quelle est la stratégie de sécurité pour gérer les 'Shadow IT' dans Azure (abonnements non sanctionnés) ?",o:["Bloquer toutes les cartes de crédit des employés","Microsoft Defender for Cloud Apps (MDCA) Cloud Discovery pour identifier les services Azure non sanctionnés, Azure Management Groups pour forcer tous les nouveaux abonnements dans la hiérarchie organisationnelle, Azure Policy pour bloquer les ressources hors compliance, et un processus d'enrolment des nouveaux abonnements","Il n'y a pas de shadow IT dans Azure","Uniquement une politique RH"],a:1,e:"Shadow IT Azure: MDCA détecte les apps Azure non sanctionnées via logs réseau. Pour les abonnements Azure: configurer Azure Management Group avec Azure Policy enforced (tout abonnement hors Management Group = non conforme), utiliser Azure Landing Zones comme template standard, et processus d'onboarding formalisé pour les nouvelles équipes. Azure Lighthouse pour la visibilité MSSP."},
{id:1071,cat:"Azure AD / Entra ID",q:"Qu'est-ce que 'Cross-Tenant Access Settings' dans Entra External ID ?",o:["Un outil de migration de tenants","Paramètres qui gouvernent la collaboration B2B entre votre tenant et les tenants partenaires: Inbound settings (ce que vous autorisez depuis les autres tenants: quels users peuvent accéder, si vous faites confiance à leur MFA/device compliance), Outbound settings (ce que vos users peuvent accéder chez les partenaires), et les Default settings pour tous les tenants non configurés spécifiquement","Un outil de fusion de tenants Azure","Un paramètre de routing réseau"],a:1,e:"Cross-Tenant Access (CTA): permet de configurer finement la collaboration B2B par partenaire. Ex: Trust MFA du tenant partenaire (évite la double MFA pour les guests), Trust Compliant Devices (accepter les appareils conformes du partenaire), et restreindre quels utilisateurs du tenant partenaire peuvent inviter (pas toute l'organisation). Critique pour les partenariats stratégiques."},
{id:1072,cat:"Azure AD / Entra ID",q:"Scénario: Votre organisation utilise des comptes de service pour les applications legacy qui ne supportent pas les Managed Identities. Comment les sécuriser ?",o:["Mot de passe simple et partagé","Pour les comptes de service Azure AD: 1) Utiliser des Service Principals avec certificate auth (pas client secret), 2) Rotation automatique des certificats via Key Vault, 3) Workload Identity Federation si possible, 4) RBAC minimal sur les ressources cibles, 5) Conditional Access avec named location (uniquement depuis les IPs des serveurs), 6) Alertes sur toute authentification hors des plages IP autorisées","Un seul mot de passe fort","Comptes admin partagés"],a:1,e:"Service accounts sécurisés: certificate-based auth (pas de client secrets qui expirent), Key Vault pour stocker et rotater les certificats, Named Location CA (accès uniquement depuis les IPs des serveurs applicatifs), no MFA possible = remplacer par des contrôles compensatoires (IP restriction, certificate auth). Privileged Identity Management pour les SPs avec des rôles élevés."},
{id:1073,cat:"Azure Key Vault",q:"Scénario: Un développeur a accidentellement pushé une clé API dans GitHub. La clé est stockée dans Azure Key Vault. Que faire ?",o:["La clé dans KV est sécurisée, pas de problème","La clé exposée dans GitHub n'est pas la clé KV mais probablement: la clé API du service tiers directement dans le code (pas de KV reference). Actions: 1) Révoquer/renouveler la clé API compromise chez le fournisseur tiers, 2) Mettre à jour le secret dans Key Vault, 3) Supprimer le commit de l'historique Git (git filter-branch ou BFG Repo Cleaner), 4) Scanner le repo pour d'autres secrets (GitHub Advanced Security, Defender for DevOps)","Supprimer le repository GitHub","Rien à faire"],a:1,e:"Secret scanning: GitHub Advanced Security ou Defender for DevOps scannent automatiquement les commits pour les secrets connus (patterns d'API keys, connection strings). Si une clé est trouvée: révoquer immédiatement (le credential est compromis dès le push), vérifier l'historique d'utilisation de la clé pour détecter des usages non autorisés, puis corriger le code pour utiliser KV References."},
{id:1074,cat:"Réseau Azure",q:"Qu'est-ce que 'Azure Network Watcher' et ses outils de sécurité ?",o:["Un outil de performance réseau uniquement","Azure Network Watcher fournit: NSG Flow Logs (log de tout le trafic réseau accepté/refusé par les NSGs), Traffic Analytics (visualisation et insights des flow logs), Connection Monitor (test de connectivité et latence), IP Flow Verify (diagnostic: ce paquet est-il bloqué?), Next Hop (quel est le prochain saut pour cette IP?), et Packet Capture (capture réseau sur les VMs)","Un équivalent d'Azure Monitor","Un outil de gestion des NSGs"],a:1,e:"Network Watcher sécurité: NSG Flow Logs V2 (log chaque connexion TCP/UDP avec IP source/dest, port, bytes, et allow/deny) → Traffic Analytics dans Log Analytics (requêtes KQL, visualisation des top talkers, détection de trafic anormal). IP Flow Verify = diagnostic instant (pourquoi cette VM ne peut-elle pas parler à cette autre?). Essentiel pour l'investigation réseau."},
{id:1075,cat:"Réseau Azure",q:"Scénario: Un attaquant fait un scan de ports sur vos VMs Azure depuis Internet. Comment le détecter et bloquer ?",o:["Impossible de détecter les scans de ports","Détection: NSG Flow Logs → Traffic Analytics → requête KQL sur les connexions refusées depuis une même IP vers de nombreux ports (pattern de scan). Defender for Cloud alerte sur 'Port scanning detected'. Blocage: NSG règle Deny sur l'IP source (ou plage), Azure DDoS si volumétrique, Azure Firewall avec policy de blocage géographique, et Just-In-Time VM Access (ports fermés par défaut)","Uniquement un antivirus sur les VMs","Un VPN pour bloquer les scans"],a:1,e:"JIT VM Access (Defender for Servers): les ports de gestion (RDP 3389, SSH 22, WinRM 5985) sont FERMÉS par défaut dans les NSGs. Un accès JIT est demandé (durée, IP source), approuvé (manuel ou auto), et une règle NSG temporaire est créée pour la durée demandée. Après expiration: la règle est supprimée automatiquement. Plus de ports RDP/SSH ouverts en permanence."},
{id:1076,cat:"Stockage Sécurisé",q:"Comment implémenter le chiffrement côté client (client-side encryption) pour Azure Blob Storage ?",o:["Azure chiffre déjà côté serveur, pas besoin","Client-Side Encryption (CSE) avec Azure SDK: le client chiffre le blob AVANT de le télécharger vers Azure Storage. La clé de chiffrement (DEK) est chiffrée avec votre CMK (Key Vault). Azure ne voit jamais les données en clair, même les opérateurs Microsoft. CSE v2 utilise AES-256-GCM. Pour les données ultra-sensibles où même Azure Storage ne doit pas voir le contenu en clair","Azure Storage est toujours chiffré","Uniquement via des outils tiers"],a:1,e:"CSE Azure Storage SDK: lors de l'upload, le SDK génère une Content Encryption Key (CEK), chiffre le blob localement (AES-256), chiffre la CEK avec votre CMK Key Vault, stocke la CEK chiffrée dans les métadonnées du blob. Lors du download: récupère la CEK des métadonnées, déchiffre avec KV, déchiffre le blob. Azure ne peut jamais lire le contenu. Différent du SSE (côté serveur, Azure gère)."},
{id:1077,cat:"Conteneurs et AKS",q:"Qu'est-ce que 'Microsoft Defender for Containers' et ses 4 piliers ?",o:["Un antivirus pour les images de conteneurs","4 piliers: 1) Security posture management (misconfiguration Kubernetes: RBAC trop permissif, privileged pods), 2) Vulnerability assessment (scan des images dans ACR et clusters), 3) Run-time threat protection (comportements malveillants: crypto-mining, suspicious exec, network anomalies), 4) Compliance (DORA, CIS K8s Benchmark). Couvre AKS, ARC, et les clusters connectés","Un outil de monitoring de performance","Un outil de scan de code"],a:1,e:"Defender for Containers: architecture basée sur le Defender sensor (DaemonSet sur chaque node AKS) qui collecte les events K8s API (pod creation, exec, etc.) et les envoie à MDC pour analyse. L'analyse ML détecte les comportements anormaux: un pod qui lance bash, télécharge des outils réseau, ou initie des connexions sortantes vers des IPs malveillantes."},
{id:1078,cat:"Conteneurs et AKS",q:"Scénario: Comment implémenter un pipeline de CI/CD sécurisé pour déployer des applications sur AKS ?",o:["Push direct vers le cluster production","1) Code → PR review + SAST (CodeQL/Semgrep) + SCA (Dependabot), 2) Build → Docker image build, scan image (Trivy/Defender), signer l'image (Notation), push vers ACR, 3) Staging → déploiement auto, DAST (ZAP), tests de sécurité, 4) Production → approval gate humain, déploiement via GitOps (ArgoCD), OPA Gatekeeper valide que l'image est signée de votre ACR","Déploiement manuel directement en production","Uniquement des tests fonctionnels"],a:1,e:"DevSecOps AKS pipeline: Shift Left (SAST/SCA dans la PR), image supply chain (build déterministe + scan CVE + signature Notation), registry security (ACR avec Private Endpoint + RBAC + scan à la push), déploiement GitOps (ArgoCD réconcilie l'état déclaré dans Git), admission control (OPA Gatekeeper refuse les images non signées), et monitoring runtime (Defender for Containers)."},
{id:1079,cat:"Gouvernance Azure",q:"Qu'est-ce que 'Azure Cost + Security' governance et comment éviter les ressources fantômes non sécurisées ?",o:["La gouvernance des coûts n'est pas liée à la sécurité","Les ressources non utilisées ou oubliées (VMs arrêtées, IPs publiques orphelines, old Storage Accounts) sont des risques de sécurité: elles peuvent avoir des configurations permissives sans être monitorées. Azure Resource Graph + Azure Advisor identifient les ressources inutilisées. Policy: tag 'Owner' obligatoire + processus de review trimestriel des ressources sans activité","Uniquement un problème financier","Les ressources arrêtées ne sont pas un risque"],a:1,e:"Shadow resources = shadow risk: une VM arrêtée a toujours ses NSG, son IP, ses permissions RBAC, et peut redémarrer. Gouvernance: tags Owner + Application + Environment obligatoires (Policy Deny sans tags), Azure Advisor pour les recommandations de ressources inutilisées, et processus de décommissionnement formel (qui retire les permissions, ferme les ports, archive les données). Combine FinOps et SecOps."},
{id:1080,cat:"Scénarios Avancés",q:"Comment détecter une compromission de la supply chain dans vos pipelines Azure DevOps ?",o:["Impossible à détecter dans le CI/CD","Defender for DevOps: scanne les pipelines YAML pour les permissions excessives (checkout avec GITHUB_TOKEN trop large), les secrets exposés dans les logs, et les dépendances vulnérables. Azure DevOps Audit Log (qui a modifié les pipeline files, les service connections?). Vérifier l'intégrité des artefacts de build (comparer les hashes entre build et deploy)","Uniquement avec des outils externes","Surveiller uniquement les commits"],a:1,e:"Supply chain attack detection: surveillance des pipeline YAML changes (git blame + PR review obligatoire sur les pipelines), Azure DevOps Audit Log (modification de service connections = événement à alerter), hash verification des artefacts (le binaire déployé correspond au binaire buildé?), SBOM generation (Defender for DevOps) pour tracker les dépendances, et Notation pour signer les images déployées."},
{id:1081,cat:"Azure AD / Entra ID",q:"Qu'est-ce que 'Entra ID Protection' Risk Policies et comment répondre aux utilisateurs avec 'High Risk' ?",o:["Ignorer les utilisateurs à haut risque","High User Risk = compte potentiellement compromis (leaked credentials, impossible travel, etc.). Réponse automatique: User Risk Policy → Require password change (SSPR). Réponse manuelle: 1) Révoquer toutes les sessions (Revoke sessions dans AAD), 2) Confirmer la compromission (ou dismiss si faux positif), 3) Notifier l'utilisateur, 4) Investiguer les activités récentes dans Audit/SigninLogs","Désactiver le compte immédiatement","Attendre que l'utilisateur se plaigne"],a:1,e:"Identity Protection workflow: alerte High User Risk → investiguer (quels signaux: leaked creds? impossible travel? MFA fatigue?) → si compromission confirmée: révoquer sessions + forcer reset MDP (SSPR) + vérifier les activités post-compromission (mailbox rules créées? emails envoyés? SharePoint accédé?). Si faux positif: dismiss le risk pour nettoyer le score."},
{id:1082,cat:"Réseau Azure",q:"Qu'est-ce que 'Azure DDoS Protection' et comment fonctionne l'adaptive tuning ?",o:["Un service de filtrage de trafic basique","DDoS Protection Standard avec adaptive tuning: Azure apprend le profil de trafic normal de vos ressources protégées sur 30 jours (baseline de trafic). Lors d'une attaque, l'algorithme mitigation compare le trafic actuel au baseline et élimine le trafic attaquant sans bloquer le trafic légitime. Alerts en temps réel, métriques dans Azure Monitor, DRR team access","Un firewall anti-DDoS","Un rate limiter Azure"],a:1,e:"DDoS Standard tuning: la protection est adaptée à VOTRE trafic (pas des seuils génériques). Si votre app reçoit normalement 10 Gbps, le seuil de mitigation est calibré en conséquence. Types d'attaques mitigées: volumétriques (UDP flood, ICMP flood), protocol attacks (SYN flood), et resource layer (HTTP floods avec WAF). Métriques: DDoSPacketsDropped, IsUnderDDoSAttack dans Azure Monitor."},
{id:1083,cat:"Azure Key Vault",q:"Comment implémenter une politique de 'Bring Your Own Key (BYOK)' pour Azure Storage avec Key Vault ?",o:["BYOK n'est pas possible avec Azure Storage","BYOK pour Azure Storage: 1) Générer la clé RSA dans votre HSM on-premises (Thales, SafeNet), 2) L'exporter en byok package (clé wrappée avec la KEK Key Vault), 3) Importer dans Azure Key Vault (clé protégée HSM, ne peut pas être exportée), 4) Configurer le Storage Account pour utiliser cette CMK, 5) La clé ne quitte jamais votre contrôle (même si générée dans Azure KV)","Uniquement possible avec Azure SQL","Une fonctionnalité de licence Premium uniquement"],a:1,e:"BYOK Azure: votre clé générée dans votre infrastructure est importée dans KV sous forme chiffrée (le matériel de clé est wrappé par la KEK de l'instance KV HSM, seul ce KV peut la déchiffrer). Avantage: vous avez généré l'entropie (contrôle de la source), la clé est dans votre KV (vous pouvez révoquer), et protégée HSM (Microsoft ne peut pas extraire la clé)."},
{id:1084,cat:"Gouvernance Azure",q:"Comment implémenter 'Azure Policy' pour interdire les connexions non chiffrées (HTTP) sur tous les App Services ?",o:["Configurer manuellement chaque App Service","Azure Policy built-in: 'App Service apps should only be accessible over HTTPS' avec effet 'Audit' d'abord, puis changer en 'Deny'. Pour les App Services existants: Policy 'App Service apps should use the latest TLS version' avec effet 'Audit' et création d'une remediation task pour activer HTTPS-only automatiquement via DeployIfNotExists ou Modify effect","Configurer un redirect HTTP→HTTPS manuellement","Uniquement via un script PowerShell"],a:1,e:"Policy pour HTTPS App Service: Azure built-in policy 'App Service apps should only be accessible over HTTPS' (effet Deny) + 'App Service apps should use the latest TLS version' (Deny pour TLS 1.0/1.1). Ces policies bloquent la création d'App Services sans HTTPS-only et peuvent remedier les existants via une task de remédiation (qui appelle l'API ARM pour activer httpsOnly=true)."},
{id:1085,cat:"Scénarios Avancés",q:"Scénario: Defender for Cloud détecte 'VM is missing system updates'. Pourquoi est-ce critique et comment automatiser la remédiation ?",o:["Les mises à jour manquantes ne sont pas un problème urgent","Critique: 60%+ des ransomwares exploitent des vulnérabilités connues patchées. Automatisation: Azure Update Manager avec maintenance schedules, Policy 'Configure periodic checking for missing system updates' (DINE), Alert sur les CVEs CVSS ≥7 sans patch depuis >7 jours, et Automation Runbook de remédiation déclenché par les alertes MDC pour patcher immédiatement les VMs critiques","Les mises à jour se font automatiquement","Un risque uniquement pour les apps Legacy"],a:1,e:"Patch management automatisé: Defender for Cloud Recommendations (missing updates) → Azure Policy DINE 'Deploy requirements for scheduling recurring updates' → Update Manager schedules (weekly pour critiques, mensuel pour les autres) → Deployment rings (test→staging→prod avec délai 48h entre rings). SLA cible: CVE CVSS≥9: 24h, ≥7: 7 jours, autres: 30 jours."},
{id:1086,cat:"Azure AD / Entra ID",q:"Qu'est-ce que 'Entra Permissions Management (CIEM)' et son apport dans la posture de sécurité cloud ?",o:["Un outil de gestion des licences Azure","Cloud Infrastructure Entitlement Management: découvre et analyse les permissions dans Azure, AWS, et GCP. Identifie le 'Permissions Gap' (différence entre les permissions accordées et les permissions réellement utilisées). Permet de right-size les permissions (supprimer celles non utilisées), détecter les permissions à risque (ex: delete * sur toutes les ressources)","Un outil de RBAC Azure uniquement","Un outil de conformité RGPD"],a:1,e:"Entra Permissions Management (anciennement CloudKnox): analyse les permissions accordées vs utilisées pour chaque identité (utilisateurs, service principals, Managed Identities) dans le multi-cloud. Discover phase (inventaire permissions), Remediate phase (right-size: retirer les permissions non utilisées en 90 jours), Monitor phase (alertes sur les nouvelles permissions risquées). Réduit drastiquement la surface d'attaque IAM."},
{id:1087,cat:"Conteneurs et AKS",q:"Qu'est-ce que 'KEDA (Kubernetes Event-Driven Autoscaling)' et ses implications sécurité ?",o:["Un outil de sécurité Kubernetes","KEDA autoscale les pods selon des événements externes (messages en file Azure Service Bus, messages Kafka, etc.). Implications sécurité: 1) KEDA a besoin d'accès aux sources d'événements (Managed Identity recommandée vs credentials), 2) Un attaquant qui contrôle la source d'événements peut provoquer un scaling excessif (DoS), 3) Les identités KEDA doivent avoir des permissions minimales sur les sources","Un moniteur de performance Kubernetes","Un service mesh Kubernetes"],a:1,e:"KEDA sécurité: utiliser Workload Identity (federated avec Azure AD) pour que KEDA accède aux sources d'événements sans credentials stockés dans Kubernetes Secrets. TriggerAuthentication avec SecretProviderClass (KV CSI Driver) si Workload Identity n'est pas disponible. Limiter les permissions KEDA: Service Bus Data Receiver uniquement (pas Owner). Network Policy pour restreindre le trafic KEDA."},
{id:1088,cat:"Azure AD / Entra ID",q:"Comment sécuriser les applications utilisant 'Microsoft Graph API' dans Azure AD ?",o:["Donner des permissions Microsoft Graph très larges","Permissions minimales sur Microsoft Graph: utiliser les scopes les plus granulaires possibles (Mail.Read vs Mail.ReadWrite, User.Read vs User.ReadAll). Application permissions (sans utilisateur) sont plus dangereuses que Delegated (agissent au nom de l'user). Utiliser des Managed Identities ou Service Principals avec Certificate Auth. Monitorer les usages Graph via Entra Sign-in logs","Utiliser des permissions admin pour l'app","Des permissions larges facilitent le développement"],a:1,e:"Graph API permissions: Application permissions (accès à TOUT le tenant: User.ReadAll, Mail.ReadAll) = très dangereux si l'app est compromise. Préférer Delegated permissions (limitées aux données de l'utilisateur authentifié). Pour les apps nécessitant Application permissions: approval workflow (Admin Consent), scopes minimaux, Conditional Access, monitoring dans Sentinel (appels Graph inhabituels = signe de compromission ou de reconnaissance)."},
{id:1089,cat:"Stockage Sécurisé",q:"Scénario: Vous devez auditer tous les accès à un Storage Account contenant des données PCI DSS. Quelles configurations activer ?",o:["Les logs de Storage sont automatiquement activés","1) Activer Storage Account Diagnostic Settings → Log Analytics (StorageBlobLogs, StorageTableLogs, StorageQueueLogs, StorageFileLogs), 2) Activer l'audit pour: Read, Write, Delete operations, 3) Configurer Defender for Storage (alertes sur accès anormaux), 4) Network Watcher Flow Logs sur le subnet, 5) Créer des alertes Sentinel sur les accès depuis des IPs non autorisées ou hors des horaires de bureau","Les logs Azure sont suffisants","Uniquement Defender for Storage"],a:1,e:"Audit Storage Account: StorageBlobLogs table dans Log Analytics contient: IP source, user-agent, URI accédé, opération (GetBlob, PutBlob, DeleteBlob), status, bytes. Pour PCI: conserver 1 an minimum (Diagnostic Settings retention ou archiver dans Storage Account cold tier). Requête KQL: StorageBlobLogs | where OperationName == 'GetBlob' | where AuthenticationType != 'SAS' | summarize count() by CallerIpAddress."},
{id:1090,cat:"Scénarios Avancés",q:"Comment utiliser Azure Lighthouse pour la gestion multi-tenant sécurisée (MSSP ou grande entreprise) ?",o:["Azure Lighthouse est uniquement pour les revendeurs","Azure Lighthouse: permet à un tenant gérant (MSSP ou équipe centrale) de gérer les ressources de tenants clients sans créer de comptes invités dans chaque tenant. Les délégations sont définies précisément (quels rôles, sur quels scopes). Le client peut voir et révoquer les accès depuis son portail. Audit trail dans le tenant client de toutes les actions du MSSP","Un outil de facturation inter-tenant","Une feature réservée aux grands comptes Microsoft"],a:1,e:"Azure Lighthouse use cases: MSSP (gère les abonnements de 50 clients depuis un seul portail, avec des rôles précis: Security Reader, Sentinel Contributor), ou une équipe centrale de gouvernance qui gère les 50 abonnements d'une grande entreprise sans comptes invités dans chaque sub. Audit: le tenant client voit toutes les opérations du MSSP dans ses Activity Logs (transparency totale)."},
{id:1071,cat:"Azure AD / Entra ID",q:"Qu'est-ce que 'Cross-Tenant Access Settings' dans Azure AD et son utilité ?",o:["Un outil de gestion multi-tenants","Contrôle la confiance entre votre tenant et des tenants externes B2B: 1) Inbound (utilisateurs externes accédant à vos ressources): trust leur MFA, trust leurs appareils compliant, bloquer certains tenants, 2) Outbound (vos utilisateurs accédant à des tenants externes): bloquer l'accès à des tenants non approuvés","Un VPN multi-tenant","Une fédération Active Directory"],a:1,e:"Cross-Tenant Access: Inbound settings = pour B2B guests entrant dans votre tenant: trust their MFA (évite de re-demander MFA), trust compliant device (évite d'exiger votre Intune). Outbound settings = contrôler où vos utilisateurs peuvent se connecter (ex: bloquer tous les tenants sauf les partenaires approuvés pour éviter la fuite de données via des tenants personnels)."},
{id:1072,cat:"Azure AD / Entra ID",q:"Comment configurer des politiques de 'Conditional Access' pour les applications Saas non-Microsoft ?",o:["Conditional Access uniquement pour Microsoft apps","Ajouter l'app SaaS comme Enterprise Application dans Azure AD (via galerie ou SAML custom), puis créer une Conditional Access policy ciblant cette app. La policy s'applique lors de l'authentification Azure AD pour l'app: exiger MFA, appareil conforme, named location. Fonctionne pour toute app qui fédère son authentification vers Azure AD (SAML 2.0 ou OIDC)","VPN vers chaque SaaS","Désactiver la SSO pour forcer l'auth locale"],a:1,e:"CA pour SaaS: l'app SaaS (ex: Salesforce, Workday, Box) utilise Azure AD comme IdP via SAML/OIDC. Dans AAD: Enterprise Applications → Salesforce → Conditional Access. La policy s'applique: l'utilisateur accède à Salesforce → redirigé vers Azure AD pour auth → CA évalue (MFA requis?, appareil conforme?) → si conditions OK → token émis → accès Salesforce. Contrôle granulaire par app."},
{id:1073,cat:"Azure Key Vault",q:"Scénario: Deux applications distinctes doivent partager un secret dans Key Vault mais avec des permissions différentes (une lit, l'autre écrit). Comment gérer ?",o:["Un seul accès pour les deux apps","App A: Managed Identity avec rôle 'Key Vault Secrets User' (Get + List uniquement). App B: Managed Identity avec rôle 'Key Vault Secrets Officer' (Get + List + Set + Delete). Les rôles RBAC Key Vault permettent une granularité fine par application. Les deux apps ont des Managed Identities distinctes","Un compte partagé pour les deux apps","Créer deux Key Vaults séparés"],a:1,e:"RBAC Key Vault granulaire: Key Vault Secrets User = Get + List (lecture seule des secrets). Key Vault Secrets Officer = Get + List + Set + Delete + Backup (gestion complète). Assigner le rôle approprié à la Managed Identity de chaque app sur le scope du Key Vault (ou encore plus granulaire: sur un secret spécifique via le scope /secrets/my-secret)."},
{id:1074,cat:"Réseau Azure",q:"Comment configurer Azure Firewall en mode IDPS (Intrusion Detection and Prevention System) ?",o:["IDPS n'est pas disponible dans Azure Firewall","Azure Firewall Premium: activer IDPS dans la Firewall Policy. 3 modes: Off, Alert (log les détections), Alert and Deny (bloquer et logger). Signature engine avec +67 000 règles (Snort ruleset), détecte les exploits réseau connus, scanners, C2 traffic. Configurer des overrides pour désactiver des règles spécifiques (réduire les faux positifs pour des apps legit)","Uniquement via des appliances VM tierces","Via un script PowerShell uniquement"],a:1,e:"Azure Firewall Premium IDPS: similaire à un IDS réseau commercial. En mode Alert+Deny: bloque les connexions correspondant aux signatures d'attaques connues (ex: signature pour EternalBlue SMB exploit). Faux positifs: certaines apps légitimes peuvent correspondre à des signatures → IDPS overrides pour exclure des signatures sur des IP sources/destinations spécifiques connues."},
{id:1075,cat:"Réseau Azure",q:"Scénario: Vous devez connecter un datacenter on-premises à Azure de façon privée et à haute disponibilité. Quelle solution et comment la sécuriser ?",o:["VPN Internet uniquement","ExpressRoute: connexion privée dédiée (pas Internet) via un fournisseur (Orange, SFR Business, Equinix). Sécurité: 1) ExpressRoute ne chiffre pas par défaut (mais c'est un circuit privé), 2) Ajouter IPsec sur ExpressRoute (ExpressRoute + VPN = chiffrement sur un circuit privé), 3) ExpressRoute Gateway dans un subnet dédié, 4) Network Watcher pour monitorer le trafic","Internet public avec VPN IKEv2","Azure Peering uniquement"],a:1,e:"ExpressRoute sécurité: le circuit EST privé (votre FAI dédie une connexion, pas partagée avec Internet) mais n'est pas chiffré par défaut. Pour les données ultra-sensibles: ajouter IPsec MACsec (layer 2 encryption sur le circuit ExpressRoute) ou IPsec/IKEv2 (layer 3 over ExpressRoute). BFD (Bidirectional Forwarding Detection) pour la détection rapide de panne. Redondance: 2 circuits ExpressRoute dans 2 peering locations."},
{id:1076,cat:"Réseau Azure",q:"Qu'est-ce que 'Azure Network Watcher' et ses capacités de diagnostic de sécurité ?",o:["Un monitoring de performance réseau uniquement","Network Watcher fournit: 1) NSG Flow Logs (logs de tout le trafic autorisé/refusé par les NSGs), 2) Connection Troubleshoot (tester la connectivité A→B avec résultat hop-by-hop), 3) IP Flow Verify (tester si un flux spécifique serait autorisé ou bloqué par les NSGs), 4) Packet Capture (capturer le trafic sur une VM pour forensics), 5) Traffic Analytics (analyse visuelle des flow logs dans Log Analytics)","Un service de DNS Azure","Un scanner de ports"],a:1,e:"Network Watcher pour la sécurité: NSG Flow Logs → Traffic Analytics dans Log Analytics pour détecter les accès anormaux, les flux vers des IPs malveillantes, et les ports non standards. IP Flow Verify pour tester si vos NSG rules fonctionnent comme prévu. Packet Capture pour la forensique réseau (capturer le trafic d'une VM suspecte directement depuis le portail)."},
