{id:257,category:"Réseau Sécurisé",question:"Scénario: Des applications dans un VNet Azure doivent résoudre des noms DNS internes et externes. Quelle architecture DNS sécurisée recommander ?",options:["Utiliser les DNS publics (8.8.8.8)","Azure Private DNS Resolver: pour la résolution des zones privées (Private DNS Zones) depuis on-premises et inversement, avec Azure DNS comme forwarder pour les domaines publics. Filtrage DNS via Azure Firewall DNS Proxy","DNS forwarder on-premises uniquement","Gérer les entrées hosts statiquement"],answer:1,explanation:"Architecture DNS sécurisée Azure: Azure Private DNS Zones (résolution interne), Private DNS Resolver (forwarder entrant depuis on-prem + sortant vers DNS zones privées), Azure Firewall DNS Proxy (filtering malicious domains, logging, threat intelligence). Évite les résolutions DNS non auditées."},
{id:258,category:"Réseau Sécurisé",question:"Qu'est-ce que 'Azure Firewall Policy' et en quoi est-elle différente des règles locales d'Azure Firewall ?",options:["Elles sont identiques","Firewall Policy est une ressource séparée et réutilisable qui peut être partagée entre plusieurs instances Azure Firewall (hub-spoke), avec hiérarchie parent/enfant. Les règles locales sont spécifiques à une instance (legacy)","Firewall Policy est uniquement pour Azure Firewall Premium","Les règles locales offrent plus de fonctionnalités"],answer:1,explanation:"Azure Firewall Policy est une ressource ARM réutilisable avec hiérarchie: une Policy parent (règles de base de l'organisation) et des Policies enfants (règles spécifiques aux équipes). Plusieurs firewalls partagent la même Policy, centralisant la gestion. C'est la méthode recommandée vs règles locales (legacy)."},
{id:259,category:"Réseau Sécurisé",question:"Comment sécuriser les APIs exposées sur Internet dans Azure ?",options:["Uniquement TLS","Azure API Management (APIM) avec Azure AD (OAuth 2.0), Azure WAF (protection OWASP), rate limiting et throttling (protection DDoS applicatif), IP filtering, subscription keys, mutual TLS, Private Endpoint pour APIM backend","Uniquement une clé API statique","NSG sur le port 443 uniquement"],answer:1,explanation:"APIs sécurisées: APIM comme gateway (auth Azure AD OIDC, rate limiting, transformations, logging), WAF sur Application Gateway/Front Door (OWASP protection), Managed Identity pour backend (pas de credentials), Private Endpoint pour le backend (accès privé), Defender for APIs (anomaly detection)."},
{id:260,category:"Réseau Sécurisé",question:"Scénario: Vous devez bloquer l'accès aux catégories web (réseaux sociaux, jeux) pour les VM Azure via Azure Firewall. Comment ?",options:["NSG avec liste d'IPs manuelles","Azure Firewall Premium avec Web Categories filtering: activer l'inspection TLS et configurer des règles Application qui bloquent les catégories Web (Social Networking, Games) via FQDN intelligence","Il faut un proxy tiers","Ce n'est pas possible avec Azure Firewall"],answer:1,explanation:"Azure Firewall Premium + TLS Inspection permet le filtrage par catégories Web (fourni par Websense/Forcepoint): créer une règle Application Rule Collection avec action Deny et Category = 'Social Networking, Games' par exemple. Nécessite TLS Inspection pour les sites HTTPS."},
{id:261,category:"Données et Applications",question:"Scénario: Une entreprise pharmaceutique doit protéger ses données de recherche (IP critique). Quelle stratégie Purview ?",options:["Uniquement chiffrement des disques","Classification automatique (trainers personnalisés pour formules médicales), Sensitivity Labels 'Confidential-Research' (chiffrement RMS, watermark, no-copy), DLP pour bloquer l'envoi externe, retention labels pour conformité FDA, Information Barriers entre équipes concurrentes","Uniquement contrôles d'accès RBAC","Backup chiffré uniquement"],answer:1,explanation:"Stratégie données pharma: trainers de classification personnalisés (nomenclature moléculaire), sensitivity labels avec chiffrement automatique, DLP bloquant email/Teams/SharePoint (pas d'envoi de formules vers non-autorisés), Information Barriers (cloisonnement équipes R&D), Insider Risk Management (détection exfiltration)."},
{id:262,category:"Données et Applications",question:"Qu'est-ce que 'Insider Risk Management' dans Microsoft Purview ?",options:["La gestion des risques des fournisseurs IT","Une solution qui détecte les risques internes (employés malveillants ou négligents): départs imminents copiant des données, téléchargements massifs, violation DLP répétée, navigation sur sites suspects, en utilisant des signaux HR","Un système de surveillance des employés","Un outil de conformité RH"],answer:1,explanation:"Insider Risk Management analyse les signaux comportementaux dans M365 (activité SharePoint/OneDrive/Teams/email, DLP violations, HR signals comme date de départ imminente) pour détecter les risques d'exfiltration ou de sabotage, avec des politiques adaptées et des workflows d'investigation privés."},
{id:263,category:"Données et Applications",question:"Qu'est-ce que 'Microsoft Purview eDiscovery' et son utilité sécurité ?",options:["Un outil de découverte de données sensibles","Un outil légal permettant de rechercher, conserver et exporter des données M365 pour des investigations légales, audits de conformité, ou réponse aux incidents. Advanced eDiscovery avec analyse ML pour réduire le volume","Un outil de backup","Un outil de recherche d'emails pour les employés"],answer:1,explanation:"eDiscovery dans Purview permet aux équipes légales/compliance/IR de: placer des Legal Holds sur des boîtes mail/SharePoint, rechercher du contenu sur des critères complexes, exporter pour analyses. En IR, utile pour investiguer les emails d'un compte compromis sans alerter l'attaquant."},
{id:264,category:"Données et Applications",question:"Scénario: Des développeurs exposent accidentellement des clés API dans un repository GitHub public. Comment prévenir cela avec Microsoft ?",options:["Surveiller GitHub manuellement","GitHub Secret Scanning (natif GitHub), Microsoft Defender for DevOps (détecte les secrets dans les repos Azure DevOps/GitHub), pre-commit hooks avec detect-secrets, rotation automatique des clés exposées via Key Vault","Interdire GitHub","Changer toutes les clés périodiquement"],answer:1,explanation:"Pour prévenir l'exposition de secrets: 1) GitHub Secret Scanning (alerte dès un push), 2) Defender for DevOps (Microsoft Security DevOps extension), 3) Pre-commit hooks (gitleaks, detect-secrets), 4) Developer training, 5) Key Vault pour la gestion centralisée (pas de hardcoding), 6) Si exposé: rotation immédiate."},
{id:265,category:"Données et Applications",question:"Qu'est-ce que l'Azure Confidential Computing et quand est-ce nécessaire ?",options:["Un tier de stockage sécurisé","Des environnements d'exécution de confiance (TEE - Trusted Execution Environment) comme Intel SGX/AMD SEV qui chiffrent les données EN MÉMOIRE pendant le traitement, protégeant contre un hyperviseur compromis ou Microsoft","Du chiffrement standard au repos","Une zone réseau isolée"],answer:1,explanation:"Confidential Computing avec TEE (SGX enclaves) chiffre les données pendant l'exécution en mémoire. Utilisé pour: données médicales/financières ultra-sensibles, multi-party computation (plusieurs organisations analysent des données sans les voir), et pour la conformité quand même l'opérateur cloud ne peut voir les données."},
{id:266,category:"Données et Applications",question:"Quel est le rôle de 'Microsoft Information Protection (MIP) SDK' dans une architecture de protection des données ?",options:["Un outil de développement Microsoft uniquement","Un SDK permettant aux applications tierces et personnalisées d'intégrer la classification et la protection des données (labels, chiffrement RMS) nativement dans leurs workflows, hors de M365","Un outil de reporting de classification","Un plugin Office uniquement"],answer:1,explanation:"Le MIP SDK permet d'intégrer la protection des données Purview dans des applications personnalisées: une app de gestion documentaire peut auto-classifier et protéger les documents avec des sensitivity labels, une app mobile peut lire les métadonnées de protection, un DLP personnalisé peut agir sur les labels."},
{id:267,category:"Données et Applications",question:"Scénario: Une entreprise doit chiffrer des données dans Azure SQL avec ses propres clés que Microsoft ne peut pas voir. Quelle solution ?",options:["TDE avec clés Microsoft","Always Encrypted avec des clés stockées dans Azure Key Vault BYOK (Bring Your Own Key), ou Double Key Encryption, combiné avec Customer-Managed Keys pour TDE. Always Encrypted chiffre côté client - l'administrateur SQL ne voit pas les données en clair","Chiffrement de la connexion TLS uniquement","Impossible avec Azure SQL"],answer:1,explanation:"Always Encrypted dans Azure SQL chiffre les données côté client: même les administrateurs SQL voient des données chiffrées. Les clés (Column Master Keys) sont stockées dans Azure Key Vault géré par le client. Avec BYOK/CMK, Microsoft ne peut jamais déchiffrer les données."},
{id:268,category:"Données et Applications",question:"Qu'est-ce que la 'Data Map' dans Microsoft Purview (anciennement Azure Purview) ?",options:["Une carte géographique des datacenters","Un catalogue de données unifié qui découvre, classifie et cartographie automatiquement les données sensibles dans toutes les sources (Azure, on-prem, AWS, GCP, M365) pour la gouvernance des données d'entreprise","Un outil de monitoring des flux de données","Un outil de migration de données"],answer:1,explanation:"Microsoft Purview Data Map scanne et classe automatiquement les données dans toutes les sources (Azure Data Lake, SQL, SAP, Teradata, etc.) avec plus de 200 classificateurs built-in (PII, PCI, PHI). Le Data Catalog fournit une vue unifiée pour la gouvernance et la traçabilité des données."},
{id:269,category:"Données et Applications",question:"Comment Microsoft Purview Communication Compliance aide-t-il les entreprises réglementées ?",options:["En censurant les communications","En surveillant les communications M365 (emails, Teams, Viva Engage) pour détecter les violations de conformité (harcèlement, informations privilégiées, violations de politique) avec ML, pour le secteur financier, RH, et juridique","En archivant tous les emails","En bloquant la communication externe"],answer:1,explanation:"Communication Compliance dans Purview utilise le ML pour analyser les communications M365 pour: conflits d'intérêts (mots clés financiers), harcèlement/discrimination, violations de code de conduite. Les équipes compliance peuvent réviser les communications signalées sans accès à toutes les communications."},
{id:270,category:"Données et Applications",question:"Scénario: Une fuite de données sensibles est détectée. Comment utiliser les outils Microsoft pour identifier la source ?",options:["Impossible sans agent forensique tiers","1) Purview Audit (rechercher les activités de téléchargement/export par user/date), 2) Insider Risk Management (corréler avec comportements anormaux), 3) Defender for Cloud Apps (activités sur apps SaaS), 4) Information Protection (traçabilité des labels), 5) eDiscovery (investigation légale)","Uniquement l'audit Active Directory","Revue manuelle des emails"],answer:1,explanation:"Investigation fuite données: Purview Audit logs (qui a accédé/exporté quoi quand), Information Protection audit trail (accès aux documents protégés), MDCA (téléchargements anormaux dans apps SaaS), Insider Risk Management (corréler avec comportements suspects), DLP reports (violations DLP)."},
{id:271,category:"Infrastructure Sécurisée",question:"Scénario: Des VMs Azure doivent être patchées de façon centralisée et sécurisée. Quelle architecture recommander ?",options:["Mise à jour manuelle ou via RDP","Azure Update Manager: évaluation de la conformité des patches, planification de maintenance windows, déploiement automatique, et reporting cross-subscription. Pour les serveurs critiques: déployer d'abord sur dev/staging via rings","Windows Update direct uniquement","WSUS on-premises uniquement"],answer:1,explanation:"Azure Update Manager (successeur d'Update Management) permet: évaluation de conformité des patches pour Azure VMs + Arc-enabled servers, planification automatique des maintenances, déploiement en rings (dev→test→prod), et reporting consolidé. Intégré avec Defender for Cloud pour prioriser les patches critiques."},
{id:272,category:"Infrastructure Sécurisée",question:"Qu'est-ce que 'Azure Dedicated Hosts' et quand l'utiliser pour la sécurité ?",options:["Un datacenter privé","Des serveurs physiques Azure dédiés à un seul client, offrant isolation physique au niveau hardware, conformité réglementaire (pas de co-location avec d'autres clients), et contrôle du calendrier de maintenance","Des VMs plus performantes","Des serveurs pour les HPC uniquement"],answer:1,explanation:"Azure Dedicated Hosts offrent isolation physique: le serveur physique est alloué exclusivement à votre abonnement (pas de multitenancy au niveau hardware). Requis pour: réglementations interdisant la co-location, licences 'bring your own' (Windows, RHEL), et politiques sécurité exigeant une isolation physique."},
{id:273,category:"Infrastructure Sécurisée",question:"Qu'est-ce que 'Azure Confidential VMs' et comment diffèrent-elles des VMs standards ?",options:["Des VMs dans un réseau isolé","Des VMs utilisant AMD SEV-SNP ou Intel TDX qui chiffrent la mémoire VM complète, protégeant contre les accès de l'hyperviseur et de l'infrastructure Microsoft, avec attestation hardware vérifiable","Des VMs avec plus de RAM chiffrée","Des VMs avec chiffrement de disque uniquement"],answer:1,explanation:"Azure Confidential VMs (AMD SEV-SNP ou Intel TDX) chiffrent toute la mémoire de la VM pendant l'exécution. Même Microsoft (hyperviseur) ne peut lire la mémoire. L'attestation hardware permet au client de vérifier cryptographiquement qu'il tourne sur du matériel non modifié dans un environnement de confiance."},
{id:274,category:"Infrastructure Sécurisée",question:"Scénario: Vous devez gérer des milliers de serveurs on-premises avec les outils Azure. Quelle est la solution ?",options:["Migrer tous les serveurs vers Azure","Azure Arc: étend les capacités Azure (Defender for Cloud, Azure Policy, Update Manager, Azure Monitor, Sentinel) aux serveurs on-premises et multi-cloud en installant l'agent Arc sur les serveurs","VPN pour chaque serveur","Gestion manuelle séparée"],answer:1,explanation:"Azure Arc connecte les serveurs on-premises (Windows, Linux) et multi-cloud à Azure via un agent léger. Cela permet: Defender for Cloud (posture + alertes), Azure Policy (configuration compliance), Update Manager (patches), Azure Monitor (logs/metrics), et Sentinel ingestion - unifiés avec les ressources Azure natives."},
{id:275,category:"Infrastructure Sécurisée",question:"Qu'est-ce que 'Trusted Launch' pour les VMs Azure ?",options:["Un processus de démarrage accéléré","Un ensemble de fonctionnalités de sécurité pour le démarrage des VMs: vTPM (module TPM virtuel), Secure Boot (bloquer bootkits/rootkits), Measured Boot (attestation de l'intégrité), et Integrity Monitoring","Un mode de diagnostic","Un type de licence VM spéciale"],answer:1,explanation:"Trusted Launch dans Azure VMs offre: Secure Boot (empêche exécution de bootloaders/drivers non signés), vTPM 2.0 (stockage de clés, mesures de démarrage), Integrity Monitoring (Defender for Cloud alerte si le démarrage change), protégeant contre les attaques au niveau du firmware/bootloader."},
{id:276,category:"Infrastructure Sécurisée",question:"Comment implémenter une politique de 'Configuration Management' sécurisée pour les VMs Azure ?",options:["Configurer manuellement chaque VM","Azure Automanage pour les meilleures pratiques automatiques, Guest Configuration (Azure Policy) pour audit/remédiation des configurations in-guest, Desired State Configuration (DSC) pour l'enforcement, et Defender for Cloud pour les recommandations","Uniquement via GPO","WSUS uniquement"],answer:1,explanation:"Gestion configuration sécurisée: 1) Azure Automanage (applique automatiquement les meilleures pratiques: backup, monitoring, patching), 2) Azure Policy Guest Configuration (audit et remédie les paramètres in-OS: audit policy, firewall OS), 3) DSC (state desired enforcement), 4) Defender for Cloud (recommandations continues)."},
{id:277,category:"Infrastructure Sécurisée",question:"Qu'est-ce que 'Customer Lockbox for Azure' et quand est-il activé ?",options:["Un système de chiffrement client","Un mécanisme qui requiert l'approbation explicite du client (avec une fenêtre de 12h) avant qu'un ingénieur Microsoft support puisse accéder aux données client lors d'un cas de support technique","Un accès VIP au support Microsoft","Un outil de gestion des tickets support"],answer:1,explanation:"Customer Lockbox est déclenché quand le support Microsoft doit accéder aux données client pour résoudre un incident. Le client reçoit une demande (durée limitée) qu'il peut approuver ou rejeter. Si rejeté ou expiré sans réponse, Microsoft ne peut accéder aux données. Journalise toutes les décisions."},
{id:278,category:"Infrastructure Sécurisée",question:"Scénario: Un audit de sécurité identifie des VMs Azure avec des disques non chiffrés. Quelle est la remédiation recommandée et la politique pour prévenir ?",options:["Chiffrer manuellement les disques sélectionnés","Azure Disk Encryption (ADE) ou Server-Side Encryption with CMK pour les VMs existantes. Azure Policy 'Disk encryption should be applied on virtual machines' avec effet Audit/DeployIfNotExists pour les nouvelles VMs","Ignorer si les données ne sont pas sensibles","Uniquement chiffrement au niveau de l'application"],answer:1,explanation:"Remédiation: Azure Disk Encryption (ADE) utilise BitLocker (Windows) ou dm-crypt (Linux) avec clés dans Key Vault. Pour les nouveaux déploiements: Azure Policy enforce le chiffrement. SSE with CMK chiffre au niveau plateforme mais ADE offre un contrôle plus fort (clé dans votre Key Vault)."},
{id:279,category:"Conformité",question:"Scénario: Une entreprise française doit se conformer au RGPD pour ses services cloud Azure. Quelles mesures techniques ?",options:["Uniquement un DPA signé avec Microsoft","1) Data residency: régions France Central/France South pour données UE, 2) Purview Information Protection (classification + protection PII), 3) DLP (bloquer transferts hors UE), 4) Chiffrement CMK (contrôle des clés), 5) Audit logs pour le droit d'accès/effacement, 6) Customer Lockbox","Uniquement les mentions légales du site web","RGPD s'applique uniquement aux données RH"],answer:1,explanation:"Conformité RGPD Azure technique: régions EU (souveraineté données), classification des données personnelles (Purview), DLP pour éviter les transferts non autorisés, CMK pour le contrôle des clés (droit à l'effacement via destruction de clé), logs d'audit pour prouver les droits d'accès, Data Protection Agreement avec Microsoft."},
{id:280,category:"Conformité",question:"Qu'est-ce que le 'NIS2 Directive' et ses implications pour la sécurité Azure ?",options:["Une directive sur la performance réseau","NIS2 (Network Information Security v2) directive UE exige pour les secteurs critiques: mesures de sécurité appropriées (risk management), notification d'incidents graves (sous 24h pour alerte initiale, 72h rapport intermédiaire, 30 jours rapport final), et responsabilité des dirigeants","Une réglementation sur les cookies","Une directive sur la neutralité du réseau"],answer:1,explanation:"NIS2 impose: risk management (mesures techniques: MFA, chiffrement, IR plans, supply chain security), notification incidents (24h early warning, 72h intermediate report, 1 mois final report), supervision (AMF-like pour les entités), et sanctions (10M€ ou 2% CA mondial). Applicables à 18 secteurs critiques UE."},
{id:281,category:"Conformité",question:"Comment Microsoft Purview Compliance Manager aide-t-il concrètement à se conformer à ISO 27001 ?",options:["Il obtient la certification automatiquement","Il mappe les contrôles ISO 27001 aux configurations Azure/M365, donne un score de conformité, identifie les gaps, propose des actions d'amélioration avec des guides de mise en oeuvre, et permet d'importer des preuves de contrôles tiers","Il remplace l'audit ISO 27001 externe","Il génère automatiquement la documentation ISO"],answer:1,explanation:"Compliance Manager pour ISO 27001: mapping automatique des actions Microsoft (contrôles gérés) et actions client (contrôles à implémenter). Chaque contrôle ISO 27001 a des 'Improvement Actions' spécifiques Azure/M365. Score de conformité tracé dans le temps. Documentation exportable pour les auditeurs."},
{id:282,category:"Conformité",question:"Scénario: Une banque doit se conformer à PCI DSS v4.0 pour les données de cartes de paiement dans Azure. Quels contrôles clés ?",options:["Uniquement le chiffrement des données de carte","Segmentation réseau stricte (CDE isolé), chiffrement TLS 1.2+ en transit + AES-256 au repos, pas de stockage de CVV/full PAN (tokenisation), contrôles d'accès MFA, audit logs, tests de pénétration annuels, Defender for Cloud PCI DSS assessment","HTTPS sur le site web uniquement","Uniquement un certificat SSL"],answer:1,explanation:"PCI DSS v4.0 dans Azure: réseau segmenté (CDE dans subnet isolé avec NSG strict), chiffrement fort (TLS 1.2+ en transit, AES-256 au repos), tokenisation des PANs (pas de stockage), MFA pour tout accès CDE, audit logs 12 mois (Log Analytics), pen testing annuel, Defender for Cloud avec policy PCI DSS."},
{id:283,category:"Conformité",question:"Qu'est-ce que le 'Service Health' dans Azure et son importance pour la conformité ?",options:["Un outil de monitoring de performance","Un service qui informe des incidents Azure, des maintenances planifiées et des problèmes de service affectant votre abonnement, avec des alertes configurables et un historique de SLA - utilisé pour la preuve de conformité et les RCA","Un outil de facturation","Un dashboard de sécurité"],answer:1,explanation:"Azure Service Health (servicehealth.azure.com) fournit: incidents en cours, maintenances planifiées, alertes de santé sur vos régions/services. Pour la conformité: les rapports Service Health servent de preuve pour les audits, les SLA Microsoft fournissent les métriques de disponibilité, et l'historique démontre la résilience."},
{id:284,category:"Conformité",question:"Qu'est-ce que le 'SOC 2 Type II' et comment Azure supporte-t-il cette certification pour les clients ?",options:["Une certification Microsoft uniquement","SOC 2 Type II atteste que Microsoft a maintenu des contrôles de sécurité sur une période (généralement 12 mois). Les clients utilisent les rapports SOC 2 de Microsoft (disponibles sur Service Trust Portal) comme héritage de contrôles pour leur propre certification SOC 2","Une certification client automatique","Un audit de performance des VMs"],answer:1,explanation:"SOC 2 est une attestation sur les contrôles Trust Service Criteria (Security, Availability, Confidentiality, Processing Integrity, Privacy). Microsoft Azure a les certifications SOC 1/2/3. Les clients peuvent hériter des contrôles Microsoft pour leur propre audit SOC 2, en documentant le modèle de responsabilité partagée."},
{id:285,category:"Conformité",question:"Scénario: Un CISO doit présenter la conformité cyber à son board. Quels outils Microsoft pour préparer ce reporting ?",options:["Rapport manuel PowerPoint","1) Microsoft Secure Score (vue executive), 2) Defender for Cloud Regulatory Compliance Dashboard (conformité vs frameworks), 3) Purview Compliance Manager (score et actions par framework), 4) Sentinel Workbooks (tendances incidents), 5) Power BI sur données Log Analytics","Uniquement les alertes email","Rapport annuel uniquement"],answer:1,explanation:"Reporting board: Microsoft Secure Score (évolution de la posture dans le temps), Compliance Manager (score par framework réglementaire, actions en cours), Defender for Cloud Compliance Dashboard (conformité visuelle), Sentinel Workbooks (incidents, MTTD/MTTR), et Power BI pour des dashboards exécutifs personnalisés."},
{id:286,category:"Scénarios Architecturaux",question:"Scénario: Une startup fintech veut construire une plateforme de paiement sur Azure conforme PCI DSS. Proposez une architecture sécurisée.",options:["Une VM avec base de données","Frontend: Azure Front Door+WAF → App Service (identité managed) → Azure API Management (OAuth, rate limit) → Azure Functions (logic) → Azure SQL Private Endpoint (ADE+CMK+Always Encrypted PANs) → Key Vault. Hub-spoke réseau, Defender for Cloud PCI, Sentinel.","Une architecture basique avec TLS","Uniquement Azure Kubernetes Service"],answer:1,explanation:"Architecture PCI fintech: Frontend sécurisé (Front Door WAF, AFD DDoS), APIM pour les APIs (OAuth, rate limiting), App Service + Managed Identity (pas de credentials), Azure SQL avec Private Endpoint + Always Encrypted (PANs) + CMK, Key Vault pour les clés, NSG stricts, Defender for Cloud (PCI assessment), Sentinel pour le monitoring."},
{id:287,category:"Scénarios Architecturaux",question:"Scénario: Un hôpital veut migrer vers Azure en respectant HDS (Hébergeur de Données de Santé en France). Quelle est la contrainte principale ?",options:["Uniquement le chiffrement des données","HDS impose que les données de santé soient hébergées dans des datacenters certifiés HDS. Azure France Central et France South sont certifiés HDS. Requis: data residency en France, chiffrement CMK, audit logs, DPA Microsoft (sous-traitant HDS), Business Associate Agreement (BAA)","Aucune contrainte particulière avec Azure","HDS ne s'applique pas au cloud public"],answer:1,explanation:"HDS (Hébergeur de Données de Santé): les données de santé doivent être dans des régions certifiées (France Central/South pour Microsoft en France). Requis: certification HDS de l'hébergeur (Microsoft Azure), contrat sous-traitance DPA spécifique, chiffrement fort, audits annuels, et désignation d'un DPO."},
{id:288,category:"Scénarios Architecturaux",question:"Scénario: Une entreprise industrielle connecte des équipements OT (machines-outils) à Azure IoT. Quels risques et protections ?",options:["Aucun risque spécifique aux OT","Risques: systèmes OT fragiles (pas de patches facilement), protocoles legacy non sécurisés (Modbus, PROFINET), conséquences physiques réelles. Protections: Microsoft Defender for IoT (surveillance passive sans impact), DMZ stricte OT/IT, Azure IoT Hub (auth X.509 par device), mises à jour OTA limitées","Uniquement un VPN","Identiques aux environnements IT"],answer:1,explanation:"Sécurité OT/IoT: Defender for IoT (IDS passif, pas d'agent sur les PLCs), segmentation stricte avec DMZ entre OT et IT/cloud, Azure IoT Hub avec authentification X.509 par appareil, Device Provisioning Service pour l'enrollment sécurisé, monitoring des protocoles industriels, et politique stricte de mise à jour (validation en lab avant déploiement)."},
{id:289,category:"Scénarios Architecturaux",question:"Scénario: Un e-commerçant subit des attaques DDoS L7 sophistiquées ciblant son API de checkout pendant les soldes. Solution Azure ?",options:["Ignorer pendant les soldes","Azure Front Door Premium avec WAF en mode Prevention (OWASP rules + custom rules), Bot Management (bloquer bots malveillants), Origin Shield (protège le backend), rate limiting par IP/session, Azure DDoS Network Protection, et alertes sur les métriques d'attaque en temps réel","Augmenter la capacité serveur uniquement","VPN pour les utilisateurs légitimes"],answer:1,explanation:"Protection DDoS L7 e-commerce: Front Door + WAF (OWASP, custom rules pour l'API checkout), Bot Protection (différencier bots légitimes/scrappeurs/attaque), rate limiting, géo-restriction, DDoS Network Protection (L3/L4), auto-scaling du backend pour absorber, alertes en temps réel pour réponse SOC."},
{id:290,category:"Scénarios Architecturaux",question:"Scénario: Une organisation gouvernementale exige que ses données Azure ne puissent JAMAIS être vues par Microsoft. Quelles solutions ?",options:["Impossible dans le cloud public","1) Customer Lockbox (approbation requise pour accès support), 2) Customer-Managed Keys (CMK) via Azure Key Vault BYOK, 3) Double Key Encryption (DKE) Purview pour les données les plus sensibles, 4) Confidential Computing (données chiffrées en mémoire), 5) Azure Government (régions dédiées avec accès restreint personnel Microsoft US)","Uniquement le chiffrement SSL","Cloud souverain on-premises uniquement"],answer:1,explanation:"Contrôle maximal sur l'accès Microsoft: Customer Lockbox (aucun accès support sans approbation), CMK BYOK (clés de chiffrement chez le client), DKE pour les documents ultra-sensibles (Microsoft ne peut pas déchiffrer), Confidential Computing (mémoire chiffrée pendant exécution), Azure Government (personnel habilité US uniquement)."},
{id:291,category:"Scénarios Architecturaux",question:"Scénario: Une entreprise multi-nationale a des filiales dans 15 pays avec des exigences de localisation des données différentes. Quelle architecture Azure ?",options:["Tout centraliser dans une région","Architecture multi-région avec politiques de résidence des données: ressources et données dans les régions locales (EU→France, US→East US, APAC→Southeast Asia), Azure Policy pour enforcer la résidence, Purview pour la classification et gouvernance cross-régions, Sentinel multi-workspace","Délocaliser toutes les filiales","Refuser le cloud pour les données locales"],answer:1,explanation:"Architecture data sovereignty multi-nationale: régions par pays (selon réglementations locales), Management Groups par région avec policies de résidence (interdire création ressources dans autres régions), Purview pour classification globale des données, Sentinel avec workspaces régionaux + Sentinel central pour corrélation globale."},
{id:292,category:"Scénarios Architecturaux",question:"Scénario: Une entreprise de conseil détecte une APT (Advanced Persistent Threat) dans son réseau. Comment Microsoft Defender XDR aide-t-il ?",options:["XDR ne gère pas les APTs","Defender XDR corrèle: MDI (mouvements latéraux AD), MDE (activités endpoints, persistance), MDO365 (phishing initial), MDCA (exfiltration apps SaaS) → incident unifiée avec timeline complète. Threat Experts on Demand pour analyse d'APT. Advanced Hunting cross-tables pour l'investigation. Containment automatisé","Il faut des outils tiers pour les APTs","Uniquement via Sentinel"],answer:1,explanation:"APT via XDR: l'incident unifié corrèle les alertes de tous les vecteurs (email phishing→MDE endpoint compromise→MDI lateral movement AD→MDCA exfil). Advanced Hunting cross-tables pour reconstituer la kill chain complète. Microsoft Threat Experts (option) pour consultation d'experts sur l'APT identifiée. Automated Investigation pour la remédiation."},
{id:293,category:"Scénarios Architecturaux",question:"Scénario: Une entreprise SaaS B2B veut permettre à ses clients enterprise de SSO avec leurs propres Azure AD/Okta. Quelle architecture ?",options:["Créer des comptes pour chaque client","Azure AD B2B External Identities avec federation SAML/OIDC vers les IdP clients: l'app est enregistrée dans le tenant SaaS, les clients configurent leur IdP pour faire confiance à l'app. Les utilisateurs clients SSO depuis leur IdP. Conditional Access pour les politiques de l'app SaaS","Un tenant AAD par client","Credentials partagés par entreprise"],answer:1,explanation:"Architecture multi-tenant SSO: App AAD dans le tenant SaaS (multi-tenant app registration), les clients ajoutent l'app comme Enterprise Application dans leur tenant et configurent le SSO (SAML ou OIDC). Les utilisateurs clients SSO depuis leur AAD. Le SaaS peut avoir des CA policies sur les accès des clients."},
{id:294,category:"Scénarios Architecturaux",question:"Scénario: Après un audit, votre Secure Score Azure est de 35%. Quelle roadmap de 90 jours proposeriez-vous ?",options:["Faire tout en même temps","J1-30: Quick wins (activer MFA, JIT VMs, éliminer accès publics, activer chiffrement), J30-60: Contrôles identity (PIM, access reviews, Conditional Access), J60-90: Detection (Sentinel, Defender for Cloud plans, règles analytiques) - prioriser par impact score et risque métier","Attendre le prochain audit","Externaliser la sécurité"],answer:1,explanation:"Roadmap 90 jours: Phase 1 (J1-30) quick wins critiques (MFA: +10-15pts, JIT VMs: +5pts, supprimer accès publics: +5pts, chiffrement disques: +5pts), Phase 2 (J30-60) gouvernance identité (PIM, CA policies, access reviews: +10pts), Phase 3 (J60-90) detection et réponse (Sentinel, Defender plans, workbooks, playbooks)."},
{id:295,category:"Scénarios Architecturaux",question:"Scénario: Votre entreprise veut implémenter un SOC (Security Operations Center) managé avec Microsoft Sentinel. Quels rôles et responsabilités ?",options:["Une seule personne gère tout","Tiers 1 (triage: Sentinel Reader, investigation basique, qualification incidents), Tiers 2 (investigation: Sentinel Responder, forensics, hunting), Tiers 3 (expert: Sentinel Contributor, développe règles/playbooks, threat intel). MSSP possible avec Azure Lighthouse","Uniquement des outils automatisés","Pas besoin de SOC avec Microsoft Sentinel"],answer:1,explanation:"Structure SOC Microsoft Sentinel: T1 Analyst (Sentinel Reader, triage des alertes, première qualification), T2 Analyst (Sentinel Responder, investigation approfondie, confinement), T3 Expert/Engineering (Sentinel Contributor, développement de détections, threat hunting, forensics), T4/Threat Intelligence team. MSSP via Azure Lighthouse pour les petites organisations."},
{id:296,category:"Scénarios Architecturaux",question:"Scénario: Une entreprise est victime d'une supply chain attack via un fournisseur logiciel. Comment les contrôles Zero Trust auraient-ils atténué l'impact ?",options:["Zero Trust n'aurait pas aidé","ZT atténuations: 1) Application allowlisting (ASR/Defender) bloque les payloads inconnus, 2) Moindre privilège (RBAC) limite ce que le logiciel compromis peut accéder, 3) Micro-segmentation limite la propagation, 4) UEBA/MDI détecte les comportements anormaux du logiciel, 5) Conditional Access réévalue les sessions","Bloquer tous les fournisseurs logiciel","Uniquement des backups"],answer:1,explanation:"Zero Trust contre supply chain attacks (ex: SolarWinds): allowlisting des applications (processus légitimes mais comportement anormal détecté), moindre privilège (le logiciel compromis n'a accès qu'à ce qui est nécessaire), UEBA détecte les comportements anormaux (accès inhabituels depuis ce software), isolation réseau limite l'exfiltration."},
{id:297,category:"Scénarios Architecturaux",question:"Scénario: Un directeur technique vous demande si vous devez utiliser Azure ou rester on-premises pour des raisons de sécurité. Quelle argumentation ?",options:["L'on-premises est toujours plus sécurisé","Cloud Azure peut être plus sécurisé: Microsoft investit +4B$/an en sécurité, SOC 24/7, certifications multiples, tooling avancé (Sentinel, MDE, etc.), mises à jour automatiques infrastructure. Mais la sécurité cloud nécessite expertise (misconfiguration est le risque #1). Modèle de responsabilité partagée clair","Le cloud est toujours plus sécurisé","La décision n'a pas d'impact sécurité"],answer:1,explanation:"Azure Security advantages: investissement Microsoft en sécurité massive, certifications nombreuses (FedRAMP, ISO 27001, PCI, HIPAA), intelligence des menaces globale, outils sécurité avancés natifs. Risques: misconfiguration client (risque #1 cloud), compétences requises, visibility parfois limitée. La maturité de l'équipe sécurité est le facteur déterminant."},
{id:298,category:"Scénarios Architecturaux",question:"Scénario: Une entreprise veut faire un Red Team exercise sur son environnement Azure. Quelles règles d'engagement et outils ?",options:["Pas besoin de règles d'engagement","Règles d'engagement: scope précis (production exclue ou incluse?), autorisation écrite (Azure Penetration Testing Rules of Engagement Microsoft), notification préalable Microsoft, exclusion des attaques DDoS massives. Outils: Attack Simulation (M365), Defender XDR attack scenarios, Sentinel analytics testing","Pen test sans restriction","Uniquement des scans automatiques"],answer:1,explanation:"Red Team Azure: Respecter les Règles d'Engagement Microsoft (certaines actions interdites sans notification: DDoS, spam). Notification si tests vers Microsoft cloud IPs. Scope documenté et approuvé. Utiliser Attack Simulation Training (phishing), Atomic Red Team (T1-T4 tactics), et mesurer MTTD/MTTR via Sentinel pour évaluer les défenses."},
{id:299,category:"Scénarios Architecturaux",question:"Scénario: Vous devez choisir entre Azure Firewall Standard et Premium pour une banque. Quels facteurs décisifs ?",options:["Le coût uniquement","Premium est requis pour la banque: TLS Inspection (inspecter HTTPS sortant vers Internet), IDPS (détecter/bloquer exploits connus), URL Filtering avancé avec catégories, Web Categories (bloquer catégories non business). Standard suffit pour L3/L4 filtering basique","Les deux sont identiques pour une banque","Standard Premium n'existe pas"],answer:1,explanation:"Azure Firewall Premium pour banque: TLS Inspection (inspecter le trafic HTTPS chiffré sortant - C2 peut se cacher dans HTTPS), IDPS avec signatures Cybersecurity (bloquer exploits CVE connus), URL Filtering (contrôler accès web), Web Categories (compliance, bloquer gaming/social). ROI élevé pour les secteurs réglementés."},
{id:300,category:"Scénarios Architecturaux",question:"Scénario: Votre SIEM Sentinel génère trop d'alertes (alert fatigue). Comment optimiser la stratégie de détection ?",options:["Désactiver la moitié des règles","1) Mesurer le ratio faux positifs/vrais positifs, 2) Affiner les règles (exclusions, seuils), 3) Utiliser UEBA pour scorer le risque des entités (moins d'alertes à faible risque), 4) Regrouper les alertes (alert grouping), 5) Prioriser les incidents par score de risque, 6) Automatiser le triage T1 via playbooks","Augmenter le nombre d'analystes uniquement","Ignorer les alertes de faible sévérité"],answer:1,explanation:"Réduire l'alert fatigue: tuning des règles (exclusions watchlist, seuils), UEBA (enrichir les incidents avec score de risque pour prioriser), alert grouping (incidents avec moins d'alertes), automation rules (fermer automatiquement les FP connus), playbooks de triage automatique (enrichissement + qualification), et métriques de qualité des règles."},
{id:301,cat:"Zero Trust",q:"Qu'est-ce que 'Continuous Access Evaluation (CAE)' dans Azure AD ?",o:["Une vérification d'accès ponctuelle","Un mécanisme qui permet aux resource providers (Exchange, SharePoint, Teams) de révoquer les tokens en quasi-temps-réel lors d'événements critiques (désactivation compte, changement IP, révocation session) sans attendre l'expiration normale du token (1h). Réduit la fenêtre d'attaque post-compromise","Un outil de review des accès","Une politique de re-authentification périodique"],a:1,e:"CAE: quand un compte est désactivé dans Azure AD, Exchange Online est notifié en <2 minutes et invalide les sessions actives, sans attendre l'expiration du token. De même pour les changements de politique CA ou de localisation. Azure AD + resource provider partagent les événements critiques pour une réponse quasi-temps-réel."},
{id:302,cat:"Zero Trust",q:"Comment implémenter Zero Trust pour les accès aux applications SaaS tierces ?",o:["VPN vers les apps SaaS","Microsoft Defender for Cloud Apps (MCAS) comme CASB: proxy entre les utilisateurs et les apps SaaS (Salesforce, Box, ServiceNow). Contrôles: session policies (bloquer les téléchargements depuis appareils non conformes), access policies (bloquer l'accès depuis des emplacements risqués), découverte des apps Shadow IT, DLP sur les données SaaS","Aucune protection possible pour le SaaS","Bloquer les accès SaaS"],a:1,e:"MCAS/Defender for Cloud Apps pour Zero Trust SaaS: App Conditional Access Control (proxy SAML/OIDC), session policies (real-time inspection: bloquer upload de malwares, téléchargement sur appareils non gérés), accès conditionnel (CA + MCAS Session Control = vérification continue même pendant la session), anomaly detection (comportement utilisateur anormal dans Salesforce)."},
{id:303,cat:"Architecture de Sécurité",q:"Qu'est-ce que 'SASE (Secure Access Service Edge)' et ses composants ?",o:["Un framework de sécurité réseau local","Architecture convergente qui combine les fonctions SD-WAN (réseau) avec les fonctions de sécurité cloud (SSE: SWG, CASB, ZTNA, FWaaS) en un service unifié livré depuis le cloud. Élimine la backhauling vers le datacenter, réduit la latence, et s'adapte au travail hybride","Un nouveau protocole réseau","Un type de firewall cloud"],a:1,e:"SASE = SD-WAN + SSE (Security Service Edge): SWG (Secure Web Gateway: filtrage web), CASB (Cloud Access Security Broker), ZTNA (remplacement VPN), FWaaS (Firewall as a Service). Microsoft SSE: Entra Private Access (ZTNA) + Entra Internet Access (SWG). Gartner prédit que 60% des entreprises auront une stratégie SASE d'ici 2025."},
{id:304,cat:"Architecture de Sécurité",q:"Comment concevoir une architecture de sécurité résistante aux attaques APT (Advanced Persistent Threat) ?",o:["Un firewall très puissant suffit","Architecture 'Assume Breach': Zero Trust (vérifier tout, ne pas faire confiance au réseau), segmentation granulaire, EDR/XDR (détection comportementale), threat hunting actif, honeypots/deception technology, PAM, JIT access, chiffrement end-to-end, et SIEM/SOAR pour une détection rapide. APT = défense en profondeur ET détection précoce","Uniquement des outils de prévention","VPN + Antivirus suffit pour les APT"],a:1,e:"APT defense: les APT réussissent toujours à entrer (spear phishing, 0-day). La stratégie doit minimiser le dwell time (temps entre compromission et détection: industry average 197 jours). Segmentation (limiter le mouvement latéral), PAM (bloquer l'escalade de privilèges), UEBA (détecter les comportements anormaux), threat hunting (chercher proactivement), et SOAR (réponse rapide)."},
{id:305,cat:"Architecture de Sécurité",q:"Qu'est-ce que le 'Cloud Native Application Protection Platform (CNAPP)' ?",o:["Un antivirus cloud","Convergence de CSPM (posture) + CWPP (workload protection) + CIEM (entitlements) + ASPM (application security) en une plateforme unifiée pour la sécurité des applications cloud-natives (containers, serverless, IaC). MDC avec Defender CSPM + Defender for Containers = CNAPP Microsoft","Un outil de déploiement cloud","Un scanner de vulnérabilités cloud"],a:1,e:"CNAPP unifie: CSPM (configurations cloud), CWPP (protection runtime workloads), CIEM (permissions excessives dans le cloud), IaC Security (Terraform/Bicep scan), container security (images, runtime), et API security. Vue end-to-end de la sécurité des apps cloud depuis le code jusqu'à la production. Gartner coined le terme en 2021."},
{id:306,cat:"Identité et Accès",q:"Scénario: Une entreprise doit migrer 10 000 utilisateurs d'Active Directory on-premises vers Azure AD. Quelle stratégie de coexistence ?",o:["Migration directe en une nuit","Azure AD Connect avec synchronisation hybride: tous les objets AD sont synchronisés vers Azure AD (hash password sync ou pass-through auth), permettant une coexistence. Migration progressive: les apps sont migrées une par une vers Azure AD auth. Pendant la transition: l'auth passe par AD (PTA ou ADFS) et les nouvelles apps utilisent Azure AD directement","Créer des comptes manuellement","Désactiver l'AD on-premises immédiatement"],a:1,e:"Stratégie hybride AD→Azure AD: Phase 1 - Azure AD Connect (sync, PTA ou ADFS), Phase 2 - MFA registration pour tous (SSPR + MFA app), Phase 3 - Conditional Access policies (remplace les GPO de sécurité), Phase 4 - Migrer les apps vers Azure AD auth (SAML/OIDC), Phase 5 - Désactiver les protocoles legacy, Phase 6 - Évaluer le passage à Azure AD-only (Entra-joined devices)."},
{id:307,cat:"Identité et Accès",q:"Qu'est-ce que 'Windows Hello for Business' et ses avantages de sécurité vs MFA par SMS ?",o:["Un outil biométrique Windows basique","WHfB remplace les mots de passe par une authentification forte basée sur le TPM: biométrie (visage/empreinte) ou PIN qui débloque une clé privée stockée dans le TPM (jamais exportable). Résistant au phishing (la clé est liée à l'appareil et au domaine), pas de MFA par réseau (pas de SMS interceptable), et rapide","Un PIN Windows standard","Une alternative au mot de passe moins sécurisée"],a:1,e:"WHfB vs SMS MFA: SMS = interceptable (SS7 attack, SIM swap). WHfB: la clé privée reste dans le TPM de l'appareil (jamais sur le réseau), le geste (biométrie ou PIN) débloque localement la clé qui signe un challenge Azure AD. Résistant aux attaques phishing car la clé est liée au domaine/device (pas de relaying possible)."},
{id:308,cat:"Identité et Accès",q:"Comment détecter et prévenir les attaques 'Password Spray' dans Azure AD ?",o:["Les sprays de mots de passe sont impossibles à détecter","Azure AD Smart Lockout bloque automatiquement les attaques de spray (lockout intelligent qui distingue les IP légitimes des attaquants). Identity Protection 'Sign-in Risk: Password Spray' détecte les patterns de spray. Sentinel: analyser le ratio de tentatives/succès par IP. Prévention: MFA, bloquer l'auth legacy (qui ne supporte pas MFA)","Bloquer tous les accès après 3 tentatives","Uniquement monitorer les logs"],a:1,e:"Password spray (vs brute force): essayer 1 mot de passe commun contre N comptes (évite le lockout compte). Azure AD Smart Lockout: utilise ML pour distinguer les vrais utilisateurs (lockout partiel sur les IP suspectes sans impacter les IP légitimes). Identity Protection détecte le pattern statistique. KQL: SigninLogs | where ResultType != 0 | summarize count() by IPAddress | where count > 50."},
{id:309,cat:"Réseau Sécurisé",q:"Qu'est-ce que 'Azure Virtual WAN (vWAN)' et son apport sécurité ?",o:["Un VPN site-à-site basique","Un réseau WAN as-a-Service qui connecte les branches, datacenters, et VNets via le backbone Microsoft. vWAN Secured Hub: intègre Azure Firewall et/ou partenaires tiers (Check Point, Fortinet) dans le hub pour inspecter tout le trafic nord-sud et est-ouest. Simplifie l'architecture hub-and-spoke à grande échelle","Un Load Balancer Azure","Un service de DNS Azure"],a:1,e:"vWAN secured hub: remplace le hub VNet classique + Azure Firewall + VPN Gateway séparés par un service managé unifié. Azure Firewall Manager gère les politiques Firewall sur tous les secured hubs. Intégration native avec Entra Internet Access (SWG) et Entra Private Access (ZTNA) pour une architecture SASE complète sur backbone Microsoft."},
{id:310,cat:"Réseau Sécurisé",q:"Scénario: Votre entreprise a des bureaux dans 10 pays. Tous doivent accéder aux ressources Azure centrales de façon sécurisée. Architecture recommandée ?",o:["VPN site-à-site vers une région Azure unique","Azure Virtual WAN avec hubs régionaux dans chaque zone géographique (Americas/EMEA/APAC), connexions ExpressRoute ou VPN depuis chaque bureau vers le hub régional, Azure Firewall dans chaque hub secured, et Entra Private Access pour les accès des employés remote. Politiques de sécurité centralisées via Azure Firewall Manager","Un VPN par bureau uniquement","ExpressRoute unique pour tous les bureaux"],a:1,e:"Architecture globale: vWAN avec 3 hubs régionaux (latence optimale), ExpressRoute pour les bureaux principaux (haute bande passante, SLA), VPN Site-to-Site pour les petits bureaux, Azure Firewall dans les secured hubs (inspection), Azure Firewall Manager (politiques centralisées), et Microsoft 365 Direct Peering pour les apps M365 (bypass hub pour les apps cloud Microsoft = performance)."},
{id:311,cat:"Données et Applications",q:"Qu'est-ce que la 'tokenization' des données de carte bancaire et comment diffère-t-elle du chiffrement ?",o:["La tokenization est du chiffrement","Tokenization remplace une valeur sensible (PAN: Primary Account Number) par un token non-sensible sans valeur mathématique (ex: 4111 → TK7829AB3). Contrairement au chiffrement, il n'y a pas de relation algorithmique entre le token et la valeur originale: seul le vault de tokenization peut faire la correspondance. Réduit drastiquement le scope PCI DSS","Un type de masquage de données","Un hachage des données"],a:1,e:"Tokenization PCI DSS: si votre système stocke uniquement des tokens (pas les PAN réels), votre scope PCI se réduit au vault de tokenization (un seul composant) plutôt que tous les systèmes qui touchent les données de carte. Le token peut être utilisé pour les processus métier (refund, récurrence) sans exposer le PAN réel. Providers: Braintree, Stripe, Azure Payment HSM."},
{id:312,cat:"Données et Applications",q:"Qu'est-ce que 'Azure Confidential Computing' et son cas d'usage ?",o:["Un datacenter sécurisé Azure","Confidential Computing protège les données 'in-use' (en cours de traitement en mémoire) via des Trusted Execution Environments (TEE) matériels (Intel SGX, AMD SEV). Même les opérateurs cloud ne peuvent pas accéder aux données dans l'enclave. Cas: multi-party computation (partage de données sensibles entre concurrents sans exposition mutuelle), AI sur données médicales","Un outil de chiffrement de données","Un service de backup sécurisé Azure"],a:1,e:"Confidential Computing (Azure): VMs Confidential (AMD SEV-SNP), AKS Confidential Containers, Azure Attestation (prouver qu'un TEE est authentique). Use cases: healthcare (analyse de données patients par des chercheurs sans voir les données brutes), finance (scoring de crédit entre banques sans partager les données clients), AI confidential (entraîner des modèles sur des données sensibles)."},
{id:313,cat:"Conformité",q:"Comment mapper les contrôles de sécurité Azure aux exigences RGPD via Purview Compliance Manager ?",o:["Le RGPD ne s'applique pas au cloud","Compliance Manager dans Purview: assessment RGPD pré-construit avec les 99+ contrôles RGPD mappés aux actions Microsoft (ce que Microsoft fait) et aux actions client (ce que vous devez configurer). Score de conformité, liste des actions prioritaires avec guidance technique, et preuve documentaire exportable pour les DPO/auditeurs","RGPD et cloud sont incompatibles","Uniquement via des audits externes"],a:1,e:"Compliance Manager: assess GDPR template avec ~99 contrôles, divisés en Microsoft actions (déjà faits: datacenter compliance, service agreements) et Customer actions (à configurer: sensitivity labels, DLP, access controls, encryption). Score de conformité RGPD visible, actions priorisées par impact sur le score, et documentation exportable pour le rapport annuel DPO."},
{id:314,cat:"Conformité",q:"Scénario: Une entreprise française veut certifier sa conformité NIS2. Quels contrôles Azure prioritaires ?",o:["NIS2 ne concerne pas les entreprises françaises","NIS2 (Directive UE 2022/2555, transposée en France): mesures de cybersécurité obligatoires pour les entités essentielles/importantes. Contrôles Azure: gouvernance des risques (MDC Secure Score), gestion des incidents (Sentinel + IR Plan), continuité (HA/DR, backup), supply chain security (Defender for DevOps), chiffrement (CMK), et formation. ANSSI publie des guides de conformité NIS2","NIS2 est uniquement pour les opérateurs télécoms","Uniquement une certification ISO 27001"],a:1,e:"NIS2 vs NIS: périmètre élargi (16 secteurs, PME >50 personnes incluses), obligations renforcées (reporting incidents dans 24h, 72h, et rapport final 1 mois), sanctions ($10M ou 2% CA mondial). Azure pour NIS2: MDC pour la gestion des risques, Sentinel pour la détection/réponse, Defender for Cloud pour la supply chain, et Purview pour la protection des données."},
{id:315,cat:"Conformité",q:"Qu'est-ce que 'Microsoft Priva' et comment aide-t-il avec les obligations RGPD ?",o:["Un outil de sécurité Microsoft","Priva gère la conformité Privacy/RGPD: Privacy Risk Management (identifier les accumulations de données personnelles, les données surexposées, les transferts hors EU), Subject Rights Requests (automatiser les demandes DSAR: accès, effacement, portabilité dans les 30 jours RGPD), et Data Residency insights","Un outil de classification de données","Un remplaçant du DPO"],a:1,e:"Priva pour RGPD: SRR automatise les DSARs (délai légal 30 jours: recherche automatique dans M365 + workflow d'approbation + rapport pour le demandeur), Privacy Risk Management identifie les données personnelles surexposées (partagées avec trop de personnes) et les transferts internationaux. Tableau de bord pour le DPO avec métriques de conformité."},
{id:316,cat:"Infrastructure Sécurisée",q:"Comment sécuriser les runbooks Azure Automation contre les injections de code ?",o:["Les runbooks sont toujours sécurisés","1) Utiliser des Managed Identities (pas de credentials hardcodés), 2) Restreindre les permissions de la Managed Identity (RBAC minimal), 3) Utiliser des modules PowerShell signés uniquement, 4) Activer l'audit des runbooks (tous les jobs loggés), 5) Private Endpoints pour Automation Account, 6) Review des runbooks via GitOps (code review avant déploiement)","Les runbooks ne peuvent pas être compromis","Mot de passe sur l'Automation Account"],a:1,e:"Sécurité Automation Account: Managed Identity avec RBAC minimal (ex: Contributor uniquement sur les RGs ciblés, pas Owner sur tout le sub), Private Endpoint (l'Automation Account accessible uniquement depuis le VNet interne), Runbooks dans Git avec branch protection et revue de code, et logs Automation → Sentinel pour détecter les exécutions anormales."},
{id:317,cat:"Infrastructure Sécurisée",q:"Scénario: Vos VMs Azure doivent être patchées automatiquement. Comment gérer ça de façon sécurisée ?",o:["Patcher manuellement mensuellement","Azure Automation Update Management ou Azure Update Manager: 1) Évaluation hebdomadaire des patches manquants, 2) Déploiement automatique des patches critiques dans une maintenance window (ex: dimanche 2h), 3) Groupes de déploiement progressif (test → staging → production avec délai), 4) Rollback automatique si échec, 5) Rapport de conformité","Désactiver les mises à jour automatiques","Patcher uniquement lors des incidents"],a:1,e:"Azure Update Manager (successeur de Automation Update Management): évaluation complète de la compliance des patches, scheduled patching avec maintenance windows, deployment rings (piloter sur un sous-ensemble avant le déploiement mass), intégration avec Defender for Cloud (recommandations vulnérabilités), et reporting de compliance pour les auditeurs."},
{id:318,cat:"Infrastructure Sécurisée",q:"Qu'est-ce que 'Azure Policy Guest Configuration' et son utilisation pour le compliance des VMs ?",o:["Un outil de gestion des GPO","Un agent Azure Policy qui évalue la configuration interne des VMs (pas seulement les propriétés ARM): paramètres de sécurité Windows/Linux, logiciels installés, services actifs. Permet d'auditer et d'imposer des configurations CIS, STIG, ou personnalisées sur toutes les VMs Azure et Arc (serveurs hybrides)","Un script PowerShell de configuration","Un service de monitoring des performances"],a:1,e:"Guest Configuration évalue: Windows Security Policy (Account Lockout, Password Policy, Audit Policy), installed software (vérifier qu'un AV est présent), services (Windows Update activé?), fichiers de config (SSH sshd_config: PermitRootLogin = no), et custom content (vos propres requirements). Résultats dans Defender for Cloud comme recommandations avec remediation."},
{id:319,cat:"Scénarios Architecturaux",q:"Scénario: Une banque doit architecturer une solution de trading en temps réel sur Azure en respectant les exigences de souveraineté des données (données en France uniquement). Architecture ?",o:["Héberger en dehors d'Azure","Azure France Central/France South uniquement: VNets dans ces régions, Azure Policy 'Allowed locations: France Central, France South' (Deny autres régions), Private Endpoints pour tous les services PaaS (SQL, Key Vault, Service Bus), ExpressRoute depuis les bureaux FR, CMK pour le chiffrement (clés dans Azure Key Vault France), Sovereign Landing Zone documentation","Utiliser un cloud français uniquement","Impossible d'avoir la souveraineté des données sur Azure"],a:1,e:"Souveraineté des données Azure France: Policy 'Allowed locations' + 'Allowed locations for resource groups' pour tout locker en France. Data residency: tous les services Azure (SQL, Storage, etc.) en France Central/South ont les données physiquement en France. Pour les données ultra-sensibles: Managed HSM en France + Microsoft Customer Key (MCK). Documentation: Azure Trust Center pour les engagements de résidence des données."},
{id:320,cat:"Scénarios Architecturaux",q:"Comment architecturer la sécurité pour une application microservices sur AKS avec 20 équipes de développement indépendantes ?",o:["Un seul cluster partagé sans isolation","Multi-cluster ou namespace isolation avec RBAC Kubernetes: chaque équipe a un namespace dédié, RBAC limitant l'équipe à son namespace, Network Policies interdisant les communications cross-namespaces non autorisées, Azure Policy for AKS enforçant les Pod Security Standards Restricted, service mesh (Istio) pour mTLS et observabilité, et un Azure Container Registry partagé avec RBAC fin par équipe","Un namespace par équipe sans sécurité","Donner accès cluster-admin à toutes les équipes"],a:1,e:"Multi-tenant AKS sécurisé: namespaces dédiés par équipe + RBAC K8s (RoleBinding dans le namespace, pas ClusterRole), Network Policies par défaut deny-all puis whitelist, Azure Policy enforcer les restrictions Pod Security (no privileged, no root), Workload Identities par microservice (pas de shared credentials), ACR par équipe ou avec RBAC task-level, et GitOps (ArgoCD/Flux) pour les déploiements avec audit trail."},
{id:321,cat:"Scénarios Architecturaux",q:"Scénario: Votre CISO veut un rapport de sécurité mensuel pour le board. Quels éléments inclure ?",o:["Un rapport technique de tous les CVEs","Rapport board-level: 1) Secure Score Azure/M365 (tendance sur 3 mois), 2) Incidents de sécurité (sévérité, MTTD, MTTR), 3) Top risques ouverts avec owners et dates de remédiation, 4) Couverture contrôles (MFA %, patch compliance %), 5) Métriques réglementaires (RGPD DSARs, violations), 6) Threat landscape (secteur ciblé), 7) ROI investissements sécurité","Envoyer tous les logs bruts","Uniquement les incidents majeurs"],a:1,e:"Board reporting sécurité: garder le langage business (risques, impacts, coûts), pas technique. Format: KPIs dashboard (Secure Score tendance, MFA coverage %, incidents résolus vs ouverts), Top 5 risques avec impacts business, progrès sur les actions prioritaires, et 3 recommandations stratégiques pour le prochain trimestre. CISO = traducteur entre technique et business."},
{id:322,cat:"Scénarios Architecturaux",q:"Comment déployer Defender for Cloud à l'échelle d'une organisation avec 50 abonnements Azure ?",o:["Configurer MDC sur chaque abonnement manuellement","Via Azure Policy et Management Groups: 1) Activer MDC via 'Azure Security Center pricing tiers' Policy au niveau MG racine (déploiement automatique sur tous les abonnements), 2) Workspace Log Analytics central pour tous les agents, 3) Defender Plans par type de workload (Servers, SQL, Storage, Containers) via Policy, 4) Rôles centralisés (Security Reader pour le SOC), 5) Alertes/recommandations dans le portail MDC agrégé","Un abonnement central uniquement","Attendre le budget pour chaque abonnement"],a:1,e:"MDC à grande échelle: Policy DeployIfNotExists pour activer les plans MDC et provisionner les agents (AMA - Azure Monitor Agent) sur tous les abonnements sous le MG. Workspace Log Analytics central pour la corrélation multi-subs. Security Admin peut gérer les policies depuis le portail MDC multi-subscription. Defender CSPM pour l'Attack Path Analysis cross-subscription."},
{id:323,cat:"Scénarios Architecturaux",q:"Qu'est-ce qu'un 'Azure Landing Zone' et son composant de sécurité ?",o:["Un espace de déploiement basique","Un ensemble d'abonnements, groupes de ressources, politiques, RBAC et configurations de réseau pré-configurés selon les best practices Microsoft (Cloud Adoption Framework). Security component: Azure Policy (guardrails automatiques), RBAC (rôles prédéfinis par persona), Network topology (hub-and-spoke), Log Analytics workspace, et MDC activé par défaut","Un modèle ARM uniquement","Un outil de déploiement CI/CD"],a:1,e:"Azure Landing Zones (Cloud Adoption Framework): blueprint complet pour un déploiement Azure sécurisé. Management Group hierarchy (Root → Platform → Landing Zones), Policy initiatives par type d'abonnement (Production, Dev, Sandbox), réseau hub-and-spoke pré-configuré, identité (Azure AD Connect, MFA policies), monitoring (Log Analytics, MDC, Sentinel), et gouvernance (Cost management, Tagging). Déployer via Terraform ou Bicep."},
{id:324,cat:"Scénarios Architecturaux",q:"Comment implémenter un processus de 'Secure by Default' pour les nouveaux déploiements Azure ?",o:["Former les équipes à la sécurité","Azure Policy Initiatives avec effet Deny/DeployIfNotExists: dès qu'une ressource est créée sans les contrôles requis, soit elle est bloquée (Deny), soit les contrôles sont déployés automatiquement (DINE). Exemples: Storage sans HTTPS → Denied, VM sans MDE → DINE installe l'extension, SQL sans TDE → DINE active TDE. Combiné avec Infrastructure as Code (Bicep/Terraform) avec security baked-in","Audit mensuel des ressources","Uniquement pour les nouvelles équipes"],a:1,e:"Secure by Default via Policy: 1) DINE pour les contrôles automatisables (MDC extensions, diagnostics settings, etc.), 2) Deny pour les mauvaises configurations inacceptables (public blob access, no TLS), 3) Audit pour les configurations à améliorer progressivement. IaC security: templates Bicep/Terraform avec les configurations sécurité incluses (Security linting via Checkov, tflint). Tout nouveau déploiement = sécurisé par construction."},
{id:325,cat:"Scénarios Architecturaux",q:"Scénario: Votre entreprise subit une réorganisation et doit transférer 15 abonnements Azure vers un nouveau tenant. Quels risques de sécurité gérer ?",o:["Un simple transfert de billing uniquement","Risques: 1) Perte des politiques Azure Policy (non transférées), 2) Perte des RBAC assignments (Principal IDs = nouveaux dans le nouveau tenant), 3) Perte des PIM configurations, 4) Disruption des Managed Identities (nouvelles identités), 5) Perte des diagnostics settings (Log Analytics workspace différent). Planification: inventaire complet, re-configuration post-migration, test en non-prod d'abord","Un transfert transparent sans impact sécurité","Uniquement un problème de facturation"],a:1,e:"Migration d'abonnements entre tenants: les abonnements peuvent être transférés (Azure Cost Management), mais toutes les configurations identité/sécurité doivent être re-créées: RBAC (recréer tous les assignments avec les nouveaux UPNs du nouveau tenant), Azure Policy (réappliquer via IaC), Managed Identities (nouvelles identités = re-configurer les permissions RBAC), Log Analytics workspace (reconnecter les diagnostics settings)."},
{id:361,cat:"Architectures Zero Trust",q:"Qu'est-ce que le principe 'Verify Explicitly' dans Zero Trust ?",o:["Vérifier uniquement les nouveaux utilisateurs","Authentifier et autoriser chaque demande d'accès en utilisant TOUS les signaux disponibles: identité, localisation, appareil, service, workload, classification des données, anomalies. Jamais de confiance implicite basée sur la position réseau","Vérifier uniquement les accès externes","Double authentification uniquement"],a:1,e:"Verify Explicitly = chaque demande est évaluée avec tous les signaux contextuels: WHO (identité), WHAT (device health, app), WHERE (location, network), WHEN (horaires anormaux?), HOW MUCH (risque de la ressource demandée). Azure AD Conditional Access implémente ce principe."},
{id:362,cat:"Architectures Zero Trust",q:"Scénario: Un utilisateur se connecte depuis son domicile sur un appareil personnel non géré. Quelle politique Zero Trust appliquer ?",o:["Bloquer l'accès complètement","Conditional Access: Allow avec restrictions - Require MFA (signal identité) + App enforced restrictions si appareil non-conforme (accès limité: lecture seule, pas de téléchargement) via Intune MAM. Pour les apps sensibles: exiger un appareil conforme ou Compliant Device","Accès complet avec MFA simple","VPN obligatoire"],a:1,e:"Zero Trust pour BYOD: MFA résistant au phishing, puis selon la conformité de l'appareil: géré et conforme = accès complet, non géré = accès conditionnel (MAM-only: données corporate dans des apps M365 uniquement, pas de téléchargement). MDCA Session Policy pour le watermarking et le blocage de download."},
{id:363,cat:"Architectures Zero Trust",q:"Qu'est-ce que la 'Continuous Access Evaluation (CAE)' dans Azure AD ?",o:["Une évaluation planifiée des accès","Un mécanisme permettant la révocation near-real-time des tokens OAuth: quand un événement critique survient (compte désactivé, password changé, localisation anormale), Azure AD signale aux applications compatibles CAE (Exchange, Teams, SharePoint) de rejeter immédiatement le token sans attendre son expiration","Un audit mensuel des accès","Un renouvellement automatique des tokens"],a:1,e:"Sans CAE: un token OAuth valide 1h continue de fonctionner 1h même si le compte est désactivé. Avec CAE: AAD envoie un 'critical event signal' (user disabled, password changed, admin revoked session) → les apps CAE-compatible rejettent le token immédiatement → re-authentification requise. Réduction du délai de révocation de 60 min à <1 min."},
{id:364,cat:"Architectures Zero Trust",q:"Comment implémenter Zero Trust pour les workloads dans un environnement multi-cloud (Azure + AWS + GCP) ?",o:["Zero Trust ne fonctionne que dans Azure","Architecture: Azure AD comme IdP central (fédérer AWS IAM et GCP IAM vers Azure AD via OIDC/SAML), Microsoft Defender for Cloud comme CSPM multi-cloud, Defender for Servers sur les VMs AWS/GCP (Arc-enabled), politiques de sécurité communes via des baselines CNAPP, et network isolation via des peerings sécurisés","Créer 3 politiques indépendantes par cloud","VPN entre les 3 clouds"],a:1,e:"Multi-cloud Zero Trust: Azure AD SSO vers AWS (AWS SSO/Identity Center federated avec AAD) et GCP (Workforce Identity Federation), Defender for Cloud (connecteurs AWS/GCP pour CSPM multi-cloud), Azure Arc pour étendre Defender for Servers à AWS/GCP VMs, et Sentinel pour la visibilité sécurité centralisée multi-cloud."},
{id:365,cat:"Architectures Zero Trust",q:"Qu'est-ce que le 'Network Segmentation' dans un contexte Zero Trust et comment differ de la segmentation traditionnelle ?",o:["Identique à la segmentation VLAN classique","Zero Trust Network Segmentation: micro-segmentation identité-aware (les politiques d'accès réseau sont basées sur l'identité du workload, pas uniquement sur l'IP/subnet). Chaque workload a une identité (Managed Identity, SPIFFE) et les connexions sont autorisées workload-à-workload, pas subnet-à-subnet","La segmentation n'est pas nécessaire en Zero Trust","Uniquement via des VLANs plus petits"],a:1,e:"Traditional: subnet VLAN = périmètre de confiance. Zero Trust: chaque workload est son propre périmètre, authenticate via mutual TLS (SPIFFE/SPIRE), authorize via policy engine (OPA). En Kubernetes: Istio service mesh avec mTLS STRICT (chaque pod s'authentifie), Network Policies (whitelist des connexions autorisées). Sur Azure: NSG niveau NIC + ASG."},
{id:366,cat:"Architectures Zero Trust",q:"Scénario: Votre organisation veut adopter SASE. Quels composants sont nécessaires ?",o:["Uniquement un nouveau pare-feu","SASE (Secure Access Service Edge) = convergence réseau et sécurité cloud: SD-WAN (connectivité optimisée), ZTNA (remplace VPN), SWG (filtrage web), CASB (gouvernance SaaS), FWaaS (Firewall-as-a-Service). Microsoft Entra Private Access + Entra Internet Access = SASE Microsoft. Zscaler, Netskope, Cloudflare sont des alternatives","VPN amélioré","Un proxy web centralisé"],a:1,e:"SASE Microsoft: Entra Private Access = ZTNA (remplace VPN pour les apps internes), Entra Internet Access = SWG (filtrage Internet + M365 access). Complété par Defender for Cloud Apps = CASB. L'agent Global Secure Access sur les endpoints achemine le trafic selon les politiques. Architecture sans périmètre réseau, basée sur l'identité."},
{id:367,cat:"Conformité et Gouvernance",q:"Comment implémenter une stratégie de 'Compliance as Code' pour les contrôles de sécurité Azure ?",o:["Vérification manuelle mensuelle","Terraform + Azure Policy + OPA: définir les contrôles de sécurité en code (Policy-as-Code), les versionner dans Git, les tester en CI/CD (terraform plan + conftest), les déployer via pipeline (Terraform apply). Azure Policy 'DeployIfNotExists' remédiation automatique. Les violations sont détectées et corrigées automatiquement","Excel de suivi","Rapport annuel d'audit"],a:1,e:"Compliance as Code: Azure Policy definitions stockées dans Git (versionnées, auditées), déployées via Terraform ou Bicep, testées avec Azure Policy Compliance scanner dans le pipeline CI. Drift detection: si quelqu'un modifie manuellement une config en dehors de Terraform → Terraform plan détecte le drift → alert. 100% de contrôles reproductibles et auditables."},
{id:368,cat:"Conformité et Gouvernance",q:"Qu'est-ce que le 'Microsoft Compliance Manager' et son Compliance Score ?",o:["Un outil de monitoring des performances","Un outil Purview qui évalue la conformité de votre tenant M365 contre des réglementations (RGPD, ISO 27001, NIST, SOC 2, PCI DSS etc.). Score de 0-100% basé sur les contrôles implémentés. Fournit des actions de remédiation priorisées avec des instructions étape par étape et des preuves automatiquement collectées","Un outil de certification automatique","Un scanner de vulnérabilités M365"],a:1,e:"Compliance Manager: évalue ~300 contrôles pour RGPD/ISO 27001/NIST etc. Certains contrôles sont auto-testés (Microsoft vérifie la configuration automatiquement), d'autres nécessitent des preuves manuelles (politiques documentées, formations). Le score agrégé mesure la posture de conformité. Utile pour préparer des audits ISO 27001 ou SOC 2."},
{id:369,cat:"Conformité et Gouvernance",q:"Scénario: Votre entreprise doit démontrer la conformité RGPD à un auditeur. Quels éléments Purview/Azure fournissez-vous ?",o:["Uniquement la politique de confidentialité","1) Compliance Manager (rapport de conformité RGPD avec le score et les contrôles), 2) Azure Activity Logs + Purview Audit (qui a accédé à quoi, quand), 3) Sensitivity Labels (classification des données personnelles), 4) DLP Reports (violations et remédiation), 5) Priva (traitement des DSARs), 6) Entra Access Reviews (contrôle des accès aux données personnelles)","Uniquement le DPO","Un contrat avec Microsoft"],a:1,e:"RGPD evidence package: Compliance Manager GDPR assessment (contrôles et preuves), Data Map (inventaire des données PII), Sensitivity Labels coverage (% données classifiées), DLP Policy effectiveness (violations détectées/bloquées), Audit logs rétention (accès aux données sensibles), Access Reviews (droits vérifiés périodiquement), Priva DSAR logs (respect des délais). Documentation complète pour un auditeur CNIL."},
{id:370,cat:"Sécurité Multi-Cloud",q:"Qu'est-ce que 'Microsoft Defender for Cloud' en mode multi-cloud et comment configurer les connecteurs AWS ?",o:["Defender for Cloud ne supporte pas AWS","Connecteur AWS natif dans MDC: déployer un CloudFormation template dans le compte AWS qui crée un IAM role avec les permissions minimales pour MDC. MDC lit les configurations AWS (Security Hub, Config, EC2) et les évalue contre le standard CSPM. Peut aussi onboarder les EC2 dans Defender for Servers via Azure Arc","Via une API tierce uniquement","AWS Config séparément uniquement"],a:1,e:"MDC multi-cloud setup: 1) Dans MDC → Environment Settings → Add environment → AWS, 2) Déployer le CloudFormation template dans AWS (crée un role IAM ReadOnly pour MDC), 3) MDC importe les ressources AWS dans son inventaire, 4) Les recommandations CSPM s'appliquent (CIS AWS Benchmark), 5) Defender for Servers: installer l'agent Arc sur les EC2 pour la protection runtime."},
{id:371,cat:"Sécurité Multi-Cloud",q:"Comment unifier la détection des menaces depuis Azure, AWS et GCP dans Microsoft Sentinel ?",o:["Sentinel ne supporte que Azure","Connecteurs Sentinel multi-cloud: AWS CloudTrail Connector (logs d'audit AWS → Sentinel), GCP Pub/Sub Connector (logs GCP → Sentinel), Azure Activity Logs (natif). Normalisation via ASIM (Advanced Security Information Model) pour un schéma commun. Règles analytiques cross-cloud peuvent corréler des attaques sur plusieurs clouds","Via un SIEM tiers uniquement","Exporter manuellement les logs"],a:1,e:"Sentinel multi-cloud: AWS CloudTrail → Kinesis Data Firehose → S3 → Sentinel AWS connector. GCP → Cloud Logging → Pub/Sub → Sentinel GCP connector. ASIM normalise les tables (AuditLogs pour tous les clouds). Règles de détection cross-cloud: détecter un user qui crée des ressources dans les 3 clouds simultanément (pivot attack). Workbooks multi-cloud pour les dashboards."},
{id:372,cat:"Sécurité des Applications",q:"Qu'est-ce que 'Microsoft Defender for APIs' et comment l'activer ?",o:["Un outil de performance d'API","Defender for APIs (plan Defender for API Management): active la surveillance des APIs publiées dans Azure API Management. Détecte: volumétrie anormale, accès non authentifié anormal, endpoints non documentés (shadow APIs), patterns d'attaque OWASP API Top 10. Activer via le plan Defender for APIM dans MDC","Via WAF uniquement","Un scanner de code d'API"],a:1,e:"Defender for APIs: activer le plan dans MDC → tous les APIs dans APIM sont automatiquement inventoriés et monitorés. Alertes: unauthenticated API access spike, data volume anomaly (exfiltration), slow API response (DoS), access from malicious IP. Intégré à MDC pour les recommandations (ex: activer l'auth pour les endpoints non protégés)."},
{id:373,cat:"Sécurité des Applications",q:"Comment implémenter 'DevSecOps' dans Azure DevOps avec Defender for DevOps ?",o:["Uniquement des code reviews manuels","Defender for DevOps: 1) Connecter Azure DevOps/GitHub à MDC, 2) Actions de sécurité dans le pipeline: SAST (CodeQL/Bandit), secrets scanning (GitGuardian/GitHub Secret Scanning), IaC scanning (Checkov/KICS pour Terraform/Bicep), SCA (Dependabot), 3) Pull request annotations (bloquer les PRs avec des critères de sécurité), 4) Dashboard MDC pour la posture DevOps","Audit du code uniquement","Formation développeurs uniquement"],a:1,e:"DevSecOps avec MDC: Defender for DevOps agrège les résultats de sécurité depuis les pipelines ADO/GitHub. Configuration: connecteur MDC → OAuth vers ADO → scan automatique. Pull Request Decorator: les vulnérabilités SAST apparaissent directement dans la PR. POSTURE: MDC montre le % de repos avec secrets scanning actif, SAST actif, etc."},
{id:374,cat:"Gestion des Incidents",q:"Quels sont les éléments d'un bon 'Security Incident Response Plan (SIRP)' pour une organisation Azure ?",o:["Un simple document Word des procédures","1) Définitions et classification des incidents (P1-P4 selon impact/urgence), 2) Rôles et responsabilités (RACI: IR lead, SOC, CISO, Legal, Comms), 3) Playbooks par type d'incident (Ransomware, BEC, Data Breach, Cloud misconfiguration), 4) Outils (Sentinel, MDE, Purview Audit), 5) Contacts d'escalade (24/7), 6) Post-mortem et lessons learned","Une liste de contacts téléphoniques","Un outil automatisé uniquement"],a:1,e:"SIRP complet: Définition (incident vs événement), tiers de sévérité (P1=impact business critique <2h réponse, P2=élevé <4h, etc.), playbooks documentés par scénario (Sentinel Workbook pour le ransomware), runbooks d'outils (comment isoler dans MDE, comment révoquer dans AAD), chain of custody (preuves légales), et exercice tabletop annuel."},
{id:375,cat:"Gestion des Incidents",q:"Scénario: Une attaque de supply chain touche un outil de build CI/CD dans votre pipeline Azure DevOps. Comment répondre ?",o:["Supprimer le pipeline","1) Identifier les builds affectés (quelles releases depuis le début de la compromission), 2) Révoquer les tokens/Service Connections du pipeline compromis, 3) Isoler les environnements déployés depuis ces builds (désactiver les resources ARM), 4) Reconstruire l'environnement depuis le code source propre (git history pré-compromission), 5) Auditer les accès via les logs ADO, 6) Notifier les parties prenantes et clients si données exposées","Attendre confirmation de la vendor","Déployer un patch"],a:1,e:"Supply chain incident response: scope (quels builds → quels déploiements → quels environnements → quelles données exposées), containment (tokens révoqués, pipelines désactivés), rebuild (re-déployer depuis code source connu sain), forensique (logs ADO, AuditLogs Azure), et disclosure (si données client exposées = RGPD 72h notification). SLSA peut aider à prouver l'intégrité des builds sains."},
{id:376,cat:"Sécurité des Données",q:"Comment concevoir une architecture de protection des données sensibles dans Azure end-to-end ?",o:["Chiffrement uniquement au repos","Architecture 3-layers: 1) Discovery & Classification (Purview Data Map, Sensitivity Labels, SITs), 2) Protection (Chiffrement au repos CMK/Key Vault, en transit TLS 1.2+, en utilisation Confidential Computing), 3) Governance (DLP cross-workload, MDCA CASB pour SaaS, Priva pour RGPD, Access Reviews). Monitoring: Defender for Storage/SQL/Databases pour les alertes runtime","Mot de passe sur les bases de données","Sauvegardes chiffrées uniquement"],a:1,e:"Stratégie complète: Classify (Purview trouve et classe les données PII, financières), Protect (labels + RMS pour les documents, CMK pour les bases, Private Endpoints pour la connectivité réseau), Monitor (Defender for Storage/SQL détecte les accès anormaux, Sentinel corrèle), Govern (DLP bloque l'exfiltration, DSAR via Priva, retention via labels). Les 4 étapes couvrent le cycle de vie complet."},
{id:377,cat:"Sécurité des Données",q:"Qu'est-ce que 'Azure Confidential Computing' et son cas d'usage ?",o:["Un service de stockage chiffré","Confidential Computing protège les données EN COURS D'UTILISATION (in-use) dans un 'Trusted Execution Environment (TEE)' matériel (Intel SGX/AMD SEV): le code s'exécute dans un enclave chiffré, inaccessible même aux admins Azure ou à l'OS. Cas: données médicales partagées entre hôpitaux, ML sur données sensibles, secrets financiers multi-parties","Un chiffrement supplémentaire au repos","Un service de sécurité réseau"],a:1,e:"Confidential Computing complète la triade de chiffrement: At Rest (Azure Storage Encryption), In Transit (TLS), In Use (Confidential Computing TEE). Use case concret: un hôpital entraîne un modèle ML sur des données patients sans qu'Azure ni le fournisseur ML ne puissent voir les données brutes. Azure DCsv3 VMs (Intel SGX), Azure Confidential VMs (AMD SEV-SNP)."},
