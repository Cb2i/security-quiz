{id:223,category:"Microsoft Sentinel",question:"Qu est-ce que Sentinel Content Hub et comment l utiliser pour enrichir votre SOC ?",options:["Un espace de stockage de donnees","Content Hub = marketplace Sentinel avec 300+ solutions packagees OOTB: 1) Connecteurs de donnees, 2) Regles analytiques, 3) Hunting Queries, 4) Workbooks, 5) Playbooks. Organises par vendor (Microsoft, Palo Alto, CrowdStrike) et par domaine (Identity, Network, Cloud). Installation en un clic: une solution Microsoft 365 Defender installe tous les connecteurs et regles et workbooks pour M365D en quelques minutes","Un outil de formation","Un service d abonnement payant"],answer:1,explanation:"Content Hub workflow: nouveau tenant Sentinel -> Content Hub -> installer les solutions correspondant a votre environnement (Microsoft 365, Azure, AWS) -> les connecteurs sont configures, les regles analytiques et workbooks sont disponibles. Mise a jour: les solutions se mettent a jour automatiquement avec de nouvelles regles quand Microsoft publie des nouvelles detections."},
{id:224,category:"Incident Response",question:"Qu est-ce que le Cyber Kill Chain et comment mapper les alertes Sentinel sur ce modele ?",options:["Un modele de gestion de crise","Cyber Kill Chain (Lockheed Martin): 7 etapes d une cyberattaque: 1) Reconnaissance, 2) Weaponization, 3) Delivery (email phishing), 4) Exploitation (CVE exploitee), 5) Installation (malware implante), 6) Command and Control (C2), 7) Actions on Objectives (exfiltration/ransomware). Mapping Sentinel: chaque alerte Sentinel est mappee a une etape -> comprendre a quel stade est l attaquant -> quelle est la prochaine etape probable","Une chaine d approvisionnement","Un modele de developpement de malware"],answer:1,explanation:"Kill Chain dans la pratique: si une alerte est au stade Installation (malware detecte) -> l attaquant va probablement chercher a etablir un C2 -> surveiller les connexions reseau sortantes inhabituelles proactivement. Difference avec ATT&CK: Kill Chain est sequentiel (7 phases), ATT&CK est plus granulaire (14 tactiques + sous-techniques)."},
{id:225,category:"Microsoft Defender for Cloud",question:"Comment fonctionnent les Defender for Servers Plans 1 et 2 et quelles sont leurs differences ?",options:["Plans 1 et 2 sont identiques","Plan 1 (5 USD/serveur/mois): integration MDE sur les serveurs (EDR + NGAV), protection reseau adaptative, JIT VM access. Plan 2 (15 USD/serveur/mois): tout Plan 1 + File Integrity Monitoring FIM, Docker host hardening, scan des VMs pour les vulnerabilites OS (MDVM integre), analyse comportementale des processus, 500MB d ingestion Sentinel incluse par serveur","Le Plan 2 n ajoute que des fonctionnalites cosmetiques","Plan 1 est plus complet que Plan 2"],answer:1,explanation:"File Integrity Monitoring FIM Plan 2: surveille les modifications sur des fichiers/repertoires/registres critiques (ex: C:\\Windows\\System32, /etc/passwd). Toute modification inattendue = alerte. Use case: attaquant modifie un fichier systeme pour etablir la persistance -> FIM detecte la modification -> alerte MDC. Plan 2 pour les serveurs critiques (DCs, serveurs de production) = ROI eleve."},
{id:226,category:"Microsoft Sentinel",question:"Comment configurer les 'Analytics Rules' de type Scheduled dans Sentinel et quelles sont les meilleures pratiques ?",options:["Les regles analytiques se configurent toutes seules","Scheduled Analytics Rules: 1) Query: requete KQL qui detecte l anomalie, 2) Query scheduling: frequence d execution (ex: toutes les 5 minutes), 3) Lookback period: fenetre de donnees analysee (ex: derniere heure), 4) Alert threshold: nombre de resultats pour declencher (ex: >0), 5) Event grouping: regrouper les resultats en 1 alerte ou N alertes, 6) Incident creation: activer pour creer un incident depuis l alerte. Best practice: tester la query en mode Run avant d activer la regle","Les regles analytiques ne peuvent pas etre personnalisees","Uniquement via PowerShell"],answer:1,explanation:"Rule tuning: si une regle genere trop de faux positifs -> augmenter le threshold ou ajouter des conditions d exclusion (where IPAddress !in (known_good_IPs)). Scheduled rules vs NRT (Near Real-Time): NRT = latence <5 minutes (pour les cas critiques comme les connexions vers des IPs malconnues). Scheduled = toutes les 5min a 24h (pour les analyses de volumes, correlations). Metric: nombre d alertes par regle -> si >50 alertes/jour = trop bruyant, regler."},
{id:227,category:"KQL",question:"Comment utiliser 'externaldata' en KQL pour enrichir les requetes avec des donnees externes ?",options:["externaldata n existe pas en KQL","externaldata(): charge des donnees depuis un stockage externe (Azure Blob, Azure Data Lake) directement dans une requete KQL. Exemples: let maliciousIPs = externaldata(ip: string) [@'https://storage.blob.core.windows.net/feeds/malicious-ips.csv'] with (format='csv'); puis: SigninLogs | where IPAddress in (maliciousIPs). Utilisations: listes d IOCs, listes d employes, listes d actifs","KQL ne peut pas acceder aux donnees externes","externaldata uniquement pour les admins"],answer:1,explanation:"externaldata use cases: 1) Threat Intelligence IOCs depuis un fichier CSV dans un Storage Account (mis a jour quotidiennement), 2) Liste des employes en departures (depuis le systeme RH) pour l IRM Sentinel, 3) Liste des IPs autorisees pour exclure les faux positifs. Securite: le Storage Account doit etre accessible depuis le workspace Sentinel (SAS token ou RBAC). Mise a jour: si le fichier change, la requete utilise automatiquement la nouvelle version a la prochaine execution."},
{id:228,category:"Microsoft Defender for Endpoint",question:"Qu'est-ce que 'Automated Investigation and Response' AIR dans MDE et comment le configurer ?",options:["AIR est une fonctionnalite premium uniquement","AIR dans MDE: quand une alerte est declenchee, AIR lance automatiquement une investigation (collecte des artefacts, analyse des processus, des fichiers, des connexions reseau) et peut remedier automatiquement (mise en quarantaine d un fichier malveillant, isolation de la machine). Niveaux d automatisation: Full (remediation auto sans approbation), Semi (approuver les actions avant execution), No automated remediation. Configurer: MDE Settings -> Device management -> Automation level","AIR necessite un SOC 24/7 pour fonctionner","AIR uniquement pour les grandes organisations"],answer:1,explanation:"AIR ROI: un analyste SOC prend 20-30 minutes pour investiguer une alerte basique. AIR fait la meme investigation en 2-5 minutes automatiquement. Pour les alertes communes (malware connu sur endpoint), AIR peut remedier sans intervention humaine. Configuration recommandee: Full automation pour les appareils non-critiques (workstations), Semi-automation pour les serveurs critiques (validation humaine avant remediation). Monitoring: AIR Actions Center -> voir toutes les actions automatiques effectuees et les approuver/rejeter."},
{id:229,category:"Threat Intelligence",question:"Qu'est-ce que 'Microsoft Defender Threat Intelligence' MDTI et comment l'integrer dans le SOC ?",options:["Un abonnement de threat feeds","MDTI: plateforme de Threat Intelligence Microsoft qui fournit: 1) Intel sur les acteurs de menaces (groupes APT, cybercriminels), 2) Analyse des IOCs (IPs, domaines, hashes) avec contexte et historique, 3) Vulnerability Intelligence (CVEs avec contexte d exploitation actif), 4) Infrastructure analysis (quel acteur utilise cette IP?). Integration Sentinel: le connecteur MDTI enrichit les incidents Sentinel avec le contexte TI. API disponible pour l integration dans les SOAR","Un produit uniquement pour les gouvernements","Un simple scanner de vulnerabilites"],answer:1,explanation:"MDTI use cases: analyste SOC voit une IP suspecte dans un incident -> requete MDTI API -> contexte complet (appartient a quelle organisation, associ a quel acteur de menace, quels autres IOCs lies). Vulnerability Intelligence: une CVE est annoncee -> MDTI montre si elle est exploitee activement (Exploitation in the Wild = priorite critique de patch). Integration automatique dans les Playbooks Sentinel: enrichir chaque incident avec le contexte MDTI -> reduire le temps d investigation."},
{id:230,category:"Microsoft Sentinel",question:"Comment implementer le 'SOC Automation' avec Sentinel Logic Apps et Microsoft Teams ?",options:["L automatisation SOC necessite du code personnalise","SOC Automation via Logic Apps: 1) Trigger: incident Sentinel cree -> 2) Enrichissement automatique: appel Azure AD (details utilisateur), VirusTotal (hash du fichier), MDTI (contexte IP), 3) Score de risque calcule -> 4) Si risque eleve: message Teams au canal SOC avec toutes les informations + boutons d action (Isoler / Ignorer / Escalader), 5) L analyste clique Isoler -> Logic App appelle MDE API pour isoler la machine. Tout tracable dans les logs","L automatisation SOC est dangereuse","Uniquement via PowerShell"],answer:1,explanation:"Teams SOC integration: les notifications Teams avec Adaptive Cards permettent aux analystes de prendre des actions directement depuis Teams (sans ouvrir le portail Sentinel). Exemple: message Teams affiche: Utilisateur compromis: john.doe@contoso.com, Alerte: Mimikatz detecte, Machine: LAPTOP-001, Risque MDTI: HIGH. Boutons: Isolate Machine / Reset Password / Create Incident P1. L analyste clique -> action executee dans les 30 secondes. MTTD reduit de 20 minutes a 2 minutes."},
{id:231,category:"Microsoft Defender for Cloud",question:"Comment interpreter le 'Regulatory Compliance Dashboard' dans Defender for Cloud ?",options:["Ce tableau de bord est uniquement decoratif","Regulatory Compliance Dashboard: montre la conformite de votre environnement Azure contre des frameworks reglementaires (PCI DSS, ISO 27001, SOC 2, NIST, CIS, RGPD). Pour chaque controle: Passed (implemnte), Failed (non-implemnte), ou Non-applicable. Chaque controle Failed = recommandation de remediation. Drill-down: voir quelles ressources specifiques ne sont pas conformes","Le dashboard ne se met pas a jour automatiquement","Uniquement pour les organisations certifiees"],answer:1,explanation:"Regulatory Compliance use case: avant un audit PCI DSS -> ouvrir le dashboard -> voir le score PCI DSS (ex: 73% des controles satisfaits) -> identifier les controles Failed -> remedier avant l audit. Export: generer un rapport PDF des controles satisfaits comme preuve pour l auditeur. Attention: le dashboard mesure les controles TECHNIQUES uniquement (pas les controles organisationnels comme les politiques ecrites). Un score eleve n implique pas une certification automatique."},
{id:232,category:"Incident Response",question:"Qu'est-ce que le 'Mean Time to Detect' MTTD et 'Mean Time to Respond' MTTR et comment les ameliorer ?",options:["Des metriques uniquement financieres","MTTD: temps moyen entre le debut d un incident et sa detection. MTTR: temps moyen entre la detection et la remédiation complete. Moyennes industrie 2024: MTTD ~194 jours (IBM Cost of Data Breach), MTTR ~77 jours. Ameliorer MTTD: SIEM + UEBA + EDR (detection automatique), TI (IOCs connus detectes immediatement). Ameliorer MTTR: SOAR (playbooks automatises), runbooks documentes, exercices reguliers de reponse","Des metriques uniquement pour les grandes entreprises","Des metriques uniquement mesurables en production"],answer:1,explanation:"MTTD/MTTR benchmark: organisations avec SOC mature: MTTD <4 heures, MTTR <24 heures. Sans SOC: MTTD >30 jours, MTTR >90 jours. Chaque jour d un incident non-detecte = dommages supplementaires. Calcul du ROI securite: si l investissement dans le SIEM reduit le MTTD de 30 jours a 4 heures -> reduire le cout moyen d un incident de 4.35M USD (IBM) de 30-40% selon les recherches. Metric a presenter au CISO/board: tendance MTTD/MTTR sur 12 mois."},
{id:233,category:"KQL",question:"Comment creer une requete KQL pour detecter les connexions depuis des pays non-autorises ?",options:["Les connexions internationales ne peuvent pas etre filtrees","SigninLogs | where TimeGenerated > ago(24h) | extend Country = tostring(LocationDetails.countryOrRegion) | where Country !in ('France', 'Canada', 'Belgique', 'Suisse') | where ResultType == 0 | summarize count() by UserPrincipalName, Country, IPAddress | order by count_ desc","AuditLogs | filter country","Get-AADSignIn | where-country"],answer:1,explanation:"Enrichissement KQL Location: LocationDetails est un champ JSON dans SigninLogs contenant: countryOrRegion, city, state, geoCoordinates. Utiliser extend + tostring() pour extraire les sous-champs JSON. Cas d usage: alerte si connexion reussie depuis un pays jamais vu pour cet utilisateur. Version avancee: comparer le pays actuel avec le pays habituel de l utilisateur (baseline via summarize top-country par user). Named Locations dans Azure AD CA: utiliser les Trusted Locations pour gerer les exceptions."},
{id:234,category:"Microsoft Defender for Identity",question:"Comment MDI detecte-t-il les attaques 'Kerberoasting' ?",options:["MDI ne detecte pas Kerberoasting","Kerberoasting: l attaquant demande des tickets Kerberos TGS pour des comptes de service (SPN) afin de les cracker offline. MDI detecte: 1) Nombreuses demandes TGS en peu de temps depuis un compte utilisateur normal (un utilisateur normal ne demande pas 50 TGS en 5 minutes), 2) Demandes pour des comptes SPN non utilises par ce compte normalement, 3) Utilisation du chiffrement RC4 (plus facile a cracker) quand AES devrait etre utilise. Alert: Kerberos Account Enumeration ou Suspected Kerberoasting attack","MDI uniquement surveille les VMs","Kerberoasting est non-detectable"],answer:1,explanation:"Kerberoasting prevention: 1) Managed Service Accounts ou Group Managed Service Accounts gMSA (mots de passe longs et complexes changes automatiquement = beaucoup plus difficile a cracker), 2) Configurer les SPN accounts avec des mots de passe de 30+ caracteres aleatoires, 3) Forcer AES uniquement (desactiver RC4 pour les SPN), 4) Principle of least privilege sur les SPN accounts (un compte de service IIS n a pas besoin de droits Domain Admin). Detection: MDI alerte en quelques secondes apres les premieres demandes anormales."},
{id:235,category:"MDCA",question:"Comment configurer une 'Access Policy' dans MDCA pour bloquer l'acces depuis des appareils non-geres ?",options:["Les acces depuis appareils non-geres ne peuvent pas etre controles","Access Policy MDCA (avec Azure AD Conditional Access App Control): 1) Dans Azure AD CA: creer une policy avec Session Control = Use Conditional Access App Control, 2) Dans MDCA: Policies -> Access Policy -> New Policy -> conditions: Device = Unmanaged, action = Block, 3) Resultat: les utilisateurs sur des appareils non-enroles dans Intune sont bloques sur les apps sanctionnees (SharePoint, Exchange). Alternative: permettre l acces mais en lecture seule (Monitor-only)","Les Access Policies ne fonctionnent que pour les admins","Impossible sans un agent installe"],answer:1,explanation:"Access Policy vs Session Policy: Access Policy = decision a l authentification (bloquer ou permettre l acces initial). Session Policy = controles pendant la session (bloquer le telechargement mais permettre la navigation). Strategie BYOD: appareil personnel -> Access Policy bloque le telechargement et l impression (Session Policy) mais permet la consultation des emails et documents (acces lecture seule). Appareil gere -> acces complet. Equilibre: productivite BYOD sans risque de fuite de donnees."},
{id:236,category:"Microsoft Sentinel",question:"Qu'est-ce que 'Sentinel SOAR' et comment integrer des sources tierces comme ServiceNow ou Jira ?",options:["Sentinel SOAR necessite des developpements couteux","SOAR (Security Orchestration, Automation and Response) via Logic Apps: connecteurs pre-construits pour: ServiceNow (creer/mettre a jour des tickets), Jira (creer des issues), PagerDuty (alerter l equipe on-call), Slack/Teams (notifier), VirusTotal/Shodan (enrichissement), Azure AD (bloquer un compte), MDE (isoler une machine). Configuration: dans un Playbook Logic Apps -> choisir le connecteur -> configurer l authentification -> designer le workflow visuel","SOAR necessite Sentinel Premium","Uniquement via des APIs REST personnalisees"],answer:1,explanation:"SOAR ROI example: sans SOAR: analyste recoit un email d alerte -> ouvre Sentinel -> investigate -> ouvre ServiceNow -> cree un ticket -> retourne dans Sentinel -> bloque le compte dans AAD = 15 minutes. Avec SOAR: incident Sentinel -> Logic App -> enrichit avec TI -> si high risk: bloque le compte AAD + cree ticket ServiceNow P1 + notifie Teams + pagerduty = 30 secondes. Scale: un SOAR peut gerer 100 incidents en parallele sans fatigue = impossible pour un SOC humain. Metrique: automation rate (% incidents traites automatiquement = objectif >60%)."},
{id:237,category:"Microsoft Defender for Endpoint",question:"Comment utiliser 'Threat and Vulnerability Management' TVM dans MDE pour prioriser les patches ?",options:["Patcher les vulnerabilites par ordre alphabetique","TVM dans MDE: 1) Exposure Score: score global d exposition aux vulnerabilites, 2) Device Vulnerability: liste toutes les CVEs par appareil avec leur score d exploitation, 3) Security Recommendations: quoi patcher en priorite, 4) Threat Insights: quelles CVEs sont activement exploitees dans la nature (threat feeds). Priorisation: CVE avec exploite in the wild + beaucoup d appareils exposes = priorite absolue","Patcher toutes les vulnerabilites simultanement","TVM necessite un scanner externe"],answer:1,explanation:"TVM risk score: calcule sur la base de: CVSS score + exploitation status (exploit kit disponible? exploite in the wild?) + exposition (combien d appareils exposes?) + sensibilite de l actif. Une CVE CVSS 8.0 non-exploitee peut etre moins urgente qu une CVE CVSS 5.0 exploitee activement avec un exploit kit disponible publiquement. TVM permet de repondre a la question: avec une capacite de 20 patches par semaine, lesquels faire en priorite? Integration ITSM: generer automatiquement des tickets de patch depuis TVM vers ServiceNow/Jira."},
{id:238,category:"KQL",question:"Comment ecrire une requete KQL pour detecter les tentatives de 'Password Spray' ?",options:["Les Password Spray ne peuvent pas etre detectes avec KQL","SigninLogs | where TimeGenerated > ago(1h) | where ResultType != 0 | summarize FailedAttempts = count(), DistinctUsers = dcount(UserPrincipalName) by IPAddress | where DistinctUsers > 10 and FailedAttempts > 50 | order by DistinctUsers desc","AuditLogs | spray detection","SecurityEvent | brute force"],answer:1,explanation:"Password Spray signature: une IP qui essaie un seul mot de passe sur de nombreux comptes differents (contrairement au brute force qui essaie plein de mots de passe sur un seul compte). Detecter: meme IP, nombreux utilisateurs distincts, peu d echecs par utilisateur. Seuil: >10 utilisateurs distincts depuis une IP en 1h = probablement du spray. Enrichir: ajouter le pays de l IP, verifier si l IP est dans des listes TI. Reponse recommandee: bloquer l IP dans le Conditional Access (Named Location) + verifier si des connexions ont reussi depuis cette IP."},
{id:239,category:"Microsoft Sentinel",question:"Qu'est-ce que 'Sentinel Data Connector' et comment connecter AWS CloudTrail a Sentinel ?",options:["Sentinel ne peut pas ingerer des logs AWS","AWS CloudTrail vers Sentinel: 1) Dans AWS: creer un S3 bucket pour CloudTrail logs, 2) Creer un Role IAM avec acces lecture au S3 bucket, 3) Dans Sentinel: aller dans Data Connectors -> AWS CloudTrail -> configurer avec le Role ARN et le S3 bucket name, 4) Les logs CloudTrail arrivent dans la table AWSCloudTrail dans Sentinel. Permet de corréler les incidents AWS avec les incidents Azure AD et M365","Sentinel est uniquement pour Azure","AWS necessite un agent specifique"],answer:1,explanation:"Multi-cloud SIEM: les organisations ont souvent Azure + AWS + GCP. Sentinel peut ingerer les logs de tous les clouds majeurs: AWS CloudTrail (actions utilisateurs AWS), AWS GuardDuty (menaces AWS), Google Cloud (GCP audit logs via connecteur), Azure (natif). Avantage: un seul SIEM pour tous les clouds = correlation cross-cloud (un attaquant compromet un compte Azure AD et utilise les droits federes pour acceder a AWS). Sans Sentinel multi-cloud: ces correlations sont manquees car les SIEM sont separes."},
{id:240,category:"Incident Response",question:"Comment documenter un incident de securite pour les besoins legaux et reglementaires ?",options:["Un email suffist pour documenter","Documentation incident: 1) Timeline: horodatage precis de chaque evenement et action (detection, isolation, remediation), 2) Etendue: quels systemes, quelles donnees, quels utilisateurs affectes, 3) Actions prises: chaque decision documentee avec justification, 4) Preuves: hashes des fichiers forensiques, screenshots horodates, logs exportes, 5) Causes racines: pourquoi l incident a pu se produire, 6) Remediations: mesures correctives implementees, 7) Lecons apprises: ce qui aurait pu etre mieux gere. Format: rapport d incident structure","Les incidents n ont pas besoin d etre documentes","Uniquement pour les incidents critiques"],answer:1,explanation:"Documentation legale requirements: RGPD Art. 33 = notification a la CNIL sous 72h avec documentation complete. PCI DSS = rapport d incident formel requis. Assurance cyber: la compagnie d assurance demandera la documentation complete pour rembourser. En cas de litige: si l organisation est poursuivie pour negligence, la documentation prouve que les procedures standard ont ete suivies. Template recommande: Introduction -> Timeline -> Scope -> Technical Details -> Impact Assessment -> Remediation -> Lessons Learned -> Recommendations."},
{id:241,category:"Microsoft Defender for Cloud",question:"Comment configurer des 'Defender Plans' selectivement pour optimiser les couts ?",options:["Activer tous les plans Defender est obligatoire","Selectivite des Defender Plans: activer uniquement les plans pertinents pour votre environnement. Exemples: 1) Defender for Servers Plan 1 (moins cher) pour les serveurs non-critiques, Plan 2 pour les DC et serveurs de donnees, 2) Defender for SQL uniquement sur les subscriptions avec des bases de donnees SQL, 3) Defender for Containers uniquement si vous utilisez AKS, 4) Exclure les subscriptions de developpement/test. Cost Management: tableau de bord Defender for Cloud -> Cost Analysis -> voir le cout par plan","Tous les plans sont au meme prix","Les plans ne peuvent pas etre actives partiellement"],answer:1,explanation:"Cost optimization Defender: inventorier les ressources par type -> appliquer le plan Defender correspondant. Exemple: 1000 VMs dans l organisation. 200 serveurs critiques (DC, SQL, production) -> Defender Servers P2 = 200 x 15 USD = 3000 USD/mois. 800 workstations -> Defender Servers P1 = 800 x 5 USD = 4000 USD/mois. Total: 7000 USD/mois. Sans selectivite (tout en P2): 1000 x 15 = 15000 USD/mois. Economie: 8000 USD/mois. Recommendation: tagging des ressources par criticite pour simplifier la selection des plans."},
{id:242,category:"MDCA",question:"Qu'est-ce que 'Microsoft Defender for Cloud Apps' Anomaly Detection et comment interpreter les scores ?",options:["Les scores sont des pourcentages de risque","Anomaly Detection MDCA: algorithmes ML qui analysent les activites des utilisateurs et detectent les deviations par rapport au comportement habituel. Score d investigation (0-10): 0 = pas de risque detecte, 10 = risque maximum. Categories: Impossible travel (connexion de Paris et New York a 1h d intervalle), Activity from infrequent country, Malware detected, Ransomware activity, Suspicious inbox forwarding, Mass deletion of files","Les scores sont des notes sur 100","Les scores sont uniquement pour les admins"],answer:1,explanation:"Anomaly score interpretation: score >7 = investigation immediate, 5-7 = surveiller, <5 = probablement faux positif. Impossible Travel calibration: les premiers jours MDCA apprend le comportement normal (un employe qui voyage souvent ne devrait pas avoir d alerte). Learning period: 7 jours. Apres la learning period, les alertes sont plus precises. Faux positifs communs: VPN qui sort dans un pays different, acces depuis un proxy. Remediation: si vrai positif -> suspendre le compte, reinitialiser le mot de passe, investiguer les activites pendant la periode d anomalie."},
{id:243,category:"KQL",question:"Comment utiliser 'parse' et 'extract' en KQL pour analyser les logs non-structures ?",options:["KQL ne peut pas parser les logs texte","parse: extrait des valeurs de chaines en utilisant des patterns. Syntax: parse Message with 'prefix' variable1 'separator' variable2. extract: utilise des regex pour extraire une valeur specifique. Syntax: extract(@'pattern(group)', 1, column). Exemples: parse pour les logs Syslog avec format fixe, extract pour extraire une IP depuis un message de log. Plus puissant: parse_json() pour les logs JSON, split() pour les champs CSV","KQL uniquement pour les logs structures","parse uniquement pour PowerShell"],answer:1,explanation:"Exemple pratique parse: un log Syslog contient 'User admin logged in from 192.168.1.1 at 2024-01-15'. parse SyslogMessage with 'User ' Username ' logged in from ' SourceIP ' at ' LogTime -> extrait Username=admin, SourceIP=192.168.1.1, LogTime=2024-01-15. parse_json pour CEF/JSON: les logs Azure Firewall sont en JSON -> extend parsedFields = parse_json(AdditionalExtensions) -> project parsedFields.DestinationIP. Pratique pour les logs d equipements reseau (Palo Alto, Cisco) envoyes en Syslog vers Sentinel."},
{id:244,category:"Microsoft Sentinel",question:"Comment configurer le 'Threat Intelligence Matching Analytics' dans Sentinel ?",options:["TI Matching necessite des regles manuelles","TI Matching Analytics dans Sentinel: regle analytique integree qui compare automatiquement toutes les tables de logs ingeres avec les IOCs de la table ThreatIntelligenceIndicator. Si un IOC (IP malveillante, domaine malveillant, hash de malware) est vu dans les logs -> alerte automatique. Fonctionne pour: IPs dans SigninLogs et NetworkEvents, domaines dans DnsEvents, hashes de fichiers dans DeviceEvents","TI Matching ne fonctionne qu avec les feeds Microsoft","TI Matching necessite Sentinel P2"],answer:1,explanation:"TI Matching configuration: activer dans Analytics -> Rule Templates -> TI map ... Analytics. Chaque regle TI couvre une table specifique: TI map Email to SigninLogs (IPs d expediteurs malveillants), TI map IP entity to DeviceNetworkEvents (connexions reseau vers IPs malveillantes), TI map Domain entity to Dns (resolution de domaines malveillants). Le matching est fait automatiquement a chaque ingestion de donnee. Precision: les IOCs de haute confiance generent des incidents haute severite. Performance: les tables TI sont indexees pour des requetes rapides."},
{id:245,category:"Incident Response",question:"Quelle est la difference entre un 'False Positive' et un 'True Positive' dans le contexte SOC et comment les gerer ?",options:["Tous les positifs sont egaux","True Positive TP: une alerte qui correspond a une vraie menace (malware detecte = malware reel). True Negative TN: pas d alerte pour une activite normale (correct). False Positive FP: alerte pour une activite legitime (script admin declenche une regle malware). False Negative FN: pas d alerte pour une vraie menace (menace passee inapercue). Objectif SOC: maximiser TP + TN, minimiser FP + FN. FP management: tuning des regles (ajouter des exclusions). FN management: ameliorer la couverture ATT&CK","FP et TP sont interchangeables","Les FP n existent pas dans un bon SIEM"],answer:1,explanation:"FP rate management: si FP rate >20% pour une regle -> analyser les FP -> ajouter des conditions d exclusion (ex: la regle detecte cmd.exe spawne par PowerShell -> ajouter une exception pour les scripts IT approuves). Tuning: utiliser les Tags dans les incidents Sentinel pour categoriser (FP / TP / Benign Positive). Rapports mensuels: evolution du ratio FP/TP par regle -> regles avec FP rate chronique = candidates au tuning. Balance: trop d exclusions -> le FN rate augmente (les vraies menaces passent aussi). Equilibre precision vs recall."},
{id:246,category:"Microsoft Defender for Cloud",question:"Comment configurer les 'Email Notifications' dans Defender for Cloud pour les alertes critiques ?",options:["MDC ne supporte pas les emails","Email Notifications MDC: 1) Defender for Cloud -> Environment Settings -> Email Notifications, 2) Configurer les destinataires (email du CISO, team-soc@company.com), 3) Severite minimale pour l envoi (recommande: High et Critical uniquement pour eviter le flood), 4) Optionnel: notifier les proprietaires de subscription (les DevOps qui ont cree les ressources vulnerables recevront les alertes). Types d alertes envoyees: nouvelles recommendations critiques, nouvelles alertes de securite","MDC envoie uniquement des SMS","Les emails MDC vont uniquement a l admin global"],answer:1,explanation:"Email notification strategy: ne pas envoyer toutes les alertes par email (flood = ignorees). Strategie: Critical/High -> email SOC + PagerDuty (on-call), Medium -> ticket auto ServiceNow, Low -> DashBoard Sentinel uniquement. Proprietaires des subscriptions: utile pour responsabiliser les equipes DevOps (un developpeur qui recoit une alerte sur sa subscription = il est motive a corriger). Alternative: integrer MDC avec Sentinel -> les alertes MDC alimentent les incidents Sentinel (centralise sans email flood)."},
{id:247,category:"KQL",question:"Comment utiliser les fonctions de fenetrage temporel 'bin' et 'summarize' pour analyser les tendances dans le temps ?",options:["Les analyses temporelles ne sont pas possibles en KQL","bin(TimeGenerated, 1h): regroupe les evenements par tranches d une heure. Combine avec summarize pour creer des series temporelles. Exemple: SecurityEvent | where EventID == 4625 | summarize FailedLogins = count() by bin(TimeGenerated, 1h), AccountName | order by TimeGenerated asc. Visualiser dans des graphiques en courbes dans Sentinel Workbooks. Pour detecter: pics d activite inhabituels, attaques nocturnes vs diurnes","bin et summarize ne fonctionnent pas ensemble","Les analyses temporelles necessitent PowerBI"],answer:1,explanation:"Analyse temporelle use cases: 1) Detecter les attaques nocturnes (pic de connexions a 3h du matin), 2) Comparer le volume de logs normal vs anormal (baseline), 3) Identifier les pics d activite qui coincident avec des incidents. Time series analytics: make-series + series_decompose_anomalies() pour la detection d anomalies ML sur les series temporelles. Exemple avance: make-series Logins = count() on TimeGenerated from ago(7d) to now() step 1h by UserPrincipalName | extend anomalies = series_decompose_anomalies(Logins) -> detecter automatiquement les utilisateurs avec des pics de connexions."},
{id:248,category:"Microsoft Defender for Identity",question:"Comment MDI s integre-t-il avec Active Directory pour surveiller les Domain Controllers ?",options:["MDI necessite un agent sur chaque VM","MDI Sensor: un sensor leger installe directement sur chaque Domain Controller (pas un agent lourd). Le sensor analyse le trafic reseau du DC (Kerberos, NTLM, LDAP, DNS, RPC) en temps reel sans impact notable sur les performances. Le sensor envoie les metadonnees (pas les paquets complets) vers le service MDI dans le cloud Azure. Coverage: chaque DC doit avoir un sensor pour une visibilite complete. Aussi supporte: AD FS servers et AD CS servers (Certificate Services)","MDI utilise uniquement les logs Windows","MDI ne surveille pas les DCs on-premises"],answer:1,explanation:"MDI coverage requirements: si un DC n a pas de sensor MDI, les authentifications qui se passent sur ce DC ne sont pas surveillees. Attack scenario: si un attaquant utilise un DC sans sensor pour ses mouvements lateraux -> MDI ne voit rien. Deployment: installer le sensor sur TOUS les DCs (primaires et RODCs). MDI Capacity planning: le sensor utilise typiquement 5-10% CPU et 1-2 GB RAM sur un DC. Tester sur un DC non-critique d abord. Health alerts: MDI alerte si un sensor est offline ou ne recoit plus de donnees."},
{id:249,category:"Microsoft Sentinel",question:"Comment creer des 'Custom Threat Intelligence Indicators' dans Sentinel et quelle est leur duree de vie ?",options:["Seuls les feeds automatiques peuvent creer des IOCs","Custom IOCs dans Sentinel via Threat Intelligence: 1) Dans Sentinel -> Threat Intelligence -> Add Indicator, 2) Renseigner: type (IP, domain, URL, file hash, email), valeur, confiance (0-100), severite, tags, date d expiration. Disponibles immediatement dans ThreatIntelligenceIndicator table. Duree: configurez une date d expiration (recommande: 90 jours pour les IOCs dynamiques, 1 an pour les IOCs persistants). Mis a jour: possibilite d update ou de revocation d un IOC","Les IOCs durent indefiniment","Custom IOCs uniquement via API"],answer:1,explanation:"Custom IOC workflow: votre equipe TI interne identifie un IOC lors d une investigation (IP attaquante, domaine C2, hash malware) -> ajouter immediatement dans Sentinel TI -> toutes les regles TI Matching vont comparer cet IOC avec les logs futurs (et retroactivement sur le lookback period des regles). Expiration: les IOCs de phishing expirent vite (les attaquants changent d infrastructure) -> 30-90 jours. Les IOCs APT (infrastructure stable) -> 1 an. IOC confidence: 100 = certainement malveillant, 50 = suspect, 25 = potentiellement malveillant."},
{id:250,category:"Microsoft Defender for Endpoint",question:"Comment configurer les 'Attack Surface Reduction' ASR rules dans MDE pour bloquer les techniques d'attaque communes ?",options:["ASR regles ne sont pas configurables","ASR Rules: 32+ regles qui bloquent des techniques d attaque specifiques. Exemples critiques: Block Office applications from creating executable content (stoppe les macros malveillantes), Block all Office applications from creating child processes (stoppe les macros qui lancent cmd.exe), Block execution of potentially obfuscated scripts (stoppe PowerShell obfusque), Use advanced protection against ransomware (protection comportementale). Modes: Audit (log sans bloquer), Warn (avertir l utilisateur), Block (bloquer). Deployer via Intune ou Group Policy","ASR regles bloquent tous les programmes","ASR uniquement pour Windows 11"],answer:1,explanation:"ASR deployment strategy: commencer en mode Audit pour voir l impact sur les workflows metier (certaines regles peuvent bloquer des applications legitimes). Analyser les logs ASR dans Defender for Cloud -> Advanced Hunting -> DeviceEvents | where ActionType startswith 'AsrBlocked'. Identifier les faux positifs -> ajouter des exclusions pour les applications legitimes. Passer en Block progressivement regle par regle. Regles les plus importantes: Block Office from creating child processes + Block execution of scripts + Block credential stealing from LSASS. Ces 3 regles seules bloquent une majorite des techniques d attaque courantes."}
];

const SC100_QUESTIONS = [
{id:201,category:"Zero Trust",question:"Scénario: Une entreprise veut migrer vers le Zero Trust. Par où commencer selon le Zero Trust Deployment Center Microsoft ?",options:["Commencer par le réseau","Commencer par l'Identité - c'est le nouveau périmètre. Sécuriser Azure AD (MFA, Conditional Access, Identity Protection) avant tout autre pilier","Commencer par les données","Commencer par les endpoints"],answer:1,explanation:"Microsoft recommande de commencer par l'Identité car c'est le socle de Zero Trust. Sans identité forte, les autres contrôles sont inefficaces. Déployer MFA (objectif >99% des utilisateurs), puis Conditional Access, puis SSPR, Identity Protection."},
{id:202,category:"Zero Trust",question:"Qu'est-ce que le modèle 'Never Trust, Always Verify' et comment diffère-t-il du modèle périmétrique traditionnel ?",options:["Ils sont identiques","Périmétrique: confiance implicite dans le réseau interne (castle-and-moat). Zero Trust: chaque requête d'accès est vérifiée explicitement (identité, appareil, localisation, risque) indépendamment de la localisation réseau","Zero Trust est plus simple","Le modèle périmétrique est plus sécurisé"],answer:1,explanation:"Le modèle périmétrique assume que tout ce qui est dans le réseau interne est de confiance. Zero Trust abandonne cette notion: chaque accès est vérifié (MFA, conformité appareil, politique CA) que l'utilisateur soit au bureau ou en remote."},
{id:203,category:"Zero Trust",question:"Quelles sont les 6 piliers du framework Zero Trust Microsoft ?",options:["Réseau, Firewall, VPN, Antivirus, SIEM, Backup","Identité, Endpoints, Applications, Données, Infrastructure, Réseau - chacun avec ses propres contrôles et principes Zero Trust","Prévention, Détection, Réponse, Récupération, Audit, Formation","Azure AD, MDE, MDC, MDCA, Purview, Sentinel"],answer:1,explanation:"Les 6 piliers Zero Trust Microsoft: Identité (Azure AD, MFA, CA), Endpoints (MDE, Intune, compliance), Applications (MCAS, app protection), Données (Purview, classification, DLP), Infrastructure (Defender for Cloud, JIT), Réseau (segmentation, Azure Firewall, Private Link)."},
{id:204,category:"Zero Trust",question:"Comment implémenter le Zero Trust pour les accès des utilisateurs distants/WFH sans VPN traditionnel ?",options:["Maintenir le VPN existant","Utiliser Azure AD Application Proxy (pour apps internes), Microsoft Entra Private Access (ZTNA), et Conditional Access pour accès conditionnel basé sur risque/conformité appareil - sans VPN","Acheter un VPN plus puissant","Limiter le travail à distance"],answer:1,explanation:"L'approche Zero Trust remplace le VPN par: Azure AD Application Proxy (apps web internes), Entra Private Access/ZTNA (accès granulaire aux apps privées), Conditional Access (vérification continue), et MFA (sans réseau de confiance). Plus sécurisé et meilleure expérience utilisateur."},
{id:205,category:"Zero Trust",question:"Scénario: Un employé travaille depuis un café avec son PC personnel (non géré). Quelle politique Zero Trust appliquer ?",options:["Bloquer tout accès","Accès conditionnel: autoriser uniquement les applications approuvées avec session limitée (pas de download), exiger MFA, appliquer contrôles de session MDCA (pas d'impression, watermark documents), pas d'accès aux apps sensibles","Autoriser l'accès complet si MFA","Exiger retour au bureau"],answer:1,explanation:"Pour appareil non géré depuis réseau non fiable: CA Policy exige MFA + évalue le risque de connexion. L'accès est limité aux apps web via un proxy (session control MDCA): pas de téléchargement, watermarking des documents. Les apps sensibles nécessitent un appareil conforme."},
{id:206,category:"Zero Trust",question:"Qu'est-ce que la 'Continuous Access Evaluation' (CAE) et comment contribue-t-elle au Zero Trust ?",options:["Une évaluation annuelle de la posture Zero Trust","CAE permet une révocation immédiate des tokens d'accès (sans attendre l'expiration) quand des événements critiques surviennent (compte désactivé, IP bloquée, changement de mot de passe), renforçant l'évaluation continue","Un audit des politiques CA","Un outil de reporting Zero Trust"],answer:1,explanation:"CAE brise la limitation des tokens OAuth (qui durent 1h par défaut). Avec CAE, Azure AD peut signaler aux applications (Exchange, SharePoint) des événements critiques (compte désactivé, session risquée) et les apps révoquent l'accès en quelques secondes, pas après 1h."},
{id:207,category:"Zero Trust",question:"Quel est le rôle de la conformité des appareils (device compliance) dans une architecture Zero Trust ?",options:["La conformité des appareils est optionnelle","La conformité (gérée via Intune) est une condition d'accès dans Conditional Access: seuls les appareils répondant aux critères (chiffrement, AV à jour, patches, PIN) peuvent accéder aux ressources sensibles","La conformité s'applique uniquement aux mobiles","La conformité remplace MFA"],answer:1,explanation:"La conformité appareil est un pilier Zero Trust: Intune évalue continuellement si un appareil respecte les politiques (BitLocker, AV activé, OS à jour, jailbreak détecté). Conditional Access peut bloquer ou limiter l'accès aux appareils non conformes, réduisant le risque de compromission."},
{id:208,category:"Zero Trust",question:"Qu'est-ce que 'Microsoft Entra Internet Access' (anciennement Global Secure Access) ?",options:["Un VPN premium Azure","Une solution SSE (Security Service Edge) qui sécurise l'accès aux services Internet et Microsoft 365 via le réseau Microsoft Global Secure Access avec filtrage de contenu, TLS inspection, et contrôles d'accès","Un service DNS sécurisé","Un proxy d'entreprise classique"],answer:1,explanation:"Microsoft Entra Internet Access est la composante Internet du SSE Microsoft (Security Service Edge). Il route le trafic Internet des utilisateurs via le réseau Microsoft pour appliquer: Secure Web Gateway, filtrage de contenu, protection contre les menaces, et identity-aware proxy."},
{id:209,category:"Zero Trust",question:"Scénario: Comment Zero Trust s'applique-t-il aux comptes de service et aux accès machine-à-machine ?",options:["Zero Trust ne s'applique pas aux comptes de service","Via les Managed Identities (pas de credentials à gérer), les Workload Identities (fédération OIDC), Conditional Access pour Workload Identities, et le moindre privilège (RBAC granulaire)","Via des comptes partagés","Via des VPNs dédiés pour les services"],answer:1,explanation:"Zero Trust pour les identités machine: 1) Managed Identities (élimine les credentials), 2) Workload Identity Federation (pour CI/CD), 3) Conditional Access pour workload identities (évaluer le risque), 4) Moindre privilège strict, 5) Rotation automatique des secrets via Key Vault."},
{id:210,category:"Zero Trust",question:"Quel est le concept de 'blast radius' dans Zero Trust et comment le minimiser ?",options:["La puissance d'une explosion physique","L'étendue des dommages potentiels si une identité/ressource est compromise. Minimiser via: segmentation réseau, RBAC granulaire, JIT access, PAM, et isolation des workloads critiques","La superficie d'un datacenter","L'impact d'une panne réseau"],answer:1,explanation:"Le blast radius est l'étendue maximale de l'impact si un composant est compromis. Zero Trust le minimise via: micro-segmentation (attaquant ne peut pas se déplacer librement), moindre privilège (compromis d'un compte = accès limité), JIT (accès expirent), et isolation des workloads critiques."},
{id:211,category:"Zero Trust",question:"Qu'est-ce que le 'Zero Trust Network Access' (ZTNA) comparé à un VPN ?",options:["ZTNA est identique à un VPN","VPN donne accès au réseau entier; ZTNA donne accès uniquement à des applications spécifiques validées (least privilege), avec vérification continue identité/appareil pour chaque session","ZTNA est moins sécurisé","VPN est plus moderne"],answer:1,explanation:"VPN traditionnel: une fois connecté au réseau, accès large à de nombreuses ressources. ZTNA (Zero Trust Network Access): accès granulaire app-par-app avec vérification continue, ségrégation complète entre apps, moins de surface d'attaque si une session est compromise."},
{id:212,category:"Zero Trust",question:"Comment intégrer les identités tierces (partenaires, sous-traitants) dans un modèle Zero Trust ?",options:["Créer des comptes internes pour tous les partenaires","Via Azure AD B2B External Identities: les partenaires utilisent leurs propres identités fédérées, soumises aux mêmes politiques Conditional Access que les internes, avec accès limité aux seules ressources nécessaires","Exclure les partenaires du Zero Trust","Via VPN partenaires dédié sans contrôles"],answer:1,explanation:"Azure AD B2B permet aux partenaires d'utiliser leurs identités (AAD, Google) soumises aux politiques CA de l'organisation hôte. Cross-tenant access settings permettent de configurer la confiance (MFA, device compliance) selon le niveau de partenariat."},
{id:213,category:"Zero Trust",question:"Scénario: Un RSSI demande une évaluation de maturité Zero Trust. Quel framework utiliser ?",options:["Créer son propre modèle","Le Zero Trust Maturity Model (CISA ou Microsoft) qui définit des niveaux de maturité (Traditional, Advanced, Optimal) par pilier (Identity, Devices, Network, Applications, Data, Automation)","L'ISO 27001 uniquement","Le NIST Cybersecurity Framework"],answer:1,explanation:"Le Zero Trust Maturity Model de CISA (version US) et le Zero Trust Assessment Tool de Microsoft permettent d'évaluer la maturité actuelle par pilier et identifier les prochaines étapes prioritaires pour progresser vers une architecture ZT optimale."},
{id:214,category:"Zero Trust",question:"Qu'est-ce que le concept de 'Workload Identity' dans Zero Trust ?",options:["L'identité d'un datacenter","Les identités des services/applications/automatisations (pas des humains): apps AAD, Managed Identities, Service Principals. Zero Trust les traite avec la même rigueur que les identités humaines (moindre privilège, vérification)","Les identités des employés en télétravail","Les identités des serveurs on-premises"],answer:1,explanation:"Les Workload Identities (apps, services, pipelines CI/CD) représentent des vecteurs d'attaque critiques. Zero Trust les traite rigoureusement: Managed Identities (no credentials), Federated credentials (OIDC), CA for Workload Identities, et RBAC granulaire sur les ressources accédées."},
{id:215,category:"Zero Trust",question:"Comment Zero Trust améliore-t-il la résilience face aux attaques ransomware ?",options:["Zero Trust ne protège pas contre les ransomwares","En limitant les mouvements latéraux (micro-segmentation), réduisant le blast radius (moindre privilège), détectant les comportements anormaux (UEBA, EDR), et protégeant les backups (accès séparé et isolé)","En chiffrant toutes les données","Via des backups fréquents uniquement"],answer:1,explanation:"Zero Trust contre les ransomwares: 1) Micro-segmentation limite la propagation, 2) Moindre privilège = moins de ressources accessibles, 3) EDR+UEBA détecte tôt les comportements ransomware, 4) MFA empêche la compromission initiale de compte, 5) Backups protégés par accès isolé."},
{id:216,category:"Zero Trust",question:"Qu'est-ce que 'Conditional Access What If' dans Azure AD ?",options:["Un outil de test de charge","Un outil de simulation qui permet de tester quelles politiques CA s'appliquent à un utilisateur/app/appareil/localisation donné, sans réellement affecter les accès","Un outil de reporting CA","Une fonctionnalité de troubleshooting des connexions"],answer:1,explanation:"CA What If simule les décisions d'accès conditionnel pour un scénario hypothétique (user X, app Y, appareil Z, pays W): montre quelles politiques s'appliqueraient et quel serait le résultat (accès/blocage/MFA requis). Essentiel pour tester avant déploiement."},
{id:217,category:"Zero Trust",question:"Scénario: La politique CA 'Require MFA for All Users' génère 500 demandes de support/semaine d'utilisateurs qui n'arrivent pas à se connecter. Comment améliorer sans baisser la sécurité ?",options:["Désactiver la politique","Implémenter Microsoft Authenticator (passwordless, push notifications), s'assurer de la bonne configuration SSPR, utiliser Named Locations pour le réseau d'entreprise (MFA satisfait), déployer Windows Hello","Exclure plus d'utilisateurs","Changer pour SMS uniquement"],answer:1,explanation:"Pour réduire la friction MFA: 1) Microsoft Authenticator passwordless (plus simple), 2) Windows Hello for Business (transparent en entreprise), 3) Named Locations (pas de MFA sur réseau corporatif de confiance), 4) MFA Registration Campaign, 5) Formation utilisateurs."},
{id:218,category:"Zero Trust",question:"Qu'est-ce que 'Microsoft Entra Permissions Management' (Cloud Infrastructure Entitlement Management / CIEM) ?",options:["Un gestionnaire de licences Azure","Une solution CIEM qui découvre et remède aux permissions excessives dans les environnements multi-cloud (Azure, AWS, GCP), implémentant le moindre privilège à grande échelle","Un outil RBAC Azure standard","Un gestionnaire de politiques Azure"],answer:1,explanation:"Entra Permissions Management (anciennement CloudKnox) analyse toutes les permissions accordées vs utilisées dans Azure, AWS et GCP, identifie les identités surprivilégiées, et recommande des politiques de moindre privilège. C'est du CIEM (Cloud Infrastructure Entitlement Management)."},
{id:219,category:"Zero Trust",question:"Quel est le rôle de Microsoft Intune dans le pilier 'Endpoints' du Zero Trust ?",options:["Intune est uniquement un MDM basique","Intune gère et évalue la conformité des endpoints (Windows, macOS, iOS, Android), fournit l'état de conformité à Conditional Access, déploie les politiques de sécurité, et protège les données d'entreprise sur appareils personnels (MAM)","Intune remplace les GPO Active Directory","Intune est pour les mobiles uniquement"],answer:1,explanation:"Intune dans Zero Trust: enrôle et gère les appareils (MDM), évalue la conformité (chiffrement, AV, patches), rapporte à Conditional Access pour décisions d'accès, déploie MDE, gère les apps et politiques de protection (MAM), et protège les données sur BYOD sans MDM complet."},
{id:220,category:"Zero Trust",question:"Comment implémenter le Zero Trust pour l'accès aux bases de données cloud ?",options:["VPN + username/password","Managed Identity pour les apps (pas de credentials SQL), Azure AD authentication pour les bases de données, Private Endpoints (pas d'accès Internet), JIT pour les accès admin humains, Always Encrypted pour les données sensibles","Username/password dans Key Vault","IP allowlisting uniquement"],answer:1,explanation:"Zero Trust pour les BDD: 1) Managed Identity (app→DB sans credentials), 2) Azure AD authentication (MFA, CA), 3) Private Endpoints (accès réseau privé), 4) JIT DBA access (accès admin temporaire), 5) Always Encrypted (chiffrement côté client), 6) Advanced Threat Protection (détection anomalies)."},
{id:221,category:"Architecture de Sécurité",question:"Scénario: Une entreprise finance veut architecturer Azure pour séparer les environnements Prod/Dev/Test tout en centralisant la sécurité. Quelle est l'approche recommandée ?",options:["Tout dans le même abonnement","Hiérarchie Management Groups: Root MG → Platform MG → Landing Zones (Prod, Dev, Test) avec politiques et RBAC héritées, hub-and-spoke réseau, workspace Sentinel centralisé","Un abonnement par environnement sans règles communes","Azure Stack pour tous les environnements"],answer:1,explanation:"L'architecture Landing Zone (CAF): Management Groups pour la gouvernance hiérarchique, abonnements séparés par environnement, VNet hub-and-spoke (prod/dev/test dans spoke, services partagés dans hub: Firewall, Bastion, Sentinel), Azure Policy pour les guardrails, RBAC hérité."},
{id:222,category:"Architecture de Sécurité",question:"Qu'est-ce que le 'Microsoft Cloud Adoption Framework (CAF)' Security perspective ?",options:["Un framework de migration réseau","Un ensemble de bonnes pratiques, outils et guides pour planifier et implémenter une stratégie de sécurité lors de l'adoption cloud, couvrant: posture, protection, détection, réponse","Un standard de certification cloud","Un outil de migration de données"],answer:1,explanation:"Le CAF Security dans Microsoft couvre: Establish Security Baseline, Protect (contrôles préventifs), Detect (SIEM/SOAR), Respond (IR), et la posture de sécurité. Il guide les organisations à chaque étape de la maturité cloud security."},
{id:223,category:"Architecture de Sécurité",question:"Scénario: Architecture d'une application web B2C à haute disponibilité. Quels composants de sécurité inclure ?",options:["Uniquement un certificat SSL","Azure Front Door (DDoS global + WAF), Azure AD B2C (auth sécurisée), Azure App Service avec managed identity, Azure SQL avec private endpoint + Advanced Threat Protection, Key Vault (secrets), Defender for App Service","Uniquement un NSG","VPN + Load Balancer"],answer:1,explanation:"Architecture sécurisée app B2C: Front Door+WAF (DDoS, OWASP), Azure AD B2C (auth), App Service+Managed Identity (pas de credentials), Azure SQL Private Endpoint (pas d'accès Internet DB), ATD SQL, Key Vault, Application Insights, Defender for Cloud monitoring."},
{id:224,category:"Architecture de Sécurité",question:"Qu'est-ce que le 'Secure DevOps' ou 'DevSecOps' et ses pratiques clés ?",options:["Ajouter des tests de sécurité uniquement en fin de projet","Intégrer la sécurité à chaque étape du cycle DevOps: Threat Modeling (design), SAST/IaC scanning (code), SCA (dépendances), DAST (tests), signature d'images (release), CSPM (prod), monitoring runtime","Créer une équipe sécurité séparée de DevOps","Uniquement des scans antivirus sur le code"],answer:1,explanation:"DevSecOps shift-left: Threat Modeling en conception, SAST (Semgrep, CodeQL) + IaC scanning (Checkov, Terrascan) dans le pipeline, SCA pour les dépendances vulnérables, container scanning, signing, CSPM en production, et feedback security vers les développeurs."},
{id:225,category:"Architecture de Sécurité",question:"Comment architecturer une solution de sécurité pour un environnement OT/ICS (Operational Technology) avec Azure ?",options:["Appliquer les mêmes contrôles qu'un environnement IT classique","Utiliser Microsoft Defender for IoT pour la surveillance passive OT, architecture à air gap ou DMZ stricte entre OT/IT, Purdue Model pour la segmentation, monitoring des protocoles industriels (Modbus, DNP3)","Connecter l'OT directement à Internet pour les mises à jour","Ignorer la sécurité OT (systèmes isolés)"],answer:1,explanation:"La sécurité OT/ICS nécessite: Microsoft Defender for IoT (surveillance passive, pas d'impact sur les systèmes critiques), segmentation stricte OT/IT (DMZ, purdue model), protocoles industriels identifiés, accès uniquement via jumpserver, et plans de patch spéciaux (maintenances planifiées)."},
{id:226,category:"Architecture de Sécurité",question:"Quel est le concept de 'Segmentation' dans l'architecture de sécurité Microsoft et ses niveaux ?",options:["La segmentation n'est plus nécessaire en cloud","Plusieurs niveaux: 1) Organisation (Management Groups), 2) Abonnement (isoler workloads), 3) Resource Group, 4) VNet/Subnet, 5) NSG/ASG, 6) Application (code-level)","Uniquement la segmentation réseau","La segmentation est une responsabilité Microsoft"],answer:1,explanation:"Microsoft recommande une segmentation multi-niveaux: Management Groups (policies et accès), Subscriptions (blast radius), Resource Groups (lifecycle), VNets/Subnets (isolation réseau), NSG/ASG (micro-segmentation), et code-level (application boundaries). Chaque niveau ajoute une couche de confinement."},
{id:227,category:"Architecture de Sécurité",question:"Scénario: Vous devez architecturer une solution pour une startup qui veut aller vite mais être sécurisée dès le départ. Quelles priorités ?",options:["La sécurité peut attendre la croissance","1) Azure AD (MFA, Conditional Access), 2) Defender for Cloud free (CSPM baseline), 3) Key Vault (pas de secrets en clair), 4) HTTPS partout, 5) Least privilege RBAC, 6) Backups testés, 7) Logs centralisés - toutes ces mesures sont gratuites ou peu coûteuses","Uniquement un bon pare-feu","Tout externaliser à un MSSP"],answer:1,explanation:"Pour une startup, les fondamentaux à faible coût: MFA sur tous les comptes (Azure AD Free), RBAC least privilege, Key Vault (coût minimal), HTTPS/TLS partout (Let's Encrypt), Defender for Cloud free (recommandations), Azure Monitor (logs gratuits de base), et backups réguliers testés."},
{id:228,category:"Architecture de Sécurité",question:"Qu'est-ce que le 'Security Control Framework' Microsoft et comment l'utiliser pour une évaluation ?",options:["Un outil de scanning de vulnérabilités","Microsoft Cybersecurity Reference Architecture (MCRA) + Azure Security Benchmark (ASB) fournissent un ensemble de contrôles de référence permettant d'évaluer la posture de sécurité d'une organisation et identifier les gaps","Un référentiel de certification","Un outil de monitoring"],answer:1,explanation:"L'ASB (Azure Security Benchmark) est le cadre de contrôles de sécurité Microsoft mappe avec NIST, CIS, ISO 27001. Il couvre: Network Security, Identity Management, Privileged Access, Data Protection, Asset Management, Logging, IR, Posture Management avec des contrôles spécifiques Azure."},
{id:229,category:"Architecture de Sécurité",question:"Scénario: Une acquisition d'entreprise nécessite l'intégration de deux tenants Azure AD. Quelles options sécurité ?",options:["Créer de nouveaux comptes pour tout le monde","Options: B2B Guest Accounts (rapide, accès limité), Cross-tenant synchronization (sync bidirectionnelle), External Identities avec Cross-tenant Access Settings (contrôle fin de confiance MFA/devices), ou migration Azure AD Connect (long terme)","Fusionner les tenants immédiatement","Ignorer l'intégration et garder deux systèmes séparés"],answer:1,explanation:"Pour une acquisition: à court terme, B2B External Identities avec Cross-tenant Access Settings (confiance MFA, device compliance). À moyen terme, Cross-tenant Synchronization. À long terme potentiellement migration tenant. Chaque option a des implications sécurité différentes."},
{id:230,category:"Architecture de Sécurité",question:"Qu'est-ce que la 'Defense in Depth' appliquée à Azure ?",options:["Utiliser uniquement Azure Firewall","Couches superposées: Physique (Microsoft gère), Identité (Azure AD/MFA), Périmètre (DDoS, Firewall), Réseau (NSG, VNet), Compute (MDE, patching), Application (WAF, APIM), Données (chiffrement, classification) - chaque couche compensant les failures des autres","Un seul contrôle très puissant","Uniquement la sécurité réseau"],answer:1,explanation:"Defense in depth sur Azure: Datacenter physique (Microsoft) → DDoS+Firewall périmètre → NSG/UDR réseau → MDE+patching compute → WAF+App GW applicatif → Azure AD+MFA identité → Key Vault+chiffrement données. Si une couche est contournée, les autres maintiennent la protection."},
{id:231,category:"Architecture de Sécurité",question:"Comment architecturer un accès hautement sécurisé pour des super-administrateurs Azure (Tier 0) ?",options:["Compte admin normal avec MFA","Stations d'administration dédiées (SAW/PAW) - machines physiques ou VMs isolées sans accès Internet/email, Azure Bastion pour l'accès, comptes admin Tier 0 uniquement dans PIM avec activation JIT, monitoring strict et alertes sur chaque utilisation","Accès depuis n'importe où avec MFA","VPN dédié admin"],answer:1,explanation:"Accès Tier 0 (contrôleurs de domaine, Azure Global Admin): PAW dédiée (Privileged Access Workstation) sans navigation web/email, comptes séparés (pas de compte admin partagé), PIM avec activation JIT + MFA résistant phishing + approbation, session enregistrée, alertes immédiates sur usage."},
{id:232,category:"Architecture de Sécurité",question:"Qu'est-ce que l'architecture 'Hub-and-Spoke' dans Azure et son impact sur la sécurité ?",options:["Une topologie réseau sans sécurité particulière","Hub VNet central avec services partagés (Firewall, Bastion, DNS, VPN/ExpressRoute) + Spoke VNets pour les workloads (peerings). Tout le trafic inter-spoke et Internet passe par le hub (inspection centralisée)","Une architecture microservices","Un modèle de gouvernance Azure"],answer:1,explanation:"Hub-and-Spoke pour la sécurité: Firewall central dans le hub inspecte tout le trafic (UDR force le routage), Bastion dans le hub pour l'accès admin sécurisé, DNS central dans le hub (contrôle DNS), ExpressRoute/VPN dans le hub (single point d'entrée réseau). Simplifie la gestion de sécurité."},
{id:233,category:"Architecture de Sécurité",question:"Quelle est la différence entre une architecture 'Shared Responsibility' et 'Full Sovereignty' dans le cloud Azure ?",options:["Termes identiques","Shared Responsibility: Microsoft gère la sécurité de l'infrastructure cloud, le client gère ses données/identités. Full Sovereignty: le client exige un contrôle total incluant ses propres clés (CMK), sa propre infrastructure (Azure Government, Sovereign Cloud), et des restrictions sur les accès Microsoft","Full Sovereignty est uniquement pour les gouvernements","Shared Responsibility n'existe pas en SaaS"],answer:1,explanation:"Shared Responsibility varie selon le service (IaaS/PaaS/SaaS). Les exigences de souveraineté maximale (secteurs critiques, gouvernements) nécessitent: Customer-Managed Keys (double key encryption), Sovereign Regions, Customer Lockbox, restrictions réseau (ExpressRoute, Private Endpoints), et audits de conformité renforcés."},
{id:234,category:"Architecture de Sécurité",question:"Scénario: Une banque veut déployer Azure avec exigences réglementaires DORA (Digital Operational Resilience Act). Quelle architecture ?",options:["Architecture Azure standard","Architecture haute résilience: multi-région active-active, Azure Availability Zones, RTO/RPO contractuels, testing de résilience (Chaos Engineering), gestion des tiers ICT (inventaire, évaluation risque fournisseurs), incident reporting DORA","Simple failover régional","Uniquement backup quotidien"],answer:1,explanation:"DORA impose aux institutions financières: gestion du risque ICT (gouvernance, continuité), testing de résilience (penetration testing, chaos engineering), incident reporting (dans 4h pour incidents majeurs), gestion des risques tiers ICT (concentration risk, exit strategies), et partage d'informations sur les menaces."},
{id:235,category:"Architecture de Sécurité",question:"Qu'est-ce que le concept de 'Security Guardrails' dans Azure Landing Zones ?",options:["Des protections physiques des datacenters","Des politiques Azure Policy et RBAC déployées automatiquement qui préviennent les configurations dangereuses (création de storage publics, VM sans disque chiffré, etc.) dans toute la hiérarchie de l'organisation","Des règles de pare-feu automatiques","Des outils de monitoring Azure"],answer:1,explanation:"Les Security Guardrails sont des Azure Policies avec effet Deny appliquées à la hiérarchie Management Groups. Ils empêchent proactivement les configurations non sécurisées (ex: interdire storage accounts publics, imposer le chiffrement, restreindre les régions) avant qu'elles ne soient créées."},
{id:236,category:"Architecture de Sécurité",question:"Comment architecturer la surveillance de sécurité (monitoring) dans un environnement Azure enterprise ?",options:["Chaque équipe gère ses propres logs","Architecture centralisée: workspace Log Analytics central (Sentinel), diagnostic settings sur toutes les ressources, Azure Monitor → Event Hubs → Sentinel (haute volumétrie), rétention tiered (interactive+archive), RBAC sur les tables de logs","Uniquement Azure Monitor","Export vers stockage sans analyse"],answer:1,explanation:"Architecture monitoring enterprise: 1) Workspace Sentinel central, 2) Azure Policy DeployIfNotExists pour forcer les diagnostic settings, 3) EventHub pour les logs haute volumétrie, 4) Rétention: 90 jours interactif + archive 7 ans, 5) Table-level RBAC, 6) Connecteurs multisources (Azure, M365, AWS)."},
{id:237,category:"Architecture de Sécurité",question:"Qu'est-ce que le 'Cloud Security Alliance (CSA) Cloud Controls Matrix (CCM)' ?",options:["Un outil de monitoring cloud","Un framework de contrôles de sécurité spécifique au cloud qui mappe avec ISO 27001, PCI DSS, NIST et d'autres standards, utilisé pour évaluer la sécurité des fournisseurs cloud et établir des exigences contractuelles","Un outil de migration cloud","Un standard de certification personnel"],answer:1,explanation:"Le CSA CCM est un cadre de contrôles cloud comprenant 17 domaines et 197 contrôles mappés avec les principaux standards (ISO 27001, NIST, PCI DSS, HIPAA, GDPR). Utilisé pour les due diligences de fournisseurs cloud et les questionnaires de sécurité (CAIQ)."},
{id:238,category:"Architecture de Sécurité",question:"Scénario: Vous devez concevoir la sécurité d'une architecture microservices sur AKS. Quels contrôles mettre en place ?",options:["Uniquement un NSG","Network Policies K8s (segmentation pods), Service Mesh (mTLS entre services, ex: Istio/Linkerd), RBAC K8s + Azure AD integration, OPA/Gatekeeper (admission control), Defender for Containers, secret management (Key Vault CSI Driver), image scanning (Defender), Pod Security Standards","Uniquement RBAC Azure","WAF uniquement"],answer:1,explanation:"Sécurité AKS microservices: Network Policies (micro-segmentation pods), Service Mesh Istio (mTLS inter-services, Zero Trust réseau dans le cluster), OPA Gatekeeper (policies admission: images signées, security contexts), Defender for Containers (runtime), Key Vault CSI Driver (secrets), RBAC AAD."},
{id:239,category:"Architecture de Sécurité",question:"Qu'est-ce que l'OWASP Top 10 et comment l'utiliser dans une architecture sécurisée ?",options:["Une liste des 10 meilleurs outils de sécurité","Les 10 risques de sécurité les plus critiques des applications web (injection, auth broken, XSS, etc.) publiés par l'OWASP, utilisés comme référence pour les revues de code, WAF rules, et tests de sécurité","Un framework de conformité","Un outil de scan de vulnérabilités"],answer:1,explanation:"OWASP Top 10 guide: règles WAF (Azure WAF inclut des rules OWASP), SAST scanning pour détecter les vulnérabilités dans le code, formation développeurs, tests de sécurité (DAST), et revues de code sécurité. Les règles OWASP v3.2 sont intégrées dans Azure WAF."},
{id:240,category:"Architecture de Sécurité",question:"Comment Microsoft Defender XDR (Extended Detection and Response) unifie-t-il les outils de sécurité Microsoft ?",options:["C'est uniquement un portail consolidé","XDR corrèle automatiquement les alertes de MDE, MDI, MDO365, MDCA, et Entra pour créer des incidents unifiés cross-domaines, avec investigation centralisée, chasse aux menaces unifié et réponse automatisée","XDR est un produit séparé à acheter","XDR remplace tous les produits individuels"],answer:1,explanation:"Microsoft Defender XDR (portail security.microsoft.com) corrèle les signaux de tous les produits Defender pour créer des incidents unifiés (ex: email phishing→endpoint compromis→identité volée→mouvement latéral vus comme un seul incident), avec hunt queries cross-tables et réponse centralisée."},
{id:241,category:"Identité et Accès",question:"Scénario: Votre organisation veut migrer de l'AD on-premises vers Azure AD (Entra ID) uniquement. Quels défis de sécurité ?",options:["Aucun défi particulier","Défis: 1) Applications dépendantes de Kerberos/NTLM (nécessitent Azure AD DS ou réécriture), 2) GPO → Intune policies, 3) Service accounts → Managed Identities, 4) Hash sync/PHS → passwordless, 5) Gestion du changement utilisateurs","Migration impossible","Azure AD ne supporte pas les applications on-premises"],answer:1,explanation:"Migration AD→AAD: apps Kerberos/NTLM nécessitent Azure AD DS ou modernisation. GPOs→Intune policies. Service accounts→Managed Identities. Authentification→passwordless MFA. Script ADMT pour migration comptes. Formation des admins sur le nouveau modèle d'identité."},
{id:242,category:"Identité et Accès",question:"Qu'est-ce que 'Microsoft Entra ID Governance' et ses composantes principales ?",options:["Un système de ticket IT","Une suite de fonctionnalités pour automatiser les cycles de vie d'accès: Entitlement Management (packages d'accès), Access Reviews (certifications), PIM (JIT admin), et Lifecycle Workflows (automatisation onboarding/offboarding)","Un outil de reporting RBAC","Un service d'audit des accès"],answer:1,explanation:"Entra ID Governance couvre: 1) Entitlement Management (packages d'accès + approbation + expiration), 2) Access Reviews (certifications périodiques des accès), 3) PIM (activation JIT des rôles), 4) Lifecycle Workflows (automatiser provisioning/deprovisioning lors entrée/départ). Ensemble, ils automatisent la gouvernance des accès."},
{id:243,category:"Identité et Accès",question:"Scénario: Un employé quitte l'entreprise. Comment automatiser la révocation de tous ses accès dans Azure AD ?",options:["Désactiver le compte manuellement","Lifecycle Workflows dans Entra Governance: déclenche automatiquement à la date de départ la désactivation du compte, révocation des sessions, suppression des groupes, archivage du mailbox, notification du manager, et suppression après 30 jours","Uniquement via PowerShell","L'IT doit tout faire manuellement"],answer:1,explanation:"Entra Lifecycle Workflows automatise le leaver process: trigger sur la date de départ (HR-driven), exécution: désactiver compte, révoquer sessions, retirer des groupes/teams, supprimer licences, archiver boîte mail, notifier manager, et programmer la suppression définitive après rétention."},
{id:244,category:"Identité et Accès",question:"Qu'est-ce que 'Federation' dans Azure AD et quand l'utiliser ?",options:["La synchronisation de hashes de mots de passe","La délégation de l'authentification à un Identity Provider externe (ADFS, Ping, Okta) via SAML/OIDC. Les credentials restent dans l'IdP externe. Utilisé quand les contraintes légales/politiques interdisent la synchronisation de hash","La synchronisation des groupes AD","La gestion des identités cloud uniquement"],answer:1,explanation:"La fédération AD (ADFS) délègue l'auth à l'IdP on-premises: les mots de passe ne quittent jamais l'AD on-premises. Utilisé pour les contraintes réglementaires strictes. Inconvénient: dépendance à l'infrastructure on-premises pour l'authentification cloud. La PHS (Password Hash Sync) est plus résiliente."},
{id:245,category:"Identité et Accès",question:"Qu'est-ce qu'Azure AD Certificate-Based Authentication (CBA) ?",options:["Un certificat SSL pour Azure AD","Une méthode d'authentification qui utilise des certificats X.509 (sur smart cards ou TPM) comme facteur d'authentification résistant au phishing, sans mot de passe, dans Azure AD","Un certificat pour les applications SAML","Un outil de gestion des PKI"],answer:1,explanation:"Azure AD CBA permet aux utilisateurs de s'authentifier avec des certificats X.509 (cartes à puce, certificats YubiKey) directement dans Azure AD sans infrastructure ADFS, satisfaisant les exigences gouvernementales PIV/CAC et offrant une authentification résistante au phishing."},
{id:246,category:"Identité et Accès",question:"Scénario: Un contrat d'acquisition nécessite de donner accès à 50 employés d'une entreprise acquise à vos ressources Azure pendant 6 mois. Quelle est la solution la plus sécurisée ?",options:["Créer 50 comptes locaux","Entitlement Management: créer un Access Package avec les ressources nécessaires, une politique d'assignation pour le domaine externe, durée de 6 mois avec expiration automatique, et revue d'accès mensuelle","Partager les credentials d'un compte générique","Créer un tenant séparé"],answer:1,explanation:"Entitlement Management est parfait: créer un package d'accès avec les groupes/apps nécessaires, politique permettant les utilisateurs du domaine externe (B2B), expiration automatique à 6 mois, révisions d'accès mensuelles. Les utilisateurs demandent l'accès, les managers approuvent, tout expire automatiquement."},
{id:247,category:"Identité et Accès",question:"Qu'est-ce que 'Hybrid Identity' et ses patterns d'authentification ?",options:["L'identité des utilisateurs hybrides (bureau+remote)","La coexistence AD on-premises et Azure AD avec 3 patterns: PHS (Password Hash Sync), PTA (Pass-Through Authentication), Federation (ADFS). PHS est recommandé pour la résilience; ADFS pour la souveraineté maximale","L'identité pour les applications hybrides uniquement","L'authentification multi-facteurs hybride"],answer:1,explanation:"L'identité hybride via Azure AD Connect offre 3 méthodes: PHS (hashes synchronisés, auth cloud autonome), PTA (agent on-prem valide le mot de passe en temps réel, aucun hash cloud), ADFS (fédération complète, 100% on-prem). Microsoft recommande PHS pour la résilience et les fonctionnalités (Identity Protection, Leaked Credentials)."},
{id:248,category:"Identité et Accès",question:"Comment protéger les comptes 'Break Glass' (Emergency Access) dans Azure AD ?",options:["Les stocker comme des comptes normaux","2+ comptes Break Glass: exemptés de toutes les politiques CA (pour urgences), clouds-only (pas hybrides), passwordless ou long random password, MFA via FIDO2 stockée dans coffre physique séparé, monitoring d'alertes sur utilisation, audit régulier","Un seul compte d'urgence","Les mêmes politiques que les autres admins"],answer:1,explanation:"Comptes Break Glass (Bris de Glace): créer 2+ comptes cloud-only non liés à une personne physique, exclure TOUTES les policies CA (pour briser le verre en urgence), credentials en coffre physique séparé, FIDO2 key dans coffre séparé, alertes d'audit sur chaque login, test mensuel sans utilisation."},
{id:249,category:"Identité et Accès",question:"Qu'est-ce que 'Token Theft' et comment s'en protéger dans Azure AD ?",options:["Le vol de tickets de cinéma numériques","Le vol de tokens d'accès OAuth/JWT (depuis navigateur, mémoire, proxy) permettant l'accès aux ressources sans mot de passe ni MFA. Protection via: Token Binding, CAE, Conditional Access + Compliant Device, réduire durée des tokens","Le vol de certificats","Un type d'attaque sur les APIs"],answer:1,explanation:"Token theft (vol de token): si l'attaquant vole un access token, il peut l'utiliser depuis n'importe où. Contre-mesures: 1) CAE (révocation quasi-temps réel), 2) Conditional Access compliant device (token lié à l'appareil), 3) Token Binding (en développement), 4) Sign-in frequency (tokens de courte durée)."},
{id:250,category:"Identité et Accès",question:"Scénario: Vous devez implémenter l'accès passwordless pour 2000 utilisateurs dans une grande entreprise. Quelle approche par étapes ?",options:["Déployer tout en une fois","1) Déployer Microsoft Authenticator (push MFA) comme premier pas, 2) Enrôler Windows Hello for Business pour les Windows 10/11 managés (transparent pour l'utilisateur), 3) Déployer FIDO2 pour les cas sans Windows Hello, 4) Créer policy CA Passwordless pour les apps sensibles","Uniquement FIDO2 keys","Attendre que les utilisateurs adoptent spontanément"],answer:1,explanation:"Roadmap passwordless: Authenticator App (easy déploiement via campagne MFA) → Windows Hello for Business (seamless sur Windows joints AAD) → FIDO2 pour cas particuliers (kiosques, shared devices, IT admin). CA Policies enforcer le passwordless pour les ressources sensibles progressivement."},
{id:251,category:"Réseau Sécurisé",question:"Scénario: Une application doit communiquer avec Azure SQL Database de façon sécurisée. Toutes les options comparées ?",options:["Connexion Internet publique avec TLS","Private Endpoint (accès réseau privé depuis VNet, pas d'accès Internet), Managed Identity (pas de SQL credentials), Azure AD authentication pour SQL, audit logs activés, Defender for SQL","Firewall SQL avec IP allowlist uniquement","VPN pour l'accès SQL"],answer:1,explanation:"Pour une connexion app→SQL sécurisée: Private Endpoint (SQL accessible via IP privée dans votre VNet uniquement), Managed Identity (pas de connectionstring avec password), AAD auth SQL (Conditional Access, MFA si admin), Always Encrypted (données chiffrées côté client), Transparent Data Encryption (au repos)."},
{id:252,category:"Réseau Sécurisé",question:"Qu'est-ce que 'Azure Network Security Perimeter' (NSP) ?",options:["Un pare-feu Azure avancé","Un nouveau service Azure qui crée un périmètre de sécurité réseau logique autour des ressources PaaS Azure (Key Vault, Storage, SQL) dans un même périmètre, simplifiant la gestion des accès réseau PaaS","Un NSG amélioré","Un service DDoS avancé"],answer:1,explanation:"Azure Network Security Perimeter crée un boundary réseau commun pour plusieurs ressources PaaS dans un même périmètre, permettant une gestion centralisée des accès réseau (quels VNets, quelles IPs publiques autorisés) à travers plusieurs services PaaS liés."},
{id:253,category:"Réseau Sécurisé",question:"Comment implémenter une architecture 'Air Gap' partielle dans Azure pour les workloads sensibles ?",options:["Impossible dans le cloud public","Via: Private Endpoints (PaaS sans accès Internet), NSG strict (aucun trafic Internet entrant/sortant), Azure Firewall (contrôle sortant), pas d'IP publique sur les VMs, Bastion pour l'accès admin, ExpressRoute (pas d'Internet VPN)","Uniquement Azure Stack","Uniquement une région dédiée"],answer:1,explanation:"Semi air-gap dans Azure: toutes les ressources en sous-réseaux sans IP publiques, Private Endpoints pour PaaS, Azure Firewall bloquant tout trafic Internet (FQDN allowlist minimal), ExpressRoute ou VPN pour accès corporatif uniquement, Azure Bastion pour administration, pas de peering vers réseaux non approuvés."},
{id:254,category:"Réseau Sécurisé",question:"Quel est le rôle des Application Security Groups (ASG) dans Azure NSG ?",options:["Une fonctionnalité WAF","Un groupement logique d'endpoints permettant d'écrire des règles NSG basées sur des groupes d'applications (ex: 'allow WebServers → AppServers on 8080') sans spécifier des IPs individuelles","Un service de monitoring réseau","Une alternative aux NSG"],answer:1,explanation:"Les ASG permettent de grouper les VMs par rôle (WebServer, AppServer, Database) et d'écrire des règles NSG utilisant ces groupes comme source/destination. Cela simplifie la gestion (ajout d'une VM à un ASG l'inclut automatiquement dans toutes les règles), indépendamment des IPs."},
{id:255,category:"Réseau Sécurisé",question:"Scénario: Votre entreprise connecte son datacenter on-premises à Azure. Quelle est la différence de sécurité entre VPN et ExpressRoute ?",options:["Ils sont identiques en sécurité","VPN: tunnel chiffré via Internet (IPsec), moins coûteux, disponible partout. ExpressRoute: connexion privée dédiée via fournisseur réseau (pas d'Internet), latence faible/prévisible, plus sécurisé car ne traverse pas Internet public","ExpressRoute est moins sécurisé","VPN est toujours préférable"],answer:1,explanation:"ExpressRoute est plus sécurisé car le trafic ne traverse pas Internet (connexion privée MPLS via partenaire telco). VPN IPsec chiffre le trafic sur Internet. Pour données très sensibles (banque, santé): ExpressRoute + MACsec pour chiffrement de couche 2. Les deux peuvent être utilisés ensemble pour la redondance."},
{id:256,category:"Réseau Sécurisé",question:"Qu'est-ce que 'Azure Route Server' et son utilité pour la sécurité ?",options:["Un serveur DNS Azure","Un service Azure qui permet à Azure Firewall ou une NVA (Network Virtual Appliance) d'échanger dynamiquement des routes BGP avec le réseau on-premises ou d'autres VNets, simplifiant les architectures réseau complexes","Un service de routage applicatif","Un équilibreur de charge Layer 4"],answer:1,explanation:"Azure Route Server permet à des NVAs tierces (Palo Alto, Fortinet) ou Azure Firewall d'annoncer dynamiquement des routes BGP aux VNets Azure et au réseau on-premises, éliminant les UDR statiques. Simplifie la centralisation de l'inspection de trafic dans les architectures hub-spoke."},
