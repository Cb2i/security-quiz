{id:1167,cat:"Reseau Azure",q:"Qu est-ce qu Azure Network Watcher et comment l utiliser pour la securite reseau ?",o:["Un outil de surveillance du reseau Azure uniquement","Azure Network Watcher: suite d outils de diagnostics et de monitoring reseau. Pour la securite: 1) NSG Flow Logs: capture tous les flux reseau (IP source, destination, port, action autorise/refuse) -> envoi vers Log Analytics/Sentinel, 2) Packet Capture: capturer les paquets sur une VM pour analyse forensique, 3) Connection Troubleshoot: tester si une connexion entre deux ressources est possible (et pourquoi si bloquee), 4) Topology: visualiser l architecture reseau","Network Watcher uniquement pour les performances","Network Watcher remplace Azure Firewall"],a:1,e:"NSG Flow Logs v2: activez sur tous les NSGs de production. Envoi vers Storage Account (archive pas cher) + Log Analytics (requetes en temps reel). Requetes Sentinel: AzureNetworkAnalytics_CL | where FlowType_s == 'ExternalPublic' | where FlowDirection_s == 'I' | summarize count() by DestIP_s, DestPort_d | order by count_ desc. Detecte: tentatives de connexion entrantes massives (scanning), connexions vers des ports inhabituels (post-compromission). Packet Capture: quand MDE detecte une activite reseau suspecte sur une VM -> lancer un Packet Capture via Network Watcher pour capturer les preuves."},
{id:1168,cat:"Gouvernance",q:"Comment implementer des politiques de tagging obligatoire sur les ressources Azure pour la gouvernance de securite ?",o:["Les tags sont optionnels dans Azure","Tags Azure Policy: 1) Azure Policy 'Require tag and its value': bloque la creation de ressources sans les tags obligatoires (ex: Environment, Owner, CostCenter, DataClassification). 2) Tag Inheritance: les ressources heritent automatiquement des tags de leur Resource Group (Policy Modify). 3) Compliance: le tableau de bord Azure Policy montre % des ressources conformes. 4) Securite: les tags permettent de filtrer les ressources par criticite pour appliquer des controles differencies","Les tags ne servent qu a la facturation","Les tags sont appliques automatiquement par Azure"],a:1,e:"Tags security value: un tag DataClassification=Sensitive sur un Storage Account permet: 1) Des regles Azure Policy differentes (ex: le Storage avec DataClassification=Sensitive doit obligatoirement avoir Private Endpoint), 2) Des politiques Defender for Cloud differentes (activer Defender for Storage uniquement sur les ressources sensibles pour optimiser les couts), 3) Des alertes Sentinel priorisees (incident sur une ressource DataClassification=Critical = P1 automatique). Tags sont la base de la securite basee sur les donnees dans Azure."},
{id:1169,cat:"Stockage Securise",q:"Comment configurer l audit et le monitoring des acces Azure SQL Database pour la conformite ?",o:["SQL Database n a pas de fonctionnalites d audit","Azure SQL Auditing: 1) Activer l audit au niveau serveur (couvre toutes les bases de donnees) ou base de donnees, 2) Destination: Log Analytics (requetes en temps reel), Azure Storage (archive long terme), Event Hub (streaming vers SIEM), 3) Events audites: connexions reussies et echouees, requetes SQL, acces aux objets, admin operations, 4) Defender for SQL: detection des anomalies en temps reel (SQL Injection, brute force, acces depuis localisation inhabituelle). Retention: 90 jours minimum (PCI DSS requis: 1 an)","SQL Database ne supporte pas l audit","L audit SQL ralentit les performances de 50%"],a:1,e:"SQL Audit + Sentinel: envoyer les logs SQL Audit vers Log Analytics -> creer des regles analytiques Sentinel: alerter si un utilisateur excute plus de 1000 requetes en 5 minutes (potentielle exfiltration de donnees), alerter si une erreur 'permission denied' est generee plus de 20 fois en 1 minute (tentative de privilege escalation). Defender for SQL Threat Detection: detecte les requetes SQL anormales (SQL Injection: WHERE 1=1, xp_cmdshell, encoded queries). Alerte immediate sans configuration de regles manuelles."},
{id:1170,cat:"Conteneurs/AKS",q:"Comment implementer le principe du moindre privilege dans un cluster AKS ?",o:["L administrateur du cluster a acces a tout par defaut","Least Privilege AKS: 1) Kubernetes RBAC: creer des Roles et RoleBindings granulaires (developpeur peut uniquement lire les pods de son namespace, pas modifier les secrets), 2) Azure RBAC pour Kubernetes: integration Azure AD (les groupes AD mappent sur les roles Kubernetes), 3) Pod Security Standards: Baseline ou Restricted (empeche les pods privilegies, les montages de volumes dangereux), 4) Workload Identity: les pods utilisent des Managed Identities avec des permissions minimales sur les services Azure, 5) Network Policies: chaque pod communique uniquement avec ce dont il a besoin","Dans AKS, tous les pods ont les memes droits","Le cluster admin est necessaire pour tous les deploiements"],a:1,e:"AKS RBAC example: equipe App = peut lire/modifier les Deployments et Services dans le namespace app (pas les Secrets). equipe Ops = peut modifier les ConfigMaps et surveiller les pods dans tous les namespaces. Pas d acces cluster-admin pour les devs. Pod Security Standards Restricted: empeche: runAsRoot, hostNetwork, hostPID, privileged containers, hostPath mounts. La plupart des applications legitimes fonctionnent avec Restricted. Exceptions documentees et approuvees pour les cas specifiques. OPA Gatekeeper: policies supplementaires pour enforcer les standards de securite specifiques a l organisation."},
{id:1171,cat:"Scénarios Avancés",q:"Comment mettre en place un programme de Vulnerability Management continu pour les ressources Azure ?",o:["Patcher les vulnerabilites une fois par an","VM Programme continu Azure: 1) Defender Vulnerability Management (MDVM): scan continu des VMs Azure, AWS, GCP, on-prem pour les vulnerabilites logicielles (OS, applications tierces), 2) Priorisation: MDVM priorise par risk score (exploit disponible? activement exploite? criticite de l actif?), 3) Remediation: Update Manager (patching automatise des VMs Azure), 4) Tracking: tableau de bord MDVM -> evolution du Exposure Score dans le temps, 5) SLA: vulnerabilites Critical = 24h, High = 7 jours, Medium = 30 jours","Lancer un scan trimestriel uniquement","Le Cloud est automatiquement patche par Microsoft"],a:1,e:"MDVM integration: MDVM alimente Defender for Cloud recommendations -> integration avec les ticketing systems (ServiceNow, Jira) pour assigner les patches aux equipes operationnelles. Metrics: Exposure Score (tend vers 0 = bonne posture), Top vulnerable software (Office 365, Chrome, etc.), Top recommended actions (MsHTML CVE = 500 machines affectees = priorite #1). Zero-day response: quand une CVE 0-day critique est publiee -> MDVM identifie immediatement les machines exposees -> alertes automatiques -> patch en 24h. Update Manager: planifier les fenetres de maintenance et appliquer les patches automatiquement."},
{id:1172,cat:"Azure AD/Entra ID",q:"Qu est-ce que Azure AD External Identities et comment securiser les acces des partenaires externes ?",o:["Les partenaires doivent creer des comptes dans votre tenant","External Identities B2B: les partenaires utilisent leur propre compte (Azure AD, Microsoft Account, Gmail) pour acceder a vos ressources via invitation. Securite: 1) Cross-tenant access settings: definir ce que les utilisateurs externes de quels tenants peuvent acceder, et avec quels conditions, 2) Conditional Access pour B2B: exiger MFA pour tous les invites externes (meme si leur tenant a MFA, vous pouvez re-exiger), 3) Entitlement Management Access Packages: acces temporaires et limites pour les partenaires, 4) Access Reviews: revue periodique des acces invites actifs","Les invites externes ne sont pas soumis aux politiques CA","Les partenaires ont toujours un acces complet"],a:1,e:"B2B Security model: quand un utilisateur Fabrikam (tenant externe) accede a votre SharePoint via B2B -> Azure AD verifie a la fois les politiques du tenant Fabrikam (leur MFA) et vos propres politiques (votre CA). MFA trust settings: vous pouvez faire confiance au MFA du tenant Fabrikam (ils utilisent Azure AD avec MFA = vous n avez pas besoin de re-demander). Access Packages: partenaire acces pendant 3 mois pour un projet -> acces expire automatiquement -> revue mensuelle. Audit: tous les acces B2B sont logues dans Azure AD Audit Logs."},
{id:1173,cat:"Reseau Azure",q:"Comment configurer Azure Front Door avec WAF pour proteger les applications web mondiales ?",o:["Front Door est uniquement un CDN","Azure Front Door + WAF: 1) Front Door = reseau mondial de PoP (Points of Presence) qui optimise le routage et absorbe les DDoS (Layer 3/4 par defaut), 2) WAF sur Front Door: protection OWASP Top 10, bot management, rate limiting, geo-filtering (bloquer des pays), custom rules (bloquer par IP, user agent, etc.), 3) Front Door Premium: Microsoft Managed Ruleset mis a jour automatiquement contre les nouvelles menaces, Private Link vers les backends (backend pas expose directement), 4) Analytics: logs WAF vers Log Analytics","Front Door ne peut pas filtrer les requetes web","WAF Front Door uniquement pour les grandes organisations"],a:1,e:"Front Door WAF configuration: 1) Mode Detection (log sans bloquer) pendant 1-2 semaines -> analyser les faux positifs dans les logs WAF, 2) Desactiver les regles qui generent des FP (ex: regle JSON encoding si votre app utilise JSON normalement), 3) Passer en mode Prevention (bloc). Custom rules: rate limiting par IP (max 100 requetes/minute/IP), geo-filtering (bloquer les pays sans clients), IP allow-list pour les endpoints admin. Bot management: bloquer les mauvais bots (scrapers, scanners) tout en permettant les bons bots (Googlebot)."},
{id:1174,cat:"Gouvernance",q:"Qu est-ce que Azure Policy et comment l utiliser pour enforcer les standards de securite ?",o:["Azure Policy est uniquement pour la conformite","Azure Policy: service qui cree, assigne et gere des politiques qui enforment des regles sur les ressources Azure. Types d effet: 1) Deny: bloque la creation si non-conforme (ex: Deny creation de VM avec adresse IP publique), 2) Audit: log si non-conforme sans bloquer (ex: Audit les Storage Accounts sans chiffrement), 3) DeployIfNotExists: deploye automatiquement une ressource si absente (ex: deployer l agent MDE si absent), 4) Modify: ajoute ou modifie des proprietes (ex: ajouter un tag automatiquement). Initiatives: regrouper plusieurs policies","Azure Policy uniquement pour les grandes organisations","Azure Policy ne peut pas creer des ressources automatiquement"],a:1,e:"Azure Policy security examples: 1) Deny creation de SQL Server avec authentification SQL seule (exiger Azure AD auth), 2) Deny creation de Storage Account sans HTTPS uniquement, 3) Deny creation de NSG qui autorise port 22 depuis Internet (0.0.0.0/0), 4) DeployIfNotExists l agent MDE sur toutes les VMs, 5) Audit les Key Vaults sans Soft Delete. Initiatives: Microsoft Defender CSPM fournit des initiatives pre-construites (CIS, NIST, PCI DSS). Remediation tasks: les ressources existantes non-conformes peuvent etre remediees via des taches de remediation automatiques."},
{id:1175,cat:"Scénarios Avancés",q:"Comment securiser les pipelines Azure DevOps CI/CD contre les attaques sur la chaine d approvisionnement ?",o:["Les pipelines CI/CD ne sont pas des vecteurs d attaque","Azure DevOps Security: 1) Agents auto-hosted: utiliser des agents ephemeres (crees et detruits pour chaque job) pour eviter la contamination entre pipelines, 2) Environments avec approbations: deploiements vers production necessitent une approbation manuelle, 3) Service Connections securisees: Managed Identity ou Federated Credentials (pas de secrets), 4) Secrets dans Key Vault (Azure Key Vault secrets dans les pipelines, jamais en dur), 5) Defender for DevOps: scan des IaC templates et du code avant deploiement, 6) Branch policies: exiger des PR reviews pour le code de production","Les pipelines CI/CD sont automatiquement securises","Les secrets dans les pipelines sont necessaires"],a:1,e:"Pipeline security attack scenario: un developpeur malveillant ou compromis pousse du code malveillant dans la branche main -> le pipeline CI/CD s execute automatiquement -> code malveillant deploye en production. Prevention: branch policies (minimum 2 reviewers obligatoires pour les PR vers main), pipeline environment approvals (un approbateur humain avant deploiement production), immutable artifacts (les packages deployes sont hashas et verifies), Service connections avec permissions minimales (le pipeline n a acces qu aux ressources specifiques necessaires, pas a tout le tenant)."}
];

const BESTPRACTICES_QUESTIONS = [
{id:2001,cat:"Fondamentaux Sécurité",q:"Qu'est-ce que la règle du 'Moindre Privilège' (Least Privilege Principle) ?",o:["Donner le minimum de permissions et les augmenter si besoin","Donner uniquement les accès strictement nécessaires à une entité (utilisateur, application, processus) pour accomplir sa tâche, ni plus. Réduire la surface d'attaque et le blast radius en cas de compromission","Donner des privilèges élevés aux utilisateurs expérimentés","Partager les comptes admin pour économiser les licences"],a:1,e:"Le principe du moindre privilège est le fondement de la sécurité: chaque entité reçoit uniquement ce dont elle a besoin pour fonctionner. Cela limite les dommages si une entité est compromise: un compte limité compromis = peu de dommages vs un admin compromis = désastre."},
{id:2002,cat:"Fondamentaux Sécurité",q:"Expliquez la 'Défense en Profondeur' (Defense in Depth) avec un exemple concret ?",o:["Un seul contrôle de sécurité très fort","Plusieurs couches de contrôles indépendants: firewall périmétrique + NSG réseau + EDR endpoint + authentification forte + chiffrement données + logs d'audit. Si une couche est contournée, les suivantes maintiennent la protection. Aucun contrôle unique n'est parfait","Sauvegardes multiples uniquement","Redondance hardware"],a:1,e:"Defense in Depth concrète: Attaquant essaie d'accéder à une BDD: FW bloque IP (1), WAF bloque SQLi (2), Auth requiert MFA (3), Least Privilege limite l'accès à la table (4), Audit log détecte la tentative (5), Encryption rend les données illisibles même si extraites (6). Chaque couche ajoute un obstacle indépendant."},
{id:2003,cat:"Fondamentaux Sécurité",q:"Qu'est-ce que la 'CIA Triad' (Confidentialité, Intégrité, Disponibilité) ?",o:["Un modèle de classification des incidents","Les trois piliers fondamentaux de la sécurité de l'information: Confidentialité (données accessibles uniquement aux autorisés), Intégrité (données exactes et non altérées), Disponibilité (systèmes et données accessibles quand nécessaire). Un incident affecte un ou plusieurs de ces piliers","Un framework de conformité","Un outil de risk management"],a:1,e:"CIA Triad: Confidentialité (chiffrement, contrôle d'accès), Intégrité (signatures numériques, hashing, contrôle de version), Disponibilité (redondance, backup, DDoS protection). Un ransomware affecte les 3 (chiffre les données = conf, modifie = intégrité, bloque accès = dispo). Les contrôles de sécurité protègent un ou plusieurs de ces aspects."},
{id:2004,cat:"Fondamentaux Sécurité",q:"Quelle est la différence entre une vulnérabilité, une menace et un risque en sécurité ?",o:["Ce sont des termes identiques","Vulnérabilité = faiblesse exploitable (ex: patch manquant). Menace = acteur ou événement pouvant exploiter la vulnérabilité (ex: attaquant, malware). Risque = probabilité × impact d'un incident. Risque = Menace × Vulnérabilité × Impact. Un risque nécessite les trois composants","La menace est la plus importante","La vulnérabilité n'existe que si exploitée"],a:1,e:"Risk = Threat × Vulnerability × Asset Value. Exemple: Serveur web non patché (vulnérabilité) + groupe de hackers connu ciblant cette vulnérabilité (menace) + serveur héberge données clients (valeur) = risque ELEVÉ. Gérer le risque: patcher (éliminer la vuln), isoler (réduire la menace), chiffrer (réduire l'impact)."},
{id:2005,cat:"Fondamentaux Sécurité",q:"Qu'est-ce que l'authentification Multi-Facteurs (MFA) et pourquoi est-elle considérée comme le contrôle de sécurité le plus impactant ?",o:["Un complément optionnel à la sécurité","La combinaison d'au moins 2 facteurs d'authentification de catégories différentes: quelque chose que vous savez (mot de passe), avez (téléphone/hardware token), ou êtes (biométrie). MFA bloque 99.9% des attaques automatisées selon Microsoft. C'est le contrôle ROI le plus élevé","Un remplacement du mot de passe","Un contrôle uniquement pour les admins"],a:1,e:"MFA est le meilleur rapport coût/efficacité en sécurité: déploiement simple, coût faible, et bloque 99.9% des attaques sur les comptes (force brute, credential stuffing, phishing classique). Même si le mot de passe est compromis (HaveIBeenPwned), le 2e facteur protège le compte."},
{id:2006,cat:"Fondamentaux Sécurité",q:"Qu'est-ce que le 'Security by Design' et ses principes OWASP ?",o:["Ajouter la sécurité après développement","Intégrer la sécurité dès la conception: Threat Modeling en design, revues de sécurité du code, OWASP ASVS comme standard, test de sécurité (SAST/DAST/pen test) avant production. Évite le 'security debt' coûteux à corriger après. Principes: Fail Secure, Least Privilege, Separation of Duties, Defense in Depth","Des certifications obligatoires","Un audit annuel de sécurité"],a:1,e:"Security by Design est économique: corriger une vuln en conception = 1x, en développement = 10x, en production = 100x. Principes: Secure Defaults (sécurisé par défaut), Fail Secure (erreur = état sécurisé), Least Privilege, Separation of Duties, Defense in Depth, Don't trust services, Avoid security by obscurity."},
{id:2007,cat:"Fondamentaux Sécurité",q:"Qu'est-ce que la 'Separation of Duties' (séparation des tâches) et son importance ?",o:["Diviser les tâches pour plus d'efficacité","Aucune personne ne doit avoir suffisamment de droits pour accomplir seule une action critique ou frauduleuse. Ex: la personne qui approve les paiements ne peut pas les initier. En IT: les développeurs n'ont pas accès à la production, les admins sécurité ne peuvent pas supprimer les logs","Une procédure RH","Une règle de facturation"],a:1,e:"Separation of Duties en IT: développeurs codent (pas d'accès prod), operations déploient (pas de droits code), sécurité monitore (pas de droits modification). Cela force la collusion pour une fraude et détecte les erreurs. En Azure: PIM pour les rôles privilégiés, rôles différents pour les équipes DevOps et Security."},
{id:2008,cat:"Fondamentaux Sécurité",q:"Qu'est-ce qu'un 'Security Posture' et comment le mesurer ?",o:["La posture physique des agents de sécurité","L'état global de la sécurité d'une organisation: ensemble des contrôles, processus et politiques de sécurité en place. Mesurable via: Secure Score (Azure/M365), nombre de vulnérabilités ouvertes, MTTD/MTTR, taux de conformité, résultats de pen tests, et couverture des contrôles vs framework (CIS, NIST)","La taille de l'équipe sécurité","Le budget sécurité"],a:1,e:"Security Posture se mesure avec: Microsoft Secure Score (1-100%), Defender for Cloud Secure Score (CSPM), CVSS scores des vulnérabilités non patchées, couverture MFA (% utilisateurs MFA), MTTD/MTTR incidents, résultats de pen tests, et conformité aux frameworks (% contrôles conformes). Un tableau de bord CISO combine ces métriques."},
{id:2009,cat:"Fondamentaux Sécurité",q:"Quelle est la différence entre chiffrement symétrique et asymétrique ?",o:["Ils sont identiques","Symétrique: une seule clé pour chiffrer ET déchiffrer (AES-256, rapide, bon pour les volumes). Asymétrique: paire clé publique (chiffrement)/privée (déchiffrement), RSA/ECC, plus lent mais résout le problème de distribution de clés. En pratique: asymétrique pour échanger une clé symétrique (TLS handshake), puis symétrique pour les données","Symétrique est plus sécurisé","Asymétrique est obsolète"],a:1,e:"TLS combine les deux: handshake asymétrique (RSA/ECDHE) pour authentification et échange de clé de session, puis chiffrement symétrique AES-GCM pour les données (performance). S/MIME emails: chiffrement asymétrique. Disques: AES-256 (symétrique). Les 2 jouent des rôles complémentaires."},
{id:2010,cat:"Fondamentaux Sécurité",q:"Qu'est-ce qu'une 'PKI (Public Key Infrastructure)' et son rôle en sécurité d'entreprise ?",o:["Un système de clés physiques","Un système de gestion de certificats numériques X.509: CA Root (très protégée), CA intermédiaire (émet les certificats), certificats finaux (serveurs, utilisateurs). Utilisations: HTTPS (TLS), S/MIME (email), authentification mutuelle (mTLS, smart cards), code signing, VPN","Un système de backup de clés","Un outil de gestion des passwords"],a:1,e:"PKI entreprise: Root CA offline (stockée dans HSM physique), Intermediate CAs online pour émettre des certificats. Utilisations: SSL/TLS serveurs web (confiance navigateurs), S/MIME (chiffrement email), authenticating machines (802.1X), code signing (apps signées), VPN client auth. Azure Key Vault peut jouer le rôle de CA pour les certificats internes."},
{id:2011,cat:"Gestion des Identités",q:"Quelles sont les meilleures pratiques pour la gestion des mots de passe en 2024 selon NIST SP 800-63B ?",o:["Mots de passe complexes changés tous les 90 jours","Mots de passe longs (minimum 12-15 chars, passphrase idéale) mais sans complexité imposée, PAS de rotation obligatoire sauf compromission confirmée, pas de hints, vérification contre les listes de passwords compromis (HaveIBeenPwned), MFA obligatoire. Le changement forcé crée des patterns prévisibles","Complexité + changement mensuel","Même mot de passe pour tous les comptes admin"],a:1,e:"NIST SP 800-63B (2017 et mise à jour): abandon de la rotation périodique (crée pwd123 → pwd124 → ...), abandon de la complexité arbitraire (P@ssw0rd1 est pire qu'une passphrase). Privilégier: longueur (>15 chars), passphrase, vérification contre les bases de passwords breachés, MFA, et alerter/réinitialiser uniquement si compromis."},
{id:2012,cat:"Gestion des Identités",q:"Scénario: Un employé utilise le même mot de passe pour son compte Microsoft 365 que pour un site e-commerce qui a été victime d'une breach. Quel est le risque et comment le prévenir ?",o:["Aucun risque si le site e-commerce est externe","Credential Stuffing Attack: l'attaquant utilise les credentials de la breach e-commerce pour tenter de se connecter à M365 (même email/password). Protection: Password Spray/Breach detection dans Azure AD Identity Protection, MFA (rend le credential volé inutilisable seul), Banned Passwords list (bloque les passwords des breaches connues)","Risque uniquement si l'attaquant connaît le site M365","Pas de lien entre les deux comptes"],a:1,e:"Credential stuffing = attaque automatisée utilisant des pairs email/password volés dans des breaches pour tenter des connexions ailleurs. Protection: MFA (le password seul ne suffit pas), Smart Lockout Azure AD (bloque les tentatives automatisées), Identity Protection Leaked Credentials (détecte si vos credentials sont dans des breaches), Azure AD Password Protection (bannit les passwords courants)."},
{id:2013,cat:"Gestion des Identités",q:"Qu'est-ce que 'SAML 2.0' et comment fonctionne-t-il pour le SSO ?",o:["Un système d'authentification biométrique","Security Assertion Markup Language: protocole XML-based pour le SSO fédéré. Workflow: utilisateur accède à l'App (SP), redirigé vers l'IdP (ex: Azure AD) pour authentification, l'IdP émet une assertion XML signée, l'utilisateur la présente à l'App (SP), l'App vérifie la signature et accorde l'accès","Un protocole de chiffrement des emails","Un protocole réseau"],a:1,e:"SAML SSO flow: User→SP (veut accéder) → SP génère AuthnRequest → Redirect vers IdP → User s'authentifie (MFA) → IdP émet SAML Assertion (XML signé avec claims: email, groups, rôles) → SP vérifie la signature et les claims → Accès accordé. Établit la confiance via échange de métadonnées (certificats de signature)."},
{id:2014,cat:"Gestion des Identités",q:"Qu'est-ce que 'OAuth 2.0' et 'OIDC (OpenID Connect)' et comment diffèrent-ils ?",o:["Ce sont des protocoles identiques","OAuth 2.0 = protocole d'autorisation (délégation de permissions, ex: 'allow app to read my files'). OIDC = couche identité sur OAuth 2.0 (ajoute l'authentification: qui est l'utilisateur?). OIDC retourne un ID Token (JWT avec infos utilisateur) en plus du Access Token OAuth","OIDC est obsolète","OAuth est pour les mobiles uniquement"],a:1,e:"OAuth 2.0 gère l'autorisation ('peut cette app faire X en mon nom?') pas l'identité. OIDC ajoute l'identity layer: ID Token JWT (sub, email, name, etc.), UserInfo endpoint, et le flow d'authentification standardisé. Azure AD implémente OIDC pour l'authentification des apps et OAuth pour l'autorisation des APIs."},
{id:2015,cat:"Gestion des Identités",q:"Qu'est-ce que 'PAM (Privileged Access Management)' et pourquoi est-il critique ?",o:["Un outil de gestion des politiques","Un ensemble de technologies et processus pour sécuriser les accès privilegiés: découverte des comptes à privilèges, gestion des mots de passe (rotation automatique, coffre-fort), enregistrement des sessions, JIT access (activer les privilèges uniquement quand nécessaire), audit complet. Protège les 'crown jewels'","Un antivirus pour les admins","Un système de tickets IT"],a:1,e:"PAM est critique car les comptes privilégiés sont la cible principale des APTs (80% des breaches exploitent les identités privilégiées). Solutions: CyberArk, BeyondTrust, Delinea (tier 1), Microsoft PIM (Azure AD), HashiCorp Vault. Fonctionnalités clés: password vaulting, session recording, JIT provisioning, least privilege enforcement."},
{id:2016,cat:"Gestion des Identités",q:"Scénario: Un auditeur demande comment vous gérez les comptes orphelins (comptes d'ex-employés). Quelle est votre réponse ?",o:["On les désactive manuellement quand on se souvient","Processus automatisé: intégration HR→IAM (Workday/SAP HR → Azure AD provisioning via API SCIM), désactivation automatique à la date de départ, révocation des sessions, retrait des groupes, archivage du mailbox, suppression après 30 jours. Audit mensuel avec Access Reviews pour identifier les comptes sans activité > 90 jours","Revue annuelle des comptes","Attendre que l'utilisateur se plaigne de ne plus avoir accès"],a:1,e:"Gestion des comptes orphelins: provisioning/deprovisioning automatisé via SCIM (HR→Azure AD), Lifecycle Workflows Entra (automatise le joiner/mover/leaver), Access Reviews mensuels pour détecter les comptes inactifs (30/60/90 jours sans connexion), politique de suppression différée (30 jours post-désactivation = temps pour récupérer des données si nécessaire)."},
{id:2017,cat:"Gestion des Identités",q:"Qu'est-ce que le 'Token Hijacking' et les contre-mesures ?",o:["Le vol de tickets physiques","Le vol de tokens d'accès OAuth/JWT/Kerberos qui permettent l'accès aux ressources sans connaitre le mot de passe. Contre-mesures: HTTPS uniquement (évite le sniffing), HttpOnly cookies (inaccessibles en JS), courte durée de validité des tokens, Token Binding (lie le token à la connexion TLS), Conditional Access Device Compliance","Une attaque sur les API keys","Une attaque sur les cookies de session web"],a:1,e:"Token Hijacking: si un attaquant vole un Access Token OAuth valide, il peut accéder aux ressources avec les permissions du token jusqu'à son expiration. Contre-mesures: HTTPS (pas de sniffing en clair), courte durée tokens (1h vs 24h), Continuous Access Evaluation (révocation near real-time), Compliant Device requirement dans CA (token lié à l'appareil conforme)."},
{id:2018,cat:"Sécurité Réseau",q:"Qu'est-ce qu'un 'Firewall Next-Generation (NGFW)' vs un firewall traditionnel ?",o:["Un firewall plus récent et identique","NGFW ajoute à la stateful inspection L3/L4 classique: deep packet inspection (DPI), identification des applications (App-ID), prévention d'intrusion (IPS), filtrage URL/catégories, inspection SSL/TLS, et intelligence des menaces. Peut identifier 'C'est du BitTorrent sur le port 443' vs 'C'est du HTTPS normal'","Un firewall software vs hardware","Un firewall cloud uniquement"],a:1,e:"NGFW (Palo Alto, Fortinet, Check Point): L3/L4 stateful + DPI (analyse jusqu'au L7), App-ID (reconnaître les apps par signature, pas seulement le port), User-ID (associer le trafic à un utilisateur AD), SSL Inspection (déchiffrer pour analyser), IPS (signatures d'attaques), Threat Prevention (sandboxing intégré). Azure Firewall Premium est un NGFW cloud."},
{id:2019,cat:"Sécurité Réseau",q:"Qu'est-ce que le 'Zero Trust Network Access (ZTNA)' et comment remplace-t-il le VPN traditionnel ?",o:["Un VPN plus sécurisé","VPN: accès réseau large (une fois connecté, accès à de nombreuses ressources). ZTNA: accès granulaire app-par-app (uniquement les apps autorisées pour ce user/device), vérification continue (chaque session), sans exposer le réseau privé complet. Plus sécurisé: compromis d'un user = accès limité à SES apps","Une technologie futuriste non disponible","Un protocole VPN chiffré"],a:1,e:"ZTNA (Entra Private Access, Zscaler ZPA, Cloudflare Access): l'utilisateur s'authentifie (MFA), le ZTNA broker vérifie l'identité + conformité appareil + politiques → accorde accès uniquement aux apps autorisées pour ce contexte. Le réseau d'entreprise reste invisible. Pas de 'latéral movement' possible car pas de visibilité réseau."},
{id:2020,cat:"Sécurité Réseau",q:"Qu'est-ce que la 'micro-segmentation' réseau et pourquoi est-elle préférable à la segmentation classique VLAN ?",o:["Une segmentation plus petite que les VLAN","Micro-segmentation permet de créer des politiques de sécurité au niveau des workloads individuels (pas juste des subnets/VLANs): chaque VM/container a ses propres règles. Si une VM est compromise, elle ne peut pas communiquer avec les autres dans le même subnet. Implémentée via NSG (Azure), NSX (VMware), Calico (Kubernetes)","Une segmentation uniquement pour les datacenters","La même chose que les VLAN"],a:1,e:"Micro-segmentation vs VLAN: VLAN crée des segments larges (DMZ, Production), tout ce qui est dans le même VLAN peut communiquer. Micro-segmentation ajoute des politiques au niveau VM/pod: WebServer-1 et WebServer-2 dans le même subnet ne peuvent pas se parler entre elles (réduire blast radius). Dans Azure: NSG niveau NIC, Application Security Groups, Network Policies K8s."},
{id:2021,cat:"Sécurité Réseau",q:"Qu'est-ce que le 'DNS Security (DNSSEC et DNS over HTTPS)' et son importance ?",o:["Des protocoles DNS standard","DNSSEC: ajoute des signatures cryptographiques aux enregistrements DNS (authentifier les réponses, détecter le cache poisoning). DoH/DoT: chiffre les requêtes DNS (empêche le sniffing et la manipulation). Important: le DNS est souvent ignoré en sécurité mais utilisé pour C2, exfiltration, et les attaques de redirect","Des outils de performance DNS","Des configurations optionnelles"],a:1,e:"DNS non sécurisé = vecteur d'attaque: cache poisoning (rediriger vers des faux sites), DNS tunneling (C2/exfiltration), monitoring (ISP voit toutes vos requêtes). DNSSEC valide l'authenticité des réponses. DoH/DoT chiffre les requêtes (privacy + intégrité). Azure Firewall DNS Proxy + Threat Intelligence bloque les domaines malveillants connus."},
{id:2022,cat:"Sécurité Réseau",q:"Scénario: Vous suspectez un serveur interne de faire de l'exfiltration DNS (DNS tunneling). Comment confirmer et contrer ?",o:["DNS est trop complexe à analyser","Indicateurs DNS tunneling: volume anormal de requêtes TXT/MX/CNAME, sous-domaines très longs (encodés en base32/hex), haute entropie des noms de domaine, fréquence élevée vers peu de domaines. Contrer: DNS Firewall/RPZ (Response Policy Zone), filtrage DNS (Azure Firewall DNS Proxy + Threat Intel), alertes sur l'entropie DNS dans Sentinel","Bloquer tout DNS sauf le serveur interne","Ignorer, DNS est trop complexe"],a:1,e:"DNS tunneling (iodine, dnscat2): encode des données dans les labels DNS. Détection KQL: DnsEvents | where QueryType in ('TXT','MX','NULL') | where strlen(Name) > 50 | summarize count() by ClientIP. Ou analyser l'entropie des domaines (domaines légitimes ont faible entropie, tunneling = haute entropie). Azure Firewall TI bloque les C2 DNS connus."},
{id:2023,cat:"Sécurité Réseau",q:"Qu'est-ce que 'SSL/TLS Inspection' (ou 'SSL Decryption') et ses défis éthiques/légaux ?",o:["Le monitoring du certificat TLS","Un proxy MITM décrypte le trafic HTTPS pour l'inspecter (antimalware, DLP, URL filtering), puis re-chiffre vers la destination. Défis: légaux (interception des communications privées, règlement interne requis), vie privée (voir les mots de passe bancaires des employés), performance, et gestion des certificats clients qui brisent l'inspection","Un outil de surveillance TLS","Une attaque MITM légale"],a:1,e:"SSL Inspection (Azure Firewall Premium, Palo Alto, proxy): intercepte HTTPS pour inspecter. Légalement: requis un accord RH/DPO, exclure certains sites (banques, médical), informer les utilisateurs dans la charte informatique. Techniquement: déployer le CA root de l'entreprise sur tous les endpoints (confiance certificate), exclusions pour le certificate pinning (apps mobiles, Windows Update)."},
{id:2024,cat:"Sécurité Réseau",q:"Qu'est-ce qu'un 'WAF (Web Application Firewall)' et comment diffère-t-il d'un NGFW ?",o:["Ce sont des produits identiques","WAF = L7 application-layer protection spécifique au HTTP/HTTPS: protection OWASP Top 10 (SQLi, XSS, CSRF, LFI), rate limiting applicatif, bot detection, et inspection des corps de requêtes. NGFW = L3-L7 network-level (tous protocoles). WAF ne fait pas de routing réseau; NGFW ne comprend pas le contexte applicatif web aussi finement","WAF est un NGFW sans TLS","NGFW remplace le WAF"],a:1,e:"WAF (Azure WAF, ModSecurity, Imperva) est spécialisé HTTP/HTTPS: comprend les requêtes web, peut inspecter les paramètres POST/PUT, les cookies, les headers HTTP, et applique des règles OWASP. Un NGFW voit le trafic HTTP comme du TCP/TLS sans comprendre la sémantique HTTP. Les deux sont complémentaires: NGFW pour le réseau, WAF pour les apps web."},
{id:2025,cat:"Sécurité Réseau",q:"Scénario: Votre réseau d'entreprise doit autoriser les employés à accéder à Internet mais bloquer les malwares. Architecture recommandée ?",o:["Uniquement un antivirus sur les postes","Secure Web Gateway (SWG) dans la chaîne: tous les accès Internet passent par le SWG (Zscaler, Cisco Umbrella, ou Azure Firewall + TLS Inspection). SWG fait: URL filtering (catégories), SSL inspection (voir le contenu HTTPS), malware scanning (sandbox en ligne), DLP (bloquer upload PII), et log de tout le trafic web","Proxy HTTP simple","NSG sur le port 80/443"],a:1,e:"Architecture SWG: ForwardProxy config sur les endpoints (PAC file) → tout trafic web → SWG → Internet. SWG avantages: URL categories (bloquer malware, phishing), SSL Inspection (inspecter HTTPS), inline malware scanning (sandbox), DLP (données sensibles ne sortent pas), logs centralisés. Cloud SWG (Zscaler, Cisco Umbrella) = scalable pour le WFH."},
{id:2026,cat:"Sécurité Endpoint",q:"Qu'est-ce que l'EDR (Endpoint Detection and Response) et comment diffère-t-il d'un antivirus traditionnel ?",o:["Un antivirus plus puissant uniquement","AV traditionnel: basé sur signatures (détecte malwares connus). EDR: monitoring comportemental continu (processus, fichiers, réseau, registre), détection d'attaques inconnues et fileless via comportement, investigation (forensics, timeline), et réponse active (isoler la machine, supprimer les fichiers). EDR voit les attaques que l'AV manque","Un pare-feu endpoint","Une solution de DLP endpoint"],a:1,e:"EDR (MDE, CrowdStrike, SentinelOne): collecte des events en continu (ProcessCreate, FileCreate, NetworkConnect, RegistryModify), analyse comportementalement (ex: Word→cmd→powershell = macro malveillante), stocke 30 jours pour forensics, et permet des actions de réponse à distance (isoler, supprimer fichier, tuer processus). Complémentaire à l'AV signature-based."},
{id:2027,cat:"Sécurité Endpoint",q:"Qu'est-ce que 'Application Whitelisting' (AppLocker / WDAC) et ses défis de déploiement ?",o:["Un gestionnaire d'applications","Contrôle qui peut exécuter quoi sur un endpoint: seules les applications dans la liste blanche peuvent s'exécuter. Bloque les malwares et les outils de hacking non autorisés. Défis: inventorier toutes les apps légitimes (LOB, scripts IT), les exceptions, la maintenance de la liste (nouvelles apps), et les faux positifs (blocage d'apps légitimes)","Un outil de télémétrie des apps","Un système de licences logicielles"],a:1,e:"Windows Defender Application Control (WDAC) et AppLocker: déploiement en mode Audit d'abord (identifier ce qui tournerait bloqué), créer la whitelist (Microsoft WDAC Policy Wizard), tester en staging, déployer progressivement. Difficultés: scripts PowerShell des admins, apps LOB signées ou non, mises à jour d'apps. Très efficace quand bien configuré."},
{id:2028,cat:"Sécurité Endpoint",q:"Qu'est-ce que 'BitLocker' et quand sa configuration avec 'TPM + PIN' est-elle recommandée vs 'TPM uniquement' ?",o:["Une solution de backup","BitLocker = chiffrement complet du disque Windows. TPM uniquement: déchiffrement automatique au démarrage (confort, protège le vol physique du disque mais pas du vol de la machine déverrouillée). TPM + PIN: requiert un PIN au démarrage (protège aussi le vol de la machine allumée ou en veille). Recommandé TPM+PIN pour les laptops executives / données très sensibles","Un antivirus","Un outil de compression de données"],a:1,e:"BitLocker scenarios: Workstations bureau = TPM only (confort, protection vol de disque HDD). Laptops exécutifs/R&D = TPM+PIN (protège si la machine est volée verrouillée mais pas éteinte). Serveurs = BitLocker avec Network Unlock (déchiffrement automatique sur le réseau corporatif). Recovery key dans Azure AD (Intune) ou Active Directory."},
{id:2029,cat:"Sécurité Endpoint",q:"Quelles sont les meilleures pratiques pour sécuriser les smartphones des employés dans une politique BYOD ?",o:["Interdire l'accès aux ressources depuis les smartphones","MAM (Mobile Application Management) sans MDM: Intune APP (Application Protection Policy) applique des politiques sur les apps M365 (pas de copier-coller vers des apps perso, pas de backup dans iCloud/Google Drive, chiffrement des données d'app, PIN requis pour l'app), sans contrôler le reste du téléphone personnel","Installer un antivirus mobile","VPN pour chaque accès mobile"],a:1,e:"BYOD strategy: MAM-only (sans enrollment MDM): Intune Conditional Access + App Protection Policy sur les apps M365. Les données corporate restent dans les apps M365 (conteneur) et ne peuvent pas être copiées vers des apps perso (partition données). Si l'appareil est perdu: Remote Wipe efface uniquement les données d'entreprise, pas le téléphone personnel."},
{id:2030,cat:"Sécurité Endpoint",q:"Scénario: Un employé reçoit un email avec une pièce jointe Office contenant une macro malveillante. Quels contrôles l'arrêtent à chaque étape ?",o:["Uniquement l'antivirus","Chaîne de défense: 1) Defender for O365 Safe Attachments (sandbox la PJ → détecte macro malveillante), 2) Si livré: MDAV/MDE détecte le comportement malveillant à l'exécution, 3) ASR rule 'Block Office from creating child processes' empêche la macro de lancer cmd/powershell, 4) Network Protection bloque le C2, 5) AMSI scanne le payload en mémoire","Uniquement le filtrage email","Formation utilisateur uniquement"],a:1,e:"Défense en profondeur contre les macros Office: Couche 1 (email): Safe Attachments sandbox. Couche 2 (endpoint prevention): MDAV signatures + AMSI scan du script. Couche 3 (comportemental): ASR rules (Office child processes, scripting interpreter). Couche 4 (réseau): Network Protection (C2 IP/domain blocking). Couche 5 (détection): EDR/MDE behavioral alert. 5 couches indépendantes."},
{id:2031,cat:"Cloud Security",q:"Qu'est-ce que le modèle de 'Shared Responsibility' dans le cloud et comment varie-t-il selon le type de service ?",o:["Le client est responsable de tout","IaaS: client gère OS/apps/données (Microsoft gère physique/hyperviseur/réseau). PaaS: client gère code/données/config (Microsoft gère OS/runtime/infrastructure). SaaS: client gère données/utilisateurs/accès (Microsoft gère tout le reste). Plus on monte vers SaaS, plus Microsoft prend de responsabilités","Microsoft est responsable de tout","La sécurité est partagée également 50/50"],a:1,e:"Shared Responsibility dans Azure: Azure s'occupe de la sécurité physique (datacenter, hyperviseur, réseau sous-jacent) TOUJOURS. Pour IaaS (VMs): le client gère les patches OS, la config firewall, les apps, les données. PaaS: seulement le code et les données. SaaS: seulement la gouvernance (qui a accès à quoi). Les erreurs de configuration client = responsabilité client."},
{id:2032,cat:"Cloud Security",q:"Qu'est-ce que le CSPM (Cloud Security Posture Management) ?",o:["Un outil de monitoring de coûts cloud","Un outil qui évalue continuellement la configuration sécurité des ressources cloud (Azure, AWS, GCP) contre des benchmarks (CIS, NIST, PCI), identifie les misconfigurations (stockage public, ports ouverts, auth faible), génère des recommandations priorisées et un score de sécurité. Exemples: MDC, Wiz, Orca, Prisma Cloud","Un scanner de vulnérabilités réseau","Un outil de gestion des coûts cloud"],a:1,e:"CSPM identifie les misconfigurations cloud (principale cause de breaches cloud selon Gartner). Dans Azure: Defender for Cloud CSPM découvre toutes les ressources, évalue contre l'Azure Security Benchmark, génère des recommandations avec Secure Score. CSPM Defender Premium ajoute Attack Path Analysis et Cloud Security Explorer."},
{id:2033,cat:"Cloud Security",q:"Qu'est-ce que le 'CWPP (Cloud Workload Protection Platform)' ?",o:["Un outil de monitoring de performance cloud","Protection runtime des workloads cloud: VMs (EDR/AV), containers (runtime protection), serverless (function monitoring), bases de données (anomaly detection). Complémentaire au CSPM (posture) en ajoutant la protection et la détection des menaces actives sur les workloads en cours d'exécution","Un outil de configuration cloud","Un outil de conformité cloud"],a:1,e:"CWPP (Defender for Servers, Defender for Containers, etc.) protège les workloads en runtime: VMs (EDR MDE intégré, vulnerability scanning), containers (runtime threat detection, network anomalies), PaaS (Defender for SQL, Storage, App Service). CSPM + CWPP = posture management + protection active = CNAPP (Cloud-Native Application Protection Platform)."},
{id:2034,cat:"Cloud Security",q:"Quelles sont les 5 principales causes de violations de données cloud selon les études récentes ?",o:["Les attaques réseau sophistiquées","1) Misconfiguration (stockage public, permissions excessives), 2) Credentials volés/faibles (pas de MFA), 3) Insider threats, 4) APIs non sécurisées, 5) Vulnérabilités non patchées. La misconfiguration est la cause #1 selon Gartner, pas les attaques sophistiquées","Les attaques 0-day uniquement","La faiblesse du cloud provider"],a:1,e:"Selon les rapports Verizon DBIR et Gartner: 99% des incidents de sécurité cloud résultent d'erreurs clients (pas de failles Microsoft). Top: misconfiguration (S3 buckets publics, ports ouverts), credentials faibles/volés (75% des intrusions cloud), puis insider threats, API security, et supply chain. La sécurité cloud est avant tout une question de configuration et de gouvernance."},
{id:2035,cat:"Cloud Security",q:"Scénario: Une startup déploie une application web sur AWS EC2 + RDS. Quelles sont les 5 misconfigurations les plus courantes à éviter ?",o:["Pas de misconfigurations possibles avec AWS","1) S3 Bucket public (données exposées), 2) Security Group trop ouvert (0.0.0.0/0 sur SSH/RDP), 3) Pas de MFA sur le compte AWS root, 4) RDS accessible depuis Internet (pas dans un VPC privé), 5) Pas de CloudTrail (pas d'audit log). Ces 5 erreurs représentent 80% des incidents cloud AWS","Uniquement des problèmes de performance","Uniquement des problèmes de coûts"],a:1,e:"Top misconfigurations cloud AWS/Azure: Storage/S3 public (violations DLP), SG/NSG trop permissifs (0.0.0.0/0 sur gestion), comptes root sans MFA, base de données dans subnet public, pas de logs (CloudTrail/Azure Activity). CSPM détecte ces problèmes automatiquement. Chaque misconfiguration a été le vecteur de breaches réelles (Capital One, etc.)."},
{id:2036,cat:"Réponse aux Incidents",q:"Quelles sont les 6 phases du cycle de réponse aux incidents selon NIST SP 800-61 ?",o:["Détection, Analyse, Confinement, Éradication","Préparation, Détection & Analyse, Confinement, Éradication, Récupération, Activités Post-Incident. La Préparation est la phase la plus importante (plans, outils, formation): investir 80% des efforts en préparation réduit drastiquement le coût et l'impact des incidents","Détection, Réponse, Rapport","Identification, Notification, Résolution"],a:1,e:"NIST 800-61 lifecycle: 1) Préparation (IRP, playbooks, outils, formation, exercices), 2) Détection & Analyse (identifier, triager, classer), 3) Confinement (limiter les dommages, préserver preuves), 4) Éradication (éliminer la cause: malware, compte compromis), 5) Récupération (restaurer services normaux), 6) Post-Incident (lessons learned, améliorer la préparation)."},
{id:2037,cat:"Réponse aux Incidents",q:"Qu'est-ce qu'un 'Tabletop Exercise' en cybersécurité et pourquoi est-il important ?",o:["Un exercice de fitness pour les équipes SOC","Une simulation d'incident en salle de conférence: un modérateur présente un scénario d'incident (ransomware, breach), les participants (CISO, IT, Legal, Comms, Direction) doivent décider des actions à chaque étape. Objectif: tester les plans de réponse, identifier les gaps, améliorer la coordination sans risque opérationnel","Un test de pénétration","Un audit de conformité simulé"],a:1,e:"Tabletop exercises: peu coûteux, haute valeur. Permet de tester les plans IRP dans un contexte sûr, identifier les gaps de communication (qui appelle qui? qui décide quoi?), vérifier les accès aux outils et contacts en cas de crise, et former les équipes non techniques (Legal, Comms, Direction) à leur rôle. Recommandé 2-4 fois/an avec scénarios variés."},
{id:2038,cat:"Réponse aux Incidents",q:"Scénario: À 2h du matin, votre système alerte qu'un ransomware se propage sur 50 VMs. Quelles sont vos 5 premières actions ?",o:["Attendre 8h du matin pour alerter la direction","1) Déclencher le plan IR (appeler l'équipe IR d'astreinte), 2) Isoler les VMs affectées (segmentation réseau d'urgence), 3) Identifier le vecteur d'entrée (quel compte? quelle VM initiale?), 4) Activer le war room (IT, sécurité, direction), 5) Évaluer l'état des backups (sont-ils touchés?)","Payer la rançon immédiatement","Formater les machines infectées sans investigation"],a:1,e:"Ransomware réponse J0: Isolation immédiate (micro-segmentation d'urgence, désactiver les shares réseau), activation de la cellule de crise, identification du patient zéro (logs de connexion, propagation réseau), évaluation des backups (en ligne = potentiellement touchés, hors ligne = saufs), notification des parties prenantes (direction, DPO pour RGPD, assurance cyber)."},
{id:2039,cat:"Réponse aux Incidents",q:"Qu'est-ce que la 'Threat Intelligence' et comment prioriser les IoC à surveiller ?",o:["Des rapports annuels de sécurité","Des informations actionnables sur les menaces: qui attaque, comment, avec quels outils, quelles cibles. Prioriser par pertinence: IoC liés à votre secteur/géographie/technologies utilisées > IoC génériques. Pyramid of Pain: TTPs (difficile à changer pour l'attaquant, plus durables) > outils > artefacts réseau/host > domaines > IPs > hashes (trivial à changer)","Des statistiques de cyberattaques","Des CVEs publiées"],a:1,e:"Threat Intelligence stratégique (secteurs ciblés, acteurs), tactique (TTPs utilisés), et opérationnelle (IoC actuels: IPs C2, hashes, domaines). Priorisation: IoC d'acteurs ciblant votre secteur > IoC génériques. Pyramid of Pain: détecter les TTPs (comportements) est plus durable que les hashes qui changent à chaque compilation."},
{id:2040,cat:"Réponse aux Incidents",q:"Qu'est-ce qu'un 'SOAR (Security Orchestration, Automation and Response)' et son ROI ?",o:["Un scanner de vulnérabilités","Une plateforme qui automatise les tâches répétitives de sécurité: triage des alertes (enrichissement automatique via VT/WHOIS/geoIP), playbooks de réponse (isoler machine, révoquer session, créer ticket), et orchestration multi-outils. ROI: réduire le MTTR, libérer les analystes des tâches manuelles, gérer plus d'alertes sans augmenter l'équipe","Un outil de formation SOC","Un système de ticketing spécialisé"],a:1,e:"SOAR (Microsoft Sentinel Logic Apps, Palo Alto XSOAR, Splunk SOAR): automatise: enrichissement (VirusTotal API → ajouter le score à l'alerte), actions de confinement (call MDE API → isoler la machine), création de tickets ITSM, notifications (Teams, email). ROI: T1 analyst handle 3x plus d'alertes, MTTR divisé par 10 pour les incidents courants."},
{id:2041,cat:"Cryptographie",q:"Qu'est-ce qu'un 'HSM (Hardware Security Module)' et pourquoi est-il utilisé pour les clés cryptographiques ?",o:["Un module de stockage haute performance","Un dispositif matériel sécurisé conçu pour générer, stocker et utiliser des clés cryptographiques. Avantages: les clés ne quittent jamais le HSM (exportation impossible), résistant à la falsification physique (zérotise les clés si ouvert), opérations crypto rapides (accélération hardware), certification FIPS 140-2 Level 3/4. Requis pour les réglementations strictes","Un antivirus hardware","Un module de backup chiffré"],a:1,e:"HSM (Azure Dedicated HSM, Thales, SafeNet): génère de l'entropie vraiment aléatoire (TRNG), stocke les clés en hardware inaccessible par software, effectue les opérations cryptographiques en interne (la clé privée ne sort jamais). FIPS 140-2 L3 = certifié résistant aux attaques physiques. Utilisé pour: PKI Root CA, TDE SQL, clés de signature de code, HSM cloud."},
{id:2042,cat:"Cryptographie",q:"Qu'est-ce que 'Perfect Forward Secrecy (PFS)' dans TLS et pourquoi est-ce important ?",o:["Une fonctionnalité de performance TLS","PFS utilise des clés de session éphémères (générées pour chaque connexion, jamais stockées). Si la clé privée du serveur est compromise demain, elle ne peut pas déchiffrer les communications passées (contrairement à RSA statique). Implémenté via ECDHE ou DHE. Tous les serveurs modernes devraient activer PFS","Un chiffrement plus rapide","Une fonctionnalité uniquement pour les navigateurs"],a:1,e:"PFS: avec RSA key exchange, si l'attaquant capture le trafic chiffré aujourd'hui et vole la clé privée du serveur plus tard, il peut tout déchiffrer. Avec ECDHE (PFS): chaque connexion génère une clé de session éphémère, même si le serveur est compromis demain, le trafic passé reste chiffré. TLS 1.3 impose ECDHE (PFS obligatoire)."},
{id:2043,cat:"Cryptographie",q:"Qu'est-ce que les 'algorithmes post-quantiques' et pourquoi les organisations doivent-elles s'y préparer ?",o:["Des algorithmes futuristes non disponibles","Les ordinateurs quantiques (via l'algorithme de Shor) pourront factoriser RSA et résoudre les logarithmes discrets (ECC), cassant la cryptographie asymétrique actuelle. NIST a standardisé (2024) les premiers algorithmes post-quantiques résistants: CRYSTALS-Kyber (KEM), CRYSTALS-Dilithium (signature). Les org doivent inventorier leur crypto et planifier la migration (crypto-agility)","Une amélioration des algorithmes existants","Uniquement pour les gouvernements"],a:1,e:"Menace quantique (Y2Q/Q-Day): dans ~10-15 ans, les ordinateurs quantiques pourraient casser RSA-2048/ECC-256. Harvest Now Decrypt Later: des attaquants collectent aujourd'hui des données chiffrées pour les déchiffrer demain. Migration: 1) Inventorier les usages crypto (TLS, PKI, stockage), 2) Migrer vers algorithmes PQC (Kyber, Dilithium), 3) Azure, NIST et Microsoft travaillent activement sur la transition."},
{id:2044,cat:"Cryptographie",q:"Qu'est-ce que le 'Certificate Transparency (CT)' et comment aide-t-il la sécurité ?",o:["Un système de logging des mots de passe","Un système de logs publics immuables où toutes les CAs doivent journaliser les certificats TLS émis. Cela permet de détecter les certificats frauduleux (un CA compromis qui émet des certificats pour google.com par erreur). Outils: crt.sh, certlint. Monitoring CT: surveiller si un certificat est émis pour votre domaine sans votre accord","Un protocole de communication sécurisé","Un outil de revocation de certificats"],a:1,e:"Certificate Transparency (RFC 6962): toutes les CAs publiques doivent soumettre les certificats aux CT logs publics. Les navigateurs exigent les preuves CT (SCT). Les organisations peuvent monitorer les CT logs pour être alertées si un certificat est émis pour leur domaine (outil gratuit: certspotter, Facebook CT Tool). Critique pour détecter le rogue certificate issuance."},
{id:2045,cat:"Ingénierie Sociale",q:"Quelles sont les techniques d'ingénierie sociale les plus courantes ciblant les entreprises en 2024 ?",o:["Uniquement l'email de phishing","1) Spear phishing (email ciblé avec informations personnelles), 2) Vishing (appel vocal, usurpation identité IT helpdesk), 3) Smishing (SMS malveillant), 4) Deepfake audio/video CEO fraud, 5) Business Email Compromise (BEC, usurpation email dirigeant), 6) MFA fatigue (flood de notifications push), 7) QR code phishing (quishing)","Uniquement les hackings réseaux","Les logiciels malveillants uniquement"],a:1,e:"Évolution des attaques SE: MFA Fatigue (bombardement de notifications MFA jusqu'à acceptation accidentelle), Adversary-in-the-Middle (AiTM, proxy capturant tokens post-MFA), Deepfakes (video/audio d'executives), Quishing (QR codes vers sites phishing), TOAD (Telephone-Oriented Attack Delivery). Contre-mesures: FIDO2 (résistant phishing), formation continue, vérification out-of-band."},
{id:2046,cat:"Ingénierie Sociale",q:"Qu'est-ce qu'une attaque 'Adversary-in-the-Middle (AiTM)' et pourquoi contourne-t-elle le MFA traditionnel ?",o:["Une attaque MITM classique sur le réseau","AiTM utilise un proxy reverse (Evilginx2, Modlishka) entre la victime et le vrai site: la victime s'authentifie sur le proxy (qui transmet au vrai site), le proxy capture le cookie de session authentifiée APRÈS le MFA. Le MFA est donc utilisé mais le cookie volé permet l'accès sans MFA","Une attaque sur les VPN","Une attaque uniquement sur les apps web"],a:1,e:"AiTM bypass MFA: le proxy présente un faux site, la victime entre ses credentials ET son code MFA, le proxy les transmet en temps réel au vrai site, récupère le cookie de session. Résultat: l'attaquant a un cookie de session valide malgré MFA. Contre-mesures: FIDO2/passkeys (résistants AiTM car la clé est liée au domaine), Conditional Access + Compliant Device (token lié à l'appareil)."},
{id:2047,cat:"Ingénierie Sociale",q:"Comment concevoir un programme de sensibilisation à la sécurité efficace (Security Awareness Training) ?",o:["Une formation annuelle de 2h sur compliance","Formation continue (pas annuelle): micro-formations (3-5 min) mensuelles, simulations de phishing régulières (Attack Simulator), formation ciblée pour ceux qui cliquent (juste-à-temps learning), gamification (scores, compétition entre équipes), metrics (taux de click phishing, signalements), et soutien de la direction (top-down culture)","Envoyer des emails de rappel","Politique de sécurité signée une fois"],a:1,e:"Programme efficace: Simulations phishing régulières (pas punir, former quand l'employé clique), micro-formations mensuelles contextuelles (après une campagne de phishing détectée dans le secteur), KPIs mesurés (taux de click phishing, taux de signalement), formation spéciale pour les VIPs et utilisateurs à risque, et culture de sécurité positive (reporter les incidents sans punition)."},
{id:2048,cat:"Ingénierie Sociale",q:"Scénario: Un employé reçoit un appel d'un 'technicien Microsoft' lui demandant de donner son mot de passe pour résoudre un problème urgent. Que faire et comment former les employés ?",o:["Donner le mot de passe si l'employé est en panne","Ne JAMAIS donner son mot de passe à personne, y compris le support Microsoft (Microsoft ne demande jamais le mot de passe). Raccrocher et appeler directement le vrai helpdesk IT via le numéro connu. Former les employés: Microsoft ne vous appelle jamais proactivement, aucun technicien n'a besoin de votre mot de passe, vérifier via un canal indépendant","Donner un faux mot de passe","Passer l'appel au manager directement"],a:1,e:"Vishing protection: politique claire 'aucun mot de passe par téléphone ou email', numéros de helpdesk officiels affichés (pas cherchés sur Google), call-back verification (raccrocher, rappeler le vrai numéro), formation sur les prétextes courants (urgence, autorité, peur). En entreprise: alerter la sécurité des tentatives de vishing pour tracked les campagnes."},
{id:2049,cat:"Sécurité des Applications",q:"Quelles sont les 10 vulnérabilités de l'OWASP Top 10 2021 ?",o:["XSS, SQLi, CSRF, Buffer Overflow, DoS, Backdoor, Hardcoded Creds, Log Injection, Path Traversal, SSRF","A1:Broken Access Control, A2:Cryptographic Failures, A3:Injection, A4:Insecure Design, A5:Security Misconfiguration, A6:Vulnerable Components, A7:Auth Failures, A8:Software Integrity Failures, A9:Logging Failures, A10:SSRF. Broken Access Control est passé #1 en 2021","RCE, LFI, RFI, XXE, SSRF, XSS, SQLi, CSRF, DoS, Misconfig","Les 10 CVEs les plus critiques de l'année"],a:1,e:"OWASP Top 10 2021: A01 Broken Access Control (privilège horizontal/vertical), A02 Cryptographic Failures (données sensibles exposées), A03 Injection (SQL/XSS/LDAP), A04 Insecure Design (absence de threat modeling), A05 Security Misconfiguration, A06 Vulnerable & Outdated Components, A07 Auth Failures, A08 Software Integrity (CI/CD without integrity checks), A09 Logging Failures, A10 SSRF."},
{id:2050,cat:"Sécurité des Applications",q:"Qu'est-ce que le 'SAST (Static Application Security Testing)' vs 'DAST (Dynamic Application Security Testing)' ?",o:["Ce sont des tests identiques","SAST: analyse le code source sans l'exécuter (white-box), détecte les vulnérabilités tôt dans le cycle (injection SQL dans le code, mots de passe hardcodés). DAST: teste l'app en cours d'exécution (black-box), simule des attaques réelles sur l'app déployée (XSS reflétés, configuration, auth bypass). Les deux sont complémentaires dans une pipeline DevSecOps","SAST est plus précis","DAST est obligatoire"],a:1,e:"Pipeline DevSecOps: SAST (SonarQube, Semgrep, CodeQL) dans le CI (pre-commit ou PR), DAST (OWASP ZAP, Burp Suite) dans le CD (pre-production staging), SCA (Software Composition Analysis: Dependabot, Snyk) pour les dépendances, et Interactive ASPM (IAST) en runtime. Chaque outil trouve des vulnérabilités différentes."},
{id:2051,cat:"Sécurité des Applications",q:"Qu'est-ce que 'SBOM (Software Bill of Materials)' et pourquoi est-il devenu obligatoire dans certains secteurs ?",o:["Une liste des développeurs d'un projet","Un inventaire exhaustif de tous les composants logiciels d'une application (dépendances directes et transitives, versions, licences). Requis par Executive Order US (EO 14028) pour les logiciels vendus au gouvernement américain, et de facto dans la supply chain security. Permet d'identifier rapidement si vous êtes affectés par une vulnérabilité (ex: Log4Shell)","Un outil de gestion de projet","Un rapport de conformité logicielle"],a:1,e:"SBOM (formats SPDX ou CycloneDX): inventaire complet des composants. Lors de Log4Shell: les organisations avec SBOM ont pu identifier en heures si elles utilisaient log4j, les autres ont mis des semaines. Microsoft Defender for DevOps génère des SBOMs. Requis: US EO 14028 (gouvernement US), NTIA minimum elements, CISA secure software guidance."},
{id:2052,cat:"Sécurité des Applications",q:"Scénario: Votre application web a une vulnérabilité d'injection SQL. Un attaquant pourrait extraire toute la base de données. Comment prioriser et corriger ?",o:["Notifier les utilisateurs uniquement","Priorité CRITIQUE: 1) Déployer une règle WAF temporaire (virtual patching) pour bloquer les payloads SQLi, 2) Corriger le code (parameterized queries / prepared statements), 3) Tester la correction en staging, 4) Déployer en production, 5) Retirer la règle WAF, 6) Analyser les logs pour vérifier si exploitée (notification RGPD si oui)","Attendre la prochaine release","Changer le mot de passe de la base de données"],a:1,e:"Remédiation SQLi: Virtual patching WAF immédiat (contenir la menace), puis fix code (TOUJOURS utiliser parameterized queries/prepared statements, jamais la concaténation de strings), vérifier les logs d'accès SQL (a-t-on été exploités?). Si données personnelles potentiellement exposées: notification RGPD dans les 72h. OWASP Query Parameterization Cheat Sheet."},
{id:2053,cat:"Frameworks et Conformité",q:"Quelles sont les principales différences entre ISO 27001 et le NIST Cybersecurity Framework ?",o:["Ils sont identiques","ISO 27001: standard international de certification (on peut être certifié ISO 27001), axé sur le SGSI (Système de Management de la Sécurité), processus et documentation. NIST CSF: framework américain non certifiable, basé sur 5 fonctions (Identify, Protect, Detect, Respond, Recover), plus prescriptif techniquement, adoption volontaire (obligatoire secteurs critiques US)","ISO 27001 est uniquement européen","NIST est obligatoire mondialement"],a:1,e:"ISO 27001: certification formelle (audit externe annuel), 93 contrôles dans l'Annexe A (ISO 27002 guidance), focus sur le management system (politique, processus, amélioration continue). NIST CSF 2.0: 6 fonctions (GOVERN ajouté en 2024), 106 catégories de résultats, framework de communication du risque cyber pour les organizations US et au-delà. Souvent utilisés ensemble."},
{id:2054,cat:"Frameworks et Conformité",q:"Qu'est-ce que le 'CIS Controls' (Center for Internet Security) v8 et ses implémentation groups ?",o:["Une liste de bonnes pratiques optionnelles","18 contrôles CIS organisés en 3 Implementation Groups selon la maturité: IG1 (PME, 56 safeguards essentiels, protection basique), IG2 (moyennes entreprises, +74 safeguards), IG3 (grandes entreprises avec équipes sécurité, tous les 153 safeguards). Les 6 premiers contrôles couvrent 85% des risques courants","Un outil de scanning de sécurité","Un standard de certification"],a:1,e:"CIS Controls v8: 18 contrôles (Inventory Assets, Software Management, Data Protection, Secure Config, Account Management, Access Control, Vuln Management, Audit Logs, Browser/Email Protections, Malware Defense, Data Recovery, Network Infra, Network Monitoring, Security Training, IR Management, Pen Testing, Security Program). IG1 = must-have pour toutes les organisations."},
{id:2055,cat:"Frameworks et Conformité",q:"Scénario: Un CISO doit choisir entre implémenter ISO 27001, le NIST CSF, ou les CIS Controls pour son organisation (PME de 200 employés). Votre recommandation ?",o:["Implémenter les trois simultanément","Commencer par CIS Controls IG1 (56 contrôles essentiels, prescriptifs, ROI maximal pour PME), puis utiliser NIST CSF comme cadre de communication du risque pour la direction, et ISO 27001 seulement si requis contractuellement (clients, appels d'offres). CIS IG1 couvre les risques les plus courants avec le moins de ressources","ISO 27001 uniquement","Aucun framework n'est adapté aux PME"],a:1,e:"Pour une PME: CIS Controls IG1 est le meilleur point de départ (prescriptif: sait exactement quoi faire, 56 contrôles concrets, pas besoin d'interprétation). NIST CSF pour communiquer le risque cyber au board. ISO 27001 uniquement si requis commercialement (certification = investissement >6 mois, coûteux pour une PME). Progression: IG1→IG2→ISO 27001 ou NIST CSF Tier 3-4."},
{id:2056,cat:"Frameworks et Conformité",q:"Qu'est-ce que la 'Supply Chain Security' et le framework SLSA (Supply-chain Levels for Software Artifacts) ?",o:["La sécurité physique des livraisons","La sécurité de la chaîne d'approvisionnement logicielle: dépendances (npm, pip vulnérables), outils de build (SolarWinds SUNBURST), CI/CD pipelines (compromission des systèmes de build), et artefacts (binaires modifiés). SLSA est un framework 4 niveaux définissant les exigences d'intégrité des artefacts (de code source à déploiement)","La sécurité des achats","La conformité des fournisseurs IT"],a:1,e:"Supply chain attacks: SolarWinds (outil de monitoring compromis), Log4Shell (dépendance Java), XZ Utils backdoor (Linux). SLSA (Google): Level 1 (provenance générée), Level 2 (signé), Level 3 (artefacts non falsifiables), Level 4 (build hermétique, revue à 2 personnes). Microsoft Defender for DevOps, GitHub's Artifact Attestations (basé SLSA) implémentent ces niveaux."},
{id:2057,cat:"Frameworks et Conformité",q:"Qu'est-ce que le 'MITRE ATT&CK Framework' et comment l'utiliser pour améliorer la détection ?",o:["Un catalogue d'outils de hacking","Un framework de connaissance des tactiques et techniques des adversaires (TTPs) basé sur des observations réelles d'attaques. 14 tactiques (Initial Access, Execution, Persistence, Privilege Escalation, Defense Evasion, Credential Access, Discovery, Lateral Movement, Collection, Exfiltration, C2, Impact). Utilisé pour: mapper les détections (ATT&CK Navigator), évaluer la couverture défensive, simuler des attaques (Atomic Red Team)","Un outil de certification","Un scanner de vulnérabilités"],a:1,e:"MITRE ATT&CK Enterprise: 14 tactiques, 193+ techniques, 401+ sous-techniques. Usage pratique: 1) ATT&CK Navigator pour visualiser quelles techniques sont couvertes par vos règles Sentinel/SIEM, 2) Atomic Red Team pour tester chaque technique et valider vos détections, 3) D3FEND pour les contre-mesures. SOC maturity = % de couverture ATT&CK avec détections."},
{id:2058,cat:"Frameworks et Conformité",q:"Qu'est-ce que le 'Cyber Kill Chain' de Lockheed Martin et ses 7 phases ?",o:["Un modèle de cybersécurité pour les militaires uniquement","7 phases d'une cyberattaque ciblée (APT): 1.Reconnaissance (info gathering), 2.Weaponization (créer le payload), 3.Delivery (email phishing, clé USB), 4.Exploitation (exploiter la vuln), 5.Installation (persistence: backdoor, registry run key), 6.C2 (Command & Control, canal comm), 7.Actions on Objectives (exfiltration, destruction). Interrompre une phase = stopper l'attaque","Un modèle pour les attaques physiques","Un outil de classification des malwares"],a:1,e:"Kill Chain défense: Reconnaissance → Blocage OSINT (LinkedIn moins visible), Delivery → Email security (Safe Attachments), Exploitation → EDR + patch management, Installation → Application Whitelisting + EDR, C2 → Network Firewall + DNS Filtering, Actions → DLP + Data monitoring. Chaque couche défensive cible une phase."},
{id:2059,cat:"Frameworks et Conformité",q:"Qu'est-ce qu'un 'Audit de Sécurité' vs un 'Test de Pénétration' vs un 'Red Team Exercise' ?",o:["Ce sont des termes identiques","Audit: évaluation de la conformité aux politiques/standards (interview, revue de configs, documentaire). Pen Test: test technique ciblé (portée définie, vulnérabilités exploitées pour prouver l'impact). Red Team: simulation APT complète (portée large, furtivité, objectif (exfiltrer X ou accéder à Y), pas de règles sur le vecteur d'attaque). Red Team > Pen Test > Audit en profondeur technique","Un audit est plus technique qu'un pen test","Un red team est moins intrusif"],a:1,e:"Maturité croissante: Audit (conformité, documentation, peu technique) → Vulnerability Assessment (scan, pas d'exploitation) → Pen Test (exploitation dans une portée définie, rapport de vulnérabilités) → Red Team (APT simulation, portée large, objectif business, furtivité, inclut SE et phishing) → Purple Team (Red + Blue collaborent pour améliorer les détections)."},
{id:2060,cat:"Frameworks et Conformité",q:"Scénario: Votre entreprise stocke des données de cartes de paiement. Quels sont les 12 requirements PCI DSS v4.0 en synthèse ?",o:["Uniquement le chiffrement des données de carte","12 requirements PCI DSS: 1.Network security, 2.Secure configurations, 3.Protect account data (chiffrement), 4.Protect data in transit (TLS), 5.Anti-malware, 6.Secure systems/software (SDLC, patches), 7.Restrict access (need-to-know), 8.Strong authentication (MFA), 9.Restrict physical access, 10.Log/monitor (12 mois), 11.Test security (pen test annuel), 12.Security policy. SAQ ou QSA selon le volume de transactions","Uniquement les tests de pénétration annuels","Uniquement le chiffrement et l'accès"],a:1,e:"PCI DSS v4.0 (effectif mars 2024): 12 requirements, >300 contrôles. Nouveautés v4: exigences de customized approach (flexibilité), MFA étendu (req 8), Targeted Risk Analysis (TRA) pour justifier les contrôles, évaluation de l'authenticité du logiciel, protections anti-phishing. Compliance = SAQ (small merchants) ou QSA audit (grands volumes). Non-conformité = perte de licence de traitement."},
{id:2061,cat:"Sécurité des Données",q:"Quels sont les niveaux de classification des données et leur correspondance en entreprise ?",o:["Public et Privé uniquement","Typiquement 4 niveaux: Public (peut être partagé librement), Internal/General (usage interne, pas de partage externe sans besoin), Confidential (données sensibles business, partage limité avec besoin), Restricted/Highly Confidential (données très sensibles: PII, secrets commerciaux, données financières non publiées, données de santé)","3 niveaux: Bas/Moyen/Haut","Identique à la classification gouvernementale (Top Secret, Secret, etc.)"],a:1,e:"Classification entreprise alignée avec Purview Sensitivity Labels: Public → Internal → Confidential → Highly Confidential. Chaque niveau correspond à des contrôles (chiffrement, accès limité, DLP rules, filigrane). Mapping RGPD: données personnelles = minimum Confidential, données sensibles (santé, biométrie) = Highly Confidential."},
{id:2062,cat:"Sécurité des Données",q:"Qu'est-ce que le 'Data Loss Prevention (DLP)' et ses 3 états des données à protéger ?",o:["Un système de backup","DLP protège les données dans 3 états: Data at Rest (stockée: chiffrement, droits d'accès), Data in Transit (réseau: TLS, DLP proxy inspection), Data in Use (en cours d'utilisation: screen capture protection, copier-coller restriction, application controls). Implémenté via Purview DLP, endpoint DLP, réseau DLP","Un système de classification uniquement","Un outil de monitoring des accès"],a:1,e:"DLP selon les états: At Rest (chiffrement AES-256 + Key Vault CMK), In Transit (TLS 1.2+ partout, VPN, Private Endpoints), In Use (Microsoft Purview Endpoint DLP: bloquer copier-coller, impression, capture écran depuis apps classifiées). Le DLP cloud inspecte les uploads vers le SaaS (MDCA/CASB). Protection complète nécessite les 3 états."},
{id:2063,cat:"Sécurité des Données",q:"Scénario: Un employé envoie accidentellement une feuille de calcul contenant 10 000 numéros de sécurité sociale à un groupe email externe. Processus RGPD ?",o:["Envoyer un email de rappel à l'employé","1) Containment: rappeler l'email (si possible via Exchange recall), notifier les destinataires externes de supprimer l'email, 2) Évaluation: données personnelles exposées = violation RGPD potentielle, 3) Notification DPO dans les 72h (CNIL en France si risque pour les personnes), 4) Documentation de l'incident, 5) Formation de l'employé, 6) Revue des politiques DLP pour prévention","Rien si accidentel","Attendre 30 jours pour décider"],a:1,e:"Réponse violation de données RGPD: 1) Identifier l'étendue (combien de personnes? quelle catégorie de données?), 2) Évaluer le risque pour les personnes concernées, 3) Si risque: notifier l'autorité (CNIL) dans 72h, 4) Si risque élevé: notifier les personnes concernées, 5) Documenter dans le registre des violations (même si pas de notification obligatoire), 6) Remédiation technique."},
{id:2064,cat:"Sécurité des Données",q:"Qu'est-ce que 'Azure Information Protection (AIP/MIP)' et le Rights Management Service (RMS) ?",o:["Un système d'archivage email","Purview Information Protection (anciennement AIP): classifie et protège les documents avec des labels. Azure RMS est le moteur de protection (chiffrement AES-256 + politique d'accès intégrée dans le fichier). Le fichier protégé reste chiffré partout: si envoyé à une mauvaise personne, ils ne peuvent pas l'ouvrir (sauf si autorisés par la policy)","Un antivirus pour les documents","Un système de contrôle de versions"],a:1,e:"MIP/RMS protection: le fichier est chiffré (AES-256) et la politique d'accès est intégrée dans le fichier (qui peut lire, imprimer, copier, modifier, et jusqu'à quand). Même si le fichier est exfiltré sur une clé USB ou envoyé par erreur: l'attaquant ne peut pas l'ouvrir sans authentification Azure AD ET avoir le droit dans la policy. Protection 'follow the data'."},
{id:2065,cat:"Sécurité Physique",q:"Pourquoi la sécurité physique est-elle fondamentale même avec une sécurité logique forte ?",o:["La sécurité physique n'est pas du domaine IT","Un attaquant ayant accès physique à un serveur peut: booter sur USB (bypasse BitLocker sans TPM+PIN), extraire le disque et lire le contenu (si pas chiffré), installer un hardware keylogger, ou lancer une attaque DMA via Thunderbolt. La sécurité physique est la première couche de Defense in Depth. Un datacenter non sécurisé physiquement = pas de sécurité","La sécurité physique est pour les gardiens","Uniquement pour les datacenters on-premises"],a:1,e:"Attaques nécessitant l'accès physique: Evil Maid Attack (bootkit sur clé USB pendant absence), Cold Boot Attack (extraire la RAM gelée pour récupérer les clés crypto), DMA Attack (Thunderbolt/PCIe DMA pour lire la RAM), hardware implant (keylogger, JTAG). Protections: BitLocker+TPM+PIN, BIOS password, secure boot, détection d'ouverture châssis, badgeage renforcé."},
{id:2066,cat:"Sécurité Physique",q:"Qu'est-ce que le 'Tailgating' et comment les entreprises s'en protègent-elles ?",o:["Une technique de suivi réseau","Un employé non autorisé (ou attaquant se faisant passer pour un livreur/technicien) suit une personne autorisée pour entrer dans une zone sécurisée sans s'authentifier. Protection: sas de sécurité (un seul passage à la fois), formation du personnel (ne jamais laisser passer sans badge), caméras, et culture de sécurité (poliment demander le badge)","Une attaque réseau","Une technique de phishing"],a:1,e:"Tailgating/Piggybacking: vecteur d'attaque physique classique pour accéder à des zones sécurisées (salle serveur, open space). Contre-mesures: sas (mantrap: salle entre deux portes, première s'ouvre → on scanne le badge → deuxième s'ouvre uniquement si badge valide), badges visibles obligatoires, formation (tout le monde doit montrer son badge, même le CEO), agents de sécurité, et alertes aux équipes IT."},
{id:2067,cat:"Concepts Avancés",q:"Qu'est-ce que le 'Threat Modeling' et quelle méthodologie est recommandée ?",o:["Une analyse des menaces passées","Un processus d'identification proactive des risques de sécurité d'un système en se posant 4 questions: Que construisons-nous? Que peut-il mal tourner? Comment réduire les risques? Avons-nous bien travaillé? STRIDE (Spoofing, Tampering, Repudiation, Info Disclosure, DoS, Elevation of Privilege) est la méthode Microsoft. PASTA, VAST sont d'autres approches","Une analyse de sécurité annuelle","Un audit de conformité"],a:1,e:"Threat Modeling (STRIDE): chaque composant est analysé pour 6 catégories de menaces. Ex: API: Spoofing (faux client), Tampering (modifier requête), Repudiation (nier les actions), Information Disclosure (données exposées), DoS (surcharger l'API), Elevation of Privilege (accéder à des ressources non autorisées). Résultat: liste de risques avec mitigations à implémenter. Microsoft Threat Modeling Tool (gratuit)."},
{id:2068,cat:"Concepts Avancés",q:"Qu'est-ce que la 'Security Orchestration' et comment améliore-t-elle les opérations SOC ?",o:["Un outil de planification des équipes SOC","L'intégration et l'automatisation des outils de sécurité pour permettre des workflows end-to-end: une alerte SIEM déclenche → enrichissement automatique (VirusTotal, WHOIS) → si malveillant: isolation automatique MDE → création ticket ServiceNow → notification Teams. Réduit les MTTD/MTTR, élimine les tâches manuelles répétitives","Un système de rapport de sécurité","Un outil de monitoring réseau"],a:1,e:"Security Orchestration (SOAR): connecter les outils (SIEM → EDR → Firewall → ITSM → Comms). Exemple Sentinel: alerte MDE → Logic App playbook → appel API MDE (isoler machine) + appel API AAD (révoquer sessions) + créer ticket ServiceNow + envoyer notification Teams. Temps de réponse: minutes vs heures manuelles."},
{id:2069,cat:"Concepts Avancés",q:"Qu'est-ce que le 'Purple Teaming' et comment améliore-t-il la sécurité ?",o:["Un Red Team avec des vêtements violets","Collaboration entre Red Team (attaquants) et Blue Team (défenseurs): le Red Team exécute des attaques (Atomic Red Team / technique ATT&CK spécifique) pendant que le Blue Team vérifie si leurs détections fonctionnent. Si la détection manque → créer la règle ensemble. Itératif et collaboratif vs adversarial. ROI plus élevé qu'un red team solo","Un exercice uniquement théorique","Un outil de test de vulnérabilités"],a:1,e:"Purple Team: Red exécute T1059.001 (PowerShell execution) → Blue vérifie si l'alerte Sentinel/SIEM se déclenche. Si non: créer la règle. Si oui: améliorer le playbook de réponse. Résultat: couverture ATT&CK mesurable et améliorée. Outils: Caldera (MITRE), Atomic Red Team, Stratus Red Team (cloud attacks), VECTR (suivi des campagnes)."},
{id:2070,cat:"Concepts Avancés",q:"Qu'est-ce que le 'Cyber Resilience' et comment diffère-t-il de la 'Cybersécurité' ?",o:["Des termes identiques","Cybersécurité = empêcher les incidents (prévention). Cyber Résilience = capacité à maintenir les opérations et se remettre rapidement même lors d'un incident. Include: préparation (IR plans), absorption (continuité business pendant l'incident), récupération rapide (RTO/RPO faibles), et adaptation (apprendre de chaque incident pour s'améliorer). DORA (UE) impose la cyber-résilience","La résilience est uniquement technique","La cybersécurité inclut déjà la résilience"],a:1,e:"Cyber Resilience va au-delà: 'assume breach' (partir du principe qu'un incident arrivera) et se préparer à absorber et récupérer. Business Continuity + Disaster Recovery + IR Plan + lessons learned = résilience. DORA (Digital Operational Resilience Act) impose des tests de résilience (TLPT: Threat-Led Penetration Testing), RTO/RPO contractuels, et gestion des risques tiers ICT."},
{id:2071,cat:"Sécurité des Applications",q:"Qu'est-ce que 'CSRF (Cross-Site Request Forgery)' et comment s'en protéger ?",o:["Une attaque d'injection SQL","Une attaque qui force un utilisateur authentifié à exécuter des actions non voulues sur un site où il est connecté (ex: transférer de l'argent). Protection: CSRF tokens (jeton unique par session validé côté serveur), SameSite Cookie attribute (Strict ou Lax), vérification de l'Origin/Referer header, et Double Submit Cookie pattern","Une attaque sur les cookies","Une attaque de déni de service"],a:1,e:"CSRF: l'attaquant crée un lien/formulaire qui fait une requête vers bank.com/transfer?to=attacker&amount=1000. Si l'utilisateur est connecté à bank.com, le navigateur envoie automatiquement ses cookies. Protection: CSRF Token (valeur secrète dans le form, validée par le serveur) rend l'attaque impossible car l'attaquant ne connaît pas le token."},
