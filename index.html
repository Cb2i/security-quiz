{id:3037,cat:"Scénarios SC-401",q:"Comment mesurer la maturité d'une stratégie Information Protection dans M365 ?",o:["Uniquement le nombre de labels créés","KPIs: % de documents classifiés (objectif: >90%), % d'emails labellisés, coverage DLP (% de workloads couverts), false positive rate (<5%), taux de labelling automatique vs manuel, violations DLP résolues vs bloquées, Score Compliance Manager, et Secure Score Information Protection (accessible dans le Compliance Center)","Uniquement le nombre d'alertes DLP","L'opinion des utilisateurs"],a:1,e:"Métriques MIP: Content Explorer (% contenu sensible classifié), Activity Explorer (actions des utilisateurs sur les labels), DLP Reports (violations, overrides, blocks), Compliance Manager score (section Information Protection), et coverage metrics (% des workloads avec DLP policies actives). Baseline au démarrage, mesurer mensuellement l'amélioration."},
{id:3038,cat:"Scénarios SC-401",q:"Scénario: Des consultants externes accèdent à des documents M365 confidentiels. Comment protéger les données pendant le partage ?",o:["Ne pas partager avec des externes","1) Sensitivity Label 'Confidential-External' avec chiffrement permettant l'accès 'Any authenticated user' + restriction (view only, pas d'impression), 2) SharePoint External Sharing avec expiration (link expire en 7 jours), 3) Azure AD B2B (invitation nominative), 4) MDCA Session Policy (si sensible: pas de téléchargement depuis appareil non géré), 5) Access Reviews pour révoquer après mission","Partager sans restrictions","Envoyer des captures d'écran"],a:1,e:"Partage sécurisé avec consultants: B2B invitation (identité nominative, pas de lien anonyme), label avec chiffrement view-only pour les documents très sensibles (peuvent lire mais pas télécharger/modifier), SharePoint external sharing avec expiration automatique, MDCA Session Policy (watermarking + no download sur appareils non gérés), Access Review à la fin de la mission pour révoquer."},
{id:3039,cat:"Scénarios SC-401",q:"Quel est le rôle de 'Content Explorer' et 'Activity Explorer' dans la surveillance de l'Information Protection ?",o:["Ce sont des outils de recherche d'emails","Content Explorer: inventaire de tous les éléments classifiés ou contenant des SITs dans M365 (combien de documents avec label Confidential dans SharePoint, combien d'emails avec CC numbers dans Exchange). Activity Explorer: journal des activités liées aux labels (label applied, changed, removed, DLP policy match, endpoint activities). Ensemble: posture + comportements","Des outils de recherche eDiscovery","Des dashboards de performance"],a:1,e:"Content Explorer = état actuel (snapshot) de la distribution des données sensibles par location, SIT, et label. Activity Explorer = timeline des événements (qui a changé quel label, quand, les matched DLP, les actions endpoint). L'analyse combinée permet: voir si les labels sont appliqués correctement (Content Explorer) ET si les utilisateurs respectent les politiques (Activity Explorer)."},
{id:3040,cat:"Scénarios SC-401",q:"Comment intégrer Purview Information Protection avec des applications tierces (Adobe Acrobat, AutoCAD) ?",o:["Impossible avec des applications tierces","1) MIP SDK pour les éditeurs qui intègrent nativement la protection, 2) Azure Information Protection Unified Labeling Client (pour les apps Office et les fichiers locaux), 3) Pour les apps non-intégrées: Adobe Reader peut ouvrir les PDFs protégés via le plugin AIP, 4) Classification et protection des fichiers non-Office via le scanner MIP (SharePoint on-premises, file shares)","Uniquement via des macros Office","Uniquement avec des convertisseurs de fichiers"],a:1,e:"Intégration tierces: Adobe Acrobat supporte nativement MIP/AIP (ouvrir les PDFs RMS-protégés avec les droits appropriés). Les apps avec MIP SDK intégré (SAP, Salesforce via partenaires). Pour les apps sans support: AIP Unified Labeling client pour Windows (classe et protège les fichiers dans l'explorateur Windows). MIP Scanner pour les repositories SharePoint on-prem et fichiers réseau."},
{id:3041,cat:"Scénarios SC-401",q:"Scénario: L'équipe conformité demande un rapport sur toutes les violations DLP du trimestre pour l'auditeur externe. Comment générer ce rapport ?",o:["Copier-coller les alertes email","1) Purview Compliance Center → DLP → Reports: exporter les DLP Incidents Report (violations par politique, utilisateur, date, action), 2) Activity Explorer: filtrer sur 'DLP policy matched' avec date range, exporter CSV, 3) Log Analytics/Sentinel: requête sur DLPPolicyMatchesDetailsV2 table pour les rapports avancés, 4) Power BI connector sur Log Analytics pour un dashboard directeur","Envoyer les alertes email brutes","Demander à Microsoft les logs"],a:1,e:"Reporting DLP pour audit: DLP Reports dans Compliance Center (Top rule matches, Top users, trend charts), Activity Explorer export (CSV avec tous les incidents: policy name, user, action taken, content name, location, timestamp), et Sentinel DLP data pour des rapports KQL customisés. Pour l'auditeur: exporter en CSV/PDF depuis le Compliance Center avec les métadonnées complètes."},
{id:3042,cat:"Scénarios SC-401",q:"Comment configurer la protection des données dans Microsoft Teams pour les réunions et les messages ?",o:["Teams n'est pas concerné par la protection des données","1) Sensitivity Labels sur les Teams/canaux (contrôlent partage externe, enregistrement de réunion, accès invités), 2) DLP sur Teams messages (détecter/bloquer les messages contenant PII ou données sensibles), 3) Retention policies sur les messages Teams, 4) Communication Compliance sur les messages Teams, 5) Chiffrement E2E pour les appels Teams (optionnel, pour les réunions sensibles)","Teams est chiffré par défaut, rien à faire","Uniquement la politique de réunion"],a:1,e:"Teams protection complète: Labels pour les Teams (govern la sensibilité du contenu du canal, partage externe), DLP Messages (alertes/blocages si quelqu'un partage des CC numbers dans le chat), Retention labels sur les messages (durée de conservation configurable), Communication Compliance (surveillance sectorielle), et pour les réunions très sensibles: E2E encryption (désactive l'enregistrement et les transcriptions automatiques)."},
{id:3043,cat:"Scénarios SC-401",q:"Qu'est-ce que les 'Trainable Classifiers' dans Purview et comment les utiliser ?",o:["Des modèles de machine learning que les utilisateurs entrainent","Des modèles ML pré-entraînés ou personnalisés qui reconnaissent des types de contenus complexes que les patterns regex (SITs) ne peuvent pas identifier: 'Contracts', 'Resumes', 'Financial Statements', 'Source Code'. Les classifieurs personnalisés apprennent depuis des exemples fournis (50 positifs + 50 négatifs minimum) pour reconnaître vos types de documents spécifiques","Des outils de formation Microsoft","Des algorithmes de détection de malwares"],a:1,e:"Trainable Classifiers: pre-trained (Harassment, Discrimination, Threat, Profanity, Financial documents, Resumes, etc. - 30+ built-in) ou personnalisés (entraîner avec vos propres documents). Utilisés dans: Sensitivity Label auto-labeling (labelliser automatiquement les Contrats), DLP conditions (détecter les CV dans les emails), Communication Compliance (détecter le contenu de harcèlement). Plus flexible que les SITs regex pour les contenus sémantiques."},
{id:3044,cat:"Scénarios SC-401",q:"Comment gérer les 'Sensitive Information Types (SIT)' personnalisés pour des données métier spécifiques ?",o:["Les SITs personnalisés ne sont pas possibles","Créer un SIT personnalisé dans Purview: 1) Définir un pattern primaire (regex pour le format), 2) Ajouter des corroborating evidence (mots-clés proches: 'numéro client', 'référence dossier'), 3) Définir la confidence level (High/Medium/Low selon les évidences), 4) Tester avec des exemples, 5) Utiliser dans les DLP policies et les labels auto-apply. Ex: Numéro de Sécurité Sociale français (NIR) avec son format spécifique","Uniquement les SITs Microsoft peuvent être utilisés","Via des scripts PowerShell uniquement"],a:1,e:"SIT personnalisé exemple NIR (INSEE): pattern regex = [12][0-9]{2}(0[1-9]|1[0-2]|20)[0-9]{2}[0-9]{2,3}[0-9]{3}[0-9]{2}, keyword list = ['numéro sécurité sociale', 'numéro sécu', 'NIR'], confidence High = regex + 2 mots-clés dans 300 chars. Tester avec des exemples. Publier et utiliser dans DLP pour détecter les SSN français spécifiquement."},
{id:3045,cat:"Scénarios SC-401",q:"Scénario: Une entreprise doit démontrer au RGPD qu'elle respecte le 'droit à l'effacement'. Comment Purview y contribue-t-il ?",o:["Supprimer manuellement tous les fichiers de la personne","1) Priva Subject Rights Requests: automatiser la recherche et l'effacement des données personnelles, 2) Retention Labels avec durée définie (suppression automatique après expiration), 3) eDiscovery pour localiser toutes les données de la personne, 4) AAD delete user (supprime les données d'identité), 5) Exchange MSEARCH pour supprimer des emails spécifiques, 6) Documentation pour prouver l'effacement","Désactiver le compte uniquement","RGPD ne s'applique pas aux données M365"],a:1,e:"Droit à l'effacement M365: Priva SRR → recherche automatique des données de la personne dans M365 → review (identifier les exceptions légales: données sous retention légale ne peuvent pas être effacées), → suppression des éléments sans retention légale → rapport d'exécution pour démontrer la conformité. Les données sous Legal Hold ou retention obligatoire sont exclues de l'effacement (avec justification documentée)."},
{id:3046,cat:"Sensitivity Labels",q:"Scénario: Votre organisation doit classifier automatiquement des milliers de documents existants dans SharePoint. Quelle approche ?",o:["Classification manuelle document par document","Service-side Auto-Labeling Policy (pas client-side): créer une politique dans Compliance Center qui scanne SharePoint/OneDrive en arrière-plan. Définir les conditions (SITs: numéros de CB, NIR, etc.), le label à appliquer, et le mode (Simulation d'abord pour voir l'impact, puis Enable). La politique tourne en continu sur les nouveaux et anciens fichiers","Formation des utilisateurs pour classifer","Uniquement PowerShell"],a:1,e:"Auto-labeling service-side: Compliance Center → Information Protection → Auto-labeling policies → Create policy. Sélectionner les locations (SPO sites, OD accounts), configurer les conditions (content contains SIT 'Credit Card Number' high confidence). Mode Simulation: voir quels fichiers seraient labelisés (sans les modifier). Après validation: Enable. Scale: des millions de fichiers scanés sans intervention utilisateur."},
{id:3047,cat:"DLP Policies",q:"Comment configurer une politique DLP pour Teams qui détecte le partage de credentials dans les messages ?",o:["Impossible de scanner les messages Teams","DLP Policy avec location 'Microsoft Teams' + condition: Content contains SIT 'Password' ou regex [Pp]assword\s*[:=]\s*\S+. Ou utiliser un SIT personnalisé pour les patterns de credentials. Action: Block message (empêcher l'envoi), Policy Tip (éduquer l'utilisateur), Alert admin. Les messages Teams chat et canal sont couverts (pas les appels vocaux)","Bloquer Teams entièrement","Former uniquement les utilisateurs"],a:1,e:"DLP Teams pour credentials: créer un SIT custom 'Password Pattern' avec regex détectant les formats courants (password=XXX, pwd:XXX, token: eyJ...). DLP Policy Teams → Block posting (message non envoyé) + Policy Tip explicatif ('Ne partagez pas de mots de passe dans Teams, utilisez Key Vault ou un gestionnaire de mots de passe'). Les messages Teams chat peuvent être scanés in-transit avant la livraison."},
{id:3048,cat:"Rétention et Records",q:"Qu'est-ce que 'Disposition Review' dans Purview Records Management ?",o:["La suppression automatique après rétention","Quand un Retention Label avec 'Trigger a disposition review' expire, les éléments ne sont pas automatiquement supprimés. À la place, ils entrent dans la queue de Disposition Review: des reviewers désignés peuvent Approve (supprimer définitivement), Reject (conserver indefiniment), ou Relabel (changer le label et redémarrer la rétention). Audit complet de chaque décision","Un processus RH","Un outil de recherche eDiscovery"],a:1,e:"Disposition Review workflow: label 'Financial-7years' expire → item dans la disposition queue → reviewer (Finance Manager) reçoit une notification email → examine l'item → approve suppression (avec justification documentée) ou reject (litige en cours = conserver). Multi-stage review: approbation par 2 reviewers différents pour les records très importants. Audit trail immuable de toutes les décisions."},
{id:3049,cat:"Communication Compliance",q:"Comment configurer Communication Compliance pour détecter le harcèlement dans les messages Teams ?",o:["Impossible de détecter le harcèlement automatiquement","Politique CC avec: 1) Scope: tous les utilisateurs (ou groupes à risque), 2) Conditions: Trainable Classifier 'Harassment' OU 'Threat' OU mots-clés personnalisés (dictionnaire de termes offensants), 3) Direction: Inbound + Outbound + Internal, 4) Reviewer: équipe HR ou Compliance Officer. Le reviewers voit les messages flaggués avec contexte (messages environnants)","Désactiver Teams pour réduire les risques","Uniquement signalement manuel des employés"],a:1,e:"CC Harassment policy: Trainable Classifiers pré-entraînés (Harassment, Discrimination, Threat, Profanity) analysent le contenu sémantiquement (pas seulement des mots-clés). Coverage: Teams messages (chat et canaux), Exchange emails, et Viva Engage. La politique peut être ciblée sur des groupes à risque ou appliquée à tous. Les reviewers voient le contexte (5 messages avant/après) pour évaluer objectivement."},
{id:3050,cat:"Insider Risk Management",q:"Scénario: Un employé vient d'être licencié. Comment IRM vous aide-t-il à prévenir la fuite de données dans les 2 semaines suivant le licenciement ?",o:["Désactiver le compte immédiatement (sans suivi)","1) IRM reçoit le signal HR (date de départ), 2) Augmente automatiquement la sensibilité aux activités de cet employé (plus d'alertes générées pour des activités qui seraient normales pour un autre), 3) Détecte: téléchargements massifs, partages externes, emails avec PJ volumineuses, accès à des fichiers jamais consultés auparavant, 4) Alerte le Compliance Officer pour investigation, 5) Si activité confirmée: déclencher le processus légal/RH","Surveiller manuellement","Bloquer l'accès à tout immédiatement"],a:1,e:"IRM Departing Employee: le trigger HR (date de départ) active une surveillance renforcée sans changer le comportement de l'utilisateur (surveillance invisible = l'employé ne sait pas qu'il est surveillé davantage). La politique 'Data Theft by Departing User' génère des alertes sur les séquences suspectes: accès à de nombreux fichiers → téléchargement zip → envoi email externe. Timeline complète pour l'investigation légale."},
{id:3051,cat:"eDiscovery et Audit",q:"Scénario: Un employé accuse son manager de harcèlement via email. Comment utiliser eDiscovery pour collecter les preuves ?",o:["Exporter manuellement les emails","1) Créer un eDiscovery (Standard) case, 2) Placer le mailbox de l'employé ET du manager sous Legal Hold (préserver toutes les communications), 3) Content Search avec critères: Sender/Recipient filtrés aux deux parties + date range, 4) Exporter les résultats en PST, 5) Remettre à l'équipe RH/Legal avec la chaîne de custody documentée, 6) Ne pas modifier les emails originaux (preuves légales)","Lire les emails directement dans Outlook","Demander les screenshots à l'employé"],a:1,e:"eDiscovery HR investigation: Legal Hold en premier (avant tout, préserver les preuves - l'employé ou le manager pourrait supprimer des emails), puis la recherche peut être faite ensuite. Chaîne de custody: noter qui a accédé aux données, quand, et pour quelle raison. Exporter avec hash verification (MD5 du PST = preuve d'intégrité). Les exports eDiscovery incluent les métadonnées (timestamps, etc.) essentielles pour la preuve légale."},
{id:3052,cat:"Microsoft Priva",q:"Comment Priva Privacy Risk Management identifie-t-il les données surexposées ?",o:["Via des scans manuels","Priva PRM analyse continuellement M365 pour identifier: 1) Overexposed Data (données personnelles dans des sites SharePoint accessibles à 'Everyone'), 2) Data Transfers (PII envoyées à l'extérieur de l'organisation), 3) Data Minimization (données personnelles dans des boîtes email avec beaucoup de participants, suggestion de réduire le partage). Fournit des recommandations et des actions correctives automatisées","Un audit annuel uniquement","Via Sensitivity Labels uniquement"],a:1,e:"Priva PRM détections: 1) Overexposed = fichiers avec PII partagés 'Anyone with the link' ou dans des sites publics (SharePoint permissions 'Everyone except external users'), 2) Transfers = emails avec PII envoyés à des domaines externes fréquemment, 3) Data hoarding = utilisateurs stockant beaucoup de PII dans leurs OneDrive sans justification. Chaque risque généré une 'risk alert' avec des recommended actions pour le propriétaire du site/l'utilisateur."},
{id:3053,cat:"Scénarios SC-401",q:"Comment intégrer Purview Information Protection avec SharePoint pour le partage externe sécurisé ?",o:["SharePoint n'intègre pas Purview","1) Sensitivity Labels 'Groups & Sites' scope: contrôlent le partage externe du site SPO (désactiver le partage Anyone pour les sites Confidential), 2) SPO Default Sensitivity Label: quand un fichier est uploadé sans label, un label par défaut est appliqué, 3) DLP Policy sur SPO: bloquer le partage externe de fichiers avec PII non labellisés, 4) SPO Access Request workflow + Entitlement Management pour l'approbation formelle du partage externe","SharePoint et Purview sont indépendants","Désactiver le partage externe de SharePoint"],a:1,e:"SPO + Purview intégration: les labels 'Groups & Sites' définissent les limites de partage du site (ex: label 'Confidential' = External Sharing = New and existing guests only, pas de lien Anonymous). Les fichiers dans le site héritent du label du site par défaut. DLP: si un fichier Confidential est partagé avec un lien Anonymous → bloquer + alerter l'admin. Entitlement Management: process d'approbation formelle pour inviter un externe à un site sensible."},
{id:3054,cat:"Sensitivity Labels",q:"Qu'est-ce que 'Label Inheritance' dans les applications M365 et comment fonctionne-t-il ?",o:["Les labels ne peuvent pas être hérités","Quand un utilisateur copie du contenu d'un document labellisé dans un nouveau document, ou quand des emails reçoivent des labels basés sur les pièces jointes, le label le plus restrictif est hérité. Ex: copier du texte d'un fichier 'Confidential' dans un fichier 'Internal' → le nouveau fichier reçoit une recommandation ou est automatiquement élevé au niveau 'Confidential'","L'héritage est uniquement pour les emails","L'héritage est uniquement pour SharePoint"],a:1,e:"Label Inheritance scenarios: 1) Email inheritance: si une réponse/forward contient un email labellisé Confidential, la réponse hérite du label Confidential, 2) Container inheritance: un fichier créé dans un site Teams labellisé 'Highly Confidential' reçoit ce label par défaut, 3) Copy-paste: contenu copié depuis un doc labellisé vers un autre doc → recommandation d'élever le label du document cible. Configurable dans la Label Policy."},
{id:3055,cat:"DLP Policies",q:"Comment utiliser les 'Named Entity SITs' (Sensitive Information Types basées sur des entités nommées) dans Purview ?",o:["Les entités nommées ne sont pas dans Purview","Named Entity SITs (preview): reconnaissent des entités spécifiques: noms de personnes physiques, adresses postales, termes médicaux. Contrairement aux SITs regex classiques (qui cherchent des patterns), les Named Entity SITs utilisent le ML pour reconnaître le contexte. Ex: 'All Full Names' reconnaît 'Jean-Pierre Dupont' même sans pattern regex prévisible. Utilisés dans les politiques DLP et auto-labeling","Uniquement pour les noms de pays","Des listes de mots-clés uniquement"],a:1,e:"Named Entity SITs: Purview inclut des SITs ML-based pour: All Full Names (reconnaît les noms de personnes dans de nombreuses langues), Physical Addresses (adresses postales structurées), Medical Terms (terminologie HIPAA), Financial Terms. Ces SITs sont plus précis que les SITs regex pour les contenus sémantiques. Utiliser dans DLP: détecter les documents contenant des noms + adresses = probable PII dossier client."},
{id:3056,cat:"Rétention et Records",q:"Scénario: Votre organisation est soumise à plusieurs réglementations avec des durées de rétention contradictoires (RGPD: supprimer après 2 ans vs MiFID II: conserver 7 ans). Comment gérer ?",o:["Choisir la durée la plus courte","Créer des labels spécifiques par type de donnée: 'Financial-MiFID-7years' et 'PersonalData-GDPR-2years'. Appliquer les labels au contenu pertinent (les communications financières = 7 ans, les données personnelles sans lien financier = 2 ans). Si une donnée relève des deux réglementations: le principe de conservation maximale s'applique (7 ans) avec documentation de la base légale. Consulter le DPO et le Legal","Conserver indéfiniment pour sécurité","Supprimer après 2 ans (RGPD est plus récent)"],a:1,e:"Conflits de rétention RGPD vs réglementation sectorielle: quand les deux s'appliquent, la conservation obligatoire légale (MiFID II) prime sur le droit à l'effacement RGPD (avec documentation de l'intérêt légitime). Purview: créer des labels différents par contexte. Le DPO doit valider la matrice des durées de rétention. La documentation de la base légale de conservation est requise pour justifier la conservation au-delà de 2 ans."},
{id:3057,cat:"eDiscovery et Audit",q:"Qu'est-ce que 'Content Search' au niveau organisation et ses limites ?",o:["Une recherche Google d'entreprise","Content Search dans Compliance Center: rechercher dans toutes les sources M365 (Exchange boîtes mailbox, SPO sites, OD comptes, Teams, Viva Engage) en utilisant des requêtes KQL (mots-clés, dates, expéditeurs, destinataires). Limites: pas de Legal Hold (uniquement une recherche), résultats de recherche peuvent changer si des éléments sont supprimés entre la recherche et l'export, et la recherche est limitée aux admins de conformité","Une recherche dans SharePoint","Une recherche dans les emails uniquement"],a:1,e:"Content Search vs eDiscovery: Content Search est pour les admin IT (trouver rapidement un email pour quelqu'un), eDiscovery est pour les investigations légales formelles (avec Hold, case management, export avec chaîne de custody). Utiliser Content Search pour: trouver des données pour une DSAR, investiguer une violation de données interne (qui a envoyé quoi?). Limitations: pas de hold = les données peuvent disparaître pendant l'investigation."},
{id:3058,cat:"Insider Risk Management",q:"Comment configurer les 'IRM Indicators' et les 'Thresholds' pour réduire les faux positifs ?",o:["Utiliser les paramètres par défaut uniquement","Dans la policy IRM → Indicators: activer uniquement les indicateurs pertinents pour votre organisation (ex: si pas d'USB autorisés = activer 'Copy to removable media', si pas de cloud apps approuvés = activer 'Upload to cloud service'). Thresholds: ajuster les seuils au-dessus de votre baseline normale (ex: si les employés téléchargent normalement 50 fichiers/jour, mettre le seuil à 200/jour pour les alertes)","Ne jamais ajuster les seuils","Activer tous les indicateurs disponibles"],a:1,e:"Réduction des FP IRM: 1) Analyser les activités normales de vos employés (baseline dans Activity Explorer), 2) Activer uniquement les indicateurs pertinents pour votre contexte (tous activés = trop de bruit), 3) Ajuster les seuils volumétriques (au-dessus de votre baseline normale), 4) Configurer des exclusions pour les activités légitimes connues (ex: l'équipe IT copie régulièrement sur USB pour maintenance = exclure ce groupe), 5) Séquences d'indicateurs plutôt qu'indicateurs individuels."},
{id:3059,cat:"Microsoft Priva",q:"Comment implémenter un processus DSAR (Data Subject Access Request) conforme RGPD en utilisant Priva ?",o:["Processus entièrement manuel","1) Configurer Priva SRR (Subject Rights Requests), 2) Configurer les sources de données (Exchange, SPO, OD, Teams), 3) Quand une DSAR est reçue: créer une nouvelle SRR avec les informations du demandeur, 4) Priva recherche automatiquement dans toutes les sources M365, 5) Reviewer examine les résultats (redacter les informations de tiers), 6) Générer le rapport final et envoyer au demandeur. Timer: tracker le délai légal de 30 jours dans le portail Priva","Exporter tous les emails de la personne","Contacter Microsoft pour les données"],a:1,e:"DSAR Priva workflow: créer une SRR → entrer le nom/email du demandeur → Priva lance une recherche automatique (emails, fichiers SPO/OD, messages Teams) → résultats présentés pour review → Reviewer redacte les informations de tiers (mentions d'autres personnes) → Package de réponse généré (PDF ou ZIP) → envoi sécurisé au demandeur. Le timer RGPD (30 jours) est affiché dans le portail. Audit log de tout le processus."},
{id:3060,cat:"Scénarios SC-401",q:"Comment mesurer le ROI de l'Information Protection dans Purview ?",o:["Uniquement via les coûts de licences","Métriques ROI: 1) Incidents de DLP évités (alertes × coût moyen d'une breach = M€ évités), 2) Taux de classification (% de documents classifiés, objectif >90%), 3) DSAR processing time (avant vs après Priva), 4) Réduction du Shadow IT (données dans des apps non approuvées détectées et remontées via MDCA), 5) Coût d'audit réduit (données retrouvables rapidement via eDiscovery), 6) Conformité réglementaire (amendes évitées)","Uniquement le coût des licences Purview","Le nombre d'alertes générées"],a:1,e:"ROI Information Protection: quantifier les bénéfices. Ex: 10 incidents DLP bloqués × 50K€ coût moyen de notification de violation = 500K€ économisés. DSAR processing: avant Priva = 40h par DSAR, après = 4h → 36h × 50€/h × 50 DSARs/an = 90K€ économisés. Audit eDiscovery: réduire de 3 semaines à 2 jours. Amendes RGPD évitées: 4% du CA peut dépasser facilement le coût des licences Purview."},
{id:3061,cat:"Sensitivity Labels",q:"Qu'est-ce que 'AIP Scanner (Azure Information Protection Scanner)' et quand l'utiliser ?",o:["Un scanner de réseau pour les fichiers","MIP Scanner (renommé Purview Information Protection Scanner): scanner on-premises qui classifie et protège les fichiers sur: partages réseau Windows (\\server\share), SharePoint Server on-premises, et systèmes de fichiers locaux. L'agent est installé sur un Windows Server, se connecte à Azure AD, et applique les sensitivity labels et la protection aux fichiers non-Office en utilisant les rules configurées dans Purview","Un outil de scan de vulnérabilités","Un scanner de malwares"],a:1,e:"MIP Scanner use case: migration vers le cloud, l'organisation a des TO de fichiers sur des partages réseau legacy non classifiés. Déployer MIP Scanner: scanner ces partages, identifier les fichiers avec PII (NIR, IBAN, etc.), les classifier automatiquement avec le bon label, et optionnellement appliquer la protection RMS. Rapport: quels fichiers ont été classifiés, combien de PII trouvées. Prépare la migration SharePoint Online avec des fichiers déjà classifiés."},
{id:3062,cat:"DLP Policies",q:"Comment configurer des 'DLP Exclusions' sans créer de failles de sécurité ?",o:["Les exclusions ne sont pas nécessaires","Exclusions justifiées et documentées: 1) Exclusion par groupe AD (ex: l'équipe Juridique est exclue des règles DLP sur les contrats car c'est leur cœur de métier), 2) Exclusion par domaine externe (ex: partages vers le cabinet d'audit externe approuvé), 3) Exclusion par site SharePoint (ex: le site Légal peut partager des contrats), 4) Documenter chaque exclusion avec la justification business et la date de revue","Exclure tous les managers","Désactiver DLP pour certains utilisateurs"],a:1,e:"Exclusions DLP best practices: chaque exclusion doit être justifiée (pourquoi cette exception est-elle nécessaire?), documentée (qui a approuvé?), et révisée périodiquement (toujours valide?). Pas d'exclusion par utilisateur individuel (trop risqué), uniquement par groupe AD ou par contexte. Les exclusions sont auditables dans Activity Explorer. Trop d'exclusions = politique DLP inefficace."},
{id:3063,cat:"Communication Compliance",q:"Quels types d'analyse ML sont disponibles dans Communication Compliance pour détecter les risques ?",o:["Uniquement des mots-clés","Trainable Classifiers pré-entraînés dans CC: 1) Harassment (contenu harcelant), 2) Threat (menaces physiques), 3) Profanity (langage offensant), 4) Targeted Harassment (ciblé vers une personne), 5) Adult content (contenu inapproprié), 6) Discrimination, 7) Information Barriers policy violations (détection de violations IB dans les messages), 8) Giftcards (potentiel paiement illicite), 9) Money Laundering (signaux financiers suspects)","Uniquement des règles regex","Uniquement les mots-clés personnalisés"],a:1,e:"CC ML capabilities: les Trainable Classifiers analysent le sens et le contexte, pas seulement les mots-clés. Ex: 'Harassment' classifier reconnaît le harcèlement dans de nombreuses formulations sans liste exhaustive de mots. Combiner plusieurs classifiers dans une seule policy: Harassment OR Threat = une seule alerte si l'un ou l'autre est détecté. Ajustement: les reviewers peuvent 'Agree' ou 'Disagree' avec les détections pour améliorer le classifier (feedback loop)."},
{id:3064,cat:"Scénarios SC-401",q:"Comment déployer des Sensitivity Labels pour une organisation de 10 000 utilisateurs avec un minimum de friction ?",o:["Déploiement immédiat à tous les utilisateurs","Déploiement par phases: Phase 1 (pilote: 100 utilisateurs early adopters, labels sans chiffrement = friction minimale), Phase 2 (formation + déploiement des labels sans chiffrement à tous), Phase 3 (activer auto-labeling = labels appliqués automatiquement sans action utilisateur), Phase 4 (mandatory labeling pour les apps sensibles), Phase 5 (chiffrement sur les labels Highly Confidential). Chaque phase mesurée avant la suivante","Déploiement immédiat avec chiffrement","Formation uniquement sans déploiement"],a:1,e:"Déploiement progressif MIP: commencer par des labels informatifs (sans protection = pas de friction) pour que les utilisateurs s'habituent au concept. Auto-labeling = les labels apparaissent sans que l'utilisateur ait à les appliquer (très peu de friction). Mandatory labeling avec une liste de labels simples (pas de choix complexe). Chiffrement uniquement pour les niveaux les plus sensibles. Chaque étape inclut formation + feedback + ajustement."},
{id:3065,cat:"eDiscovery et Audit",q:"Scénario: Après une attaque de phishing réussie, comment utiliser Purview Audit pour reconstituer ce que l'attaquant a fait dans M365 ?",o:["Impossible après l'attaque","1) Audit (Premium) requis pour MailItemsAccessed, 2) Identifier la fenêtre de compromission (AAD SigninLogs), 3) Rechercher dans Audit: MailItemsAccessed (quels emails a-t-il lu?), SearchQueryInitiated (a-t-il cherché des termes spécifiques?), InboxRuleCreated (a-t-il créé des règles de redirection?), MessageSent (a-t-il envoyé des emails depuis le compte compromis?), FileSyncDownloaded (a-t-il synchronisé des fichiers OneDrive?)","Contacter Microsoft","Regarder les alertes email"],a:1,e:"BEC forensic avec Audit Premium: 1) Identifier le timeframe (quand premier login suspect depuis SigninLogs), 2) MailItemsAccessed: quels emails lus (sujet, sender - permet de savoir si l'attaquant a lu des emails financiers ou RH), 3) InboxRuleCreated: règle 'Supprimer les emails contenant Facture' (signe d'interception financière), 4) SearchQueryInitiated: l'attaquant a-t-il cherché 'wire transfer' ou 'payment'?, 5) New outbound emails (BEC fraud). Timeline complète = savoir exactement ce qui a été exposé."},
{id:3066,cat:"Information Barriers",q:"Scénario: Après avoir configuré les Information Barriers, un manager de l'équipe M&A ne peut plus inviter ses collaborateurs Trading à une réunion Teams. Comment résoudre sans désactiver IB ?",o:["Désactiver les Information Barriers temporairement","1) Vérifier que ce besoin est intentionnel (IB est configurée pour bloquer cette communication), 2) Si une exception est nécessaire (ex: coordination légale requise): créer une 'IB Compliance Administrator' exception ou reconfigurer les segments (créer un segment 'M&A-Legal' qui peut communiquer avec 'Trading' pour les cas réglementaires), 3) Si c'est une erreur de configuration: vérifier l'appartenance des utilisateurs aux segments","Supprimer l'utilisateur du segment M&A","Créer un email à la place"],a:1,e:"IB troubleshooting: utiliser le cmdlet Get-InformationBarrierPoliciesApplicationStatus pour vérifier que la policy a bien été appliquée. Get-InformationBarrierRecipientStatus pour vérifier dans quel segment est un utilisateur. Si une exception est réellement nécessaire (le droit réglementaire le permet pour certaines communications): reconfigurer les segments pour créer un sous-groupe autorisé à communiquer via une policy 'Allow' ciblée."},
{id:3067,cat:"Sensitivity Labels",q:"Comment configurer les Sensitivity Labels pour les réunions Teams avec chiffrement E2E ?",o:["E2E Teams ne supporte pas les labels","Meeting Labels dans Teams (preview): créer des labels avec scope 'Teams Meeting'. Ces labels peuvent: désactiver l'enregistrement, désactiver la transcription automatique, activer le chiffrement E2E (seuls les participants directs déchiffrent le contenu, Microsoft ne peut pas accéder), désactiver le lobby (permettre seulement les utilisateurs internes), et watermarker les vidéos. Appliqués par l'organisateur lors de la création de la réunion","Teams meetings ne peuvent pas être protégés","Uniquement via les politiques de réunion globales"],a:1,e:"Meeting Labels Teams: pour les réunions sensibles (exécutifs, M&A, données patients), créer un label 'Highly Confidential Meeting' qui: active E2E encryption (sans E2E, Microsoft peut techniquement accéder au flux), désactive l'enregistrement, désactive le transcript, watermarque les vidéos (dissuasion contre captures d'écran), et exclut les participants anonymes. L'organisateur choisit le label lors de la création de la réunion."},
{id:3068,cat:"DLP Policies",q:"Qu'est-ce que le mode 'Policy Tips' dans DLP et comment optimiser l'expérience utilisateur ?",o:["Des notifications admin uniquement","Policy Tips = notifications contextuelles dans l'interface (Outlook, Word, SharePoint) quand une activité viole une règle DLP. Apparaissent avant l'envoi (email) ou avant le partage. L'utilisateur peut: accepter le blocage, fournir une justification (override avec motif), ou signaler un faux positif. Optimiser: messages clairs et éducatifs (pas d'alerte technique), lien vers la politique d'usage, et option de justification pour les cas légitimes","Des alertes email retardées","Des notifications uniquement aux admins"],a:1,e:"Policy Tips UX: le message doit expliquer POURQUOI (ex: 'Ce document semble contenir des numéros de sécurité sociale. Conformément à notre politique RGPD, merci de vérifier que ce partage est nécessaire.'), proposer une alternative (utiliser un canal sécurisé), et permettre l'override avec justification (les utilisateurs légitimes ne sont pas bloqués, mais leur action est auditée). Un bon Policy Tip = formation continue sans friction excessive."},
{id:3069,cat:"Scénarios SC-401",q:"Comment auditer la configuration de Purview Information Protection pour s'assurer qu'elle est effective ?",o:["Uniquement demander aux utilisateurs","Audit complet: 1) Content Explorer: % de contenu classifié par label et SIT, 2) Activity Explorer: actions sur les labels (applied, changed, removed) et violations DLP, 3) DLP Reports: top violations, false positive rate, user override rate, 4) Compliance Score MIP section, 5) Tests fonctionnels (créer des documents tests avec PII et vérifier que les labels et DLP fonctionnent comme prévu), 6) Access Reviews sur les admins Purview (qui peut modifier les policies?)","Rapport annuel uniquement","Uniquement via PowerShell"],a:1,e:"MIP audit régulier: mensuel → Activity Explorer (trends d'utilisation des labels, spike d'overrides = faux positifs ou contournement intentionnel), DLP Reports (incidents par policy = quelle policy génère le plus d'alertes), Content Explorer (évolution du % de contenu classifié). Trimestriel → test fonctionnel complet (simuler différents scenarios: envoi PII externe = bloqué?, label downgrade = justification demandée?). Annuel → revue complète de la strategy et mise à jour des SITs/classifiers."},
{id:3070,cat:"Insider Risk Management",q:"Qu'est-ce que 'IRM Forensic Evidence' et dans quels cas l'activer ?",o:["Des preuves documentaires d'un incident","Forensic Evidence dans IRM (préversion): capture des screenshots des activités suspectes sur les endpoints Windows gérés. Quand activé pour des utilisateurs spécifiques en investigation, des captures d'écran sont automatiquement prises lors d'activités risquées (téléchargement de fichiers sensibles, upload vers des cloud apps). Activer uniquement: sur décision du Compliance Officer après investigation formelle, pas de surveillance de masse","Un outil de surveillance de masse des employés","Un système de backup des écrans"],a:1,e:"Forensic Evidence IRM: très intrusif = décision éthique et légale lourde. Requis: approbation formelle du processus, notice dans la charte informatique, DPIA (Data Protection Impact Assessment) si UE, et usage limité aux enquêtes formelles (pas prévention générale). Les captures sont disponibles uniquement aux Compliance Officers qui enquêtent sur un cas formellement ouvert. Les captures sont conservées selon la rétention des cas IRM."},
{id:3071,cat:"Scénarios SC-401",q:"Comment planifier la migration vers Microsoft Purview pour une organisation qui utilise des outils DLP tiers ?",o:["Migration immédiate en coupant les outils tiers","Approche progressive: 1) Inventorier les règles DLP existantes (tiers) → mapper vers les équivalents Purview, 2) Déployer Purview en mode Simulation parallèlement à l'outil tiers (voir les gaps), 3) Migrer règle par règle en commençant par les plus simples, 4) Valider chaque règle migrée (test fonctionnel), 5) Coexistence pendant 3-6 mois, 6) Désactiver progressivement l'outil tiers. Ne pas couper avant d'avoir validé la couverture complète","Désactiver le tiers immédiatement","Garder les deux indéfiniment"],a:1,e:"Migration DLP: cartographier les règles existantes (ex: 'règle DLP tiers sur les CC numbers external email' → 'Purview DLP Exchange: Credit Card Number SIT High confidence, external recipients, Block'). Mode Simulation: mesurer les faux positifs et les faux négatifs vs l'outil tiers. Combiner: Purview couvre M365 nativement (Teams, SharePoint, Endpoint), le tiers couvre peut-être d'autres canaux. Calcul ROI: coût licence tiers vs valeur Purview inclus dans M365 E5."},
{id:3072,cat:"DLP Policies",q:"Comment DLP Purview protège-t-il les données dans les agents M365 Copilot ?",o:["Copilot ignore les politiques DLP","M365 Copilot respecte les politiques DLP: 1) Les données utilisées par Copilot sont soumises aux mêmes contrôles d'accès que pour les utilisateurs humains, 2) Copilot ne peut pas accéder à des contenus que l'utilisateur n'est pas autorisé à voir (pas d'escalade de privilèges), 3) Les interactions Copilot (prompts + réponses) peuvent être incluses dans le scope DLP, 4) Les labels de sensibilité des sources consultées s'appliquent aux réponses générées","Copilot contourne toutes les protections","Copilot a accès à tout le tenant"],a:1,e:"Copilot + DLP: Microsoft a conçu Copilot pour respecter les permissions existantes (l'utilisateur via Copilot ne peut accéder qu'à ce qu'il peut accéder directement). DLP sur Microsoft 365 Copilot (préversion): les interactions Copilot peuvent être soumises aux politiques DLP (ex: Copilot ne génère pas de réponse contenant des données PII si l'utilisateur n'est pas autorisé à les voir). Sensitivity Labels de sources = hérités dans les réponses."},
{id:3073,cat:"DLP Policies",q:"Qu'est-ce que 'Microsoft Purview Data Map' et comment contribue-t-il à la gouvernance des données ?",o:["Un outil de cartographie réseau","Purview Data Map: découverte et classification automatique des données dans Azure (Storage, SQL, Synapse, Cosmos DB, Blob), M365, AWS S3, et des sources on-premises. Crée un catalogue des actifs données avec leurs classifications (SITs détectés), leurs propriétaires, et leur lineage (d'où vient cette donnée, où va-t-elle). Base de la stratégie 'Discover → Classify → Protect'","Un outil de documentation","Un système de backup des données"],a:1,e:"Data Map vs Content Explorer: Content Explorer = données dans M365 (Exchange, SPO, OD, Teams). Data Map = données dans TOUTES les sources (Azure SQL, Blob Storage, AWS S3, on-premises SQL Server). Data Map scanne avec des collections de SITs, classe les assets, et popule le Data Catalog (Purview Data Catalog = findable, governed data). Pour les grandes organisations avec beaucoup de données dans le cloud et on-premises."},
{id:3074,cat:"Rétention et Records",q:"Scénario: Un tribunal émet une 'Legal Hold' pour un employé pendant 3 ans. Comment implémenter dans Purview ?",o:["Sauvegarder manuellement les emails","1) eDiscovery Standard ou Premium → New Case, 2) Create Hold sur le cas: sélectionner l'employé comme custodian, choisir les locations (Exchange mailbox + OneDrive), 3) Le Legal Hold est placé: les emails et fichiers ne peuvent plus être supprimés même si l'utilisateur les efface (ils vont dans la Preservation Hold Library), 4) Le Hold reste actif jusqu'à sa levée explicite par un admin Compliance, 5) Exporter via Content Search dans le cas si demandé","Désactiver le compte","Archiver manuellement chaque mois"],a:1,e:"Legal Hold via eDiscovery: une fois le Hold placé sur une mailbox → même si l'utilisateur vide sa corbeille → les éléments restent dans la Preservation Hold Library (invisible pour l'utilisateur). Si un Retention Label plus court existe sur un email → le Hold overrides la rétention (le plus long gagne). Le Hold est conservé jusqu'à ce qu'un eDiscovery admin le lève explicitement. Audit: qui a placé/levé le Hold, quand."},
{id:3075,cat:"Sensitivity Labels",q:"Comment les Sensitivity Labels fonctionnent-ils avec les PDF dans Microsoft Purview ?",o:["Les PDFs ne supportent pas les labels","Les PDFs peuvent être labellisés et protégés: 1) Office enregistre en PDF avec le label préservé (et la protection RMS si configurée), 2) Adobe Acrobat (avec plugin AIP) peut ouvrir les PDFs protégés, 3) Microsoft Edge peut ouvrir les PDFs labellisés, 4) Les PDFs protégés affichent le filigrane et l'en-tête/pied de page du label. Le label est stocké dans les métadonnées XMP du PDF","Les labels sont supprimés à la conversion PDF","Uniquement Office peut les ouvrir"],a:1,e:"PDF + MIP: quand un utilisateur 'Save as PDF' depuis Word ou imprime vers PDF, si Word avait un label Confidential → le PDF reçoit aussi le label (et la protection RMS si configurée). Adobe Acrobat Reader + AIP plugin = ouvre le PDF protégé avec les droits configurés (view-only, no print, etc.). Microsoft Edge intégré = peut aussi ouvrir les PDFs RMS-protégés natifs (pour les utilisateurs Microsoft). Attention: pas tous les lecteurs PDF supportent RMS."},
{id:3076,cat:"Insider Risk Management",q:"Quels sont les 'Sequence Detectors' dans IRM et comment améliorent-ils la détection ?",o:["Des détecteurs d'alarme physique","Des patterns d'activités séquentielles qui, combinées, indiquent un risque plus élevé qu'individuellement: 1) 'Risky Browser Usage' → 'Download from SharePoint' → 'Upload to Cloud' (séquence d'exfiltration), 2) 'Access to Confidential Files' → 'Email to External' (partage potentiel), 3) 'Repeated DLP Violations' → 'File Deletion' (nettoyage post-exfiltration). Les séquences génèrent des scores de risque plus élevés que les activités isolées","Des alertes simples sur des activités isolées","Un système de règles fixes"],a:1,e:"IRM Sequences: une seule violation DLP peut être une erreur. Une violation DLP suivie d'un téléchargement massif la même journée = pattern suspect. IRM Sequence Detector: si 'File downloaded from sensitive site' se passe dans les 2 heures après 'DLP policy match' → risque cumulé. Ces séquences élèvent le score de risque et peuvent déclencher des alertes plus rapidement que chaque indicateur individuellement."},
{id:3077,cat:"Scénarios SC-401",q:"Comment intégrer Purview avec Microsoft Sentinel pour une réponse aux incidents de fuite de données ?",o:["Purview et Sentinel sont indépendants","Connecteur Sentinel + Purview: 1) Purview DLP Incidents → Sentinel via le connecteur Microsoft Purview, 2) Sentinel corrèle les incidents DLP avec d'autres signaux (IRM, AAD, MDE), 3) Playbook Logic App: un incident DLP High → enrichir avec Identity Risk (AAD) → si compte aussi à risque (IRM) → isolation automatique (Block Sign-in) + notification CISO + création ticket P1","Uniquement des emails d'alerte","Uniquement via des exports CSV"],a:1,e:"Purview → Sentinel integration: le connecteur Purview envoie les DLP incidents dans Sentinel (table PurviewDLPAlerts). Règle analytique: corréler PurviewDLPAlerts avec IdentityInfo (utilisateur à risque IRM) → si match = incident Sentinel P1. Playbook: Block Sign-in de l'utilisateur (AAD API), notifier le Compliance Officer via Teams, ouvrir un IRM case pour investigation. Réponse coordonnée données + identité + SOC."},
{id:3078,cat:"Communication Compliance",q:"Scénario: Un employé soumet une plainte de harcèlement basée sur des messages Teams. Quelle est la procédure d'investigation utilisant Communication Compliance ?",o:["Lire directement les messages Teams de l'employé","1) Ouvrir le case CC (s'il existe) ou créer une demande Content Search, 2) Vérifier si une policy CC a capturé les messages, 3) Si oui: examiner les messages dans le CC review interface (avec contexte), 4) Exporter les messages avec chaîne de custody pour le dossier RH/légal, 5) Si non: utiliser eDiscovery Content Search avec les deux parties et la plage de dates. IMPORTANT: ne jamais modifier les preuves","Accéder directement à la boîte Teams","Demander les screenshots à l'employé"],a:1,e:"CC investigation: les messages flaggués dans CC sont déjà capturés et immuables (ne peuvent pas être modifiés ou supprimés par les parties). Si pas de CC policy: eDiscovery pour capturer les messages (mais le délai entre l'incident et la capture peut poser des questions de chaîne de custody). Exporter: les messages avec leur contexte (messages environnants), les métadonnées (timestamp exact, lu par, etc.), hashé (MD5) pour l'intégrité légale."},
{id:3079,cat:"Rétention et Records",q:"Comment créer une 'File Plan' dans Purview Records Management ?",o:["Un plan de fichiers physiques","File Plan dans Purview: un tableau de bord qui liste tous les Retention Labels avec leurs métadonnées business: descripteur du label (type de record: Financial, Legal, HR), autorité réglementaire (RGPD, MiFID II), provision (loi ou règlement applicable), durée de conservation, action à l'expiration (Delete, Disposition Review). Permet de gérer et importer/exporter les labels via CSV pour des grandes organisations","Un outil de gestion des fichiers SharePoint","Un système de classification des fichiers locaux"],a:1,e:"File Plan Manager: une vue consolidée de tous les labels de rétention avec leur justification réglementaire. Utilisé pour: présenter la stratégie de rétention aux auditeurs (chaque label a sa base légale documentée), et pour les migrations (exporter en CSV depuis l'ancien système, modifier, importer dans Purview). Inclure: Regulatory body (CNIL, AMF, SEC), Provision (Art. 17 RGPD, MiFID II Article 16), et Retention Period with trigger (Created Date, Event-based)."},
{id:3080,cat:"DLP Policies",q:"Scénario: Votre organisation veut appliquer DLP sur les données dans Power BI. Comment configurer ?",o:["Power BI ne supporte pas DLP","1) Activer Purview DLP pour Power BI dans le portail Compliance Center, 2) Power BI datasets sont scannés pour les SITs (ex: données PII dans les reports financiers), 3) Si détecté: appliquer un Sensitivity Label automatiquement au dataset Power BI, 4) DLP Policy: alerter l'admin si un dataset Power BI contenant des CC numbers est partagé publiquement ou avec des utilisateurs externes, 5) Les rapports publiés héritent du label du dataset","Uniquement des permissions Power BI","Power BI est hors scope DLP"],a:1,e:"Purview DLP pour Power BI: Power BI est une location supportée dans les DLP policies. La configuration: sélectionner Power BI comme location dans la DLP policy, définir les conditions (SIT: Credit Card Number), définir l'action (Alert admin, appliquer un label). Power BI datasets scannés in-service. Si un dataset public contient des PII: alerte + optionnellement bloquer le partage externe. Intégration avec Sensitivity Labels Power BI (héritage label du dataset vers les rapports)."},
{id:3081,cat:"Sensitivity Labels",q:"Qu'est-ce que le 'Double Key Encryption' (DKE) dans Microsoft Purview et quand l'utiliser ?",o:["Un chiffrement doublé standard","DKE = chiffrement où 2 clés sont nécessaires pour déchiffrer: la clé Microsoft (dans Azure Key Vault) ET une clé détenue par l'organisation (sur ses propres serveurs). Microsoft ne peut JAMAIS accéder aux données seul. Cas d'usage: données ultra-sensibles où l'organisation ne peut légalement pas permettre à Microsoft d'y accéder (secrets d'État, données patient avec exigences légales strictes, IP critique)","Un backup de clé de chiffrement","Un chiffrement symétrique renforcé"],a:1,e:"DKE vs HYOK vs standard RMS: standard = Microsoft gère la clé (convient 99% des cas), HYOK (Hold Your Own Key) = clé on-premises AD RMS (legacy), DKE = clé divisée entre Microsoft et l'organisation (maximum security, Microsoft compliance). DKE limitations: fichiers plus lourds, compatibilité réduite (certaines features M365 désactivées car Microsoft ne peut pas traiter le contenu), performance impactée. Réservé aux données les plus critiques."},
{id:3082,cat:"DLP Policies",q:"Qu'est-ce que les 'Trainable Classifiers' dans Purview et comment les utiliser dans les politiques DLP ?",o:["Des règles manuelles de classification","Des modèles ML pré-entraînés par Microsoft qui reconnaissent des types de contenu par contexte et sens (pas seulement mots-clés): Source Code (Python, Java, C#...), Resumes, Project Documents, Financial Statements, Medical/Health information, Legal Affairs. Utilisables dans les conditions DLP comme alternative ou complément aux SITs","Des listes de mots-clés","Des règles regex avancées"],a:1,e:"Trainable Classifiers vs SITs: SIT = pattern structuré (format numéro CB, regex NIF), Classifier = contenu sémantique (reconnait que c'est un CV même sans format fixe). Exemple: SIT 'French Social Security Number' détecte les numéros NIR, 'Medical' Classifier détecte les dossiers médicaux même sans numéros spécifiques. Combinaison: DLP policy condition = SIT Credit Card OR Classifier Financial Statement → protection des deux types."},
{id:3083,cat:"Sensitivity Labels",q:"Comment configurer l'héritage de Sensitivity Labels dans Microsoft Teams pour les canaux et fichiers ?",o:["Les labels ne s'appliquent pas à Teams","Container Labels pour Teams: un label appliqué à une Team peut configurer: la confidentialité du groupe (Public/Privé), l'accès des invités externes, le partage de fichiers SharePoint depuis la Team, le contexte de découverte (searchable ou non). Les fichiers dans la Team héritent du label de la Team par défaut (si configured). Configurer via: Label scope → Groups & Sites","Labels Teams sont indépendants","Labels Teams uniquement manuels"],a:1,e:"Container Labels Teams: quand un admin crée une Team avec le label 'Confidentiel', les paramètres s'appliquent automatiquement: pas d'invités externes, pas de partage de fichiers avec des non-membres, la Team n'est pas visible dans les recherches. Les nouveaux fichiers créés dans la Team héritent du label parent (configurable). Cas réel: Team 'M&A' avec label Highly Confidential → tous les fichiers créés dans cette Team démarrent avec le label Highly Confidential."},
{id:3084,cat:"eDiscovery et Audit",q:"Quelle est la différence entre 'Audit Standard' et 'Audit Premium' dans Microsoft Purview ?",o:["Aucune différence","Audit Standard (M365 E3): rétention 90 jours, événements de base (login, accès fichiers, admin). Audit Premium (M365 E5): rétention 1 an (extensible à 10 ans), événements haute valeur supplémentaires: MailItemsAccessed (quels emails ont été lus), SearchQueryInitiated (recherches dans Exchange), Send (envoi d'emails), InboxRuleCreated (règles boîte de réception), et bandwidth throttling pour les exports d'audit","Différence uniquement de prix","Audit Premium uniquement pour les grandes organisations"],a:1,e:"Audit Premium use cases: compromission de compte (MailItemsAccessed montre si l'attaquant a lu des emails sensibles), BEC investigation (SearchQueryInitiated montre si l'attaquant a cherché 'wire transfer'), rétention légale longue durée (1 an minimum vs 90 jours). Intelligent insights: Audit Premium permet d'identifier les utilisateurs qui accèdent à des volumes anormaux de boîtes aux lettres (compromission éventuelle). Requis pour toute investigation forensique sérieuse."},
{id:3085,cat:"Insider Risk Management",q:"Comment fonctionne la 'Privacy Protection' dans IRM pour respecter la vie privée des employés ?",o:["IRM enregistre tout sans protection privacy","IRM by design incluent des protections privacy: 1) Pseudonymisation: dans l'interface IRM, les utilisateurs sont affichés avec des pseudonymes anonymes (Utilisateur A, B, C) par défaut, 2) Seuls les Compliance Officers assignés au cas peuvent voir les vraies identités, 3) Require 2-person approval pour voir les détails (optionnel), 4) Audit log de qui a vu quoi dans IRM, 5) Politique d'usage définie avant déploiement (notice aux employés)","IRM ne supporte pas la privacy","Pas de protection privacy dans IRM"],a:1,e:"IRM Privacy by Design: GDPR compliance = les employés doivent être informés de la surveillance dans la charte informatique (notice). Pseudonymisation dans l'UI: un analyste IRM Level 1 voit 'User A downloaded 500 files' sans savoir qui est User A. Un Compliance Officer (rôle supérieur) peut lever l'anonymat pour investigation formelle. Ce processus est lui-même audité (qui a levé l'anonymat, quand). DPIA recommandée avant déploiement IRM."},
{id:3086,cat:"DLP Policies",q:"Qu'est-ce que 'Endpoint DLP' et comment diffère-t-il du DLP basé sur les services M365 ?",o:["Identique au DLP standard","Endpoint DLP s'exécute directement sur les appareils Windows 10/11 (via MDE onboarding) et monitore/contrôle: copie de fichiers vers USB, impression de documents sensibles, copie dans le presse-papier (clipboard), upload vers des navigateurs web (Chrome, Edge, Firefox), accès via des apps non-autorisées, et Bluetooth transfer. Fonctionne même hors réseau d'entreprise (laptop en déplacement)","DLP uniquement pour les emails","DLP uniquement pour SharePoint"],a:1,e:"Endpoint DLP vs Service DLP: Service DLP (Exchange/SPO/Teams) = contrôle les données en transit dans M365, Endpoint DLP = contrôle les données sur l'endpoint (copy to USB, print, browser upload). Complémentaires: une politique peut couvrir les deux locations. Endpoint DLP require MDE onboarded + Windows 10 1809+. Actions possibles: Audit (log), Block with override, Block completely. Exemple: bloquer la copie de tout fichier avec label Confidential vers une clé USB non-approuvée."},
{id:3087,cat:"Sensitivity Labels",q:"Comment les Sensitivity Labels interagissent-ils avec les permissions SharePoint IRM (Information Rights Management) ?",o:["Labels et IRM SharePoint sont incompatibles","Avec Sensitivity Labels avec chiffrement (RMS): quand un fichier labellisé est stocké dans SharePoint, la protection RMS est 'activée à l'accès' (Azure RMS persistent). SharePoint IRM (legacy) vs Labels: les labels sont la méthode recommandée. Si les deux sont actifs, les permissions du label ont priorité. Attention: certaines fonctionnalités SharePoint (co-authoring en temps réel) nécessitent que le service SharePoint puisse déchiffrer temporairement pour traiter","Labels remplacent IRM SharePoint","IRM SharePoint est obligatoire avec les labels"],a:1,e:"Labels + SharePoint: quand 'Sensitivity Labels' avec chiffrement sont activés pour SharePoint, SharePoint obtient une clé de déchiffrement temporaire (via le service RMS) pour permettre les fonctions natives (indexation de contenu pour la recherche, eDiscovery, DLP scan). Cela ne compromet pas la sécurité car le déchiffrement est effectué dans les data centers Microsoft sécurisés. Pour DKE: SharePoint ne peut pas indexer le contenu (car Microsoft ne peut pas déchiffrer). Feature limitation à considérer."},
{id:3088,cat:"Scénarios SC-401",q:"Un employé part demain pour la concurrence. Que déclenche IRM et quelles sont les actions recommandées ?",o:["Rien, attendez la confirmation","IRM peut détecter via le Policy template 'Departing Employee': l'employé est mis dans un groupe 'Departing Employees' → IRM commence à scorer ses activités avec poids plus élevé. Activités surveillées dans les 30 jours avant la date de départ: téléchargements massifs OneDrive, emails vers comptes personnels, accès à des listes de clients/prospects, copie vers USB. Action recommandée: ouvrir un IRM case, notifier Legal, et revue du compte avant désactivation","Bloquer immédiatement le compte","Supprimer tous les accès sans investigation"],a:1,e:"Departing Employee policy IRM: créer le cas IRM dès la notification de départ. Séquence d'investigation: 1) Activity Explorer: volumes de téléchargement des 30 derniers jours (baseline vs récent), 2) Content Search: emails vers domaines concurrents connus ou comptes perso, 3) IRM Alerts: si le score de risque déclenche, 4) Legal Hold sur le compte (eDiscovery), 5) À la désactivation: audit final. Les données collectées servent potentiellement en cas de litige NDA."},
{id:3089,cat:"Microsoft Priva",q:"Qu'est-ce que 'Microsoft Priva Tracker Scanning' et comment aide-t-il à la conformité GDPR ?",o:["Un scanner de réseau","Priva Tracker Scanning (Microsoft Priva Consent Management): scanne les sites web de l'organisation pour identifier les trackers de suivi (cookies, pixels, scripts tiers). Cartographie: quels trackers sont présents, quels sont leur objectif (analytics, advertising, functional), dans quels pays les données sont envoyées. Intègre avec Priva Consent Management pour s'assurer que les bandeaux de consentement couvrent bien tous les trackers détectés","Un outil de scanning antivirus","Un scanner de vulnérabilités web"],a:1,e:"GDPR Article 7 (consentement): les organisations doivent obtenir un consentement valide avant d'utiliser des cookies non-essentiels. Priva Tracker Scanning identifie automatiquement les trackers, les catégorise, et alerte si des trackers non-déclarés dans le bandeau de consentement sont détectés. Exemple: un nouveau pixel Facebook ajouté par le Marketing sans notification Compliance → Priva le détecte et alerte. Aide à maintenir la conformité en continu vs un audit annuel."},
{id:3090,cat:"Rétention et Records",q:"Qu'est-ce que la 'Disposition Review' dans Purview Records Management et comment configurer ce workflow ?",o:["La suppression automatique sans review","Disposition Review = processus de validation humaine avant qu'un Record soit définitivement supprimé à l'expiration de sa période de rétention. Configurer: dans un Retention Label → Action à l'expiration = 'Start a disposition review', ajouter les reviewers (par email ou groupe). À l'expiration, les reviewers reçoivent une notification et voient les éléments dans le Disposition tab du Compliance Portal. Ils peuvent: Approuver la suppression, Relabel, ou Extend la rétention","La suppression immédiate des records","Un audit de la politique de rétention"],a:1,e:"Disposition Review workflow: pour les Records critiques (ex: contrats, brevets), ne pas supprimer automatiquement = trop risqué. Disposition Review: à l'expiration → email au Legal Counsel 'Ce contrat avec Acme Corp expire dans 30 jours. Approuvez-vous la suppression?' → Legal revoit le document → si oui = suppression avec preuve d'approbation, si non = peut relabeler ou étendre. Audit complet: qui a approuvé, quand, pourquoi. Conforme à ISO 15489 (records management)."},
{id:3091,cat:"Communication Compliance",q:"Comment créer des 'Custom Trainable Classifiers' pour Communication Compliance dans un secteur spécifique ?",o:["Les classifiers sont uniquement pré-définis","1) Créer un Trainable Classifier custom: collecter 200-500 exemples positifs (messages qui doivent être détectés) et 200-500 exemples négatifs, 2) Uploader dans Purview comme 'Seed Content' dans un SharePoint dédié, 3) Microsoft ML entraîne le classifier, 4) Phase de test: 200 exemples supplémentaires pour valider la précision, 5) Publier le classifier, 6) Utiliser dans les policies CC comme condition. Cas: jargon sectoriel financier (recommandations d'investissement non-autorisées)","Impossible de créer des classifiers custom","Utiliser uniquement des regex"],a:1,e:"Custom Classifier use cases: secteur financier = détecter les recommandations d'investissement non-autorisées par des traders ('achetez AAPL avant les résultats' = potentiellement délit d'initié), secteur pharma = détecter les discussions sur des données d'essais cliniques non-publiées, gouvernement = détecter les fuites de données classifiées. Précision: viser >85% de précision avant production. Les faux positifs fatiguent les reviewers → ajuster les exemples d'entraînement."},
{id:3092,cat:"Information Barriers",q:"Qu'est-ce que le mode 'Single Segment' vs 'Multi-Segment' dans les Information Barriers ?",o:["Identiques","Single Segment: chaque utilisateur appartient à UN SEUL segment (ex: un trader est dans le segment 'Trading' seulement). Multi-Segment (IB V2): un utilisateur peut appartenir à PLUSIEURS segments simultanément (ex: un manager IB peut être dans 'Compliance' ET 'M&A' ET 'Trading' pour superviser). IB V2 (mode non-legacy) supporte: SharePoint, OneDrive, et Teams nativement. V1 (legacy) = Teams uniquement","Multi-segment uniquement pour les admins","Single segment uniquement disponible"],a:1,e:"Migration vers IB V2: si votre organisation a des structures matricielles (employés dans plusieurs départements), IB V2 est nécessaire. Single segment v1: si un employé rejoint temporairement un autre département → il doit changer de segment (admin action). Multi-segment v2: appartenances multiples gérées nativement. Vérifier la version: Get-PolicyConfig | fl InformationBarrierMode. Migration v1 → v2 avec Microsoft guidance car impacts sur les policies existantes."},
{id:3093,cat:"Sensitivity Labels",q:"Scénario: Des utilisateurs se plaignent qu'ils ne peuvent plus co-éditer en temps réel les documents Office avec chiffrement. Quelle est la cause et la solution ?",o:["Le chiffrement ne supporte pas la co-édition","Depuis 2022, Microsoft supporte la co-édition pour les fichiers chiffrés avec MIP dans SharePoint/OneDrive. Prérequis: 1) La fonctionnalité doit être activée dans le Compliance Admin Center (Enable co-authoring for files with sensitivity labels), 2) SharePoint/OD doit avoir les paramètres de co-édition activés, 3) Les apps Office doivent être en version récente (2206+). Si non activé: les utilisateurs voient le fichier en lecture seule si quelqu'un d'autre l'a ouvert","Co-édition impossible avec chiffrement","Désactiver le chiffrement pour permettre la co-édition"],a:1,e:"Co-authoring + MIP: activer dans le portail Compliance (Settings → Co-authoring for sensitivity labels). Impact: SharePoint déchiffre le fichier dans un environnement sécurisé pour gérer les révisions en temps réel, puis re-chiffre. Limitations: ne fonctionne pas avec DKE ou HYOK (Microsoft doit pouvoir déchiffrer). Une fois activé, monitorer les performances SharePoint (légère overhead). Tester avec des utilisateurs pilotes avant activation générale."},
{id:3094,cat:"DLP Policies",q:"Qu'est-ce que 'Adaptive Protection' dans Microsoft Purview et comment fonctionne-t-elle ?",o:["Une protection qui s'adapte au réseau","Adaptive Protection = intégration entre IRM et DLP: le niveau de risque IRM d'un utilisateur influence dynamiquement les règles DLP qui s'appliquent à lui. Exemple: un utilisateur avec un score IRM 'Elevé' déclenche une politique DLP plus restrictive (Block au lieu de Policy Tip). Ainsi, les utilisateurs normaux ont une expérience non-intrusive, tandis que les utilisateurs à risque voient des contrôles renforcés sans action admin manuelle","Une DLP qui s'adapte à la bande passante","Une DLP qui change selon l'heure"],a:1,e:"Adaptive Protection workflow: 1) IRM calcule le score de risque (Elevé/Modéré/Faible), 2) Ce score est exposé à DLP, 3) Dans la DLP policy, créer des conditions: 'If user risk = High' → action = Block, 'If user risk = Medium' → action = Block with override, 'If user risk = Low' → action = Policy Tip. Résultat: DLP s'adapte automatiquement au profil de risque sans créer des exceptions manuelles. Requis: M365 E5 Compliance + IRM configuré."},
{id:3095,cat:"eDiscovery et Audit",q:"Qu'est-ce que 'eDiscovery Premium' (Advanced eDiscovery) et quelles fonctionnalités avancées offre-t-il ?",o:["Juste une version plus chère d'eDiscovery Standard","eDiscovery Premium (M365 E5): 1) Custodian management: gérer les dépositaires avec notification de Legal Hold et suivi des accusés de réception, 2) Review Sets: analyse avancée des documents (near-duplicate detection, email threading, themes), 3) Predictive Coding (ML): identifier les documents pertinents dans de grands volumes, 4) Analytics: visualiser les patterns dans les données collectées, 5) Export en formats natifs avec chain of custody complet","Identique à Standard mais plus rapide","eDiscovery Premium uniquement pour les avocats"],a:1,e:"eDiscovery Premium use cases: litiges avec des volumes de données massifs (100K+ documents). Near-duplicate detection: regroupe les versions similaires d'un document (évite de reviewer 100 versions du même contrat). Email threading: affiche la conversation email complète au lieu d'emails individuels (contexte préservé). Predictive Coding: entraîner le ML sur quelques exemples de documents pertinents → le ML classe le reste. ROI: réduire de 80% le temps de review pour les grandes affaires."},
{id:3096,cat:"Scénarios SC-401",q:"Comment implémenter une stratégie de labeling automatique pour les données existantes dans SharePoint (des milliers de fichiers non-labellisés) ?",o:["Labeler manuellement chaque fichier","1) Auto-labeling policies (service-side): les policies scan le contenu SharePoint existant et appliquent les labels basés sur les SITs détectés (pas d'action utilisateur), 2) Prérequis: définir les conditions (ex: label 'Confidentiel' si NIR détecté avec haute confiance), 3) Mode Simulation d'abord: voir ce qui serait labellisé sans appliquer, 4) Valider le taux de faux positifs, 5) Activer en production. Les fichiers existants sont labellisés progressivement (processing en batch)","Supprimer et re-créer les fichiers","Attendre que les utilisateurs labellisent manuellement"],a:1,e:"Auto-labeling service-side: pour les DONNÉES EXISTANTES (retroactive labeling). Client-side auto-labeling = pour les nouvelles créations (recommande ou applique lors de l'édition). Service-side couvre: Exchange (scan des emails à l'arrivée/envoi), SharePoint/OneDrive (scan des fichiers existants et nouveaux). Throughput: Microsoft traite ~25K fichiers/jour par policy. Pour 1M de fichiers = ~40 jours. Prioriser les sites les plus sensibles en premier."},
{id:3097,cat:"Rétention et Records",q:"Comment les politiques de rétention Purview interagissent-elles avec les boîtes aux lettres Microsoft 365 ?",o:["Les emails sont supprimés immédiatement","Les rétentions sur Exchange: conservent les emails dans des dossiers cachés (Recoverable Items → Preservations) même si l'utilisateur les supprime définitivement. Processus: utilisateur supprime email → va dans Corbeille → puis Purges folder → la policy de rétention intercepte et déplace dans Preservation Hold Library (invisible pour l'utilisateur). L'email reste accessible aux admins Compliance/eDiscovery pendant toute la durée de rétention","Les emails sont archivés dans un PST","Les utilisateurs peuvent contourner la rétention"],a:1,e:"Exchange retention mechanics: l'Managed Folder Assistant (MFA) s'exécute périodiquement sur les mailboxes pour appliquer les rétentions. Si une mailbox est en Litigation Hold ET une rétention de 3 ans: le plus long s'applique. Items dans Recoverable Items: taille limite = 100GB (extensible avec auto-expanding archive). Si rétention ET suppression en conflit: la rétention gagne toujours. Content Search peut retrouver les emails dans les Recoverable Items même après suppression par l'utilisateur."},
{id:3098,cat:"Information Barriers",q:"Comment tester que les Information Barriers fonctionnent correctement après configuration ?",o:["Attendre un incident pour vérifier","1) Vérifier le statut d'application: Get-InformationBarrierPoliciesApplicationStatus, 2) Vérifier le segment d'un utilisateur: Get-InformationBarrierRecipientStatus -Identity user@domain.com, 3) Test fonctionnel: depuis le compte d'un utilisateur Segment A, tenter d'ajouter un utilisateur Segment B à une conversation Teams → doit être bloqué, 4) Vérifier les violations: dans Compliance Portal → Information Barriers → vérifier les logs, 5) Test de l'autre côté: depuis Segment B vers Segment A","Impossible de tester sans incident","Vérifier uniquement la configuration PowerShell"],a:1,e:"IB validation: le statut d'application peut prendre jusqu'à 24h après la configuration. Si Get-InformationBarrierPoliciesApplicationStatus montre 'NotStarted' ou 'InProgress', attendre. Les tests fonctionnels doivent couvrir: Teams 1:1 chat (bloqué?), Teams group chat (peut-on ajouter?), Teams channel membership, SharePoint si IB v2. Documenter les résultats de tests comme preuve de conformité pour les auditeurs réglementaires."},
{id:3099,cat:"DLP Policies",q:"Qu'est-ce qu'une 'DLP Policy Rule' avec plusieurs actions et comment prioriser les règles dans une policy ?",o:["Une seule action par règle","Une règle DLP peut avoir plusieurs actions simultanées: bloquer le partage + envoyer un email d'alerte + générer un rapport d'incident. Dans une policy avec plusieurs règles, les règles sont évaluées par priorité (ordre). La règle de priorité la plus haute qui correspond s'applique en premier. Best practice: règle la plus restrictive (block + high severity) en premier, règle moins restrictive (audit + low severity) en second pour capturer les variations","Une action par policy uniquement","L'ordre des règles n'a pas d'importance"],a:1,e:"DLP Rule priority: si une policy a règle 1 (High confidence, 5+ instances = Block) et règle 2 (Low confidence, 1+ instance = Notify), un document avec 5 CC numbers high confidence → règle 1 s'applique (Block). Un document avec 1 CC number low confidence → seulement règle 2 (Notify). Si les deux matchent → seule la règle prioritaire s'applique (pas d'actions cumulées sauf si 'Continue processing' est activé). Tester les interactions entre règles."},
{id:3100,cat:"Sensitivity Labels",q:"Comment configurer les 'Sensitivity Labels' pour les fichiers dans Azure Data Lake Storage ?",o:["Azure Data Lake ne supporte pas les labels","Via Microsoft Purview Data Map: 1) Connecter Azure Data Lake comme source de données dans Purview Data Map, 2) Configurer un scan avec les règles de classification (SITs), 3) Les assets classifiés dans Data Map peuvent recevoir des labels via la fonctionnalité 'Labeling for Azure' (preview), 4) Les assets dans ADLS apparaissent dans le Data Catalog avec leurs classifications et labels, 5) Les politiques DLP peuvent couvrir ces assets","Uniquement pour les fichiers Office","Uniquement via des scripts PowerShell"],a:1,e:"Purview Data Map + ADLS: pour les organisations avec de grandes quantités de données dans Azure (Data Lake, Blob Storage, SQL), le Data Map scanne et classifie automatiquement. Intégration avec Azure Policy: les ressources Azure sans labels peuvent déclencher des alertes de conformité. Labels sur ADLS = visibilité dans le Data Catalog (data stewards peuvent trouver les données sensibles) + base pour les politiques d'accès Azure RBAC."},
{id:3101,cat:"Microsoft Priva",q:"Qu'est-ce que 'Priva Subject Rights Requests' (SRR) et comment automatise-t-il les demandes GDPR ?",o:["Une demande de support Microsoft","Priva SRR: automatise le traitement des droits des personnes concernées (GDPR Art. 15-22): Accès (export de toutes les données de la personne), Rectification, Effacement (droit à l'oubli), Portabilité, Opposition. Workflow: 1) Créer une SRR dans Priva, 2) Recherche automatique dans M365 (Exchange, SharePoint, Teams) des données de la personne, 3) Reviewer les données trouvées, 4) Générer le rapport de réponse, 5) Exporter pour envoi à la personne. Délai légal GDPR: 30 jours","Un système de ticketing standard","Uniquement pour les employés"],a:1,e:"SRR Priva vs manuel: processus manuel = Legal/DPO cherche manuellement dans toutes les sources = des semaines. Priva SRR: automatise la recherche, identifie les données personnelles de la personne (basé sur le nom, email, ID employé), exclus les données légalement exemptées (défense d'un droit en justice), génère le rapport dans le format requis. Métriques: délai moyen de traitement, nombre de SRR par mois, taux de conformité dans les 30 jours. Obligation légale: amende jusqu'à 4% CA mondial pour non-respect."},
{id:3102,cat:"Scénarios SC-401",q:"Comment mettre en place une gouvernance complète pour Microsoft 365 Copilot pour respecter la conformité des données ?",o:["Copilot ne nécessite pas de gouvernance","Gouvernance M365 Copilot: 1) Sensitivity Labels: s'assurer que les données sensibles sont labellisées (Copilot respecte les labels), 2) Access Reviews: Copilot accède à CE QUE L'UTILISATEUR peut accéder → réduire l'oversharing d'abord (SharePoint permissions audit), 3) DLP sur Copilot interactions (preview), 4) Audit des interactions Copilot dans Purview Audit, 5) Communication Compliance sur les réponses Copilot (vérifier les réponses générées), 6) Politique d'usage acceptable Copilot","Désactiver Copilot pour tous","Uniquement des contrôles techniques"],a:1,e:"Copilot governance framework: le plus grand risque = Copilot expose des données auxquelles l'utilisateur a accès mais qu'il n'aurait pas trouvé normalement (oversharing découvert par Copilot). Audit SharePoint permissions: combien de fichiers 'Everyone' ou 'All authenticated users'? Réduire l'accès excessif avant d'activer Copilot. Sensitivity Labels: Copilot mentionne le label dans ses réponses ('Based on Confidential documents...'). Data Security Posture Management (DSPM) dans Purview = outil pour évaluer les risques avant déploiement Copilot."},
{id:3103,cat:"Sensitivity Labels",q:"Qu'est-ce que le 'Mandatory Label' dans les politiques de Sensitivity Labels et comment l'implémenter sans bloquer la productivité ?",o:["Un label qui chiffre obligatoirement","Mandatory Label = les utilisateurs doivent appliquer un label avant de pouvoir sauvegarder/envoyer un document ou email. Configuration dans la Label Policy: activer 'Require users to apply a label'. Pour ne pas bloquer: 1) Proposer un label 'General' non-restrictif comme option par défaut, 2) Lancer le Mandatory uniquement après formation, 3) Exclure temporairement certains groupes (pilote), 4) Utiliser un Default Label d'abord (sans mandatory) pour habituer les utilisateurs","Un label automatique sans choix utilisateur","Un label qui bloque tous les partages"],a:1,e:"Mandatory Label strategy: direct mandatory sans préparation = frustration + tickets helpdesk massifs. Recommended rollout: Phase 1 = Default Label (General appliqué automatiquement, utilisateur peut changer), Phase 2 = Mandatory (doit appliquer un label, peut garder General), Phase 3 = Mandatory + promouvoir les labels appropriés via formation. Résultat mesuré: % de documents labellisés, évolution dans Content Explorer. Exemption: certains types de fichiers peuvent être exclus (ex: fichiers système)."},
{id:3104,cat:"DLP Policies",q:"Comment configurer DLP pour protéger les données dans Microsoft Teams lors du partage de fichiers ET dans les messages de chat ?",o:["DLP ne couvre pas Teams chat","Teams DLP couvre deux vecteurs: 1) Fichiers partagés dans Teams (stockés dans SharePoint/OneDrive → couverts par SPO/OD location dans la DLP policy), 2) Messages Teams chat et channel: location 'Teams chat and channel messages' dans la DLP policy. Pour les messages: détecter les SITs dans le texte du message (ex: numéro CB partagé en clair dans un chat). Actions pour les messages Teams: bloquer l'envoi du message ou afficher un Policy Tip","DLP uniquement pour les emails","DLP ne couvre que les fichiers Teams"],a:1,e:"Teams DLP complet: activer les deux locations (SharePoint pour les fichiers + Teams chat pour les messages). Cas pratique: un employé tape un numéro de carte bancaire dans un chat Teams → DLP intercepte, affiche 'Ce message semble contenir un numéro de CB. Conformément à notre politique, ce message a été bloqué.' Le message n'est jamais envoyé. Pour les fichiers: un fichier labellisé Highly Confidential partagé avec un guest externe via Teams → bloqué par la politique DLP."},
{id:3105,cat:"Rétention et Records",q:"Qu'est-ce que 'Event-Based Retention' dans Purview et donnez des exemples concrets ?",o:["Une rétention déclenchée par les administrateurs","Event-Based Retention: la période de conservation ne commence pas à la date de création mais à la survenance d'un événement (Event Trigger). Exemples: 1) Contrat: rétention 7 ans à partir de la date d'expiration du contrat (pas de sa création), 2) Employé: rétention du dossier RH 5 ans à partir de la date de départ, 3) Produit: documentation technique conservée 10 ans à partir du retrait du produit du marché. Configurer: créer un Event Type → associer à un Retention Label → déclencher l'événement via la UI, Graph API, ou automatiquement","Une rétention mensuelle","Une rétention uniquement pour les emergencies"],a:1,e:"Event-Based Retention workflow: 1) Créer un Event Type 'Contract Expiry' dans Purview Records Management, 2) Créer un Retention Label avec action = Retain 7 years, trigger = Event Type 'Contract Expiry', 3) Appliquer le label sur les fichiers de contrats (auto ou manuel), 4) Quand le contrat expire: déclencher l'événement via l'UI (saisir l'Asset ID du contrat) ou via l'API (automatisé depuis le système CRM qui gère les contrats). La conservation de 7 ans commence à ce moment."},
